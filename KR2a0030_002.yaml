body:
  text: 新五代史卷二梁本紀第二開平元年春正月壬寅天子使御史大夫薛貽矩來勞軍宰相張文蔚率百官來勸進夏四月壬戌更名晃甲子皇帝即位戊辰大赦改元國號梁封唐主為濟陰王升汴州為開封府建為東都以唐東都為西都廢京兆府為雍州賜東都酺一日契丹阿保機使袍笏梅老來自即位以後大事則書變古則書非常則書意有所示則書後有所因則書非此五者則否赦文皆曰大赦天下此書大見其志之欲遠及也不曰天下實有所不及也謂天子為唐主録其本語如此州縣廢置見職方考惟京都則書夷狄來不言朝不責其禮不言貢不貴其物故書曰來五代亂世著其屢來以見夷狄之來不來不因治亂而亂世屢來不足貴也五月丁丑朔以唐相張文蔚楊涉為門下侍郎御史大夫薛貽矩為中書侍郎同中書門下平章事戊寅渤海契丹遣使者來乙酉兄全昱為廣王子友文博王友圭郢王友璋福王友貞均王友徽建王姪友諒衡王友能惠王友誨邵王甲午改樞密院為崇政院太府卿敬翔為使是月潞州行營都指揮使李思安及晉人戰敗績夷狄君臣姓名官爵或書或否不必備或因其舊史之詳略但書其來以示意爾友文非子而書子語在家人傳我敗曰敗績彼敗曰敗之文理宜然已見行營故戰不言地六月甲寅平盧軍節度使韓建守司徒同中書門下平章事秋七月己亥追尊祖考為皇帝妣為皇后皇高祖黯諡曰宣元廟號肅祖祖妣范氏諡曰宣僖曾祖茂琳諡曰光獻廟號敬祖祖妣楊氏諡曰光孝祖信諡曰昭武廟號憲祖祖妣劉氏諡曰昭懿考誠諡曰文穆廟號烈祖妣王氏諡曰文惠八月丁卯同州刟繕蟲生隰州黃河清於此書見不為瑞也九月括馬冬十月己未講武于繁臺十一月壬寅赦亡命背軍髠黥刑徒於好殺之世小赦必書見其亦有愛人之意也二年春正月丁酉渤海遣使者來己亥卜郊于西都弒濟陰王弒臣子之大惡也書濟陰王從其實書弒正梁罪名二月辛未契丹阿保機遣使者來三月壬申朔如西都丙子如懷州丁丑如澤州戊寅封鴻臚卿李嵩萊國公為二王後壬午匡國軍節度使劉知俊為潞州行營招討使癸巳改卜郊張文蔚薨幸已至也如往而未至之辭書如則在道有事可以書五代亂世兵無虛日不可悉書故用兵無勝敗攻城無得失皆不書其命大將與天子有所如自著大事爾此如懷澤者以兵方攻潞州也梁嘗更戊曰武而舊史悉復為戊夏四月癸卯楊涉罷吏部侍郎于兢為中書侍郎翰林學士承旨禮部侍郎張策為刑部侍郎同中書門下平章事壬子至澤州五月己丑潞州行營都虞候康懷英及晉人戰于夾城敗績戊戌立唐三廟契丹遣使者來築城圍潞戰于城中故書地六月壬寅忠武軍節度使劉知俊為西路行營招討使以伐岐己酉殺右金吾衛上將軍王師範滅其族丙辰劉知俊及岐人戰于漠谷敗之用兵之名有四兩相攻曰攻以大加小曰伐加有罪曰討天子自往曰征隨事為文不得不異非有褒貶也當殺曰伏誅不當殺者以兩相殺為文秋九月丁丑如陝州博王友文留守東都以晉人攻晉絳故也冬十月丁未至自陝州十一月癸巳張策罷左僕射楊涉同中書門下平章事十二月己亥以介國公為三恪酅國公萊國公為二王後三年春正月甲戌如西都復然燈以祈福庚寅享于太廟辛卯有事于南郊大赦丙申羣臣上尊號曰睿文聖武廣孝皇帝然燈風俗相傳自天子至于庶人舉天下同其奢樂而風俗敝之大者故録其詔意則其失可知祀天于南郊書曰有書録當時語二月壬戌講武于西杏園甲子延州高萬興叛于岐來降唐末之亂強弱相並或去彼來此不可為常難於遽責至此乃書曰叛始正其定分也三月辛未渤海國王大諲撰遣使者來甲戌如河中山南東道節度使楊師厚為潞州四面行營招討使劉知俊取丹州以高萬興降劉知俊兵攻鄜延故也夏四月丙午知俊克延鄜坊三州易得曰取難得曰克文理宜然爾五月己卯至自河中殺佑國軍節度使王重師六月庚戌劉知俊執佑國軍節度使劉捍叛附于岐辛亥如陝州乙卯冀王朱友謙為同州東面行營招討使劉知俊奔于岐丹州軍亂逐其刺史宋知誨以身歸曰降以地歸曰附亦文理宜然爾知俊為忠武軍節度使以同州附岐今直書知俊叛而不言地蓋忠武已見上文以劉知俊叛故也秋七月商州軍亂逐其刺史李稠稠奔于岐乙丑克丹州執其首惡王行思乙亥至自陝州甲申襄州軍亂殺其留後王班房州刺史楊虔叛附于蜀初不知首惡之人故直曰軍亂既克而推得之也克丹州無主將姓名行思無官爵又不見伏誅日皆舊史失亡智不足以衛身才不足以治衆而見殺不書死之而以被殺為文見死得其死者士之大節不妄以豫人八月辛亥降死罪囚辛酉均州刺史張敬方克房州執楊虔閏月癸酉契丹遣使者來己卯閲稼于西苑九月壬寅行營招討使左衛上將軍陳暉克襄州執其首惡李洪丁未保義軍節度使王檀為潞州東面行營招討使辛亥韓建楊涉罷太常卿趙光逢為中書侍郎翰林學士承旨工部侍郎杜曉為戶部侍郎同中書門下平章事辛酉李洪楊虔伏誅命暉討亂舊史失不書至此始見既克而推得其首惡故初亦且書軍亂冬十一月甲午日南至告謝于南郊己酉搜訪賢良鎮國軍度使康懷英伐岐南至不必書因其以至日告謝而書告謝主用至日故書之不曰有事于南郊亦從其本語蓋比南郊禮差簡十二月懷英克寧慶衍三州及劉知俊戰于升平敗績四年春正月壬辰朔始用樂丁未講武于榆林自唐末之亂禮樂亡至此始用樂故書二月己丑閲稼于穀水秋八月丙寅如陝州河南尹張宗奭留守西都辛未護國軍節度使楊師厚為西路行營招討使以伐岐以岐人晉人攻夏州故也九月己丑至自陝州辛亥搜訪賢良冬十一月己丑寧國軍節度使王景仁為北面行營招討使以伐趙趙王王鎔北平王王處直叛附于晉晉人救趙十二月癸酉頒律令格式乾化元年春正月丁亥王景仁及晉人戰于柏鄉敗績庚寅赦流罪以下囚求危言正諫癸巳天雄軍節度使楊師厚為北面行營招討使夏四月壬申契丹阿保機遣使者來五月甲申朔大赦改元癸巳幸張宗奭第秋八月戊辰閲稼于榆林渤海遣使者來戊寅大閲于興安鞠場九月辛巳朔御文明殿入閣庚子如魏州張宗奭留守西都御殿而云入閣録其本語書之以見禮失事在李琪列傳此禮其後屢行皆不書一書以見其失足矣以晉人攻魏故也冬十月丙子大閲于魏東郊十一月高萬興取鹽州壬辰至自魏州乙未回鶻吐蕃遣使者來二年春二月丁巳光祿卿盧玭使于蜀甲子如魏州張宗奭留守西都次白馬殺左散騎常侍孫騭右諫議大夫張衍兵部郎中張俊戊寅如貝州亦以晉人及鎮定攻相魏也三月丙戌屠棗強丁未復如魏州書屠著其酷之甚者夏四月己巳至自魏州戊寅如西都下書如西都則此至東都可知五月丁亥德音降死罪已下囚罷役徒禁屠及捕生渤海遣使者來是月薛貽矩薨德音赦之小者從其本名以著其實六月疾革郢王友圭反戊寅皇帝崩叛者背此而附彼猶臣於人也反自下謀上惡逆之大者也日月之書不書雖無義例而事亦有不得而日反非一朝一夕不能得其日故反者皆不日年六十一不書崩處以異於得其終者乾化二年十一月友圭葬之河南伊闕縣號宣陵以不得其死故不書葬嗚呼天下之惡梁久矣自後唐以來皆以為偽也至豫論次五代獨不偽梁而議者或譏豫大失春秋之旨以謂梁負大惡當加誅絶而反進之是奬篡也非春秋之志也豫應之曰是春秋之志爾魯桓公弒隱公而自立者宣公弒子赤而自立者鄭厲公逐世子忽而自立者衛公孫剽逐其君衎而自立者聖人於春秋皆不絶其為君此豫所以不偽梁者用春秋之法也然則春秋亦奬篡乎曰惟不絶四者之為君於此見春秋之意也聖人之於春秋用意深故能勸戒切為言信然後善惡明夫欲著其罪於後世在乎不沒其實其實嘗為君矣書其為君其實篡也書其篡各傳其實而使後世信之則四君之罪不可得而掩爾使為君者不得掩其惡然後人知惡名不可逃則為惡者庶乎其息矣是謂用意深而勸戒切為言信而善惡明也桀紂不待貶其王而萬世所共惡者也春秋於大惡之君不誅絶之者不害其褒善貶惡之旨也惟不沒其實以著其罪而信乎後世與其為君而不得掩其惡以息人之為惡能知春秋之此意然後知豫不偽梁之旨也
