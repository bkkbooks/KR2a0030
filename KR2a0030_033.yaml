body:
  text: 新五代史卷三十三死事傳第二十一嗚呼甚哉自開平訖于顯德終始五十三年而天下五代士之不幸而生其時欲全其節而不二者固鮮矣於此之時責士以死與必去則天下為無士矣然其習俗遂以苟生不去為當然至於儒者以仁義忠信為學享人之祿任人之國者不顧其存亡皆恬然以苟生為得非徒不知愧而反以其得為榮者可勝數哉故吾於死事之臣有所取焉君子之於人也樂成其美而不求其備況死者人之所難乎吾於五代得全節之士三人而已其初無卓然之節而終以死人之事者得十有五人焉而戰沒者不得與也然吾取王清史彥超者其有旨哉其有旨哉作死事傳不能立傳者五人馬彥超附朱守殷傳宋令詢李遐張彥卿鄭昭業見於本紀而已張源德張源德者不知其世家或曰本晉人也少事晉無所稱從李罕之以潞州叛晉降梁罕之遣源德見梁太祖太祖時源德自金吾衛將軍為蔡州刺史梁貞明三年魏博節度使楊師厚卒末帝分魏相等六州為兩鎮懼魏軍不從乃遣劉鄩將兵萬人屯于魏以虞變魏軍果叛迫其節度使賀德倫以魏博二州降晉當是時源德為鄩守貝州晉王入魏諸將欲先擊貝州晉王曰貝城小而堅攻之難卒下且源德雖恃劉鄩之兵然與滄州相首尾今德州居其中而無備不如先取之則滄貝之勢分而易圖也乃先襲破德州然後以兵五千攻源德源德堅守不下晉軍塹而圍之已而劉鄩大敗于故元城南走黎陽晉軍攻破洺州而衛州刺史來昭邢州節度使閻寶皆以城降晉磁州刺史靳昭相州張筠滄州戴思遠皆棄城走當此時晉已先下全燕而鎮定皆附于晉自河以北山以東四面千里六鎮數十州之地皆歸晉獨貝一州圍之踰年不可下源德守既堅而貝人聞晉已盡有河北城中食且盡乃勸源德出降源德不從遂見殺源德已死貝人謀曰晉圍吾久吾窮而後降懼皆不免也乃告于晉曰吾欲被甲執兵而降得赦而後釋之如何晉軍許諾貝人三千出降已釋甲晉兵四面圍而盡殺之夏魯奇夏魯奇字邦傑青州人也唐莊宗時賜姓名曰李紹奇其後莊宗賜姓名者皆復其故魯奇初事梁為宣武軍校後奔于晉為衛護指揮使從周德威攻劉守光於幽州守光將單廷圭元行欽以驍勇自負魯奇每與二將鬬輒不能解兩軍皆釋兵而觀之晉已下魏博梁將劉鄩軍于洹水莊宗以百騎覘敵遇鄩伏兵圍之數重幾不得脫魯奇力戰手殺百餘人身被二十餘瘡與莊宗決圍而出莊宗益奇之以為磁州刺史從戰中都擒王彥章莊宗壯之賜絹千匹拜鄭州防禦使遷河陽節度使為政有惠愛徙鎮忠武河陽之人遮留不得行父老詣京師乞留明宗遣中使往諭之魯奇乃得去唐師伐荊南以魯奇為招討副使無功而還徙鎮武信東川董璋反攻遂州魯奇閉城拒之旬月救兵不至城中食盡魯奇自刎死年四十九吳巒兵猶可戰而不戰魯奇食盡力窮而死故取捨異姚洪姚洪本梁之小校也自董璋為梁將洪嘗事璋後事唐為指揮使長興中遣洪將千人戍閬州董璋反遣人以書招洪洪得璋書輒投厠中後璋兵攻破閬州執洪璋曰爾為健兒我遇汝厚奈何負我邪洪罵曰老賊爾昔為李七郎奴掃馬糞得一臠殘炙感恩不已今天子用爾為節度使何苦反邪吾能為國家死不能從人奴以生璋怒然鑊于前令壯士十人刲其肉而食洪至死大罵明宗聞之泣下録其二子而厚恤其家王思同王思同幽州人也其父敬柔娶劉仁恭女生思同思同事仁恭為銀胡指揮使仁恭為其子守光所囚思同奔晉以為飛勝指揮使梁晉相距于莘遣思同築壘楊劉以功遷神武十軍都指揮使纍遷鄭州防禦使思同為人敢勇善騎射好學頗喜為詩輕財重義多禮文士然未嘗有戰功明宗時以久次為匡國軍節度使徙鎮雄武是時吐蕃數為寇而秦州無亭障思同列四十餘柵以禦之五年來朝明宗問以邊事思同指畫山川陳其利害思同去明宗顧左右曰人言思同不管事能若是邪於是始知其材以為右武衛上將軍京兆尹西京留守石敬瑭討董璋思同為先鋒指揮使兵入劍門而後軍不繼思同與璋戰不勝而却敬瑭兵罷思同徙鎮山南西道已而復為京兆尹西京留守應順元年二月潞王從珂反鳳翔馳檄四鄰言姦臣幸先帝疾病賊殺秦王而立幼嗣侵弱宗室動搖藩方陳己所以興兵討亂之狀因遣伶奴安十十以五絃謁思同欲因其歡以通意是時諸鎮皆懷嚮背所得潞王書檄雖以上聞而不絶其使獨思同執十十及從珂所使推官郝詡等送京師愍帝嘉其忠即以思同為西面行營馬步軍都部署三月會諸鎮兵圍鳳翔破東西關城從珂兵弱而守甚堅外兵傷死者衆從珂登城呼外兵而泣曰吾從先帝二十年大小數百戰甲不解體金瘡滿身士卒固嘗從我矣今先帝新棄天下而朝廷信用姦人離間骨肉我實何罪而見伐乎因慟哭士卒聞者皆悲憐之興元張虔釗攻城西督戰甚急士卒苦之反兵攻虔釗虔釗走羽林指揮使楊思權呼曰潞王吾主也乃引軍自西門入降從珂而思同未知猶督戰嚴衛指揮使尹暉麾其衆曰城西軍入城受賞矣何用戰邪士卒解甲棄仗聲聞數里遂皆入城降諸鎮之兵皆潰思同挺身走至長安西京副留守劉遂雍閉門不納乃走潼關從珂引兵東至昭應前鋒追執思同從珂責曰罪可逃乎思同曰非不知從王而得生恐終死不能見先帝於地下從珂愧其言乃殺之漢高祖即位贈侍中思同東走將自歸于天子與元行欽走異故豫其死張敬達張敬達字志通代州人也小字生鐵少以騎射事唐莊宗為廳直軍使明宗時為河東馬步軍都指揮使領欽州刺史纍遷彰國大同軍節度使徙鎮武信晉昌清泰二年契丹數犯邊廢帝以河東節度使石敬瑭兼大同彰國振武威塞等軍蕃漢馬步軍都總管屯于欣州屯兵聚噪遮敬瑭呼萬歲敬瑭斬三十餘人以止之廢帝疑敬瑭有異志乃以敬達為北面副總管以分其兵明年夏徙敬瑭鎮天平遂以敬達為大同彰國振武威塞等軍蕃漢馬步軍都部署敬瑭因此遂反即以敬達為太原四面招討使六月兵圍太原敬達為長城連柵雲梯飛炮以攻之所為城柵將成輒有大風雨水暴至以壞之敬瑭求救于契丹九月契丹耶律德光自鴈門入旌旗相屬五十餘里德光先遣人告敬瑭曰吾欲今日破敵可乎敬瑭報曰大兵遠來而賊勢方盛要在成功不必速也使者未復命而兵已交敬達陳於西山契丹以羸騎三千革鞭木人馬皆不甲胄以趨唐軍唐軍爭馳之契丹兵走追至汾曲伏發斷唐軍為二其在北者皆死死者萬餘人敬達收軍柵晉安契丹圍之廢帝遣趙延壽范延光等救之延壽屯團柏谷延光屯遼州相去皆百餘里契丹兵圍敬達者自晉安寨南長百餘里闊五十里敬達軍中望之但見穹廬連屬如岡阜四面亙以毛索挂鈴為警縱犬往來敬達軍中有夜出者輒為契丹所得由是閉壁不敢復出延壽等皆有二心無救敬達意敬達猶有兵五萬人馬萬匹久之食盡削木篩糞以飼其馬馬死者食之已而馬盡副招討使楊光遠勸敬達降晉敬達自以不忍背唐而救兵且至光遠促之不已敬達曰諸公何相迫邪何不殺我而降光遠即斬敬達降契丹耶律德光聞敬達死哀其忠遣人收葬之本紀責其不誅光遠而諷其殺己以降賊故不書死而書如其志而傳録其死者終嘉其不降也然己雖不屈而諷人降賊故不得為死節翟進宗張萬迪附翟進宗張萬迪者皆不知其何人也初皆事唐後事晉進宗為淄州刺史萬迪為登州刺史楊光遠反以騎兵百脅取二刺史至青州萬迪聽命而進宗獨不屈光遠遂殺進宗出帝贈進宗左武衛上將軍及光遠平曲赦青州雖光遠子孫皆見慰釋而獨不赦萬迪暴其罪而斬之詔求進宗尸加禮歸葬葬事官給以其子仁欽為東頭供奉官沈斌沈斌字安時徐州下邳人也少為軍卒事梁為拱辰都指揮使後事唐從魏王繼岌破蜀平康延孝以功為虢州刺史歷隨趙等八州刺史晉開運元年為祁州刺史契丹犯塞至于榆林過祁州斌以謂契丹深入晉地而歸兵羸乏可擊即以州兵邀之契丹以精騎剗門斌兵多死城中無備虜將趙延壽留兵急攻之延壽招斌降斌從城上罵延壽曰公父子誤計陷于腥膻忍以犬羊之衆殘賊父母之邦斌能為國死爾不能效公所為也已而城陷斌自盡其家屬皆沒于虜王清王清字去瑕洺州曲周人也初事唐為寧衛指揮使後事晉為奉國都虞候安從進叛襄州從高行周攻之逾年不能下清謂行周曰從進閉孤城以自守其勢豈得久邪因請先登遂攻破之開運二年冬從杜重威戰陽城清以力戰功為步軍之最加檢校司徒是冬重威軍中渡橋南虜軍其北以相拒而虜以精騎並西山出晉軍後南擊欒城斷晉餉道清謂重威曰晉軍危矣今去鎮州五里而守死于此營孤食盡將若之何請以步兵二千為先鋒奪橋開路公率諸軍繼進以入鎮州可以守也重威許之遣與宋彥筠俱前清與虜戰敗之奪其橋是時重威已有二志猶豫不肯進彥筠亦退走清曰吾獨死於此矣因力戰而死年五十三漢高祖立贈清太傅史彥超史彥超雲州人也為人勇悍驍捷周太祖起魏時彥超為漢龍捷都指揮使以兵從太祖入立遷虎捷都指揮使戍于晉州劉旻攻晉州州無主帥知州王萬敢不能拒彥超以戍兵堅守月餘太祖遣王峻救之旻兵解去以功遷龍捷右廂都指揮使領鄭州防禦使周漢戰高平彥超為前鋒先登陷陳以功拜感德軍節度使周兵圍漢太原契丹救漢出欣代世宗遣符彥卿拒之以彥超為先鋒戰欣口彥超勇憤俱發左右馳擊解而復合者數四遂歿于陳是時世宗敗漢高平乘勝而進圍城之役諸將議不一故久無成功世宗欲解去而未決聞彥超戰死遽班師倉卒之際亡失甚衆世宗既惜彥超而憤無成功憂忿不食者數日贈彥超太師優恤其家焉孫晟孫晟初名鳳又名忌密州人也好學有文辭尤長於詩少為道士居廬山簡寂宮常畫唐詩人賈島像置于屋壁晨夕事之簡寂宮道士惡晟以為妖以杖驅出之乃儒服北之趙魏謁唐莊宗于鎮州莊宗以晟為著作佐郎天成中朱守殷鎮汴州辟為判官守殷反伏誅晟乃棄其妻子亡命陳宋之間安重誨惡晟以謂教守殷反者晟也畫其像購之不可得遂族其家晟奔于吳是時李方篡楊氏多招四方之士得晟喜其文辭使為教令由是知名晟為人口吃遇人不能道寒喧已而坐定談辨鋒生聽者忘倦尤愛之引與計議多合意以為右僕射與馮延巳並為相晟輕延巳為人常曰金碗玉杯而盛狗屎可乎晟事父子二十餘年官至司空家益富驕每食不設几案使衆妓各執一器環立而侍號肉臺盤時人多效之周世宗征淮李景懼始遣泗州牙將王知朗至徐州奉書以求和世宗不答又遣翰林學士鍾謨文理院學士李德明奉表稱臣不答乃遣禮部尚書王崇質副晟奉表謨與晟等皆言景願割壽濠泗楚光海六州之地歲貢百萬以佐軍而世宗已取滁揚濠泗諸州欲盡取淮南乃止因留使者不遣而攻壽州益急謨等見世宗英武非景敵而師甚盛壽春且危乃曰願陛下寬臣五日之誅容臣還取景表盡獻淮北諸州世宗許之遣供奉官安弘道押德明崇質南還而謨與晟皆見留德明等既還景悔不肯割地世宗亦以暑雨班師留李重進張永德等分攻廬壽周兵所得揚泰諸州皆不能守景兵復振重進與永德兩軍相疑有隙永德上書言重進反世宗不聽景知二將之相疑也乃以蠟丸書遺重進勸其反初晟之奉使也語崇質曰吾行必不免然吾終不負永陵一抔土也永陵者墓也及崇質還而晟與鍾謨俱至京師館于都亭驛待之甚厚每朝會入閣使班東省官後召見必飲以醇酒已而周兵數敗盡失所得諸州世宗憂之召晟問江南事晟不對世宗怒未有以發會重進以景蠟丸書來上多斥周過惡以為言由是發怒曰晟來使我言景畏吾神武願得北面稱臣保無二心安得此指斥之言乎亟召侍衛軍虞候韓通收晟下獄及其從者二百餘人皆殺之晟臨死世宗猶遣近臣問之晟終不對神色怡然正其衣冠南望而拜曰臣惟以死報國爾乃就刑晟既死鍾謨亦貶耀州司馬其後世宗怒解憐晟忠悔殺之召拜鍾謨衛尉少卿景已割江北遂遣謨還而景聞晟死亦贈魯國公
