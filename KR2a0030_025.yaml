body:
  text: 新五代史卷二十五唐臣傳第十三周德威周德威字鎮遠朔州馬邑人也為人勇而多智能望塵以知敵數其狀貌雄偉笑不改容人見之如也事晉王為騎將稍遷鐵林軍使從破王行瑜以功遷衙內指揮使其小字陽五當梁晉之際周陽五之勇聞天下梁軍圍晉太原令軍中曰能生得周陽五者為刺史有驍將陳章者號陳野義常乘白馬被朱甲以自異出入陳中求周陽五欲必生致之晉王戒德威曰陳野義欲得汝以求刺史見白馬朱甲者宜善備之德威笑曰陳章好大言耳安知刺史非臣作邪因戒其部兵曰見白馬朱甲者當佯走以避之兩軍皆陳德威微服雜卒伍中陳章出挑戰兵始交德威部下見白馬朱甲者因退走章果奮矟急追之德威伺章已過揮鐵鎚擊之中章墮馬遂生擒之梁攻燕晉遣德威將五萬人為燕攻梁取潞州遷代州刺史內外蕃漢馬步軍都指揮使梁軍捨燕攻潞圍以夾城潞州守將李嗣昭閉城拒守而德威與梁軍相持於外踰年嗣昭與德威素有隙晉王病且革語莊宗曰梁軍圍潞而德威與嗣昭有隙吾甚憂之王喪在殯莊宗新立殺其叔父克寧國中未定而晉之重兵悉屬德威于外晉人皆恐莊宗使人以喪及克寧之難告德威且召其軍德威聞命即日還軍太原留其兵城外徒步而入伏梓宮前慟哭幾絶晉人乃安遂從莊宗復擊梁軍破夾城與李嗣昭歡如初以破夾城功拜振武節度使同中書門下平章事天祐七年秋梁遣王景仁將魏滑汴宋等兵七萬人擊趙趙王王鎔乞師于晉晉遣德威先屯趙州冬梁軍至柏鄉趙人告急莊宗自將出贊皇會德威于石橋進距柏鄉五里營于野河北晉兵少而景仁所將神威龍驤拱宸等軍皆梁精兵人馬鎧甲飾以組繡金銀其光耀日晉軍望之色動德威勉其衆曰此汴宋傭販兒徒飾其外耳其中不足懼也其一甲直數十千擒之適足為吾資無徒望而愛之當勉以往取之退而告莊宗曰梁兵甚鋭未可與爭宜少退以待之莊宗曰吾提孤軍出千里其利速戰今不乘勢急擊之使敵知吾之衆寡則吾無所施矣德威曰不然趙人能城守而不能野戰吾之取勝利在騎兵平川廣野騎兵之所長也今吾軍於河上迫賊營門非吾用長之地也莊宗不悅退臥帳中諸將無敢入見德威謂監軍張承業曰王怒老兵不速戰者非怯也且吾兵少而臨賊營門所恃者一水隔耳使梁得舟渡河吾無類矣不如退軍鄗邑誘敵出營擾而勞之可以策勝也承業入言曰德威老將知兵願無忽其言莊宗遽起曰吾方思之耳已而德威獲梁遊兵問景仁何為曰治舟數百將以為浮梁德威引與俱見莊宗笑曰果如公所料乃退軍鄗邑德威晨遣三百騎叩梁營挑戰自以徑兵三千繼之景仁怒悉其軍以出與德威轉鬬數十里至于鄗南兩軍皆陳梁軍橫亙六七里汴宋之軍居西魏滑之軍居東莊宗策馬登高望而喜曰平原淺草可前可却真吾之勝地乃使人告德威曰吾當為公先公可繼進德威諫曰梁軍輕出而遠來與吾轉戰其來必不暇齎糧糗縱其能齎亦不暇食不及日午人馬俱饑因其將退而擊之勝諸將亦皆以為然至未申時梁軍東偏塵起德威鼓譟而進麾其西偏曰魏滑軍走矣又麾其東偏曰梁軍走矣梁陳動不可復整乃皆走遂大敗自鄗追至于柏鄉橫尸數十里景仁以十餘騎僅而免自梁與晉爭凡數十戰其大敗未嘗如此劉守光僭號於燕晉遣德威將三萬出飛狐以擊之德威入祁溝關取涿州遂圍守光於幽州破其外城守光閉門距守而晉軍盡下燕諸州縣獨幽州不下圍之踰年乃破之以功拜盧龍軍節度使德威雖為大將而常身與士卒馳騁矢石之間守光驍將單廷圭望見德威於陳曰此周陽五也乃挺槍馳騎追之德威佯走度廷圭垂及側身少却廷圭馬方馳不可止縱其少過奮檛擊之廷圭墜馬遂見擒莊宗與劉相持于魏夜潛軍出黃澤關以襲太原德威自幽州以千騎入土門以躡之至樂平遇雨不得進而還德威與俱東爭趨臨清臨清有積粟且晉軍餉道也德威先馳據之以故莊宗卒能困軍而敗之莊宗勇而好戰尤鋭於見敵德威老將常務持重以挫人之鋒故其用兵常伺敵之隙以取勝十五年德威將燕兵三萬人與鎮定等軍從莊宗于河上自麻家渡進軍臨濮以趨汴州軍宿胡柳陂黎明候騎報曰梁軍至矣莊宗問戰於德威德威對曰此去汴州信宿而近梁軍父母妻子皆在其中而梁人家國繫此一舉吾以深入之兵當其必死之戰可以計勝而難與力爭也且吾軍先至此糧爨具而營柵完是謂以逸待勞之師也王宜按軍無動而臣請以騎軍擾之使其營柵不得成樵爨不暇給因其勞乏而乘之可以勝也莊宗曰吾軍河上終日俟敵今見敵不擊復何為乎顧李存審曰公以輜重先吾為公殿遽督軍而出德威謂其子曰吾不知死所矣前遇梁軍而陳王居中鎮定之軍居左德威之軍居右而輜重次右之西兵已接莊宗率銀槍軍馳入梁陳梁軍小敗犯晉輜重輜重見梁朱旗皆驚走入德威軍德威軍亂梁軍乘之德威父子皆戰死莊宗與諸將相持而哭曰吾不聽老將之言而使其父子至此莊宗即位贈德威太師明宗時加贈太尉配享莊宗廟晉高祖追封德威燕王子光輔官至刺史符存審子彥超彥饒彥卿符存審字德詳陳州宛丘人也初名存少微賤嘗犯法當死臨刑指旁壞垣顧主者曰願就死于彼冀得垣土覆尸主者哀而許之為徙垣下而主將方飲酒顧其愛妓思得善歌者佐酒妓言有符存常為妾歌甚善主將馳騎召存審而存審以徙垣下故未加刑因往就召使歌而悅之存審因得不死其後事李罕之從罕之歸晉晉王以為義兒軍使賜姓李氏名存審從晉王擊李匡儔為前鋒破居庸關又從擊王行瑜跛龍泉寨以功遷檢校左僕射從李嗣昭攻汾州執李瑭遷左右廂步軍指揮使又從嗣昭攻潞州降丁會從周德威破梁夾城遷欣州刺史蕃漢馬步軍指揮使晉趙攻燕梁救燕擊趙深州圍蓨縣存審與史建瑭軍下博擊走梁軍遷領邢州團練使魏博叛梁降晉存審為前鋒屯臨清莊宗入魏存審殿軍魏縣與劉相距於莘西從莊宗敗於故元城閻寶以邢州降乃以存審為安國軍節度使毛璋以滄州降徙存審橫海加同中書門下平章事契丹圍幽州是時晉與梁相持河上欲發兵兵少欲勿救懼失之莊宗疑以問諸將而存審獨以為當救曰願假臣騎兵五千足矣乃遣存審分兵救之卒擊走契丹從戰胡柳陂晉軍晨敗亡周德威存審與其子彥圖力戰暮復敗梁軍於土山遂取德勝築河南北為兩城晉人謂之夾寨遷內外蕃漢馬步軍總管梁朱友謙以河中同州降晉梁遣劉攻同州友謙求救乃遣存審與李嗣昭救之河中兵少而弱梁人素易之且不虞晉軍之速至也存審選精騎二百雜河中兵出擊壘陽敗而走兵追之晉騎反擊獲其騎兵五十梁人知其晉軍也皆大驚然河中糧少而新降人心頗持兩端晉軍屯朝邑諸將皆欲速戰存審曰使梁軍知吾利於速戰則將夾渭而營斷我餉道以持久困我則進退不可敗之道也不若緩師示弱伺隙出奇可以取勝乃按軍不動居旬日望氣者言有黑氣狀如鬬雞存審曰可以一戰矣乃進軍擊大敗之閉壁不復出存審曰兵已敗不如逸之乃休士卒遣裨將王建及牧馬于沙苑以謂晉軍且懈乃夜遁去存審追擊于渭河又大敗之張文禮弒趙王王鎔晉遣閻寶李嗣昭等攻之至輒戰死最後遣存審破之存審為將有機略大小百餘戰未嘗敗衄與周德威齊名德威死晉之舊將獨存審在契丹攻遮虜乃以存審為盧龍軍節度使時存審已病辭不肯行莊宗使人慰諭彊遣之莊宗滅梁入洛存審自以身為大將不得與破梁之功怏怏疾益甚因請朝京師是時郭崇韜權位已重然其名望素出存審下不樂其來而加己上因沮其事存審妻郭氏泣訴于崇韜曰吾夫於國有功而於公鄉里之舊奈何忍令死棄窮野崇韜愈怒存審章纍上輒不許存審伏枕嘆曰老夫事二主四十年今日天下一家四夷遠俗至于亡國之將射鈎斬袪之人皆得親見天子奉觴為壽而獨豫棄死於此豈非命哉崇韜度存審病已亟乃請許其來朝徙存審宣武軍節度使卒于幽州臨終戒其子曰吾少提一劍去鄉里四十年間取將相然履鋒冒刃出死入生而得至此也因出其平生身所中矢鏃百餘而示之曰爾其勉哉存審三子彥超彥饒彥卿彥超為汾州刺史郭從謙弒莊宗明宗入洛陽是時彥超為北京巡檢永王存霸奔于太原彥超見留守張憲謀之憲儒者事莊宗最久不忍背恩欲納之彥超不從存霸遂見殺明宗即位彥超來朝明宗德之勞曰河東無事賴爾之力也以為建雄軍留後遷北京留守徙鎮昭義罷為上將軍復為泰寧軍節度使又徙安遠彥超主藏奴王希全盜其資彥超稍責之奴懼夜叩其門言有急彥超出見殺贈太尉次子彥饒為汴州馬步軍都指揮使天成元年發汴兵三千戍瓦橋關控鶴指揮使張諫為亂殺權知州高逖迫彥饒為帥彥饒陽許之曰欲吾為帥當止焚掠明日以軍禮見吾於南衙乃陰與拱衙指揮使龐起伏甲于衙內明日諫等皆集伏兵發誅諫等殺四百餘人即日牒州事與推官韋儼明宗下詔褒其忠略其後纍遷彰聖都指揮使歷曹沂饒三州刺史清泰三年自饒州刺史拜忠正軍節度使侍衛馬步軍都指揮使晉高祖起太原彥饒以侍衛兵從廢帝至河陽廢帝敗晉高祖以楊光遠代彥饒將親軍徙彥饒義成軍節度使范延光反白奉進以侍衛兵三千屯滑州兵士犯法奉進捕得五人其三人義成兵也因並斬之彥饒怒明日奉進從數騎過彥饒謝不先告而殺彥饒曰軍士各有部分義成兵卒豈公所得斬邪何無主客之禮也奉進怒曰軍士犯法安有彼此且僕已自謝過而公怒不息欲與延光同反邪拂衣而起彥饒不復留之其麾下大譟追奉進殺之彥饒不之止也已而屯駐軍將馬萬等聞亂以兵擒彥饒送之京師遂以彥饒應延光反聞行至赤岡高祖使人殺之下詔削奪在身官爵彥饒與晉初無釁隙以一旦之忿不能馭其軍殺奉進已非其本意以反見誅非其罪也史建瑭子匡翰史建瑭鴈門人也晉王為鴈門節度使其父敬思為九府都督從晉王入關破黃巢復京師擊秦宗權于陳州嘗將騎兵為先鋒晉王東追黃巢于冤朐還過梁軍其城北梁王置酒上源驛獨敬思與薛鐵山賀回鶻等十餘人侍晉王醉留宿梁驛梁兵夜圍而攻之敬思登驛樓射殺梁兵十餘人會天大雨晉王得與從者俱去縋尉氏門以出而敬思為梁追兵所得見殺建瑭少事軍中為裨校自晉降丁會與梁相距於潞州建瑭已為晉兵先鋒梁兵數為建瑭所殺相戒常避史先鋒梁遣王景仁攻趙晉軍救趙建瑭以先鋒兵出井陘戰于柏鄉梁軍為方陳分其兵為二汴宋之軍居左魏滑之軍居右周德威擊其左建瑭擊其右梁軍皆走遂大敗之以功加檢校左僕射天祐九年晉攻燕燕王劉守光乞師于梁梁太祖自將擊趙圍棗彊蓨縣是時晉精兵皆北攻燕獨符存審與建瑭以三千騎屯趙州梁軍已破棗彊存審扼下博橋建瑭分其麾下五百騎為五隊一之衡水一之南宮一之信都一之阜城而自將其一約各取梁芻牧者十人會下博至暮擒梁兵數十皆殺之各留其一人縱使逸去告之曰晉王軍且大至明日建瑭率百騎為梁旗幟雜其芻牧者暮叩梁營殺其守門卒縱火大呼斬擊數十百人而梁芻牧者所出各遇晉兵有所亡失其縱而不殺者歸而皆言晉軍且至梁太祖夜拔營去蓨縣人追擊之梁軍棄其輜重鎧甲不可勝計梁太祖方病由是增劇而晉軍以故得並力以收燕者二人之力也後從莊宗入魏博敗劉於故元城纍以功歷貝相二州刺史十八年晉軍討張文禮於鎮州建瑭以先鋒兵下趙州執其刺史王鋋兵傅鎮州建瑭攻其城門中流矢卒年四十二建瑭子匡翰尚晉高祖女是為魯國長公主匡翰為將沉毅有謀而接下以禮與部曲語未嘗不名歷天雄軍步軍都指揮使彰聖馬軍都指揮使事晉為懷和二州刺史鄭州防禦使義成軍節度使所至兵民稱慕之史氏世為將而匡翰好讀書尤喜春秋三傳與學者講論終日無倦義成軍從事關徹尤嗜酒嘗醉罵匡翰曰近聞張彥澤臠張式未見史匡翰斬關徹天下談者未有偶爾匡翰不怒引滿自罰而慰勉之人皆服其量卒年四十王建及王建及許州人也少事李罕之從罕之奔晉為匡衛指揮使梁晉戰柏鄉相距鄗邑野河上鎮定兵扼河橋梁兵急擊之莊宗登高臺望見鎮定兵將敗顧建及曰橋為梁奪則吾軍危矣奈何建及選二百人馳擊梁兵梁兵敗解去從戰莘縣故元城皆先登陷陳以功纍拜遼州刺史將銀槍效節軍晉攻楊劉建及躬自負葭葦堙塹先登拔之從戰胡柳晉兵已敗與梁爭土山梁兵先至登山而陳莊宗至山下望梁陳堅而整呼其軍曰今日之戰得山者勝因馳騎犯之建及以銀槍軍繼進梁兵下走陳山西晉兵遂得土山諸將皆言潰兵未集旦暮不可戰閻寶曰彼陳山上吾在其下尚能擊之況以高而擊下不可失也建及以為然因白莊宗曰請登高望臣破敵即呼衆曰今日所失輜重皆在山西盍往取之即馳犯梁陳梁兵大敗晉遂軍德勝為南北城于河上梁將賀瓌攻其南城以竹笮維戰艦于河晉兵不得渡南城危甚莊宗積金帛於軍門募能破梁戰艦者至於吐火禁呪莫不皆有建及重鎧執矟呼曰梁晉一水間爾何必巧為吾今破之矣即以大甕積薪自上流縱火焚梁戰艦建及以二舟載甲士隨之斧其竹笮梁兵皆走晉軍乃得渡救南城瓌圍解去自莊宗得魏博建及將銀槍效節軍建及為將喜以家資散士卒莊宗遣宦官韋令圖監其軍令圖言建及得士心懼有異志不可令典牙兵即以為代州刺史建及怏怏而卒年五十七元行欽元行欽幽州人也為劉守光裨將守光篡其父仁恭使行欽以兵攻仁恭於大安山而因之又使行欽害諸兄弟其後晉攻幽州守光使行欽募兵雲朔間是時明宗掠地山北與行欽相拒廣邊軍凡八戰明宗七射中行欽行欽拔矢而戰亦射明宗中股行欽屢敗乃降明宗撫其背而飲以酒曰壯士也因養以為子常從明宗戰數立功莊宗已下魏益選驍將自衛聞行欽驍勇取之為散員都部署賜姓名曰李紹榮莊宗好戰而輕敵與梁軍戰潘張軍敗而潰莊宗得三四騎馳去梁兵數百追及攢矟圍之行欽望其旗而識之馳一騎奮劍斷其二矛斬首一級梁兵解去莊宗還營持行欽泣曰富貴與卿共之由是寵絶諸將拜欣州刺史遷武寧軍節度使莊宗宴羣臣於內殿酒酣樂作道平生戰陳事以為笑樂而怪行欽不在因左右顧視曰紹榮安在所司奏曰奉敕宴使相紹榮散官不得與也莊宗罷不樂明日即拜行欽同中書門下平章事自此不召羣臣入內殿但宴武臣而已趙在禮反於魏莊宗方選大將擊之劉皇后曰此小事可趣紹榮指揮乃以為鄴都行營招撫使將二千人討之行欽攻鄴南門以詔書招在禮在禮送羊酒犒軍登城謂行欽曰將士經年離去父母不取敕旨奔歸上貽聖憂追悔何及若公善為之辭尚能改過自新行欽曰天子以汝等有社稷之功小過必當赦宥在禮再拜以詔書示諸軍皇甫暉從旁奪詔書壞之軍士大譟行欽具以聞莊宗大怒敕行欽破城之日無遺種乃益召諸鎮兵皆屬行欽行欽屯澶州分諸鎮兵為五道毀民車輪門扉屋椽為筏渡長慶河攻冠氏門不克是時邢洺諸州相繼皆叛而行欽攻鄴無功莊宗欲自將以往羣臣皆諫止乃遣明宗討之明宗至魏軍城西行欽軍城南而明宗軍變入于魏與在禮合行欽聞之退屯衛州以明宗反聞莊宗遣金槍指揮使李從璟馳詔明宗計事從璟明宗子也行至衛州而明宗已反行欽乃縶從璟將殺之從璟請還京師乃許之明宗自魏縣引兵南行欽率兵趨還京師從莊宗幸汴州行至滎澤聞明宗已渡黎陽莊宗復遣從璟通問于明宗行欽以為不可因擊殺從璟明宗入汴州莊宗至萬勝鎮不得進與行欽登道旁冢置酒相顧泣下有野人獻雉問其冢名野人曰愁臺也莊宗益不悅因罷酒去西至石橋置酒野次莊宗謂行欽曰卿等從我久富貴急難無不同也今茲危蹙而默默無言坐視成敗我至滎澤欲單騎渡河自求總管卿等各陳利害今日俾我至此卿等何如行欽泣而對曰臣本小人蒙陛下撫養位至將相危難之時不能報國雖死無以塞責因與諸將百餘人皆解髻斷髮置之于地誓以死報君臣相持慟哭莊宗還洛陽數日復幸汜水郭從謙反莊宗崩行欽出奔行至平陸為野人所執送虢州刺史石潭折其兩足載以檻車送京師明宗見之罵曰我兒何負於爾行欽瞋目直視曰先皇帝何負於爾乃斬于洛陽市市人皆為之流涕嗚呼死之所以可貴者以其義不苟生爾故曰主在與在主亡與亡者社稷之臣也方明宗之兵變于魏諸將未知去就而行欽獨以反聞又殺其子從璟至於斷髮自誓其誠節有足嘉矣及莊宗之崩不能自決而反逃死以求生終於被執而見殺其言雖不屈而死非其志也烏足貴哉安金全安金全代北人也為人驍果工騎射號能擒生踏伏事晉為騎將數從莊宗用兵有功官至刺史以疾居于太原莊宗已下魏博與梁相距河上梁將王檀襲太原晉兵皆從莊宗于河上太原無備監軍張承業大恐率諸司工匠登城扞禦而外攻甚急金全彊起謂承業曰太原晉之根本也一旦不守則大事去矣老夫誠憊矣然尚能為公破賊承業喜授以甲兵金全被甲跨馬召率子弟及故將吏得百餘人夜出北門擊檀於羊馬城中檀軍驚潰而晉救兵稍至然莊宗不以金全為能終其世不録其功金全與明宗有舊明宗即位拜金全振武軍節度使同中書門下平章事在鎮二年召還京師以疾卒袁建豐袁建豐不知其世家也晉王討黃巢至華陰闌得之時方九歲愛其俊爽收養之長習騎射為鐵林都虞候從擊王行瑜李匡威以功遷突陳指揮使從莊宗破夾城戰柏鄉遷左廂馬軍指揮使明宗為衙內指揮使建豐為副使從莊宗入魏取衛磁洺三州拜洺州刺史擊梁將王千斬首千餘級獲其將校七十餘人遷相州刺史從戰胡柳指揮使孟謙據相州叛建豐還討平之徙隰州刺史病風廢明宗即位以舊恩召還京師親幸其第撫慰甚厚加檢校太尉遙領鎮南軍節度使俾食其俸以卒贈太尉西方鄴西方鄴定州滿城人也父再遇為汴州軍校鄴居軍中以勇力聞年二十南渡河遊梁不見用復歸莊宗于河上莊宗以為孝義指揮使數從征伐有功同光中為曹州刺史以州兵屯汴州明宗自魏反兵南渡河而莊宗東幸汴州汴州節度使孔循懷二志使北門迎明宗西門迎莊宗所以供帳委積如一曰先至者入之鄴因責循曰主上破梁而得公有不殺之恩奈何欲納總管而負國循不答鄴度循不可爭而石敬瑭妻明宗女也時方在汴鄴欲殺之以堅人心循知其謀取藏其家鄴無如之何而明宗已及汴乃將五百騎西迎莊宗於汜水嗚咽泣下莊宗亦為之噓唏乃使以兵為先鋒莊宗至汴西不得入還洛陽遇弒明宗入洛鄴請死於馬前明宗嘉歎久之明年荊南高季興叛明宗遣襄州節度使劉訓等招討而以東川董璋為西南面招討使乃拜鄴夔州刺史副璋以兵出三峽已而訓等無功見黜諸將皆罷璋亦嘗出兵惟鄴獨取三州乃以夔州為寧江軍拜鄴節度使已而又取歸州數敗季興之兵鄴武人所為多不中法度判官談善達數以諫鄴怒遣人告善達受人金下獄善達素剛辭益不遜遂死于獄中鄴病見善達為祟卒于鎮
