body:
  text: 新五代史卷四十三雜傳第三十一氏叔琮氏叔琮開封尉氏人也為梁騎兵伍長梁兵擊黃巢陳許間叔琮戰數有功太祖壯之使將後院馬軍從攻徐兗表宿州刺史使攻襄陽戰數敗降為陽翟鎮遏使久之遷曹州刺史太祖下河中取晉絳晉王遣使致書太祖求成太祖以晉書詞嫚乃遣叔琮與賀德倫等攻之叔琮自太行入取澤潞出石會營于洞渦久之糧盡乃旋表晉州刺史晉人復取絳州攻臨汾叔琮選壯士二人深目而胡鬚者牧馬襄陵道旁晉人以為晉兵雜行道中伺其怠擒晉二人而歸晉人大驚以為有伏兵乃退屯于蒲縣太祖遣友寧兵萬人會叔琮禦晉友寧欲休兵以待叔琮曰敵聞救至必走走則何功邪乃夜擊之晉人大敗逐之至于太原太祖大喜曰破太原非氏老不可已而兵大疫叔琮班師令曰病不能行者焚之病者懼皆言無恙乃以精卒為殿而還石會留數騎以大將旗幟立于高岡晉兵疑其有伏乃不敢追久之徙保大軍節度使昭宗遷洛拜右龍武統軍太祖遣叔琮與李彥威等弒昭宗已而殺之李彥威李彥威壽州人也少事梁太祖為人穎悟善揣人意太祖憐之養以為子冒姓朱氏名友恭歷汝潁二州刺史昭宗下洛拜右龍武統軍初劉季述廢昭宗立皇太子裕為天子昭宗反正以為太子幼為賊所立赦之復其始封為德王昭宗自岐還太祖見裕眉目疏秀惡之謂宰相崔胤曰德王嘗為季述所立安得猶在乎公白天子殺之胤奏之昭宗不許他日以問太祖太祖曰臣安敢及之胤欲賣臣爾昭宗遷洛謂蔣玄暉曰德王朕愛子也全忠何為欲殺之因泣下囓指流血玄暉具以白太祖太祖益惡之是時昭宗改元天祐遷于東都為梁所迫而晉人蜀人以為天祐之號非唐所建不復稱之但稱天復王建亦傳檄天下舉兵誅梁太祖大懼恐昭宗奔他鎮以兵七萬如河中陰遣敬翔至洛告彥威與氏叔琮等使行弒逆八月壬辰彥威叔琮以龍武兵宿禁中夜二鼓以兵百人叩宮門奏事夫人裴正一開門問曰奏事安得以兵入龍武牙官史太殺之趨椒蘭殿問昭宗所在昭宗方醉起走太持劍逐之昭宗單衣旋柱而走太劍及之昭宗崩訃至河中太祖陽為驚駭投地號哭罵曰奴輩負我俾我被惡名於後世邪太祖至洛流彥威叔琮嶺南使張廷範殺之彥威臨刑大呼曰賣我以滅口其如神理何顧廷範曰勉之公行自及遂見殺已而還其姓名莊宗時得故唐內人景姹言當彥威等殺昭宗時諸王宗屬數百人皆遇害而同為一坑瘞于龍興寺北請合為一冢而改葬之詔以故濮王為首葬以一品禮云李振李振字興緒其祖抱真唐潞州節度使振為唐金吾衛將軍拜台州刺史盜起浙東不果行乃西歸過梁以策干太祖太祖留之太祖兼領鄆州表振節度副使振奏事長安舍梁邸宦官劉季述謀廢昭宗遣其姪希正因梁邸吏程巖見振曰今主上嚴急誅殺不辜中尉懼及禍將行廢立請與諸邸吏協力以定中外如何振駭然曰百歲奴事三歲主而敢爾邪今梁王百萬之師方仗大義尊天子君等無為此不祥也振還季述卒與巖等廢昭宗幽之東宮號太上皇立皇太子裕為天子是時太祖用兵在邢洺間季述詐為太上皇誥告太祖太祖猶豫未知所為振曰夫豎刁伊戾之亂所以為霸者資也今閹宦作亂天子危辱此王仗義立功之時太祖大悟乃囚季述使者遣振詣京師見崔胤謀出昭宗昭宗返正太祖大喜執振手曰卿謀得之矣王師範以青州降梁遣振往代師範師範疑懼不知所為振曰獨不聞漢張繡乎繡與曹公為敵然不歸袁紹而歸曹公者知其志大不以私讎殺人也今梁王方欲成大事豈以故怨害忠臣乎師範洗然自釋乃西歸梁昭宗遷洛振往來京師朝臣皆仄目振視之若無人有所小怒必加譴謫故振一至京師朝廷必有貶降時人目振為鴟梟太祖之弒昭宗也遣振至京師與朱友恭氏叔琮謀之昭宗崩太祖問振所以待友恭等宜如何振曰昔晉司馬氏殺魏君而誅成濟不然何以塞天下口太祖乃歸罪友恭等而殺之振嘗舉進士咸通乾符中連不中尤憤唐公卿及裴樞等七人賜死白馬驛振謂太祖曰此輩嘗自言清流可投之河使為濁流也太祖笑而從之太祖即位纍遷戶部尚書友圭時以振代敬翔為崇政院使莊宗滅梁入汴振謁見郭崇韜崇韜曰人言李振一代奇才吾今見之乃常人爾已而伏誅裴迪裴迪字升之河東聞喜人也為人明敏善治財賦精於簿書唐司空裴璩判度支辟為出使巡官都統王鐸鎮滑州奏迪汴宋鄆等州供軍院使鐸為租庸使辟租庸招納使梁太祖鎮宣武辟節度判官太祖用兵四方常留迪以調兵賦太祖乃榜門以兵事自處而以貨財獄訟一切任迪太祖西攻岐王師範謀襲汴遣健卒苗公立持書至汴陰伺虛實迪召公立問東事公立色動乃屏人密詰之具得其事迪不暇啓遣朱友寧以兵巡兗鄆以故師範雖竊發而事卒不成太祖自岐還將吏皆賜迎鑾叶贊功臣將吏入見太祖目迪曰叶贊之功惟裴公有之他人不足當也迪入唐纍遷太常卿太祖即位召拜右僕射居一歲告老以司空致仕卒于家韋震韋震字東卿雍州萬年人也初名肇為人強敏有口辨事梁太祖為都統判官申叢執秦宗權欲送于太祖又欲自獻於京師又欲挾宗權奪其兵太祖遣震入蔡州視之叢遣騎兵三百迎震欲殺之震以計得免還白太祖曰叢不足慮為其謀者牙將裴涉妄庸人也叢後果為郭璠所殺璠以宗權歸于太祖太祖欲大其事請獻俘于唐唐以時溥破黃巢獻馘而已宗權不足俘左拾遺徐彥樞亦疏請所在斬決太祖遣震奏事京師往復論列卒俘宗權太祖德之表為節度副使昭宗幸石門太祖遣震由虢略間道奉表行在昭宗賜其名震太祖已破兗鄆遂攻吳大敗于清口太祖懼諸鎮乘間圖己乃諷杜洪鍾傳王師範錢鏐等薦己為元帥且求兼領鄆州昭宗初不許震強辨敢大言語數不遜昭宗卒許梁以鄆州太祖遂兼四鎮表震鄆州留後昭宗遷洛震入為河南尹六軍諸衛副使以病瘖守太子太保致仕太祖受禪改太子太傅末帝即位加太師卒孔循孔循不知其家世何人也少孤流落於汴州富人李讓闌得之養以為子梁太祖鎮宣武以李讓為養子循乃冒姓朱氏稍長給事太祖帳中太祖諸兒乳母有愛之者養循為子乳母之夫姓趙循又冒姓為趙氏名殷衡昭宗東遷洛陽太祖盡去天子左右悉以梁人代之以王殷為宣徽使循為副使循與蔣玄暉張廷範等共與弒昭宗之謀其後循與玄暉有隙哀帝即位將有事于南郊循因與王殷讒于太祖曰玄暉私侍何太后與廷範等奉天子郊天冀延唐祚太祖大怒是時梁兵攻壽春大敗而歸哀帝遣裴迪勞軍太祖見迪怒甚迪還哀帝不敢郊封太祖魏王備九錫太祖拒而不受玄暉與宰相柳璨相次馳至梁自解璨曰自古王者之興必有封國而唐所以不即遜位者當先建國備九錫然後禪也太祖曰我不由九錫作天子可乎璨懼馳去太祖遣循與王殷弒何皇后因殺璨及玄暉廷範等以循為樞密副使唐亡事梁為汝州防禦使左衛大將軍租庸使始改姓孔名循莊宗時權知汴州明宗自魏兵反而南莊宗東出汜水循持兩端遣迎明宗於北門迎莊宗於西門供帳牲餼其禮如一而戒其人曰先至者入之明宗先至遂納之明宗即位以為樞密使明宗幸汴州循留守東都民有犯麴者循族殺其家明宗知其冤因詔天下除麴禁許民得造麴循為人柔佞而險猾安重誨尤親信之凡循所言無不聽用明宗嘗欲以皇子娶重誨女重誨以問循循曰公為機密之臣不宜與皇子婚重誨信之乃止而循陰使人白明宗求女妻皇子明宗即以宋王從厚娶循女重誨始惡其為人出循為忠武軍節度使徙鎮橫海卒于鎮年四十八贈太尉孫德昭孫德昭鹽州五原人也其父惟最有材略黃巢陷長安惟最率其鄉里子弟得義兵千人南攻巢于咸陽興平州將壯其所為益以州兵二千與破賊功拜右金吾衛大將軍朱玫亂京師僖宗幸興元惟最率兵擊賊纍遷鄜州節度使留京師宿衛鄜州將吏詣闕請惟最之鎮京師民數萬與神策軍復遮留不得行改荊南節度使在京制置分判神策軍號扈駕都是時京師亂民皆賴以為保德昭以父任為神策軍指揮使光化三年劉季述廢昭宗幽之東宮宰相崔胤謀反正陰使人求義士可共成事者德昭乃與孫承誨董從實應胤胤裂衣襟為書以盟天復元年正月朔未旦季述將朝德昭伏甲士道旁邀其輿斬之承誨等分索餘黨皆盡昭宗聞外喧譁大恐德昭馳至扣門曰季述誅矣皇帝當反正何皇后呼曰汝可進逆首德昭擲其首入已而承誨等悉取餘黨首以獻昭宗信之德昭破鎖出昭宗御丹鳳樓反正以功拜靜海軍節度使賜姓李號扶傾濟難忠烈功臣與承誨等皆拜節度使同中書門下平章事圖形凌煙閣俱留京師號三使相恩寵無比是時崔胤方欲誅唐宦官外交梁以為恃而宦官亦倚李茂貞為扞蔽梁岐交爭冬十月宦者韓全誨劫昭宗幸鳳翔承誨從實皆從而德昭獨與梁乃率兵衛胤及百官保東街趣梁兵以西梁太祖頗德其附己以龍鳳劍鬬雞紗遺之太祖至華州德昭以軍禮迎謁道旁太祖至京師表同州留後將行京師民復請留遂為兩街制置使梁兵圍鳳翔德昭以其兵八千屬太祖太祖益德之使先之洛陽賜甲第一區昭宗東遷拜左威衛上將軍以疾免太祖即位以烏銀帶袍笏名馬賜之疾少間以為左衛大將軍末帝立拜左金吾大將軍以卒承誨從實至鳳翔與宦者俱見殺王敬蕘王敬蕘潁州汝陰人也事州為牙將唐末王仙芝等攻劫汝潁間刺史不能拒敬蕘遂代之即拜刺史敬蕘為人狀貌魁傑而沈勇有力善用鐵槍重三十斤潁州與淮西為鄰境數為秦宗權所攻力戰拒之宗權悉陷河南諸州獨敬蕘不可下由是潁旁諸州民皆保敬蕘避賊是時所在殘破獨潁州戶二萬梁太祖攻淮南道過潁州敬蕘供饋梁兵甚厚太祖大喜表敬蕘沿淮指揮使其後梁兵攻吳龐師古死清口敗兵亡歸過潁大雪士卒飢凍敬蕘乃沿淮積薪為作糜粥餔之亡卒多賴以全活太祖表敬蕘武寧軍留後遂拜節度使天祐三年為左衛上將軍太祖即位敬蕘以疾致仕後卒于家蔣殷蔣殷幼為王重盈養子冒姓王氏梁太祖取河中以王氏舊恩録其子孫表殷牙將太祖尤愛之唐遷洛陽殷為宣徽北院使太祖已下襄陽轉攻淮南還屯正陽哀帝遣殷勞軍是時哀帝方卜郊殷與樞密使蔣玄暉等有隙因譖之太祖言玄暉等教天子卜郊祈天且待諸侯助祭者以謀興復太祖大怒哀帝為改卜郊是時太祖將有篡弒之謀何太后嘗泣涕叩頭為玄暉等言梁王禪位後願全唐家子母殷乃誣玄暉嘗私侍太后太祖斬玄暉及張廷範柳璨等遣殷弒太后於積善宮哀帝下詔慚愧自言以母后故無以奉天乃卒不郊庶人友圭與殷善友圭弒太祖自立拜殷武寧軍節度使末帝即位以福王友璋代殷殷不受代王瓚亦王氏子懼為殷所纍乃言殷非王氏子本姓蔣末帝詔削官爵還其姓遣牛存節討之殷舉族自燔死
