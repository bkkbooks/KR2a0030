body:
  text: 新五代史卷四十六雜傳第三十四趙在禮趙在禮字幹臣涿州人也少事劉仁恭為軍校仁恭遣佐其子守文襲取滄州其後守文為其弟守光所殺在禮乃奔于晉莊宗時為効節指揮使將魏兵戍瓦橋關還至貝州軍士皇甫暉作亂推其將楊仁晟為首仁晟不從殺之又推一小校小校不從又殺之乃攜二首詣在禮在禮聞亂衣不及帶方踰垣而走暉曳其足而下之環以白刃示之二首曰不從我者如此首在禮從之遂反在禮自貝州還攻魏縱軍大掠是時興唐尹王正言年老病昏聞在禮至呼吏草奏吏已奔散正言猶不知方據案大怒左右告曰賊已市中殺人吏民皆走欲誰呼邪正言大驚曰吾初不知此即索馬將去吏曰公妻子為虜矣安得馬乎正言惶恐步出府門見在禮望而下拜在禮呼正言曰公何自屈之甚邪此軍士之情非予志也在禮即自稱兵馬留後莊宗遣元行欽討之行欽攻魏不克乃遣明宗代行欽明宗至鄴軍變因入城與在禮合明宗兵反嚮京師在禮留于魏明宗即位拜在禮義成軍節度使在禮不受命遂拜鄴都留守興唐尹久之皇甫暉等皆去在禮獨在魏患魏軍之驕懼及禍乃求徙鎮橫海歷鎮泰寧匡國天平忠武武寧歸德晉昌所至邸店羅列積貲巨萬晉出帝時以在禮為北面行營馬步都虞候以擊契丹未嘗有戰功在禮在宋州人尤苦之已而罷去宋人喜而相謂曰眼中拔釘豈不樂哉既而復受詔居職乃籍管內口率錢一千自號拔釘錢晉亡契丹入汴在禮自宋馳至洛陽遇契丹拽剌等拜於馬首拽剌等兵共侵辱之誅責貨財在禮不勝其憤行至鄭州聞晉大臣多為契丹所鎖中夜惶惑解衣帶就馬櫪自經而卒年六十二漢高祖立贈中書令霍彥威霍彥威字子重洺州曲周人也少遭兵亂梁將霍存掠得之愛其儁爽養以為子嘗從存戰中矢眇其一目後事梁太祖太祖亦愛之稍遷左龍驤軍使右監門衞上將軍預誅友珪以功拜洺州刺史遷邠寧節度使李茂貞遣梁叛將劉知俊攻邠州彥威固守踰年每獲知俊兵必縱還之知俊德之後不復攻徙鎮義成又徙天平兼北面行營招討使與晉軍相持河上彥威屢敗降為陝州留後莊宗滅梁彥威自陝來朝莊宗置酒故梁崇元殿彥威與梁將段凝袁象先等皆在莊宗酒酣指彥威等舉酒屬明宗曰此皆前日之勍敵今侍吾飲乃卿功也彥威等惶恐伏地請死莊宗勞之曰吾與總管戲爾卿無畏也賜姓名曰李紹真明年徙鎮武寧從明宗擊契丹明宗愛其為人甚親厚之其後趙在禮反彥威別討趙太於邢州破之還以兵屬明宗討在禮明宗軍變從馬直軍吏張破敗率衆殺將校縱火焚營譟呼明宗叱之曰自吾為帥十有餘年何負爾輩今賊城破在旦夕乃爾輩立功名取富貴之時況爾天子親軍返効賊邪軍士對曰城中之人何罪戍卒思歸而不得耳天子不垂原宥志在勦除且聞破魏之後欲盡坑魏博諸軍某等初無叛心直畏死耳今宜與城中合勢擊退諸鎮之兵請天子帝河南令公鎮河北明宗涕泣諭之亂兵環列而呼曰令公不欲帝河北則佗人有之我輩狼虎豈識尊卑彥威與安重誨勸明宗許之乃擁兵入城與在禮合彥威獨不入明宗入城與在禮置酒大會而部兵在外者聞明宗反皆潰去獨彥威所將五千人營城西北隅不動居二日明宗復出得彥威兵乃之魏縣謀欲還鎮州彥威重誨勸明宗以兵南向莊宗崩彥威從明宗入洛陽首率羣臣勸進內外機事皆決彥威彥威素與段凝溫韜有隙因擅捕凝韜下獄將殺之安重誨曰凝韜之惡天下所知然主上方平內難以恩信示人豈公報仇之時彥威乃止明宗即位乃赦凝韜放歸田里已而卒賜死彥威徙鎮平盧朱守殷反伏誅彥威遣使者馳騎獻兩箭為賀明宗賜兩箭以報之夷狄之法起兵令衆以傳箭為號令然非下得施於上也明宗本出夷狄而彥威武人君臣皆不知禮動多此類然彥威客有淳于晏者登州人也少舉明經及第遭世亂依彥威自彥威為偏裨時已從之彥威嘗戰敗脫身走麾下兵無從者獨晏徒步以一劍從之榛棘間以免彥威高其義所歷方鎮常辟以自從至其家事無大小皆決於晏彥威以故得少過失當時諸鎮辟召寮屬皆以晏為法天成三年冬彥威卒于鎮是時明宗方獵于近郊青州馳騎奏彥威卒明宗涕泣還宮輟朝仍終其月不舉樂贈彥威太師謚曰忠武房知溫房知溫字伯玉兗州瑕丘人也少以勇力為赤甲都官健後隸魏州馬鬬軍稍遷親隨軍指揮使莊宗取魏博得知溫賜姓李氏名曰紹英以為澶州刺史歷曹貝二州刺史戍瓦橋關明宗自魏反兵南向知溫首馳赴之天成元年拜泰寧軍節度使明年為北面招討使屯于盧臺明宗遣烏震往代知溫還鎮其戍卒効節軍將龍晊等攻震殺之効節魏州軍也魏州自羅紹威誅衙軍楊師厚為節度使復置銀槍効節軍當梁末帝時師厚幾為梁患師厚卒以賀德倫代之末帝患魏軍彊難制與趙巖等謀分相魏為兩鎮魏軍由此作亂劫德倫叛梁而降晉梁遂失河北莊宗自得魏兵與梁戰河上數有功許其軍以滅梁而厚賞及梁亡魏軍雖數賜與而驕縱無厭常懷怨望皇甫暉之亂劫趙在禮入魏皆此軍也明宗入立在禮鎮天雄軍以魏軍素驕常懼禍不皇居陰遣人訴于明宗求解去明宗乃以皇子從榮代在禮而遣魏効節九指揮北戍盧臺軍發之日不給兵甲惟以長竿繫旗幟以表隊伍軍士頗自疑惑明年明宗遣烏震代知溫戍而知溫意尤不樂盧臺戍軍夾水東西為兩寨震初至與知溫會東寨方博効節軍亂噪于門外知溫即乘馬而出亂軍擊殺震執轡留知溫知溫紿曰騎兵皆在西寨今獨步軍恐無能為也知溫即躍馬登舟渡河入西寨以騎軍盡殺亂者明宗下詔悉誅其家屬于魏州凡九指揮三千餘家數萬口驅至漳水上殺之漳水為之變色魏之驕兵於是而盡明宗知變自知溫起釋而不問徙鎮武寧加兼侍中歷鎮天平平盧初明宗為北面招討使而知溫為副使廢帝時以裨將事知溫甚謹後因杯酒失意及廢帝起兵鳳翔愍帝出奔知溫乘間有窺覦之意謂其司馬李沖曰吾有錢數屋養兵數千因時建義功必有成沖曰今天子孱弱上下離心潞王兵威甚盛事未可知沖請懷表而西以覘之及沖至京師廢帝已入立沖即奉表稱賀還勸知溫入朝廢帝慰勞之甚厚知溫還鎮封東平王太常上言策拜王公皇帝臨軒遣策其在外者正衙命使而鹵簿鼓吹輅車法物不出都城考之故事無明文今北平王德鈞東平王知溫受封遣策請下兵部太常太僕給鹵簿鼓吹輅車法物赴本道禮畢還有司知溫在鎮常厚斂其民積貲鉅萬治第青州南城出入以聲妓游嬉不恤政事天福元年卒于官贈太尉知溫卒後其子彥儒獻其父錢三萬緡絹布三萬匹金百兩銀千兩茶千五百斤絲十萬兩拜沂州刺史其將吏分其餘貲者皆為富家云王晏球王晏球字瑩之洛陽人也少遇亂為盜所掠汴州富人杜氏得之養以為子冒姓杜氏梁太祖鎮宣武選富家子之材武者置之帳下號廳子都晏球為人倜儻有大節為廳子都指揮使太祖即位為右千牛衞將軍友珪立龍驤戍卒反自懷州趣京師遣晏球擊敗之于河陽以功遷龍驤第一指揮使末帝即位遷龍驤四軍指揮使梁遣捉生軍將李霸將千人戍楊劉霸夜作亂自水門入縱火大譟以長竿縛布沃油仰燒建國門晏球聞亂不俟命率龍驤五百騎擊之賊勢稍却末帝登樓見之呼曰此非吾龍驤軍邪晏球奏曰亂者李霸一都爾陛下嚴守宮城而責臣破賊遲明盡殺之以功拜澶州刺史古本作單梁晉軍河上以晏球為行營馬步軍都指揮使莊宗入汴晏球以兵追之行至封丘聞末帝已崩即解甲降唐莊宗賜姓名曰李紹虔拜齊州防禦使戍瓦橋關明宗兵變自鄴而南遣人招晏球晏球從至洛陽拜歸德軍節度使定州王都反以晏球為招討使與宣徽南院使張延朗等討之都遣人北招契丹契丹遣禿餒將萬騎救都晏球聞禿餒等兵且來留張延朗屯新樂自逆於望都而契丹從他道入定州與都出不意擊延朗軍延朗大敗收餘兵會晏球趨曲陽都乘勝追之晏球先至水次方坐胡指麾而都衆掩至晏球與左右十餘人連矢射之都衆稍却而後軍亦至晏球立高岡號令諸將皆橐弓矢用短兵回顧者斬符彥卿以左軍攻其左高行珪以右軍攻其右中軍騎士抱馬項馳入都軍都遂大敗自曲陽至定州橫尸棄甲六十餘里都與禿餒入城不敢復出契丹又遣惕隱以七千騎益都晏球遇之唐河追擊至滿城斬首二千級獲馬千匹契丹自中國多故彊於北方北方諸夷無大小皆畏伏而中國之兵遭契丹者未嘗少得志自晏球擊敗禿餒又走惕隱其餘衆奔潰投村落村落之人以鋤耰白梃所在擊殺之無復遺類惕隱與數十騎走至幽州西為趙德鈞擒送京師明宗下詔責誚契丹契丹後數遣使至中國求歸惕隱等辭甚卑遜輒斬其使以絕之於是時中國之威幾於大震而契丹少衰伏矣自晏球始也晏球攻定州久不克明宗數遣人促其破賊晏球以謂未可急攻其偏將朱弘昭張虔釗等宣言曰晏球怯耳乃驅兵以進兵果敗殺傷三千餘人由是諸將不敢復言攻晏球乃休養士卒食其三州之賦悉以俸祿所入具牛酒日與諸將高會久之都城中食盡先出其民萬餘人數與禿餒謀決圍以走不果都將馬讓能以城降都自焚死晏球為將有機略善撫士卒其擊禿餒既因敗以為功而諸將皆欲乘勝取都晏球返獨不動卒以持久弊之自天成三年四月都反明年二月始克之軍中未嘗戮一人以破都功拜天平軍節度使又徙平盧累官至兼中書令是歲卒年六十二贈太尉安重霸安重霸雲州人也初與明宗俱事晉王重霸得罪奔于梁又奔于蜀重霸為人狡譎多智善事人蜀王建以為親將王衍立少年宦者王承休用事重霸深結承休以自託梁末蜀取李茂貞秦成階三州重霸勸承休求鎮秦州衍以承休為節度使重霸為其副使重霸與承休多取秦州花木獻衍請衍東遊唐魏王兵伐蜀承休大恐以問重霸重霸曰劍門天下之險雖有精兵不可過也然公受國恩聞難不可不赴願與公俱西承休素親信之以為然承休整軍將發秦人送之帳飲城外酒罷承休上道重霸立承休馬前辭曰秦隴不可失願留為公守承休業已上道無如之何唐軍已破蜀重霸亦以秦成階三州降唐明宗以為閬州團練使罷為左衞大將軍久之以為匡國軍節度使廢帝時為京兆尹西京留守徙鎮大同以病罷還卒于潞州王建立王建立遼州榆社人也唐明宗為代州刺史以建立為虞候將莊宗嘗遣女奴之代州祭墓女奴侵擾代人建立捕而笞之莊宗怒欲殺之明宗為庇護之以免明宗自魏反犯京師曹皇后王淑妃皆在常山建立殺常山監軍幷其守兵明宗家屬因得無患由是明宗益愛之明宗即位以為成德軍節度副使已而拜節度使檢校太尉同中書門下平章事建立與安重誨素不協定州王都有二志數以書通建立約為兄弟重誨知之以為言明宗不欲傷建立亟召還京師建立入見亦多言重誨過失明宗大怒欲亟罷重誨羣臣左右諷解之乃止然卒以建立為右僕射同中書門下平章事判三司事居歲餘自言不識文字願解三司明宗不許久之建立稱疾明宗笑曰人固有詐疾而得疾者乃出為平盧節度使又徙上黨建立怏怏不得志遂求解職乃以太子少保致仕建立數請朝見不許乃自詣京師闌至後樓見明宗涕泣言己無罪為重誨所擯明宗曰汝為節度使不作好事豈獨重誨讒汝邪賜以茶藥而遣之廢帝立復起為天平軍節度使晉高祖時徙鎮平盧天福五年來朝高祖勞之曰三十年前老兄可毋拜賜以肩輿入朝給二宦者掖而升殿宴見甚渥又徙昭義賜以玉斧蜀馬累封韓王建立好殺人其晚節始惑浮圖法戒殺生所至人稍安之卒年七十贈尚書令子守恩以蔭補稍遷諸衞將軍建立已卒家于潞守恩自京師得告歸而契丹滅晉昭義節度使張從恩與守恩姻家乃以守恩權巡檢使以守潞州而從恩入見契丹從恩既去守恩因剽劫從恩家貲以潞州降漢漢高祖即位以守恩為昭義軍節度使徙鎮靜難西京留守加同中書門下平章事守恩性貪鄙人甚苦之時周太祖以樞密使將白文珂等軍西平三叛還過洛陽守恩以使相自處肩輿出迎太祖怒即日以頭子命文珂代守恩為留守而守恩方詣館謁坐於客次以俟見而吏馳報新留守視事於府矣守恩大驚不知所為遂罷去奉朝請于京師後隱帝殺史弘肇等召羣臣上殿慰諭之羣臣恐懼無敢言者獨守恩前對曰陛下始睡覺矣聞者皆縮頸顯德中為左金吾衞上將軍以卒嗚呼道德仁義所以為治而法制綱紀亦所以維持之也自古亂亡之國必先壞其法制而後亂從之亂與壞相乘至蕩然無復綱紀則必極於大亂而後返此勢之然也五代之際是已若文珂守恩皆位兼將相漢大臣也而周太祖以一樞密使頭子易置之如更戍卒是時太祖與漢未有間隙之端其無君叛上之志宜未萌于心而其所為如此者何哉蓋其習為常事故特發於喜怒頤指之間而文珂不敢違守恩不得拒太祖既處之不疑而漢廷君臣亦置而不問其上下安然而不怪者豈非朝廷法制綱紀壞亂相乘其來也遠既極而至於此歟是以善為天下慮者不敢忽於微而常杜其漸也可不戒哉康福康福蔚州人也世為軍校福以騎射事晉王為偏將莊宗嘗曰吾家以羊馬為生福狀貌類胡人而豐厚胡宜羊馬乃令福牧馬于相州為小馬坊使逾年馬大蕃滋明宗自魏反兵過相州福以小坊馬二千匹歸命明宗軍勢由是益盛明宗入立拜飛龍使領磁州刺史襄州兵馬都監從劉訓討荊南無功而還福為將無佗能善諸戎語明宗嘗召入便殿訪以外事福輒為蕃語以對樞密使安重誨惡之常戒福曰無妄奏事當斬汝福懼求外任靈武韓洙死其弟澄立而偏將李從賓作亂澄表請朝廷命帥而重誨以謂靈武深入夷境為帥者多遇害乃拜福涼州刺史朔方河西軍節度使福入見明宗涕泣言為重誨所擠明宗召重誨為福更佗鎮重誨曰福為刺史無功効而建節旄其敢有所擇邪明宗怒謂福曰重誨遣汝非吾意也吾當遣兵護汝可無憂乃令將軍牛知柔以兵衞福行至方渠而羌夷果出邀福福以兵擊走之至青岡峽遇雪福登山望見川谷中煙火有吐蕃數千帳不覺福至福分其兵為三道出其不意襲之吐蕃大駭棄車帳而走殺之殆盡獲其玉璞綾錦羊馬甚衆由是威聲大振福居靈武三歲歲常豐稔有馬千駟蕃夷畏服言事者疑福有異志重誨亦言福必負朝廷明宗遣人謂福曰我何少汝而欲負我福言受國恩深有死無二因乞還朝不許福章再上即隨而至明宗不之罪徙鎮彰義歷靜難雄武充西面都部署晉高祖時徙鎮河中代還卒于京師贈太師謚曰武安福世本夷狄夷狄貴沙陀故常自言沙陀種也福嘗有疾臥閤中寮佐入問疾見其錦衾相顧竊戲曰錦衾爛兮福聞之怒曰我沙陀種也安得謂我為奚聞者笑之郭延魯郭延魯沁州綿上人也父饒以驍勇事晉數立軍功為沁州刺史者九年為政有惠愛州人思之延魯以善槊為將累遷神武都知兵馬使朱守殷反從攻汴州以先登功為汴州馬步軍都指揮使累遷復州刺史延魯歎曰吾先君為沁州者九年民到于今思之吾今幸得為刺史其敢忘吾先君之志由是益以廉平自勵民甚賴之秩滿州人乞留不許皆遮道攀號天福中拜單州刺史卒于官當是時刺史皆以軍功拜言事者多以為言以謂方天下多事民力困敝之時不宜以刺史任武夫恃功縱下為害不細而延魯父子特以善政著聞焉嗚呼五代之民其何以堪之哉上輸兵賦之急下困剝斂之苛自莊宗以來方鎮進獻之事稍作至於晉而不可勝紀矣其添都助國之物動以千數計至於來朝奉使買宴贖罪莫不出於進獻而功臣大將不幸而死則其子孫率以家貲求刺史其物多者得大州善地蓋自天子皆以賄賂為事矣則為其民者其何以堪之哉於此之時循廉之吏如延魯之徒者誠難得而可貴也哉
