body:
  text: 新五代史卷三梁本紀第三末帝太祖第三子友貞也為人美容貌沈厚寡言雅好儒士太祖即位封均王為左天興軍使東京馬步軍都指揮使末非諡號從其本語乾化二年六月太祖遇弒友圭自立殺博王友文以弒帝之罪歸之以王為東京留守開封尹敬翔為中書侍郎同中書門下平章事戶部尚書李振為崇政院使明年友圭改元曰鳳曆二月駙馬都尉趙巖至東都王私與之謀遣馬慎交之魏州見楊師厚計事師厚遣小校王舜賢至洛陽告左龍虎統軍袁象先使討賊是時懷州龍驤屯兵叛方捕索之王乃僞為友圭詔書發左右龍驤在東都者皆還洛陽因激怒之曰天子以懷州屯兵叛追汝等欲盡坑之諸將皆泣莫知所為王曰先皇帝經營王業三十餘年今日尚為友圭所殺汝等安所逃死乎因出太祖畫像示諸將而泣曰汝能趨洛陽擒逆賊則轉禍為福矣軍士皆呼萬歲請王為主王乃遣人趣象先等庚寅象先等以禁兵討賊友圭死杜曉見殺象先遣趙巖持傳國寶至東都請王入洛陽王報曰夷門太祖所以興王業也北拒並汾東至淮海國家藩鎮多在東方命將出師利於便近是月皇帝即位於東都復稱乾化三年復博王友文官爵即位大事失其日而書是月見亂之甚於東都終上文也三月丁未更名鍠夏五月楊師厚取滄州秋九月甲辰御史大夫姚洎為中書侍郎同中書門下平章事冬十二月晉人取幽州四年夏四月丁丑貶于兢為萊州司馬武寧軍節度使蔣殷反天平軍節度使牛存節討之貞明元年春正月存節克徐州蔣殷自燔死故不書伏誅三月丁卯趙光逢罷平盧軍節度使賀德倫為天雄軍節度使分其相澶衛州為昭德軍宣徽使張筠為節度使己丑天雄軍亂賀德倫叛附于晉邠州李保衡叛于岐來附命官不書非常而有故則書此書為天雄軍亂張本軍亂書首惡不書而書德倫叛責貴者深也德倫不可加以首惡而可責其不死以叛張彥實首惡而略不書彥微者德倫可以誅而不誅故以德倫獨任其責夏六月庚寅朔晉王李存勗入于魏州遂取德州冬十月辛亥康王友孜反伏誅反者不日誅反者有日故書十一月乙丑改元耀州溫昭圖叛于岐來附是歲更名瑱舊史失其月日二年春二月丙申楊涉罷三月鎮南軍節度使劉及晉人戰于故元城敗績奔于滑州晉人取衛州惠州捉生都將李霸反伏誅夏六月捉生都將張溫叛降于晉秋七月晉人取相州張筠奔于京師安國軍節度使閻寶叛附于晉八月丁酉太子太保致仕趙光逢為司空兼門下侍郎同中書門下平章事九月晉人取滄州橫海軍節度使戴思遠奔于京師晉人克貝州守將張源德死之書死得其死也冬十月丁酉中書侍郎鄭王玉同中書門下平章事三年夏四月辛卯右千牛衛大將軍劉璩使于契丹冬十二月宣義軍節度使賀瓌為北面行營招討使己巳如西都卜郊晉人取楊劉四年正月不克郊己卯至自西都夏四月己酉尚書吏部侍郎蕭頃為中書侍郎同中書門下平章事己巳趙光逢罷冬十二月庚子朔賀瓌殺其將謝彥章孟審澄侯溫裕癸亥瓌及晉人戰于胡柳敗績是歲泰寧軍節度使張守進叛附于晉亳州團練使劉為兗州安撫制置使以討之舊史不書亡其月日故書于歲末為明年克兗州張本五年春正月晉軍于德勝用兵無勝敗不書此梁晉得失所繫故書也秋八月乙未朔開封尹王瓚為北面行營招討使冬十月劉克兗州張守進伏誅十二月晉人取濮陽天平軍節度使霍彥威為北面行營招討使六年夏四月己亥降死罪以下囚乙巳尚書左丞李琪為中書侍郎同中書門下平章事河中節度使朱友謙襲同州殺其節度使程全暉叛附于晉泰寧軍節度使劉討之秋七月陳州妖賊毋乙自稱天子九月庚寅供奉官郎公遠為契丹歡好使冬十月毋乙伏誅龍德元年春趙將張文禮殺其君鎔來乞師不許文禮初為鎔養子號王德明此書張文禮者從舊史三月丁亥朔禁私度僧尼陳州刺史惠王友能反夏五月丙戌朔德音改元降流罪已下囚秋赦友能降封房陵侯天平軍節度使戴思遠為北面行營招討使冬十月思遠及晉人戰于戚城敗績二年春正月思遠襲魏州取成安秋八月滑州兵馬留後段凝攻衛州執其刺史李存儒戴思遠克淇門共城新鄉三年春三月潞州李繼韜叛于晉來附夏閏四月唐人取鄆州晉未即位已自與梁為敵國至其建號於梁無所利害故不書唐建號而書唐人者因事而見爾五月庚申宣義軍節度使王彥章為北面行營招討使取德勝南城秋八月段凝為北面行營招討使先鋒將康延孝叛降于唐冬十月甲戌宣義軍節度使王彥章及唐人戰于中都敗績死之唐人取曹州盜竊傳國寶奔于唐戊寅皇帝崩梁亡凡官皆不重書此書者嫌彥章已罷招討使而與唐戰蓋罷使而別將兵以戰也年三十六書曰梁亡見唐莊宗之立速也四月莊宗立稱唐十月梁始亡見唐不待滅梁而立
