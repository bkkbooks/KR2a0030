body:
  text: 新五代史卷十七晉家人傳第五高祖皇后李氏高祖皇后李氏唐明宗皇帝女也后初號永寧公主清泰二年封魏國長公主自廢帝立常疑高祖必反三年公主自太原入朝千春節辭歸留之不得廢帝醉語公主曰爾歸何速欲與石郎反邪既醒左右告之廢帝大悔公主歸以語高祖高祖由是益不自安高祖即位公主當為皇后天福二年三月有司言皇太妃尊號已正請上寶冊太妃高祖庶母劉氏也高祖以宗廟未立謙抑未皇七年夏五月高祖已病乃詔尊太妃為皇太后然卒不奉冊而高祖崩故后訖高祖世亦無冊命出帝天福八年七月冊尊皇后為皇太后太后為人彊敏高祖常嚴憚之出帝馮皇后用事太后數訓戒之出帝不從乃及于敗開運三年十二月耶律德光已降晉兵遣張彥澤先犯京師以書遺太后具道已降晉軍且曰吾有梳頭妮子竊一藥囊以奔于晉今皆在否吾戰陽城時亡奚車一乘在否又問契丹先為晉獲者及景延廣桑維翰等所在太后與帝聞彥澤至欲自焚嬖臣薛超勸止之及得德光所與書乃滅火出上苑中帝召當直學士范質謂曰杜郎一何相負昔先帝起太原時欲擇一子留守謀之北朝皇帝皇帝以屬我我素以為其所知卿為我草奏具言之庶幾活我子母質為帝草降表曰孫男臣重貴言頃者唐運告終中原失馭數窮否極天缺地傾先人有田一成有衆一旅兵連禍結力屈勢孤翁皇帝救患摧剛興利除害躬擐甲胄深入寇場犯露蒙霜度鴈門之險馳風擊電行中冀之誅黃鉞一麾天下大定勢凌宇宙義感神明功成不居遂興晉祚則翁皇帝有大造於石氏也旋屬天降鞠凶先君即世臣遵承遺旨纂紹前基諒暗之初荒迷失次凡有軍國重事皆委將相大臣至於擅繼宗祧既非稟命輕發文字輒敢抗尊自啓釁端果貽赫怒禍至神惑運盡天亡十萬師徒望風束手億兆黎庶延頸歸心臣負義包羞貪生忍恥自貽顛覆上纍祖宗偷度朝昏苟存視息翁皇帝若惠顧疇昔稍霽雷霆未賜靈誅不絶先祀則百口荷更生之德一門銜無報之恩雖所願焉非敢望也臣與太后妻馮氏於郊野面縛俟罪次又為太后表曰晉室皇太后新婦李氏妾言張彥澤傅住兒等至伏蒙皇帝阿翁降書安撫者妾伏念先皇帝頃在並汾適逢屯難危同纍卵急若倒懸智勇俱窮朝夕不保皇帝阿翁發自冀北親抵河東跋履山川踰越險阻立平巨遂定中原救石氏之覆亡立晉朝之社稷不幸先帝厭代嗣子承祧不能繼好息民而反虧恩辜義兵戈屢動駟馬難追戚實自貽咎將誰執今穹旻震怒中外攜離上將牽羊六師解甲妾舉宗負釁視景偷生惶惑之中撫問斯至明宣恩旨曲示含容慰諭丁寧神爽飛越豈謂已垂之命忽蒙更生之恩省罪責躬九死未報今遣孫男延煦延寶奉表請罪陳謝以聞德光報曰可無憂管取一喫飯處四年正月丁亥朔德光入京師帝與太后肩輿至郊外德光不見館于封禪寺遣其將崔延勳以兵守之是時雨雪寒凍皆苦饑太后使人謂寺僧曰吾嘗於此飯僧數萬今日豈不相憫邪寺僧辭以虜意難測不敢獻食帝陰祈守者乃稍得食辛卯德光降帝為光祿大夫檢校太尉封負義侯遷於黃龍府德光使人謂太后曰吾聞重貴不從母教而至于此可求自便勿與俱行太后答曰重貴事妾甚謹所失者違先君之志絶兩國之歡然重貴此去幸蒙大惠全生保家母不隨子欲何所歸於是太后與馮皇后皇弟重睿皇子延煦延寶等舉族從帝而北以宮女五十宦者三十東西班五十醫官一控鶴官四御廚七茶酒司三儀鸞司三六軍士二十人從衛以騎兵三百所經州縣皆故晉將吏有所供饋不得通路傍父老爭持羊酒為獻衛兵推隔不使見帝皆涕泣而去自幽州行十餘日過平州出榆關行砂磧中饑不得食遣宮女從官採木實野蔬而食又行七八日至錦州虜人迫帝與太后拜阿保機畫像帝不勝其辱泣而呼曰薛超誤我不令我死又行五六日過海北州至東丹王墓遣延煦拜之又行十餘日渡遼水至渤海國鐵州又行七八日過南海府遂至黃龍府是歲六月契丹國母徙帝太后于懷密州州去黃龍府西北一千五百里行過遼陽二百里而國母為永康王所囚永康王遣帝太后還止遼陽稍供給之明年四月永康王至遼陽帝白衣紗帽與太后皇后詣帳中上謁永康王止帝以常服見帝伏地雨泣自陳過咎永康王使人扶起之與坐飲酒奏樂而永康王帳下伶人從官望見故主皆泣下悲不自勝爭以衣服藥餌為遺五月永康王上陘取帝所從行宦者十五人東西班十五人及皇子延煦而去永康王妻兄禪奴愛帝小女求之帝辭以尚幼永康王馳一騎取之以賜禪奴陘虜地尤高涼虜人常以五月上陘避暑八月下陘至八月永康王下陘太后自馳至霸州見永康王求於漢兒城側賜地種牧以為生永康王以太后自從行十餘日遣與延煦俱還遼陽明年乃漢乾祐二年其二月徙帝太后于建州自遼陽東南行千二百里至建州節度使趙延暉避正寢以館之去建州數十里外得地五十餘頃帝遣從行者耕而食之明年三月太后寢疾無醫藥常仰天而泣南望戟手罵杜重威李守貞等曰使死者無知則已若其有知不赦爾於地下八月疾亟謂帝曰我死焚其骨送范陽佛寺無使我為虜地鬼也遂卒帝與皇后宮人宦者東西班皆被髮徒跣扶舁其柩至賜地焚其骨穿地而葬焉周顯德中有中國人自契丹亡歸者言見帝與皇后諸子皆無恙後不知其所終安太妃安太妃代北人也不知其世家為敬儒妻生出帝封秦國夫人出帝立尊為皇太妃妃老而失明從出帝北遷自遼陽徙建州卒於道中臨卒謂帝曰當焚我為灰南向揚之庶幾遺魂得反中國也既卒砂磧中無草木乃毀奚車而焚之載其燼骨至建州李太后亦卒遂並葬之出帝皇后馮氏出帝皇后馮氏定州人也父濛為州進奏吏居京師以巧佞為安重誨所喜以為鄴都副留守高祖留守鄴都得濛歡甚乃為重胤娶濛女後封吳國夫人重胤早卒后寡居有色出帝悅之高祖崩梓宮在殯出帝居喪中納之以為后是日以六軍仗衛太常鼓吹命后至西御莊見于高祖影殿羣臣皆賀帝顧謂馮道等曰皇太后之命與卿等不任大慶羣臣出帝與皇后酣飲歌舞過梓宮前酹而告曰皇太后之命與先帝不任大慶左右皆失笑帝亦自絶倒顧謂左右曰我今日作新女壻何似生后與左右皆大笑聲聞于外后既立專內寵封拜宮官尚宮知客等皆為郡夫人又用男子李彥弼為皇后宮都押衙其兄玉執政內外用事晉遂以亂契丹犯京師暴帝之惡于天下曰納叔母於中宮亂人倫之大典后隨帝北遷哀帝之辱數求毒藥欲與帝俱飲以死而藥不可得後不知其所終晉氏始出夷狄而微終為夷狄所滅故其宗室次序本末不能究見其可見者曰高祖二叔父一兄六弟七子二孫而有略有詳非惟禍亂多故而失其事實抑亦無足稱焉者然粗存其見者以備其闕云二叔父曰萬友萬詮兄曰敬儒弟曰敬威敬德敬殷敬贇敬暉重胤子曰重貴重信重乂重英重進重睿重杲孫曰延煦延寶孝平皇帝生孝元皇帝萬友萬詮孝元皇帝生高祖萬友生敬威敬贇萬詮生敬暉而敬儒敬德敬殷重胤皆不知其於高祖為親疏也高祖孝元皇帝第二子也而敬儒為兄疑其長子也則於高祖屬長而親然贈官反最後於諸弟而高祖世獨不得追封此又可疑也重胤高祖弟也亦不知其為親疏然高祖愛之養以為子故於名加重而下齒諸子高祖叔兄與弟敬殷子重進皆前即位卒而敬威敬德重胤重英高祖反時死高祖少子曰馮六未名而卒而舊說以重睿為幼子者非也石氏世事軍中萬友萬詮職卑不見天福二年正月萬友自故金紫光祿大夫檢校司徒兼御史大夫上柱國贈太師萬詮亦自金紫光祿大夫檢校司空兼御史大夫上柱國贈太傅出帝天福八年五月追封皇叔祖萬友為秦王萬詮加贈太師追封趙王敬威敬威字奉信唐廢帝時為彰聖右第三都指揮使領常州刺史聞高祖舉兵太原謂人曰生而有死人孰能免吾兄方舉大事吾不可偷生取辱見笑一時遂自殺敬德時為沂州馬步軍指揮使以高祖反誅天福二年正月贈敬威敬德皆為太傅並贈敬殷以檢校太子賓客亦贈太傅而不及敬儒七年正月追封敬威廣王敬德福王敬殷通王皆贈太尉敬儒始以故金紫光祿大夫檢校尚書左僕射兼御史大夫上柱國贈太傅而獨不得封出帝天福八年五月加贈三皇叔皆為太師而皇伯敬儒始追封宋王亦加贈太師敬贇敬贇字德和少無賴竄身民間高祖使人求得之補太原牙將即位以為飛龍皇城使纍遷曹州防禦使天福五年冬拜河陽三城節度使敬贇性貪暴高祖為擇賢佐吏輔之而敬贇亦憚高祖嚴未嘗敢犯法歲餘徙鎮保義出帝時加同中書門下平章事始漸驕恣帝嘗遣使者至必問曰小姪安否陝人苦其暴虐召還京師以其皇叔不能責也斥其元從都押衙蘇彥存鄭溫遇以警之契丹犯邊敬贇從出帝幸澶淵使以兵備汶陽守麻家渡未嘗見敵皆無功開運元年七月復出為威勝軍節度使歲餘出帝以曹州為威信軍授敬贇節度使在曹貪暴尤甚久之召還張彥澤兵犯京師敬贇夜走踰城東垣墮沙濠溺死時年四十九韓王敬暉韓王敬暉字德昭為人厚重剛直勇而多智高祖尤愛之高祖時為曹州防禦使以廉儉見稱卒于官贈太傅天福八年加贈太師追封韓王子曦嗣高祖李皇后生楚王重信其諸子皆不知其母當高祖起太原重英為右衛大將軍月高祖為二子發哀皆贈為太保並贈重進以故左金吾衛將軍贈太保七年正月皆加贈太傅追封重英虢王重胤郯王重進夔王出帝天福八年五月皆加贈太師楚王重信楚王重信字守孚為人敏悟多智而好禮天福二年二月以左驍衛上將軍拜河陽三城節度使有善政高祖下詔褒之是歲范延光反詔前靈武節度使張從賓發河陽兵討延光從賓亦反重信見殺時年二十高祖欲贈重信太尉大臣引漢故事皇子無為三公者高祖曰此兒為善被禍吾哀之甚自我而已豈有例邪乃贈太尉七年正月加贈太師追封沂王出帝天福八年五月易封楚王壽王重乂壽王重乂字弘理為人好學頗知兵法高祖即位拜左驍衛大將軍高祖幸汴州以為東都留守張從賓反攻河南見殺時年十九贈太傅天福七年正月加贈太尉追封壽王出帝天福八年五月加贈太師皆無子重睿重睿為人貌類高祖高祖臥疾宰相馮道入見臥內重睿尚幼高祖呼出使拜道於前因以宦者抱持置道懷中高祖雖不言左右皆知其以重睿託道也高祖崩晉大臣以國家多事議立長君而景延廣已陰許立出帝重睿遂不得立出帝以重睿為檢校太保開封尹以左散騎常侍邊蔚權知開封府事開運二年五月拜重睿雄武軍節度使歲餘徙鎮忠武皆不之鎮契丹滅晉重睿從出帝北遷後不知其所終重杲陳王重杲高祖幼子也小字馮六未名而卒贈太傅追封陳王賜名重杲出帝天福八年五月加贈太師延煦延寶延煦延寶高祖諸孫也出帝以為子開運二年秋以延煦為鄭州刺史延煦少不能視事以一宦者從之又選尚書郎路航參知州事宦者遂專政事每詬辱航出帝召航還已而徙延煦齊州防禦使三年拜鎮寧軍節度使是時河北用兵天下旱蝗民餓死者百萬計而諸鎮爭為聚斂趙在禮所積巨萬為諸侯王最出帝利其資乃以延煦娶在禮女在禮獻絹三千匹前後所獻不可勝數三年五月遣宗正卿石光贊以聘幣一百五十床迎于其第出帝宴在禮萬歲殿所以賜豫甚厚君臣窮極奢侈時人以為榮在禮謂人曰吾此一婚其費十萬十一月徙延煦鎮保義自延煦為齊州防禦使而延寶代為鄭州刺史及契丹滅晉出帝與太后遣延煦延寶齎降表玉璽金印以歸契丹而延寶時亦為威信軍節度使矣契丹得璽以為製作非工與前史所傳者異命延煦等還報求真璽出帝以狀答曰頃潞王從珂自焚於洛陽玉璽不知所在疑已焚之先帝受命命玉工製此璽在位羣臣皆知之乃已後延煦等從出帝北遷不知其所終嗚呼古之不幸無子而以其同宗之子為後者聖人許之著之禮經而不諱也而後世閭閻鄙俚之人則諱之諱則不勝其欺與僞也故其苟偷竊取嬰孩襁褓諱其父母而自欺以為我生之子曰不如此則不能得其一志盡愛於我而其心必二也而為其子者亦自諱其所生而絶其天性之親反視以為叔伯父以此欺其九族而亂其人鬼親疏之屬凡物生而有知未有不愛其父母者使是子也能忍而真絶其天性歟曾禽獸之不若也使其不忍而外陽絶之是大僞也一作序夫閭閻鄙俚之人之慮於事者亦已深矣然而苟竊欺僞不可以為法者小人之事也惟聖人則不然以謂人道莫大於繼絶此萬世之通制而天下之公行也何必諱哉所謂子者未有不由父母而生者也故為人後者必有所生之父有所後之父此理之自然也何必諱哉其簡易明白不苟不竊不欺不僞可以為通制而公行者聖人之法也又以謂為人之後者所承重故加其服以斬而不絶其所生之親者天性之不可絶也然而恩有屈於義故降其服以期服外物也可以降而父母之名不可改故著於經曰為人後者為其父母報自三代以來有天下國家者莫不用之而晉氏不用也出帝之於敬儒絶其父道臣而爵之非特以其義不當立不得已而絶之蓋亦習見閭閻鄙俚之所為也五代干戈賊亂之世也禮樂崩壞三綱五常之道絶而先王之制度文章掃地而盡於是矣如寒食野祭而焚紙錢天子而為閭閻鄙俚之事者多矣而晉氏起於夷狄以篡逆而得天下高祖以耶律德光為父而出帝於德光則以為祖而稱孫於其所生父則臣而名之是豈可以人理責哉
