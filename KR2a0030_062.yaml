body:
  text: 新五代史卷六十二南唐世家第二李子景景子煜李字正倫徐州人也世本微賤父榮遇唐末之亂不知其所終少孤流寓濠泗間楊行密攻濠州得之奇其狀貌養以為子而楊氏諸子不能容行密以乞徐溫乃冒姓徐氏名知誥及壯身長七尺廣顙隆準為人溫厚有謀為吳樓船軍使以舟兵屯金陵柴再用攻宣州用其兵殺李遇以功拜昇州刺史時江淮初定州縣吏多武夫務賦斂為戰守獨好學接禮儒者能自勵為勤儉以寬仁為政民稍譽之徐溫鎮潤州以昇池等六州為屬溫聞理昇州有善政往視之見其府庫充實城壁修整乃徙治之而遷潤州刺史初不欲往屢求宣州溫不與既而徐知訓為朱瑾所殺溫居金陵未及聞居潤州近廣陵得先聞即日以州兵渡江定亂遂得政事徐溫甚孝謹溫嘗罵其諸子不如諸子頗不能容而知訓尤甚嘗召飲酒伏劍士欲害之行酒吏刁彥能覺之酒至以手爪掐之悟起走乃免後自潤州入覲知訓與飲於山光寺又欲害之徐知諫以其謀告起遁去知訓以劍授刁彥能使追殺之及於中塗而還紿以不及由是得免後貴以彥能為撫州節度使知訓之用事也嘗凌弱楊氏而驕侮諸將遂以見殺及秉政欲收人心乃寬刑法推恩信起延賓亭以待四方之士引宋齊丘駱知祥王令謀等為謀客士有羈旅於吳者皆齒用之嘗陰使人察視民間有婚喪匱乏者往往賙給之盛暑未嘗張蓋操扇左右進蓋必却之曰士衆尚多暴露我何用此以故溫雖遙秉大政而吳人頗已歸武義元年拜左僕射參知政事溫行軍司馬徐玠數勸溫以己子代溫遣子知詢入廣陵謀代秉政會溫病卒知詢奔還金陵玠反為謀誣知詢以罪斬其客將周廷望以知詢為右統軍楊溥僭號拜太尉中書令大和三年出鎮金陵如溫之制留其子景通為司徒同平章事以王令謀宋齊丘為左右僕射同平章事四年封東海郡王照鑑見白鬚顧其吏周宗嘆曰功業已就而吾老矣奈何宗知其意馳詣廣陵見宋齊丘謀禪代齊丘以為未可請斬宗以謝吳人黜宗為池州刺史吳臨江王濛者怨徐氏捨己而立溥心嘗不平及將謀篡國先廢濛為歷陽公使吏以兵守之濛殺守者奔廬州節度使周本本吳舊將也聞濛至欲納之為其子祚所止本曰此吾故主家郎君也何忍拒之遽自出迎祚閉門遮本不得出縛濛送金陵見殺五年封齊王已而閩越諸國皆遣使勸進謂人望已歸天祚三年建齊國置宗廟社稷以宋齊丘徐玠為左右丞相十月溥遣攝太尉楊璘傳位於國號齊改元昇元以冊尊溥曰受禪老臣知誥謹上冊皇帝為高尚思玄弘古讓皇帝追尊徐溫為忠武皇帝封子景為吳王封徐氏子知證江王知諤饒王周本與諸將至金陵勸進歸而嘆曰吾不誅篡國者以報楊氏今老矣豈能事二姓乎憤惋而死二年四月遷楊溥於潤州丹陽宮以王輿為浙西節度使馬思讓為丹陽宮使以嚴兵守之徐氏諸子請復姓謙抑不敢忘徐氏恩下其議百官百官皆請然後復姓李氏改名曰自言唐憲宗子建王恪生超超生志為徐州判司志生榮乃自以為建王四世孫改國號曰唐立唐高祖太宗廟追尊四代祖恪為孝靜皇帝廟號定宗曾祖超為孝平皇帝廟號成宗祖志孝安皇帝廟號惠宗考榮孝德皇帝廟號慶宗奉徐溫為義父徐氏子孫皆封王公女封郡縣主以門下侍郎張居詠中書侍郎李建勳右僕射張延翰同平章事十一月以步騎八萬講武於銅橋楊溥卒於丹陽宮溥子璉為吳太子時以女妻之及篡國封其女永興公主女聞人呼公主則嗚咽流涕而辭宮中皆憐之溥卒以璉為康化軍節度使已而以疾卒三年四月郊祀昊天上帝於圓丘禮畢羣臣請上尊號曰尊號非古也不許州縣言民孝悌五代同居者七家皆表門閭復其繇役其尤盛者江州陳氏宗族七百口每食設廣席長幼以次坐而共食有畜犬百餘共一牢食一犬不至諸犬為之不食四年六月晉安州節度使李金全叛送款于遣鄂州屯營使李承裕迎之承裕與晉將馬全節安審暉戰安陸南三戰皆敗承裕與裨將段處恭皆死都監杜光鄴及其兵五百人被執送于京師高祖厚賜之遣還致書高祖復送光鄴等請以敗軍行法高祖又遣之以甲士臨淮拒之乃止六年吳越國火焚其宮室府庫甲兵皆盡羣臣請乘其弊攻之不許遣使弔問厚賙其乏錢氏自吳時素為敵國見天下亂久常厭用兵及將篡國先與錢氏約和歸其所執將士錢氏亦歸吳敗將遂通好不絕客馮延巳好論兵大言嘗誚曰田舍翁安能成大事而志在守吳舊地而已無復經營之略也然吳人亦賴以休息七年卒年五十六謚曰光文肅武孝高皇帝廟號烈祖陵曰永陵子景立景初名景通長子也既立又改名璟徐溫死專政以為兵部尚書參知政事明年鎮金陵留景為司徒同平章事與宋齊丘王令謀居廣陵輔楊溥將篡國召景歸金陵為副都統立封齊王卒嗣位改元保大尊母宋氏為皇太后妃鍾氏為皇后封弟壽王景遂為燕王宣城王景達鄂王景逷前未王為保寧王秋改封景遂齊王諸道兵馬元帥太尉中書令景達為燕王副元帥盟於柩前約兄弟世世繼立封其子冀南昌王江都尹冬十月破虔州妖賊張遇賢遇賢循州羅縣小吏也初有神降羅縣民家與人言禍福輒中遇賢禱之神曰遇賢是羅漢可留事我是時南海劉龑死子玢初立嶺南盜賊起羣盜千餘人未有所統問神當為主者神言遇賢遂共推為帥遇賢自號中天八國王改元永樂置官屬羣賊盜皆絳衣攻剽嶺外問神所嚮神曰當過嶺取虔州遂襲南康節度賈浩不能禦遇賢據白雲洞造宮室有衆十餘萬連陷諸縣景遣洪州營屯虞候嚴思通事舍人邊鎬率兵攻之遇賢問神神不復語羣盜皆懼遂執遇賢以降景以馮延巳常夢錫為翰林學士馮延魯為中書舍人陳覺為樞密使魏岑查文徽為副使夢錫直宣政殿專掌密命而延巳等皆以邪佞用事吳人謂之五鬼夢錫屢言五人者不可用景不納十二月景下令中外庶政委齊王景遂參決惟陳覺查文徽得奏事羣臣非召見者不得入給事中蕭儼上疏切諫不報侍衞軍都虞候賈崇詣閤求見景曰臣事先朝三十年見先帝所以成功業者皆用衆賢之謀故延接疏遠未嘗壅隔然下情猶有不達者今陛下新即位所信用者何人奈何頓與臣下隔絕臣老即死恐無復一見顏色因泣下嗚咽景為之動容引與坐賜食而慰之遂寢所下令初宋齊丘為謀篡楊氏最有力及事成乃陽入九華山屢招之乃出僭號未幾齊丘以病罷相出為洪州節度使景立復召為相而陳覺魏岑等皆為齊丘所引用而岑與覺有隙譖覺於景左遷少府監齊丘亦罷相為浙西節度使齊丘不得意願復歸九華山賜號九華先生封青陽公食青陽一縣二年二月閩人連重遇朱文進弒其君王延羲文進自立是時延羲弟延政亦自立於建州國號殷王氏兄弟連兵累年閩大亂景因其亂遣查文徽及待詔臧循發兵攻建州延政聞唐且攻之遣人紿福州曰唐兵助我討賊矣福州信之共殺文進等以降延政遣其從子繼昌守福州文徽軍屯建陽福州將李仁達殺王繼昌自稱留後泉州將留從効亦殺其刺史黃紹頗皆送款於文徽四年八月文徽乘勝克建汀泉漳四州景分延平劍浦富沙三縣置劍州遷王延政之族于金陵以延政為饒州節度使李仁達為福州節度使留從効為清源軍節度使景遂欲罷兵而查文徽陳覺等皆言仁達等餘孽猶在不若乘勝盡取之陳覺自言可不用尺兵致仁達等景以覺為宣諭使召仁達朝金陵仁達不從覺慚還至建州矯命發汀建信撫州兵攻仁達時魏岑安撫漳泉聞覺起兵亦擅發兵會覺景大怒馮延巳等為言兵業行不可止乃以王崇文為招討使王建封為副使益兵以會之以延魯魏岑陳覺皆為監軍使仁達送款於吳越吳越以兵三萬應仁達覺等爭功進退不相應延魯與吳越兵先戰大敗而走諸軍皆潰歸景怒遣使者鎖覺延魯至金陵而馮延巳方為宰相宋齊丘復自九華召為太傅為稍解之乃流覺蘄州延魯舒州韓熙載上書切諫請誅覺等齊丘惡之貶熙載和州司馬是歲契丹陷京師中國無主而景方以覺等疲兵東南不暇北顧御史中丞江文蔚劾奏宰相馮延巳諫議大夫魏岑亂政與覺等同罪而不見貶黜言甚切直景大怒自答其疏貶文蔚江州司士參軍亦罷延巳為少傅岑為太子洗馬五年以景遂為太弟景達為元帥封齊王南昌王冀為副元帥封燕王契丹遣使來聘以兵部尚書賈潭報聘六年漢李守貞反河中遣其客將朱元來求援景以潤州節度使李金全為北面行營招撫使兵攻沭陽聞守貞已敗乃還是時漢隱帝少中國衰弱淮北羣盜多送款於景景遣皇甫暉出海泗諸州招納之八年福州詐言吳越戍兵亂殺李仁達而遯遣人請建州節度使查文徽文徽與劍州刺史陳誨下舟閩江趨應之福州以兵出迎誨曰閩人多詐難信宜駐江岸徐圖之文徽曰久則生變乘其未定亟取之留誨屯江口進至西門伏兵發文徽被擒誨與越人戰大敗之獲其將馬先進景送先進還越越亦歸景文徽是歲楚王馬希廣為其弟希萼所弒希萼自立九年秋楚人囚希萼於衡山立其弟希崇附于景楚國大亂景遣信州刺史邊鎬攻楚破潭州盡遷馬氏之族于金陵景以希萼為洪州節度使希崇舒州節度使以邊鎬為湖南節度使十年分洪州高安清江萬載上高四縣置筠州以馮延巳孫忌為左右僕射同平章事廣州劉晟乘楚之亂取桂管景遣將軍張巒出兵爭之不克楚地新定其府庫空虛宰相馮延巳以克楚為功不欲取費於國乃重斂其民以給軍楚人皆怨而叛其將劉言攻邊鎬鎬不能守遯歸十一年金陵大火踰月十二年大饑民多疫死十三年十一月周師南征詔曰蠢爾淮甸敢拒大邦盜據一方僭稱偽號晉漢之代寰海未寧而乃招納叛亡朋助兇逆金全之據安陸守貞之叛河中大起師徒來為應援迫奪閩越塗炭湘潭至於應接慕容憑陵徐部沭陽之役曲直可知勾誘契丹入為邊患結連并壘實我世讎罪惡難名人神共憤乃拜李穀為行營都部署攻自壽州始是時宋齊丘為洪州節度使景召齊丘還金陵以劉彥貞為神武統軍劉仁贍為清淮軍節度使以距周師李穀曰吾無水戰之具而使淮兵斷正陽浮橋則我背腹受敵乃焚其芻糧退屯正陽是時世宗親征行至圉鎮聞穀退軍曰吾軍却唐兵必追之遣李重進急趨正陽曰唐兵且至宜急擊之劉彥貞等聞穀退軍果以為怯急追之比及正陽而重進先至軍未及食而戰彥貞等遂敗彥貞之兵施利刃於拒馬維以鐵索又刻木為獸號捷馬牌以皮囊布鐵蒺藜于地周兵見而知其怯一鼓敗之世宗營于淝水之陽徙浮橋于下蔡景遣林仁肇等爭之不得而周師取滁州景懼遣泗州牙將王知朗至徐州稱唐皇帝奉書願効貢賦陳兄事之禮世宗不答景東都副留守馮延魯光州刺史張紹舒州刺史周祚泰州刺史方訥皆棄城走延魯削髮為僧為周兵所獲蘄州裨將李福殺其刺史王承雋降周景益懼始改名景以避周廟諱遣其翰林學士鍾謨文理院學士李德明奉表稱臣獻犒軍牛五百頭酒二千石金銀羅綺數千請割壽濠泗楚光海六州以求罷兵世宗不報分兵襲下揚泰景遣人懷蠟丸書走契丹求救為邊將所執光州刺史張承翰降周十四年三月景又遣司空孫晟禮部尚書王崇質奉表辭益卑服世宗猶不答前遣鍾謨等幷晟崇質皆留行在而謨等請歸取景表盡獻江北地世宗許之遣崇質德明等還始賜景書曰自有唐失御天步方艱六紀于茲瓜分鼎峙自為聲教各擅蒸黎交結四夷憑凌上國華風不競否運所鍾凡百有心孰不興憤朕擅一百州之富庶握三十萬之甲兵農戰交修士卒樂用苟不能恢復內地申畫邊疆便議班旋真同戲劇至於削去尊稱願輸臣節孫權事魏蕭詧奉周古也雖然今則不取但存帝號何爽歲寒儻堅事大之心必不迫人于險德明等還盛稱世宗英武景不悅宋齊丘陳覺等皆以割地無益而德明賣國以圖利景怒斬德明遣元帥齊王景達與陳覺邊鎬許文縝率兵趣壽春景達將朱元等復得舒蘄泰三州夏大雨周師在揚滁和者皆却諸將請要其險隘擊之宋齊丘曰擊之怨深不如縱之以為德誡諸將閉壁無得要戰故周師皆集於壽州世宗屯於渦口欲再幸揚州宰相范質以師老泣諫乃班師以李重進攻廬壽向訓守揚州訓請棄揚州併力以攻壽春乃封府庫付主者遣景舊將按巡城中秋毫不犯而去淮人大悅皆負糗糧以送周師十五年景達遣朱元等屯紫金山築甬道以餉壽州二月世宗復南征徙下蔡浮橋于渦口為鎮淮軍築二城以夾淮周師連破紫金諸寨景達雖為元帥兵事皆決於陳覺覺與朱元素有隙以元李守貞客反覆難信景遣大將楊守忠代元且召之元憤怒叛降于周諸軍皆潰許文縝邊鎬皆被執景達以舟兵奔還金陵劉仁贍病且死其副使孫羽等以壽州降于周世宗班師景遣人焚揚州驅其士庶而去冬十月世宗復南征遂圍濠州刺史郭廷謂告于周曰臣不能守一州以抗王師然願請命于唐而後降世宗為之緩攻廷謂遣人請命于景景許其降乃降又取泗州周師步騎數萬水陸齊進軍士作檀來之歌聲聞數十里十二月屯于楚州之北門交泰元年正月大赦改元周師攻楚州守將張彥卿鄭昭業城守甚堅攻四十日不可破世宗親督兵以洞屋穴城而焚之城壞彥卿昭業戰死周兵怒甚殺戮殆盡周師復取海泰揚州世宗幸迎鑾以臨大江景知不能支而恥自屈身去其名號乃遣陳覺奉表請傳國與其世子而聽命初周師南征無水戰之具已而屢敗景兵獲水戰卒乃造戰艦數百艘使降卒教之水戰命王環將以下淮景之水軍多敗長淮之舟皆為周師所得又造齊雲船數百艘世宗至楚州北神堰齊雲舟大不能過乃開老鸛河以通之遂至大江景初自恃水戰以周兵非敵且未能至江及覺奉使見舟師列于江次甚盛以為自天而下乃請曰臣願還國取景表盡獻江北諸州如約世宗許之始賜景書曰皇帝恭問江南國主勞其良苦而已是時揚泰滁和壽濠泗楚光海等州已為周得景遂獻廬舒蘄黃畫江以為界五月景下令去帝號稱國主奉周正朔時顯德五年也初孫晟使于周留不遣而世宗問晟江南虛實不對世宗怒殺晟周已罷兵景乃贈劉仁贍太師追封晟魯國公世宗遣鍾謨馮延魯歸國景復遣謨等朝京師手自書表稱天地父母之恩不可報又請降詔書同藩鎮遣謨面陳願傳位世子世宗遣謨等還國優詔以勞安之景以謨為禮部侍郎延魯戶部侍郎景為太子時延魯等皆出入東宮禮部尚書常夢錫自世屢言不可使延魯等近太子及景立延魯用事夢錫每排斥之景既割地稱臣有語及朝廷為大朝者夢錫大笑曰君等嘗欲致君如堯舜今日自為小朝邪鍾謨素善李德明既歸而聞德明由宋齊丘等見殺欲報其冤未能發陳覺齊丘黨也與嚴續素有隙覺嘗奉使周還言世宗以江南不即聽命者嚴續之謀勸景誅續以謝罪景疑之謨因請使于周驗其事景已割地稱臣乃遣謨入朝謝罪言不即割地者非續謀願赦之世宗大驚曰續能為謀是忠其主也朕豈殺忠臣乎謨還言覺姦詐景怒流覺饒州殺之宋齊丘坐覺黨與放還青陽賜死以太弟景遂為洪州節度使燕王冀為太子景困於用兵鍾謨請鑄大錢以一當十文曰永通泉貨謨嘗得罪而大錢廢韓熙載又鑄鐵錢以一當二九月太子冀卒次子從嘉封吳王居東宮鍾謨言從嘉輕肆請立紀國公從善景怒貶謨國子司業立從嘉為太子世宗使人謂景曰吾與江南大義已定然慮後世不能容汝可及吾世修城隍治要害為子孫計景因營緝諸城謀遷其都于洪州羣臣皆不欲遷惟樞密使唐鎬贊之乃升洪州為南昌建南都建隆二年留太子從嘉監國景遷于南都而洪州迫隘宮府營廨皆不能容羣臣日夕思歸景悔怒不已唐鎬慚懼發疾卒六月景卒年六十四從嘉嗣立以喪歸金陵遣使入朝願復景帝號太祖皇帝許之乃謚曰明道崇德文宣孝皇帝廟號元宗陵曰順陵煜字重光初名從嘉景第六子也煜為人仁孝善屬文工書畫而豐額駢齒一目重瞳子自太子冀已上五子皆早亡煜以次封吳王建隆二年景遷南都立煜為太子留監國景卒煜嗣立於金陵母鍾氏父名泰章煜尊母曰聖尊后立妃周氏為國后封弟從善韓王從益鄭王從謙宜春王從度昭平郡公從信文陽郡公大赦境內遣中書侍郎馮延魯修貢于朝廷令諸司四品已下無職事者日二員待制於內殿三年泉州留從効卒景之稱臣於周也從効亦奉表貢獻于京師世宗以景故不納從効聞景遷洪州懼以為襲己遣其子紹基納貢于金陵而從効病卒泉人因幷送其族于金陵推立副使張漢思漢思老不任事州人陳洪進逐之自稱留後煜即以洪進為節度使乾德二年始用鐵錢民間多藏匿舊錢舊錢益少商賈多以十鐵錢易一銅錢出境官不可禁煜因下令以一當十拜韓熙載中書侍郎勤政殿學士封長子仲遇清源公次子仲儀宣城公五年命兩省侍郎給事中中書舍人集賢勤政殿學士分夕於光政殿宿直煜引與談論煜嘗以熙載盡忠能直言欲用為相而熙載後房妓妾數十人多出外舍私侍賓客煜以此難之左授熙載右庶子分司南都熙載盡斥諸妓單車上道煜喜留之復其位已而諸妓稍稍復還煜曰吾無如之何矣是歲熙載卒煜嘆曰吾終不得熙載為相也欲以平章事贈之問前世有此比否羣臣對曰昔劉穆之贈開府儀同三司遂贈熙載平章事熙載北海將家子也初與李穀相善明宗時熙載南奔吳穀送至正陽酒酣臨訣熙載謂穀曰江左用吾為相當長驅以定中原穀曰中國用吾為相取江南如探囊中物爾及周師之征淮也命穀為將以取淮南而熙載不能有所為也開寶四年煜遣其弟韓王從善朝京師遂留不遣煜手疏求從善還國太祖皇帝不許煜嘗怏怏以國蹙為憂日與臣下酣宴愁思悲歌不已五年煜下令貶損制度下書稱教改中書門下省為左右內史府尚書省為司會府御史臺為司憲府翰林為文館樞密院為光政院諸王皆為國公以尊朝廷煜性驕侈好聲色又喜浮圖為高談不恤政事六年內史舍人潘佑上書極諫煜收下獄佑自縊死七年太祖皇帝遣使詔煜赴闕煜稱疾不行王師南征煜遣徐鉉周惟簡等奉表朝廷求緩師不答八年十二月王師克金陵九年煜俘至京師太祖赦之封煜違命侯拜左千牛衞將軍其後事具國史予世家江南其故老多能言李氏時事云太祖皇帝之出師南征也煜遣其臣徐鉉朝于京師鉉居江南以名臣自負其來也欲以口舌馳說存其國其日夜計謀思慮言語應對之際詳矣及其將見也大臣亦先入請言鉉博學有材辯宜有以待之太祖笑曰第去非爾所知也明日鉉朝于廷仰而言曰李煜無罪陛下師出無名太祖徐召之升使畢其說鉉曰煜以小事大如子事父未有過失奈何見伐其說累數百言太祖曰爾謂父子者為兩家可乎鉉無以對而退嗚呼大哉何其言之簡也蓋王者之興天下必歸于一統其可來者來之不可者伐之僭偽假竊期於掃蕩一平而後已予讀周世宗征淮南詔怪其區區攟摭前事務較曲直以為辭何其小也然世宗之英武有足喜者豈為其辭者之過歟據湯悅所撰江南錄云景以保大十五年正月改元交泰是歲盡獻淮南十四州畫江為界保大十五年乃周顯德四年也案五代舊史及世宗實錄顯德四年十月壬申世宗方復南征五年正月丙午始克楚州二月己亥景始盡獻淮南諸州畫江為界當是保大十六年也悅等南唐故臣記其目見之事何其差繆而九國志紀年通譜之類但以悅書為正不復參校遂皆差一年至於景滅閩國是保大四年江南錄書於三年亦差一年已具閩世家注或疑景立踰年而改元則滅閩國當為三年周取淮南當為十五年不差但江南錄誤於景立之年改元保大所以常差一年也今知不然者以諸書參校閩人殺王延羲當晉開運元年周師始伐南唐當顯德二年據景以初立之年即改元則開運元年為保大二年顯德二年為保大十三年今江南錄書延羲被殺於二年周師始伐於十三年則是景立之年改元不誤而悅等書滅王氏割淮南自各差一年爾自晉天福二年建國至皇朝開寶八年國滅凡三十九年
