body:
  text: 新五代史卷四十一雜傳第二十九盧光稠談全播盧光稠談全播皆南康人也光稠狀貌雄偉無他材能而全播勇敢有識略然全播常奇光稠為人唐末羣盜起南方全播謂光稠曰天下洶洶此真吾等之時無徒守此貧賤為也乃相與聚兵為盜衆推全播為主全播曰諸君徒為賊乎而欲成功乎若欲成功當得良帥盧公堂堂真君等主也衆陽諾之全播怒拔劍擊木三斬之曰不從令者如此木衆懼乃立光稠為帥是時王潮攻陷嶺南全播攻潮取其虔韶二州又遣光稠弟光睦攻潮州光睦好勇而輕進全播戒其持重不聽度其必敗乃為奇兵伏其歸路光睦果敗走潮人追之全播以伏兵邀擊大敗之遂取潮州是時劉巖起南海擊走光睦以兵數萬攻虔州光稠大懼謂全播曰虔潮皆公取之今日非公不能守也全播曰吾知劉巖易與爾乃選精兵萬人伏山谷中陽治戰地於城南告巖戰期以老弱五千出戰戰酣偽北巖急追之伏兵發巖遂大敗光稠第戰功全播悉推諸將光稠心益賢之梁初江南嶺表悉為吳與南漢分據而光稠獨以虔韶二州請命于京師願通道路輸貢賦太祖為置百勝軍以光稠為防禦使兼五嶺開通使又建鎮南軍以為留後開平五年光稠病以符印屬全播全播不受光稠卒全播立其子延昌而事之延昌好遊獵其將黎求閉門拒延昌延昌見殺求因謀殺全播全播懼稱疾不出求乃自立請命于梁乾化元年拜求防禦使求暴病死其將李彥圖自立全播益懼遂稱疾篤杜門自絶彥圖疑之使人覘其動靜全播應覘為狀以自免彥圖死州人相率詣全播第扣門請之全播乃起遣使請命于梁拜防禦使全播治虔州七年有善政楊隆演遣劉信攻破虔州以全播歸廣陵卒年八十五當盧氏時劉龑已取韶州及全播被執虔州遂入于吳雷滿雷滿武陵人也為人凶悍獢勇文身斷髮唐廣明中湖南飢盜賊起滿與同里人區景思周嶽等聚諸蠻數千獵于大澤中乃擊鮮釃酒擇坐中豪者補置伍長號土團軍諸蠻從之推滿為帥是時高駢鎮荊南召滿隸麾下使以蠻軍擊賊駢徙淮南滿從至廣陵逃歸殺刺史崔翥遂據朗州請命于唐昭宗以澧朗為武貞軍拜滿節度使是時澧陽人向瓌殺刺史呂自牧據澧州而溪洞諸蠻宋鄴昌師益等皆起兵剽掠湖外滿亦以輕舟上下荊江攻劫州縣楊行密攻杜洪于鄂州荊南成汭出兵救洪汭戰敗溺死於君山滿襲破荊南不能守焚掠殆盡而去滿嘗鑿深池於府中客有過者召宴池上指其水曰蛟龍水怪皆窟於此蓋水府也酒酣取坐上器擲池中因裸而入取器嬉水上久之乃出治衣復坐意氣自若滿居朗州引沅水塹其城上為長橋為不可攻之計天祐中滿卒子彥恭自立彥恭附于楊行密亦嘗攻劫為荊湖患開平元年馬殷發兵攻彥恭恃塹為阻逾年不能破三年彥恭奔于楊行密馬殷擒其弟彥雄等七人送于梁斬于汴市彥恭卒於淮南澧朗遂入于楚鍾傳鍾傳洪州高安人也事州為小校黃巢攻掠江淮所在盜起往往據州縣傳以州兵擊賊頻勝遂逐觀察使自稱留後唐以洪州為鎮南軍拜傳節度使江夏伶人杜洪者亦據鄂州楊行密屢攻之洪頗倚傳為首尾久之洪敗死是時危全諷韓師德等分據撫吉諸州傳皆不能節度以兵攻之稍聽命獨全諷不能下乃自率兵圍之城中夜火起諸將請急攻之傳曰吾聞君子不迫人之危乃掃地祭天嚮城再拜祝曰全諷不降非民之罪願天止火全諷聞之明日乃亦聽命請以女妻傳子匡時傳居江西三十餘年纍拜太保中書令封南平王天祐三年傳卒子匡時自稱留後請命于唐全諷曰聽鍾郎為節度使三年吾將自為之已而傳養子延規與匡時爭立乞兵於楊渥渥遣秦裴等攻匡時匡時敗被執歸廣陵開平三年全諷等起兵江西謀復鍾氏故地全諷為楊隆演將周本所敗江西遂入于吳趙匡凝趙匡凝字光儀蔡州人也其父德諲事秦宗權為申州刺史宗權反德諲攻下襄陽梁太祖攻蔡州宗權屢敗德諲乃以山南東道七州降梁太祖初鎮宣武嘗為宗權所困聞德諲降大喜表為行營副都統河陽保義義昌三節度行軍司馬會其兵以攻蔡州破之德諲功多德諲卒子匡凝自立是時成汭死雷彥恭襲取荊南匡凝遣其弟匡明逐彥恭太祖表匡凝荊襄節度使以匡明為荊南留後是時唐衰藩鎮不復奉朝廷獨匡凝兄弟貢賦不絶匡凝為人氣貌甚偉性方嚴喜自修飾頗好學問聚書數千卷為政有威惠太祖攻兗州朱瑾求救於晉晉遣史儼等將兵數千救瑾瑾敗與儼等奔于淮南晉王李克用遣人以書幣假道于匡凝以聘于楊行密求歸儼等晉王使者為梁得太祖大怒是時梁已破兗鄆遣氏叔琮康懷英等攻匡凝叔琮取泌隨二州懷英取鄧州匡凝懼請盟乃止太祖弒昭宗將謀代唐畏匡凝兄弟不從遣使告之匡凝對使者流涕答曰受唐恩深不敢妄有他志太祖遣楊師厚攻之太祖以兵殿漢北匡凝戰敗以輕舟奔于楊行密師厚進攻荊南匡明奔于蜀匡凝至廣陵行密見之戲曰君在鎮時輕車重馬歲輸于梁今敗乃歸我乎匡凝曰僕世為唐臣歲時職貢非輸賊也今以不從賊之故力屈歸公惟公生死之耳行密厚遇之其後行密死楊渥稍不禮之渥方宴食青梅匡凝顧渥曰勿多食發小兒熱諸將以為慢渥遷匡凝海陵後為徐溫所殺匡明卒于蜀
