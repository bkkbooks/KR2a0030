body:
  text: 新五代史卷二十九晉臣傳第十七桑維翰桑維翰字國僑河南人也為人醜怪身短而面長常臨鑑以自奇曰七尺之身不如一尺之面慨然有志於公輔初舉進士主司惡其姓以桑喪同音人有勸其不必舉進士可以從他求仕者維翰慨然乃著日出扶桑賦以見志又鑄鐵硯以示人曰硯弊則改而他仕卒以進士及第晉高祖辟為河陽節度掌書記其後常以自從高祖自太原徙天平不受命而有異謀以問將佐將佐皆恐懼不敢言獨維翰與劉知遠贊成之因使維翰為書求援於契丹耶律德光已許諾而趙德鈞亦以重賂啖德光求助己以篡唐高祖懼事不果乃遣維翰往見德光為陳利害甚辨德光意乃決卒以滅唐而興晉維翰之力也高祖即位以維翰為翰林學士禮部侍郎知樞密院事遷中書侍郎同中書門下平章事兼樞密使天福四年出為相州節度使歲餘徙鎮泰寧吐渾白承福為契丹所迫附鎮州安重榮以歸晉重榮因請與契丹絶好用吐渾以攻之高祖重違重榮意未決維翰上疏言契丹未可與爭者七高祖召維翰使者至臥內謂曰北面之事方撓吾胸中得卿此疏計已決矣可無憂也維翰又勸高祖幸鄴都七年高祖在鄴維翰來朝徙鎮晉昌出帝即位召拜侍中而景延廣用事與契丹絶盟維翰言不能入乃陰使人說帝曰制契丹而安天下非用維翰不可乃出延廣於河南拜維翰中書令復為樞密使封魏國公事無巨細一以委之數月之間百度寖理初李瀚為翰林學士好飲而多酒過高祖以為浮薄天福五年九月詔廢翰林學士按唐六典歸其職於中書舍人而端明殿學士樞密院學士皆廢及維翰為樞密使復奏置學士而悉用親舊為之維翰權勢既盛四方賂遺歲積巨萬內客省使李彥韜端明殿學士馮玉用事共讒之帝欲驟黜維翰大臣劉昫李嵩皆以為不可卒以玉為樞密使既而以為相維翰日益見疏帝飲酒過度得疾維翰遣人陰白太后請為皇弟重睿置師傅帝疾愈知之怒乃罷維翰以為開封尹維翰遂稱足疾稀復朝見契丹屯中渡破欒城杜重威等大軍隔絶維翰曰事急矣乃見馮玉等計事而謀不合又求見帝帝方調鷹於苑中不暇見維翰退而歎曰晉不血食矣自契丹與晉盟始成於維翰而終敗於景延廣故自兵興契丹凡所書檄未嘗不以此兩人為言耶律德光犯京師遣張彥澤遺太后書問此兩人在否可使先來而帝以維翰嘗議毋絶盟而己違之也不欲使維翰見德光因諷彥澤圖之而彥澤亦利其資産維翰狀貌既異素以威嚴自持晉之老將大臣見者無不屈服彥澤以驍捍自矜每往候之雖冬月未嘗不流汗初彥澤入京師左右勸維翰避禍維翰曰吾為大臣國家至此安所逃死邪安坐府中不動彥澤以兵入問維翰何在維翰厲聲曰吾晉大臣自當死國安得無禮邪彥澤股栗不敢仰視退而謂人曰吾不知桑維翰何如人今日見之猶使人恐懼如此其可再見乎乃以帝命召維翰維翰行遇李嵩立馬而語軍吏前白維翰請赴侍衛司獄維翰知不免顧嵩曰相公當國使維翰獨死嵩慚不能對是夜彥澤使人縊殺之以帛加頸告德光曰維翰自縊德光曰我本無心殺維翰維翰何必自致德光至京師使人檢其尸信為縊死乃以尸賜其家而資財悉為彥澤所掠景延廣景延廣字航川陝州人也父建善射嘗教延廣曰射不入鐵不如不發由是延廣以挽彊見稱事梁邵王友誨友誨謀反被幽延廣亡去後從王彥章戰中都彥章敗延廣身被數創僅以身免明宗時朱守殷以汴州反晉高祖為六軍副使主誅從守殷反者延廣為汴州軍校當誅高祖惜其才陰縱之使亡後録以為客將高祖即位以為侍衛步軍都指揮使領果州團練使徙領寧江軍節度使天福四年出鎮義成又徙保義復召為侍衛馬步軍都虞候徙鎮河陽三城遷馬步軍都指揮使領天平高祖崩出帝立延廣有力頗伐其功初出帝立晉大臣議告契丹致表稱臣延廣獨不肯但致書稱孫而已大臣皆知其不可而不能奪契丹果怒數以責晉延廣謂契丹使者喬瑩曰先皇帝北朝所立今天子中國自冊可以為孫而不可為臣且晉有橫磨大劍十萬口翁要戰則來他日不禁孫子取笑天下瑩知其言必起兩國之爭懼後無以取信也因請載于紙以備遺忘延廣敕吏具載以授瑩瑩藏其書衣領中以歸具以延廣語告契丹契丹益怒天福八年秋出帝幸大年莊還置酒延廣第延廣所進器服鞍馬茶牀椅榻皆裹金銀飾以龍鳳又進帛五千匹綿一千四百兩馬二十二匹玉鞍衣襲犀玉金帶等請賜從官自皇弟重睿下至伴食刺史重睿從者各有差帝亦賜延廣及其母妻從事押衙孔目官等稱是時天下旱蝗民餓死者歲十數萬而君臣窮極奢侈以相誇尚如此明年春契丹入寇延廣從出帝北征為御營使相拒澶魏之間先鋒石公霸遇虜於戚城高行周符彥卿兵少不能救馳騎促延廣益兵延廣按兵不動三將被圍數重帝自御軍救之三將得出皆泣訴然延廣方握親兵恃功恣橫諸將皆由其節度帝亦不能制也契丹嘗呼晉人曰景延廣喚我來何不速戰是時諸將皆力戰而延廣未嘗見敵契丹已去延廣獨閉壁不敢出自延廣一言而契丹與晉交惡凡號令征伐一出延廣晉大臣皆不得與故契丹凡所書檄未嘗不以延廣為言契丹去出帝還京師乃出延廣為河南尹留守西京明年出帝幸澶淵以延廣從皆無功延廣居洛陽鬱鬱不得志見晉日削度必不能支契丹乃為長夜之飲大治第宅園置妓樂惟意所為後帝亦追悔遣供奉官張暉奉表稱臣以求和德光報曰使桑維翰景延廣來而割鎮定與我乃可和晉知其不可乃止契丹至中渡延廣屯河陽聞杜重威降乃還德光犯京師行至相州遣騎兵數千雜晉軍渡河趨洛以取延廣戒曰延廣南奔吳西走蜀必追而取之而延廣顧慮其家未能引決虜騎奄至乃與從事閻丕馳騎見德光於封丘并丕見鎖延廣曰丕臣從事也以職相隨何罪而見鎖丕乃得釋德光責延廣曰南北失歡皆因爾也召喬瑩質其前言延廣初不服瑩從衣領中出所藏書延廣乃服因以十事責延廣每服一事授一牙籌授至八籌延廣以面伏地不能仰視遂叱而鎖之將送之北行至陳橋止民家夜分延廣伺守者殆引手扼吭而死時年五十六漢高祖時贈侍中嗚呼自古禍福成敗之理未有如晉氏之明驗也其始以契丹而興終為契丹所滅然方其以逆抗順大事未集孤城被圍外無救援而徒將一介之命持片舌之彊能使契丹空國興師應若符契出危解難遂成晉氏當是之時維翰之力為多及少主新立釁結兵連敗約起爭發自延廣然則晉氏之事維翰成之延廣壞之二人之用心者異而其受禍也同其故何哉蓋夫本末不順而與夷狄共事者常見其禍未見其福也可不戒哉可不戒哉吳巒吳巒字寶川鄆州盧縣人也少舉明經不中清泰中為大同沙彥珣節度判官晉高祖起太原召契丹為援契丹過雲州彥珣出城迎謁為契丹所虜城中推巒主州事巒即閉門拒守契丹以兵圍之高祖入立以雲州入于契丹而巒猶守城不下契丹圍之凡七月高祖義巒所為乃以書告契丹使解兵去高祖召巒以為武寧軍節度副使諫議大夫復州防禦使出帝即位與契丹絶盟河北諸州皆警以謂貝州水陸之衝緩急可以轉餉乃積芻粟數十萬以王令溫為永清軍節度使令溫牙將邵珂素驕很難制令溫奪其職珂間居無憀乃陰使人亡入契丹言貝州積粟多而無兵守可取令溫以事朝京師心頗疑珂乃質其子崇範以自隨晉大臣以巒前守雲州七月契丹不能下乃遣巒馳驛代令溫守貝州巒善撫士卒會天大寒裂其帷幄以衣士卒士卒皆愛之珂因求見巒願自效巒推心信之開運元年正月契丹南寇圍貝州巒命珂守南門契丹圍三日四面急攻之巒從城上投薪草焚其梯衝殆盡已而珂自南門引契丹入巒守東門方戰而左右報珂反巒顧城中已亂即投井死而令溫家屬為契丹所虜出帝憫之以令溫為武勝軍節度使後纍歷方鎮周顯德中卒令溫瀛州河間人也王令溫疑邵珂而質其子矣巒不能察其奸反委以兵及契丹入貝州又不拒戰遽投井死其死不足貴故不列於死事
