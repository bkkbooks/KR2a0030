body:
  text: 新五代史卷四十八雜傳第三十六盧文進盧文進字大用范陽人也為劉守光騎將唐莊宗攻范陽文進以先降拜壽州刺史莊宗以屬其弟存矩存矩為新州團練使統山後八軍莊宗與劉鄩相拒於莘召存矩會兵擊鄩存矩募山後徑兵數千人課民出馬民以十牛易一馬山後之人皆怨而兵又不樂南行行至祁溝關聚而謀為亂文進有女幼而美存矩求之為側室文進以其大將不敢拒雖與心常歉之也因與亂軍殺存矩反攻新州不克攻武州又不克遂奔于契丹契丹使守平州明宗即位文進自平州率衆數萬歸唐明宗得之喜甚以為義成軍節度使居歲餘徙鎮威勝加同平章事入為上將軍出鎮昭義徙安遠晉高祖立與契丹約為父子文進懼不自安天福元年冬殺其行軍司馬馮知兆副使杜重貴送款於李遣兵迎之文進居數鎮頗有善政兵民愛之其將行也從數騎自至營中別其將士告以避契丹之意將士皆再拜為訣乃南奔以文進為天雄統軍宣潤節度使文進身長七尺狀貌偉然自其奔契丹也數引契丹攻掠幽薊之間虜其人民教契丹以中國織紝工作無不備契丹由此益強同光中契丹數以奚騎出入塞上攻掠燕趙人無寧歲唐兵屯涿州歲時饋運自瓦橋關至幽州嚴兵斥候常苦鈔奪為唐患者十餘年皆文進為之也及其南奔始屈身晦迹務為恭謹禮接文士謙謙若不足其所談論近代朝廷儀制臺閣故事而已未嘗言兵後以左衛上將軍卒于金陵李金全李金全其先出於吐谷渾金全少為唐明宗廝養以驍勇善騎射常從明宗戰伐以功為刺史天成中為彰義軍節度使在鎮務為貪暴罷歸獻馬數十匹居數日又以獻明宗謂曰卿患馬多邪何進獻之數也且卿在涇州治狀如何無乃以馬為事乎金全慚不能對徙鎮橫海久之罷為右衛上將軍晉高祖時安州屯防指揮使王暉殺節度使周瓌高祖遣金全將騎兵千人以往下詔書招暉曰暉降以為唐州刺史又以信箭諭安州不戮一人且戒金全曰無失吾信金全未至襄州安從進意暉必走江南以精兵遮其要路暉聞金全來果南走為從進兵所殺金全後至得暉餘黨數百人皆送京師暉之亂也大掠城中三日金全利其所掠資因擒其將武克和等十餘人殺之克和呼曰王暉首亂猶賜之信誓以為刺史我等何罪反見殺邪若朝廷之命何以示信苟將軍違詔而殺降亦將不免也高祖不能詰即以金全為安遠軍節度使金全左都押衙明漢榮用事所為不法高祖患之不欲因漢榮以纍功臣為選廉吏賈仁沼代之且召漢榮漢榮教金全留己而不遣金全客龐令圖諫曰仁沼昔事王晏球晏球攻王都於中山都遣善射者登城射晏球中兜牟仁沼從後引弓射善射者一發而斃晏球求其人欲厚賞之仁沼退而不言此天下之忠臣也都敗晏球遣仁沼獻捷于京師凡所賜與甚厚悉以分故人親戚之貧者此天下之廉士也為人如此豈有為人謀而不善者乎宜納仁沼而遣漢榮漢榮聞之夜使人殺令圖而鴆仁沼仁沼舌壞而死天福五年夏高祖以馬全節代金全而仁沼二子欲詣京師訴其父冤漢榮大懼紿金全曰前日天子召漢榮公違詔而不遣仁沼之死其二子將訴于朝今以全節代公是召公對獄也金全信之遂叛送款于李高祖發兵三萬授全節討之遣其將李承裕入安州金全遂南奔行至川引頸北望涕泣而去以金全為天威統軍漢隱帝時李守貞反河中乞兵於金全為潤州節度使與查文徽等出沭陽之諸將皆鋭於攻取金全獨以謂遠不相及不可行乃止其後亦不復用不知其所終楊思權楊思權邠州新平人也事梁為控鶴右第一軍使唐莊宗滅梁以為夾馬都指揮使明宗時秦王從榮為河東節度使以馮贇為副思權為北京步軍都指揮使以佐佑之從榮素驕所為多不法是時宋王從厚為河南尹從厚年少謙恭好禮明宗陰遣人從容語從厚之善以諷勉之從榮不悅告思權曰天下共賢河南而非我我將廢矣奈何思權曰公有甲士而思權在何患也乃勸從榮招募死士增利器械以為備馮贇患之以其事聞明宗召思權還京師以從榮故亦不之責也後為右羽林都指揮使將兵戍興元潞王從珂反鳳翔興元張虔釗會諸鎮兵討賊諸鎮兵圍鳳翔思權攻城西嚴衛指揮使尹暉攻城東破其兩關城從珂登城呼外兵告以己非反者其語甚哀外兵聞者皆悲之而虔釗督戰甚急軍士反兵逐虔釗思權因呼其衆曰潞王真吾主也即擁軍士入城降暉聞思權已降亦麾其軍使解甲由是諸鎮之兵皆潰思權與暉入見從珂思權前曰臣以赤心奉殿下殿下事成願不以防禦團練使處臣乃出一紙於懷中曰願志臣姓名以為驗從珂即書曰可邠寧節度使廢帝入立拜思權靜難軍節度使後為右龍武統軍左衛上將軍天福八年卒于京師贈太傅尹暉尹暉者魏州大名人也從廢帝入洛陽而晉高祖來朝與暉遇于道暉時猶為嚴衛指揮使恃先降功不為高祖屈馬上橫鞭揖之高祖怒白廢帝暉不可與名藩乃以為應州節度使晉高祖入立罷為右衛大將軍范延光反以書招暉暉懼出奔淮南為人所殺有子勳王弘贄王弘贄不知其世家何人也唐明宗時為合階二州刺史右千牛衛將軍衛州刺史潞王從珂反於鳳翔擁兵東至陝愍帝懼夜以百餘騎出奔至衛州東七八里遇晉高祖將朝于京師騶呵前導者不避愍帝遣左右叱之對曰成德軍節度使石敬瑭也愍帝即下馬慟哭謂敬瑭曰潞王反康義誠等皆叛我我無所依長公主教我逆爾于路高祖曰衛州刺史王弘贄宿將也且多知時事請就圖之即馳騎前見弘贄曰主上危迫吾戚屬也何以圖全弘贄曰天子避狄自古有之然將相大臣從乎曰無也國寶乘輿法物從乎曰無也弘贄歎曰所謂大木將顛非一繩所維今萬乘之主以百騎出奔而將相大臣無一人從者則人心去就可知也雖欲興復其可得乎即從高祖上謁於驛舍高祖且以弘贄語白愍帝弓箭庫使沙守榮奔弘進前謂高祖曰主上明宗愛子公愛壻也公於此時不能報國而反問大臣國寶所在公亦助賊反邪乃抽佩刀刺高祖高祖親將陳暉扞之守榮與暉戰死弘進亦自刎高祖因盡殺帝從兵獨留帝于驛而去弘贄奉帝居于州廨弘贄有子巒為殿直廢帝入立遣巒持鴆與弘贄初愍帝在衛州弘贄令市中酒家獻酒愍帝見之大驚遽殞于地久而蘇弘贄曰此酒家也願獻酒以慰無憀愍帝受之由是日獻一觴及巒持鴆至因使酒家獻之愍帝飲而不疑遂崩弘贄後事晉為鳳翔行軍司馬以光祿卿致仕卒贈太傅劉審交劉審交字求益幽州文安人也少略知書通於吏事為唐興令補范陽牙校劉守光僭號以審交為兵部尚書守光敗歸于太原唐莊宗以為從事其後趙德鈞鎮范陽北面轉運使馬紹宏辟審交判官王晏球討王都以為轉運供軍使定州平拜遼州刺史復為北面轉運使改慈州刺史以母老去官母喪哀毀過禮不調纍年晉高祖即位楊光遠討范延光於魏州審交復為供軍使是時晉高祖分戶部度支鹽鐵為三使歲餘三司益煩弊乃復合為一拜審交三司使議者請檢天下民田宜得益租審交曰租有定額而天下比年無間田民之苦樂不可等也遂止不檢而民賴以不擾遷右衛上將軍陳州防禦使出視民田見民耕器薄陋乃取河北耕器為範為民更鑄安從進平徙審交襄州又徙青州皆有善政罷還契丹犯京師留蕭翰而去翰復以審交為三司使已而翰召許王從益守京師漢高祖起義太原從益召高行周以拒高祖行周不至從益母王淑妃與羣臣謀迎高祖或以謂燕兵在京師者猶數千可以城守而待行周淑妃不從議未決審交進曰余燕人也今為燕守城當為燕謀然事勢不可為也太妃語是從益乃罷不設備遣人西迎高祖高祖至罷審交不用隱帝時為汝州防禦使有能名乾祐三年卒年七十四川人聚哭柩前上疏乞留葬近郊使民得歲時祠祭詔特贈太尉起祠立碑王周王周魏州人也少以勇力從軍事唐莊宗明宗為裨校以力戰有功拜刺史晉天福中從楊光遠討范延光於魏州又從杜重威討安重榮於鎮州皆有功歷貝州涇州節度使涇州張彥澤為政苛虐民多流亡周乃更為寬恕問民疾苦去其苛弊二十餘事民皆復歸歷遷武勝保義義武成德四鎮皆有善政定州橋壞覆民租車周曰橋梁不修刺史過也乃償民粟為治其橋杜重威降契丹契丹兵過鎮州臨城呼周使出降周泣曰受晉厚恩不能死戰而以城降何面目南行見人主與士大夫乎乃劇飲求刀欲自引決家人止之迫以出降契丹以周為武勝軍節度使漢高祖入立徙鎮武寧卒于鎮贈中書令高行周行圭附高行周字尚質媯州人也世為懷戎戍將父思繼思繼兄弟皆以武勇雄於北邊為幽州節度使李匡威戍將匡威為其弟匡儔所篡晉王將討其亂謀曰高思繼兄弟在孔領關有兵三千此後患也不如遣人招之思繼為吾用則事無不成克用遣人招思繼兄弟燕俗重氣義思繼等聞晉兵為匡威報仇乃欣然從之為晉兵前鋒匡儔聞思繼兄弟皆叛乃棄城走克用以劉仁恭守幽州以其兄某為先鋒都指揮使思繼為中軍都指揮使弟某為後軍都指揮使高氏兄弟分掌燕兵克用臨訣謂仁恭曰思繼兄弟勢傾一方為燕患者必高氏也宜善為防克用留晉兵千人為仁恭衛而晉兵多犯法思繼等數誅殺之克用以責仁恭仁恭以高氏為訴由是晉盡誅思繼兄弟仁恭以其兄某之子行圭為牙將而思繼子行周年十餘歲亦收之帳下稍長補以軍職仁恭被囚守光立以行圭為武州刺史其後守光背晉晉兵攻之守光將元行欽牧馬山後聞守光且見圍即率所牧馬赴援而麾下兵叛于道推行欽為幽州留後行欽曰吾所憚者行圭也乃遣人之懷戎得行圭子縶之兵過武州招行圭曰守光可取而代也當從我行不然且殺公子行圭謝曰與君俱劉公將而忍叛之吾當為劉氏也尚何顧吾子耶行欽即以兵圍行圭月餘行圭城中食盡召其州人告曰吾非不為父老守也今劉公救兵不至奈何可殺吾以降晉父老皆泣願以死守是時行周適從行圭在武州即夜縋行周馳入晉見莊宗莊宗因遣明宗救武州比至行欽已解去行圭乃降晉莊宗時歷朔欣嵐三州刺史大同軍節度使明宗入立徙鎮威勝安遠行圭性貪鄙所為多不法副使范延策為人剛直數規諫之行圭不聽銜之已而戍兵有謀叛者行圭先覺之因潛徙庫兵于他所戍兵叛趨庫劫兵無所得乃潰去行圭追而殺之因誣奏延策同反並其子皆見殺天下冤之行圭卒于鎮贈太尉當行圭之降晉也行周隸明宗帳下初為裨將趙德鈞識之謂明宗曰此子貌厚而小心他日必大貴宜善待之梁晉軍河上莊宗遣明宗東襲鄆州行周將前軍夜遇雨軍中皆欲止不進行周曰此天贊我也鄆人恃雨不備吾來宜出其不意即夜馳涉濟入其城鄆人方覺遂取之莊宗滅梁以功領端州刺史遷絳州明宗時從平朱守殷克王都遷潁州團練使振武軍節度使歷鎮彰武昭義晉高祖時為西京留守徙鎮天雄安從進叛以行周為襄州行營都部署討平之徙鎮歸德出帝時代景延廣為侍衛親軍都指揮使是時李彥韜馮玉等用事乃求歸鎮契丹滅晉留蕭翰守汴翰又棄去召唐故許王從益入汴而漢高祖起太原從益遣人召行周將以拒漢行周歎曰衰世難輔況兒戲乎乃不從漢高祖入京師加行周守中書令徙鎮天平軍封臨清王周太祖入立封齊王卒贈尚書令追封秦王有子懷德白再榮白再榮不知其世家何人也少為軍卒唐晉之間為護聖指揮使契丹犯京師再榮從契丹北歸至鎮州契丹留麻答守鎮州而去晉人從者多留焉居未幾李筠何福進等謀逐麻答使人召再榮再榮遲疑不欲往軍士迫之乃往共攻之麻答走諸將以再榮名次最高乃推為留後再榮出於行伍貪而無謀是時李嵩和凝等皆隨契丹留鎮州再榮以兵環其居迫而求物又欲害嵩取其資李穀謂曰公等親被契丹之苦憂死不暇然逐麻答者乃衆人所為非獨公力也今才得生路而遽殺宰相此契丹尚或不為然它日至京師天子問宰相何在何以對之再榮默然乃止而悉拘嘗事麻答者取其財鎮人謂之白麻答漢高祖即位拜再榮為留後遷義成軍節度使罷還京師周太祖以兵入京師軍士攻再榮於第悉取其財已而前啓曰士卒嘗事公隸麾下一旦無禮如此亦復何面見公乎乃斬之攜其首而去家人以帛贖而葬之安叔千安叔千字胤宗沙陀三部落人也少善騎射事唐莊宗以為奉安指揮使明宗時與討王都拜秦州刺史從擊契丹為先鋒都指揮使以功拜昭武軍節度使歷靜難橫海安國建雄四鎮叔千狀貌堂堂而不通文字所為鄙陋人謂之沒字碑晉出帝時為左金吾衛上將軍契丹犯京師晉百官迎見耶律德光于赤岡叔千出班夷言德光勞曰是安沒字否汝在邢州已通誠款吾今至此當與汝一喫飯處叔千再拜乃以為鎮國軍節度使漢高祖入立罷歸京師自以常私附契丹頗懷愧懼以太子太師致仕周太祖兵入京師軍士大掠叔千家資已盡而軍士意其有所藏者箠掠不已傷重歸于洛陽卒年七十二
