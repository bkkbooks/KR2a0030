body:
  text: 新五代史卷六十八閩世家第八王審知子延翰子鏻鏻子繼鵬延羲延政王審知字信通光州固始人也父恁世為農兄潮為縣史唐末羣盜起壽州人王緒攻陷固始緒聞潮兄弟材勇召置軍中以潮為軍校是時蔡州秦宗權方募士以益兵乃以緒為光州刺史召其兵會擊黃巢緒遲留不行宗權發兵攻緒緒率衆南奔所至剽掠自南康入臨汀陷漳浦有衆數萬緒性猜忌部將有材能者多因事殺之潮頗自懼軍次南安潮說其前鋒將曰吾屬棄墳墓妻子而為盜者為緒所脅爾豈其本心哉今緒雄猜將吏之材能者必死吾屬不自保朝夕況欲圖成事哉前鋒將大悟與潮相持而泣乃選壯士數十人伏篁竹間伺緒至躍出擒之囚之軍中緒所自殺緒已見廢前鋒將曰生我者潮也乃推潮為主是時泉州刺史廖彥若為政貪暴泉人苦之聞潮略地至其境而軍行整肅其耆老相率遮道留之潮即引兵圍彥若逾年克之光啓二年福建觀察使陳巖表潮泉州刺史景福元年巖卒其壻范暉自稱留後潮遣審知攻暉久不克士卒傷死甚衆審知請班師潮不許又請潮自臨軍且益兵潮報曰兵與將俱盡吾當自往審知乃親督士卒攻破之暉見殺唐即以潮為福建觀察使潮以審知為副使審知為人狀雄偉隆準方口常乘白馬軍中號白馬三郎乾寧四年潮卒審知代立唐以福州為威武軍拜審知節度使纍遷同中書門下平章事封琅琊王唐亡梁太祖加拜審知中書令封閩王升福州為大都督府是時楊行密據有江淮審知歲遣使泛海自登萊朝貢于梁使者入海覆溺常十三四審知雖起盜賊而為人儉約好禮下士王淡唐相溥之子楊沂唐相涉從弟徐寅唐時知名進士皆依審知仕宦又建學四門以教閩士之秀者招來海中蠻夷商賈海上黃崎波濤為阻一夕風雨雷電震擊開以為港閩人以為審知德政所致號為甘棠港審知同光三年卒年六十四諡日忠懿子延翰立延翰字子逸審知長子也同光四年唐拜延翰節度使是歲莊宗遇弒中國多故延翰乃取司馬遷史記閩越王無諸傳示其將吏曰閩自古王國也吾今不王何待之有於是軍府將吏上書勸進十月延翰建國稱王而猶稟唐正朔延翰為人長大美如玉其妻崔氏陋而淫延翰不能制審知喪未期徹其几筵又多選良家子為妾崔氏性妬良家子之美者輒幽之別室繫以大械刻木為人手以擊頰又以鐵錐刺之一歲中死者八十四人崔氏後病見以為祟而卒審知養子建州刺史延稟本姓周氏自審知時與延翰不叶延翰立以其弟延鈞為泉州刺史延鈞怒二人因謀作亂十二月延稟延鈞皆以兵入執延翰殺之而延鈞立更名鏻鏻審知次子也唐即拜鏻節度使纍加檢校太師中書令封閩王初延稟與鏻之謀殺延翰也延稟之兵先至已執延翰而殺之明日鏻兵始至延稟自以養子推鏻而立之延稟還建州鏻餞于郊延稟臨訣謂鏻曰善繼先志毋煩老兄復來鏻銜之長興二年延稟率兵擊鏻攻其西門使其子繼雄轉海攻其南門鏻遣王仁達拒之仁達伏甲舟中僞立白幟請降繼雄信之登舟伏兵發刺殺之梟其首西門其兵見之皆潰去延稟見執鏻誚之曰豫不能繼先志果煩老兄復來延稟不能對遂殺之延稟子繼升守建州聞敗奔于錢塘長興三年鏻上書言楚王馬殷吳越王錢鏐皆為尚書令今皆已薨請授臣尚書令唐不報鏻遂絶朝貢鏻好鬼神道家之說道士陳守元以左道見信建寶皇宮以居之守元謂鏻曰寶皇命王少避其位後當為六十年天子鏻欣然遜位命其子繼鵬權主府事既而復位遣守元問寶皇六十年後將安歸守元傳寶皇語曰六十年後當為大羅仙人鏻乃即皇帝位受冊於寶皇以黃龍見真封宅改元為龍啓國號閩追諡審知為昭武孝皇帝廟號太祖立五廟置百官以福州為長樂府而閩地狹國用不足以中軍使薛文傑為國計使文傑多察民間陰事致富人以罪而籍沒其資以佐用閩人皆怨又薦妖巫徐彥曰陛下左右多姦臣不質諸鬼神將為亂鏻使彥視鬼於宮中文傑與內樞密使吳英有隙英病在告文傑謂英曰上以公居近密而屢以疾告將罷公英曰奈何文傑因教英曰即上遣人問公疾當言頭痛而已無他苦也英以為然明日諷鏻使巫視英疾巫言入北廟見英為崇順王所訊曰汝何敢謀反以金槌擊其首鏻以語文傑文傑曰未可信也宜問其疾如何鏻遣人問之英曰頭痛鏻以為然即以英下獄命文傑劾之英自誣伏見殺英嘗主閩兵得其軍士心軍士聞英死皆怒是歲吳人攻建州鏻遣其將王延宗救之兵士在道不肯進曰得文傑乃進鏻惜之不與其子繼鵬請與之以紓難乃以檻車送文傑軍中文傑善數術自占云過三日可無患送者聞之疾馳二日而至軍士踴躍磔文傑於市閩人爭以瓦石投之臠食立盡明日鏻使者至赦之已不及初文傑為鏻造檻車以謂古制疏闊乃更其制令上下通中以鐵芒內嚮動輒觸之既成首被其毒龍啓三年改元永和王仁達為鏻殺延稟有功而典親兵鏻心忌之嘗問仁達曰趙高指鹿為馬以愚二世果有之邪仁達曰秦二世愚故高指鹿為馬非高能愚二世也今陛下聰明朝廷官不滿百起居動靜陛下皆知之敢有作威福者族滅之而已鏻慚賜與金帛慰安之退而謂人曰仁達智略在吾世可用不可遺後世患卒誣以罪殺之鏻妻早卒繼室金氏賢而不見答審知婢金鳳姓陳氏鏻嬖之遂立以為后初鏻有嬖吏歸守明者以色見幸號歸郎鏻後得風疾陳氏與歸郎奸又有百工院使李可殷因歸郎以通陳氏鏻命錦工作九龍帳國人歌曰誰謂九龍帳惟貯一歸郎鏻婢春燕有色其子繼鵬蒸之鏻已病繼鵬因陳氏以求春燕鏻怏怏與之其次子繼韜怒謀殺繼鵬繼鵬懼與皇城使李倣圖之是歲十月鏻饗軍于大酺殿坐中昏然言見延稟來倣以為鏻病已甚乃令壯士先殺李可殷于家明日晨朝鏻無恙問倣殺可殷何罪倣懼而出與繼鵬率皇城衛士而入鏻聞鼓噪聲走匿九龍帳中衛士刺之不殂宮人不忍其苦為絶之繼韜及陳后歸郎皆為倣所殺鏻立十年見殺諡曰惠皇帝廟號太宗繼鵬鏻長子也既立更名昶改元通文以李倣判六軍諸衛事倣有弒君之罪既立昶而心常自疑多養死士以為備昶患之因大享軍伏甲擒倣殺之梟其首于市倣部曲千人叛燒啓聖門奪倣首奔於錢塘晉天福二年昶遣使朝貢京師高祖遣散騎常侍盧損冊昶閩王拜其子繼恭臨海郡王損至閩昶稱疾不見令繼恭主之又遣中書舍人劉乙勞損于館乙衣冠偉然騶僮甚盛他日損遇乙于塗布衣芒屩而已損使人誚之曰鳳閣舍人何逼下之甚也乙羞愧以手掩面而走昶聞之怒損侵辱之損還昶無所答而其子繼恭遣其佐鄭元弼隨損至京師貢方物致書晉大臣述昶意求以敵國禮相往來高祖怒其不遜下詔暴其罪歸其貢物不納兵部員外郎李知損上書請籍沒其物而禁錮使者於是以元弼下獄獄具引見元弼俯伏曰昶夷貊之君不知禮義陛下方示大信以來遠人臣將命無狀願伏斧鑕以贖昶罪高祖乃赦元弼遣歸昶亦好巫拜道士談紫霄為正一先生又拜陳守元為天師而妖人林興以巫見幸事無大小興輒以寶皇語命之而後行守元教昶起三清臺三層以黃金數千斤鑄寶皇及元始天尊太上老君像日焚龍腦薰陸諸香數斤作樂于臺下晝夜聲不輟云如此可求大還丹三年夏虹見其宮中林興傳神言此宗室將為亂之兆也乃命興率壯士殺審知子延武延望及其子五人後興事敗亦被殺而昶愈惑亂立父婢春燕為淑妃後立以為皇后又遣醫人陳究以空名堂牒賣官昶弟繼嚴判六軍諸衛事昶疑而罷之代以季弟繼鏞而募勇士為宸衛都以自衛其賜豫給賞獨厚於他軍控鶴都將連重遇拱宸都將朱文進皆以此怒激其軍是歲夏術者言昶宮中當有災昶徙南宮避災而宮中火昶疑重遇軍士縱火內學士陳郯素以便佞為昶所親信昶以火事語之郯反以告重遇重遇懼夜率衛士縱火焚南宮昶挾愛姬子弟黃門衛士斬關而出宿于野次重遇迎延羲立之延羲令其子繼業率兵襲昶及之射殺數人昶知不免擲弓于地繼業執而殺之及其妻子皆死無遺類延羲立諡昶曰康宗延羲審知少子也既立更名曦遣使者朝貢于晉改元永隆鑄大鐵錢以一當十曦自昶世倔彊難制昶相王倓每抑折之曦亦憚倓不敢有所發新羅遣使聘閩以寶劍昶舉以示倓曰此將何為倓曰不忠不孝者斬之曦居旁色變曦既立而新羅復獻劍曦思倓前言而倓已死命發冢戮其尸倓面如生血流被體泉州刺史余廷英嘗矯曦命掠取良家子曦怒召下御史劾之廷英進買宴錢千萬曦曰皇后土貢何在廷英又獻皇后錢千萬乃得不劾曦嘗嫁女朝士有不賀者笞之御史中丞劉贊坐不糾舉將加笞諫議大夫鄭元弼切諫曦謂元弼曰卿何如魏鄭公乃敢彊諫元弼曰陛下似唐太宗臣為魏鄭公可矣曦喜乃釋贊不笞曦弟延政為建州節度使封富沙王自曦立不叶數舉兵相攻曦由此惡其宗室多以事誅之諫議大夫黃峻舁櫬詣朝堂極諫曦怒貶峻漳州司戶參軍校書郎陳光逸上書疏曦過惡五十餘事曦命衛士鞭之百而不死以繩係頸掛于木久而乃絶國計使陳匡範增算商之法以獻曦曰匡範人中寶也已而歲入不登其數乃借於民以足之匡範以憂死其後知其借於民也剖棺斷尸棄之水中曦性既淫虐而妻李氏悍而酗酒賢妃尚氏有色而寵李仁遇曦甥也以色嬖之用以為相曦常為牛飲羣臣侍酒醉而不勝有訴及私棄酒者輒殺之諸子繼柔棄酒並殺其贊者一人連重遇殺昶懼為國人所討與朱文進連姻以自固曦心疑之常以語誚重遇等重遇等流涕自辨李氏妬尚妃之寵欲圖曦而立其子亞澄乃使人謂重遇等曰上心不平於二公奈何重遇等懼六年三月曦出遊醉歸重遇等遣壯士拉於馬上而殺之諡曰景宗延政審知子也曦立為淫虐延政數貽書諫之曦怒遣杜建崇監其軍延政逐之曦乃舉兵攻延政為延政所敗延政乃以建州建國稱殷改元天德明年連重遇已殺曦集閩羣臣告曰昔太袓武皇帝親冒矢石遂啓有閩及其子孫淫虐不道今天厭王氏百姓與能當求有德以安此土羣臣皆莫敢議乃掖朱文進升殿率百官北面而臣之文進以重遇判六軍諸衛事王氏子弟在褔州者無少長皆殺之以黃紹頗守泉州程贇守漳州許文縝守汀州稱晉年號時開運元年也泉州軍將留從效詐其州人曰富沙王兵收褔州矣吾屬世為王氏臣安能交臂而事賊乎州人共殺紹頗迎王繼勳為刺史漳州聞之亦殺贇迎王繼成為刺史皆王氏之諸子也文縝懼以汀州降于延政延政已得三州重遇亦殺文進傳首建州以自歸褔州裨將林仁翰又殺重遇謀迎延政都褔州是時南唐李景聞閩亂發兵攻之延政遣其從子繼昌守褔州而南唐兵方急攻延政褔州將李仁達謂其徒曰唐兵攻建州富沙王不能自保其能有此土也乃擒繼昌殺之欲自立懼衆不附以雪峯寺僧卓儼明示衆曰此非常人也被以衮冕率諸將吏北面而臣之已而又殺儼明乃自立送款于李景景以仁達為威武軍節度使更其名曰弘義而景兵攻破建州遷延政族於金陵封鄱陽王是歲景保大四年也留從效聞延政降唐執王繼勳送于金陵李景以泉州為清源軍以從效為節度使景已破延政遣人召李仁達入朝仁達不從遂降于吳越而留從效亦逐景守兵據泉漳二州景猶封從效晉江王周世宗時從效遣牙將蔡仲興為商人間道至京師求置邸內屬是時世宗與李景畫江為界遂不納從效仍臣于南唐其後事具國史晉開運三年丙午南唐保大四年也是歲李景兵破建州王氏滅江南録云保大三年虜王氏之族遷于金陵謬也據王潮實以唐景褔元年入褔州拜觀察使而後人紀録者乃用騎馬來騎馬去之讖以為據遂以王潮光啓二年歲在丙午拜泉州刺史為始年至保大四年歲復在丙午而滅故為六十一年然其奄有閩國則當自景褔元年為始實五十五年也今諸家記其國滅丙午是也其始年則牽於讖書繆矣惟江南録又差其末年也
