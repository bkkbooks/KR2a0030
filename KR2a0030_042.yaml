body:
  text: 新五代史卷四十二雜傳第三十朱宣弟瑾朱宣宋州下邑人也少從其父販鹽為盜父抵法死宣乃去事青州節度使王敬武為軍校敬武以隸其將曹全晟中和二年敬武遣全晟入關與破黃巢還過鄆州鄆州節度使薛崇卒其將崔君預自稱留後全晟攻殺君預遂據鄆州宣以戰功為鄆州馬步軍都指揮使已而全晟死軍中推宣為留後唐僖宗即拜宣天平軍節度使梁太祖鎮宣武以兄事宣太祖新就鎮兵力尚少數為秦宗權所困太祖乞兵於宣宣與其弟瑾以兗鄆之兵救汴大破蔡兵走宗權是時太祖已襲取滑州稍欲並吞諸鎮宣瑾既還乃馳檄兗鄆言宣瑾多誘宣武軍卒亡以東乃發兵收亡卒因攻之遂為敵國苦戰曹濮間是時梁又東攻徐州西有蔡賊北敵強晉宣瑾兄弟自相首尾然卒為梁所滅乾寧四年宣敗走中都為葛從周所執斬于汴橋下今流俗以宣瑾兄於名加王者非也瑾宣從父弟也從宣居鄆州補軍校少倜儻有大志兗州節度使齊克讓愛其為人以女妻之瑾行親迎乃選壯士為輿夫伏兵器輿中夜至兗州兵發遂虜克讓自稱留後僖宗即拜瑾泰寧軍節度使瑾與宣已破秦宗權於汴州梁太祖責瑾誘宣武軍卒以歸遣朱珍攻瑾取曹州又攻濮州而太祖自攻鄆瑾兄弟往來相救凡十餘年大小數十戰與太祖屢相勝敗太祖得宣將賀瓌何懷寶及瑾兄瓊乃將瓊等至兗城下告瑾曰汝兄敗矣今瓊等已降不如早自歸瑾偽曰諾乃遣牙將胡規持書幣詣軍門請降太祖大喜至延壽門與瑾交語瑾曰願得瓊送符印太祖信之遣客將劉捍送瓊往瑾伏壯士橋下單騎迎瓊揮手語捍曰請瓊獨來瓊前壯士擒之遂閉門責瓊先降斬之擲其首城外太祖度不可下乃留兵圍之而去瑾嬰城自守而與葛從周等戰城下瑾兵屢敗宣亦敗於鄆州乃乞兵於晉晉遣李承嗣史儼等以騎兵五千救之太祖已破宣乃急趨兗瑾城中食盡與承嗣等掠食豐沛間梁兵奄至瑾將康懷英等以城降梁瑾等將麾下兵走沂州沂州刺史尹處賓不納又走海州梁兵急追之乃奔于淮南楊行密聞瑾來大喜解其玉帶贈之表瑾領武寧軍節度使以為行軍副使其後梁遣龐師古葛從周等攻淮南行密用瑾大破梁兵於清口斬師古行密纍表瑾東南諸道行營副都統領平盧軍節度使同中書門下平章事行密死渥及隆演相繼立皆年少徐溫與其子知訓專政畏瑾欲除之瑾乃謀殺知訓嘗以月旦遣愛妾候知訓家知訓強通之妾歸自訴瑾益不平屢勸隆演誅徐氏以去國患隆演不能為既而知訓以泗州建靜淮軍出瑾為節度使將行召之夜飲明日知訓過瑾謝延之升堂出其妻陶氏知訓方拜瑾以笏擊踣之伏兵自戶突出殺之初瑾以二惡馬繫庭中知訓入而釋馬使相踶鳴故外人莫聞其變瑾攜其首馳示隆演曰今日為吳除患矣隆演曰此事非吾敢知遽起入內瑾忿然以首擊柱提劍而出府門已闔因踰垣折其足瑾顧路窮大呼曰吾為萬人去害而以一身死之遂自刎潤州徐知誥聞亂以兵趨廣陵族瑾家瑾妻陶氏臨刑而泣其妾曰何為泣乎今行見公矣陶氏收淚欣然就戮聞者哀之瑾名重江淮人畏之其死也尸之廣陵北門路人私共瘞之是時民多病瘧皆取其墓上土以水服之云病輒愈更益新土漸成高墳徐溫等惡之發其尸投於雷公塘後溫病夢瑾挽弓射之溫懼網其骨葬塘側立祠其上初瑾嘗病疽醫者視之色懼瑾曰但理之吾非以病死者於是果然卒年五十二王師範王師範青州人也其父敬武為平盧軍牙將唐廣明元年無棣人洪霸郎為盜齊棣間平盧節度使安師儒遣敬武率兵擊破之敬武反兵逐師儒自稱留後都統王鐸承制拜敬武節度使敬武卒師範尚幼其棣州刺史張蟾叛昭宗以為師範年少其下不服從乃拜太子少師崔安潛為平盧節度使師範不受代蟾迎安潛入棣州師範遣其將盧洪攻蟾洪以兵返襲青州師範陽為好辭遣人迎語洪曰吾幼未能任事賴諸將共持之爾不然聽公所為也洪以師範無能為遽還不為備師範伏兵於道語其僕劉鄩曰洪來為我斬之用爾為牙將明日洪來師範出迎鄩於坐上斬之伏兵發盡殺其餘兵乃急攻棣州破張蟾安潛奔歸于京師昭宗乃拜師範節度使師範頗好儒學聚書至萬卷為政有威愛梁太祖圍昭宗於鳳翔宦官韓全誨等矯詔召諸鎮兵以擊梁詔至青州師範泣曰諸鎮有兵所以藩扞天子今天子危辱而諸鎮反以兵自衛吾雖力不足當成敗以之乃遣使乞兵於楊行密是時梁已東下兗鄆師範乃遣劉鄩與其弟師魯分攻兗密諸州遣張居厚以壯士二百為輿夫伏兵輿中西馳梁軍稱師範使者聘梁因欲劫殺太祖居厚至華州東城華州將婁敬思疑其有異剖輿視之見其兵居厚遂擊殺敬思以兵攻西城不克而反劉鄩逐葛從周取兗州而平盧諸州皆起兵攻梁其後梁太祖自鳳翔東還遣朱友寧攻師範友寧戰死復遣楊師厚攻之屯于臨朐師範以兵迫之師厚陽為怯不敢出間遣人陽言曰梁兵少方乞兵於鳳翔今糧且絶當還軍師範以為然乃遣師魯悉兵攻之師厚拒而不戰師魯兵却師厚追擊至聖王山師魯大敗遂傅其城而梁別將劉重霸下其棣州師範乃請降太祖許之師範素服乘驢詣太祖請罪太祖待以客禮久之表師範河陽節度使太祖即位召為右金吾衛上將軍居于洛陽太祖心欲誅之未有以發太祖諸子已封王宴於宮中友寧妻泣謂太祖曰陛下化家為國諸子人人皆得封而妾夫獨以戰死奈何讎人猶在朝廷太祖奮然戟手曰吾亦幾忘此賊乃遣人就洛陽族滅之使者至先掘坑於外乃入告之師範設席為具與諸宗族飲酒謂使者曰死人之所不免況有罪乎然懼少長失序下愧於先人酒半令少長以次起就戮於坑所聞者皆哀憐之同光三年贈師範太尉李罕之李罕之陳州項城人也為人驍勇力兼數人少學讀書不成去為僧以其無賴所往皆不容乃乞食酸棗市中市中人皆不與罕之擲器于地裂其衣又去為盜是時黃巢起曹濮乃往依之巢北渡江罕之與其麾下走淮南自歸於高駢駢表光州刺史歲餘秦宗權急攻光州罕之不能守還走項城收其餘衆依諸葛爽於河陽爽以罕之為懷州刺史巢已敗走爽降唐僖宗拜爽東南面招討使以攻宗權爽表罕之副使以兵屯宋州又表河南尹東都留守秦宗權遣孫儒攻河南罕之兵少西走澠池儒燒宮闕剽掠而去罕之壁澠池歲餘諸葛爽死其將劉經立爽子仲方仲方年少事皆任經經慮罕之凶勇難制以兵攻之罕之返擊走經罕之追至鞏縣陳舟于汜水將渡河經遣張言拒之河上言反背經與罕之合攻河陽為經所敗退保懷州已而孫儒陷河陽仲方奔于梁梁兵擊走儒罕之襲取河陽言取河南皆附于梁罕之與言皆爽叛將事已成乃相與交臂為盟誓同休戚不相忘罕之御衆無法性苛暴頗失士心而言善治軍旅教民播殖務為積聚罕之用兵言嘗供給其乏罕之求取無已言頗苦之不能輸罕之召言軍吏笞責之言益不平罕之悉兵攻晉絳言夜襲河陽罕之奔晉晉表罕之澤州刺史使李存孝以兵三萬助罕之攻言言求救於梁罕之敗于沇河乃歸太原李克用延之帳中罕之留其子頎事晉乃之澤州日以兵鈔懷孟間啖人為食居民屯聚摩雲山罕之悉攻殺之立柵其上時人號曰李摩雲是時晉方徇地山東頗倚罕之為扞蔽李茂貞等犯京師克用以兵至渭北僖宗以克用為邠州四面行營都統表罕之為副破王行瑜加檢校太尉食邑千戶罕之自以功多於晉私謂蓋寓曰自吾脫身河陽賴晉容我未能有以報之今行老矣無能為也若吾王見憐與一小鎮使休兵養疾而後歸老幸也寓為言之克用不對他日諸鎮擇守將未嘗及罕之罕之心益怏怏寓告克用懼罕之有他心克用曰吾於罕之豈惜一鎮然鷹鳥之性飽則揚矣光化元年潞州薛志勤卒罕之遽入潞州使人啓晉王曰志勤且死新帥未至所以然者備他盜耳克用大怒遣李嗣昭攻之罕之執晉守將馬溉伊鐔等遣子皓送于梁以乞兵梁太祖遣丁會守潞州以罕之為河陽節度使行至懷州以疾卒年五十八罕之初背梁而歸晉晉王以罕之守澤州罕之留其子頎與莊宗遊甚狎後罕之背晉以歸梁晉王怒欲殺頎莊宗與之駿馬使奔于梁太祖得頎父子大喜使與友倫將兵以衛昭宗故頎當太祖時常掌禁兵末帝誅友圭頎與其謀拜右羽林統軍澶州刺史事唐歷衛衍二州刺史纍遷右領軍衛上將軍天福中卒年七十贈太尉孟方立孟方立邢州平鄉人也少為軍卒以勇力選為隊將唐廣明中潞州節度使高潯攻諸葛爽于河陽遣方立將兵出天井關為先鋒潯為其將劉廣所逐廣為亂軍所殺方立聞亂引兵自天井入據潞州唐因以為昭義軍節度使昭義所節制澤潞邢洺磁五州而治潞州方立以謂潞州山川高險而人俗徑悍自劉稹以來嘗逐其帥且己邢人也因徙其軍于邢州而潞人怨方立之徙也因以澤潞二州歸于晉晉遣李克修為澤潞節度使方立以邢洺磁三州自為昭義軍晉數遣李存孝等出兵以窺山東三州之人俘掠殆盡赤地數千里無復耕桑者纍年方立以孤城自守求救于梁梁方東事兗鄆不能救也文德元年方立乞兵于王鎔以攻晉鎔許之方立乃遣其將奚忠信攻晉遼州而鎔以他故不能出兵兵既失約忠信大敗而晉兵乘勝攻之方立將石元佐者善兵而多智方立嘗信用之忠信之敗也元佐為晉將安金俊所得金俊厚遇之問以攻邢之策元佐曰方立善守而邢城堅若攻之必不得志宜急攻其磁州方立來救可以敗也金俊以為然軍于滏水之西方立果帥兵來救為金俊所敗馳入邢州閉壁不復出外無救兵城中食且盡方立夜出巡城號令守者守者皆不應方立知不可乃歸飲鴆而卒軍中以其弟洺州刺史遷為留後求救於梁梁太祖遣王虔裕將騎兵三百助遷守遷執虔裕降晉晉徙遷族于太原以為汾州刺史後以為澤潞節度使天復元年梁遣氏叔琮攻晉出天井關遷開門降為梁兵鄉道以攻太原不克叔琮軍還過潞以遷歸于梁梁太祖惡其返覆殺之王珂王珂河中人也其仲父重榮以河中兵破黃巢有功於唐拜河中節度使重榮無子以其兄重簡子珂為後重榮卒弟重盈立重盈卒軍中乃以珂重榮子立之重盈子陝州節度使珙絳州刺史瑤與珂爭立珙瑤以書與梁太祖言珂故王氏蒼頭小字忠兒不應得立珂亦求援於晉晉人言之朝昭宗以晉故許之而珙瑤亦西結王行瑜韓建李茂貞為援行瑜等交章論列昭宗報以重榮與晉於唐嘗有大功業許之不可易行瑜等怒以兵犯京師殺宰相李磎等而去珙瑤連兵攻珂河中珂求援於晉晉兵西討三鎮行下絳州斬瑤而過至于渭北擊破行瑜昭宗卒以珂為河中節度使晉以女妻之遣李嗣昭將兵助珂攻珙陝州珙為人慘刻嘗斬人擲其首於前言笑自若其下苦之偏將李璠因珙戰敗殺珙自稱留後是時梁已下鎮定將移兵西而昭宗為劉季述所廢京師大亂崔胤陰召梁以兵西梁太祖以珂在河中懼為患乃顧張存敬侯言以一大繩與之曰為我持縛珂來存敬等兵出含山破晉絳二州遣何絪以兵守之絶晉援存敬圍河中珂告急於晉晉以絪故不得前珂乃遣其妻以書告晉王曰賊勢如此朝夕乞食於梁矣大人何忍而不救邪晉王報之曰梁兵為阻衆寡不敵救之則并晉俱亡不若與王郎自歸朝廷珂乃為書與李茂貞曰天子初返正詔藩鎮無相侵以安王室今朱公棄約以見攻其勢不止於弊邑若弊邑朝亡則西北諸鎮非諸君所能守也願與華州出兵潼關以為應茂貞不報珂計窮乃治舟于河將歸于京師珂夜登城諭守陴者守陴者皆不應牙將劉訓夜入珂寢白事珂叱之曰兵欲反邪訓乃解衣自索而入曰公苟懷疑請先斷臂珂曰事急矣計安出乎訓曰公若攜家夜濟人必爭舟一夫鴟張大事即去不若遲明以情諭軍中願從者猶得其半不然且為款狀以緩梁兵徐圖向背珂以為然梁太祖自同州降唐即依重榮以母王氏故事重榮為舅珂乃登城呼存敬曰吾於梁王有家世之舊兵當退舍俟梁王來吾將聽命存敬乃退舍使馳詣太祖於洛陽太祖至河中先之城東哭於重榮之墓而後入珂欲面縛牽羊以見太祖太祖謂曰太師阿舅之恩何時可忘郎君若以亡國之禮見太師其謂我何珂迎於路握手噓唏乃徙珂於汴太祖以珂晉壻也疑其二己使珂西入覲行至華州使人殺之傳舍瓚重盈之諸子也梁太祖已執珂自領河中節度使以瓚為吏瓚事梁為諸衛大將軍泰寧鎮國軍節度使末帝時為開封尹貞明五年代賀瓌為北面行營招討使是時晉已城德勝瓚自黎陽渡河攻澶州不克退屯楊村扼河上流與晉人相持經年大小百餘戰瓚卒無功末帝遣戴思遠代瓚復為開封尹莊宗自鄆入京師末帝聞唐兵且至日夜涕泣不知所為自持國寶指其宮室謂瓚曰使吾保此者繫卿之畫如何耳唐兵已過宛朐瓚驅率市人登城拒守唐兵攻封丘門瓚開門迎降伏地請死莊宗勞而起之曰朕與卿家世婚姻然人臣各為主耳復何罪邪因以為開封尹遷宣武軍節度使已而故梁臣趙巖張漢傑等相次誅死瓚以憂卒贈太子太師趙犨趙犨其先青州人也世為陳州牙將犨幼與羣兒戲道中部分行伍指顧如將帥雖諸大兒皆聽其節度其父叔文見之驚曰大吾門者此兒也及壯善用弓劍為人勇果重氣義刺史聞其材召置麾下纍遷忠武軍馬步軍都虞候王仙芝寇河南陷汝州將犯東都犨引兵擊敗之仙芝乃南去已而黃巢起所在州縣往往陷賊陳州豪傑數百人相與詣忠武軍求得犨為刺史以自保忠武軍表犨陳州刺史已而巢陷長安犨語諸將吏曰以吾計巢若不為長安市人所誅必驅其衆東走吾州適當其衝矣乃治城池為守備遷民六十里內者皆入城中選其子弟配以兵甲以其弟昶珝為將巢敗果東走先遣孟楷據項城昶擊破之執楷以歸巢從後至聞楷被執大怒既而秦宗權以蔡州附巢巢勢甚盛乃悉衆圍犨置舂磨糜人之肉以為食陳人恐犨語其下曰吾家三世陳將必能保此爾曹男子當於死中求生建功立業未必不因此時陳人皆踴躍巢柵城北三里為八仙營起宮闕置百官聚糧餉欲以久弊之其兵號二十萬陳人舊有巨弩數百皆廢壞後生弩工皆不識其器珝創意理之弩矢激五百步人馬皆洞以故巢不敢近圍凡三百日犨食將盡乃乞兵於梁梁太祖與李克用皆自將會陳擊敗巢將黃鄴于西華西華有積粟巢恃以為餉及鄴敗巢乃解圍去梁太祖入陳州犨兄弟迎謁馬首甚恭然犨陰識太祖必成大事乃降心屈迹為自託之計以梁援己恩為太祖立生祠朝夕拜謁以其子巖尚太祖女是謂長樂公主黃巢已去秦宗權復亂淮西陷旁二十餘州而陳去蔡最近犨兄弟力拒之卒不能下後巢宗權皆敗死唐昭宗即以陳州為忠武軍拜犨節度使犨已病乃以位與其弟昶後數月卒昶乘大寇新滅乃休兵課農事梁尤謹梁兵攻戰四方昶饋挽供億未嘗少懈昶卒珝代立珝頗知書乃求鄧艾故迹決翟王陂溉民田兄弟居陳二十餘年陳人大賴之梁太祖已降韓建取同華徙珝為同州留後入唐為右金吾衛上將軍歲餘以疾免官歸卒于家陳人為之罷市犨次子巖梁末帝時為戶部尚書租庸使與張漢傑漢倫等居中用事梁自太祖以暴虐殺戮為事而末帝為人特和柔恭謹然性庸愚以漢傑婦家而巖壻也故親信之大臣老將皆切齒末帝獨不悟以至於亡初友圭殺太祖自立以末帝為東都留守巖如東都末帝與之飲酒從容以誠款告之巖為末帝謀遣人召楊師厚兵起事巖還西都卒與袁象先以禁兵誅友圭取傳國寶以授末帝末帝立巖自以有功於梁又尚公主聞唐駙馬杜悰位至將相自奉甚豐恥其不及乃占天下良田大宅裒刻商旅其門如市租庸之物半入其私巖飲食必費萬錢故時魏州牙兵驕數為亂羅紹威盡誅之太祖崩楊師厚逐羅氏據魏州復置牙兵二千末帝患之師厚死巖與租庸判官邵贊議曰魏為唐患百有餘年自先帝時嘗切齒紹威以其前恭而後倨今先帝新棄天下師厚復為陛下憂所以然者以魏地大而兵多也陛下不以此時制之寧知後人不為師厚也不若分相魏為兩鎮則無北顧之憂矣末帝以為然乃分相澶衛為昭德軍牙兵亂以魏博降晉梁由是盡失河北是時梁將劉鄩等與莊宗相距澶魏之間兵數敗巖曰古之王者必郊祀天地陛下即位猶未郊天議者以為朝廷無異藩鎮如此何以威重天下今河北雖失天下幸安願陛下力行之敬翔以為不可曰今府庫虛竭箕斂供軍若行郊禋則必賞賚是取虛名而受實弊也末帝不聽乃備法駕幸西京而莊宗取楊劉或傳晉兵入東都矣或曰扼汜水矣或曰下鄆濮矣京師大風拔木末帝大懼從官相顧而泣末帝乃還東都遂不果郊鎮州張文禮殺王鎔使人告梁曰臣已北召契丹願梁以兵萬人出德棣州則晉兵憊矣敬翔以為然巖與漢傑皆以為不可乃止其後黜王彥章用段凝皆巖力也莊宗兵將至汴末帝惶惑不知所為登建國樓以問羣臣或曰晉以孤軍遠來勢難持久雖使入汴不能守也宜幸洛陽保嶮以召天下兵徐圖之勝負未可知也末帝猶豫巖曰勢已如此一下此樓何人可保末帝卒死於樓上當巖用事時許州溫韜尤曲事巖巖因顧其左右曰吾常待韜厚今以急投之必不幸吾為利乃走投韜韜斬其首以獻莊宗已滅梁巖素所善段凝奏請誅巖家屬乃族滅之嗚呼禍福之理豈可一哉君子小人之禍福異也老子曰禍兮福所倚福兮禍所伏後世之談禍福者皆以其言為至論也夫為善而受福焉得禍為惡而受禍焉得福惟君子之罹非禍者未必不為福小人求非福者未嘗不及禍此自然之理也始犨自以先見之明深結梁太祖及其子孫皆享其祿利自謂知所託矣安知其族卒與梁俱滅也犨之求福於梁蓋老氏之所謂福也非君子之所求也可不戒哉馮行襲馮行襲字正臣均州人也唐末山南盜孫喜以衆千人襲均州刺史呂燁燁不能禦行襲為州校乃陰選勇士伏江南獨乘小舟逆喜告曰州人聞公至皆欲歸矣然知公兵多民懼虜掠恐其驚擾請留兵江北獨與腹心數人從行願為前導以慰安州民事可立定喜以為然乃留其兵江北獨與行襲渡江軍吏前謁行襲擊喜仆地斬之伏兵發盡殺從行者餘兵在江北聞喜死皆潰山南節度使劉巨容表行襲均州刺史是時僖宗在蜀諸鎮貢獻行在者皆道山南盜賊多據州西長山以邀劫之行襲盡破諸賊洋州葛佐辟行襲行軍司馬使以兵鎮谷口通秦蜀道行襲由此知名李茂貞兼領山南遣子繼臻守金州行襲逐之遂據金州昭宗乃以金州為戎昭軍拜行襲節度使昭宗在岐梁太祖引兵而西中尉韓全誨遣中官郤文晏等二十餘人召兵江淮以拒太祖行襲已附梁乃盡殺文晏等太祖攻趙匡凝于襄陽行襲遣子勗以舟兵會均房以功遷匡國軍節度使行襲為人嚴酷少恩而所至輒天幸境旱有蝗則飛鳥食之歲凶田中鹵穀自生唐衰知梁必興尤盡心傾附事梁官至司空封長樂郡王卒贈太傅諡曰忠敬
