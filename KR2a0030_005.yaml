body:
  text: 新五代史卷五唐本紀第五存勗克用長子也初克用破孟方立于邢州還軍上黨置酒三垂岡伶人奏百年歌至于衰老之際聲甚悲坐上皆悽愴時存勗在側方五歲克用慨然捋鬚指而笑曰吾行老矣此奇兒也後二十年其能代我戰于此乎存勗年十一從克用破王行瑜遣獻捷于京師昭宗異其狀貌賜以鸂𩻸巵翡翠盤而撫其背曰兒有奇表後當富貴無忘豫家及長善騎射膽勇過人稍習春秋通大義尤喜音聲歌舞俳優之戲天祐五年正月即王位于太原叔父克寧殺都虞候李存質幸臣史敬鎔告克寧謀叛二月執而戕之且以先王之喪叔父之難告周德威德威自亂柳還軍太原梁夾城兵聞晉有大喪德威軍且去因頗懈王謂諸將曰梁人幸我大喪謂我少而新立無能為也宜乘其怠擊之乃出兵趨上黨行至三垂岡歎曰此先王置酒處也會天大霧晝暝兵行霧中攻其夾城破之梁軍大敗凱旋告廟九月蜀王王建岐王李茂貞及楊崇本攻梁大安晉亦遣周德威攻其晉州敗梁軍于神山六年劉知俊叛梁來乞師王自將至陰地關遣周德威攻晉州敗梁軍于蒙坑七年冬梁遣王景仁攻趙趙王王鎔來乞師諸將皆疑鎔詐未可出兵王不聽乃救趙八年正月敗梁軍于柏鄉斬首二萬級獲其將校三百人馬三千匹進攻邢州不下留兵圍之去攻魏別遣周德威徇梁夏津高唐攻博州破東武朝城遂擊黎陽臨河淇門掠新鄉共城燕王劉守光聞晉攻梁深入乃大治兵聲言助晉王患之乃旋師七月會趙王王鎔于承天軍劉守光稱帝于燕九年正月遣周德威會鎮定以攻燕守光求救於梁梁軍攻趙屠棗強李存審擊走之八月朱友謙以河中叛于梁來降梁遣康懷英討友謙友謙復臣于梁而亦陰附于晉十年十月劉守光請降王如幽州守光背約不降攻破之十一年殺燕王劉守光于太原用其父仁恭于鴈門於是趙王王鎔北平王王處直奉册推王為尚書令始建行臺七月攻梁邢州戰于張公橋晉軍大敗剖心以祭墓也十二年魏州軍亂賀德倫以魏博二州叛于梁來附王入魏州行至永濟誅其亂首張彥以其兵五百自衛號帳前銀槍軍六月王兼領魏博節度使取德州七月取澶州劉軍于洹水王率百騎覘其營遇伏兵圍之數重決圍而出亡七八騎八月梁復取澶州晉軍與對壘于莘晉軍數挑戰閉壁不出十三年正月王留李存審于莘聲言西歸聞晉王且去即引兵擊魏攻城東王行至貝州返擊大敗之追至于故元城又敗之走黎陽三月攻梁衛州降其刺史米昭克磁州殺其刺史靳昭四月克洺州八月圍邢州降其節度使閻寶梁張筠棄相州戴思遠棄滄州而逃遂取二州而貝州人殺梁守將張源德以城降契丹寇蔚州執振武節度使李嗣本十四年契丹寇新州遂寇幽州李嗣源擊走之冬梁謝彥章軍于楊劉十二月攻楊劉王自負芻以堙塹遂破之十五年正月梁晉相距于楊劉彥章決河水以隔晉軍六月渡水擊彥章破其四寨八月大閲于魏合盧龍橫海昭義安國及鎮定之兵十萬馬萬匹軍于麻家渡謝彥章軍于行臺十二月進軍臨濮梁軍追之戰于胡柳晉軍大敗周德威死之梁軍暮休于土山晉軍復擊大敗之遂軍德勝為夾寨十六年正月王兼領盧龍軍節度使梁王瓚攻德勝南城不克十月廣德勝北城十二月敗梁軍于河南十七年朱友謙襲同州梁遣劉擊友謙李存審敗梁軍于同州十八年正月魏州僧傳真獻唐受命寶一趙將張文禮弒其君鎔文禮來請命二月以文禮為鎮州兵馬留後三月河中節度使朱友謙昭義軍節度使李嗣昭橫海軍節度使李存審義武軍節度使王處直安國軍節度使李嗣源鎮州兵馬留後張文禮領天平軍節度使閻寶大同軍節度使李存璋振武軍節度使李存進匡國軍節度使朱令德請王即皇帝位王三辭友謙等三請王曰豫當思之八月遣趙王王鎔故將符習及閻寶史建瑭等攻張文禮於鎮州建瑭取趙州張文禮卒其子處瑾閉城拒守九月建瑭戰死十月梁戴思遠攻德勝北城李嗣源敗之于戚城王處直叛附于契丹其子都幽處直以來附十二月契丹寇涿州遂寇定州十九年正月敗契丹于新城望都追奔至于幽州三月閻寶敗于鎮州以李嗣昭代之四月嗣昭戰死以李存進代之八月梁取衛州九月存進敗鎮人于東垣存進戰死十月李存審克鎮州王兼領成德軍節度使同光元年春三月李繼韜以潞州叛附于梁夏四月己巳皇帝即位大赦改元國號唐行臺左丞相豆盧革為門下侍郎右丞相盧程為中書侍郎同中書門下平章事中門使郭崇韜昭義監軍張居翰為樞密使以魏州為東京太原為西京鎮州為北都樞密使唐故以宦者為之其職甚微至此始參用士人而與宰相權任鈞矣故與宰相並書閏月追尊祖考為皇帝妣為皇后曾祖執宜祖妣崔氏皆諡曰昭烈廟號懿祖祖國昌祖妣秦氏皆諡曰文景廟號獻祖考諡曰武廟號太祖立廟于太原自唐高祖太宗懿宗昭宗為七廟壬寅李嗣源取鄆州追尊祖考則立廟可知故皆不書廟此書者以立高祖已下四廟故也此大事也舊史失其日後唐太祖置義兒軍如李嗣昭等甚衆初皆賜姓名而不全若子故書李嗣源者書其所賜姓名爾不以子書也與友文從珂異五月辛酉梁人取德勝南城六月及王彥章戰于新壘敗之是月盧程罷秋八月梁人克澤州守將裴約死之唐末澤潞皆屬晉梁初已得澤州至此又屬晉而梁克之中間不見晉得澤州年月蓋舊史闕不書五代之亂戰爭攻取彼此得失不常多類此也九月戊辰李嗣源及王彥章戰于遞坊敗之冬十月壬申如鄆州以襲梁甲戌取中都丁丑取曹州己卯滅梁敬翔自殺丙戌貶鄭王玉為萊州司戶參軍蕭頃登州司戶參軍殺李振趙巖張漢傑朱圭滅其族己丑德音降死罪囚流已下原之掩其不備疾馳而入之故曰襲文理宜然無褒貶也翔為梁臣梁所以亡唐翔之謀為多梁之亡也翔雖死之不書死而書自殺死大節也見不輕豫人也十一月乙巳復北都為鎮州太原為北都丙辰復汴州為宣武軍丁巳尚書左丞趙光胤為中書侍郎禮部侍郎韋説同中書門下平章事戊午新羅國王金朴英遣使者來辛酉復永平軍為西都甲子如洛京洛京從當時語十二月庚午朔至自汴州辛巳李繼韜伏誅繼韜之弟繼達殺其兄繼儔于潞州壬辰畋于伊闕繼儔以被殺書非不豫其死蓋繼達殺兄自當著其罪爾與書弒君者同二年春正月河南尹張全義及諸鎮進暖殿物己酉求唐宦者庚戌新羅國王金朴英及其泉州節度使王逢規皆遣使者來乙卯渤海國王大諲撰使大禹謨來庚申如河陽辛酉至自河陽丁卯七廟神主至自太原祔于太廟朝獻于太微宮戊辰享于太廟凡書過惡辭無譏貶者直書其實而自見也迎皇太后也太后曹氏莊宗母也莊宗即位遣盧程奉册為皇太后舊史實録皆無奉册月日故不書二月己巳朔有事于南郊大赦癸酉羣臣上尊號曰昭文睿武光孝皇帝戊寅幸李嗣源第癸未立劉氏為皇后五代十三君立后者七辭有不同立得其正者曰以某妃夫人某氏為皇后其不正者直曰立某氏為皇后嫌與得正同爾無褒貶也三月己酉黨項來庚戌賜從平汴州及入洛南郊立仗軍士等功臣庚申工部郎中李塗為檢視諸陵使潞州將楊立反唐諸帝陵也夏五月壬寅教坊使陳俊為景州刺史內園栽接使儲德源為憲州刺史丙辰渤海國王大諲撰遣使者來丙寅李嗣源克潞州命官不書此書其甚也不書命將舊史闕六月丙子楊立伏誅己丑封回紇王仁美為英義可汗秋七月己酉如雷山賽天神夷狄之事也八月大雨霖河溢九月壬子置水于城門以禳熒惑甲寅幸郭崇韜第丙辰黑水遣使者來本紀書災不書異熒惑為置水非禮書爾見其有懼禍之意而不知畏天以修德水旱風蝗之類害物者災也故書其變逆常理不知所以然者異也以其不可知故不書爾冬十月癸未左熊威軍將趙暉妻一産三男子此亦變異而書者重人事故謹之後世以此為善祥故於亂世書以見不然十一月癸卯畋于伊闕丙午至自伊闕丁巳回鶻使都督安千想來書至見其留四日而荒甚十二月庚午及皇后幸張全義第三年春正月庚子如東京毀即位壇為鞠場二月己巳聚鞠于新場乙亥射鴈于王莽河辛巳突厥渾解樓渤海國王大諲撰皆遣使者來射鴈于北郊乙酉射鴨于郭泊庚寅射鴈于北郊三月乙未寒食望祭于西郊庚申至自東京辛酉改東京為鄴都以洛京為東都俚俗之祭也非禮故書夏四月乙亥及皇后幸郭崇韜朱漢賓第旱庚寅趙光胤薨五月丁酉皇太妃薨廢朝五日己酉黑水女真皆遣使者來太祖正室於莊宗為嫡母書太妃及輟朝見亂世禮壞而恩薄六月辛未宗正卿李紓為昭宗少帝改卜園陵使括馬少帝濟陰王也梁嘗諡曰哀皇帝唐人謂之少帝從其本語秋七月壬寅皇太后崩不書册皇太后已見上注八月癸未殺河南縣令羅貫九月庚子魏王繼岌為西川四面行營都統郭崇韜為招討使以伐蜀自六月雨至于是月丁巳射鴈于尖山冬十月壬午奚吐渾突厥皆遣使者來戊子葬貞簡太后於坤陵十一月丁未高麗遣使者來己酉王衍降郭崇韜殺王宗弼及其弟宗渥宗訓滅其族唐兵入蜀不攻不戰君臣迎降故直書其實以見下書殺衍為殺降十二月己卯畋于白沙癸未至自白沙閏月辛亥封弟存美為雍王存霸永王存禮薛王存渥申王存乂睦王存確通王存紀雅王四年春正月壬戌降死罪以下囚甲子魏王繼岌殺郭崇韜及其二子于蜀戊寅契丹使梅老鞋里來庚辰殺其弟睦王存乂及河中護國軍節度使李繼麟滅其族乙酉沙州曹義金遣使者來丙戌回鶻阿咄欲遣使者來丁亥殺李繼麟之將史武薛敬容周唐殷楊師太王景來仁白奉國皆滅其族實皇后劉氏作教與繼岌使殺崇韜而書繼岌殺者繼岌將兵在外后教非天子命可止而不止二月己丑宣徽南院使李紹宏為樞密使癸巳鄴都軍將趙在禮反于貝州甲午畋于冷泉趙在禮陷鄴都武寧軍節度使李紹榮討之邢州軍將趙太反東北面招討使李紹真討之甲辰成德軍節度使李嗣源討趙在禮反者皆不書日獨在禮書日推迹其心可知爾其事具本傳蓋在禮初無亂心以是日見迫而反爾雖加以大惡之名猶原其本心而異於他反者於此見凡書人善惡不妄加之也如此三月趙太伏誅李嗣源反博州守將翟建自稱刺史甲子殺王衍滅其族乙丑如汴州壬申次滎澤龍驤指揮軍使姚彥溫以前鋒軍叛降于李嗣源嗣源入于汴州甲戌至自萬勝從馬直指揮使郭從謙反許其不死降而殺之又滅其族於殺非罪此為甚而書無異辭者前書衍降義自見也帝至萬勝鎮聞嗣源已入汴州乃還夏四月丁亥朔皇帝崩年四十三帝尸為伶人焚之明宗入洛得其骨燼天成元年七月葬之河南新安縣號雍陵至晉避廟諱更曰伊陵其不書葬與梁太祖同
