body:
  text: 新五代史卷二十二梁臣傳第十康懷英康懷英兗州人也事朱瑾為牙將梁兵攻瑾瑾出略食豐沛間留懷英守城懷英即以城降梁瑾遂奔于吳太祖得懷英大喜後從氏叔琮攻趙匡凝下鄧州梁兵攻李茂貞于岐以懷英為先鋒至武功擊殺岐兵萬餘人太祖喜曰邑名武功真武功也以名馬賜之是時李周彝以鄜坊兵救岐屯于三原界懷英擊走之因取其翟州而還岐兵屯奉天懷英柵其東北夜半岐兵攻之懷英以為夜中不欲驚它軍獨以二千人出戰遲明岐兵解去身被十餘瘡李茂貞與梁和昭宗還京師賜懷英迎鑾毅勇功臣楊行密攻宿州太祖遣懷英擊走之表宿州刺史遷保義軍節度使丁會以潞州叛梁降晉太祖命懷英為招討使將行太祖戒之語甚切懷英惶恐以謂潞州期必得乃築夾城圍之晉遣周德威屯于亂柳數攻夾城懷英不敢出戰太祖乃以李思安代懷英將降懷英為都虞候久之思安亦無功太祖大怒罷思安以同州劉知俊為招討使知俊未至軍太祖自至澤州為懷英等軍援且督之已而晉王李克用卒莊宗召周德威還太祖聞晉有喪德威去亦歸洛陽而諸將亦少弛莊宗謂德威曰晉之所以能敵梁而彼所憚者先王也今聞吾王之喪謂我新立未能出兵其意必怠宜出其不意以擊之非徒解圍亦足以定霸也乃與德威等疾馳六日至北黃碾會天大昏霧伏兵三垂岡直趨夾城攻破之懷英大敗亡大將三百人懷英以百騎遁歸詣闕請死太祖曰去歲興兵太陰虧食占者以為不利吾獨違之而致敗非爾過也釋之以為右衛上將軍劉知俊叛奔于岐以懷英為保義軍節度使西路副招討使知俊以岐兵圍靈武太祖遣懷英攻邠寧以牽之懷英取寧慶衍三州還至升平知俊掩擊之懷英大敗徙鎮感化其後朱友謙叛附于晉以懷英討之與晉人戰白徑嶺懷英又大敗徙鎮永平卒于鎮劉劉密州安丘人也少事青州王敬武敬武卒子師範立棣州刺史張蟾叛師範遣指揮使盧洪討蟾洪亦叛師範僞為好辭召洪洪至迎於郊外命斬之坐上因使攻張蟾破之師範表登州刺史以為行軍司馬梁太祖西攻鳳翔師範乘梁虛陰遣人分襲梁諸州縣它遣者謀多漏泄事不成獨素好兵書有機略是時梁已破朱瑾等悉有兗鄆以葛從周為兗州節度使從周將兵在外乃使人負油鬻城中悉視城中虛實出入之所油者得羅城下水竇可入乃以步兵五百從水竇襲破之徙從周家屬外第親拜其母撫之甚有恩禮太祖已出昭宗于鳳翔引兵東還遣朱友寧攻師範從周攻以版輿置從周母城上母呼從周曰劉將軍待我甚厚無異於汝人臣各為其主汝可察之從周為之緩攻乃悉簡婦人及民之老疾不足當敵者出之獨與少壯者同辛苦分衣食堅守以待外援不至人心頗離副使王彥溫踰城而奔守陴者多逸乃遣人陽語彥溫曰副使勿多以人出非吾素遣者皆勿以行又下令城中曰吾遣從副使者得出否者皆族城中皆惑奔者乃止已而梁兵聞之果疑彥溫非實降者斬之城下由是城守益堅師範兵已屈從周以禍福諭報曰俟吾主降即以城還梁師範敗降梁乃亦降從周為具齎裝送歸梁曰降將蒙梁恩不誅幸矣敢乘馬而衣裘乎乃素服乘驢歸梁太祖賜之冠帶飲之以酒辭以量小太祖曰取兗州量何大乎以為元從都押衙是時太祖已領四鎮將吏皆功臣舊人一旦以降將居其上及諸將見皆用軍禮居自如太祖益奇之太祖即位纍遷左龍武統軍劉知俊叛陷長安太祖遣與牛存節討之知俊走鳳翔太祖乃以長安為永平軍拜節度使末帝即位領鎮南軍節度使為開封尹楊師厚卒分相魏為兩鎮末帝恐魏兵亂遣以兵屯于魏縣魏兵果亂劫賀德倫降晉莊宗入魏以謂晉兵悉從莊宗赴魏而太原可襲乃結草為人執以旗幟以驢負之往來城上而潛軍出黃澤關襲太原晉兵望梁壘旗幟往來不知其去也以故不追至樂平遇雨不克進而旋急趨臨清爭魏積粟而周德威已先至乃屯于莘縣築甬道及河以饋軍久之末帝以書責曰閫外事全付將軍河朔諸州一旦淪沒今倉儲已竭飛挽不充將軍與國同心宜思良畫報曰晉兵甚鋭未可擊宜待之末帝復遣問必勝之策曰臣無奇術請人給米十斛米盡則敵破矣末帝大怒誚曰將軍蓄米將療饑乎將破敵乎乃遣使者監督其軍召諸將謀曰主上深居禁中與白面兒謀必敗人事今敵盛未可輕動諸君以為如何諸將皆欲戰乃悉召諸將坐之軍門人以河水一杯飲之諸將莫測或飲或辭曰一杯之難猶若此滔滔河流可盡乎諸將皆失色是時莊宗在魏數以徑兵壓營不肯出而末帝又數促使出戰莊宗與諸將謀曰劉學六韜喜以機變用兵本欲示弱以襲我今其見迫必求速戰乃聲言歸太原命符存審守魏陽為西歸潛兵貝州果報末帝曰晉王西歸魏無備可擊乃以兵萬人攻魏城東莊宗自貝州返趨擊之忽見晉軍驚曰晉王在此邪兵稍却追至故元城莊宗與符存審為兩方陳夾之為圓陳以禦晉人兵再合大敗南奔自黎陽濟河保滑州末帝以為義成軍節度使明年河朔皆入于晉降亳州團練使兗州張萬進反拜兗州安撫制置使萬進敗死乃拜泰寧軍節度使朱友謙叛陷同州末帝以為河東道招討使行次陝州為書以招友謙友謙不報留月餘待之尹皓段凝等素惡乃譖之以為與友謙親家故其逗留以養賊已而兵數敗乃罷歸洛陽鴆殺之年六十四贈中書令子遂凝遂雍事唐皆為刺史妾王氏有美色卒後入明宗宮中是為王淑妃明宗晚年淑妃用事二子皆被恩寵潞王從珂反於鳳翔時遂雍為西京副留守留守王思同率諸鎮兵討鳳翔戰敗東歸遂雍閉門不內悉封府庫以待潞王潞王前軍至者悉以金帛給之潞王見遂雍握手流涕由是事無大小皆與圖議廢帝入立拜遂雍淄州刺史以兄琪之子遂清代遂雍為西京副留守遂清歷易棣等五州刺史皆有善政遷鳳州防禦使宣徽北院使判三司晉開運中為安州防禦使以卒遂清性至孝居父喪哀毀鄉里稱之嘗為淄州刺史迎其母母及郊遂清為母執轡行數十里州人咸以為榮牛存節牛存節字贊正青州博昌人也初名禮事諸葛爽於河陽爽卒存節顧其徒曰天下洶洶當得英雄事之乃率其徒十餘人歸梁太祖存節為人木彊忠謹太祖愛之賜之名字以為小校張晊攻汴存節破其二寨梁攻濮州戰南劉橋范縣存節功多李罕之圍張全義於河陽全義乞兵於梁太祖以存節故事河陽知其間道使以兵為前鋒是時歲饑兵行乏食存節以金帛就民易乾椹以食軍擊走罕之太祖攻魏存節下魏黎陽臨河殺魏萬二千人與太祖會內黃遷滑州牢城遏後指揮使梁兵攻鄆存節使都將王言藏船鄆西北隅濠中期以日午渡兵踰濠急攻之會營中火起鄆人登城望火言伏不敢動與存節失期存節獨破鄆西甕城門奪其濠橋梁兵得俱進遂破朱宣從葛從周攻淮南從周敗卑河存節收其散卒八千以歸拜亳宿二州刺史朱瑾走吳召吳兵攻徐宿存節謀曰淮兵必不先攻宿然宿溝壘素固可以禦敵乃夜以兵急趣徐州比傅徐城下瑾兵方至望其塵起驚曰梁兵已來何其速也不能攻而去已而太祖使者至授存節軍機悉與存節意合由是諸將益服其能遷潞州都指揮使太祖攻鳳翔使召存節存節為將法令嚴整而善得士心潞人送者皆號泣纍拜邢州團練使元帥府左都押衙太祖即位拜右千牛衛上將軍從康懷英攻潞州為行營排陳使晉兵已破夾城存節等以餘兵歸行至天井關聞晉兵攻澤州存節顧諸將曰吾行雖不受命然澤州要害不可失也諸將皆不欲救之存節戒士卒熟息已而謂曰事急不赴豈曰勇乎舉策而先士卒隨之比至澤州州人已焚外城將降晉聞存節至乃稍定存節入城助澤人守晉人穴地道以攻之存節選勇士數十亦穴地以應之戰于隧中敵不得入晉人解去遷左龍虎統軍六軍都指揮使絳州刺史遷鄜州留後同州劉知俊叛奔鳳翔乃遷存節匡國軍節度使友圭立朱友謙叛附于晉西連鳳翔存節東西受敵同州水鹹而無井知俊叛梁以渴不能守而走故友謙與岐兵合圍持久欲以渴疲之存節禱而擇地鑿井八十水皆甘可食友謙卒不能下末帝立加同中書門下平章事徙鎮天平蔣殷反徐州遣存節攻破之以功加太尉梁晉相距於河上存節病痟而梁晉方苦戰存節忠憤彌激治軍督士未嘗言病病革召歸京師將卒語其子知業曰忠孝吾子也不及其他贈太師張歸霸弟歸厚歸辨張歸霸清河人也末帝娶其女是為德妃歸霸少與其弟歸厚歸辨俱從黃巢巢敗東走歸霸兄弟乃降梁秦宗權攻汴歸霸戰數有功張晊軍赤岡以騎兵挑戰矢中歸霸歸霸拔之反以射賊一發而斃奪其馬而歸太祖從高丘望見甚壯之賞以金帛並以其馬賜之使以弓手五百人伏湟中太祖以騎數百為遊兵過晊柵晊出兵追太祖歸霸發伏殺晊兵千人奪馬數十匹太祖攻蔡州蔡將蕭皓急擊太祖營歸霸不暇請與徐懷玉分出東南壁門合擊敗之太祖得拔營去太祖攻兗鄆取曹州使歸霸以兵數千守之與朱瑾逆戰金鄉大敗之又破濮州晉人攻魏歸霸從葛從周救魏戰洹水歸霸擒克用子落落以與魏人又破劉仁恭於內黃功出諸將右光化二年權知邢州遷萊州刺史拜左衛上將軍曹州刺史開平元年拜右龍虎統軍左驍衛上將軍二年拜河陽節度使以疾卒子漢傑事末帝為顯官以張德妃故用事梁亡唐莊宗入汴遂族誅弟歸厚字德坤為將善用弓槊能以少擊衆張晊屯赤岡歸厚與晊獨戰陳前晊憊而却諸將乘之晊遂大敗太祖大悅以為騎長梁攻時溥歸厚以麾下先進九里山遇徐兵而戰梁故將陳璠叛在徐歸厚望見識之瞋目大罵馳騎直往取之矢中其左目郴王友裕攻鄆屯濮州太祖從後至友裕徙柵與太祖相失太祖卒與鄆兵遇太祖登高望之鄆兵才千人太祖與歸厚以廳子軍直衝之戰已合鄆兵大至歸厚度不能支以數十騎衛太祖先還歸厚馬中矢僵乃持槊步鬬太祖還軍中遣張筠馳騎第取之以為必死矣歸厚體被十餘箭得筠馬乃歸太祖見之泣曰爾在喪軍何足計乎使舁歸宣武遷右神武統軍歷洺晉絳三州刺史與晉人屢戰未嘗屈乾化元年拜鎮國軍節度使以疾卒子漢卿歸辨為將亦善戰開平初為滑州長劍指揮使子漢融梁亡皆族誅王重師王重師許州長社人也為人沈默多智善劍槊秦宗權陷許州重師脫身歸梁從太祖平蔡攻兗鄆為拔山軍指揮使重師苦戰齊魯間威震鄰敵遷潁州刺史太祖攻濮州已破濮人積草焚之梁兵不得入是時重師方病金瘡臥帳中諸將強之重師遽起悉取軍中氈毯沃以水蒙之火上率精卒以短兵突入梁兵隨之皆入遂取濮州重師身被八九瘡軍士負之而還太祖聞之驚曰奈何使我得濮州而失重師乎使醫理之逾月乃愈王師範降表重師青州留後纍遷佑國軍節度使同中書門下平章事居數年甚有威惠重師與劉捍故有隙捍嘗構之太祖太祖疑之重師遣其將張君練西攻邠鳳而不先請君練兵小敗太祖以其擅發兵挫失國威將召而罪之遣劉捍代重師重師不知太祖怒己捍至重師不出迎見之青門禮又倨捍因馳白太祖言重師有二志太祖益怒貶重師溪州刺史再貶崖州司戶參軍未行賜死徐懷玉徐懷玉亳州焦夷人也少事梁太祖與太祖俱起微賤懷玉為將以雄豪自任而勇於戰陳從太祖鎮宣武為永城鎮將秦宗權攻梁壁金隄靈昌酸棗懷玉以輕騎連擊破之俘殺五千餘人遷左長劍都虞候又破宗權於板橋赤岡拔其八柵從太祖東攻兗鄆破徐宿懷玉金創被體戰必克捷所得賞賚往往以分士卒為梁名將本名琮太祖賜名懷玉從太祖攻魏敗魏兵黎陽遂東攻兗破朱瑾於金鄉又從龐師古攻楊行密師古敗清口懷玉獨完一軍行收散卒萬餘人以歸遷沂州刺史屬歲屢豐乃繕兵治壁為戰守具已而王師範叛梁攻東境懷玉屢以州兵擊破之遷齊州防禦使天復四年以州兵西迎昭宗都洛陽遷華州觀察留後以兵屯雍州遷右羽林統軍屯于澤州晉人攻之為隧以入懷玉擊之隧中晉人乃却太祖時歷曹晉二州刺史晉數攻之懷玉堅守敗晉兵于洪洞拜保大軍節度使太祖崩友圭自立朱友謙附于晉以襲鄜州執懷玉殺之
