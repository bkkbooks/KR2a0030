body:
  text: 新五代史卷二十八唐臣傳第十六豆盧革豆盧革父瓚唐舒州刺史豆盧為世名族唐末天下亂革避地之中山唐亡為王處直掌書記莊宗在魏議建唐國而故唐公卿之族遭亂喪亡且盡以革名家子召為行臺左丞相莊宗即位拜同中書門下平章事革雖唐名族而素不學問除拜官吏多失其序常為尚書郎蕭希甫駁正革頗患之莊宗已滅梁革乃薦韋説為相説唐末為殿中侍御史坐事貶南海後事梁為禮部侍郎革以説能知前朝事故引以佐己而説亦無學術徒以流品自高是時莊宗內畏劉皇后外惑宦官伶人郭崇韜雖盡忠於國而亦無學術革説俯仰默默無所為唯諾崇韜而已唐梁之際仕宦遭亂奔亡而吏部銓文書不完因緣以為姦利至有私鬻告敕亂易昭穆而季父母舅反拜姪甥者崇韜請論以法是時唐新滅梁朝廷紀綱未立議者以為宜革以漸而崇韜疾惡太甚果於必行説革心知其未可而不能有所建言是歲冬選人吳延皓改亡叔告身行事事發延皓及選吏尹玫皆坐死尚書左丞判吏部銓崔沂等皆貶説革詣閣門待罪由是一以新法從事往往以偽濫駁放而斃踣羈旅號哭道路者不可勝數及崇韜死説乃教門人上書言其事而議者亦以罪之是歲大水四方地連震流民殍死者數萬人軍士妻子皆採以食莊宗日以責三司使孔謙謙不知所為樞密小吏段徊曰臣嘗見前朝故事國有大故則天子以朱書御札問宰相水旱宰相職也莊宗乃命學士草詔手自書之以問革説革説不能對第曰陛下威德著于四海今西兵破蜀所得珍寶億萬可以給軍水旱天之常道不足憂也革自為相遭天下多故而方服丹砂鍊氣以求長生嘗嘔血數日幾死二人各以其子為拾遺父子同省人以為非遽改他官而革以説子為弘文館學士説以革子為集賢院學士莊宗崩革為山陵使莊宗已祔廟革以故事當出鎮乃還私第數日未得命而故人賓客趣使入朝樞密使安重誨詬之于朝曰山陵使名尚在不俟改命遽履新朝以我武人可欺邪諫官希旨上疏誣革縱田客殺人説坐與鄰人爭井遂俱罷革貶辰州刺史説蝄州刺史所在馳驛發遣宰相鄭王玉任圜三上章請毋行後命不報革復坐請俸私自入説賣官與選人責授革費州司戶參軍説夷州司戶參軍皆員外置同正員已而竄革陵州説合州皆長流百姓初説嘗以罪竄之南海遇赦還寓江陵與高季興相知及為相常以書幣相問遺唐兵伐蜀季興請以兵入三峽莊宗許之使季興自取夔忠萬歸峽等州為屬郡及破蜀季興無功而唐用他將取五州明宗初即位季興數請五州以謂先帝所許朝廷不得已而與之及革説再貶因以其事歸罪二人天成二年夏詔陵合州刺史監賜自盡革子升説子濤皆官至尚書郎坐其父廢至晉天福初濤為尚書膳部員外郎卒盧程盧程不知其世家何人也唐昭宗時程舉進士為鹽鐵出使巡官唐亡避亂燕趙變服為道士遊諸侯間豆盧革為王處直判官盧汝弼為河東節度副使二人皆故唐時名族與程門地相等因共薦之以為河東節度推官莊宗嘗召程草文書程辭不能其後戰胡柳掌書記王緘歿于陳莊宗還軍太原置酒謂監軍張承業曰吾以巵酒辟一書記於坐因舉巵屬巡官馮道程位在道上以嘗辭不能故不用而遷程支使程大恨曰用人不以門閥而先田舍兒邪莊宗已即位議擇宰相而盧汝弼蘇循已死次節度判官盧質當拜而質不樂任事乃言豆盧革與程皆故唐時名族可以為相莊宗以程為中書侍郎同平章事是時朝廷新造百度未備程革拜命之日肩輿導從喧呼道中莊宗聞其聲以問左右對曰宰相簷子入門莊宗登樓視之笑曰所謂似是而非者也程奉皇太后册自魏至太原上下山險所至州縣驅役丁夫官吏迎拜程坐肩輿自若少忤其意必加笞辱人有假驢夫於程者程帖興唐府給之府吏啓無例程怒笞吏背少尹任圜莊宗姊壻也詣程訴其不可程戴華陽巾衣鶴氅據几決事視圜罵曰爾何蟲豸恃婦家力也宰相取給州縣何為不可圜不對而去夜馳至博州見莊宗莊宗大怒謂郭崇韜曰朕誤相此癡物敢辱豫九卿趣令自盡崇韜亦欲殺之賴盧質力解之乃罷為右庶子莊宗入洛程於路墜馬中風卒贈禮部尚書任圜任圜京兆三原人也為人明敏善談辨見者愛其容止及聞其論議縱橫益皆悚動李嗣昭節度昭義辟圜觀察支使梁兵築夾城圍潞州踰年而晉王薨晉兵救潞者皆解去嗣昭危甚問圜去就之計圜勸嗣昭堅守以待不可有二心已而莊宗攻破梁夾城聞圜為嗣昭畫守計甚嘉之由是益知名其後嗣昭與莊宗有隙圜數奉使往來辨釋讒構嗣昭卒免於禍圜之力也嗣昭從莊宗戰胡柳擊敗梁兵圜頗有功莊宗勞之曰儒士亦破體邪仁者之勇何其壯也張文禮弒王鎔莊宗遣嗣昭討之嗣昭戰歿圜代將其軍號令嚴肅既而文禮子處球等閉城堅守不可下圜數以禍福諭鎮人鎮人信之圜嘗擁兵至城下處球登城呼圜曰城中兵食俱盡而久抗王師若泥首自歸懼無以塞責幸公見哀指其生路圜告之曰以子先人固難容貸然罰不及嗣子可從輕其如拒守經年傷吾大將一朝困竭方布款誠以此計之子亦難免然坐而待弊曷若伏而俟命處球流涕曰公言是也乃遣子送狀乞降人皆稱圜其言不欺既而他將攻破鎮州處球雖見殺而鎮之吏民以嘗乞降故得保其家族者甚衆其後以鎮州為北京拜圜工部尚書兼真定尹北京副留守知留守事為政有惠愛明年郭崇韜兼領成德軍節度使改圜行軍司馬仍知真定府事圜與崇韜素相善又為其司馬崇韜因以鎮州事託之而圜多所違異初圜推官張彭為人傾險貪黷圜不能察信任之多為其所賣及崇韜領鎮彭為圜謀隱公廨錢莊宗遣宦者選故趙王時宮人百餘有許氏者尤有色彭賂守者匿之後事覺召彭詣京師將罪之彭懼悉以前所隱公錢簿書獻崇韜崇韜深德彭不殺由是與圜有隙同光三年圜罷司馬守工部尚書魏王繼岌暨崇韜伐蜀懼圜攻己於後乃辟圜參魏王軍事蜀滅表圜黔南節度使圜懇辭不就繼岌殺崇韜以圜代將其軍而旋康延孝反繼岌遣圜將三千人會董璋孟知祥等兵擊敗延孝於漢州而魏王先至渭南自殺圜悉將其軍以東明宗嘉其功拜圜同中書門下平章事兼判三司是時明宗新誅孔謙圜選辟才俊抑絶僥幸公私給足天下便之是秋韋説豆盧革罷相圜與安重誨鄭王玉孔循議擇當為相者圜意屬李琪而王玉循雅不欲琪為相謂重誨曰李琪非無文藝但不廉耳宰相端方有器度者足以為之太常卿崔協可也重誨以為然他日明宗問誰可相者重誨即以協對圜前爭曰重誨未諳朝廷人物為人所賣天下皆知崔協不識文字而虛有儀表號為沒字碑臣以陛下誤加採擢無功幸進此不知書以臣一人取笑足矣相位有幾豈容更益笑端明宗曰宰相重位卿等更自詳審然吾在藩時識易州刺史韋肅世言肅名家子且待我甚厚置之此位可乎肅或未可則馮書記先朝判官稱為長者可以相矣馮書記者道也議未決重誨等退休於中興殿廊下孔循不揖拂衣而去行且罵曰天下事一則任圜二則任圜圜乃何人圜謂重誨曰李琪才藝可兼時輩百人而讒夫巧沮忌害其能若舍琪而相協如棄蘇合之丸而取蜣蜋之轉也重誨笑而止然重誨終以循言為信居月餘協與馮道皆拜相協在相位數年人多嗤其所為然圜與重誨交惡自協始故時使臣出四方皆自戶部給券重誨奏請自內出圜以故事爭之不能得遂與重誨辨於帝前圜聲色俱厲明宗罷朝後宮嬪御迎前問曰與重誨論者誰明宗曰宰相也宮人奏曰妾在長安見宰相奏事未嘗如此蓋輕大家耳明宗由是不悅而使臣給券卒自內出圜益憤沮重誨嘗過圜圜出妓善歌而有色重誨欲之圜不與由是二人益相惡而圜遽求罷職乃罷為太子少保圜不自安因請致仕退居于磁州朱守殷反于汴州重誨誣圜與守殷連謀遣人矯制殺之圜受命怡然聚族酣飲而死明宗知而不問為下詔坐圜與守殷通書而言涉怨望愍帝即位贈圜太傅趙鳳趙鳳幽州人也少以儒學知名燕王劉守光時悉黥燕人以為兵鳳懼因髠為僧依燕王弟守奇自匿守奇奔梁梁以守奇為博州刺史鳳為其判官守奇卒鳳去為鄆州節度判官晉取鄆州莊宗聞鳳名得之喜以為扈鑾學士莊宗即位拜鳳中書舍人翰林學士莊宗及劉皇后幸河南尹張全義第酒酣命皇后拜全義為父明日遣宦者命學士作箋上全義以父事之鳳上書極言其不可全義養子郝繼孫犯法死宦官伶人冀其資財固請籍沒鳳又上書言繼孫為全義養子不宜有別籍之財而於法不至籍沒刑人利財不可以示天下是時皇后及羣小用事鳳言皆不見納明宗武君不通文字四方章奏常使安重誨讀之重誨亦不知書奏讀多不稱旨孔循教重誨求儒者置之左右而兩人皆不知唐故事於是置端明殿學士以馮道及鳳為之鳳好直言而性剛強素與任圜善自圜為相頗薦進之初端明殿學士班在翰林學士下而結銜又在官下明年鳳遷禮部侍郎因諷圜升學士於官上又詔班在翰林學士上圜為重誨所殺而誣以謀反是時重誨方用事雖明宗不能詰也鳳獨號哭呼重誨曰任圜天下義士豈肯謀反而公殺之何以示天下重誨慚不能對術士周玄豹以相法言人事多中莊宗尤信重之以為北京巡官明宗為內衙指揮使重誨欲試玄豹乃使他人與明宗易服而坐明宗於下坐召玄豹相之玄豹曰內衙貴將也此不足當之乃指明宗於下坐曰此是也因為明宗言其後貴不可言明宗即位思玄豹以為神將召至京師鳳諫曰好惡上所慎也今陛下神其術而召之則傾國之人皆將奔走吉凶之説轉相惑亂為患不細明宗遂不復召朱守殷反明宗幸汴州守殷已誅又詔幸鄴是時從駕諸軍方自河南徙家至汴不欲北行軍中為之洶洶而定州王都以為天子幸汴州誅守殷又幸鄴以圖己因疑不自安宰相率百官詣閣請罷幸鄴明宗不聽人情大恐羣臣不復敢言鳳手疏責安重誨言甚切直重誨以白遂罷幸有僧遊西域得佛牙以獻明宗以示大臣鳳言世傳佛牙水火不能傷請驗其真偽因以斧斫之應手而碎是時宮中施物已及數千因鳳碎之乃止天成四年夏拜門下侍郎同中書門下平章事祕書少監于嶠者自莊宗時與鳳俱為翰林學士而嶠亦訐直敢言與鳳素善及鳳已貴而嶠久不遷自以材名在鳳上而不用因與蕭希甫數非斥時政尤詆訾鳳鳳心銜之未有以發而嶠與鄰家爭水竇為安重誨所怒鳳即左遷嶠祕書少監嶠因被酒往見鳳鳳知其必不遜乃辭以沐髮嶠詬直吏又溺於從者直廬而去省吏白鳳嶠溺於客次且詬鳳鳳以其事聞明宗下詔奪嶠官長流武州百姓又流振武天下冤之其後安重誨為邊彥溫等告變明宗詔彥溫等廷詰具伏其詐即斬之後數日鳳奏事中興殿啓曰臣聞姦人有誣重誨者明宗曰此間事朕已處置之卿可無問也鳳曰臣所聞者繫國家利害陛下不可以為間因指殿屋曰此殿所以尊嚴宏壯者棟梁柱石之所扶持也若折其一棟去其一柱則傾危矣大臣國之棟梁柱石也且重誨起微賤歷艱危致陛下為中興主安可使姦人動搖明宗改容謝之曰卿言是也遂族彥溫等三家其後重誨得罪羣臣無敢言者獨鳳數言重誨盡忠明宗以鳳為朋黨罷為安國軍節度使鳳在鎮所得俸祿悉以分將校賓客廢帝入立召為太子太保病足居于家疾篤自筮投蓍而歎曰吾家世無五十者又皆窮賤吾今壽過其數而富貴復何求哉清泰二年卒于家李襲吉李襲吉父圖洛陽人或曰唐相林甫之後也乾符中襲吉舉進士為河中節度使李都榷鹽判官後去之晉晉王以為榆次令遂為掌書記襲吉博學多知唐故事遷節度副使官至諫議大夫晉王與梁有隙交兵纍年後晉王數困欲與梁通和使襲吉為書諭梁辭甚辨麗梁太祖使人讀之至於毒手尊拳交相於暮夜金戈鐵馬蹂踐於明時歎曰李公僻處一隅有士如此使吾得之傅虎以翼也顧其從事敬翔曰善為我答之及翔所答書辭不工而襲吉之書多傳於世襲吉為人恬淡以文辭自娛天祐三年卒以盧汝弼代為副使汝弼工書畫而文辭不及襲吉其父簡求為河東節度使為唐名家故汝弼亦多知唐故事晉王薨莊宗嗣為晉王承制封拜官爵皆出汝弼十八年卒莊宗即位贈襲吉禮部尚書汝弼兵部尚書張憲張憲字允中晉陽人也為人沈靜寡欲少好學能鼓琴飲酒莊宗素知其文辭以為天雄軍節度使掌書記莊宗即位拜工部侍郎租庸使遷刑部侍郎判吏部銓東都副留守憲精於吏事甚有能政莊宗幸東都定州王都來朝莊宗命憲治鞠場與都擊鞠初莊宗建號於東都以鞠場為即位壇於是憲言即位壇王者所以興也漢鄗南魏繁陽壇至今皆在不可毀乃別治宮西為鞠場場未成莊宗怒命兩虞候亟毀壇以為場憲退而歎曰此不祥之兆也初明宗北伐契丹取魏鎧仗以給軍有細鎧五百憲遂給之而不以聞莊宗至魏大怒責憲馳自取之左右諫之乃止又問憲庫錢幾何憲上庫簿有錢三萬緡莊宗益怒謂其嬖伶史彥瓊曰我與羣臣博須錢十餘萬而憲以故紙紿我我未渡河時庫錢常百萬緡今復何在彥瓊為憲解之乃已郭崇韜伐蜀薦憲可任為相而宦官伶人不欲憲在朝廷樞密承旨段徊曰宰相在天子面前事有非是尚可改作一方之任苟非其人則為患不細憲材誠可用不如任以一方乃以為太原尹北京留守趙在禮作亂憲家在魏州在禮善待其家遣人以書招憲憲斬其使不發其書而上之莊宗遇弒明宗入京師太原猶未知而永王存霸奔于太原左右告憲曰今魏兵南嚮主上存亡未可知存霸之來無詔書而所乘馬斷其鞦豈非戰敗者乎宜拘之以俟命憲曰吾本書生無尺寸之功而人主遇我甚厚豈有懷二心以幸變第可與之俱死爾憲從事張昭遠教憲奉表明宗以勸進憲涕泣拒之已而存霸削髮見北京巡檢符彥超願為僧以求生彥超麾下兵大譟殺存霸憲出奔沂州亦見殺嗚呼豫於死節之士得三人而失三人焉鞏廷美楊溫之死豫既已哀之至於張憲之事尤為之痛惜也豫於舊史考憲事實而永王存霸符彥超與憲傳所書始末皆不同莫得而考正蓋方其變故倉卒之時傳者失之爾然要其大節亦可以見也憲之志誠可謂忠矣當其不顧其家絶在禮而斬其使涕泣以拒昭遠之説其志甚明至其欲與存霸俱死及存霸被殺反棄太原而出奔然猶不知其心果欲何為也而舊史書憲坐棄城而賜死豫亦以為不然豫之於憲固欲成其美志而要在憲失其官守而其死不明故不得列于死節也蕭希甫蕭希甫宋州人也為人有機辨多矯激少舉進士為梁開封尹袁象先掌書記象先為青州節度使以希甫為巡官希甫不樂乃棄其母妻變姓名亡之鎮州自稱青州掌書記謁趙王王鎔鎔以希甫為參軍尤不樂居歲餘又亡之易州削髮為僧居百丈山莊宗將建國于魏置百官求天下隱逸之士幽州李紹宏薦希甫為魏州推官莊宗即帝位欲以知制誥有詔定內宴儀問希甫樞密使得坐否希甫以為不可樞密使張居翰聞之怒謂希甫曰老夫歷事三朝天子見內宴數百子本田舍兒安知宮禁事希甫不能對由是宦官用事者皆切齒宰相豆盧革等希宦官旨共排斥之以為駕部郎中希甫失志尤怏怏莊宗滅梁遣希甫宣慰青齊希甫始知其母已死而妻袁氏亦改嫁矣希甫乃發哀服喪居于魏州人有引漢李陵書以譏之曰老母終堂生妻去室時皆傳以為笑明宗即位召為諫議大夫是時復置匭函以希甫為使希甫建言自兵亂相乘王綱大壞侵欺凌奪有力者勝凡略人之妻女占人之田宅姦贓之吏刑獄之冤者何可勝紀而匭函一出投訴必多至於功臣貴戚有不得繩之以法者乃自天成元年四月二十八日昧爽已前大辟已上皆赦除之然後出匭函以示衆初明宗欲以希甫為諫議大夫豆盧革韋説頗沮難之其後革説為安重誨所惡希甫希旨誣奏革縱田客殺人而説與鄰人爭井井有寶貨有司推劾井中惟破釜而已革説終皆貶死明宗賜希甫帛百匹粟麥三百石拜左散騎常侍希甫性褊而躁進嘗遣人夜叩宮門上變言河堰牙官李筠告本軍謀反詰旦追問無狀斬筠軍士詣安重誨求希甫啖之是時明宗將有事於南郊前齋一日羣臣習儀于殿廷宰相馮道趙鳳河南尹秦王從榮樞密使安重誨候班于月華門外希甫與兩省班先入道等坐廊下不起既出希甫召堂頭直省朝堂驅使官責問宰相樞密見兩省官何得不起因大詬詈是夜託疾還第月餘坐告李筠事動搖軍衆貶嵐州司戶參軍卒于貶所劉贊劉贊魏州人也父玭為縣令贊始就學衣以青布衫襦每食則玭自肉食而別以蔬食食贊於牀下謂之曰肉食君之祿也爾欲之則勤學問以干祿吾肉非爾之食也由是贊益力學舉進士為羅紹威判官去為租庸使趙巖巡官又為孔謙鹽鐵判官明宗時纍遷中書舍人御史中丞刑部侍郎守官以法權豪不可干以私是時秦王從榮握兵而驕多過失言事者請置師傅以輔道之大臣畏王不敢決其事因請王得自擇秦王即請贊乃拜贊祕書監為秦王傅贊泣曰禍將至矣秦王所請王府元帥官屬十餘人類多浮薄傾險之徒日獻諛諂以驕王獨贊從容諷諫率以正道秦王嘗命賓客作文於坐中贊自以師傅恥與羣小比伍雖操筆勉強有不悅之色秦王惡之後戒左右贊來不得通贊亦不往月一至府而已退則杜門不交人事已而秦王果敗死唐大臣議王屬官當坐者馮道曰元帥判官任贊與秦王非素好而在職不逾月詹事王居敏及劉贊皆以正直為王所惡河南府判官司徒詡病告家居久皆宜不與其謀而咨議參軍高輦與王最厚輦法當死其餘可次第原減朱弘昭曰諸公不知其意爾使秦王得入光政門當待贊等如何吾徒復有家族邪且法有首從今秦王夫婦男女皆死而贊等止其一身幸矣道等難之而馮贇亦爭不可贊等乃免死於是論高輦死而任贊等十七人皆長流初贊聞秦王敗即白衣駕驢以俟人有告贊奪官而已贊曰豈有天子冢嗣見殺而賓僚奪官者乎不死幸矣已而贊長流嵐州百姓清泰二年詔歸田里行至石會關病卒何瓚何瓚閩人也唐末舉進士及第莊宗為太原節度使辟為判官莊宗每出征伐留張承業守太原承業卒瓚代知留守事瓚為人明敏通於吏事外若疏簡而內頗周密莊宗建大號于鄴都拜瓚諫議大夫瓚慮莊宗事不成求留守北京瓚與明宗有舊明宗即位召還見於內殿勞問久之已而以瓚為西川節度副使是時孟知祥已有二志方以副使趙季良為心腹聞瓚代之亟奏留季良遂改瓚行軍司馬瓚恥於自辭不得已而往明宗賜豫甚厚初知祥在北京為馬步軍都虞候而瓚留守太原知祥以軍禮事瓚瓚常繩以法知祥初不樂及瓚為司馬猶勉待之甚厚知祥反罷瓚司馬置之私第瓚飲恨而卒
