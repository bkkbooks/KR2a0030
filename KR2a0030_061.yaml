body:
  text: 新五代史卷六十一嗚呼自唐失其政天下乘時黥髠盜販衮冕峨巍吳暨南唐姦豪竊攘蜀險而富漢險而貧貧能自彊富者先亡閩陋荊蹙楚開蠻服剝剽弗堪吳越其尤牢牲視人嶺蛋遭劉百年之間並起爭雄山川亦絶風氣不通語曰清風興羣陰伏日月出爝火息故真人作而天下同作十國世家吳世家第一楊行密子渥隆演溥楊行密字化源廬州合淝人也為人長大有力能手舉百斤唐乾符中江淮羣盜起行密以為盜見獲刺史鄭棨奇其狀貌釋縛縱之後應募為州兵戍朔方遷隊長歲滿戍還而軍吏惡之復使出戍行密將行過軍吏舍軍吏陽為好言問行密行何所欲行密奮然曰惟少公頭爾即斬其首攜之而出因起兵為亂自號八營都知兵馬使刺史郎幼復棄城走行密遂據廬州中和三年唐即拜行密廬州刺史淮南節度使高駢為畢師鐸所攻駢表行密行軍司馬行密率兵數千赴之行至天長師鐸已囚駢召宣州秦彥入揚州行密不得入屯于蜀岡師鐸兵衆數萬擊行密行密陽敗棄營走師鐸兵飢乘勝爭入營收軍實行密反兵擊之師鐸大敗單騎走入城遂殺高駢行密聞駢死縞軍向城哭三日攻其西門彥及師鐸奔于東塘行密遂入揚州是時城中倉廩空虛飢民相殺而食其夫婦父子自相牽就屠賣之屠者刲剔如羊豕行密不能守欲走而蔡州秦宗權遣其弟宗衡掠地淮南彥及師鐸還自東塘與宗衡合行密閉城不敢出已而宗衡為偏將孫儒所殺儒攻高郵破之行密益懼其客袁襲曰吾以新集之衆守空城而諸將多駢舊人非有厚恩素信力制而心服之也今儒兵方盛所攻必克此諸將持兩端因強弱擇嚮背之時也海陵鎮使高霸駢之舊將必不為吾用行密乃以軍令召霸霸率其兵入廣陵行密欲使霸守天長襲曰吾以疑霸而召之其可復用乎且吾能勝儒無所用霸不幸不勝天長豈吾有哉不如殺之以並其衆行密因犒軍擒霸族之得其兵數千已而孫儒殺秦彥畢師鐸並其兵以攻行密行密欲走海陵襲曰海陵難守而廬州吾舊治也城廩完實可為後圖行密乃走廬州久之未知所嚮問襲曰吾欲卷甲倍道西取洪州可乎襲曰鍾傳新得江西勢未可圖而秦彥之入廣陵也召池州刺史趙鍠委以宣州今彥且死鍠失所恃而守宣州非其本志且其為人非公敵此可取也行密乃引兵攻鍠戰于曷山大敗之進圍宣州鍠棄城走追及殺之行密遂入宣州龍紀元年唐拜行密宣州觀察使行密遣田頵安仁義李神福等攻浙西取蘇常潤州二年取滁和州景福元年取楚州孫儒自逐行密入廣陵久之亦不能守乃焚其城殺民老疾以餉軍驅其衆渡江號五十萬以攻行密諸將田頵劉威等遇之輒敗行密欲走銅官其客戴友規曰儒來氣鋭而兵多蓋其鋒不可當而可以挫其衆不可敵而可久以敝之若避而走是就擒也劉威亦曰背城堅柵可以不戰疲之行密以為然久之儒兵飢又大疫行密悉兵擊之儒敗被擒將死仰顧見威曰聞公為此策以敗我使我有將如公者其可敗邪行密收儒餘兵數千以皂衣蒙甲號黑雲都常以為親軍是歲復入揚州唐拜行密淮南節度使乾寧二年加檢校太傅同中書門下平章事行密以田頵守宣州安仁義守潤州升州刺史馮弘鐸來附分遣頵等攻掠自淮以南江以東諸州皆下之進攻蘇州擒其刺史成及四年兗州朱瑾奔于行密初瑾為梁所攻求救于晉晉遣李承嗣將徑騎數千助瑾瑾敗因與俱奔行密行密兵皆江淮人淮人輕弱得瑾徑騎而兵益振是歲梁太祖遣葛從周龐師古攻行密壽州行密擊敗梁兵清口殺師古而從周收兵走追至卑河又大敗之五年錢鏐攻蘇州及周本戰于白方湖本敗蘇州復入于越天復元年遣李神福攻越戰臨安大敗之擒其將顧全武以歸二年馮弘鐸叛襲宣州及田頵戰于曷山弘鐸敗將入于海行密自至東塘邀之使人謂弘鐸曰勝敗用兵常事也一戰之衄何苦自棄于海島吾府雖小猶足容君弘鐸感泣行密從十餘騎馳入其軍以弘鐸為節度副使以李神福代弘鐸為升州刺史是歲唐昭宗在岐遣江淮宣諭使李儼拜行密東面諸道行營都統檢校太師中書令封吳王三年以李神福為鄂嶽招討使以攻杜洪荊南成汭救洪神福敗之于君山梁兵攻青州王師範來求救遣王茂章救之大敗梁兵殺朱友寧友寧梁太祖子也太祖大怒自將以擊茂章兵號二十萬復為茂章所敗田頵叛襲升州執李神福妻子歸于宣州行密召神福以討頵頵遣其將王壇逆之又遺神福書以其妻子招之神福曰吾以一卒從吳王起事今為大將忍背德而顧妻子乎立斬其使以自絶軍士聞之皆感奮行至吉陽磯頵執神福子承鼎以招之神福叱左右射之遂敗壇兵于吉陽行密別遣臺濛擊頵頵敗死初頵及安仁義朱延壽等皆從行密起微賤及江淮甫定思漸休息而三人者皆猛悍難制頗欲除之未有以發天復二年錢鏐為其將許再思等叛而圍之再思召頵攻鏐杭州垂克而行密納鏐賂命頵解兵頵恨之頵嘗計事廣陵行密諸將多就頵求賂而獄吏亦有所求頵怒曰吏欲我下獄也歸而遂謀反仁義聞之亦反焚東塘以襲常州常州刺史李遇出戰望見仁義大罵之仁義止其軍曰李遇乃敢辱我如此其必有伏兵遂引軍却而伏兵果發追至夾岡仁義植幟解甲而食遇兵不敢追仁義復入潤州行密遣王茂章李德誠米志誠等圍之吳之軍中推朱瑾善槊志誠善射皆為第一而仁義嘗以射自負曰志誠之弓十不當瑾槊之一瑾槊之十不當仁義弓之一每與茂章等戰必命中而後發以此吳軍畏之不敢近行密亦欲招降之仁義猶豫未決茂章乘其怠穴地道而入執仁義斬于廣陵延壽者行密夫人朱氏之弟也頵及仁義之將叛也行密疑之乃陽為目疾每接延壽使者必錯亂其所見以示之嘗行故觸柱而仆朱夫人扶之良久乃蘇泣曰吾業成而喪其目是天廢我也吾兒子皆不足以任事得延壽付之吾無恨矣夫人喜急召延壽延壽至行密迎之寢門刺殺之出朱夫人以嫁之天祐二年遣劉存攻鄂州焚其城城中兵突圍而出諸將請急擊之存曰擊之復入則城愈固聽其去城可取也是日城破執杜洪斬于廣陵九月梁兵攻破襄州趙匡凝奔于行密十一月行密卒年五十四諡曰武忠子渥立溥僭號追尊行密為太祖武皇帝陵曰興陵渥字承天行密長子也行密病出渥為宣州觀察使右衙指揮使徐溫私謂渥曰今王有疾而出嫡嗣必有姦臣之謀若它日召子非溫使者慎無應命渥涕泣謝溫而去行密病甚命判官周隱作符召渥隱慮渥幼弱不任事勸行密用舊將有威望者代主軍政乃薦大將劉威行密未許溫與嚴可求入問疾行密以隱議告之溫等大驚遽詣隱所計事隱未出而溫見隱作召符猶在案上急取遣之渥見溫使乃行行密卒渥嗣立召周隱罵曰汝欲賣吾國者復何面目見楊氏乎遂殺之以王茂章為宣州觀察使渥之入也多輦宣州庫物以歸廣陵茂章惜而不與渥怒命李簡以兵五千圍之茂章奔于錢塘天祐三年二月劉存取嶽州四月江西鍾傳卒其子匡時代立傳養子延規怨不得立以兵攻匡時渥遣秦裴率兵攻之九月克洪州執匡時及司馬陳象以歸斬象於市赦匡時以秦裴為江西制置使梁太祖代唐改元開平渥仍稱天祐鄂州劉存嶽州陳知新以舟師伐楚敗于瀏陽楚人執存及知新以歸楚王馬殷素聞其名皆欲活之存等大罵殷曰昔歲宣城脫吾刃下今日之敗乃天亡我我肯事汝以求活耶我豈負楊氏者殷知不可屈乃殺之嶽州復入于楚初渥之入廣陵也留帳下兵三千於宣州以其腹心陳璠范遇將之既入立惡徐溫典牙兵召璠等為東院馬軍以自衛而溫與左衙都指揮使張皓皆行密時舊將又有立渥之功共惡璠等侵其權四年正月渥視事璠等侍側溫皓擁牙兵入拽璠等下斬之渥不能止由是失政而心憤未能發溫等益不自安五年五月溫皓共遣盜入寢中殺渥渥說羣盜能反殺溫等者皆為刺史羣盜皆諾惟紀祥不從執渥縊殺之時年二十三諡曰景弟隆演立溥僭號追尊渥為烈宗景皇帝陵曰紹陵隆演字鴻源行密第二子也初名瀛又名渭初溫皓之弒渥也約分其地以臣於梁及渥死皓欲背約自立溫患之問其客嚴可求可求曰皓雖剛愎而暗於成事此易為也明日皓列劍戟府中召諸將議事自大將朱瑾而下皆去衛從然後入皓問諸將誰當立者諸將莫敢對皓三問可求前密啓曰方今四境多虞非公主之不可然恐為之太速且今外有劉威陶雅李簡李遇皆先王一等人也公雖自立未知此輩能降心以事公否不若輔立幼主漸以歲時待其歸心然後可也皓不能對可求因趨出書一教內袖中率諸將入賀諸將莫知所為及出教宣之乃渥母史氏教言楊氏創業艱難而嗣王不幸隆演以次當立告諸將以無負楊氏而善事之辭旨激切聞者感動皓氣色皆沮卒無能為隆演乃得立皓由此與溫有隙諷隆演出溫潤州可求謂溫曰今捨衙兵而出外郡禍行至矣溫患之可求因說皓曰公與徐溫同受顧託議者謂公奪其衙兵是將殺之於外信乎皓曰事已行矣安可止乎可求曰甚易也明日從皓與諸將造溫可求陽責溫曰古人不忘一飯之恩況公楊氏三世之將今幼嗣新立多事之時乃求居外以苟安乎溫亦陽謝曰公等見留不願去也由是不行行軍副使李承嗣與張皓善覺可求有附溫意諷皓使客夜刺殺之客刺可求不能中明日可求詣溫謀先殺皓陰遣鍾章選壯士三十人就衙堂斬皓因以弒渥之罪歸之溫由是專政隆演備位而已六月撫州危全諷叛攻洪州袁州彭彥章吉州彭玕信州危仔倡皆起兵叛隆演召嚴可求問誰可用者可求薦周本時本方攻蘇州敗歸慚不肯出可求彊起之本曰蘇州之敗非怯也乃上將權輕而下多專命爾若必見任願無用偏裨乃請兵七千戰于象牙潭敗之執全諷彥章而玕奔于楚仔倡奔于錢塘全諷至廣陵諸將議曰昔先王攻趙鍠全諷屢餉給吳軍乃釋不殺初全諷欲舉兵也錢鏐送王茂章于梁道過全諷謂曰聞公欲大舉願見公兵以知濟否全諷陳兵與茂章登城望之茂章曰我素事吳吳兵三等如公此衆可當其下將爾非得益兵十萬不可而全諷卒以此敗八年徐溫領升州刺史治舟師於金陵宣州李遇自行密時為大將勳位已高憤溫用事嘗曰徐溫何人吾猶未識而驟至於此溫聞之怒遣柴再用以兵送王壇代遇且召之遇疑不受命再用圍之隆演使客將何蕘諭遇使自歸蕘因說曰公若欲反可殺蕘以示衆若本無心何不隨蕘以出遇自以無反心乃隨蕘出溫諷再用伺其出殺之並族其家九年溫率將吏進隆演位太師中書令吳王溫為行軍司馬鎮海軍節度使同中書門下平章事陳章攻楚取嶽州執其刺史苑玫十年越人攻常州徐溫敗之于無錫梁遣王茂章攻壽春溫敗之霍丘十二年封徐溫齊國公兩浙都招討使始鎮潤州留其子知訓為行軍副使秉政而大事溫遙決之冬濬楊林江水中出火可以燃十三年宿衛將李球馬謙挾隆演登樓取庫兵以誅知訓陳于門橋知訓與戰頻却朱瑾適自外來以一騎前視其陳曰此不足為也因反顧一麾外兵爭進遂斬球謙而亂兵皆潰十四年徐溫徙治金陵十五年遣王祺會洪袁信三州兵攻虔韶久之不克祺病以劉信代之四月副都統朱瑾殺徐知訓瑾自殺潤州徐知誥聞亂率兵入殺唐宣諭使李儼以止亂遂秉政徐氏之專政也隆演幼懦不能自持而知訓尤凌侮之嘗飲酒樓上命優人高貴卿侍酒知訓為參軍隆演鶉衣髽髻為蒼鶻知訓嘗使酒罵坐語侵隆演隆演愧恥涕泣而知訓愈辱之左右扶隆演起去知訓殺吏一人乃止吳人皆仄目知訓又與朱瑾有隙瑾已殺知訓攜其首馳府中示隆演曰今日為吳除患矣隆演曰此事非吾敢知遽起入內瑾忿然以首擊柱提劍而出府門已闔踰垣折其足遂自刎死米志誠聞瑾殺知訓被甲率其家兵至天興門問瑾所在聞瑾死乃還徐溫疑志誠助瑾遣使殺之嚴可求懼事不克使人僞從湖南境上來告軍捷召諸將入賀擒志誠斬之劉信克虔州執談全播以歸十六年春二月溫率將吏請隆演即天子位不許夏四月溫奉玉冊寶綬尊隆演即吳王位建宗廟社稷設百官如天子之制改天祐十六年為武義元年大赦境內追尊行密孝武王廟號太祖渥景王廟號烈祖拜溫大丞相都督中外諸軍事封東海郡王以徐知誥為左僕射參知政事嚴可求為門下侍郎駱知祥為中書侍郎殷文圭沈顏為翰林學士盧擇為吏部尚書李宗陳章為左右雄武統軍柴再用錢鏢為左右龍武統軍王令謀為內樞密使江西劉信征南大將軍鄂州李簡鎮西大將軍撫州李德誠平南大將軍廬州張崇安西大將軍海州王綰鎮東大將軍文武以次進位封宗室皆郡公溫之徙鎮金陵也以其養子知誥守潤州嚴可求嘗謂溫曰二郎君非徐氏子而推賢下士人望頗歸若不去之恐為後患溫不能用其言及知誥秉政其語泄知誥出可求於楚州可求懼詣金陵見溫謀曰唐亡於今十二年而吳猶不敢改天祐可謂不負唐矣然吳所以征伐四方而建基業者常以興復為辭今聞河上之戰梁兵屢絀若李氏復興其能屈節乎宜於此時先建國以自立溫深然之因留可求不遣方謀迫隆演僭號二年五月隆演卒隆演少年嗣位權在徐氏及建國稱制非其意常怏怏酣飲稀復進食遂至疾卒年二十四諡曰宣弟溥立僭號追尊為高祖宣皇帝陵曰肅陵溥行密第四子也隆演建國封丹陽郡公隆演卒弟廬江公濛次當立而徐氏秉政不欲長君乃立溥七月改升州大都督府為金陵府拜徐溫金陵尹明年二月改元順義赦境內冬十一月祀天於南郊御天興樓大赦拜徐溫太師嚴可求右僕射三年唐莊宗滅梁遣司農卿盧蘋使于唐嚴可求密條數事授蘋以行蘋見洛陽莊宗問之蘋次第以對皆如所授四年溥至白沙閲舟師徐溫來見以白沙為迎鑾鎮五年唐遣諫議大夫薛昭文使福州假道江西劉信出勞之謂曰亞次聞有信否昭文曰天子新有河南未熟公名也信曰漢有韓信吳有劉信君還其語亞次當來較射於淮上也乃酌大巵望牙旗鎞首百步謂昭文曰一發而中願以此巵為壽否則亦以自罰言訖而箭已穿矣六年追爵大丞相徐溫四代祖考立廟於金陵左僕射徐知誥為侍中右僕射嚴可求同平章事是歲莊宗崩五月丁卯詔為同光主輟朝七日七年大丞相徐溫率吳文武上表勸溥即皇帝位溥未許而溫病卒十一月庚戌溥御文明殿即皇帝位改元曰乾貞大赦境內追尊行密武皇帝渥景皇帝隆演宣皇帝以徐知誥為太尉兼侍中拜溫子知詢輔國大將軍金陵尹治溫舊鎮諸子皆封王二年正月封東海為廣德王江瀆廣源王淮瀆長源王馬當上水府寧江王采石中水府定江王金山下水府鎮江王六月荊南高季興來附封季興秦王九月季興敗楚師於白田獲其將吏三十四人來獻三年十一月金陵尹徐知詢來朝知誥誣其有反狀留之不遣以為左統軍斬其客將周廷望以徐知諤為金陵尹溥加尊號睿聖文明孝皇帝大赦境內改元大和以徐知誥為中書令二年冊其子江都王璉為太子三年以徐知誥為金陵尹以其子景通為司徒及左僕射王令謀右僕射宋齊丘皆平章事四年封知誥東海王五年建都於金陵六年閏正月金陵火罷建都廢臨川王濛為歷陽公知誥遣親信王宏以兵守之拜令謀司徒宋齊丘司空知誥召景通還金陵為鎮海軍節度副使以其子景遷為太保平章事與令謀等執政七年九月溥加尊號曰睿聖文明光孝應天弘道廣德皇帝大赦改元天祚知誥進位太師天下兵馬大元帥封齊王二年景遷病以次子景遂為門下侍郎參政事三年知誥建齊國立宗廟社稷置左右丞相已下以金陵為西都廣陵為東都冬十月溥遣江夏王璘奉冊禪位於齊王十二月溥卒於丹陽年三十八諡曰睿升元六年李遷其子孫於海陵號永寧宮嚴兵守之絶不通人久而男女自為匹偶吳人多哀憐之顯德三年世宗征淮南下詔撫安楊氏子孫而李景聞之遣人盡殺其族周先鋒都部署劉重進得其玉硯馬腦碗翡翠瓶以獻楊氏遂絶徐溫徐溫字敦美海州朐山人也少以販鹽為盜行密起合淝隸帳下行密所與起事劉威陶雅之徒號三十六英雄獨溫未嘗有戰功及行密欲殺朱延壽等溫用其客嚴可求謀教行密陽為目疾事成以功遷右衙指揮使始預謀議及行密病平生舊將皆以戰守在外而溫居帳下遂預立渥之功及弒渥又與張皓有隙使鍾章殺之章許諾選壯士三十人椎牛享之刺血為盟溫猶疑章不果夜半使人探其意陽謂曰溫有老母懼事不成不如且止章曰言已出口寧可已乎溫乃安明日鍾章殺皓溫因盡殺紀祥等歸弒渥之罪於皓以其事入白渥母史氏史悸而泣曰吾兒年幼禍亂若此得保百口以歸合淝公之惠也隆演立溫遂專政遷升州刺史治舟師於金陵大將李遇怒溫用事出嫚言溫使柴再用族遇於宣州行密舊將人人皆自疑溫因僞下之恭謹如見行密諸將乃安八年溫遷行軍司馬潤州刺史鎮海軍節度使同平章事十年遣招討使李濤攻越戰于臨安裨將曹筠奔于越濤敗被執溫間遣人語筠曰吾用汝為將汝軍有求吾不能給是吾過也赦筠妻子不誅厚遇之秋越人攻毗陵溫戰于無錫筠感溫前言臨戰奔歸遂敗越兵十二年封溫齊國公兼兩浙招討使始就鎮潤州以升潤宣常池黃六州為齊國溫城升州建大都督府十四年徙治之以其子知訓輔隆演於廣陵而大事溫遙決之知訓為朱瑾所殺溫養子知誥自潤州先入遂得政溫雖姦詐多疑而善用將吏江西劉信圍虔州久不克使人說談全播出降遣使報溫溫怒曰信以十倍之衆攻一城不下而反用說客降之何以威敵國笞其使者而遣之曰吾以笞信也因命濟師遂破全播人有誣信逗留陰縱全播言信將反者信聞之因自獻捷至金陵見溫溫與信博信斂骰子厲聲祝曰劉信欲背吳願為惡彩苟無二心當成渾花溫遽止之一擲六子皆赤溫慚自以巵酒飲信然終疑之及唐師伐王衍溫急召信至廣陵以為左統軍託以內備遂奪其地溫客尤見信者惟駱知祥嚴可求可求善籌畫知祥長於財利溫嘗以軍旅問可求國用問知祥吳人謂之嚴駱溫亦自喜為智詐尤得吳人之心初隨行密破趙鍠諸將皆爭取金帛溫獨據餘囷作粥以食餓者十六年溫請隆演即皇帝位不許又請即吳王位乃許遂建國改元拜溫大丞相都督中外諸軍事封東海郡王隆演卒溫越次立其弟溥順義七年溫又請溥即皇帝位溥未許而溫病卒年六十六追封齊王諡曰武李僭號號溫為義祖嗚呼盜亦有道信哉行密之書稱行密為人寬仁雅信能得士心其將蔡儔叛於廬州悉毀行密墳墓及儔敗而諸將皆請毀其墓以報之行密歎曰儔以此為惡吾豈復為邪嘗使從者張洪負劍而侍洪拔劍擊行密不中洪死復用洪所善陳紹負劍不疑又嘗罵其將劉信信忿奔孫儒行密戒左右勿追曰信負我者邪其醉而去醒必復來明日果來行密起於盜賊其下皆驍武雄暴而樂為之用者以此也故二世四主垂五十年及渥已下政在徐溫於此之時天下大亂中國之禍篡弒相尋而徐氏父子區區詐力裴回三主不敢輕取之何也豈其恩威亦有在人者歟據吳録運歷圖九國志皆云行密以唐景福元年再入揚州至晉天福二年為李所篡實四十六年而舊唐書舊五代史皆云大順二年入揚州至被篡四十七年吳録徐鉉等撰運歷圖龔穎撰二人皆江南故臣所記宜得實而唐末喪亂中朝文字多差失故今以鉉穎所記為定
