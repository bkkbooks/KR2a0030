body:
  text: 新五代史卷三十六義兒傳第二十四嗚呼世道衰人倫壞而親疏之理反其常干戈起於骨肉異類合為父子開平顯德五十年間天下五代而實八姓其三出於丐養蓋其大者取天下其次立功名位將相豈非因時之隙以利合而相資者邪唐自號沙陀起代北其所與俱皆一時雄傑暴武之士往往養以為兒號義兒軍至其有天下多用以成功業及其亡也亦由焉太祖養子多矣其可紀者九人其一是為明宗其次曰嗣昭嗣本嗣恩存信存孝存進存璋存賢作義兒傳李存審后復以符氏大顯故別自為傳李嗣昭李嗣昭本姓韓氏汾州太谷縣民家子也太祖出獵至其家見其林中鬱鬱有氣甚異之召其父問焉父言家適生兒太祖因遺以金帛而取之命其弟克柔養以為子初名進通後更名嗣昭嗣昭為人短小而膽勇過人初喜嗜酒太祖嘗微戒之遂終身不飲太祖愛其謹厚常從用兵為衙內指揮使陝州王珙與其兄珂爭立於河中遣嗣昭助珂敗珙於猗氏獲其將三人梁軍救珙嗣昭又敗之于胡壁堡執其將一人光化元年澤州李罕之襲潞州以降梁梁遣丁會應罕之嗣昭與會戰含山執其將一人斬首三千級遂取澤州二年晉遣李君慶攻梁潞州君慶為梁所敗太祖鴆殺君慶嗣昭攻克之三年出山東取梁洺州梁太祖自將攻之遣葛從周設伏於青山口嗣昭聞梁太祖自來棄城走前遇伏兵因大敗天復元年梁破河中執王珂取晉絳慈隰因大舉擊晉圍太原嗣昭日以精騎出擊梁兵會大雨梁軍解去晉汾州刺史李瑭叛降梁軍梁軍已去嗣昭復取汾州斬瑭遂出陰地取慈州降其刺史唐禮又取隰州降其刺史張瓌是歲梁軍西犯京師圍鳳翔嗣昭乘間攻梁晉絳戰平陽執梁將一人進攻蒲縣梁朱友寧氏叔琮以兵十萬迎擊之嗣昭等敗走友寧追之晉遣李存信率兵迎嗣昭存信又敗梁軍遂圍太原而慈隰汾州復入于梁太祖大恐謀走雲州李存信等勸太祖奔于契丹嗣昭力爭以為不可賴劉太妃亦言之乃止嗣昭晝夜出奇兵擊梁軍梁軍解去嗣昭復取汾慈隰是時鎮定皆已絶晉而附梁晉外失大國之援內亡諸州仍歲之間孤城被圍者再於此時嗣昭力戰之功為多天祐三年與周德威攻梁潞州降丁會以嗣昭為昭義軍節度使梁遣李思安將兵十萬攻潞築夾城以圍之梁太祖嘗遣人招降嗣昭嗣昭斬其使者閉城拒守踰年莊宗始攻破夾城嗣昭完緝兵民撫養甚有恩意梁晉戰胡柳晉軍敗周德威戰死莊宗懼欲收兵還臨濮嗣昭曰梁軍已勝旦暮思歸吾若收軍使彼休息整而復出何以當之宜以精騎撓之因其勞乏可以勝也莊宗然之是時梁軍已登無石山莊宗遣嗣昭轉擊山北而自以銀槍軍趨而呼曰今日之戰得山者勝晉軍皆爭登山梁軍遽下陳於山西晉軍從上急擊大敗之於是晉城德勝矣周德威死嗣昭權知幽州居數月以李紹宏代之嗣昭將去幽州人皆號哭閉關遮留之嗣昭夜遁乃得去十九年從莊宗擊契丹於望都莊宗為契丹圍之數十重嗣昭以三百騎決圍取莊宗以出是時晉遣閻寶攻張文禮於鎮州寶為鎮人所敗乃以嗣昭代之鎮兵出掠九門嗣昭以奇兵擊之鎮軍且盡餘三人匿破垣中嗣昭馳馬射之反為賊射中腦嗣昭顧箙中矢盡拔矢于腦射殺一人還營而卒嗣昭諸子繼儔長而懦其弟繼韜囚之以自立莊宗方與梁兵相持河上不暇究其事因即以為昭義軍留後繼韜委其政於魏琢申蒙琢等常教繼韜反繼韜未決莊宗在魏以事召監軍張居翰節度判官任圜琢等以謂莊宗召居翰等問繼韜事繼韜且見誅因以語趣之繼韜乃遣其弟繼遠入梁梁末帝即拜繼韜同中書門下平章事居數月莊宗滅梁繼韜將走契丹會赦至乃已因隨其母朝于京師繼遠諫曰兄為臣子以反為名復何面以見天子且潞城堅而倉廩實不如閉城坐食積粟以延歲月愈於往而就戮也繼韜不聽繼韜母楊氏善畜財平生居積行販至資百萬當嗣昭為梁圍以夾城彌年軍用乏絶楊氏之積蓋有助焉至是乃齎銀數十萬兩至京師厚賂宦官伶人宦官伶人皆言繼韜初無惡意為姦人所誤耳楊夫人亦以賂謁劉皇后劉皇后為言嗣昭功臣宜蒙恩貸由是莊宗釋繼韜嘗從獵寵幸無間李存渥尤切齒數詆責之繼韜懷不自安復賂宦官伶人求歸鎮莊宗不許繼韜陰使人告繼遠令起變於軍中冀天子遣己往安緝之事泄斬于天津橋其二子嘗為質于梁莊宗破梁得之撫其背曰爾幼猶能佐其父反長復何為乎至是因並誅之即遣人斬繼遠以繼儔知潞州事已而召繼儔還京師繼儔悉取繼韜妓妾珍玩而不時即路其弟繼達怒曰吾兄父子誅死而大兄不仁利其資財淫其妻妾吾所不忍也乃服縗麻引數百騎坐戟門使人入殺繼儔節度副使李繼珂募市人千餘攻繼達繼達走城外自剄死嗣昭七子至明宗時子繼能坐笞殺其母主藏婢婢家告變言繼能反與其弟繼襲皆見殺惟一子繼忠僅免繼忠家于晉陽楊氏所積餘資猶巨萬晉高祖自太原起兵召契丹為援契丹求賂高祖貸于繼忠以取足高祖入立甚德之以為沂棣單三州刺史開運中卒楊氏平生積産嗣昭父子三人賴之嗣本嗣本本姓張氏鴈門人也世為銅冶鎮將嗣本少事太祖太祖愛之賜以姓名養為子從擊居庸關以功遷義兒軍使從破王行瑜遷威遠軍使從攻羅弘信以先鋒兵破湯陰從莊宗破潞州夾城纍以戰功遷代州刺史雲州防禦使振武節度使號威信可汗天祐十三年從莊宗擊劉鄩於故元城下洺磁諸州六月還軍振武契丹入代北攻蔚州嗣本戰歿嗣恩嗣恩本姓駱吐谷渾部人也少事太祖能騎射為鐵林軍將稍以戰功遷突陳指揮使賜姓名以為子從敗康懷英於河西遷左廂馬軍都指揮使從李嗣昭援朱友謙於河中與梁兵力戰矟中其口戰不已遷遼州刺史從莊宗入魏遷天雄軍馬步都指揮使劉鄩攻太原兵趣樂平嗣恩從後追之自他道先入太原以守鄩兵去嗣恩亦以兵會莊宗于魏從戰于莘遷代州刺史石嶺關已北都知兵馬使振武節度使天祐十五年卒于太原追贈太尉存信存信本姓張氏其父君政回鶻李思忠之部人也存信少善騎射能四夷語通六蕃書從太祖起代北入關破黃巢纍以功為馬步軍都指揮使遂賜姓名以為子存信與存孝俱為養子材勇不及存孝而存信不為之下由是交惡存孝所為存信每沮激之存孝卒得罪死而存信數從征伐以功領郴州刺史太祖遣將兵救朱宣存信屯于莘縣為羅弘信所擊存信敗亡太祖子落落後從太祖討劉仁恭大敗于安塞太祖大怒顧存信曰昨日吾醉公不能為我戰邪古人三敗公已二矣將殺之存信叩頭謝罪而免由是大懼常稱疾天復二年卒年四十一存孝存孝代州飛狐人也本姓安名敬思太祖掠地代北得之給事帳中賜姓名以為子常從為騎將文德元年河南張言襲破河陽李罕之來歸晉晉處罕之于澤州遣存孝與薛阿檀安休休等以兵七千助罕之還擊河陽梁亦遣丁會牛存節等助言戰于溫縣梁軍先扼太行存孝大敗安休休被執是時晉已得澤潞歲出山東與孟方立爭邢洺磁存孝未嘗不在兵間方立死晉取三州存孝功為多明年潞州軍亂殺李克恭以歸唐梁遣李讜攻李罕之于澤州存孝以騎兵五千救之梁軍呼罕之曰公常恃太原以為命今上黨已歸唐唐兵大集圍太原沙陀將無穴以自處公復誰恃而不降乎存孝以精騎五百繞梁柵而呼曰我沙陀之求穴者待爾肉以食軍可令肥者出鬬梁驍將鄧季筠引軍出戰存孝舞矟擒之李讜敗走追擊至馬牢關還攻潞州唐以孫揆為潞州節度使揆儒者以梁卒三千為衛褒衣大蓋擁節先驅存孝以三百騎伏長子西崖谷間伺揆軍過橫擊斷之擒揆以歸初梁遣葛從周朱崇節守潞州以待揆聞揆見執皆棄去晉遂復取潞州是時張濬韓建伐晉擊陰地關晉以李存信薛阿檀等當濬別遣存孝軍于趙城唐軍戰敗于陰地關濬退保晉州韓建走絳州存孝攻晉州濬兵出戰輒復敗因閉壁不敢出存孝去攻絳州濬建皆走存孝猿臂善射身被重鎧櫜弓坐矟手舞鐵檛出入陳中以兩騎自從戰酣易騎上下如飛初存孝取潞州功為多而太祖別以大將康君立為潞州留後存孝為汾州刺史存孝負其功不食者數日及走張濬遷邠州刺史大順二年徙邢州留後是時晉軍連歲攻趙常山存孝常為先鋒下趙臨城元氏趙王求救於幽州李匡威匡威兵至晉軍輒引去存孝素與存信有隙存信譖之曰存孝有二心常避趙不擊存孝不自安乃附梁通趙自歸于唐因請會兵以伐晉唐命趙王王鎔援之明年趙與幽州有隙懼而與晉和反以兵三萬助晉擊存孝存孝嬰城自守太祖自將兵傅其城掘塹以圍之存孝出兵衝擊塹不得成裨將袁奉韜使人說存孝曰公所畏者晉王爾王俟塹成且留兵去諸將非公敵也雖塹何為存孝以為然縱兵成塹塹成深溝高壘不可近存孝遂窘城中食盡登城呼曰兒蒙王恩位至將相豈欲捨父子而附仇讎乃存信構陷之耳願生見王一言而死太祖哀之遣劉夫人入城慰諭之劉夫人引與俱來存孝泥首請罪曰兒於晉有功而無過所以至此由存信為之耳太祖叱曰爾為書檄罪我百端亦存信為之邪縛載後車至太原車裂之以徇然太祖惜其材悵然恨諸將之不能容也為之不視事者十餘日康君立素與存信相善方二人之交惡也君立每左右存信以傾之存孝已死太祖與諸將博語及存孝流涕不已君立以為不然太祖怒鴆殺君立君立初為雲州牙將唐僖宗時逐段文楚與太祖俱起雲中蓋君立首事其後纍立戰功表昭義節度使以存孝故殺之存進存進振武人也本姓孫名重進太祖攻破朔州得之賜以姓名養為子從太祖入關破黃巢以為義兒軍使從莊宗戰柏鄉遷行營馬步軍都虞候歷慈沁二州刺史莊宗初得魏博以為天雄軍都部署治梁亂軍一切以法人有犯者輒梟首磔尸於市魏人屏息畏之從戰河上以功遷振武軍節度使是時晉軍德勝為南北寨每以舟兵來往頗以為勞而河北無竹石存進乃以葦苲維大艦為浮梁莊宗大喜解衣以賜之晉討張文禮於鎮州久不克而史建瑭閻寶李嗣昭相次戰歿乃以存進代嗣昭為招討使軍于東垣渡東垣土惡築壘不能就存進伐木為柵晉軍晨出芻牧文禮子處球以兵千餘逼存進柵存進出戰橋上殺處球兵殆盡而存進亦歿于陳追贈太尉子漢韶明宗時復本姓為洋州節度使潞王從珂以鳳翔反漢韶與張虔釗會唐軍討之唐軍皆降于從珂獨漢韶與虔釗軍不降俱奔于蜀事蜀歷永平興元武信節度使年七十餘卒于蜀存璋存璋字德璜初與康君立薛志勤等從太祖入關破黃巢纍遷義兒軍使太祖病革存璋與張承業等受顧命立莊宗為晉王晉王以存璋為河東馬步軍使晉自先王時嘗優假軍士軍士多犯法踰禁莊宗新立尤患之存璋一切繩之以法境內為之清肅從攻夾城戰柏鄉以功遷汾州刺史莊宗與劉鄩戰於魏博梁遣王檀來乘虛襲太原存璋以汾州兵入太原距守以功遷大同軍防禦使遂為節度使天祐十九年以疾卒追贈太尉存賢存賢許州人也本姓王名賢少為軍卒善角抵太祖擊黃巢于陳州得之賜以姓名養為子後為義兒軍副兵馬使遷沁州刺史先時沁州當敵衝徙其南百餘里據險立柵而寓居至存賢為刺史曰徙城避敵豈勇者所為乃復城故州梁兵屢攻之存賢力自距守卒不能近遷武州刺史山北團練使又遷慈州天祐十八年梁兵攻朱友謙于河中莊宗遣存賢援友謙是時友謙新叛梁歸晉而河中食少人心多二諜者因謂存賢曰河中人欲殺子以歸梁宜亟去存賢曰死王事吾志也復何恨哉卒擊走梁兵莊宗即位拜右武衛上將軍莊宗亦好角抵嘗與王較而屢勝頗以自矜因顧存賢曰爾能勝我與爾一鎮存賢搏而勝之同光二年春幽州符存審病莊宗置酒宮中歎曰吾創業故人零落殆盡其所存者惟存審耳今又病篤北方之事誰可代之因顧存賢曰無以易卿角抵之勝吾不食言即日以為盧龍軍節度使是歲卒于幽州年六十五贈太傅
