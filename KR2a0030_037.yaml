body:
  text: 新五代史卷三十七伶官傳第二十五嗚呼盛衰之理雖曰天命豈非人事哉原莊宗之所以得天下與其所以失之者可以知之矣世言晉王之將終也以三矢賜莊宗而告之曰梁吾仇也燕王吾所立契丹與吾約為兄弟而皆背晉以歸梁此三者吾遺恨也與爾三矢爾其無忘乃父之志莊宗受而藏之于廟其後用兵則遣從事以一少牢告廟請其矢盛以錦囊負而前驅及凱旋而納之方其係燕父子以組函梁君臣之首入于太廟還矢先王而告以成功其意氣之盛可謂壯哉及仇讎已滅天下已定一夫夜呼亂者四應蒼皇東出未及見賊而士卒離散君臣相顧不知所歸至於誓天斷髮泣下沾襟何其衰也豈得之難而失之易歟抑本其成敗之迹而皆自於人歟書曰滿招損謙得益憂勞可以興國逸豫可以亡身自然之理也故方其盛也舉天下之豪傑莫能與之爭及其衰也數十伶人困之而身死國滅為天下笑夫禍患常積於忽微而智勇多困於所溺豈獨伶人也哉作伶官傳莊宗既好俳優又知音能度曲至今汾晉之俗往往能歌其聲謂之御製者皆是也其小字亞子當時人或謂之亞次又別為優名以自目曰李天下自其為王至於為天子常身與俳優雜戲于庭伶人由此用事遂至於亡皇后劉氏素微其父劉叟賣藥善卜號劉山人劉氏性悍方與諸姬爭寵常自恥其世家而特諱其事莊宗乃為劉叟衣服自負蓍囊藥笈使其子繼岌提破帽而隨之造其臥內曰劉山人來省女劉氏大怒笞繼岌而逐之宮中以為笑樂其戰於胡柳也嬖伶周匝為梁人所得其後滅梁入汴周匝謁於馬前莊宗得之喜甚賜以金帛勞其良苦周匝對曰身陷仇人而得不死以生者教坊使陳俊內園栽接使儲德源之力也願乞二州以報此兩人莊宗皆許以為刺史郭崇韜諫曰陛下所與共取天下者皆英豪忠勇之士今大功始就封賞未及於一人而先以伶人為刺史恐失天下心不可因格其命踰年而伶人屢以為言莊宗謂崇韜曰吾已許周匝矣使吾慚見此三人公言雖正然當為我屈意行之卒以俊為景州刺史德源為憲州刺史音閣莊宗好畋獵獵于中牟踐民田中牟縣令當馬切諫為民請莊宗怒叱縣令去將殺之伶人敬新磨知其不可乃率諸伶走追縣令擒至馬前責之曰汝為縣令獨不知吾天子好獵邪奈何縱民稼穡以供稅賦何不飢汝縣民而空此地以備吾天子之馳騁汝罪當死因前請亟行刑諸伶共唱和之莊宗大笑縣令乃得免去莊宗嘗與羣優戲于庭四顧而呼曰李天下李天下何在新磨遽前以手批其頰莊宗失色左右皆恐羣伶亦大驚駭共持新磨詰曰汝奈何批天子頰新磨對曰李天下者一人而已復誰呼邪於是左右皆笑莊宗大喜賜與新磨甚厚新磨嘗奏事殿中殿中多惡犬新磨去一犬起逐之新磨倚柱而呼曰陛下毋縱兒女囓人莊宗家世夷狄夷狄之人諱狗故新磨以此譏之莊宗大怒彎弓注矢將射之新磨急呼曰陛下無殺臣臣與陛下為一體殺之不祥莊宗大驚問其故對曰陛下開國改元同光天下皆謂陛下同光帝且同銅也若殺敬新磨則同無光矣莊宗大笑乃釋之然時諸伶獨新磨尤善俳其語最著而不聞其他過惡其敗政亂國者有景進史彥瓊郭門高三人為最是時諸伶人出入宮掖侮弄縉紳羣臣憤嫉莫敢出氣或反相附託以希恩幸四方藩鎮貨賂交行而景進最居中用事莊宗遣進等出訪民間事無大小皆以聞每進奏事殿中左右皆屏退軍機國政皆與參決三司使孔謙兄事之呼為八哥莊宗初入洛居唐故宮室而嬪御未備閹宦希旨多言宮中夜見鬼物相驚恐莊宗問所以禳之者因曰故唐時後宮萬人今空宮多怪當實以人乃息莊宗欣然其後幸宗還洛進載鄴女千人以從道路相屬男女無別魏王繼岌已破蜀劉皇后聽宦者讒言遣繼岌賊殺郭崇韜崇韜素嫉伶人常裁抑之伶人由此皆樂其死皇弟存乂崇韜之壻也進讒於莊宗曰存乂且反為婦翁報仇乃囚而殺之朱友謙以梁河中降晉者及莊宗入洛伶人皆求賂於友謙友謙不能給而辭焉進乃讒友謙曰崇韜且誅友謙不自安必反宜并誅之於是及其將五六人皆族滅之天下不勝其冤進宮至銀青光祿大夫檢校左散騎常侍兼御史大夫上柱國史彥瓊者為武德使居鄴都而魏博六州之政皆決彥瓊自留守王正言而下皆俯首承事之是時郭崇韜以無罪見殺于蜀天下未知其死也第見京師殺其諸子因相傳曰崇韜殺魏王繼岌而自王於蜀矣以故族其家鄴人聞之方疑惑已而朱友謙又見殺友謙子廷徽為澶州刺史有詔彥瓊使殺之彥瓊祕其事夜半馳出城鄴人見彥瓊無故夜馳出因驚傳曰劉皇后怒崇韜之殺繼岌也已弒帝而自立急召彥瓊計事鄴都大恐貝州人有來鄴者傳此語以歸戍卒皇甫暉聞之由此劫趙在禮作亂在禮已至館陶鄴都巡檢使孫鐸見彥瓊求兵禦賊彥瓊不肯與曰賊未至至而給兵豈晚邪已而賊至彥瓊以兵登北門聞賊呼聲大恐棄其兵而走單騎歸于京師在禮由是得入于鄴以成其叛亂者由彥瓊啓而縱之也郭門高者名從謙門高其優名也雖以優進而嘗有軍功故以為從馬直指揮使從馬直蓋親軍也從謙以姓郭拜崇韜為叔父而皇弟存乂又以從謙為養子崇韜死存乂見囚從謙置酒軍中憤然流涕稱此二人之冤是時從馬直軍士王溫宿衛禁中夜謀亂事覺被誅莊宗戲從謙曰汝黨存乂崇韜負我又教王溫反復欲何為乎從謙恐退而激其軍士曰罄爾之資食肉而飲酒無為後日計也軍士問其故從謙因曰上以王溫故俟破鄴盡坑爾曹軍士信之皆欲為亂李嗣源兵反嚮京師莊宗東幸汴州而嗣源先入莊宗至萬勝不得進而還軍士離散尚有二萬餘人居數日莊宗復東幸汜水謀扼關以為拒四月丁亥朔朝羣臣於中興殿宰相對三刻罷從駕黃甲馬軍陳於宣仁門步軍陳於五鳳門以俟莊宗入食內殿從謙自營中露刃注矢馳攻興教門與黃甲軍相射莊宗聞亂率諸王衛士擊亂兵出門亂兵縱火焚門緣城而入莊宗擊殺數十百人亂兵從樓上射帝帝傷重踣于絳霄殿廊下自皇后諸王左右皆奔走至午時帝崩五坊人善友聚樂器而焚之嗣源入洛得其骨葬新安之雍陵以從謙為景州刺史已而殺之傳曰君以此始必以此終莊宗好伶而弒於門高焚以樂器可不信哉可不戒哉
