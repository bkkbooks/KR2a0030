body:
  text: 新五代史卷二十七唐臣傳第十五朱弘昭馮贇附朱弘昭太原人也少事明宗為客將明宗即位為文思使與安重誨有隙故常使于外董璋為東川節度使乃以弘昭為副使西川孟知祥殺其監軍李嚴弘昭大懼求還京師璋不許遂相猜忌弘昭益開懷待之不疑璋頗重其為人後璋有軍事遣弘昭入朝弘昭乃免遷左衛大將軍內客省使宣徽南院使鳳翔節度使孟知祥反石敬瑭伐蜀久無功明宗遣安重誨督軍是時重誨已有間重誨至鳳翔弘昭迎謁禮甚恭延重誨于家使其妻妾侍飲食重誨以弘昭厚己酒酣具言蒙天子厚恩而所以讒間之端因泣下弘昭即奏言重誨怨望又陰遣人馳告敬瑭使拒重誨會敬瑭以糧餉不繼遽燒營返軍重誨亦以被讒召還過鳳翔弘昭閉門不納重誨由此得罪死樞密使范延光尤惡弘昭為人罷為左武衛上將軍宣徽南院使久之為山南東道節度使是時明宗已病而秦王從榮禍起有端唐諸大臣皆欲引去以避禍樞密使范延光趙延壽日夕更見涕泣求去明宗怒而不許延壽使其妻興平公主入言於中延光亦因孟漢瓊王淑妃進説故皆得罷以弘昭及馮贇代延壽延光弘昭入見辭曰臣廝養之才不足當大任明宗叱之曰公等皆不欲在吾目前邪吾養公等安用弘昭惶恐乃視事馮贇者亦太原人也其父璋事明宗為閽者贇為兒時以通黠為明宗所愛明宗為節度使以贇為進奏官明宗即位即為客省使宣徽北院使歷河東忠武節度使三司使明宗病甚大臣稀復進見而孟漢瓊王淑妃用事弘昭及贇並掌機務於中大事皆決此四人及殺秦王而立愍帝益自以為功又其所用多非其人給事中陳乂為人險譎好陰謀嘗事梁張漢傑又事郭崇韜兩人皆輒敗死弘昭乃引以為樞密直學士而用其謀是時弘昭贇遣漢瓊至魏召愍帝入立而留漢瓊權知後事明年正月漢瓊請入朝弘昭贇乃議徙成德范延光代漢瓊北京留守石敬瑭代延光鳳翔潞王從珂代敬瑭三人者皆唐大臣以漢瓊故輕易其地又不降制書第遣使者監其上道從珂由此遂反從珂兵已東愍帝大懼遣人召弘昭計事弘昭謂其客穆延暉曰上召我急將罪我也吾兒婦君之女也其以歸無使及禍乃拔劍大哭欲自裁而家人止之使者促弘昭入見甚急弘昭呼曰窮至此邪乃自投于井以死安從進聞之亦殺贇于家贇母新死子母棄尸于道妻子皆見殺贇有子三歲其故吏張守素匿之以免漢高祖即位贈弘昭尚書令贇中書令劉延朗劉延朗宋州虞城人也初廢帝起於鳳翔與共事者五人節度判官韓昭胤掌書記李專美牙將宋審虔客將房皓而延朗為孔目官初愍帝即位徙廢帝為北京留守不降制書遣供奉官趙處願促帝上道帝疑惑召昭胤等計議昭胤等皆勸帝反由是事無大小皆此五人謀之而皓又喜鬼神巫祝之説有瞽者張濛自言事太白山神神魏崔浩也其言吉凶無不中皓素信之嘗引濛見帝聞其語聲驚曰此非人臣也皓使濛問於神神傳語曰三珠並一珠驢馬沒人驅歲月甲庚午中興戊己土皓不曉其義使問濛濛曰神言如此我能傳之不能解也帝即以濛為館驛巡官帝將反而兵少又乏食由此甚懼使皓問濛濛傳神語曰王當有天下可無憂於是決反使專美作檄書言朱弘昭馮贇幸明宗病殺秦王而立愍帝帝年少小人用事離間骨肉將問罪於朝遣使者馳告諸鎮皆不應獨隴州防禦使相里金遣其判官薛文遇計事帝得文遇大喜而延朗調率城中民財以給軍王思同率諸鎮兵圍鳳翔廢帝懼又遣皓問神神曰王兵少東兵來所以迎王也已而東兵果叛降于帝帝入京師即位之日受册明宗柩前册曰維應順元年歲次甲午四月庚午朔帝回顧皓曰張濛神言豈不驗哉由是皓益見親信而專以巫祝用事帝既立以昭胤為左諫議大夫端明殿學士專美為比部郎中樞密院直學士審虔為皇城使皓為宣徽北院使延朗為莊宅使久之昭胤皓為樞密使延朗為副使審虔為侍衛步軍都指揮使而薛文遇亦為職方郎中樞密院直學士由是審虔將兵專美文遇主謀議而昭胤皓及延朗掌機密初帝與晉高祖俱事明宗而心不相悅帝既入立高祖不得已來朝而心頗自疑欲求歸鎮且難言之乃陽為羸疾灸灼滿身冀帝憐而遣之延朗等多言敬瑭可留京師昭胤專美曰敬瑭與趙延壽皆尚唐公主不可獨留乃復授高祖河東而遣之是時契丹數寇北邊以高祖為大同振武威塞彰國等軍蕃漢馬步軍都總管屯于欣州而屯兵忽變擁高祖呼萬歲高祖懼斬三十餘人而後止於是帝益疑之是時高祖悉握精兵在北饋運芻糧遠近勞弊帝與延朗等日夕謀議而專美文遇迭宿中興殿廬召見訪問常至夜分而罷是時高祖弟重胤為皇城副使而石氏公主母曹太后居中因得伺帝動靜言語以報高祖高祖益自危懼每帝遣使者勞軍即陽為羸疾不自堪因數求解總管以探帝心是時帝母魏氏追封宣憲皇太后而墓在太原有司議立寢宮高祖建言陵與民家墓相雜不可立宮帝疑高祖欲毀民墓為國取怨帝由此發怒罷高祖總管徙鄆州延朗等多言不可而司天趙延義亦言天象失度宜安靜以弭災其事遂止後月餘文遇獨直帝夜召之語罷敬瑭事文遇曰臣聞作舍道邊三年不成國家之事斷在陛下且敬瑭徙亦反不徙亦反遲速爾不如先事圖之帝大喜曰術者言朕今年當得一賢佐以定天下卿其是邪乃令文遇手書除目夜半下學士院草制明日宣制文武兩班皆失色居五六日敬瑭以反聞敬瑭上書言帝非明宗子而許王從益次當立帝得書大怒手壞而投之召學士馬胤孫為答詔曰宜以惡語詆之延朗等請帝親征帝心憂懼常惡言敬瑭事每戒人曰爾無説石郎令我心膽墮地由此不欲行而延朗等屢迫之乃行至懷州帝夜召李嵩問以計策文遇不知而繼至帝見之色變嵩躡其足文遇乃出帝曰我見文遇肉顫欲抽刀刺之嵩曰文遇小人致誤大事刺之益醜乃已是時契丹已立敬瑭為天子以兵而南帝惶惑不知所之遣審虔將千騎至白馬坡踏戰地審虔曰何地不堪戰雖有其地何人肯立于此不如還也帝遂還自焚高祖入京師延朗等六人皆除名為民初延朗與皓並掌機密延朗專任事諸將當得州者不以功次為先後納賂多者得善州少及無賂者得惡州或久而不得由是人人皆怨皓心患之而不能爭也但日飽食高枕而已每延朗議事則垂頭陽睡不省及晉兵入延朗以一騎走南山過其家指而嘆曰吾積錢三十萬于此不知何人取之遂為追兵所殺晉高祖聞皓常不與延朗事哀之後復以為將歲餘卒專美事晉為大理卿開運中卒當晉之將起廢帝以昭胤為中書侍郎同中書門下平章事出為河陽節度使與審虔文遇皆不知其所終嗚呼禍福成敗之理可不戒哉張濛神言驗矣然焉知其不為禍也豫之所記大抵如此覽者可以深思焉廢帝之起所與圖議者此五六人而已考其逆順之理雖有智者為之謀未必能不敗況如此五六人者哉故並述以附延朗見其始終之際云康思立康思立本山陰諸部人也少為騎將從莊宗破梁夾城戰柏鄉纍以功遷突騎指揮使明宗即位歷應嵐二州刺史宿州團練使昭武軍節度使徙鎮保義皆有善政潞王從珂反於鳳翔愍帝遣王思同等討之思立有捧聖羽林屯兵千五百人乃以羽林千人屬思同思同至鳳翔軍叛降于從珂思立聞之欲盡誅羽林千人家屬未及而從珂兵已至思立乃以捧聖兵城守從珂兵傅其城呼曰西兵十萬策新天子爾五百人其能拒邪徒陷陝人於死耳捧聖兵聞之皆解甲思立遂開門迎從珂廢帝即位以思立初無降意頗不悅之徙安遠又徙安國以年老罷為右神武統軍石敬瑭反太原廢帝以思立為北面行營馬軍都指揮使廢帝幸懷州遣思立將從駕騎兵出團柏谷救張敬達未至而敬達死楊光遠降晉思立疾卒于道晉高祖入立贈太子少師康義誠康義誠字信臣代北三部落人也以騎射事晉王莊宗時為突騎指揮使從明宗討趙在禮至魏而軍變義誠前陳莊宗過失勸明宗南嚮明宗即位遷捧聖指揮使領汾州刺史從破朱守殷遷侍衛親軍馬步軍都指揮使領河陽三城節度使出為山南東道節度使復為親軍都指揮使領河陽加同中書門下平章事秦王從榮素驕自為河南尹典六軍拜大元帥唐諸大臣皆懼禍及思自脫獨義誠心結之遣其子事秦王府明宗病從榮謀以兵入宮唐大臣朱弘昭馮贇等皆以為不可而義誠獨持兩端從榮已舉兵至天津橋弘昭等入以反白明宗涕泣召義誠使自處置而義誠卒不出兵馬軍指揮使朱弘實以兵擊從榮從榮敗走見殺三司使孫嶽嘗為馮贇言從榮必敗之狀義誠聞而不悅及從榮死義誠始引兵入河南府召嶽檢閲從榮家資嶽至義誠乘亂使人射之嶽走至通利坊見殺明宗不能詰義誠已殺嶽又以從榮故與弘實有隙愍帝即位弘實常以誅從榮功自負義誠心益不平潞王從珂反鳳翔王思同率諸鎮兵圍之興元張虔釗兵叛降從珂思同走諸鎮兵皆潰愍帝大怒謂朱弘昭等曰朕新即位天下事皆出諸公然於事兄未有失節諸公以大計見迫不能獨違事一至此何方轉禍吾當率左右往迎吾兄遜以位苟不吾信死其所也弘昭等惶恐不能對義誠前曰西師驚潰主將怯耳今京師兵尚多臣請盡將以西扼關而守招集亡散以為後圖愍帝以為然幸左藏庫親給將士人絹二十匹錢五千是時明宗山陵未畢帑藏空虛軍士負物揚言曰到鳳翔更請一分朱弘實見軍士無鬬志而義誠盡將以西疑其二心謂義誠曰今西師小衄而無一騎東者人心可知不如以見兵守京師以自固彼雖幸勝特得虔釗一軍耳諸鎮之兵在後其敢徑來邪義誠怒曰如此言弘實反矣弘實曰公謂誰欲反邪其聲厲而聞愍帝召兩人爭於前帝不能決遂斬弘實以義誠為招討使悉將禁軍以西愍帝奔衛州義誠行至新安降于從珂清泰元年四月斬于興教門外夷其族嗚呼五代為國興亡以兵而其軍制後世無足稱焉惟侍衛親軍之號今猶因之而甚重此五代之遺制也然原其始起微矣及其至也可謂盛哉當唐之末方鎮之兵多矣凡一軍有指揮使一人而合一州之諸軍又有馬步軍都指揮使一人蓋其卒伍之長也自梁以宣武軍建國因其舊制有在京馬步軍都指揮使後唐因之至明宗時始更為侍衛親軍馬步軍都指揮使當是時天子自有六軍諸衛之職六軍有統軍諸衛有將軍而又以大臣宗室一人判六軍諸衛事此朝廷大將天子國兵之舊制也而侍衛親軍者天子自將之私兵也推其名號可知矣天子自為將則都指揮使乃其卒伍之都長耳然自漢周以來其職益重漢有侍衛司獄凡朝廷大事皆決侍衛獄是時史弘肇為都指揮使與宰相樞密使並執國政而弘肇尤專任以至於亡語曰涓涓不絶流為江河熒熒不滅炎炎奈何可不戒哉然是時方鎮各自有兵天子親軍不過京師之兵而已今方鎮名存而實亡六軍諸衛又益以廢朝廷無大將之職而舉天下內外之兵皆侍衛司矣則為都指揮使者其權豈不益重哉親軍之號始於明宗其後又有殿前都指揮使亦親軍也皆不見其更置之始今天下之兵分屬此兩司矣藥彥稠藥彥稠沙陀三部落人也初為騎將明宗即位拜澄州刺史從王晏球破王都定州遷侍衛步軍都虞候領壽州節度使安重誨矯詔遣河中指揮使楊彥溫逐其節度使潞王從珂以彥稠為招討使明宗疑彥溫有所説戒彥稠得彥溫毋殺將訊之彥稠希重誨旨殺彥溫以滅口明宗大怒然不之罪也長興中為靜難軍節度使黨項阿埋屈悉保等族抄掠方渠邀殺回鶻使者明宗遣彥稠與靈武康福會兵擊之阿埋等亡竄山谷明宗以謂黨項知懼可加約束而綏撫之使者未至彥稠等自牛兒族入白魚谷盡誅其族獲其大首領連香等遣人上捷明宗謂其使者曰吾誅黨項非有所利也凡軍中所獲悉與士卒分之毋以進奉為名重斂軍士也已而彥稠以黨項所掠回鶻進奉玉兩團及遺秦王金裝胡等來獻明宗曰吾已語彥稠矣不可失信因悉以賜彥稠又逐鹽州諸戎取其所掠男女千餘人潞王從珂反彥稠為招討副使王思同兵潰彥稠與思同俱東走為潞王兵所得囚之華州獄已而殺之晉高祖立贈侍中彥稠與思同俱以敗走時愍帝猶在唐未亡二人走歸國於節未虧異於元行欽之走也然思同辭義不屈其死可嘉彥稠直被執見殺爾餘無可稱故不列於死事
