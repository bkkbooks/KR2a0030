body:
  text: 新五代史卷三十漢臣傳第十八蘇逢吉蘇逢吉京兆長安人也漢高祖鎮河東父悅為高祖從事逢吉常代悅作奏記悅乃言之高祖高祖召見逢吉精神爽秀憐之乃以為節度判官高祖性素剛嚴賓佐稀得請見逢吉獨入終日侍立高祖書閣中兩使文簿盈積莫敢通逢吉輒取內之懷中伺高祖色可犯時以進之高祖多以為可以故甚愛之然逢吉為人貪詐無行喜為殺戮高祖嘗以生日遣逢吉疏理獄囚以祈福謂之靜獄逢吉入獄中閲囚無輕重曲直悉殺之以報曰獄靜矣高祖建號拜逢吉中書侍郎同中書門下平章事是時制度草創朝廷大事皆出逢吉逢吉以為己任然素不學問隨事裁決出其意見是故漢世尤無法度而不施德政民莫有所稱焉高祖既定京師逢吉與蘇禹圭同在中書除吏多違舊制逢吉尤納貨賂市權鬻官謗者歡譁然高祖方倚信二人故莫敢有告者鳳翔李永吉初朝京師逢吉以永吉故秦王從曮子家世王侯當有奇貨使人告永吉許以一州而求其先王玉帶永吉以無為解逢吉乃使人市一玉帶直數千緡責永吉償之前客省使王筠自晉末使楚至是還逢吉意筠得楚王重賂遣人求之許以一州筠怏怏以其橐裝之半獻之而皆不得州晉相李嵩從契丹以北高祖入京師以嵩第賜逢吉而嵩別有田宅在西京逢吉遂皆取之嵩自北還因以宅券獻逢吉逢吉不悅而嵩子弟數出怨言其後逢吉乃誘人告嵩與弟嶼等下獄嵩款自誣伏與家僮二十人謀因高祖山陵為亂獄上中書逢吉改二十人為五十人遂族嵩家是時天下多盜逢吉自草詔書下州縣凡盜所居本家及鄰保皆族誅或謂逢吉曰為盜族誅已非王法況鄰保乎逢吉口六以為是不得已但去族誅而已於是鄆州捕賊使者張令柔盡殺平陰縣十七村民數百人衛州刺史葉仁魯聞部有盜自帥兵捕之時村民十數共逐盜入于山中盜皆散走仁魯從後至見民捕盜者以為賊悉擒之斷其腳筋暴之山麓宛轉號呼纍日而死聞者不勝其冤而逢吉以仁魯為能由是天下因盜殺人滋濫逢吉已貴益為豪侈謂中書堂食為不可食乃命家廚進羞日極珍善繼母死不服喪妻武氏卒諷百官及州鎮皆輸綾絹為喪服武氏未期除其諸子為官有庶兄自外來未白逢吉而見其諸子逢吉怒託以它事告於高祖杖殺之逢吉嘗從高祖征鄴數使酒辱周太祖於軍中太祖恨之其後隱帝立逢吉素善李濤諷濤請罷太祖與楊邠樞密李太后怒濤離間大臣罷濤相以楊邠兼平章事事悉關決逢吉禹圭由是備位而已乾祐二年加拜司空周太祖鎮鄴不落樞密使逢吉以謂樞密之任方鎮帶之非便與史弘肇爭於是卒如弘肇議弘肇怨逢吉異己已而會王章第使酒坐中弘肇怒甚逢吉謀求出鎮以避之既而中輟人問其故逢吉曰苟捨此而去史公一處分吾虀粉矣是時隱帝少年小人在側弘肇等威制人主帝與左右李業郭允明等皆患之逢吉每見業等以言激之業等卒殺弘肇即以逢吉權知樞密院方命草麻聞周太祖起兵乃止逢吉夜宿金祥殿東閣謂司天夏官正王處訥曰昨夕未瞑已見李嵩在側生人接死者無吉事也周太祖至北郊官軍敗于劉子陂逢吉宿七里夜與同舍酣飲索刀將自殺為左右所止明日與隱帝走趙村自殺於民舍周太祖定京師梟其首適當李嵩被刑之所廣順初賜其子西京莊並宅一區史弘肇史弘肇字化元鄭州滎澤人也為人驍勇走及奔馬梁末調民七戶出一兵弘肇為兵隸開道指揮選為禁兵漢高祖典禁兵弘肇為軍校其後漢高祖鎮太原使將武節左右指揮領雷州刺史高祖建號於太原代州王暉拒命弘肇攻破之以功拜忠武軍節度使侍衛步軍都指揮使是時契丹北歸留耿崇美攻王守恩於潞州高祖遣弘肇前行擊之崇美敗走守恩以城歸漢而河陽武行德澤州翟令奇等皆迎弘肇自歸弘肇入河陽高祖從後至遂入京師弘肇為將嚴毅寡言麾下嘗少忤意立檛殺之軍中為股栗以故高祖起義之初弘肇行兵所至秋毫無犯兩京帖然遷侍衛親軍馬步軍都指揮使領歸德軍節度使同中書門下平章事高祖疾大漸與楊邠蘇逢吉等同授顧命一作受隱帝時河中李守貞鳳翔王景崇永興趙思綰等皆反關西用兵人情恐懼京師之民流言以相驚恐弘肇出兵警察務行殺戮罪無大小皆死是時太白晝見民有仰觀者輒腰斬于市市有醉者忤一軍卒誣其訛言坐棄市凡民抵罪吏以白弘肇但以三指示之吏即腰斬之又為斷舌決口斫筋折足之刑李嵩坐奴告變族誅弘肇取其幼女以為婢於是前資故將失職之家姑息僮奴而廝養之輩往往脅制其主侍衛孔目官解暉狡酷因緣為姦民抵罪者莫敢告訴燕人何福進有玉枕直錢十四萬遣僮賣之淮南以鬻茶僮隱其錢福進笞責之僮乃誣告福進得趙延壽玉枕以遺吳人弘肇捕治福進棄市帳下分取其妻子而籍其家財弘肇不喜賓客嘗言文人難耐呼我為卒弘肇領歸德其副使等月率私錢千緡為獻潁州麴場官麴溫與軍將何拯爭官務訟之三司三司直溫拯訴之弘肇弘肇以謂潁己屬州而溫不先白己乃追溫殺之連坐者數十人周太祖平李守貞推功羣臣弘肇拜中書令隱帝自關西罷兵漸近小人與後贊李業等嬉遊無度而太后親族頗行干託弘肇與楊邠稍裁抑之太后有故人子求補軍職弘肇輒斬之帝始聽樂賜教坊使等玉帶錦袍往謝弘肇弘肇怒曰健兒為國征行者未有偏賜爾曹何功敢當此乎悉取所賜還官周太祖出鎮魏州弘肇議帶樞密行蘇逢吉楊邠以為不可弘肇恨之明日會飲竇貞固第弘肇厲聲舉爵屬太祖曰昨日廷論何為異同今日與公飲此逢吉與邠亦舉大爵曰此國家事也何必介意乎遂俱飲釂弘肇曰安朝廷定禍亂直須長槍大劍若毛錐子安足用哉三司使王章曰無毛錐子軍賦何從集乎毛錐子蓋言筆也弘肇默然他日會飲章第酒酣為手勢令弘肇不能為客省使閻晉卿坐次弘肇屢教之蘇逢吉戲曰坐有姓閻人何憂罰爵弘肇妻閻氏酒家倡以為譏己大怒以醜語詬逢吉逢吉不校弘肇欲歐之逢吉先出弘肇起索劍欲追之楊邠泣曰蘇公漢宰相公若殺之致天子何地乎弘肇馳馬去邠送至第而還由是將相如水火隱帝遣王峻置酒公子亭和解之是時李業郭允明後贊聶文進等用事不喜執政而隱帝春秋漸長為大臣所制數有忿言業等乘間譖之以謂弘肇威震人主不除必為亂隱帝頗欲除之夜聞作坊鍛甲聲以為兵至達旦不寐由是與業等密謀禁中乾祐三年冬十月十三日弘肇與楊邠王章等入朝坐廣政殿東廡甲士數十人自內出擒弘肇邠章斬之並族其三家弘肇已死帝坐崇元殿召羣臣告以弘肇等謀反羣臣莫能對又召諸軍校見於萬歲殿帝曰弘肇等專權使汝曹常憂橫死今日吾得為汝主矣軍校皆拜周太祖即位追封弘肇鄭王以禮歸葬楊邠楊邠魏州冠氏人也少為州掌籍吏租庸使孔謙領度支補邠勾押官歷孟華鄆三州糧料院使事漢高祖為右都押衙高祖即位拜樞密使邠出於小吏不喜文士與蘇逢吉等內相排忌逢吉諷李濤上疏罷邠與周太祖樞密使邠泣訴李太后前太后怒罷濤相加邠中書侍郎兼吏部尚書同平章事是時逢吉禹圭頗以私賄除吏多繆邠為相事無大小必先示邠邠以為可乃入白而深革逢吉所為凡門蔭出身諸司補吏者一切罷之邠雖長於吏事而不知大體以謂為國家者帑廩實甲兵完而已禮樂文物皆虛器也以故秉大政而務苛細凡前資官不得居外而天下行旅皆給過所然後得行旬日之間人情大擾邠度不可行而止邠常與王章論事帝前帝曰事行之後勿使有言也邠遽曰陛下但禁聲有臣在聞者為之戰栗李太后弟業求為宣徽使帝與太后私以問邠邠止以為不可帝欲立所愛耿夫人為后邠又以為不可夫人死將以后禮葬之邠又以為不可由是隱帝大怒而左右乘間構之與史弘肇等同日見殺邠為人頗儉靜四方之賂雖不却然往往以獻於帝居家謝絶賓客晚節稍通縉紳延客門下知史傳有用乃課吏傳寫未幾及於禍周太祖即位追封弘農王王章王章魏州南樂人也為州孔目官張令昭逐節度使劉延皓章事令昭令昭敗章婦翁白文珂與副招討李周善乃以章託周周匿章褚中以橐駝負之洛陽藏周第唐滅章乃出為河陽糧料使漢高祖典禁兵補章孔目官從之太原高祖即位拜三司使檢校太尉高祖崩隱帝即位加太尉同中書門下平章事是時漢方新造承契丹之後京師空乏而關西三叛作周太祖用兵西方章供饋軍旅未嘗乏絶然征利剝下民甚苦之往時民租一石輸二升為雀鼠耗章乃增一石輸二斗為省耗緡錢出入皆以八十為陌章減其出者陌三州縣民訴田者必全州縣覆之以括其隱田天下由此重困然尤不喜文士嘗語人曰此輩與一把算子未知顛倒何益於國邪百官俸廩皆取供軍之餘不堪者命有司高估其價估定又增謂之撎估章猶意不能滿往往復增之民有犯鹽礬酒麴者無多少皆抵死吏緣為姦民莫堪命已而與史弘肇等同日見殺劉銖劉銖陝州人也少為梁邵王牙將與漢高祖有舊高祖鎮太原以為左都押衙銖為人慘酷好殺戮高祖以為勇斷類己特信用之高祖即位拜永興軍節度使徙鎮平盧加檢校太師同平章事又加侍中是時江淮不通吳越錢鏐使者常泛海以至中國而濱海諸州皆置博易務與民貿易民負失期者務吏擅自攝治置刑獄不關州縣而前為吏者納其厚賂縱之不問民頗為苦銖乃一切禁之然銖用法亦自為刻深民有過者問其年幾何對曰若干即隨其數杖之謂之隨年杖每杖一人必兩杖俱下謂之合歡杖又請增民租畝出錢三十以為公用民不堪之隱帝患銖剛暴召之懼不至是時沂州郭淮攻南唐還以兵駐青州隱帝乃遣符彥卿往代銖銖顧禁兵在莫敢有異意乃受代還京師銖嘗切齒於史弘肇楊邠等已而弘肇等死銖謂李業等曰諸君可謂僂儸兒矣權知開封府周太祖兵犯京師銖悉誅太祖與王峻等家屬太祖入京師銖妻裸露以席自蔽與銖俱見執銖謂其妻曰我則死矣汝應與人為婢太祖使人責銖曰與公共事先帝獨無故人之情乎吾家屠滅雖有君命加之酷毒一何忍也今公亦有妻子獨念之乎銖曰為漢誅叛臣爾豈知其他是時太祖方欲歸人心乃與羣臣議曰劉侍中墜馬傷甚而軍士逼辱逮有微生吾欲奏太后貸其家屬何如羣臣皆以為善乃止殺銖與李業等梟首於市赦其妻子太祖即位賜陝州莊宅各一區李業李業高祖皇后之弟也后昆弟七人業最幼故尤憐之高祖時以為武德使隱帝即位業以皇太后故益用事無顧憚時天下旱蝗黃河決溢京師大風拔木壞城門宮中數見怪物投瓦石撼門扉隱帝召司天趙延乂問禳除之法延乂對曰臣職天象日時察其變動以考順逆吉凶而已禳除之事非臣所知也然臣所聞殆山魈也皇太后乃召尼誦佛書以禳之一尼如廁既還悲泣不知人者數日及醒訊之莫知其然而帝方與業及聶文進後贊郭允明等狎昵多為廋語相誚戲放紙鳶于宮中太后數以灾異戒帝不聽時宣徽使闕業欲得之太后亦遣人諷大臣大臣楊邠史弘肇等皆以為不可業由此怨望謀殺邠等邠等已死又遣供奉官孟業以詔書殺郭威于魏州威舉兵反隱帝遣左神武統軍袁侍衛馬軍都指揮使閻晉卿等率兵拒威于澶淵兵未出威已至滑州帝大懼謂大臣曰昨太草草耳業請出府庫以賚軍宰相蘇禹圭以為未可業拜禹圭於帝前曰相公且為官家勿惜府庫乃詔賜京師兵及魏兵從威南者錢人十千督其子弟作書以告北兵之來者及漢兵敗于北郊業取內庫金寶懷之以奔其兄保義軍節度使洪信洪信拒而不納業走至絳州為人所殺聶文進聶文進並州人也少為軍卒善書算給事漢高祖帳中高祖鎮太原以為押司官高祖即位歷拜領軍屯衛將軍樞密院承旨周太祖為樞密使頗親信之文進稍橫恣遷右領軍大將軍入謝召諸將軍設食朝堂儀鸞翰林御廚供帳飲食文進自如有司不敢劾周太祖鎮鄴文進等用事居中及謀殺楊邠等文進夜作詔書制置中外邠等已死文進點閲兵籍指麾殺戮以為己任周太祖在鄴聞邠等遇害初以為文進不與及發詔書皆文進手跡乃大詬之周兵至京師隱帝敗于北郊太后懼使謂文進善衛帝對曰臣在此百郭威何害慕容彥超敗走帝宿于七里文進夜與其徒飲酒歌呼自若明旦隱帝遇弒文進亦自殺後贊後贊兗州瑕丘人其母倡也贊幼善謳事張延朗延朗死贊更事漢高祖高祖愛之以為牙將高祖即位拜飛龍使隱帝尤愛幸之楊邠等執政贊久不得遷乃共謀殺邠等邠等死隱帝悔之贊與允明等番休侍帝不欲左右言己短隱帝兵敗北郊贊奔兗州慕容彥超執送京師梟首于市郭允明郭允明少為漢高祖廝養高祖愛之以為翰林茶酒使隱帝尤狎愛之允明益驕橫無顧避大臣不能禁允明使荊南高保融車服導從如節度使保融待之甚厚允明乃陰使人步測其城池高下若為攻取之計者以動之荊人皆恐保融厚賂以遣之遷飛龍使已而李業與允明謀殺楊邠等是日無雲而昏霧雨如泣日中載邠等十餘尸暴之市中允明手殺邠等諸子於朝堂西廡王章壻張貽肅血流逆注隱帝敗于北郊還至封丘門不得入帝走趙村允明從後追之弒帝于民舍乃自殺
