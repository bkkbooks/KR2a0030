body:
  text: 新五代史卷五十雜傳第三十八王峻王峻字秀峯相州安陽人也父豐為樂營將峻少以善歌事梁節度使張筠唐莊宗已下魏博筠棄相州走歸京師租庸使趙巖過筠家筠命峻歌佐酒巖見而悅之是時巖方用事筠因以峻遺巖梁亡巖族誅峻流落民間久之事三司使張延朗延朗不甚愛之晉高祖滅唐殺延朗是時漢高祖從晉起兵因悉以延朗資産賜之峻因得事漢高祖高祖鎮河東峻為客將高祖即位拜峻客省使漢遣郭從義討趙思綰以峻監其軍纍遷宣徽北院使周太祖鎮天雄軍峻為監軍漢隱帝已殺大臣史弘肇等又遣人殺周太祖及峻等峻等遂與太祖舉兵犯京師太祖監國以漢太后命拜峻樞密使太祖將兵北出至澶州返軍嚮京師是時太祖已遣馮道迎湘陰公贇于徐州而漢宗室蔡王信在許州峻與王殷謀遣侍衛馬軍指揮使郭崇率兵之宋州前申州刺史馬鐸之許州以伺變崇鐸遂殺贇信太祖入立拜峻右僕射門下侍郎同中書門下平章事監修國史劉旻攻晉州峻為行營都部署得以便宜從事別遣陳思讓康延沼自烏嶺出絳州與峻會峻至陝州留不進太祖遣使者翟守素馳至陝州諭峻欲親征峻屏左右謂守素曰晉州城堅不可近而劉旻兵鋭亦未可當臣所以留此者非怯也蓋有待爾且陛下新即位四方藩鎮未有威德以加之豈宜輕舉而兗州慕容彥超反迹已露若陛下出汜水則彥超入京師陛下何以待之守素馳還具道峻言是時太祖已下詔西幸聞峻語遽自提其耳曰幾敗吾事乃止不行峻軍出自絳州前鋒報過蒙坑峻喜謂其屬曰蒙坑晉絳之險也旻不分兵扼之使吾過此可知其必敗也峻軍去晉州一舍旻聞周兵大至即解去諸將皆欲追之峻猶豫不決明日遣騎兵追旻不及而還從討慕容彥超為隨駕都部署率衆先登峻與太祖俱起于魏自謂佐命之功以天下為己任凡所論請事無大小期於必得或小不如志言色輒不遜太祖每優容之峻年長於太祖二歲往往呼峻為兄或稱其字峻由是益橫鄭仁誨李重進向訓等皆太祖故時偏裨太祖初即位謙抑未欲進用而峻心忌之自破慕容彥超還即求解樞密以探上意太祖慰勞之峻多發書諸鎮求為保薦居數日諸鎮皆馳騎上峻書太祖大駭峻連章求解因不視事太祖遣近臣召之曰卿若不出吾當自往候卿峻曰車駕若來是致臣有不測也然殊無出意樞密直學士陳同與峻相善太祖即遣同召峻同還奏曰峻意少解然請陛下聲言嚴駕若將幸之則峻必出矣太祖僶俯從之峻聞太祖且來遂馳入謁峻於樞密院起廳事極其華侈邀太祖臨幸賜豫甚厚太祖於內園起一小殿峻輒奏曰宮室已多何用此為太祖曰樞密院屋不少卿亦何必有作峻慚不能對峻為樞密使兼宰相又求兼領平盧已受命暫之鎮又請借左藏庫綾萬匹太祖皆勉從之又請用頻衎陳同代李穀范質為相太祖曰進退宰相豈可倉卒當徐思之峻論請不已語漸不遜日亭午太祖未食峻爭不已是時寒食假太祖曰俟假開當為卿行峻乃退太祖遂不能忍明日御便殿召百官皆入即幽峻於別所太祖見馮道泣曰峻凌朕不能忍即貶商州司馬卒于貶所峻已被黜太祖以峻監修國史意其所書不實因召史官取日曆讀之史官以禁中事非外所知懼以漏落得罪峻貶後李穀監修因請命近臣録禁中事付史館乃命樞密直學士就樞密院録送史館自此始王殷王殷大名人也少為軍卒以軍功纍遷靈武馬步軍都指揮使唐廢帝時從范延光討張令昭于魏以功拜祁州刺史晉天福中徙原州刺史殷事母以孝聞欲與人游必先白母母所不可者未嘗敢往及為刺史政事有小失母責之殷即取杖授婢僕自笞於母前母亡服喪晉高祖詔殷起復以為憲州刺史殷乞終喪服除出帝以為奉國右廂都指揮使後從漢高祖討杜重威先登力戰矢中其腦鏃自口出而不死高祖嘉之以為侍衛步軍都指揮使領寧江軍節度使契丹犯邊漢遣殷以兵屯澶州隱帝已殺楊邠等詔鎮寧軍節度使李弘義殺殷于澶州又詔郭崇殺周太祖于魏詔書至澶州弘義恐事不果反以告殷殷遣人馳至魏告周太祖遂起兵反太祖入立拜侍衛親軍都指揮使出為天雄軍節度使同中書門下平章事仍領親軍自河以北皆受殷度殷頗務聚斂太祖聞而惡之遣人謂之曰吾起魏時帑廩儲畜豈少邪汝為國家用足矣殷不聽殷與王峻俱從太祖起自魏後峻得罪殷不自安廣順三年秋九月永壽節殷求入為壽太祖許之而懼其疑也復遣使止之明年太祖有事于南郊是冬殷來朝殷握兵柄職當警衛出入多以兵從又求兵甲以備非常是時太祖臥疾疑殷有異志乃力疾御滋德殿殷入起居即命執之削奪在身官爵長流登州已而殺之徙其家屬于登州劉詞劉詞字好謙大名元城人也少事楊師厚以勇悍知名唐莊宗下魏博與梁戰夾河詞以軍功為效節軍使遷長劍指揮使坐事左遷汝州十餘年廢帝時詔諸州鎮選驍勇者充禁軍詞得選為禁軍校從破張從賓楊光遠以功遷奉國第一軍都虞候從馬全節破安州以功遷指揮使從杜重威破鎮州以先登功拜泌州刺史晉軍討安從進為襄州行營都虞候以功遷泌州團練使徙房州歲餘為政不苛撓人頗便之詞居暇日常被甲枕戈而臥謂人曰我以此取富貴豈可一日輒忘之且人情易習若一墮其筋力有事何以報國漢高祖時復為奉國右廂都指揮使漢軍討李守貞于河中詞以侍衛步軍都指揮使領寧江軍節度使為行營都虞候以功拜鎮國軍節度使周太祖入立加同中書門下平章事歷鎮安國河陽三城世宗戰高平樊愛能等軍敗南走遇詞而止之曰軍敗矣可無前也詞不聽輒趣兵以進世宗嘉之以為隨駕都部署及班師以為河東行營副都部署徙鎮永興明年卒于鎮年六十五贈侍中諡忠惠王環王環鎮州真定人也以勇力事孟知祥為御者及知祥僭號于蜀使典衛兵晉開運之亂秦鳳階成入于蜀孟昶以環為鳳州節度使周世宗即位明年遣王景向訓攻秦鳳州數為環所敗大臣皆請罷兵世宗曰吾欲一天下以為家而聲教不及秦鳳今兵已出無功而返吾有慚焉乃決意攻之周兵糧道頗艱昶遣兵五千出堂倉抵黃花谷以爭糧道景訓先知其來命排陳使張建雄以兵二千當谷口別遣裨將以徑兵千人出其後伏堂倉以待其歸蜀兵前遇建雄戰不勝退走堂倉伏發盡殪之由是蜀兵守諸城堡者皆潰初昶遣其秦州節度使高處儔以兵援環未至聞堂倉兵敗亦潰歸處儔判官趙玭閉城不內處儔遂奔成都玭乃以城降成階二州相繼亦降獨環堅守百餘日然後克之世宗召見環歎曰三州已降環獨堅守吾數以書招之而環不答至於力屈就擒雖不能死亦忠其所事也用之可勸事君者乃拜環右驍衛將軍是時周師已征淮即以環佐侯章為攻取賊城水寨副部署初周師南征李景陳兵於淮舟楫甚盛周師無水戰之具世宗患之乃置造船務於京城之西為戰艦數百艘得景降卒教之水戰明年世宗再征淮使環將水戰卒數千自蔡河以入淮環居軍中未嘗有戰功蜀卒與環俱擒者世宗不殺悉以從軍後多南奔於景世宗待環益不疑已而景將許文縝邊鎬等皆被擒世宗悉以為將軍與環等列第京師歲時賜與甚厚明年又幸淮南又以環從遇疾卒于泗州折從阮折從阮字可久初名從遠避漢高祖名改為阮雲中人也其父嗣倫為麟州刺史從阮為人溫恭長者居父喪以孝聞唐莊宗鎮太原以為牙將後以為府州刺史晉出帝與契丹敗盟從阮以兵攻契丹取其城堡十餘遷本州團練使兼領朔州刺史安北都護振武軍節度使契丹西南面行營馬步軍都虞候漢高祖入立於府州建永安軍以從阮為節度使明年以其族朝京師徙鎮武勝即拜從阮子德扆為府州團練使周太祖入立從阮歷徙宣義保義靜難三鎮顯德二年罷還京師行至洛陽卒贈中書令
