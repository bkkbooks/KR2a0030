body:
  text: 新五代史卷三十八宦者傳第二十六嗚呼自古宦女之禍深矣明者未形而知懼暗者患及而猶安焉至於亂亡而不可悔也雖然不可以不戒作宦者傳張承業張承業字繼元唐僖宗時宦者也本姓康糼閹為內常侍張泰養子晉王兵擊王行瑜承業數往來兵間晉王喜其為人及昭宗為李茂貞所迫將出奔太原乃先遣承業使晉以道意因以為河東監軍其後崔胤誅宦官宦官在外者悉詔所在殺之晉王憐承業不忍殺匿之斛律寺昭宗崩乃出承業復為監軍晉王病且革以莊宗屬承業曰以亞子纍公等莊宗常兄事承業歲時升堂拜母甚親重之莊宗在魏與梁戰河上十餘年軍國之事皆委承業承業亦盡心不懈凡所以畜積金粟收市兵馬勸課農桑而成莊宗之業者承業之功為多自貞簡太后韓德妃伊淑妃及諸公子在晉陽者承業一切以法繩之權貴皆斂手畏承業莊宗歲時自魏歸省親須錢蒲博賞賜伶人而承業主藏錢不可得莊宗乃置酒庫中酒酣使子繼岌為承業起舞舞罷承業出寶帶幣馬為贈莊宗指錢積呼繼岌小字以語承業曰和哥乏錢可與錢一積何用帶馬為也承業謝曰國家錢非臣所得私也莊宗以語侵之承業怒曰臣老敕使非為子孫計惜此庫錢佐王成霸業爾若欲用之何必問臣財盡兵散豈獨臣受禍也莊宗顧元行欽曰取劍來承業起持莊宗衣而泣曰臣受先王顧託之命誓雪家國之讎今日為王惜庫物而死死不愧於先王矣閻寶從旁解承業手令去承業奮拳歐寶踣罵曰閻寶朱溫之賊蒙晉厚恩不能有一言之忠而反諂諛自容邪太后聞之使召莊宗莊宗性至孝聞太后召甚懼乃酌兩巵謝承業曰吾杯酒之失且得罪太后願公飲此為吾分過承業不肯飲莊宗入內太后使人謝承業曰小兒忤公已笞之矣明日太后與莊宗俱過承業第慰勞之盧質嗜酒傲忽自莊宗及諸公子多見侮慢莊宗深嫉之承業乘間請曰盧質嗜酒無禮臣請為王殺之莊宗曰吾方招納賢才以就功業公何言之過也承業起賀曰王能如此天下不足平也質因此獲免天祐十八年莊宗已諾諸將即皇帝位承業方臥病聞之自太原肩輿至魏諫曰大王父子與梁血戰三十年本欲雪家國之讎而復唐之社稷今元凶未滅而遽以尊名自居非王父子之初心且失天下望不可莊宗謝曰此諸將之所欲也承業曰不然梁唐晉之仇賊而天下所共惡也今王誠能為天下去大惡復列聖之深讎然後求唐後而立之使唐之子孫在孰敢當之使唐無子孫天下之士誰可與王爭者臣唐家一老奴耳誠願見大王之成功然後退身田里使百官送出洛東門而令路人指而歎曰此本朝敕使先王時監軍也豈不臣主俱榮哉莊宗不聽承業知不可諫乃仰天大哭曰吾王自取之誤老奴矣肩輿歸太原不食而卒年七十七同光元年贈左武衛上將軍諡曰正憲張居翰張居翰字德卿故唐掖廷令張從玫之養子昭宗時為范陽軍監軍與節度使劉仁恭相善天復中大誅宦者仁恭匿居翰大安山之北溪以免其後梁兵攻仁恭仁恭遣居翰從晉王攻梁潞州以牽其兵晉遂取潞州以居翰為昭義監軍莊宗即位與郭崇韜並為樞密使莊宗滅梁而驕宦官因以用事郭崇韜又專任政居翰默默苟免而已魏王破蜀王衍朝京師行至秦川而明宗軍變于魏莊宗東征慮衍有變遣人馳詔魏王殺之詔書已印畫而居翰發視之詔書言誅衍一行居翰以謂殺降不祥乃以詔傅柱揩去行字改為一家時蜀降人與衍俱東者千餘人皆獲免莊宗遇弒居翰見明宗于至德宮求歸田里天成三年卒于長安年七十一五代文章陋矣而史官之職廢於喪亂傳記小說多失其傳故其事迹終始不完而雜以訛繆至於英豪奮起戰爭勝敗國家興廢之際豈無謀臣之略辨士之談而文字不足以發之遂使泯然無傳於後世然獨張承業事卓卓在人耳目至今故老猶能道之其論議可謂傑然歟殆非宦者之言也自古宦者亂人之國其源深於女禍女色而已宦者之害非一端也蓋其用事也近而習其為心也專而忍能以小善中人之意小信固人之心使人主必信而親之待其已信然後懼以禍福而把持之雖有忠臣碩士列于朝廷而人主以為去己疏遠不若起居飲食前後左右之親為可恃也故前後左右者日益親則忠臣碩士日益疏而人主之勢日益孤勢孤則懼禍之心日益切而把持者日益牢安危出其喜怒禍患伏於帷闥則嚮之所謂可恃者乃所以為患也患已深而覺之欲與疏遠之臣圖左右之親近緩之則養禍而益深急之則挾人主以為質雖有聖智不能與謀謀之而不可為為之而不可成至其甚則俱傷而兩敗故其大者亡國其次亡身而使姦豪得借以為資而起至抉其種類盡殺以快天下之心而後已此前史所載宦者之禍常如此者非一世也夫為人主者非欲養禍於內而疏忠臣碩士於外蓋其漸積而勢使之然也夫女色之惑不幸而不悟則禍斯及矣使其一悟捽而去之可也宦者之為禍雖欲悔悟而勢有不得而去也唐昭宗之事是已故曰深於女禍者謂此也可不戒哉昭宗信狎宦者由是有東宮之幽既出而與崔胤圖之胤為宰相顧力不足為乃召兵於梁梁兵且至而宦者挾天子走之岐梁兵圍之三年昭宗既出而唐亡矣初昭宗之出也梁王悉誅唐宦者第五可範等七百餘人其在外者悉詔天下捕殺之而宦者多為諸鎮所藏匿而不殺是時方鎮僭擬悉以宦官給事而吳越最多及莊宗立詔天下訪求故唐時宦者悉送京師得數百人宦者遂復用事以至於亡此何異求已覆之車躬駕而履其轍也可為悲夫莊宗未滅梁時承業已死其後居翰雖為樞密使而不用事有宣徽使馬紹宏者嘗賜姓李頗見信用然誣殺大臣黷貨賂專威福以取怨於天下者左右狎昵黃門內養之徒也是時明宗自鎮州入覲奉朝請於京師莊宗頗疑其有異志陰遣紹宏伺其動靜紹宏反以情告明宗明宗自魏而反天下皆知禍起於魏孰知其啓明宗之二心者自紹宏始也郭崇韜已破蜀莊宗信宦者言而疑之然崇韜之死莊宗不知皆宦者為之也當此之時舉唐之精兵皆在蜀使崇韜不死明宗入洛豈無西顧之患其能晏然取唐而代之邪及明宗入立又詔天下悉捕宦者而殺之宦者亡竄山谷多削髮為浮圖其亡至太原者七十餘人悉捕而殺之都亭驛流血盈庭明宗晚而多病王淑妃專內以干政宦者孟漢瓊因以用事秦王入視明宗疾已革既出而聞哭聲以謂帝崩矣乃謀以兵入宮者懼不得立也大臣朱弘昭等方圖其事議未決漢瓊遽入見明宗言秦王反即以兵誅之陷秦王大惡而明宗以此飲恨而終後愍帝奔于衛州漢瓊西迎廢帝于路廢帝惡而殺之嗚呼人情處安樂自非聖哲不能久而無驕怠宦女之禍非一日必伺人之驕怠而浸入之明宗非佚君而猶若此者蓋其在位差久也其餘多武人崛起及其嗣續世數短而年不永故宦者莫暇施為其為大害者略可見矣獨承業之論偉然可愛而居翰更一字以活千人君子之於人也苟有善焉無所不取吾於斯二人者有所取焉取其善而戒其惡所謂愛而知其惡憎而知其善也故並述其禍敗之所以然者著于篇
