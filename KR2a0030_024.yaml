body:
  text: 新五代史卷二十四唐臣傳第十二郭崇韜郭崇韜代州鴈門人也為河東教練使為人明敏能應對以材幹見稱莊宗為晉王孟知祥為中門使崇韜為副使中門之職參管機要先時吳珙張虔厚等皆以中門使相繼獲罪知祥懼求外任莊宗曰公欲避事當舉可代公者知祥乃薦崇韜為中門使甚見親信晉兵圍張文禮于鎮州久不下而定州王都引契丹入寇契丹至新樂晉人皆恐欲解圍去莊宗未決崇韜曰契丹之來非救文禮為王都以利誘之耳且晉新破梁軍宜乘已振之勢不可遽自退怯莊宗然之果敗契丹莊宗即位拜崇韜兵部尚書樞密使梁王彥章擊破德勝唐軍東保楊劉彥章圍之莊宗登壘望見彥章為重塹以絶唐軍意輕之笑曰我知其心矣其欲持久以弊我也即引短兵出戰為彥章伏兵所射大敗而歸莊宗問崇韜計安出是時唐已得鄆州矣崇韜因曰彥章圍我於此其志在取鄆州也臣願得兵數千據河下流築壘於必爭之地以應鄆州為名彥章必來爭既分其兵可以圖也然板築之功難卒就陛下日以精兵挑戰使彥章兵不得東十日壘成矣莊宗以為然乃遣崇韜與毛璋將數千人夜行所過驅掠居人毀屋伐木渡河築壘於博州東晝夜督役六日壘成彥章果引兵急攻之時方大暑彥章兵熱死及攻壘不克所失太半還趨楊劉莊宗迎擊遂敗之康延孝自梁奔唐先見崇韜崇韜延之臥內盡得梁虛實是時莊宗軍朝城段凝軍臨河唐自失德勝梁兵日掠澶相取黎陽衛州而李繼韜以澤潞叛入于梁契丹數犯幽涿又聞延孝言梁方召諸鎮兵欲大舉唐諸將皆憂惑以謂成敗未可知莊宗患之以問諸將諸將皆曰唐得鄆州隔河難守不若棄鄆與梁而西取衛州黎陽以河為界與梁約罷兵毋相攻庶幾以為後圖莊宗不悅退臥帳中召崇韜問計崇韜曰陛下興兵仗義將士疲戰爭生民苦轉餉者十餘年矣況今大號已建自河以北人皆引首以望成功而思休息今得一鄆州不能守而棄之雖欲指河為界誰為陛下守之且唐未失德勝時四方商賈征輸必集薪芻糧餉其積如山自失南城保楊劉道路轉徙耗亡太半而魏博五州秋稼不稔竭民而斂不支數月此豈按兵持久之時乎臣自康延孝來盡得梁之虛實此真天亡之時也願陛下分兵守魏固楊劉而自鄆長驅搗其巢穴不出半月天下定矣莊宗大喜曰此大丈夫之事也因問司天司天言歲不利用兵崇韜曰古者命將鑿凶門而出況成算已決區區常談豈足信也莊宗即日下令軍中歸其家屬於魏夜渡楊劉從鄆州入襲汴用八日而滅梁莊宗推功賜崇韜鐵券拜侍中成德軍節度使依前樞密使莊宗與諸將以兵取天下而崇韜未嘗居戰陳徒以謀議居佐命第一之功位兼將相遂以天下為己任遇事無所回避而宦官伶人用事特不便也初崇韜與宦者馬紹宏俱為中門使而紹宏位在上及莊宗即位二人當為樞密使而崇韜不欲紹宏在己上乃以張居翰為樞密使紹宏為宣徽使紹宏失職怨望崇韜因置內勾使以紹宏領之凡天下錢穀出入于租庸者皆經內勾既而文簿繁多州縣為弊遽罷其事而紹宏尤側目崇韜頗懼語其故人子弟曰吾佐天子取天下今大功已就而羣小交興吾欲避之歸守鎮陽庶幾免禍可乎故人子弟對曰俚語曰騎虎者勢不得下今公權位已隆而下多怨嫉一失其勢能自安乎崇韜曰奈何對曰今中宮未立而劉氏有寵宜請立劉氏為皇后而多建天下利害以便民者然後退而乞身天子以公有大功而無過必不聽公去是外有避權之名而內有中宮之助又為天下所悅雖有讒間其可動乎崇韜以為然乃上書請立劉氏為皇后崇韜素廉自從入洛始受四方賂遺故人子弟或以為言崇韜曰吾位兼將相祿賜巨萬豈少此邪今藩鎮諸侯多梁舊將皆主上斬袪射鈎之人也今一切拒之豈無反側且藏于私家何異公帑明年天子有事南郊乃悉獻其所藏以佐賞給莊宗已郊遂立劉氏為皇后崇韜纍表自陳請依唐舊制還樞密使於內臣而並辭鎮陽優詔不允崇韜又曰臣從陛下軍朝城定計破梁陛下撫臣背而約曰事了與卿一鎮今天下一家俊賢並進臣憊矣願乞身如約莊宗召崇韜謂曰朝城之約許卿一鎮不許卿去欲捨朕安之乎崇韜因建天下利害二十五事施行之李嗣源為成德軍節度使徙崇韜忠武崇韜因自陳權位已極言甚懇至莊宗曰豈可朕居天下之尊使卿無尺寸之地崇韜辭不已遂罷其命仍為侍中樞密使同光三年夏霖雨不止大水害民田民多流死莊宗患宮中暑濕不可居思得高樓避暑宦官進曰臣見長安全盛時大明興慶宮樓閣百數今大內不及故時卿相家莊宗曰吾富有天下豈不能作一樓乃遣宮苑使王允平營之宦官曰郭崇韜眉頭不伸常為租庸惜財用陛下雖欲有作其可得乎莊宗乃使人問崇韜曰昔吾與梁對壘於河上雖祁寒盛暑被甲跨馬不以為勞今居深宮蔭廣廈不勝其熱何也崇韜對曰陛下昔以天下為心今以一身為意艱難逸豫為慮不同其勢自然也願陛下無忘創業之難常如河上則可使繁暑坐變清涼莊宗默然終遣允平起樓崇韜果切諫宦官曰崇韜之第無異皇居安知陛下之熱由是讒間愈入河南縣令羅貫為人彊直頗為崇韜所知貫正身奉法不受權豪請託宦官伶人有所求請書積几案一不以報皆以示崇韜崇韜數以為言宦官伶人由此切齒河南自故唐時張全義為尹縣令多出其門全義廝養畜之及貫為之奉全義不屈縣民恃全義為不法者皆按誅之全義大怒嘗使人告劉皇后從容為白貫事而左右日夜共攻其短莊宗未有以發皇太后崩葬坤陵陵在壽安莊宗幸陵作所而道路泥塗橋壞莊宗止輿問誰主者宦官曰屬河南因亟召貫貫至對曰臣初不奉詔請詰主者莊宗曰爾之所部復問何人即下貫獄獄吏榜掠體無完膚明日傳詔殺之崇韜諫曰貫罪無他橋道不修法不當死莊宗怒曰太后靈駕將發天子車輿往來橋道不修卿言無罪是朋黨也崇韜曰貫雖有罪當具獄行法于有司陛下以萬乘之尊怒一縣令使天下之人言陛下用法不公臣等之過也莊宗曰貫公所愛任公裁決因起入宮崇韜隨之論不已莊宗自闔殿門崇韜不得入貫卒見殺明年征蜀議擇大將時明宗為總管當行而崇韜以讒見危思立大功為自安之計乃曰契丹為患北邊非總管不可禦魏王繼岌國之儲副而大功未立且親王為元帥唐故事也莊宗曰繼岌小子豈任大事必為我擇其副崇韜未及言莊宗曰吾得之矣無以易卿也乃以繼岌為西南面行營都統崇韜為招討使軍政皆決崇韜唐軍入蜀所過迎降王衍弟宗弼陰送款于崇韜求為西川兵馬留後崇韜以節度使許之軍至成都宗弼遷衍于西宮悉取衍嬪妓珍寶奉崇韜及其子廷誨又與蜀人列狀見魏王請崇韜留鎮蜀繼岌頗疑崇韜崇韜無以自明因以事斬宗弼及其弟宗渥宗勳沒其家財蜀人大恐崇韜素嫉宦官嘗謂繼岌曰王有破蜀功師旋必為太子俟主上千秋萬歲後當盡去宦官至於扇馬亦不可騎繼岌監軍李從襲等見崇韜專任軍事心已不平及聞此言遂皆切齒思有以圖之莊宗聞蜀遣宦官向延嗣勞軍崇韜不郊迎延嗣大怒因與從襲等共構之延嗣還上蜀簿得兵三十萬馬九千五百匹兵器七百萬糧二百五十三萬石錢一百九十二萬緡金銀二十二萬兩珠玉犀象二萬文錦綾羅五十萬匹莊宗曰人言蜀天下之富國也所得止於此邪延嗣因言蜀之寶貨皆入崇韜且誣其有異志將危魏王莊宗怒遣宦官馬彥圭至蜀視崇韜去就彥圭以告劉皇后劉皇后教彥圭矯詔魏王殺之崇韜有子五人其二從死于蜀餘皆見殺其破蜀所得皆籍沒明宗即位詔許歸葬以其太原故宅賜其二孫當崇韜用事自宰相豆盧革韋悅等皆傾附之崇韜父諱弘革等即因他事奏改弘文館為崇文館以其姓郭因以為子儀之後崇韜遂以為然其伐蜀也過子儀墓下馬號慟而去聞者頗以為笑然崇韜盡忠國家有大略其已破蜀因遣使者以唐威德風諭南詔諸蠻欲因以綏來之可謂有志矣安重誨安重誨應州人也其父福遷事晉為將以驍勇知名梁攻朱宣于鄆州晉兵救宣宣敗福遷戰死重誨少事明宗為人明敏謹恪明宗鎮安國以為中門使及兵變于魏所與謀議大計皆重誨與霍彥威決之明宗即位以為左領軍衛大將軍樞密使兼領山南東道節度使固辭不拜改兵部尚書使如故在位六年纍加侍中兼中書令重誨自為中門使已見親信而以佐命功臣處機密之任事無大小皆以參決其勢傾動天下雖其盡忠勞心時有補益而恃功矜寵威福自出旁無賢人君子之助其獨見之慮禍釁所生至於臣主俱傷幾滅其族斯其可哀者也重誨嘗出過御史臺門殿直馬延誤衝其前導重誨怒即臺門斬延而後奏是時隨駕廳子軍士桑弘遷毆傷相州録事參軍親從兵馬使安虔走馬衝宰相前導弘遷罪死虔決杖而已重誨以斬延乃請降敕處分明宗不得已從之由是御史諫官無敢言者宰相任圜判三司以其職事與重誨爭不能得圜怒辭疾退居于磁州朱守殷以汴州反重誨遣人矯詔馳至其家殺圜而後白誣圜與守殷通謀明宗皆不能詰也而重誨恐天下議己因取三司積缺二百餘萬請放之冀以悅人而塞責明宗不得已為下詔蠲除之其威福自出多此類也是時四方奏事皆先白重誨然後聞河南縣獻嘉禾一莖五穗重誨視之曰僞也笞其人而遣之夏州李仁福進白鷹重誨却之明日白曰陛下詔天下毋得獻鷹鷂而仁福違詔獻鷹臣已却之矣重誨出明宗陰遣人取之以入他日按鷹于西郊戒左右無使重誨知也宿州進白兔重誨曰兔陰且狡雖白何為遂却而不白明宗為人雖寬厚然其性夷狄果於殺人馬牧軍使田令方所牧馬瘠而多斃坐劾當死重誨諫曰使天下聞以馬故殺一軍使是謂貴畜而賤人令方因得減死明宗遣回鶻侯三馳傳至其國侯三至醴泉縣縣素僻無驛馬其令劉知章出獵不時給馬侯三遽以聞明宗大怒械知章至京師將殺之重誨從容為言知章乃得不死其盡忠補益亦此類也重誨既以天下為己任遂欲內為社稷之計而外制諸侯之彊然其輕信韓玫之譖而絶錢鏐之臣徒陷彥溫於死而不能去潞王之患李嚴一出而知祥二仁矩未至而董璋叛四方騷動師旅並興如投膏止火適足速之此所謂獨見之慮禍釁所生也錢鏐據有兩浙號兼吳越而王自梁及莊宗常異其禮以羈縻臣屬之而已明宗即位鏐遣使朝京師寓書重誨其禮慢重誨怒未有以發乃遣其嬖吏韓玫副供奉官烏昭遇復使於鏐而玫恃重誨勢數凌辱昭遇因醉使酒以馬箠擊之鏐欲奏其事昭遇以為辱國固止之及玫還返譖於重誨曰昭遇見鏐舞蹈稱臣而以朝廷事私告鏐昭遇坐死御史獄乃下制削奪鏐官爵以太師致仕於是錢氏遂絶於唐矣潞王從珂為河中節度使重誨以謂從珂非李氏子後必為國家患乃欲陰圖之從珂閲馬黃龍莊其牙內指揮使楊彥溫閉城以叛從珂遣人謂彥溫曰我遇汝厚何苦而反邪報曰彥溫非叛也得樞密院宣請公趨歸朝廷耳從珂走虞鄉馳騎上變明宗疑其事不明欲究其所以乃遣殿直都知范氳以金帶襲衣金鞍勒馬賜彥溫拜彥溫絳州刺史以誘致之重誨固請用兵明宗不得已乃遣侍衛指揮使藥彥稠西京留守索自通率兵討之而誡曰為我生致彥溫吾將自訊其事彥稠等攻破河中希重誨旨斬彥溫以滅口重誨率羣臣稱賀明宗大怒曰朕家事不了卿等不合致賀從珂罷鎮居清化里第重誨數諷宰相言從珂失守宜得罪馮道因白請行法明宗怒曰吾兒為姦人所中事未辨明公等出此言是不欲容吾兒人間邪趙鳳因言春秋責帥之義所以勵為臣者明宗曰皆非公等意也道等惶恐而退居數日道等又以為請明宗顧左右而言他明日重誨乃自論列明宗曰公欲如何處置我即從公重誨曰此父子之際非臣所宜言惟陛下裁之明宗曰吾為小校時衣食不能自足此兒為我擔石灰拾馬糞以相養活今貴為天子獨不能庇之邪使其杜門私第亦何與公事重誨由是不復敢言孟知祥鎮西川董璋鎮東川二人皆有異志重誨每事裁抑務欲制其姦心凡兩川守將更代多用己所親信必以精兵從之漸令分戍諸州以虞緩急二人覺之以為圖己益不自安既而遣李嚴為西川監軍知祥大怒斬嚴又分閬州為保寧軍以李仁矩為節度使以制璋且削其地璋以兵攻殺仁矩二人遂皆反唐兵戍蜀者積三萬人其後知祥殺璋兼據兩川而唐之精兵皆陷蜀初明宗幸汴州重誨建議欲因以伐吳而明宗難之其後戶部尚書李鏻得吳諜者言徐知誥欲舉吳國以稱藩願得安公一言以為信鏻即引諜者見重誨重誨大喜以為然乃以玉帶與諜者使遺知誥為信其直千緡初不以其事聞其後逾年知誥之問不至始奏貶鏻行軍司馬已而捧聖都軍使李行德十將張儉告變言樞密承旨李虔徽語其客邊彥溫云重誨私募士卒繕治甲器欲自伐吳又與諜者交私明宗以問重誨重誨惶恐請究其事明宗初頗疑之大臣左右皆為之辨既而少解始告重誨以彥溫之言因廷詰彥溫具伏其詐於是君臣相顧泣下彥溫行德儉皆坐族誅重誨因求解職明宗慰之曰事已辨慎無措之胸中重誨論請不已明宗怒曰放卿去朕不患無人顧武德使孟漢瓊至中書趣馮道等議代重誨者馮道曰諸公苟惜安公使得罷去是紓其禍也趙鳳以為大臣不可輕動遂以范延光為樞密使而重誨居職如故董璋等反遣石敬瑭討之而川路險阻糧運甚艱每費一石而致一斗自關以西民苦輸送往往亡聚山林為盜賊明宗謂重誨曰事勢如此吾當自行重誨曰此臣之責也乃請行關西之人聞重誨來皆已恐動而重誨日馳數百里遠近驚駭督趣糧運日夜不絶斃踣道路者不可勝數重誨過鳳翔節度使朱弘昭延之寢室使其妻子奉事左右甚謹重誨酒酣為弘昭言昨被讒構幾不自全賴人主明聖得保家族因感歎泣下重誨去弘昭馳騎上言重誨怨望不可令至行營恐其生事而宣徽使孟漢瓊自行營使還亦言西人震駭之狀因述重誨過惡重誨行至三泉被召還過鳳翔弘昭拒而不納重誨懼馳趨京師未至拜河中節度使重誨已罷希旨者爭求其過宦者安希倫坐與重誨交私常與重誨陰伺宮中動息事發棄市重誨益懼因上章告老以太子太師致仕而以李從璋為河中節度使遣藥彥稠率兵如河中虞變重誨子崇緒崇贊宿衛京師聞制下即日奔其父重誨見之驚曰渠安得來已而曰此非渠意為人所使耳吾以一死報國餘復何言乃械送二子于京師行至陝州下獄明宗又遣翟光業至河中視重誨去就戒曰有異志則與從璋圖之又遣宦者使于重誨使者見重誨號泣不已重誨問其故使者曰人言公有異志朝廷遣藥彥稠率師至矣重誨曰吾死未塞責遽勞朝廷興師以重明主之憂光業至從璋率兵圍重誨第入拜于庭重誨降而答拜從璋以檛擊其首重誨妻走抱之而呼曰令公死未晚何遽如此又擊其首夫妻皆死流血盈庭從璋檢責其家資不及數千緡而已明宗下詔以其絶錢鏐致孟知祥董璋反及議伐吳以為罪並殺其二子其餘子孫皆免重誨得罪知其必死歎曰我固當死但恨不與國家除去潞王此其恨也嗚呼官失其職久矣豫讀梁宣底見敬翔李振為崇政院使凡承上之旨宣之宰相而奉行之宰相有非其見時而事當上決者與其被旨而有所復請者則具記事而入因崇政使聞得旨則復宣而出之梁之崇政使乃唐樞密之職蓋出納之任也唐常以宦者為之至梁戒其禍始更用士人其備顧問參謀議于中則有之未始專行事於外也至崇韜重誨為之始復唐樞密之名然權侔於宰相矣後世因之遂分為二文事任宰相武事任樞密樞密之任既重而宰相自此失其職也記事若今學士院咨報今士大夫間以文字相往來謂之簡帖俚俗猶謂之記事也
