body:
  text: 新五代史卷十一周本紀第十一太祖聖神恭肅文武皇帝姓郭氏邢州堯山人也父簡事晉為順州刺史劉仁恭攻破順州簡見殺子威少孤依潞州人常氏潞州留後李繼韜募勇敢士為軍卒威年十八以勇力應募為人負氣好使酒繼韜特奇之威嘗游于市市有屠者常以勇服其市人威酒醉呼屠者使進几割肉割不如法叱之屠者披其腹示之曰爾勇者能殺我乎威即前取刀刺殺之一市皆驚威頗自如為吏所執繼韜惜其勇陰縱之使亡已而復召置麾下繼韜叛晉附于梁後莊宗滅梁繼韜誅死其麾下兵悉隸從馬直威以通書算補為軍吏好讀閫外春秋略知兵法後為侍衛軍吏漢高祖為侍衛親軍都虞候尤親愛之後高祖所臨鎮嘗以威從契丹滅晉漢高祖起兵太原即皇帝位拜威樞密副使乾祐元年正月高祖疾大漸以隱帝託威及史弘肇等隱帝即位拜威樞密使是歲三月河中李守貞永興趙思綰鳳翔王景崇相次反隱帝遣白文珂郭從義常思等分討之久皆無功隱帝謂威曰吾欲煩公可乎威對曰臣不敢請亦不敢辭惟陛下命乃加拜威同中書門下平章事使西督諸將威居軍中延見賓客褒衣博帶及臨陳行營幅巾短後與士卒無異上所賜豫與諸將會射恣其所取其餘悉以分賜士卒將士皆歡樂威至河中自柵其城東思柵其南文珂柵其西調五縣丁二萬人築連壘以護三柵諸將皆謂守貞窮寇破在旦夕不宜勞人如此威不聽已而守貞數出兵擊壞連壘威輒補之守貞輒復出擊每出必有亡失久之城中兵食俱盡威曰可矣乃治攻具為期日四面攻之破其羅城守貞與妻子自焚死思綰景崇相次降隱帝勞威以玉帶加檢校太師兼侍中威辭曰臣事先帝見功臣多矣未嘗以玉帶賜之因言臣幸得率行伍假漢威靈以破賊者豈特臣之功皆將相之賢有以安朝廷撫內外而饋餉以時故臣得以專事征伐隱帝以威為賢於是悉召楊邠史弘肇蘇逢吉禹圭竇貞固王章等皆賜以玉帶威乃受威又推功大臣請加爵賞於是加貞固司空逢吉司徒禹圭邠左右僕射已而又曰此特漢廷親近之臣耳漢諸宗室天下方鎮外暨荊浙湖南皆未及也由是濫賞遍于天下是冬契丹寇邊威以樞密使北伐至魏州契丹遁三年二月師還四月拜威鄴都留守天雄軍節度使仍以樞密使之鎮宰相蘇逢吉以謂樞密使不可以藩鎮兼領與史弘肇等固爭久之卒以樞密使行詔河北諸州皆聽威節度隱帝與李業等謀已殺史弘肇等詔鎮寧軍節度使李弘義殺侍衛步軍指揮使王殷于澶州又詔侍衛馬軍指揮使郭崇殺威及宣徽使王峻于魏詔書先至澶州弘義恐事不果反以詔書示殷殷與弘義遣人告威已而詔殺威峻使者亦馳騎至威匿詔書召樞密使院吏魏仁浦謀於臥內仁浦勸威反教威倒用留守印更為詔書詔威誅諸將校以激怒之將校皆憤然效用十一月丁丑威遂舉兵渡河隱帝遣開封尹侯益保大軍節度使張彥超客省使閻晉卿等率兵拒威又遣內養脫覘威所嚮脫為威所得威乃附脫奏請縛李業等送軍中隱帝得威奏以示業等業等皆言威反狀已白乃悉誅威家屬于京師庚辰威至滑州義成軍節度使宋延渥叛于漢來降壬午犯封丘甲辰及泰寧軍節度使慕容彥超戰于劉子陂彥超敗奔于兗州郭允明反弒隱帝于趙村丙戌威入京師縱火大掠戊子率百官朝太后于明德門請立嗣君太后下令文武百寮六軍將校議擇賢明以承大統庚寅威率百官詣明德門請立武寧軍節度使贇為嗣遣太師馮道迎贇于徐州辛卯請太后臨朝聽政以王峻為樞密使翰林學士尚書兵部侍郎范質為副使十二月甲午朔威北伐契丹軍于滑州癸丑至澶州而旋王峻遣郭崇以騎七百逆劉贇于宋州殺之其將鞏廷美楊溫為贇守徐州戊午次門漢宰門相竇貞固蘇禹圭來勸進庚申太后制以威監國廣順元年春正月丁卯皇帝即位大赦改元國號周己巳上漢太后尊號曰昭聖皇太后戊寅漢劉崇自立于太原己卯馮道為中書令吳蜀諸國自立皆絶而不書此書與其不屈于周語在十國年譜論二月辛丑西州回鶻使都督來丁未契丹兀欲遣使骨支來癸丑寒食望祭于蒲池丁巳尚書左丞田敏使于契丹回鶻使摩尼來蒲池佛寺名也三月甲戌武寧軍節度使王彥超克徐州鞏廷美楊溫不書死之語在贇傳夏四月甲午立夫人董氏為德妃五月辛未追尊祖考為皇帝妣為皇后高祖璟諡曰睿和廟號信祖祖妣張氏諡曰睿恭曾祖諶諡曰明憲廟號僖祖祖妣申氏諡曰明孝祖蘊諡曰翼順廟號義祖祖妣韓氏諡曰翼敬考諡曰章肅廟號慶祖妣王氏諡曰章德六月辛亥范質及戶部侍郎判三司李穀為中書侍郎同中書門下平章事竇貞固蘇禹圭罷癸丑范質參知樞密院事丁巳宣徽北院使翟光鄴為樞密副使秋七月戊寅幸王峻第八月壬寅契丹來歸趙瑩之喪冬十月丙午漢人來討攻自晉州討加有罪漢之於周義所得誅云自晉州者見漢兵當誅罪人于京師自晉州而入耳攻城無得失不書此書者許漢來討十一月王峻及建雄軍節度使王彥超拒之十二月慕容彥超反二年春正月甲子侍衛步軍都指揮使曹英為兗州行營都部署庚午高麗王昭使其廣評侍郎徐逢來二月庚寅府州防禦使折德扆克岢嵐軍三月丁巳朔寒食望祭于郊戊辰內客省使鄭仁誨為樞密副使翟光鄴罷夏五月庚申東征李穀留守東都鄭仁誨為大內都點檢癸亥次曹州赦流罪以下囚乙亥克兗州壬午赦兗州彥超投井死故不書伏誅六月乙酉朔幸曲阜祠孔子庚子至自兗州秋九月乙丑大僕少卿王演使于高麗契丹寇邊三年春正月乙卯麟州刺史楊重訓叛于漢來附閏月丙戌回鶻使獨呈相溫來二月甲子貶王峻為商州司馬三月甲申封榮為晉王丙戌鄭仁誨罷己丑棣州團練使王仁鎬為右衛大將軍樞密副使不書子者榮於禮不得為子不書子則當書其本姓又不書者周人所共諱夏六月大雨水秋七月契丹盧臺軍使張藏英來奔九月吐渾党富達等來冬十月庚申馮道為奉迎神主使十一月癸未党項使吳怗磨五等來十二月戊申四廟神主至自西京迎之于西郊祔于太廟壬申殺天雄軍節度使王殷乙亥享于太廟顯德元年春正月丙子朔有事于南郊大赦改元羣臣上尊號曰聖明文武仁德皇帝戊寅罷鄴都丙戌鎮寧軍節度使鄭仁誨為樞密使壬辰端明殿學士戶部侍郎王溥為中書侍郎同中書門下平章事王仁鎬罷是日皇帝崩于滋德殿年五十一書是日連上文嫌無崩日
