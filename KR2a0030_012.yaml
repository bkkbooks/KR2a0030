body:
  text: 新五代史卷十二周本紀第十二世宗睿武孝文皇帝本姓柴氏邢州龍岡人也柴氏女適太祖是為聖穆皇后后兄守禮子榮幼從姑長太祖家以謹厚見愛太祖遂以為子太祖後稍貴榮亦壯而器貌英奇善騎射略通書史黃老性沈重寡言太祖為漢樞密使榮為左監門衛大將軍太祖鎮天雄榮領貴州刺史天雄軍牙內都指揮使乾祐三年冬周兵起魏犯京師留榮守魏太祖入立拜澶州刺史鎮寧軍節度使檢校太傅同中書門下平章事榮素為樞密使王峻所忌廣順三年正月來朝不得留既而峻有罪誅三月拜榮開封尹封晉王是冬卜以來年正月朔旦有事于南郊而太祖遇疾不能視朝者久之顯德元年正月丙子郊僅而成禮即以王判內外兵馬事壬辰太祖崩祕不發喪丙申發喪皇帝即位于柩前右監門衛大將軍魏仁浦為樞密副使於書封晉王正其非子矣其餘假竊嗣君之禮不待譏貶而可知故皆無異辭二月庚戌回鶻遣使者來丁卯馮道為大行皇帝山陵使太常卿田敏為禮儀使兵部尚書張昭為鹵簿使御史中丞張煦為儀仗使開封少尹權判府事王敏為橋道頓遞使漢人來討攻自潞州三月辛巳大赦癸未鄭仁誨留守東京乙酉如潞州以攻漢壬辰次澤州閲兵于北郊癸巳及劉旻戰于高原敗之追及于高平又敗之丁酉幸潞州己亥侍衛馬軍都指揮使樊愛能步軍都指揮使何徽伏誅壬寅天雄軍節度使符彥卿為河東行營都部署不曰伐曲在周不可以大小為言故用兩相攻為文與其不屈于周不與其稱帝故書姓名夏四月乙卯葬神聖文武恭肅孝皇帝于嵩陵汾州防禦使董希顏叛于漢來附丙辰遼州刺史張漢超叛于漢來附辛酉取嵐憲州壬戌立衛國夫人符氏為皇后取石沁州乙丑馮道薨庚午赦潞州流罪以下囚如太原欣州監軍李勍殺其刺史趙叛于漢來附在鄭州新鄭縣五月丙子代州守將鄭處謙叛于漢來附契丹救漢丁酉回鶻使因難敵略來符彥卿及契丹戰于欣口敗績先鋒都指揮使史彥超死之六月乙巳班師乙丑次新鄭遂拜嵩陵庚午至自太原秋七月庚辰閲稼于南御莊癸巳樞密院直學士工部侍郎景範為中書侍郎同中書門下平章事魏仁浦為樞密使冬十月甲辰殺左羽林大將軍孟漢卿二年春二月御札求直言五代亂世以嗣君即位者五而改元不依古者四梁末帝晉出帝即位踰年宜改元而不改又明年然後改漢隱帝周世宗皆仍稱先帝年號終其世不改而本紀無譏者但書其實自見其失也夏五月辛未宣徽南院使向訓鳳翔節度使王景伐蜀甲戌大毀佛寺禁民親無侍養而為僧尼及私自度者秋九月丙寅朔頒銅禁閏月癸丑向訓克秦州冬十月辛未取成州戊寅高麗使王子太相融來取階州十一月乙未朔李穀為淮南道行營都部署以伐唐戊申王景克鳳州十二月丙戌鄭仁誨薨三年春正月增築京城庚子向訓留守東京壬寅南征辛亥侍衛親軍都指揮使李重進及唐人戰于正陽敗之甲寅重進為淮南道行營都招討使二月丙寅幸下蔡浮橋壬申克滁州甲戌李景來求成不答壬午景使其臣鍾謨來奉表丙戌取揚州辛卯取泰州三月庚子內外馬步軍都軍頭袁彥為竹龍都部署是月取光舒常州書是月見取三州不同日夏四月常泰州復入于唐五月乙卯至自淮南赦京師囚六月壬申德音赦淮南囚秋七月皇后崩揚光舒滁州復入于唐八月乙丑課民種木及韭九月丙午端明殿學士左散騎常侍王朴為尚書戶部侍郎樞密副使冬十月辛酉葬宣懿皇后于懿陵十一月庚寅廢諸祠不在祀典者乙巳殺李景之臣孫晟書殺景臣而不書晟死蓋已深罪周殺忠臣則晟之死節自著四年春正月己丑朔赦非死罪囚二月甲戌王朴留守東京乙亥南征三月丁未克壽州不書劉仁贍降事見死節傳蓋仁贍實不降故書周自克之爾克者難取之名也壽難取則見仁贍之節著不書死之者仁贍自以病死以其至死守節故列之死節傳夏四月己巳至自壽州己卯放降卒竹八百歸于蜀癸未追册彭城郡夫人劉氏為皇后五月丙申殺密州防禦使侯希進秋八月乙亥李穀罷王朴為樞密使癸未蜀人來歸我濮州刺史胡立冬十月己巳王朴留守東京三司使張美為大內都點檢壬申南征十二月乙卯泗州守將范再遇叛于唐以其州來降庚申濠州團練使郭廷謂以其州來降丁丑取泰州身居其地而來降者書附再遇廷謂雖以地降既降而不居其地故不書附而書降廷謂不書叛事見南唐世家五年春正月丁亥取海州壬辰取靜海軍丁未克楚州守將張彥卿鄭昭業死之自四年十二月辛酉攻之彥卿等堅守四十餘日乃克之其不走不降可知故豫其死本紀書死者十餘人宋令詢及李遐彥卿昭業皆以事迹不完不能立傳然所貴者死爾本紀著其大節可矣二月甲寅取雄州丁卯如揚州癸酉如瓜洲三月壬午朔如泰州丁亥復如揚州辛卯幸迎鑾己亥克淮南十有四州以江為界三月辛亥李景來買宴并前所得通十四州耳書之見其本志所止四月庚申祔五室神主于新廟壬申至自淮南回鶻達靼遣使來六月辛未放降卒四千六百于唐秋七月乙酉水部員外郎韓彥卿市銅于高麗丁亥頒均田圖九月占城國王釋利因德縵使莆訶散來冬十月丁酉括民租十一月庚戌作通禮正樂十二月丙戌罷州縣課戶俸戶六年春正月高麗王昭遣使者來辛酉女真使阿辨來三月己酉甘州回鶻來獻玉却之庚申王朴薨丙寅宣徽南院使吳延祚留守東京癸酉停給銅魚甲戌北征是月吳延祚為左驍衛上將軍樞密使夏四月壬辰取乾寧軍辛丑取益津關以為霸州癸卯取瓦橋關以為雄州州縣廢置不書此書重復中國故地世宗下三關瓦橋益津以建州及見淤口關止置寨故舊史實録皆闕不書遂不見其取得時日今信安軍是也五月乙巳朔取瀛州甲戌至自雄州復中國故地故不書契丹六月癸未立皇后符氏封子宗訓為梁王宗讓燕國公戊子占城使莆訶散來己丑范質王溥參知樞密院事魏仁浦同中書門下平章事癸巳皇帝崩于滋德殿符氏無國爵不曰立符氏為皇后嫌同於不正也蓋其位先定而後娶故書曰立皇后符氏文理宜然無褒貶也年三十九恭皇帝世宗第四子宗訓也世宗即位大臣請封皇子為王世宗謙抑久之及北取三關遇疾還京師始封宗訓梁王時年七歲顯德六年六月癸巳世宗崩甲午皇帝即位于柩前癸卯范質為大行皇帝山陵使翰林學士竇儼為禮儀使兵部尚書張昭為鹵簿使御史中丞邊歸讜為儀仗使宣徽南院使判開封府事咱居潤為橋道頓遞使秋七月丁未戶部尚書李濤為山陵副使度支郎中盧億為判官八月庚寅封弟熙讓為曹王熙謹紀王熙誨蘄王壬寅高麗遣使者來九月丙寅左驍衛大將軍戴交使于高麗冬十一月壬寅葬睿武孝文皇帝于慶陵高麗遣使者來在鄭州管城縣七年春正月甲辰遜于位宋興五代之亡所書不同隨事為文爾梁亡見唐之速漢亡見周之遲也唐欺天下以討賊周欺天下以立贇故書梁亡見唐之立速則知其志不在討賊也漢亡見周之立遲則知立贇者偽也唐亡無辭莊宗之弒唐已亡矣而明宗又稱唐愍帝之奔唐又亡矣而廢帝又稱唐其亡也不可以屢書故不書也晉亡曰契丹滅晉明言以深戒周曰遜于位遜順也能順乎天命也嗚呼五代本紀備矣君臣之際可勝道哉梁之友圭反唐戕克寧而殺存乂從璨則父子骨肉之恩幾何其不絶矣太妃薨而輟朝立劉氏馮氏為皇后則夫婦之義幾何其不乖而不至於禽獸矣寒食野祭而焚紙錢居喪改元而用樂殺馬延及任圜則禮樂刑政幾何其不壞矣至於賽雷山傳箭而撲馬則中國幾何其不夷狄矣可謂亂世也歟而世宗區區五六年間取秦隴平淮右復三關威武之聲震懾夷夏而方內延儒學文章之士考制度修通禮定正樂議刑統其制作之法皆可施於後世其為人明達英果論議偉然即立之明年廢天下佛寺三千三百三十六是時中國乏錢乃詔悉毀天下銅佛像以鑄錢嘗曰吾聞佛説以身世為妄而以利人為急使其真身尚在苟利於世猶欲割截況此銅像豈其所惜哉由是羣臣皆不敢言嘗夜讀書見唐元稹均田圖慨然歎曰此致治之本也王者之政自此始乃詔頒其圖法使吏民先習知之期以一歲大均天下之田其規為志意豈小哉其伐南唐問宰相李穀以計策後克淮南出穀疏使學士陶穀為贊而盛以錦囊嘗置之坐側其英武之材可謂雄傑及其虛心聽納用人不疑豈非所謂賢主哉其北取三關兵不血刃而史家猶譏其輕社禝之重而僥幸一勝於倉卒殊不知其料強弱較彼我而乘述律之殆得不可失之機此非明於決勝者孰能至哉誠非史氏之所及也備謂喪亂之事無所不有
