body:
  text: 新五代史卷六十九南平世家第九高季興子從誨從誨子保融保勗保融子繼沖高季興字貽孫陝州硤石人也本名季昌避後唐獻袓廟諱更名季興季興少為汴州富人李讓家僮梁太袓初鎮宣武讓以入資得幸養為子易其姓名曰朱友讓季興以友讓故得進見太袓奇其材命友讓以子畜之因冒姓朱氏補制勝軍使遷毅勇指揮使天復二年梁兵攻鳳翔李茂貞堅壁不出太袓議欲收軍還河中季興獨進曰天下豪傑窺此舉者一歲矣今岐人已憊破在旦夕而大王之所慮者閉壁以老我師此可以誘致之也太袓壯其言命季興募勇敢士得騎士馬景季興授以計引見太袓景曰此行無還理願録其後嗣太袓惻然止之景固請乃行景以數騎馳叩城門告曰梁兵將東前鋒去矣岐人以為然開門出追梁軍梁兵隨景後以進殺其九千餘人景死之茂貞後與梁和昭宗出贈景官諡曰忠壯季興由是知名明年拜宋州刺史從破青州徙潁州防禦使復姓高氏當唐之末襄州趙匡凝襲破雷彥恭于荊南以其弟匡明為留後梁兵攻破襄州匡凝奔于吳匡明奔于蜀乃以季興為荊南節度觀察留後開平元年拜季興節度使二年加同中書門下平章事荊南節度十州當唐之末為諸道所侵季興始至江陵一城而已兵火之後井邑凋零季興招緝綏撫人士歸之乃以倪可褔鮑唐為將帥梁震司空薰王保義等為賓客太袓崩季興見梁日以衰弱乃謀阻兵自固治城隍設樓櫓以兵攻歸峽為蜀將王宗壽所敗又發兵聲言助梁擊晉以侵襄州為孔勍所敗乃絶貢賦纍年梁末帝優容之封季興渤海王賜以衮冕劍佩貞明三年始復修貢梁亡唐莊宗入洛下詔慰諭季興司空薰等皆勸季興入朝京師梁震以為不可曰梁唐世為仇敵夾河血戰垂二十年今主上新滅梁而大王梁室故臣握強兵居重鎮以身入朝行為虜爾季興不聽留其二子以騎士三百為衛朝于洛陽莊宗果欲留之郭崇韜諫曰唐新滅梁得天下方以大信示人今四方諸侯相繼入貢不過遣子弟將吏而季興以身述職為諸侯率宜加恩禮以諷動來者而反縻之示天下以不廣且絶四方內向之意不可莊宗乃止厚禮而遣之莊宗嘗問季興曰吾已滅梁欲征吳蜀何者為先季興曰宜先蜀臣請以本道兵先進莊宗大悅以手拊其背季興因命工繡其手迹於衣歸以為榮耀季興已去莊宗心悔遣之密詔襄州劉訓圖之季興行至襄州心動夜斬關而出已去而詔書夜至季興歸而謂梁震曰不聽子言幾不免因曰吾行有二失來朝一失放還一失且主上百戰以取河南對功臣誇手抄春秋又曰我於手指上得天下其自矜伐如此而荒于遊畋政事多廢吾可無慮矣同光三年封南平王魏王繼岌已破蜀得蜀金帛四十餘萬自峽而下而莊宗之難作季興聞京師有變乃悉邀留蜀物而殺其使者韓珙等十餘人初唐兵伐蜀季興請以本道兵自取夔忠萬歸峽等州乃以季興為峽路東南面招討使而季興未嘗出兵魏王已破蜀而明宗入立季興因請夔忠等州為屬郡唐大臣以為季興請自取之而兵出無功不與季興屢請雖不得已而與之而唐猶自除刺史季興拒而不納明宗乃以襄州劉訓為招討使攻之不克而唐別將西方鄴克其夔忠萬三州季興遂以荊歸峽三州臣于吳吳册季興秦王天成三年冬卒年七十一諡曰武信季興子九人長子從誨立從誨字遵聖季興時人梁為供奉官纍遷鞍轡庫使賜告歸寧季興遂留為馬步軍都指揮使行軍司馬季興卒吳以從誨為荊南節度使從誨以父自絶于唐懼復見討乃遣使者聘于楚楚王馬殷為之請命于唐而從誨亦遣押衙劉知謙奉表自歸進贖罪銀三千兩明宗納之長興元年正月拜從誨節度使追封季興楚王諡曰武信三年封從誨渤海王應順元年封南平王從誨為人明敏多權詐晉高袓遣翰林學士陶穀為從誨生辰國信使從誨宴穀望沙樓大陳戰艦于樓下謂穀曰吳蜀不賓久矣願修武備習水戰以待師期穀還具道其語晉高袓大喜復遣使賜以甲馬百匹襄州安從進反結從誨為援從誨外為拒絶陰與之通晉師致討從誨遣將李端以舟師為應從進誅從誨求郢州為屬郡高袓不許契丹滅晉漢高袓起太原從誨遣人間道奉表勸進且言漢得天下願乞郢州為屬漢高袓陽諾之高袓入汴從誨遣使朝貢因求郢州高袓不與從誨怒發兵攻郢州為刺史尹實所敗漢遣國子祭酒田敏使于楚假道荊南從誨問敏中國虛實以為契丹之後兵食皆殫意欲以誚敏敏為言杜重威悉以晉戈甲降虜虜置之鎮州未嘗以北而晉兵皆漢有也從誨不悅敏以印本五經遺從誨從誨謝曰豫之所識不過孝經十八章爾敏曰至德要道於此足矣敏因誦諸侯章曰在上不驕高而不危制節謹度滿而不溢從誨以為譏己即以大卮罰敏荊南地狹兵弱介於吳楚為小國自吳稱帝而南漢閩楚皆奉梁正朔歲時貢奉皆假道荊南季興從誨常邀留其使者掠取其物而諸道以書責誚或發兵加討即復還之而無愧其後南漢與閩蜀皆稱帝從誨所嚮稱臣蓋利其賜豫俚俗語謂奪攘苟得無愧恥者為賴子猶言無賴也故諸國皆目為高賴子從誨自求郢州不得遂自絶於漢逾年復通朝貢乾祐元年十月卒年五十八贈尚書令諡曰文獻子保融立從誨十五子長曰保勳次保正保融第三子也不知其得立之因保融字德長從誨時為節度副使兼峽州刺史從誨卒拜節度使廣順元年封渤海郡王顯德元年進封南平王世宗征淮保融遣指揮使魏璘率兵三千出夏口以為應又遣客將劉扶奉箋南唐勸其內附李景稱臣世宗得保融所與箋大喜賜以絹百匹荊南自後唐以來常數歲一貢京師而中間兩絶及世宗時無歲不貢矣保融以謂器械金帛皆土地常産不足以效誠節乃遣其弟保紳來朝世宗益嘉之初季興之鎮梁以兵五千為牙兵衣食皆給於梁至明宗時歲給以鹽萬三千石後不復給及世宗平淮故命泰州給之保融性迂緩無材能而事無大小皆委其弟保勗其從叔從義謀為亂為其徒高知訓所告徙之松滋而殺之宋興保融懼一歲之間三入貢建隆元年以疾卒年四十一贈太尉諡曰貞懿弟保勗立保勗字省躬從誨第十子也保融卒拜節度使三年保勗疾謂其將梁延嗣曰我疾遂不起兄弟孰可付之後事者延嗣曰公不念貞懿王乎先王寢疾以軍府付公今先王子繼沖長矣保勗曰子言是也即以繼沖判內外兵馬十一月保勗卒年三十九贈侍中保融之子繼沖立繼沖字成和保勗卒拜節度使湖南周行逢卒子保權立其將張文表作亂建隆四年太袓命慕容延釗等討之延釗假道荊南約以兵過城外繼沖大將李景威曰兵尚權譎城外之約不可信也宜嚴兵以待之判官孫光憲叱之曰汝峽江一民爾安識成敗且中國自周世宗時已有混一天下之志況聖宋受命真主出邪王師豈易當也因勸繼沖去斥候封府庫以待繼沖以為然景威出而歎曰吾言不用大事去矣何用生為因扼吭而死延釗軍至繼沖出逆于郊而前鋒遽入其城繼沖亟歸見旌旗甲馬布列衢巷大懼即詣延釗納牌印太祖優詔復命繼沖為節度使乾德元年有事于南郊繼沖上書願陪祠九月具文告三廟率其將吏宗族五百餘人朝于京師拜武寧軍節度使以卒光憲拜黃州刺史其後事具國史季興興滅年世甚明諸書皆同蓋自梁開平元年鎮荊南至皇朝乾德元年國除凡五十七年
