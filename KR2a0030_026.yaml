body:
  text: 新五代史卷二十六唐臣傳第十四符習符習趙州昭慶人也少事趙王王鎔為軍校自晉救趙破梁軍柏鄉趙常遣習將兵從晉晉軍德勝張文禮殺趙王王鎔上書莊宗求習歸趙莊宗遣之習號泣曰臣世家趙受趙王恩王嘗以一劍與臣使自效今聞王死欲以劍自裁念卒無益請擊趙破賊報王冤莊宗壯之乃遣閻寶史建瑭等助習討文禮以習為鎮州兵馬留後習攻文禮不克莊宗用他將破之拜習成德軍節度使習辭不敢受乃以相衛二州為義寧軍以習為節度使習辭曰魏博六州霸王之府也不宜分割以示弱願授臣河南一鎮得自攻取之乃拜習天平軍節度使東南面招討使習亦未嘗攻取後徙鎮安國又徙平盧趙在禮作亂遣習以鎮兵討賊習未至魏而明宗兵變習不敢進明宗遣人招之習見明宗於胙縣而以明宗舉兵不順去就之意未決霍彥威紿習曰主上所殺者十人公居其四復何猶豫乎習意乃決平盧監軍楊希望聞習為明宗所召乃以兵圍習家屬將殺之指揮使王公儼素為希望所信紿希望曰內侍盡忠朝廷誅反者家族孰敢不效命宜分兵守城以虞外變習家不足慮也希望信之乃悉分其兵守城公儼因擒希望斬之習家屬由是獲免而公儼宣言青人不便習之嚴急不欲習復來因自求為節度使明宗乃以房知溫代習鎮平盧拜公儼登州刺史公儼不時承命知溫擒而殺之習復鎮天平徙鎮宣武習素為安重誨所不悅希其旨者上言習厚斂汴人乃以太子太師致仕歸昭慶故里明宗以其子令謙為趙州刺史以奉養之習以無罪怏怏失職縱獵劇飲以自娛居歲餘中風卒贈太師習二子令謙蒙令謙有勇力善騎射以父任為將官至趙州刺史有善政卒于州州人號泣送葬者數千人當時號為良刺史蒙少好學性剛鯁為成德軍節度副使後事晉官至禮部侍郎烏震烏震冀州信都人也少事趙王王鎔為軍卒稍以功遷裨校隸符習軍習從莊宗于河上而鎔為張文禮所弒震從習討文禮而家在趙文禮執震母妻及子十餘人以招震震不顧文禮乃自斷其手鼻割而不誅縱至習軍軍中皆不忍正視震一慟而止憤激自勵身先士卒晉軍攻破鎮州震以功拜刺史歷深趙二州震為人純質少好學通左氏春秋喜作詩善書及為刺史以廉平為政有聲遷冀州刺史兼北面水陸轉運使明宗聞其名擢拜河北道副招討使領寧國軍節度使代房知溫戍于盧臺軍始至而戍兵龍晊等作亂見殺贈太師嗚呼忠孝以義則兩得吾既已言之矣若烏震者可謂忠乎甚矣震之不思也夫食人之祿而任人之事事有任專其責而其國之利害由己之為不為為之雖利於國而有害於其親者猶將辭其祿而去之矧其事衆人所皆可為而任不專己又其為與不為國之利害不繫焉者如是而不顧其親雖不以為利猶曰不孝況因而利之乎夫能事其親以孝然後能事其君以忠若烏震者可謂大不孝矣尚何有於忠哉孔謙孔謙魏州人也為魏州孔目官魏博入于晉莊宗以為度支使謙為人勤敏而傾巧善事人莊宗及其左右皆悅之自少為吏工書算頗知金穀聚斂之事晉與梁相拒河上十餘年大小百餘戰謙調發供饋未嘗闕乏所以成莊宗之業者謙之力為多然民亦不勝其苦也莊宗初建大號謙自謂當為租庸使而郭崇韜用魏博觀察使判官張憲為使以謙為副謙已怏怏既而莊宗滅梁謙從入汴謂崇韜曰鄴北都也宜得重人鎮之非張憲不可崇韜以為然因以憲留守北都而以宰相豆盧革判租庸謙益失望乃陰求革過失而革嘗以手書假租庸錢十萬謙因以書示崇韜而微泄其事使革聞之革懼遂求解職以讓崇韜崇韜亦不肯當莊宗問誰可者崇韜曰孔謙雖長於金穀而物議未可居大任不若復用張憲乃趣召憲憲為人明辨人頗忌之謙因乘間謂革曰租庸錢穀悉在目前委一小吏可辦鄴都天下之重不可輕以任人革以語崇韜崇韜罷憲不召以興唐尹王正言為租庸使謙益憤憤因求解職莊宗怒其避事欲置之法賴伶官景進救解之乃止已而正言病風不任事景進數以為言乃罷正言以謙為租庸使賜豐財贍國功臣謙無他能直以聚斂為事莊宗初即位推恩天下除百姓田租放諸場務課利欠負者謙悉違詔督理故事觀察使所治屬州事皆不得專達上所賦調亦下觀察使行之而謙直以租庸帖調發諸州不關觀察觀察使交章論理以謂制敕不下支郡刺史不專奏事唐制也租庸直帖沿偽梁之弊不可為法今唐運中興願還舊制詔從其請而謙不奉詔卒行直帖又請減百官俸錢省罷節度觀察判官推官等員數以至鄣塞天下山谷徑路禁止行人以收商旅征算遣大程官放豬羊柴炭占庇人戶更制括田竿尺盡率州使公廨錢由是天下皆怨苦之明宗立下詔暴謙罪斬于洛市籍沒其家遂罷租庸使額分鹽鐵度支戶部為三司張延朗張延朗汴州開封人也事梁以租庸吏為鄆州糧料使明宗克鄆州得延朗復以為糧料使後徙鎮宣武成德以為元從孔目官明宗即位為莊宅使宣徽北院使忠武軍節度使長興元年拜三司使唐制戶部度支以本司郎中侍郎判其事而有鹽鐵轉運使其後用兵以國計為重遂以宰相領其職乾符已後天下喪亂國用愈空始置租庸使用兵無常隨時調斂兵罷則止梁興始置租庸使領天下錢穀廢鹽鐵戶部度支之官莊宗滅梁因而不改明宗入立誅租庸使孔謙而廢其使職以大臣一人判戶部度支鹽鐵號曰判三司延朗因請置三司使事下中書中書用唐故事拜延朗特進工部尚書充諸道鹽鐵轉運等使兼判戶部度支事詔以延朗充三司使班在宣徽使下三司置使自此始延朗號為有心計以三司為己任而天下錢穀亦無所建明明宗常出遊幸召延朗共食延朗不至附使者報曰三司事忙無暇聞者笑之歷泰寧雄武軍節度使廢帝以為吏部尚書兼中書門下平章事判三司晉高祖有異志三司財貨在太原者延朗悉調取之高祖深以為恨晉兵起廢帝欲親征而心畏高祖遲疑不決延朗與劉延朗等勸帝必行延朗籍諸道民為丁及括其馬丁馬未至晉兵入京師高祖得延朗殺之李嚴李嚴幽州人也初名讓坤事劉守光為刺史後事莊宗為客省使嚴為人明敏多藝能習騎射頗知書而辨同光三年使于蜀為王衍陳唐興復功德之盛音辭清亮蜀人聽之皆竦動衍樞密使宋光嗣召嚴置酒從容問中國事嚴對曰前年天子建大號于鄴宮自鄆趨汴定天下不旬日而梁之降兵猶三十萬東漸于海西極甘涼北懾幽陵南踰閩嶺四方萬里莫不臣妾而淮南楊氏承纍世之強鳳翔李公恃先朝之舊皆遣子入侍稽首稱藩至荊湖吳越修貢賦效珍奇願自比於列郡者至無虛月天子方懷之以德而震之以威天下之勢不得不一也光嗣曰荊湖吳越非吾所知若鳳翔則蜀之姻親也其人反覆其可信乎又聞契丹日益強盛大國其可無慮乎嚴曰契丹之強孰與偽梁光嗣曰比梁差劣爾嚴曰唐滅梁如拉朽況其不及乎唐兵布天下發一鎮之衆可以滅虜使無類然而天生四夷不在九州之內自前古王者皆存而不論蓋不欲窮兵黷武也蜀人聞嚴應對愈益奇之是時蜀之君臣皆庸暗而恃險自安窮極奢僭嚴自蜀還具言可取之狀初莊宗遣嚴以名馬入蜀市珍奇以充後宮而蜀法嚴禁以奇貨出劍門其非奇物而出者名曰入草物由是嚴無所得而還惟得金二百兩地衣毛布之類莊宗聞之大怒曰物歸中國謂之入草王衍其能免為入草人乎於是決議伐蜀冬魏王繼岌西伐以嚴為三川招撫使與康延孝以兵五千先行所過州縣皆迎降延孝至漢州王衍告曰得李嚴來即降衆皆以伐蜀之謀自嚴始而衍怨嚴深不宜往嚴聞之喜即馳騎入益州衍見嚴以妻母為託即日以蜀降嚴還明宗以為泗州防禦使客省使如故其後孟知祥屈強於蜀安重誨稍裁抑之思有以制知祥者嚴乃求為西川兵馬都監將行其母曰汝前啓破蜀之謀今行其以死報蜀人矣嚴不聽初嚴與知祥同事莊宗時知祥為中門使嚴嘗有過莊宗怒甚命斬之知祥戒行刑者少緩入白莊宗曰嚴小過不宜以喜怒殺人恐失士大夫心莊宗怒稍解命知祥監笞嚴二十而釋之知祥雖與嚴有舊恩而惡其來蜀人聞嚴來亦皆惡之嚴至知祥置酒從容問嚴曰朝廷以公來邪公意自欲來邪嚴曰君命也知祥發怒曰天下藩鎮皆無監軍安得爾獨來此此乃孺子熒惑朝廷爾即擒斬之明宗不能詰也知祥由此遂反李仁矩李仁矩不知其世家少事明宗為客將明宗即位以為客省使左衛大將軍明宗祀天南郊東西川當進助禮錢使仁矩趣之仁矩恃恩驕恣見藩臣不以禮東川節度使董璋置酒召仁矩仁矩辭醉不往於傳舍與倡妓飲璋怒率衙兵露刃之傳舍仁矩惶恐不襪而靴走庭中璋責之曰爾以西川能斬李嚴謂我獨不能斬爾邪顧左右牽出斬之仁矩涕泣拜伏謝罪乃止明日璋置酒召仁矩見其妻子以厚謝之仁矩還言璋必反仁矩素為安重誨所親信自璋有異志重誨思有以制之乃分東川之閬州為保寧軍以仁矩為節度使遣姚洪將兵戍之璋以書至京師告其子光業曰朝廷割我支郡分建節髦又以兵戍之是將殺我也若唐復遣一騎入斜谷吾反必矣與汝自此而決光業私以書示樞密承旨李虔徽使白重誨重誨不省仁矩至鎮伺璋動靜必以聞璋益疑懼遂決反重誨又遣荀咸乂將兵益戍閬州光業亟言以為不可重誨不聽咸乂未至璋已反攻閬州仁矩召將校問策皆曰璋有二心久矣常以利啖吾兵兵未可用而賊鋒方鋭宜堅壁以挫之守旬日大軍必至賊當自退仁矩曰蜀懦安能當我精鋭之師即驅之出戰兵未交而潰仁矩被擒並其家屬皆見殺毛璋毛璋滄州人也梁末戴思遠為橫海軍節度使璋事思遠為軍校晉已下魏博思遠棄滄州出奔璋以滄州降晉以功為貝州刺史璋為人有膽勇自晉與梁相拒河上璋纍戰有功莊宗滅梁拜璋華州節度使在鎮多不法議者疑其有異志乃徙璋鎮昭義璋初欲拒命其判官邊蔚切諫諭之乃聽命璋纍歷藩鎮又在華州得魏王繼岌伐蜀餘資既富而驕益為淫侈嘗服赭袍飲酒使其所得蜀妓為王衍宮中之戲于前明宗聞而惡之召為金吾上將軍東川董璋上書言璋遣子廷贇持書往西川疑其有姦明宗乃遣人追還廷贇並璋下御史獄廷贇款稱實璋假子有叔父在蜀欲往省之而無私書璋無罪名有司議璋前任藩鎮陰畜異圖及處班行不慎行止乃停璋見任官勒還私第初廷贇之蜀與其客趙延祚俱及召下獄延祚多捃璋陰事欲言之璋許延祚重賂以滅口既出而責賂於璋不與延祚乃詣臺自言並璋復下獄鞫之無狀中丞呂夢奇議曰璋前經推劾已蒙昭雪而延祚以責賂之故復加織羅乃稍宥璋璋款上有告者言夢奇受賂而劾獄不盡乃移軍巡獄獄吏希旨鍛鍊其事璋具伏許賂延祚而未與嘗以馬借夢奇而無受賂璋坐長流儒州已而令所在賜自盡
