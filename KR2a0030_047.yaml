body:
  text: 新五代史卷四十七雜傳第三十五華溫琪華溫琪字德潤宋州下邑人也世本農家溫琪身長七尺少從黃巢為盜巢陷長安以溫琪為供奉官都知巢敗溫琪走滑州顧其狀貌魁偉懼不自容乃投白馬河流數十里不死河上人援而出之又自經于桑林桑輒枝折乃之胙縣有田父見之曰子狀貌堂堂非常人也乃匿于家後歲餘聞濮州刺史朱裕募士為兵乃往依之後事梁為開道指揮使纍以戰功為絳棣二州刺史棣州苦河水為患溫琪徙于新州以避之民賴其利歷齊晉二州莊宗攻晉州踰月不能破梁末帝嘉溫琪善守升晉州為定昌軍以溫琪為節度使坐掠部民妻為其夫所訟罷為金吾衛大將軍左龍武統軍朱友謙以河中叛附于晉末帝拜溫琪汝州防禦使河中行營排陳使遷耀州觀察留後莊宗滅梁見溫琪曰此為梁守平陽者也嘉之因以耀州為順義軍拜溫琪節度使徙鎮雄武明宗時來朝願留闕下以為左驍衛上將軍踰年明宗謂樞密使安重誨曰溫琪舊人宜與一重鎮重誨意不欲與對以無員闕他日明宗語又及之重誨曰可代者惟樞密使耳明宗曰可重誨不能答溫琪聞之懼稱疾不出者纍月已而以為鎮國軍節度使廢帝時以太子太保致仕天福元年卒贈太子太傅萇從簡萇從簡陳州人也世本屠羊從簡去事晉為軍校力敵數人善用槊莊宗用兵攻城從簡多為梯頭莊宗愛其勇以功纍遷步軍都指揮使莊宗與梁軍對陳梁軍有執大旗出入陳間者莊宗登高丘望見之歎曰彼猛士誰能為我取之者從簡因前請往莊宗惜之不許從簡濳率數騎馳入梁軍奪其旗而還軍中皆鼓噪莊宗壯之賜與甚厚從簡嘗中流矢鏃入髀骨命工取之工無良藥欲鑿其骨人皆以為不可從簡遽使鑿之工遲疑不忍下從簡叱其亟鑿左右視者皆若不勝其毒而從簡言笑自若然其為人剛暴難制莊宗每屈法優容之纍遷蔡州防禦使明宗時歷麟汝汾金四州防禦使明宗嘗戒之曰富貴可惜然汝不能守也先帝能貸爾吾恐不能從簡性不可悛明宗亦不之責廢帝舉兵於鳳翔從簡與諸鎮兵圍之已而兵潰從簡東走被執廢帝責其不降從簡曰事主不敢二心廢帝釋之拜潁州團練使晉高祖起兵太原廢帝將親征召為招討副使從至河陽拜河陽三城節度使廢帝還洛陽從簡即降晉歷鎮忠武武寧入為左金吾衛上將軍卒年六十五贈太師從簡好食人肉所至多潛捕民間小兒以食許州富人有玉帶欲之而不可得遣二卒夜入其家殺而取之卒夜踰垣隱木間見其夫婦相待如賓二卒歎曰吾公欲奪其寶而害斯人吾必不免因躍出而告之使其速以帶獻遂踰垣而去不知其所之張筠弟籛張筠海州人也世以資為商賈筠事節度使時溥為宿州刺史梁兵攻溥取宿州得筠愛其辨惠以為四鎮客將長直軍使纍拜宣徽使末帝分相澶衛三州為昭德軍以筠為節度使由是魏博軍叛附于晉晉王攻相州筠棄城走後以為永平軍節度使梁亡事唐仍為京兆尹從郭崇韜伐蜀為劍南兩川安撫使蜀平拜河南尹徙鎮興元筠嘗有疾不見將吏副使符彥琳入問疾筠又辭不見彥琳疑筠已死即請出牌印筠怒命左右收彥琳下獄以其反聞明宗知彥琳無反狀召彥琳釋之陽徙筠為西京留守戒守者不內筠至長安不得入乃朝京師以為左驍衛上將軍筠弟籛當筠為京兆尹時以為牙內指揮使三白渠營田制置使筠西伐蜀留籛守京兆蜀平魏王繼岌班師至興平而明宗自魏起京師大亂籛乃斷咸陽浮橋以拒繼岌繼岌乃自殺初筠代康懷英為永平軍節度使而懷英死筠即掠其家資又於唐故宮掘地多得金玉有偏將侯莫陳威者嘗與溫韜發唐諸陵分得寶貨筠因以事殺威而取之魏王繼岌死渭南籛悉取其行橐而王衍自蜀行至秦川莊宗遣宦者向延嗣殺之延嗣因盡得衍蜀中珍寶明宗即位即遣人捕誅宦者延嗣亡命而蜀之珍寶籛又取之由是兄弟資皆巨萬然筠為人好施豫以其富故所至不為聚斂民賴以安而籛嗜酒貪鄙歷沂密二州刺史晉出帝時以將軍市馬於回鶻坐馬不中式有司理其價直籛性鄙因鬱鬱而卒筠居洛陽擁其資以酒色聲妓自娛足者十餘年人謂之地仙天福二年徙居長安是歲張從賓作亂入洛陽筠遂以免卒贈太子少師嗚呼五代反者多矣吾於明宗獨難其辭至於魏王繼岌薨然後終其事也莊宗遇弒繼岌以元子握重兵死于外而不得立此大事也而前史不書其所以然夫繼岌之存亡於張籛無所利害籛何為而拒之不使之東乎豈其有所使而為之乎然明宗於符彥超深以為德而待籛無所厚此其又可疑也不然好亂之臣望風而響應乎使籛不斷浮橋而繼岌得以兵東明宗未必能自立則繼岌之死由籛之拒其所繫者豈小哉楊彥詢楊彥詢字成章河中寶鼎人也少事青州王師範師範好學聚書萬卷使彥詢掌之彥詢為人聰悟遂見親信師範降梁後見殺彥詢無所歸乃之魏事楊師厚為客將魏博叛梁入于晉彥詢因留事晉莊宗滅梁以彥詢為引進副使奉使吳蜀常稱旨歷德州刺史羽林將軍晉高祖鎮太原廢帝疑其有二志擇諸將之謹厚者佐之乃以彥詢為太原節度副使其後晉高祖以疑見徙欲拒命不行以問彥詢彥詢不敢正言因曰太原之力能與唐敵否公其審計之高祖反意已決彥詢亦不復敢言高祖左右以彥詢異議欲殺之高祖遽止之曰惟副使一人我自保之乃免是時高祖乞兵於契丹契丹耶律德光立高祖于太原以兵送至河上彥詢為宣徽使數往來虜帳中德光亦愛其為人明年拜感德軍節度使復入為宣徽使又拜安國軍節度使天福七年徙鎮鎮國遭歲大飢為政有惠愛以病風罷為右金吾衛上將軍卒年七十四贈太子太師李周李周字通理邢州內丘人唐昭義軍節度使抱真之後也父矩遭世亂不仕嘗謂周曰邯鄲用武之地今世道未平汝當從軍旅以興吾門周年十六為內丘捕賊將以勇聞是時梁晉兵爭山東羣盜充斥道路行者必以兵衛內丘人盧嶽將徙家太原舍逆旅傍偟不敢進周意憐之為送至西山有盜從林中射嶽中其馬周大呼曰吾在此孰敢爾邪盜聞其聲曰此李周也因各潰去周送嶽至太原嶽謂之曰吾少學星曆且工相人子方頤隆準眉目疏徹身長七尺真將相也吾占天象晉必有天下子宜留事晉以圖富貴周以母老辭歸是時梁遣葛從周攻下邢洺晉王柵兵青山口周未知所歸乃思嶽言至青山歸晉晉王以周為萬勝黃頭軍使後從征伐常有功從戰柏鄉先登遷匡霸指揮使守楊劉周為將甚勇其於用兵善守能與士卒同甘苦梁兵攻周周堅守久之周聞母喪奔歸莊宗遣他將代周守幾為梁兵所破莊宗遽追周還守之乃得不破其後梁人已破德勝因東擊楊劉以巨艦絶河斷晉餉援周遣人馳趨莊宗求救請日行百里以赴急莊宗笑曰周為我守何憂日行六十里且行且獵曰周非梁將可敵也比至周已絶糧三日莊宗以巨積薪沃油順流縱火焚梁艦梁兵解去莊宗見周勞曰微公諸將為梁擒矣歷相蔡二州刺史明宗時拜武信軍節度使徙鎮靜難歷武寧安遠永興宣武四鎮所至多善政晉高祖時復鎮靜難罷還出帝幸澶淵以周留守東京還拜開封尹卒年七十四贈太師劉處讓劉處讓字德謙滄州人也少為張萬進親吏萬進入梁為泰寧軍節度使以處讓為牙將萬進叛梁附晉梁遣劉鄩討之萬進遣處讓求救于晉晉王方與梁相拒未能出兵處讓乃於軍門截耳而訴曰萬進所以見圍者以附晉故也奈何不顧其急苟不出兵願請死晉王壯之曰義士也為之發兵未渡河而萬進為梁兵所敗處讓因留事晉莊宗即位為客省使常使四方多稱旨天成中遷引進使纍遷左驍衛大將軍廢帝時魏州軍亂逐其帥劉延皓遣范延光招討以處讓為河北都轉運使晉高祖立歷宣徽南院使范延光反高祖命楊光遠為招討使以處讓參其軍事已而副招討使張從賓叛于河陽處讓分兵擊破從賓還與光遠攻鄴逾年不能下其後延光有降意而遲疑處讓入城譬以禍福延光乃出降唐制樞密使常以宦者為之自梁用敬翔李振至莊宗始用武臣而權重將相高祖時以宰相桑維翰李嵩兼樞密使處讓與諸宦者心不平之光遠之討延光也以晉重兵在己掌握舉動多驕恣其所求請高祖頗裁抑之處讓為光遠言此非上意皆維翰嵩等嫉公耳光遠大怒及兵罷光遠見高祖訴以維翰等沮己高祖不得已罷維翰等以處讓為樞密使處讓在職凡所陳述多不稱旨處讓丁母憂高祖遂不復拜樞密使以其印付中書而廢其職處讓居喪期年起復為彰德軍節度使右金吾衛上將軍以疾卒年六十三纍贈太師李承約李承約字德儉薊門人也少事劉仁恭為山後八軍巡檢使將騎兵二千人仁恭為其子守光所囚承約以其騎兵奔晉晉王以為匡霸指揮使從破夾寨戰臨清以功纍遷洺汾二州刺史潁州團練使天成中邠州節度使毛璋有異志明宗拜承約涇州節度副使使往伺璋動靜承約見璋諭以禍福後明宗遣人代璋璋即時受代明宗大喜即拜承約黔南節度使承約以恩信撫諸夷落勸民農桑興起學校居數年當代黔南人詣京師乞留為許留一年召為左衛上將軍改左龍武統軍拜昭義軍節度使復為左龍武統軍天福二年遷左驍衛上將軍數請老不許卒年七十五贈太子太師張希崇張希崇字德峯幽州薊人也少好學通左氏春秋劉守光不喜儒士希崇因事軍中為偏將將兵戍平州其後契丹攻陷平州得希崇知其儒者也以為盧龍軍行軍司馬明宗時盧文進自平州亡歸契丹因以希崇代文進為平州節度使遣其親將以三百騎監之居歲餘虜將喜其為人監兵稍怠希崇因與其麾下謀走南歸其麾下皆言兵多不可俱亡懼不得脫因勸希崇獨去希崇曰虜兵守我者三百騎爾烹其將其兵必散走且平州去虜帳千餘里使其聞亂而呼兵則吾與汝等在漢界矣衆皆曰善乃先為穽置以石灰明日虜將謁希崇希崇飲之以酒殺之穽中兵皆潰去希崇率其麾下得生口二萬南歸明宗嘉之拜汝州防禦使遷靈武節度使靈州地接戎狄戍兵餉道常苦抄掠希崇乃開屯田教士耕種軍以足食而省轉饋明宗下詔褒美希崇撫養士卒招輯夷落自回鶻瓜沙皆遣使入貢居四歲上書求還內地徙鎮邠寧晉高祖入立復拜靈武節度使希崇歎曰吾當老死邊徼豈非命邪希崇事母至孝朝夕母食必侍立左右徹饌乃敢退為將不喜聲色好讀書頗知星曆天福三年月掩畢口大星希崇歎曰畢口大星邊將也我其當之乎明年正月卒贈太師有子仁謙相里金相里金字奉金並州人也為人勇悍而能折節下士事晉王為五院軍隊長梁晉戰柏鄉胡柳皆有功遷黃甲指揮使同光中拜欣州刺史是時諸州皆用武人多以部曲主場務漁蠹公私以利自入金獨禁部曲不與事厚其給養使掌家事而已遷隴州防禦使廢帝起兵鳳翔馳檄四鄰四鄰未有應者獨金首遣判官薛文遇見廢帝往來計事廢帝即位德之拜保義軍節度使晉高祖起太原廢帝以金為太原四面步軍都指揮使高祖入立徙鎮建雄罷為上將軍天福五年卒贈太師張廷蘊張廷蘊開封襄邑人也少為宣武軍卒去事晉稍遷軍校常從莊宗征伐先登力戰金瘡滿體莊宗壯之以為帳前黃甲二十指揮步軍都虞候魏博三城巡檢使是時莊宗在魏以劉皇后從行劉氏多縱其下擾人為不法人無敢言者廷蘊輒收而斬之李繼韜叛于潞州莊宗遣明宗為招討使元行欽為都部署廷蘊為馬步軍都指揮使將兵為前鋒廷蘊至潞日已暮即率兵百餘踰濠登城城守者不能禦遂破潞州明旦明宗與行欽後至明宗心頗慊之廷蘊以功遷羽林都指揮使申懷沂三州刺史金潁隴絳四州防禦團練使左監門衛上將軍開運中以疾卒廷蘊武人所識不過數字而平生重文士嘗從明宗破梁鄆州獲判官趙鳳廷蘊謂曰吾視汝貌必儒人可無隱也鳳以實對廷蘊亟薦於明宗後鳳貴為相數薦廷蘊於安重誨重誨屢言之明宗以廷蘊破潞之隙終恨之故終不秉髦節廷蘊素廉歷七州卒之日家無餘資馬全節馬全節字大雅大名元城人也唐同光中全節為捉生指揮使趙在禮反鄴都以全節為馬步軍指揮使明宗即位歷博單郢沂四州刺史金州防禦使廢帝時蜀人攻金州州兵才數百全節散家財與士卒堅守蜀人去廢帝召全節以為滄州留後晉高祖入立即拜全節橫海軍節度使徙鎮安遠代李金全金全叛附于李高祖發兵三萬使全節與安審暉討之金全南奔將李承裕守安州全節與承裕戰州南大敗承裕斬首三千級生擒千餘人承裕棄城去審暉追至雲夢執承裕及其兵二千人全節斬千五百人以其餘兵並承裕獻于京師承裕謂全節曰吾掠城中所得百萬計將軍皆取之矣吾見天子必訴此而後就刑全節懼因殺承裕高祖置而不問徙全節鎮昭義又徙安國從杜重威討安重榮以功徙鎮義武自出帝與契丹交惡全節未嘗不在兵間開運元年為行營都虞候契丹與晉大軍相距澶魏之間全節別攻白團城破之虜七百人克泰州虜二千人降其守將晉廷謙四月契丹敗于戚城引兵分道而北全節敗之于定豐執其將安暉七月徙廣晉尹留守鄴都十月杜重威為招討使以全節為副大敗契丹于衛村全節為人謙謹事母至孝其臨政決事必問法如何初徙廣晉過元城衣白襴謁其縣令州里以為榮開運二年徙鎮順國未至而卒年五十五贈中書令皇甫遇皇甫遇常山真定人也為人有勇力虬髯善射少從唐明宗征伐事唐為武勝軍節度使所至苛暴以誅斂為務賓佐多解官逃去以避其禍晉高祖時歷義武昭義建雄河陽四鎮罷為神武統軍契丹入寇陷貝州出帝以高行周為北面行營都部署遇為馬軍右廂排陳使是時青州楊光遠據城反出帝乃遣李守貞及遇分兵守鄆州遇等至馬家渡契丹方將渡河助光遠遇等擊敗之以功拜義成軍節度使馬軍都指揮使開運二年契丹寇西山遣先鋒趙延壽圍鎮州杜重威不敢出戰延壽分兵大掠攻破欒城柏鄉等九縣南至邢州是時歲除出帝與近臣飲酒過量得疾不能出征乃遣北面行營都監張從恩會馬全節安審琦及遇等禦之從恩等至相州陳安陽河南遣遇與慕容彥超率數千騎前視虜遇渡漳河逢虜數萬轉戰十餘里至榆林為虜所圍遇馬中箭而踣得其僕杜知敏馬乘之以戰知敏為虜所擒遇謂彥超曰知敏義士也豈可失之即與彥超躍馬入虜取之而還虜兵與遇戰自午至未解而復合益出生兵勢甚盛遇戒彥超曰今日之勢戰與走爾戰尚或生走則死也等死死戰猶足以報國張從恩與諸將怪遇視虜無報皆謂遇已陷虜矣已而有馳騎報遇被圍安審琦率兵將赴之從恩疑報者詐不欲往審琦曰成敗天也當與公共之雖虜不南來吾屬失皇甫遇復何面目見天子即引騎渡河諸軍皆從而北拒虜十餘里虜望見救兵來即解去遇與審琦等收軍而南契丹亦皆北去是時契丹兵已深入人馬俱乏其還也諸將不能追而從恩率遇等退保黎陽虜因得解去三年冬以杜重威為都招討使遇為馬軍右廂都指揮使屯于中渡重威已陰送款契丹伏兵幕中悉召諸將列坐告以降虜遇與諸將愕然不能對重威出降表遇等俯首以次自畫其名即麾兵解甲出降契丹遣遇與張彥澤先入京師遇行至平棘絶吭而死嗚呼梁亡而敬翔死不得為死節晉亡而皇甫遇死不得為死事吾豈無意哉梁之篡唐用翔之謀為多由子佐其父而弒其祖可乎其不戮於斧鉞為幸免矣方晉兵之降虜也士卒初不知及使解甲哭聲震天則降豈其欲哉使遇奮然攘臂而起殺重威於坐中雖不幸不免而見害猶為得其死矣其義烈豈不然哉既俯首聽命相與亡人之國矣雖死不能贖也豈足貴哉君子之於人或推以恕或責以備恕故遷善自新之路廣備則難得難得故可貴焉然知其所可恕與其所可貴豈不又難哉安彥威安彥威字國俊代州崞縣人也少以軍卒隸唐明宗麾下彥威善射頗知兵法明宗鎮天平宣武成德以彥威常為牙將以謹厚見信明宗入立皇子從榮鎮鄴彥威為護聖指揮使以從榮判六軍彥威遷捧聖指揮使領寧國軍節度使晉高祖入立拜彥威北京留守徙鎮歸德是時河決滑州命彥威塞之彥威出私錢募民治隄遷西京留守遭歲大飢彥威賑撫飢民民有犯法皆寬貸之飢民愛之不忍流去丁母憂哀毀過制出帝與契丹隳盟拜彥威北面行營副都統彥威悉以家財佐軍用以疾卒于京師彥威與安太妃同宗出帝事以為舅彥威未嘗以為言及卒太妃臨哭人始知同宗也當時益稱其慎重李瓊李瓊滄州饒安人也少為騎將與晉高祖隸唐明宗麾下同光二年契丹犯塞明宗出涿州遇契丹與戰不勝諸將各稍引去而晉高祖獨戰不已契丹漸合而圍之瓊引高祖衣與俱遁至劉李河而追兵且及瓊浮水先至南岸高祖至河中流馬踣瓊以長矛援出之又以所乘馬與高祖而步護之走十餘里乃得免明宗兵變于魏而南瓊從高祖以三百騎先趨汴州高祖為保義軍節度使以為牙隊指揮使高祖建國以為護聖都虞候賜與金帛甚厚而不與之官爵瓊亦鬱鬱久之拜相申二州刺史出帝時為棣州刺史楊光遠反以書招瓊瓊拒而不納遷洺州團練使又為護聖右廂都指揮使晉亡契丹入京師以瓊為威州刺史行至鄭州遇盜見殺劉景巖劉景巖延州人也其家素富能以資交遊豪俊事高萬金為部曲其後為丹州刺史晉高祖起兵太原唐廢帝調民七戶出一卒為義兵延州節度使楊漢章發鄉民赴京師將行景巖遣人激怒之義兵亂殺漢章迎景巖為留後晉高祖即位即拜景巖節度使景巖從事熊皎為人多智陰察景巖跋扈難制懼其有異心欲以利愚之因語景巖以謂邊地不可以久安為陳保名享利之策言邠涇多善田其利百倍宜多市田射利以自厚景巖信之歲餘其獲甚多景巖使皎朝京師皎乃言景巖不宜在邊可徙之內地乃移景巖邠州皎入拜補闕而景巖又徙鎮保義居未幾又徙武勝景巖乃悟皎為賣己遂誣奏皎隱己玉帶皎坐貶商州上津令皎懼景巖邀害之道亡匿山中開運三年景巖罷武勝以太子太師致仕居華州契丹犯京師以周密鎮延州景巖乃還故里而州人逐密立高允權允權妻劉氏景巖孫女子也景巖良田甲第僮僕甚盛黨項司家族畜牧近郊尤富強景巖與之往來允權頗患之允權妻歲時歸省景巖謂曰高郎一縣令而有此州其可保乎允權益惡之而心又利其田宅乃誣其反而殺之年八十餘長子行琮德州刺史罷留京師亦被誅次子行謙允權婦翁也為奏言非劉氏子遂免不誅
