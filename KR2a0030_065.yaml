body:
  text: 新五代史卷六十五南漢世家第五劉隱弟龑龑子玢玢弟晟晟子鋹劉隱其祖安仁上蔡人也後徙閩中商賈南海因家焉父謙為廣州牙將唐乾符五年黃巢攻破廣州去略湖湘間廣州表謙封州刺史賀江鎮遏使以禦梧桂以西歲餘有兵萬人戰艦百餘艘謙三子曰隱台巖謙卒廣州表隱代謙封州刺史乾寧中節度使劉崇龜死嗣薛王知柔代為帥行至湖南廣州將盧琚覃作亂知柔不敢進隱以封州兵攻殺琚迎知柔知柔辟隱行軍司馬其後徐彥若代知柔表隱節度副使委以軍政彥若卒軍中推隱為留後天祐二年拜隱節度使梁開平元年加檢校太尉兼侍中二年兼靜海軍節度安南都護三年加檢校太師兼中書令封南平王隱父子起封州遭世多故數有功於嶺南遂有南海隱復好賢士是時天下已亂中朝士人以嶺外最遠可以避地多遊焉唐世名臣謫死南方者往往有子孫或當時仕宦遭亂不得還者皆客嶺表王定保倪曙劉濬李衡周傑楊洞潛趙光裔之徒隱皆招禮之定保容管巡官曙唐太學博士濬崇望之子以避亂往衡德裕之孫唐右補闕以奉使往皆辟置幕府待以賓客傑善星曆唐司農少卿因避亂往隱數問以災變傑恥以星術事人常稱疾不起隱亦客之洞潛初為雍管巡官秩滿客南海隱常師事之後以為節度副使及龑僭號為陳吉凶禮法為國制度略有次序皆用此數人焉乾化元年進封隱南海王是歲卒年三十八弟龑立龑初名巖謙庶子也其母段氏生龑於外舍謙妻韋氏素妬聞之怒拔劍而出命持龑至將殺之及見而悸劍輒墮地良久曰此非常兒也後三日卒殺段氏養龑為己子及長善騎射身長七尺垂手過膝隱為行軍司馬龑亦辟薛王府咨議參軍隱鎮南海龑為副使隱卒龑代立乾化二年除清海節度使檢校太保同平章事三年加檢校太傅末帝即位悉以隱官爵授龑龑封南海王唐末南海最後亂僖宗以後大臣出鎮者天下皆亂無所之惟除南海而已自隱始亦自立是時交州曲皓桂州劉士政雍州葉廣略容州龐巨昭分據諸管盧光稠據虔州以攻嶺上其弟光睦據潮州子延昌據韶州高州刺史劉昌魯新州刺史劉潛及江東七十餘寨皆不能制隱攻韶州龑曰韶州所賴者光稠擊之虔人必應應則首尾受敵此不宜直攻而可以計取隱不聽果敗而歸因盡以兵事付龑龑悉平諸寨遂殺昌魯等更置剌史卒出兵攻敗盧氏取潮韶又西與馬殷爭容桂殷取桂管虜士政龑取容管逐巨昭又取雍管隱龑自梁初受封爵禀正朔而已貞明三年龑即皇帝位國號大越改元曰乾亨追尊安仁文皇帝謙聖武皇帝隱襄皇帝立三廟置百官以楊洞潛為兵部侍郎李衡禮部侍郎倪曙工部侍郎趙光胤兵部尚書皆平章事光胤自以唐甲族恥事僞國常怏怏思歸龑乃習為光胤手書遣使間道至洛陽召其二子損益並其家屬皆至光胤驚喜為盡心焉龑性聰悟而苛酷為刀鋸支解刳剔之刑每視殺人則不勝其喜不覺朵頤垂涎呀呷人以為真蛟蜃也又好奢侈悉聚南海珍寶以為玉堂珠殿二年祀天南郊大赦境內改國號漢龑初欲僭號憚王定保不從遣定保使荊南及還懼其非己使倪曙勞之告以建國定保曰建國當有制度吾入南門清海軍額猶在四方其不取笑乎龑笑曰吾備定保久矣而不思此宜其譏也三年冊越國夫人馬氏為皇后馬氏楚王殷女也四年春置選部貢舉放進士明經十餘人如唐故事歲以為常七年唐莊宗入汴龑懼遣宮苑使何詞入詢中國虛實稱大漢國主致書大唐皇帝詞還言唐必亂不足憂龑大喜又性好夸大嶺北商賈至南海者多召之使升宮殿示以珠玉之富自言家本咸秦恥王蠻夷呼唐天子為洛州刺史是歲雲南驃信鄭旻遣使致朱鬃白馬以求婚使者自稱皇親母弟清容布燮兼理賜金錦袍虎綾紋攀金裝刀封歸仁慶侯食邑一千戶持節鄭昭淳昭淳好學有文辭龑與游宴賦詩龑及羣臣皆不能逮遂以隱女增城縣主妻旻八年作南宮王定保獻南宮七奇賦以美之龑初名巖又更曰陟九年白龍見南宮三清殿改元曰白龍又更名龔以應龍見之祥有胡僧言讖書滅劉氏者龔也龑乃採周易飛龍在天之義為龑字音儼以名焉四年楚人以舟師攻封州封州兵敗於賀江龑懼以周易筮之遇大有遂赦境內改元曰大有遣將蘇章以神弩軍三千救封州章以兩鐵索沈賀江中為巨輪於岸上築隄以隱之因輕舟迎戰陽敗而奔楚人逐之章舉巨輪挽索鎖楚舟以彊弩夾江射之盡殺楚人三年遣將李守鄘梁克貞攻交趾擒曲承美等承美至南海龑登義鳳樓受俘謂承美曰公常以我為僞廷今反面縛何也承美頓首伏罪乃赦之承美皓子也克貞又攻占城掠其寶貨而歸四年愛州楊廷藝叛攻交州刺史李進進遁歸龑遣承旨程寶攻廷藝寶戰死五年封子耀樞雍王龜圖康王洪度秦王洪熙晉王洪昌越王洪弼齊王洪雅韶王洪澤鎮王洪操萬王洪杲循王洪暐息王洪邈高王洪簡同王洪建益王洪濟辨王洪道貴王洪昭宣王洪政通王洪益定王九年遣將軍孫德晟攻象州不克十年交州牙將皎公羡殺楊廷藝自立廷藝故將吳權攻交州公羡來乞師龑封洪操交王出兵白藤以攻之龑以兵駐海門權已殺公羡逆戰海口植鐵橛海中權兵乘潮而進洪操逐之潮退舟還轢橛者皆覆洪操戰死龑收餘衆而還十五年龑卒年五十四諡天皇大帝廟號高祖陵曰康陵子玢立玢初名洪度封秦王龑子耀樞龜圖皆早死玢次當立龑病臥寢中召右僕射王翻與語呼洪度洪熙小字曰壽俊雖長然皆不足任吾事惟洪昌類我吾欲立之奈何吾子孫不肖後世如鼠入牛角勢當漸小爾因泣下歔欷翻為龑謀出洪度以雍州洪熙容州然後立洪昌為太子議已定崇文使蕭益入問疾龑以告之益諫曰少者得立長者爭之禍始此矣由是洪度卒得立更名玢改元曰光天尊母趙昭儀為皇太妃以晉王洪熙輔政玢立果不能任事龑在殯召伶人作樂飲酒宮中裸男女以為樂或衣墨縗與倡女夜行出入民家由是山海間盜賊競起妖人張遇賢自稱中天八國王攻陷循州玢遣越王洪昌循王洪杲攻之遇賢圍洪昌等於錢帛館裨將萬景欣陳道庠力戰挾二王潰圍而走玢莫能省嶺東皆亂洪熙日益進聲妓誘玢為荒恣玢亦頗疑諸弟圖己敕宦官守宮門入者皆露索洪熙洪杲洪昌陰遣陳道庠養勇士劉思潮談令禋林少彊少良何昌廷等習為角抵以獻玢玢宴長春宮以閲之玢醉起道庠與思潮等隨至寢門拉殺之盡殺其左右玢立二年年二十四諡曰殤弟晟立晟初名洪熙封晉王既弒玢遂自立改元曰應乾以洪昌為兵馬元帥知政事洪杲副元帥劉思潮等封功臣晟既殺兄立不順懼衆不伏乃益峻刑法以威衆已而洪杲屢請討賊陰勸晟誅思潮等以止外議晟大怒使使者夜召洪杲洪杲知不免乃留使者入具沐浴詣佛前祝曰洪杲誤念來生王宮今見殺矣後世當生民家以免屠害涕泣與家人訣別然後赴召至則殺之冬晟祀天南郊改元曰乾和羣臣上尊號日大聖文武大明至道大光孝皇帝二年夏遣洪昌祠襄帝陵於海曲至昌華宮晟使盜刺殺之晟自殺洪杲由是與諸弟有隙而洪昌最賢龑素所欲立者晟尤忌之故先及害鎮王洪澤居雍州有善政是歲鳳皇見雍州晟怒使人鴆殺之而諸弟相次見殺三年殺其弟洪雅又殺劉思潮等五人思潮等死陳道庠懼不自安其友鄧伸以荀悅漢紀遺之道庠莫能曉伸罵曰憝獠韓信誅而彭越醢皆在此書矣道庠悟益懼晟聞之大怒以道庠伸下獄皆斬之於市夷其族以右僕射王翻為英州刺史使人殺之於路五年晟弟洪弼洪道洪益洪濟洪簡洪建洪暐洪昭同日皆見殺六年遣工部郎中知制誥鍾允章聘楚以求婚楚不許允章還晟曰馬公復能經略南土乎是時馬希廣新立希萼起兵武陵湖南大亂允章具言楚可攻之狀晟乃遣巨象指揮使吳珣內侍吳懷恩攻賀州已克之楚人來救珣鑿大穽於城下覆箔於上以土傳之楚兵迫城悉陷穽中死者數千楚人皆走珣等攻桂州及連宜嚴梧蒙五州皆克之掠全州而還九年冬又遣內侍潘崇徹攻郴州李景兵亦在與崇徹遇戰大敗景兵於宜章遂取郴州晟益得志遣巨艦指揮使暨彥贇以兵入海掠商人金帛作離官遊獵故時劉氏有南宮大明昌華甘泉玩華秀華玉清太微諸宮凡數百不可悉紀宦者林延遇宮人盧瓊仙內外專恣為殺戮晟不復省常夜飲大醉以瓜置伶人尚玉樓項拔劍斬之以試劍因並斬其首明日酒醒復召玉樓侍飲左右白已殺之晟歎息而已十年湖南王進逵以兵五萬率溪洞蠻攻郴州潘崇徹敗進逵於蠔石斬首萬餘級十一年晟病甚封其子繼興衛王璇興桂王慶興荊王保興祥王崇興梅王十二年晟親耕藉田交州吳昌濬遣使稱臣求節鉞昌濬者權子也權自龑時據交州龑遣洪操攻之洪操戰死遂棄不復攻權死子昌岌立昌岌卒弟昌濬立始稱臣於晟晟遣給事中李璵以旌節招之璵至白州濬使人止璵曰海賊為亂道路不通璵不果行晟殺其弟洪邈十三年又殺其弟洪政於是龑之諸子盡矣顯德三年世宗平江北晟始惶恐遣使修貢於京師為楚人所隔使者不得行晟憂形於色又嘗自言知星末年月食牛女間出書占之歎曰吾當之矣因為長夜之飲十六年卜葬域於城北運甓為壙晟親臨視之是秋卒年三十九諡曰文武光聖明孝皇帝廟號中宗陵曰昭陵子鋹立鋹初名繼興封衛王晟卒以長子立改元曰大寶晟性剛忌不能任臣下而獨任其嬖幸宦官宮婢延遇瓊仙等至鋹尤愚以謂羣臣皆自有家室顧子孫不能盡忠惟宦者親近可任遂委其政於宦者龔澄樞陳延壽等至其羣臣有欲用者皆閹然後用澄樞等既專政鋹乃與宮婢波斯女等淫戲後宮不復出省事延壽又引女巫樊胡子自言玉皇降胡子身鋹於內殿設帳幄陳寶貝胡子冠遠遊冠衣紫霞裾坐帳中宣禍福呼鋹為太子皇帝國事皆決於胡子盧瓊仙龔澄樞等爭附之胡子乃為鋹言澄樞等皆上天使來輔太子有罪不可問尚書左丞鍾允章參政事深嫉之數請誅宦官宦官皆仄目二年鋹祀天南郊前三日允章與禮官登壇四顧指麾宦者許彥真望見之曰此謀反爾乃拔劍升壇允章迎叱之彥真馳走告允章反鋹下允章獄遣禮部尚書薛用丕治之允章與用丕有舊因泣下曰吾今無罪自誣以死固無恨然吾二子皆幼不知父冤俟其長公可告之彥真聞之罵曰反賊欲使而子報仇邪復入白鋹並捕二子繫獄遂族誅之陳延壽謂鋹曰先帝所以得傳陛下者由盡殺羣弟也勸鋹稍誅去諸王鋹以為然殺其弟桂王璇興是歲建隆元年也鋹將邵廷琄言於鋹曰漢乘唐亂居此五十年幸中國有故干戈不及而漢益驕於無事今兵不識旗鼓而人主不知存亡夫天下亂久矣亂久而治自然之勢也今聞真主已出必將盡有海內其勢非一天下不能已勸鋹修兵為備不然悉珍寶奉中國遣使以通好鋹懵然莫以為慮惡廷琄言直深恨之四年芝菌生宮中野獸觸寢門苑中羊吐珠井旁石自立行百餘步而仆樊胡子皆以符瑞諷羣臣入賀五年鋹以宦者李托養女為貴妃專寵托為內太師居中專政許彥真既殺鍾允章惡龔澄樞等居己上謀殺之澄樞使人告彥真反族誅之七年王師南伐克郴州晟所遣將暨彥贇與刺史陸光圖皆戰死餘衆退保韶州鋹始思廷琄言遣廷琄以舟兵出洸口抗王師會王師退舍廷琄訓士卒修戰備嶺人倚以為良將有譖者投無名書言廷琄反鋹遣使者賜死士卒排軍門見使者訴廷琄無反狀不能救為立祠於洸口八年交州吳昌文卒其佐呂處玶與峯州刺史喬知祐爭立交趾大亂歡州丁璉舉兵擊破之鋹授璉交州節度九年南海民妻生子兩首四臂是時太祖皇帝詔李煜諭鋹使稱臣鋹怒囚煜使者龔慎儀十三年詔潭州防禦使潘美出師師次白霞鋹遣龔澄樞守賀州郭崇嶽守桂州李托守韶州以備是歲秋潘美平賀州十月平昭州又平桂州十一月平連州鋹喜曰昭桂連賀本屬湖南今北師取之足矣其不復南也其愚如此十二月平韶州開寶四年正月平英雄二州鋹將潘崇徹先降師次瀧頭鋹遣使請和求緩師二月師度馬徑鋹遣其右僕射蕭漼奉表降漼行鋹惶迫復令整兵拒命美等進師鋹遣其弟祥王保興率文武詣美軍降不納龔澄樞李托等謀曰北師之來利吾國寶貨爾焚為空城師不能駐當自還也乃盡焚其府庫宮殿鋹以海舶十餘悉載珍寶嬪御將入海宦官樂範竊其舟以逃歸師次白田鋹素衣白馬以降獻俘京師赦鋹為左千牛衛大將軍封恩赦侯其後事具國史隱興滅年世諸書皆同蓋自唐天祐二年隱為廣州節度使至皇朝開寶四年國滅凡六十七年舊五代史以梁貞明三年龑僭號為始故曰五十五年爾
