body:
  text: 新五代史卷十九周太祖家人傳第七皇后柴氏太祖一后三妃聖穆皇后柴氏邢州堯山人也與太祖同里遂以歸焉太祖微時喜飲博任俠不拘細行后常諫止之太祖狀貌奇偉后心知其貴人也事之甚謹及太祖即位后已先卒乃下詔故夫人柴氏追册為皇后諡曰聖穆淑妃楊氏淑妃楊氏鎮州真定人也父弘裕真定少尹妃幼以色選入趙王宮事王鎔鎔為張文禮所殺鎮州亂妃亦流寓民間後嫁里人石光輔居數年光輔死太祖柴夫人卒聞妃有色而賢遂娶之為繼室太祖方事漢高祖於太原天福中妃卒遂葬太原之近郊太祖即位廣順元年九月追册為淑妃拜妃弟廷璋為右飛龍使廷璋辭曰臣父老矣願以授之太祖曰吾方思之豈忘爾父邪即召弘裕弘裕老不能行乃就其家拜金紫光祿大夫真定少尹太祖崩葬嵩陵一后三妃皆當陪葬而太原未克世宗詔有司營嵩陵之側為虛墓以俟顯德元年世宗已敗劉旻於高平遂攻太原太原閉壁被圍乃遷妃喪而葬之貴妃張氏貴妃張氏鎮州真定人也祖記成德軍節度判官檢校兵部尚書父同芝事趙王王鎔為咨呈官官至檢校工部尚書鎔死鎮州亂莊宗遣幽州符存審以兵討張文禮裨將武從諫館於妃家見妃尚幼憐之而從諫家在太原遂以妃歸為其子婦久之太祖事漢高祖於太原楊夫人卒而武氏子亦卒乃納妃為繼室太祖貴纍封吳國夫人太祖以兵入京師漢遣劉銖戮其家妃與諸子皆死太祖即位追册為貴妃德妃董氏子侗信姪守願奉超遜德妃董氏鎮州靈壽人也祖文廣唐深州録事參軍父光嗣趙州昭慶尉妃幼穎悟始能言聞樂聲知其律呂年七歲鎮州亂其家失之為潞州牙將所得置諸褚中以歸潞將妻嘗生女輒不育得妃憐之養以為子過於所生居五六年妃家悲思其兄瑀求之人間莫知所在潞將仕于京師遇瑀欣然歸之年十三瑀以嫁里人劉進超進超亦仕晉為內職契丹犯闕進超歿于虜中妃嫠居洛陽漢高祖由太原入京師太祖從過洛陽聞妃有賢行聘之太祖建國中宮虛位遂册為德妃廣順三年卒年三十九妃兄三人瑀官至太子右贊善大夫玄之自明皆至刺史初帝舉兵于魏漢以兵圍帝第時張貴妃與諸子青哥意哥姪守筠奉超定哥皆被誅青哥意哥不知其母誰氏太祖即位詔故第二子青哥贈太尉賜名侗第三子意哥贈司空賜名信皇姪守筠贈左領軍衛將軍以筠聲近榮為世宗避更名守願奉超贈左監門衛將軍定哥贈左千牛衛將軍賜名遜世宗顯德四年夏四月癸未詔曰禮以緣情恩以悼往矧在友于之列尤鍾惻愴之情故皇弟贈太保侗贈司空信景運初啓大年不登俾豫終鮮實勤豫懷侗可贈太傅追封郯王信司徒嵵王又詔曰故皇從弟贈左領軍衛將軍守願贈左監門衛將軍奉超贈左千牛衛將軍遜等頃因季世不享遐齡每念非辜難忘有慟守願可贈左衛大將軍奉超右衛大將軍遜右武衛大將軍
