body:
  text: 新五代史卷四十五雜傳第三十三張全義張全義字國維濮州臨濮人也少以田家子役于縣縣令數困辱之全義因亡入黃巢賊中巢陷長安以全義為吏部尚書水運使巢賊敗去事諸葛爽于河陽爽死事其子仲方仲方為孫儒所逐全義與李罕之分據河陽洛陽以附于梁二人相得甚歡然罕之性貪暴日以寇鈔為事全義勤儉御軍有法督民耕殖以故罕之常乏食而全義常有餘罕之仰給全義全義不能給二人因有隙罕之出兵攻晉絳全義襲取河陽罕之奔晉晉遣兵助罕之圍全義甚急全義乞兵于梁梁遣牛存節丁會等以兵萬人自九鼎渡河擊敗罕之於沇水晉軍解去梁以丁會守河陽全義還為河南尹全義德梁出己由是盡心焉是時河南遭巢儒兵火之後城邑殘破戶不滿百全義披荊棘勸耕殖躬載酒食勞民畎畝之間築南北二城以居之數年人物完盛民甚賴之及梁太祖劫唐昭宗東遷繕理宮闕府廨倉庫皆全義之力也全義初名言唐昭宗賜名全義唐亡全義事梁又請改名太祖賜名宗奭太祖猜忌晚年尤甚全義奉事益謹卒以自免自梁與晉戰河北兵數敗亡全義輒搜卒伍鎧馬月獻之以補其缺太祖兵敗蓨縣道病還洛幸全義會節園避暑留旬日全義妻女皆迫淫之其子繼祚憤恥不自勝欲剚刃太祖全義止之曰吾為李罕之兵圍河陽啖木屑以為食惟有一馬欲殺以餉軍死在朝夕而梁兵出之得至今日此恩不可忘也繼祚乃止嘗有言全義於太祖者太祖召全義其意不測全義妻儲氏明敏有口辨遽入見厲聲曰宗奭種田叟爾守河南三十年開荒斸土捃拾財賦助陛下創業今年齒衰朽已無能為而陛下疑之何也太祖笑曰我無惡心嫗勿多言全義事梁纍拜中書令食邑至萬三千戶兼領忠武陝虢鄭滑河陽節度使判六軍諸衛事天下兵馬副元帥封魏王初全義為李罕之所敗其弟全武及其家屬為晉兵所得晉王給以田宅待之甚厚全義常陰遣人通問於太原及梁亡莊宗入汴全義自洛來朝泥首待罪莊宗勞之曰卿家弟姪幸復相見全義俯伏感涕年老不能進趨遣人掖扶而登宴犒盡歡命皇子繼岌皇弟存紀等皆兄事之全義因去梁所賜名請復其故名而全義猶不自安乃厚賂劉皇后以自託初梁末帝幸洛陽將祀天於南郊而不果其儀仗法物猶在全義因請幸洛陽白南郊儀物已具莊宗大悅加拜全義太師尚書令明年十一月莊宗幸洛陽南郊而禮物不具因改用來年二月然不以前語責全義以皇后故待之愈厚數幸其第命皇后拜全義為父改封齊王初莊宗滅梁欲掘梁太祖墓斫棺戮尸全義以謂梁雖仇敵今已屠滅其家足以報怨剖棺之戮非王者以大度示天下也莊宗以為然鏟去墓闕而已全義監軍嘗得李德裕平泉醒酒石德裕孫延古因託全義復求之監軍忿然曰自黃巢亂後洛陽園宅無復能守豈獨平泉一石哉全義嘗在巢賊中以為譏己因大怒奏笞殺監軍者天下冤之其聽訟以先訴者為直民頗以為苦同光四年趙在禮反於魏元行欽討賊無功莊宗欲自將討之大臣皆諫以為不可因言明宗可將是時郭崇韜朱友謙皆已見殺明宗自鎮州來朝處之私第莊宗疑之不欲遣也羣臣固請不從最後全義力以為言莊宗乃從已而明宗至魏果反全義以憂卒年七十五諡曰忠肅子繼祚官至上將軍晉高祖時與張從賓反於河陽當族誅而宰相桑維翰以其父珙嘗事全義有恩乞全活之不許止誅繼祚及其妻子而已朱友謙朱友謙字德光許州人也初名簡以卒隸澠池鎮有罪亡去為盜石濠三鄉之間商旅行路皆苦之久之去為陝州軍校陝州節度使王珙為人嚴酷與其弟珂爭河中戰敗其牙將李璠與友謙謀共殺珙附于梁太祖表璠代珙璠立友謙復以兵攻之璠得逃去梁太祖又表友謙代璠梁兵西攻李茂貞太祖往來過陝友謙奉事尤謹因請曰僕本無功而富貴至此元帥之力也且幸同姓願更名以齒諸子太祖益憐之乃更其名友謙録以為子太祖即位徙鎮河中纍遷中書令封冀王太祖遇弒友圭立加友謙侍中友謙雖受命而心常不平已而友圭使召友謙入覲友謙不行乃附于晉友圭遣招討使韓勍將康懷英等兵五萬擊友謙晉王出澤潞以救之遇懷英于解縣大敗之追至白徑嶺夜秉炬擊之懷英又敗梁兵乃解去友謙醉寢晉王帳中晉王視之顧左右曰冀王雖甚貴然恨其臂短耳末帝即位友謙復臣于梁而不絶晉也貞明六年友謙遣其子令德襲同州逐節度使程全暉因求兼鎮末帝初不許已而許之制命未至友謙復叛始絶梁而附晉矣末帝遣劉鄩等討之鄩為李存審所敗晉封友謙西平王加守太尉以其子令德為同州節度使莊宗滅梁入洛友謙來朝賜姓名曰李繼麟賜豫巨萬明年加守太師尚書令賜鐵券恕死罪以其子令德為遂州節度使令錫忠武軍節度使諸子及其將校為刺史者十餘人恩寵之盛時無與比是時宦官伶人用事多求賂于友謙友謙不能給而辭焉宦官伶人皆怒唐兵伐蜀友謙閲其精兵命其子令德將以從軍及郭崇韜見殺伶人景進言唐兵初出時友謙以為討己閲兵自備又言與崇韜謀反且曰崇韜所以反于蜀者以友謙為內應友謙見崇韜死諆與存乂為郭氏報冤莊宗初疑其事羣伶宦官日夜以為言友謙聞之大恐將入朝以自明將吏皆勸其毋行友謙曰郭公有大功於國而以讒死我不自明誰為我言者乃單車入朝景進使人詐為變書告友謙反莊宗惑之乃徙友謙義成軍節度使遣朱守殷夜以兵圍其館驅友謙出徽安門外殺之復其姓名詔魏王繼岌殺令德於遂州王思同殺令錫於許州夏魯奇族其家屬于河中魯奇至其家友謙妻張氏率其宗族二百餘口見魯奇曰朱氏宗族當死願無濫及平人乃別其婢僕百人以其族百口就刑張氏入室取其鐵券示魯奇曰此皇帝所賜也不知為何語魯奇亦為之慚友謙死其將史武等七人皆坐友謙族誅天下冤之袁象先袁象先宋州下邑人唐南陽王恕己之後也父敬初梁太府卿駙馬都尉尚太祖妹是為萬安大長公主象先以梁甥為宣武軍內外馬步軍都指揮使歷宿洺陳三州刺史太祖即位纍遷左龍武統軍在京馬步軍都指揮使太祖遇弒友圭立末帝留守東都以大事謀於趙巖巖曰此事如反掌耳但得招討楊令公一言諭禁軍則事可成末帝即遣人之魏州以謀告楊師厚師厚遣裨將王舜賢至洛陽與象先謀象先許諾是時龍驤軍將劉重遇戍于懷州以其軍作亂友圭遣霍彥威擊敗于鄢陵其餘兵奔散捕之甚急末帝即召龍驤軍在東京者告之曰上以重遇故欲盡召龍驤軍至洛而誅之乃僞為友圭詔書示之龍驤軍恐懼不知所為因告之曰友圭弒父與君天下之賊也爾能趨洛陽擒之以其首祭先帝則所謂轉禍而為福也軍士踴躍曰王言是也末帝即馳奏言龍驤軍反象先聞之即引禁軍千人入宮攻友圭友圭死末帝即位拜象先鎮南軍節度使同中書門下平章事開封尹判在京馬步軍諸軍事貞明四年為平盧軍節度使徙鎮宣武象先為梁將未嘗有戰功徒以甥故掌親軍及誅友圭有功於末帝在宋州十餘年誅斂其民積貨千萬莊宗滅梁象先來朝洛陽輦其資數十萬賂唐將相伶官宦者及劉皇后等由是內外翕然稱其為人莊宗待之甚厚賜姓名為李紹安改宣武軍為歸德軍曰歸德之名為卿設也遣之還鎮是歲卒年六十贈太師象先二子正辭官至刺史周世宗時為橫海軍節度使象先平生所積財産數千萬邸舍四千間其卒也不以分諸子而悉與正辭正辭初以父任為飛龍副使唐廢帝時獻錢五萬緡領衢州刺史晉高祖入立復獻五萬緡求為真刺史拜雄州刺史州在靈武之西吐蕃界中正辭憚不欲行復獻錢數萬乃得免正辭不勝其忿以衣帶自經其家人救之而止出帝時又獻錢三萬緡銀萬兩出帝憐之欲與一內郡未及而卒正辭積錢盈室室中嘗有聲如牛人以為妖勸其散積以禳之正辭曰吾聞物之有聲求其同類爾宜益以錢聲必止聞者傳以為笑朱漢賓朱漢賓字績臣亳州譙人也其父元禮為軍校從梁軍戰歿于清口漢賓為人有膽力梁太祖以其父死戰憐之以為養子是時梁方東攻兗鄆鄆州朱瑾募其軍中驍勇者黥雙鴈于其頰號鴈子都太祖聞之乃更選勇士數百人號落鴈都以漢賓為指揮使及漢賓貴人猶以為朱落鴈漢賓事梁為天威軍使歷磁滑宋亳曹五州刺史安遠軍節度使莊宗滅梁罷漢賓為右龍武統軍待之頗薄後莊宗因出遊幸其第漢賓妻有色而惠因侍左右進酒食奏歌舞莊宗歡甚留至夜漏二更而去漢賓自此有寵初漢賓在梁也與朱友謙俱為太祖養子而友謙年長漢賓以兄事之其後梁亡漢賓數寓書友謙友謙不答漢賓銜之其後友謙見族人皆以為漢賓有力明宗入立以漢賓為莊宗所厚惡之以為右衛上將軍安重誨用事漢賓依附之相為婚姻由是復得為昭義軍節度使重誨死漢賓罷為上將軍遂以太子少保致仕漢賓為將未嘗有戰功而臨政能守法好施惠人頗愛之清泰二年卒年六十四晉高祖時贈太子少傅諡曰貞惠段凝段凝開封人也初名明遠後更名凝為澠池主簿其父事梁太祖以事坐徙後凝棄官亦事太祖為軍巡使又以其妹內太祖妹有色後為美人凝為人憸巧善窺迎人意又以妹故太祖漸親信之常使監諸軍為懷州刺史梁太祖北征過懷州凝獻饋甚豐太祖大悅過相州相州刺史李思安獻饋如常禮比凝為薄太祖怒思安因以得罪死遷凝鄭州刺史使監兵於河上李振亟請罷之太祖曰凝未有罪振曰待其有罪則社稷亡矣然終不罷也莊宗已下魏博與梁相距河上梁以王彥章為招討使凝為副是時末帝昏亂小人趙巖張漢傑等用事凝依附巖等為姦彥章為招討使三日用奇計破唐德勝南城而凝與彥章各自上其功巖等從中匿彥章功狀悉歸其功於凝凝因納金巖等求代彥章末帝惑巖等言卒以凝為招討使軍于王村是時唐已下鄆州凝乃自酸棗決河東注鄆以隔絶唐軍號護駕水莊宗自鄆趨汴汴兵悉已屬凝京師無備乃遣張漢倫馳馹召凝于河上漢倫中道墜馬傷不能進已而梁亡凝率精兵五萬降唐莊宗賜以錦袍御馬明日凝奏故梁姦人趙巖張漢傑等十餘人侮弄權柄殘害生靈請皆族之凝出入唐朝無愧色見唐將相若倡優因伶人景進納賂劉皇后以求恩寵莊宗甚親愛之賜姓名曰李紹欽以為泰寧軍節度使居月餘用庫錢數十萬有司請責其償莊宗釋之郭崇韜固請以為不可莊宗怒曰朕為卿所制都不自由終釋之莊宗遣李紹宏監諸將備契丹凝軍瓦橋關以諂事紹宏紹宏數薦凝可大用郭崇韜每以為不可遷武勝軍節度使趙在禮反紹宏請以凝招討莊宗使凝條奏方略凝所請偏裨皆其故黨莊宗疑之乃止明宗即位勒歸田里明年長流遼州賜死劉劉汴州雍丘人也世為宣武軍牙將梁太祖鎮宣武以軍卒補隊長稍以戰功遷牙將為襄州都指揮使山南節度使王班為亂軍所殺亂軍推為留後僞許之明日饗士于庭伏甲幕中酒半擒為亂者殺之會梁遣陳暉兵亦至襄州平以功拜復州刺史徙亳安二州末帝時為晉州觀察留後凡八年日與晉人交戰莊宗滅梁來朝莊宗勞之曰劉侯亡恙爾居晉陽之南鄙久矣不早相聞今日見訪不其晚邪頓首謝罪遣還鎮遂以為節度使徙鎮安遠天成元年以史敬鎔代之還京師未至拜武勝軍節度使以疾卒于道中贈侍中周知裕周知裕字好問幽州人也為劉仁恭騎將仁恭為其子守光所囚知裕去事守光兄守文守光又攻殺守文乃與張萬進立守文子延祚而事之守光又殺延祚以其子繼威代之萬進殺繼威與知裕俱奔于梁梁太祖得知裕喜甚為置歸化軍以知裕為指揮使凡與晉戰所得及兵背晉而歸梁者皆以隸知裕梁晉相拒河上十餘年其摧堅陷陳歸化一軍為最然知裕位不過刺史莊宗入汴知裕與段凝軍河上聞梁已亡欲自殺為賓客故人止之乃降唐莊宗尤寵待之諸將嫉其寵因獵射之知裕走以免莊宗為殺射者以知裕為房州刺史明宗時歷絳淄二州刺史遷宿州團練使安州留後所居皆有善政安州近淮俗惡病者父母有疾置之他室以竹竿繫飲食委之至死不近知裕深患之加以教道由是稍革罷為右神武統軍應順中卒贈太傅陸思鐸陸思鐸澶州臨黃人也少事梁為宣武軍卒以善射知名纍遷拱辰左廂都指揮使領恩州刺史梁晉相拒河上思鐸鏤其姓名於箭筈以射晉軍而矢中莊宗馬鞍莊宗拔矢見思鐸姓名奇之其後滅梁思鐸謁見莊宗出其矢以示之思鐸伏地請死莊宗慰而起之拜龍武右廂都指揮使晉高祖時為陳蔡二州刺史卒年五十四思鐸在陳州有善政臨終戒其子曰陳人愛我我死則葬焉遂葬于陳州
