body:
  text: 新五代史卷三十四一行傳第二十二嗚呼五代之亂極矣傳所謂天地閉賢人隱之時歟當此之時臣弒其君子弒其父而搢紳之士安其祿而立其朝充然無復廉恥之色者皆是也吾以謂自古忠臣義士多出於亂世而怪當時可道者何少也豈果無其人哉雖曰干戈興學校廢而禮義衰風俗隳壞至於如此然自古天下未嘗無人也吾意必有潔身自負之士嫉世遠去而不可見者自古材賢有韞于中而不見于外或窮居陋巷委身草莽雖顏子之行不遇仲尼而名不彰況世變多故而君子道消之時乎吾又以謂必有負材能修節義而沉淪于下泯沒而無聞者求之傳記而亂世崩離文字殘缺不可復得然僅得者四五人而已處乎山林而羣麋鹿雖不足以為中道然與其食人之祿俯首而包羞孰若無愧於心放身而自得吾得二人焉曰鄭遨張薦明勢利不屈其心去就不違其義吾得一人焉曰石昂苟利於君以忠獲罪而何必自明有至死而不言者此古之義士也吾得一人焉曰程福贇五代之亂君不君臣不臣父不父子不子至於兄弟夫婦人倫之際無不大壞而天理幾乎其滅矣於此之時能以孝悌自修於一鄉而風行於天下者猶或有之然其事迹不著而無可紀次獨其名氏或因見於書者吾亦不敢沒而其略可録者吾得一人焉曰李自倫作一行傳鄭遨張薦明附鄭遨字雲叟滑州白馬人也唐明宗祖廟諱遨故世行其字遨少好學敏於文辭唐昭宗時舉進士不中見天下已亂有拂衣遠去之意欲攜其妻子與俱隱其妻不從遨乃入少室山為道士其妻數以書勸遨還家輒投之於火後聞其妻子卒一慟而止遨與李振故善振後事梁貴顯欲以祿遨遨不顧後振得罪南竄遨徒步千里往省之由是聞者益高其行其後遨聞華山有五粒松脂淪入地千歲化為藥能去三尸因徙居華陰欲求之與道士李道殷羅隱之友善世目以為三高士遨種田隱之賣藥以自給道殷有釣魚術鈎而不餌又能化石為金遨嘗驗其信然而不之求也節度使劉遂凝數以寶貨遺之遨一不受唐明宗時以左拾遺晉高祖時以諫議大夫召之皆不起即賜號為逍遙先生天福四年卒年七十四遨之節高矣遭亂世不樜於榮利至棄妻子不顧而去豈非與世自絶而篤愛其身者歟然遨好飲酒奕時時為詩章落人間人間多寫以縑素相贈遺以為寶至或圖寫其形玩于屋壁其迹雖遠而其名愈彰與乎石門荷蓧之徒異矣與遨同時張薦明者燕人也少以儒學遊河朔後去為道士通老子莊周之説高祖召見問道家可以治國乎對曰道也者妙萬物而為言得其極者尸居袵席之間可以治天地也高祖大其言延入內殿講道德經拜以為師薦明聞宮中奏時鼓曰陛下聞鼓乎其聲一而已五音十二律鼓無一焉然和之者鼓也夫一萬事之本也能守一者可以治天下高祖善之賜號通玄先生後不知其所終石昂石昂青州臨淄人也家有書數千卷喜延四方之士士無遠近多就昂學問食其門下者或纍歲昂未嘗有怠色而昂不求仕進節度使符習高其行召以為臨淄令習入朝京師監軍楊彥朗知留後事昂以公事至府上謁贊者以彥朗諱石更其姓曰右昂趨于庭仰責彥朗曰內侍奈何以私害公昂姓石非右也彥朗大怒拂衣起去昂即趨出解官還于家語其子曰吾本不欲仕亂世果為刑人所辱子孫其以我為戒昂父亦好學平生不喜佛説父死昂於柩前誦尚書曰此吾先人之所欲聞也禁其家不可以佛事樜吾先人晉高祖時詔天下求孝悌之士戶部尚書王權宗正卿石光贊國子祭酒田敏兵部侍郎王延等相與詣東上閣門上昂行義可以應詔詔昂至京師召見便殿以為宗正丞遷少卿出帝即位晉政日壞昂數上疏極諫不聽乃稱疾東歸以壽終于家昂既去而晉室大亂程福贇程福贇者不知其世家為人沉厚寡言而有勇少為軍卒以戰功纍遷洺州團練使晉出帝時為奉國右廂都指揮使開運中契丹入寇出帝北征奉國軍士乘間夜縱火焚營欲因以為亂福贇身自救火被傷火滅而亂者不得發福贇以為契丹且大至而天子在軍京師虛空不宜以小故動搖人聽因匿其事不以聞軍將李殷位次福贇下利其去而代之因誣福贇與亂者同謀不然何以不奏出帝下福贇獄人皆以為冤福贇終不自辨以見殺李自倫李自倫者深州人也天福四年正月尚書戶部奏深州司功參軍李自倫六世同居奉敕準格按格孝義旌表必先加按驗孝者復其終身義門仍加旌表得本州審到鄉老程言等稱自倫高祖訓訓生粲粲生則則生忠忠生自倫自倫生光厚六世同居不妄敕以所居飛鳧鄉為孝義鄉匡聖里為仁和里準式旌表門閭九月丙子戶部復奏前登州義門王仲昭六世同居其旌表有聽事步欄前列屏樹烏頭正門閥閲一丈二尺烏頭二柱端冒以瓦桶築雙闕一丈在烏頭之南三丈七尺夾樹槐柳十有五步請如之敕曰此故事也令式無之其量地之宜高其外門門安綽楔左右建臺高一丈二尺廣狹方正稱焉圬以白而赤其四角使不孝不義者見之可以悛心而易行焉
