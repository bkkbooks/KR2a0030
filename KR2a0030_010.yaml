body:
  text: 新五代史卷十漢本紀第十高祖睿文聖武昭肅孝皇帝姓劉氏初名知遠其先沙陀部人也其後世居于太原知遠弱不好弄嚴重寡言面紫色目多白睛凜如也與晉高祖俱事明宗為偏將明宗及梁人戰德勝晉高祖馬甲斷梁兵幾及知遠以所乘馬授之復取高祖馬殿而還高祖德之高祖留守北京知遠為押衙潞王從珂反愍帝出奔高祖自鎮州朝京師遇愍帝于衛州止傳舍知遠遣勇士石敢袖鐵槌侍高祖以虞變高祖與愍帝議事未決左右欲兵之知遠擁高祖入室敢與左右格鬬而死知遠即率兵盡殺愍帝左右留帝傳舍而去廢帝入立高祖復鎮河東已而有隙高祖將舉兵知遠與桑維翰密為高祖謀畫贊成之高祖即位於太原以知遠為侍衛親軍都虞候領保義軍節度使契丹耶律德光送高祖至潞州臨決指知遠曰此都軍甚操剌無大故勿棄之世俗謂勇猛為操剌録其本語天福二年遷侍衛馬步軍都指揮使領忠武軍節度使已而以杜重威代知遠領忠武徙知遠領歸德知遠恥與重威同制杜門不出高祖怒欲罷其兵職宰相趙瑩以為不可高祖乃遣端明殿學士和凝就第宣諭知遠乃受命五年徙鄴都留守九月朝京師高祖幸其第六年拜河東節度使北京留守七年高祖崩知遠從高祖起太原有佐命功自出帝立與契丹絶盟用兵北方常疑知遠勳位已高幸晉多故而有異志每優尊之拜中書令封太原王幽州道行營招討使又拜北面行營都統開運二年四月封北平王三年五月加守太尉然王未嘗出兵契丹寇澶州別遣偉王攻鴈門敗之于秀容八月殺吐渾白承福等族取其資巨萬良馬數千四年契丹犯京師出帝北遷王遣牙將王峻奉表契丹耶律德光呼之為兒賜以木拐虜法貴之如中國几杖非優大臣不可得峻持拐歸虜人望之皆避道峻還為王言契丹必不能有中國乃議建國二月戊辰河東行軍司馬張彥威等上箋勸進辛未皇帝即位稱天福十二年磁州賊首梁暉取相州來歸武節都指揮使史弘肇取代州殺其刺史王暉晉州將藥可儔殺其守將駱從朗及括錢使諫議大夫趙熙來歸辛巳陝州留後趙暉潞州留後王守恩來歸天福晉高祖年號也天福止八年改元開運至此四年矣漢雖建國而未有國號又稱晉年號捨開運而追續天福為十二年初無義理但書其實爾變來降曰來歸哀斯人也是時天下無主得其主則往歸之與乎叛于彼而來於此者異矣漢高祖非有德之君惶惶斯人之無所歸者猶得而歸也故曰歸三月丙戌朔蠲河東雜稅辛卯延州軍亂逐其節度使周密壬辰丹州指揮使高彥詢以其州來歸壬寅契丹遁以其將蕭翰為宣武軍節度使守汴州聞漢起太原畏而去故與自去異其文遁者退避之稱夏四月己未右都押衙楊邠為樞密使蕃漢兵馬都孔目官郭威權樞密副使契丹陷相州殺梁暉癸亥立魏國夫人李氏為皇后甲子河東節度判官蘇逢吉觀察推官蘇禹圭為中書侍郎同中書門下平章事乙丑侍衛親軍步軍都指揮使史弘肇取潞州戊辰奉國指揮使武行德以河陽來歸史弘肇取澤州丙子契丹耶律德光卒于欒城契丹入于鎮州五月甲午太原尹劉崇為北京留守丙申如東京蕭翰遁歸于契丹以郇國公李從益知南朝軍國事戊申次絳州刺史李從朗來歸六月丙辰次河陽殺李從益及其母于京師甲子至自太原戊辰改國號漢赦罪人蠲民稅于闐遣使者來高祖初建國無國號蓋其制詔皆無明文故闕不書然稱天福十二年則國仍號晉可知但無明據故慎於所疑爾此書改國號漢則未改之前宜有所稱此可以推知也是夏劉昫薨秋閏七月乙丑禁造契丹服器天雄軍節度使杜重威反天平軍節度使高行周為鄴都行營都部署以討之庚辰追尊祖考為皇帝妣為皇后高祖湍諡曰明元廟號文祖祖妣李氏諡曰明貞曾祖昂諡曰恭僖廟號德祖祖妣楊氏諡曰恭惠祖僎諡曰昭憲廟號翼祖祖妣李氏諡曰昭穆考琠諡曰章聖廟號顯祖妣安氏諡曰章懿以漢高皇帝為高祖光武皇帝為世祖皆不祧杜重威於晉出帝時避出帝名去重至漢而復之八月護聖指揮使白再榮逐契丹以鎮州來歸丙申安國軍節度使薛懷讓殺契丹之將劉鐸入于邢州九月甲戌吏部尚書竇貞固守司空兼門下侍郎翰林學士中書舍人李濤為中書侍郎同中書門下平章事庚辰北征冬十月甲申次韋城赦河北十一月壬申杜重威降十二月癸巳至自鄴都乾祐元年春正月乙卯大赦改元己未更名皓丁丑皇帝崩于萬歲殿年五十四隱帝高祖第二子承祐也高祖即位拜右衛上將軍大內都點檢魏王承訓長而賢高祖愛之方屬以為嗣承訓薨高祖不豫悲哀疾劇乃以承祐屬諸將相宰相蘇逢吉曰皇子承祐未封王請亟封之未及封而高祖崩祕不發喪殺杜重威乾祐元年二月辛巳封承祐周王是日皇帝即位于柩前壬辰右衛大將軍鳳翔巡檢使王景崇及蜀人戰于大散關敗之癸巳大赦三月壬戌竇貞固為大行皇帝山陵使吏部侍郎段希堯為副太常卿張昭為禮儀使兵部侍郎盧價為鹵簿使御史中丞邊蔚為儀仗使丁丑李濤罷護國軍節度使李守貞反陷潼關夏四月辛巳陝州兵馬都監王玉克潼關壬午永興軍將趙思綰叛附于李守貞客省使王峻帥師屯于關西楊邠為中書侍郎兼吏部尚書同中書門下平章事郭威為樞密使鎮寧軍節度使郭從義為永興軍兵馬都部署戊子保義軍節度使白文珂為河中兵馬都部署河決原武峻不命為將又不令討賊但令以兵實關西下文乃見命將五月己未回鶻遣使者來乙亥魏州內黃民武進妻一産三男子河決滑州魚池旱蝗秋七月戊申朔彰德軍節度使王繼弘殺其判官張易鸜鵒食蝗丙辰禁捕鸜鵒庚申郭威同中書門下平章事癸亥契丹鄚州刺史王彥徽來奔庚午殺成德軍副使張鵬乙亥王景崇叛附于李守貞八月壬午郭威討李守貞九月西面行營都虞候尚弘遷及趙思綰戰敗績冬十月甲申吐蕃使斯漫篤藺氈藥斯來十一月甲寅殺太子太傅李嵩滅其族壬申葬睿文聖武昭肅孝皇帝于睿陵在河南告成縣十二月己卯彰武軍節度使高允權殺太子太師致仕劉景巖二年春正月乙巳朔赦囚隱帝即位至此宜改元而不改元具周顯德二年注而帝名承祐年名乾祐舉國臣民共稱而不改避當時莫大之失本紀無譏者但書其實後世自見也二月丙子蠲民紐配租夏五月李守貞之將周光遜降乙丑趙思綰降六月辛卯回鶻首領楊彥珣來西涼府遣使者來蝗秋七月丁巳郭威殺華州留後趙思綰于京兆甲子克河中守貞自焚死故不書伏誅八月郭從義殺前永興巡檢喬守溫丙戌郭威使來獻俘冬十月契丹寇趙魏羣臣進添都馬契丹陷內丘己丑郭威及宣徽南院使王峻伐契丹十一月契丹遁三年春正月西面行營都部署趙暉克鳳翔丙午郭威進添都馬壬子趙暉獻馘俘景崇自焚死故不書伏誅二月甲戌旌表潁州汝陰民麴溫門閭三月己酉寒食望祭于南御園夏四月壬午郭威以樞密使為天雄軍節度六月癸卯河決原武秋八月達靼來附冬十一月丙子殺楊邠及侍衛親軍都指揮使史弘肇三司使王章皆滅其族郭威反庚辰義成軍節度使宋延渥叛附于威壬午威犯封丘泰寧軍節度使慕容彥超軍于七里店癸未勞軍于北郊甲申勞軍于劉子陂慕容彥超及郭威戰敗績開封尹侯益叛降于威郭允明反乙酉皇帝崩蘇逢吉自殺漢亡年二十周廣順元年葬之許州陽翟縣號潁陵為賊所葬故不書自隱帝崩後四十二日周太祖始即位而斷自帝崩書漢亡者見帝而漢崩亡矣其太后臨朝湘陰公嗣立皆周所假託非誠實所以破其姦故書曰漢亡見周之立遲也遲而難於自立則猶有自愧之心焉嗚呼人君即位稱元年常事爾古不以為重也孔子未修春秋其前固已如此雖暴君昏主妄庸之史其記事先後遠近莫不以歲月一二數之乃理之自然也其謂一為元亦未嘗有法蓋古人之語爾及後世曲學之士始謂孔子書元年為春秋大法遂以改元為重事古謂歲之一月亦不云一而曰正月國語言六呂曰元間大呂周易列六爻曰初九大抵古人言數多不云一不獨謂年為元也自漢以後又名年以建元而正僞紛雜稱號遂多不勝其紀也五代亂世也其事無法而不合於理者多矣皆不足道也至其年號乖錯以惑後世則不可以不明梁太祖以乾化二年遇弒明年末帝已誅友圭黜其鳳曆之號復稱乾化三年尚為有說至漢高祖建國黜晉出帝開運四年復稱天福十二年者何哉蓋以其愛憎之私爾方出帝時漢高祖居太原常憤憤下視晉而晉亦陽優禮之幸而未見其隙及契丹滅晉漢未嘗有赴難之意出帝已北遷方陽以兵聲言追之至土門而還及其即位改元而黜開運之號則其用心可知矣蓋其於出帝無復君臣之義而幸禍以為利者其素志也可勝歎哉夫所謂有諸中必形於外者其見於是乎
