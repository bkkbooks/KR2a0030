body:
  text: 新五代史卷二十一梁臣傳第九嗚呼孟子謂春秋無義戰豫亦以謂五代無全臣無者非無一人蓋僅有之耳余得死節之士三人焉其仕不及于二代者各以其國繫之作梁唐晉漢周臣傳其餘仕非一代不可以國繫之者作雜傳夫入于雜誠君子之所羞而一代之臣未必皆可貴也覽者詳其善惡焉敬翔敬翔字子振同州馮翊人也自言唐平陽王暉之後少好學工書檄乾符中舉進士不中乃客大梁翔同里人王發為汴州觀察支使遂往依焉久之發無所薦引翔客益窘為人作箋刺傳之軍中太祖素不知書翔所作皆俚俗語太祖愛之謂發曰聞君有故人可與俱來翔見太祖太祖問曰聞子讀春秋春秋所記何等事翔曰諸侯爭戰之事耳太祖曰其用兵之法可以為吾用乎翔曰兵者應變出奇以取勝春秋古法不可用於今太祖大喜補以軍職非其所好乃以為館驛巡官太祖與蔡人戰汴郊翔時時為太祖謀畫多中太祖欣然以謂得翔之晚動靜輒以問之太祖奉昭宗自岐還長安昭宗召翔與李振升延喜樓勞之拜太府卿初太祖常侍殿上昭宗意衛兵有能擒之者乃佯為鞋結解以顧太祖太祖跪而結之而左右無敢動者太祖流汗浹背由此稀復進見昭宗遷洛陽宴崇勳殿酒半起使人召太祖入內殿將有所託太祖益懼辭以疾昭宗曰卿不欲來可使敬翔來太祖遽麾翔出亦佯醉去太祖已破趙匡凝取荊襄遂攻淮南翔切諫以謂新勝之兵宜持重以養威太祖不聽兵出光州遭大雨幾不得進進攻壽州不克而多所亡失太祖始大悔恨歸而忿躁殺唐大臣幾盡然益以翔為可信任梁之篡弒翔之謀為多太祖即位以唐樞密院故用宦者乃改為崇政院以翔為使遷兵部尚書金鑾殿大學士翔為人深沉有大略從太祖用兵三十餘年細大之務必關之翔亦盡心勤勞晝夜不寐自言惟馬上乃得休息而太祖剛暴難近有所不可翔亦未嘗顯言微開其端太祖意悟多為之改易太祖破徐州得時溥寵姬劉氏愛幸之劉氏故尚讓妻也乃以妻翔翔已貴劉氏猶侍太祖出入臥內如平時翔頗患之劉氏誚翔曰爾以我嘗失身於賊乎尚讓黃家宰相時溥國之忠臣以卿門地猶為辱我請從此訣矣翔以太祖故謝而止之劉氏車服驕侈別置典謁交結藩鎮權貴往往附之寵信言事不下於翔當時貴家往往效之太祖崩友圭立以翔先帝謀臣懼其圖己不欲翔居內職乃以李振代翔為崇政使拜翔中書侍郎同中書門下平章事翔以友圭畏己多稱疾未嘗省事末帝即位趙巖等用事頗離間舊臣翔愈鬱鬱不得志其後梁盡失河北與晉相拒楊劉翔曰故時河朔半在以先帝之武御貔虎之臣猶不得志於晉今晉日益強梁日益削陛下處深宮之中所與計事者非其近習則皆親戚之私而望成事乎臣聞晉攻楊劉李亞子負薪渡水為士卒先陛下委蛇守文以儒雅自喜而遣賀瓌為將豈足當彼之餘鋒乎臣雖憊矣受國恩深若其乏材願得自效巖等以翔為怨言遂不用其後王彥章敗于中都末帝懼召段凝於河上是時梁精兵悉在凝軍凝有異志顧望不來末帝遽呼翔曰朕居常忽卿言今急矣勿以為懟卿其教我當安歸翔曰臣從先帝三十餘年今雖為相實朱氏老奴爾事陛下如郎君以臣之心敢有所隱陛下初用段凝臣已爭之今凝不來敵勢已迫欲為陛下謀則小人間之必不見聽請先死不忍見宗廟之亡君臣相向慟哭翔與李振俱為太祖所信任莊宗入汴詔赦梁羣臣李振喜謂翔曰有詔洗滌將朝新君邀翔欲俱入見翔夜止高頭車坊將旦左右報曰崇政李公入朝矣翔歎曰李振謬為丈夫矣復何面目入梁建國門乎乃自經而卒朱珍李唐賓附朱珍徐州豐人也少與龐師古等俱從梁太祖為盜珍為將善治軍選士太祖初鎮宣武珍為太祖創立軍制選將練兵甚有法太祖得諸將所募兵及他降兵皆以屬珍珍選將五十餘人皆可用梁敗黃巢破秦宗權東並兗鄆未嘗不在戰中而常勇出諸將太祖與晉王東逐黃巢還過汴館之上源驛太祖使珍夜以兵攻之晉王亡去珍悉殺其麾下兵義成軍亂逐安師儒師儒奔梁太祖遣珍以兵趨滑州道遇大雪珍趣兵疾馳一夕至城下遂乘其城義成軍以為方雪不意梁兵來不為備遂下之秦宗權遣盧瑭張晊等攻梁是時梁兵尚少數為宗權所困太祖乃拜珍淄州刺史募兵於淄青珍偏將張仁遇白珍曰軍中有犯令者請先斬而後白珍曰偏將欲專殺邪立斬仁遇以徇軍軍中皆感悅珍得所募兵萬餘以歸太祖大喜曰賊在吾郊若踐吾麥奈何今珍至吾事濟矣且賊方息兵養勇度吾兵少而未知珍來謂吾不過堅守而已宜出其不意以擊之乃出兵擊敗晊等宗權由此敗亡而梁軍威大振以得珍兵故也珍從太祖攻朱宣取曹州執其刺史丘弘禮又取濮州刺史朱裕奔于鄆州太祖乃還汴留珍攻鄆州珍去鄆二十里遣精兵挑之鄆人不出朱裕詐為降書陰使人召珍約開門為內應珍信之夜率其兵叩鄆城門朱裕登陴開門內珍軍珍軍已入甕城而垂門發鄆人從城上磔石以投之珍軍皆死甕城中珍僅以身免太祖不之責也魏博軍亂囚樂彥貞太祖遣珍救魏珍破黎陽臨河李固分遣聶金范居實等略澶州殺魏豹子軍二千於臨黃珍威振河朔魏人殺彥貞珍乃還梁攻徐州遣珍先攻下豐縣又敗時溥於吳康與李唐賓等屯蕭縣唐賓者陝人也初為尚讓偏將與太祖戰尉氏門為太祖所敗唐賓乃降梁梁兵攻掠四方唐賓常與珍俱與珍威名略等而驍勇過之珍戰每小却唐賓佐之乃大勝珍嘗私迎其家置軍中太祖疑珍有異志遣唐賓伺察之珍與唐賓不協唐賓不能忍夜走還宣武珍單騎追之交訴太祖前太祖兩惜其材為和解之珍屯蕭縣聞太祖將至戒軍中治館以待唐賓部將嚴郊治失期軍吏督之郊訴于唐賓唐賓以讓珍珍怒拔劍而起唐賓拂衣就珍珍即斬之遣使者告唐賓反使者晨至梁敬翔恐太祖暴怒不可測乃匿使者至夜而見之謂雖有所發必須明旦冀得少緩其事而圖之既夕乃引珍使者入見太祖大驚然已夜矣不能有所發翔因從容為太祖畫明日佯收唐賓妻子下獄因如珍軍去蕭一舍珍迎謁太祖命武士執之諸將霍存等十餘人叩頭救珍太祖大怒舉胡牀擲之曰方珍殺唐賓時獨不救之邪存等退珍遂縊死龐師古龐師古曹州南華人也初名從梁太祖鎮宣武初得馬五百匹為騎兵乃以師古將之從破黃巢秦宗權皆有功太祖攻時溥未下留兵屬師古守之師古取其宿遷進屯呂梁溥以兵二萬出戰師古敗之斬首二千級孫儒逐楊行密取揚州淮南大亂太祖遣師古渡淮攻儒為儒所敗是時朱珍李唐賓已死師古與霍存分將其兵郴王友裕攻徐州朱瑾以兵救時溥友裕敗溥於石佛山瑾收餘兵去太祖以友裕可追而不追奪其兵以屬師古師古攻破徐州斬溥太祖表師古徐州留後梁兵攻鄆州臨濟水師古徹木為橋夜以中軍先濟朱宣走中都見殺太祖已下兗鄆乃遣師古與葛從周攻楊行密于淮南師古出清口從周出安豐師古自其微時事太祖為人謹甚未嘗離左右及為將出兵必受方略以行軍中非太祖命不妄動師古營清口地勢卑或請就高為柵師古以非太祖命不聽淮人決水浸之請者告曰淮人決河上流水至矣師古以為搖動士卒立斬之已而水至兵不能戰遂見殺嗚呼兵之勝敗豈易言哉梁兵強於天下而吳人號為輕弱然師古再舉擊吳輒再敗以死其後太祖自將出光山攻壽春然亦敗也蓋自高駢死唐以梁兼統淮南遂與孫楊爭凡三十年間三舉而三敗以至強遭至弱而如此此其不可以理得也兵法固有以寡而敗衆以弱而勝強者顧吳豈足以知之哉豈非適與其機會邪故曰兵者凶器戰者危事也可不慎哉葛從周葛從周字通美濮州甄城人也少從黃巢敗降梁從太祖攻蔡州太祖墜馬從周扶太祖復騎與敵步鬬傷面身被數瘡偏將張延壽從旁擊之從周得與太祖俱去太祖盡黜諸將獨用從周延壽為大將秦宗權掠地潁亳及梁兵戰于焦夷從周獲其將王涓一人從朱珍收兵淄青遇東兵輒戰珍得兵歸從周功為多張全義襲李罕之於河陽罕之奔晉召晉兵以攻全義全義乞兵於梁太祖遣從周丁會等救之敗晉兵於沇河潞州馮霸殺晉守將李克恭以降梁太祖遣從周入潞州晉兵攻之從周不能守走河陽太祖攻魏從周與丁會先下黎陽臨河會太祖於內黃敗魏兵於永定橋從丁會攻宿州以水浸其城遂破之太祖攻朱瑾于兗州未下留從周圍之瑾閉壁不出從周詐言救兵至陽避之高吳夜半潛還城下瑾以謂從周已去乃出兵收外壕從周掩擊之殺千餘人晉攻魏魏人求救太祖遣侯言救魏言築壘于洹水太祖怒言不出戰遣從周代言從周至軍益閉壘不出而鑿三暗門以待晉兵攻之從周以精兵自暗門出擊敗晉王兵晉王怒自將擊從周從周雖大敗而梁兵擒其子落落送于魏斬之遂徙攻鄆州擒朱宣於中都又攻兗州走朱瑾太祖表從周兗州留後以兗鄆兵攻淮南出安豐會龐師古于清口從周行至濠州聞師古死遽還至卑河將渡而淮兵追之從周亦大敗是時晉兵出山東攻相衛太祖遣從周略地山東下洺州斬其刺史邢善益又下邢州走其刺史馬師素又下磁州殺其刺史袁奉滔五日而下三州太祖乃表從周兼邢州留後劉仁恭攻魏已屠貝州羅紹威求救于梁從周會太祖救魏入于魏州燕兵攻館陶門從周以五百騎出戰曰大敵在前何可返顧使閉門而後戰破其八柵燕兵走追至臨清擁之御河溺死者甚衆太祖以從周為宣義行軍司馬太祖遣從周攻劉守文于滄州以蔣暉監其軍守文求救于其父仁恭仁恭以燕兵救之暉語諸將曰吾王以我監諸將今燕兵來不可迎戰宜縱其入城聚食倉廩使兩困而後取之諸將頗以為然從周怒曰兵在上將豈監軍所得言且暉之言乃常談爾勝敗之機在吾心暉豈足以知之乃勒兵逆仁恭于乾寧戰于老餢堤仁恭大敗斬首三萬餘級獲其將馬慎交等百餘人馬三千匹是時守文亦求救於晉晉為攻邢洺以牽之從周遽還敗晉兵于青山遂從太祖攻鎮州下臨城王鎔乞盟太祖表從周泰寧軍節度使從氏叔琮攻晉太原不克梁兵西攻鳳翔青州王師範遣其將劉襲兗州從周家屬為所得厚遇之而不殺太祖還自鳳翔乃遣從周攻從周卒招降太祖即位拜左金吾衛上將軍以疾致仕拜右衛上將軍居于偃師末帝即位拜昭義軍節度使陳留郡王食其俸于家卒贈太尉霍存霍存洺州曲周人也少從黃巢巢敗存乃降梁存為將驍勇善騎射秦宗權攻汴存以三千人夜破張晊柵又以騎兵破秦賢殺三千人敗晊於赤岡從朱珍掠淄青龐師古攻時溥皆有功朱珍與李唐賓俱死乃以龐師古代珍存代唐賓以攻溥破碭山存獲其將石君和等五十人梁攻宿州葛從周引水浸之丁會與存戰城下遂下之從攻潞州與晉人遇戰馬牢川存入則當其前出則為其殿晉人却遂東攻魏取淇門殺三千人梁得曹州太祖以存為刺史兼諸軍都指揮使梁攻鄆州朱瑾來救梁諸將或勸太祖縱瑾入鄆耗其食堅圍勿戰以此可俱弊太祖曰瑾來必與時溥俱不若遣存邀之存伏兵蕭縣已而瑾果與溥俱出迷離存發伏擊之遂敗瑾等於石佛山存中流矢卒太祖已即位閲騎兵於繁臺顧諸將曰使霍存在豈勞吾親閲邪諸君寧復思之乎他日語又如此張存敬張存敬譙郡人也為人剛直有膽勇少事梁太祖為將善因危窘出奇計李罕之與晉人攻張全義於河陽太祖遣存敬與丁會等救之罕之解圍去太祖以存敬為諸軍都虞候太祖攻徐兗以存敬為行營都指揮使從葛從周攻滄州敗劉仁恭於老餢堤還攻王鎔於鎮州入其城中取其馬牛萬計遷宋州刺史復從諸將攻幽州存敬取其瀛莫祁景四州梁攻定州與王處直戰懷德驛大敗之枕尸十餘里梁已下鎮定乃遣存敬攻王珂于河中存敬出含山下晉絳二州珂降于梁太祖表存敬護國軍留後復徙宋州刺史未至卒于河中贈太傅存敬子仁潁仁願仁願有孝行存敬卒事其兄仁潁出必告反必面如事父之禮仁願曉法令事梁唐晉常為大理卿卒贈祕書監符道昭符道昭蔡州人也為秦宗權騎將宗權敗道昭流落無所依後依鳳翔李茂貞茂貞愛之養以為子名繼遠梁攻茂貞道昭與梁兵戰屢敗乃歸梁太祖表道昭秦州節度使以亂不果行太祖為元帥初開府而李周彝以鄜州降以為左司馬擇右司馬難其人及得道昭乃授之羅紹威將誅其牙兵惡魏兵強未敢發求梁為助太祖乃悉發魏兵使攻燕而遣馬嗣勳助紹威誅牙兵牙兵已誅魏兵在外者聞之皆亂魏將左行遷據歷亭史仁遇據高唐以叛道昭等從太祖悉破之道昭為將勇於犯敵而少成算每戰先發多敗而周彝等繼之乃勝開平元年與康懷英等攻潞州築夾城為蚰蜒塹以圍之逾年不能下晉兵攻破夾城道昭戰死劉捍劉捍開封人也為人明敏有威儀善擯贊太祖初鎮宣武以為客將使從朱珍募兵淄青太祖北攻鎮州與王鎔和遣捍見鎔鎔軍未知梁意方嚴兵捍馳一騎入城中諭鎔以太祖意鎔乃聽命梁兵攻定州降王處直捍復以一騎入慰城中太祖圍鳳翔遣捍入見李茂貞計事唐昭宗召見問梁軍中事稱旨賜以錦袍拜登州刺史賜號迎鑾毅勇功臣梁兵攻淮南遣捍先之淮口築馬頭下浮橋以渡梁兵太祖出光山攻壽州又使捍作浮橋于淮北以渡歸師拜宋州刺史太祖即位遷左天武指揮使元從親軍都虞候左龍虎統軍出為佑國軍留後同州劉知俊反以賂誘捍將吏執捍而去知俊械之送于李茂貞見殺太祖哀之贈捍太傅寇彥卿寇彥卿字俊臣開封人也世事宣武軍為牙將太祖初就鎮以為通引官纍遷右長直都指揮使領洺州刺史羅紹威將誅牙軍太祖遣彥卿之魏計事彥卿陰為紹威計畫乃悉誅牙軍彥卿身長八尺隆準方面語音如鍾工騎射好書史善伺太祖意動作皆如旨太祖嘗曰敬翔劉捍寇彥卿皆天為我生之其愛之如此賜以所乘愛馬一丈烏太祖圍鳳翔以彥卿為都排陳使彥卿乘烏馳突陳前太祖目之曰真神將也初太祖與崔胤謀欲遷都洛陽而昭宗不許其後昭宗奔于鳳翔太祖以兵圍之昭宗既出明年太祖以兵至河中遣彥卿奉表迫請遷都彥卿因悉驅徙長安居人以東皆拆屋為浮渭而下道路號哭仰天大罵曰國賊崔胤朱溫使我至此昭宗亦顧瞻陵廟傍徨不忍去謂其左右為俚語云紇干山頭凍死雀何不飛去生處樂相與泣下沾襟昭宗行至華州遣人告太祖以何皇后有娠願留華州待冬而行太祖大怒顧彥卿曰汝往趣官家來不可一日留也彥卿復馳至華即日迫昭宗上道太祖即位拜彥卿感化軍節度使歲餘召為左金吾衛大將軍充金吾街仗使彥卿晨朝至天津橋民梁現不避道前驅捽現投橋上石欄以死彥卿見太祖自首太祖惜之詔彥卿以錢償現家以贖罪御史司憲崔沂劾奏彥卿請論如法太祖不得已責授彥卿左衛中郎將復拜相州防禦使遷河陽節度使太祖遇弒彥卿出太祖畫像事之如生嘗對客語先朝必涕泗交下末帝即位徙鎮威勝彥卿明敏善事人而怙寵作威好誅殺多猜忌卒于鎮年五十七
