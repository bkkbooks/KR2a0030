body:
  text: 新五代史卷六十三前蜀世家第三王建子衍王建字光圖許州舞陽人也隆眉廣顙狀貌偉然少無賴以屠牛盜驢販私鹽為事里人謂之賊王八後為忠武軍卒稍遷隊將黃巢陷長安僖宗在蜀忠武軍將鹿晏弘以兵八千屬楊復光討賊巢敗走復光以其兵為八都都將千人建與晏弘皆為一都頭復光死晏弘率八都西迎僖宗于蜀所過剽略行至興元逐節度使牛叢自稱留後僖宗即以晏弘為節度使晏弘以建等八都頭皆領屬州刺史已而晏弘擁衆東歸陷陳許建與晉暉韓建張造李師泰等各率一都西奔于蜀僖宗得之大喜號隨駕五都以屬十軍觀軍容使田令孜令孜以建等為養子僖宗還長安使建與晉暉等將神策軍宿衞光啟元年河中王重榮與令孜爭鹽池重榮召晉兵犯京師僖宗幸鳳翔二年三月移幸興元以建為清道使負玉璽以從行至當塗驛李昌符焚棧道棧道幾斷建控僖宗馬冒煙燄中過宿坂下僖宗枕建膝寢既覺涕泣解御衣賜之僖宗已至興元令孜以謂天子播越由己致之懼且得罪西川節度使陳敬瑄令孜同母弟也令孜因求為西川監軍楊復恭代為軍容使復恭出建為壁州刺史建乃招集亡命及谿洞夷落有衆八千以攻閬州執其刺史楊行遷又攻利州利州刺史王珙棄城走敬瑄患之以問令孜令孜曰王八吾兒也以一介召之可置麾下乃使人招建東川顧彥朗與建有舊建聞令孜召己大喜因至梓州謂彥朗曰十軍阿父召我我欲至成都見陳公以求一鎮即以其家屬託彥朗選精兵二千馳之成都行至鹿頭關敬瑄悔召建使人止之建大怒擊破鹿頭關取漢州彥朗聞之出兵助建軍于學射敬瑄遣將句惟立逆建建擊敗之遂攻彭州敬瑄遣眉州刺史山行章將兵五萬屯新繁建又擊敗之虜獲萬餘人橫屍四十里敬瑄發兵七萬益行章與建相持濛陽新都百餘日昭宗遣左諫議大夫李洵為兩川宣諭和協使詔彥朗等罷兵彥朗請以大臣鎮蜀因為建求旌節文德元年六月以宰相韋昭度為西川節度使分邛蜀黎雅為永平軍拜建節度使敬瑄不受代昭宗即命昭度將彥朗等兵討之昭宗以建為招討牙內都指揮使久之不克建謂昭度曰公以數萬之衆困兩川之人而師久無功奈何且唐室多故東方諸鎮兵接都畿公當歸相天子靜中原以固根本此蠻夷之國不足以留公昭度遲疑未決建遣軍士擒昭度親吏於軍門臠而食之建入白曰軍士飢須此為食爾昭度大恐即留符節與建而東昭度已去建即以兵扼劍門兩川由是阻絕山行章屯廣都建擊敗之行章走眉州以州降建建引兵攻成都而資簡戎茂嘉邛諸州皆殺刺史降建建攻成都甚急田令孜登城呼建曰老夫與公相厚何嫌而至此建曰軍容父子之恩心何可忘然兵討不受代者天子命也令孜夜入建軍以節度觀察牌印授建明日敬瑄開門迎建建將入城以張勍為都虞候戒其軍士曰吾以張勍為虞候矣汝等無犯其令幸勍執而見我我尚活汝使其殺而後白吾亦不能詰也建入城軍士剽略勍殺百人而止後建遷敬瑄于雅州使人殺之復以令孜為監軍既而亦殺之大順二年十月唐以建為檢校司徒成都尹劍南西川節度副大使知節度事管內觀察處置雲南八國招撫等使東川顧彥朗卒其弟彥暉立唐遣宦者宗道弼賜彥暉東川旌節綿州刺史常厚執道弼以攻梓州建遣李簡王宗滌等討厚自彥朗死建欲圖幷東川而未有以發及李簡等討厚戒曰兵已破厚彥暉必出犒師即與俱來無煩吾再舉也簡等擊厚敗之鍾陽厚走還綿州以唐旌節還道弼而出之彥暉已得節辭疾不出犒軍乾寧二年建遣王宗滌攻之十二月宗滌敗彥暉於楸林斬其將羅璋遂圍梓州三年五月昭宗遣宦者袁易簡詔建罷兵建收兵還成都黔南節度使王肇以其地降于建四年宗滌復攻東川別遣王宗侃宗阮等出峽取渝瀘州五月建自將攻東川昭宗遣諫議大夫李洵判官韋莊宣諭兩川詔建罷兵建不奉詔乃責授建南州刺史以郯王為鳳翔節度使李茂貞代建為西川節度使茂貞拒命乃復建官爵冬十月建攻破梓州彥暉自殺彥暉將顧彥瑤顧城已危謂諸將吏曰事公當生死以之指其所佩賓鐵劍曰事急而有叛者當齒此劍及城將破彥瑤與彥暉召集將吏飲酒遂與之俱死建以王宗滌為東川留後唐即以宗滌為節度使於是幷有兩川之地是時鳳翔李茂貞兼據梁洋秦隴數以兵侵建天復元年梁太祖兵誅宦者宦者韓全誨等劫天子幸鳳翔梁兵圍之茂貞閉城拒守經年力窘求與梁和建間遣人聘茂貞許以出兵為援勸其堅壁勿和遣王宗滌將兵五萬聲言迎駕以攻興元執其節度使李繼業而武定節度使拓拔思敬遂以其地降于建於是幷有山南西道是時荊南成汭死襄州趙匡凝遣其弟匡明襲據之建乘其間攻下夔施忠萬四州三年八月唐封建蜀王四年唐遷都洛陽改元天祐建與唐隔絕而不知故仍稱天復六年又取歸州於是并有三峽七年梁滅唐遣使者諭建建拒而不納建因馳檄四方會兵討梁四方知其非誠實皆不應是歲正月巨人見青城山六月鳳凰見萬歲縣黃龍見嘉陽江而諸州皆言甘露白鹿白雀龜龍之瑞秋九月己亥建乃即皇帝位封其諸子為王以王宗佶為中書令韋莊為左散騎常侍判中書門下之事唐襲為樞密使鄭騫為御史中丞張格王鍇皆為翰林學士周博雅為成都尹蜀恃險而富當唐之末士人多欲依建以避亂建雖起盜賊而為人多智詐善待士故其僭號所用皆唐名臣世族莊見素之孫格濬之子也建謂左右曰吾為神策軍將時宿衞禁中見天子夜召學士出入無間恩禮親厚如寮友非將相可比也故建待格等恩禮尤異其餘宋玭等百餘人並見信用武成元年正月祀天南郊大赦改元以王宗佶為太師宗佶本姓甘氏建為忠武軍卒時掠得之養以為子後以軍功累遷武信軍節度使後建所生子元懿等稍長宗佶以養子心不自安與鄭騫等謀求為大司馬總六軍開元帥府凡軍事便宜行而後聞建以宗佶創業功多優容之唐襲本以舞僮見幸於建宗佶尤易之後為樞密使猶名呼襲襲雖內恨而外奉宗佶愈謹建聞之怒曰宗佶名呼我樞密使是將反也宗佶求大司馬章三上建以問襲襲因激怒建曰宗佶功臣其威望可以服人心陛下宜即與之建心益疑宗佶入奏事自請不已建叱衞士撲殺之幷賜騫死六月以遂王宗懿為皇太子建加尊號英武睿聖皇帝七月騶虞見武定二年頒永昌曆廣都嘉禾合穗三年八月有龍五十見洵陽水中十月麟見壁州十二月大赦改明年為永平元年岐王李茂貞自為梁所圍而山南入于蜀地狹勢孤遂與建和以其子娶建女因求山南故地建怒不與以王宗侃為北路都統宗佑宗賀唐襲為三面招討使以攻岐戰于青泥宗侃敗績退保西縣為茂貞兵所圍建自將擊之岐兵敗解去建至興元而還加尊號曰英武睿聖光孝皇帝二年又加號曰英武睿聖神功文德光孝皇帝初田令孜之為監軍也盜唐傳國璽入于蜀而埋之二月尚食使歐陽柔治令孜故第穿地而得之以獻五月梁遣光祿卿盧玭來聘推建為兄其印文曰大梁入蜀之印宰相張格曰唐故事奉使四夷其印曰大唐入某國之印今梁已兄事陛下奈何卑我如夷狄建怒欲殺梁使者格曰此梁有司之過爾不可以絕兩國之懽已而梁太祖崩建遣將作監李紘弔之遂刻其印文曰大蜀入梁之印劍州木連理六月麟見文州十二月黃龍見富義江三年正月麟見永泰五月騶虞見壁山有二鹿隨之秋七月皇太子元膺殺太子少保唐襲元膺建次子也初名宗懿後更名宗坦建得銅牌子于什仿有文二十餘字建以為符讖因取之以名諸子故又更曰元膺元膺為人猳喙齲齒多材藝能射錢中孔嘗自抱畫毬擲馬上馳而射之無不中年十七為皇太子判六軍創天武神機營開永和府置官屬建以元膺年少任重以記事戒之令一切學朕所為則可以保國又命道士廣成先生杜光庭為之師唐襲建之嬖也元膺易之屢謔于朝建懼其交惡乃罷襲樞密使出為興元節度使已而襲罷歸元膺廷疏其過失建益不悅是月七夕元膺召諸王大臣置酒而集王宗翰樞密使潘峭翰林學士毛文錫不至元膺怒曰集王不來峭與文錫教之耳明日元膺白建峭及文錫離間語建怒將罪之元膺出而襲入建以問之襲曰太子謀作亂欲召諸將諸王以兵錮之然後舉事爾建疑之襲請召營兵入衞元膺初不為備聞襲召兵以為誅己乃與伶人安悉香軍將喻全殊率天武兵自衞遣人擒峭及文錫而笞之幽於其家召大將徐瑤常謙率兵出拒襲與襲戰神武門襲中流矢墜馬死建遣王宗賀以兵討之元膺兵敗皆潰去元膺匿躍龍池檻中明日出而丐食蜀人識之以告建遣宗翰招諭之宗翰未至為衞兵所殺建乃立其幼子鄭王宗衍為太子白龍見邛州江四年荊南高季昌侵蜀巫山遣嘉王宗壽敗之于瞿唐八月殺黔南節度使王宗訓冬南蠻攻掠界上建遣夔王宗範擊敗之于大渡河麟見昌州五年起壽昌殿於龍興宮畫建像於壁又起扶天閣畫諸功臣像十一月大火焚其宮室遣王宗儔等攻岐取其秦鳳階成四州至大散關梁叛將劉知俊在岐於是特以其族來通正元年遣王宗綰等率兵十二萬出大散關攻岐取隴州八月起文思殿以清資五品正員官購羣書以實之以內樞密使毛文錫為文思殿大學士黃龍見大昌池十月大赦改明年元曰天漢國號漢天漢元年殺劉知俊十二月大赦改明年元曰光天復國號蜀光天元年六月建卒年七十二建晚年多內寵賢妃徐氏與妹淑妃皆以色進專房用事交結宦者唐文扆等干與外政建年老昏耄文扆判六軍事無大小皆決文扆及建疾以兵入宿衞謀盡去建故將故將聞建疾皆不得入見久之宗弼等排闥入言文扆欲為變乃殺之建因以老將大臣多許昌故人必不為太子用思擇人未得而疾亟乃以宦者宋光嗣為樞密使判六軍而建卒太子立去宗名衍衍字化源建十一子曰衞王宗仁簡王元膺趙王宗紀豳王宗輅韓王宗智莒王宗特信王宗傑魯王宗鼎興王宗澤薛王宗平而鄭王宗衍最幼其母徐賢妃也以母寵得立為皇太子開崇賢府置官屬後更曰天策府衍為人方頤大口垂手過膝顧目見耳頗知學問能為浮豔之辭元膺死建以豳王宗輅貌類己而信王宗傑於諸子最材賢欲於兩人擇立之而徐妃專寵建老昏耄妃與宦者唐文扆教相者上言衍相最貴又諷宰相張格贊成之衍由是得為太子建卒衍立謚建曰神武聖文孝德明惠皇帝廟號高祖陵曰永陵建正室周氏號昭聖皇后後建數日而卒衍因尊其母徐氏為皇太后后妹淑妃為皇太妃太后太妃以教令賣官自刺史以下每一官闕必數人並爭而入錢多者得之通都大邑起邸店以奪民利衍年少荒淫委其政於宦者宋光嗣光葆景潤澄王承休歐陽晃田魯儔等以韓昭潘在迎顧在珣嚴旭等為狎客起宣華苑有重光太清延昌會真之殿清和迎仙之宮降真蓬萊丹霞之亭飛鸞之閣瑞獸之門又作怡神亭與諸狎客婦人日夜酣飲其中嘗以九日宴宣華苑嘉王宗壽以社稷為言言發泣涕韓昭等曰嘉王酒悲爾諸狎客共以慢言謔嘲之坐上諠然衍不能省也蜀人富而喜遨當王氏晚年俗競為小帽僅覆其頂俛首即墮謂之危腦帽衍以為不祥禁之而衍好戴大帽每微服出遊民間民間以大帽識之因令國中皆戴大帽又好裹尖巾其狀如錐而後宮皆戴金蓮花冠衣道士服酒酣免冠其髻髽然更施朱粉號醉塟國中之人皆効之嘗與太后太妃游青城山宮人衣服皆畫雲霞飄然望之若仙衍自作甘州曲述其仙狀上下山谷衍常自歌而使宮人皆和之衍立之明年改元乾德乾德元年正月祀天南郊大赦加尊號為聖德明孝皇帝二年冬北巡至于西縣旌旗戈甲連亙百餘里其還也自閬州浮江而上龍舟畫舸照耀江水所在供億人不堪命三年正月還成都五年起上清宮塑王子晉像尊以為聖祖至道玉宸皇帝又塑建及衍像侍立於其左右又於正殿塑玄元皇帝及唐諸帝備法駕而朝之六年以王承休為天雄節度使天雄軍秦州也承休以宦者得幸為宣徽使承休妻嚴氏有絕色衍通之是時唐莊宗滅梁蜀人皆懼莊宗遣李嚴聘蜀衍與俱朝上清而蜀都士庶簾帷珠翠夾道不絕嚴見其人物富盛而衍驕淫歸乃獻策伐蜀明年唐魏王繼岌郭崇韜伐蜀是歲衍改元曰咸康衍自立歲常獵于子來山是歲又幸彭州陽平化漢州三學山以王承休妻嚴氏故十月幸秦州羣臣切諫衍不聽行至梓潼大風發屋拔木太史曰此貪狼風也當有敗軍殺將者衍不省衍至緜谷而唐師入其境衍懼遽還唐師所至州縣皆迎降衍留王宗弼守緜谷遣王宗勳宗儼宗昱率兵以拒唐師宗勳等至三泉望風退走衍詔宗弼誅宗勳等宗弼反與宗勳等合謀送款於唐師衍自緜谷還成都百官及後宮迎謁七里亭衍雜宮人作回鶻隊以入明日御文明殿與其羣臣相對涕泣而宗弼亦自緜谷馳歸登太玄門收成都尹韓昭宦者宋光嗣景潤澄歐陽晃等殺之函首送于繼岌衍即上表乞降宗弼遷衍于天啟宮魏王繼岌至成都衍君臣面縛輿櫬出降于七里亭莊宗召衍入洛賜衍詔曰固當列土而封必不薄人于險三辰在上一言不欺衍捧詔忻然就道率其宗族及偽宰相王鍇張格庾傳素許寂翰林學士李旻等及諸將佐家族數千人以東同光四年四月行至秦川驛莊宗用伶人景進計遣宦者向延嗣誅其族衍母徐氏臨刑呼曰吾兒以一國迎降反以為戮信義俱棄吾知其禍不旋踵矣衍妾劉氏鬒髮如雲而有色行刑者將免之劉氏曰家國喪亡義不受辱遂就死宗弼本姓魏名弘夫建錄為養子建攻顧彥暉宗弼常以建語泄之彥暉者彥暉敗建待之如初建病且卒宗弼守太師兼中書令判六軍輔政衍已降宗弼以蜀珍寶奉魏王及郭崇韜求為西川節度使魏王曰此我家物也何用獻為居數日為崇韜所殺宗壽許州民家子也建以同姓錄之為子宗壽好學工琴奕為人恬退喜道家之術事建時為鎮江軍節度使衍既立宗壽為太子太保奉朝請以鍊丹養氣自娛衍為淫亂獨宗壽常切諫之後為武信軍節度使唐師伐蜀所在迎降魏王嘗以書招之獨宗壽不降聞衍已銜璧大慟從衍東遷至岐陽以賂賂守者得入見衍衍泣下霑襟曰早從王言豈有今日衍死宗壽走澠池聞莊宗遇弒亡入熊耳山天成二年出詣京師上書求衍宗族葬之明宗嘉其忠以為保義軍行軍司馬封衍順正公許以諸侯禮葬之宗壽得王氏十八喪葬之長安南三趙村嗚呼自秦漢以來學者多言祥瑞雖有善辨之士不能祛其惑也予讀蜀書至於龜龍麟鳳騶虞之類世所謂王者之嘉瑞莫不畢出於其國異哉然考王氏之所以興亡成敗者可以知之矣或以為一王氏不足以當之則視時天下治亂可以知之矣龍之為物也以不見為神以升雲行天為得志今偃然暴露其形是不神也不上于天而下見於水中是失職也然其一何多歟可以為妖矣鳳凰鳥之遠人者也昔舜治天下政成而民悅命夔作樂樂聲和鳥獸聞之皆鼓舞當是之時鳳凰適至舜之史因幷記以為美後世因以鳳來為有道之應其後鳳凰數至或出於庸君繆政之時或出於危亡大亂之際是果為瑞哉麟獸之遠人者也昔魯哀公出獵得之而不識蓋索而獲之非其自出也故孔子書於春秋曰西狩獲麟者譏之也西狩非其遠也獲麟惡其盡取也狩必書地而哀公馳騁所涉地多不可徧以名舉故書西以包衆地謂其舉國之西皆至也麟人罕識之獸也以見公之窮山竭澤而盡取至於不識之獸皆搜索而獲之故曰譏之也聖人已沒而異端之說興乃以麟為王者之瑞而附以符命讖緯詭怪之言鳳嘗出於舜以為瑞猶有說也及其後出於亂世則可以知其非瑞矣若麟者前有治世如堯舜禹湯文武周公之世未嘗一出其一出而當亂世然則孰知其為瑞哉龜玄物也污泥川澤不可勝數其死而貴於卜官者用適有宜爾而戴氏禮以其在宮沼為王者難致之瑞戴禮雜出於諸家其失亦以多矣騶虞吾不知其何物也詩曰吁嗟乎騶虞賈誼以謂騶者文王之囿虞虞官也當誼之時其說如此然則以之為獸者其出於近世之說乎夫破人之惑者難與爭於篤信之時待其有所疑焉然後從而攻之可也麟鳳龜龍王者之瑞而出於五代之際又皆萃于蜀此雖好為祥瑞之說者亦可疑也因其可疑者而攻之庶幾惑者有以思焉據前蜀書運曆圖九國志皆云建以唐大順二年入成都為西川節度使天復七年九月建號明年正月改元武成今以為定惟舊五代史云龍紀元年入成都天祐五年建號改元者繆也至後唐同光三年蜀滅則諸書皆同自大順二年至同光三年凡三十五年
