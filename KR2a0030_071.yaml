body:
  text: 新五代史卷七十一十國世家年譜第十一嗚呼堯舜盛矣三代之王功有餘而德不足故皆更始以自新由是改正朔矣至於後世遂名年以建元及僭竊交興而稱號紛雜則不可以不別也五代十國稱帝改元者七吳越荊楚常行中國年號然予聞於故老謂吳越亦嘗稱帝改元而求其事迹不可得頗疑吳越後自諱之及旁采閩楚南漢諸國之書與吳越往來者多矣皆無稱帝之事獨得其封落星石為寶石山制書稱寶正六年辛卯則知其嘗改元矣辛卯長興二年乃鏐之末世也然不見其終始所因故不得而備列錢氏訖五代嘗外尊中國豈其張軌之比乎十國皆非中國有也其稱帝改元與不未足較其得失故並列之作十國世家年譜或問十國固非中國有也然猶命以封爵而稱中國年號來朝貢者亦有之矣本紀之不書何也曰封爵之不書所以見其非中國有也其朝貢之來如夷狄以夷狄書之則甚矣問者曰四夷十國皆非中國之有也四夷之封爵朝貢則書而十國之不書何也曰以中國而視夷狄夷狄之可也以五代之君而視十國夷狄之則未可也故十國之封爵朝貢不如夷狄則無以書之書如夷狄則五代之君未可以夷狄之也是以外而不書見其自絕於中國焉爾問者曰外而不書則東漢之立何以書曰吾於東漢常異其辭於九國也春秋因亂世而立治法本紀以治法而正亂君世亂則疑難之事多正疑處難敢不慎也周漢之事可謂難矣哉或謂劉旻嘗致書于周求其子贇不得而後自立然則旻之志不以忘漢為讎而以失子為讎也曰漢嘗詔立贇為嗣則贇為漢之國君不獨為旻子也旻之大義宜不為周屈其立雖未必是而義當不屈于周此其可以異乎九國矣終旻之世猶稱乾祐至承鈞立然後改元則旻之志豈不可哀也哉十國年世惟楚閩東漢三國諸家之說不同而互有得失最難考正今略其諸說而正其是者庶幾博覽者不惑而一以年譜為正也馬氏據湖湘故事九國志運歷圖並云殷以長興元年卒是歲子希聲立長興三年卒而五代舊史殷列傳云殷長興二年卒享年七十八子希聲立不周歲而卒明宗本紀長興元年書希聲除節度使起復三年八月又書希聲卒今據九國志殷以大中六年歲在壬申生享年七十九蓋自大中壬申至長興元年庚寅實七十九年為得其實而希聲據湖湘故事九國志運歷圖皆以三年卒與明宗本紀皆合不疑惟舊史書殷卒二年及年七十八希聲立不周歲卒為繆爾希萼希崇之亂南唐盡遷馬氏之族歸于金陵五代舊史云時廣順元年也而運歷圖云乾祐二年馬氏滅者繆也初殷入湖南掘地得石讖云龍起頭猪掉尾蓋殷以乾寧三年歲在丙辰自立於湖南至廣順元年辛亥而滅九國志以乾祐三年為辛亥湖湘故事以顯德元年為辛亥者皆繆也惟五代舊史得其實王氏世次曰潮曰審知曰延翰曰鏻曰昶曰曦曰延政凡七主而潮以唐景福元年歲在壬子始入福州至開運三年丙午而滅實五十五年當云七主五十五年為得其實而運歷圖云五十六年九國志五代舊史紀年通譜閩中實錄閩王列傳皆云七主六十年者皆繆也審知五代舊史本傳云同光元年十二月卒九國志亦云同光元年卒運歷圖同光三年卒今檢五代舊史莊宗本紀同光二年五月丙午審知加檢校太師守中書令豈得卒於元年也又至四年二月庚子福建副使王延翰奏稱權知軍府事三月辛亥遂除延翰威武軍節度使以此推之審知卒當在同光三年十二月蓋閩去京師遠明年二月延翰之奏始至京師理當然也又據閩王列傳九國志皆云審知在位二十九年審知以唐乾寧四年嗣位是歲丁巳至同光三年乙酉實二十九年則運歷圖為是而舊史九國志云元年卒者則繆也鏻本名延鈞五代舊史本傳云在位十二年九國志云在位十一年閩王列傳紀年通譜皆云在位十年蓋鏻以天成元年殺延翰自立是歲丙戌至清泰二年乙末實十年而卒與閩王列傳合而舊史九國志皆繆也鏻以清泰二年改元永和是歲見殺而舊史九國志運歷圖皆無永和之號又運歷圖書鏻見殺在天福元年丙申者皆繆也劉旻九國志云乾祐七年十一月旻卒享年六十子承鈞立時年二十九乾祐七年乃顯德元年也而五代舊史周世宗實錄運歷圖紀年通譜皆云顯德二年冬旻卒又有旻偽中書舍人王保衡晉陽見聞要錄云旻乙卯生卒年六十一子承鈞立承鈞丙戌生立時年二十九保衡是旻之臣其親所見聞所得最實然而頗為轉寫差誤爾按保衡書旻乙卯生若享年六十一當於乙卯歲卒則是顯德二年也又書承鈞丙戌生立時年二十九則當是顯德元年甲寅歲也豈有旻卒於二年承鈞以元年嗣位理必不然以九國志參較旻享年六十顯德元年卒承鈞以是歲嗣位時年二十九為得其實但見聞要錄衍一字爾其云二年卒者皆繆也九國志又云承鈞立服喪三年至乾祐九年服除改十年為天會元年當是顯德四年而紀年通譜以顯德三年為天會元年者繆也晉與梁為敵國自稱天祐者二十年故首列於年譜其後遂滅梁而為唐故不列於世家
