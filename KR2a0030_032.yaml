body:
  text: 新五代史卷三十二死節傳第二十語曰世亂識忠臣誠哉五代之際不可以為無人吾得全節之士三人焉作死節傳王彥章裴約劉仁贍附王彥章字子明鄆州壽張人也少為軍卒事梁太祖為開封府押衙左親從指揮使行營先鋒馬軍使末帝即位遷濮州刺史又徙澶州刺史彥章為人驍勇有力能跣足履棘行百步持一鐵鎗騎而馳突奮疾如飛而他人莫能舉也軍中號王鐵鎗梁晉爭天下為徑敵獨彥章心常輕晉王謂人曰亞次鬬雞小兒耳何足懼哉梁分魏相六州為兩鎮懼魏軍不從遣彥章將五百騎入魏屯金波亭以虞變魏軍果亂夜攻彥章彥章南走魏人降晉晉軍攻破澶州虜彥章妻子歸之太原賜以第宅供給甚備間遣使者招彥章彥章斬其使者以自絶然晉人畏彥章之在梁也必欲招致之待其妻子愈厚自梁失魏博與晉夾河而軍彥章常為先鋒遷汝鄭二州防禦使匡國軍節度使北面行營副招討使又徙宣義軍節度使是時晉已盡有河北以鐵鎖斷德勝口築河南北為兩城號夾寨而梁末帝昏亂小人趙巖張漢傑等用事大臣宿將多被讒間彥章雖為招討副使而謀不見用龍德三年夏晉取鄆州梁人大恐宰相敬翔顧事急以繩內靴中入見末帝泣曰先帝取天下不以臣為不肖所謀無不用今強敵未滅陛下棄忽臣言臣身不用不如死乃引繩將自經末帝使人止之問所欲言翔曰事急矣非彥章不可末帝乃召彥章為招討使以段凝為副末帝問破敵之期彥章對曰三日左右皆失笑彥章受命而出馳兩日至滑州置酒大會陰遣人具舟於楊村命甲士六百人皆持巨斧載冶者具炭乘流而下彥章會飲酒半佯起更衣引精兵數千沿河以趨德勝舟兵舉鎖燒斷之因以巨斧斬浮橋而彥章引兵急擊南城浮橋斷南城遂破蓋三日矣是時莊宗在魏以朱守殷守夾寨聞彥章為招討使驚曰彥章驍勇吾嘗避其鋒非守殷敵也然彥章兵少利於速戰必急攻我南城即馳騎救之行二十里而得夾寨報者曰彥章兵已至比至而南城破矣莊宗徹北城為下楊劉與彥章俱浮于河各行一岸每舟相及輒戰一日數十接彥章至楊劉攻之幾下晉人築壘博州東岸彥章引兵攻之不克還擊楊劉戰敗是時段凝已有異志與趙巖張漢傑交通彥章素剛憤梁日削而嫉巖等所為嘗謂人曰俟吾破賊還誅姦臣以謝天下巖等聞之懼與凝叶力傾之其破南城也彥章與凝各為捷書以聞凝遣人告巖等匿彥章書而上己書末帝初疑其事已而使者至軍獨賜勞凝而不及彥章軍士皆失色及楊劉之敗也凝乃上書言彥章使酒輕敵而至於敗趙巖等從中日夜毀之乃罷彥章以凝為招討使彥章馳至京師入見以笏畫地自陳勝敗之迹巖等諷有司劾彥章不恭勒還第唐兵攻兗州末帝召彥章使守捉東路是時梁之勝兵皆屬段凝京師祇有保鑾五百騎皆新捉募之兵不可用乃以屬彥章而以張漢傑監之彥章至遞坊以兵少戰敗退保中都又敗與其牙兵百餘騎死戰唐將夏魯奇素與彥章善識其語音曰王鐵鎗也舉矟刺之彥章傷重馬踣被擒莊宗見之曰爾常以孺子待我今日服乎又曰爾善戰者何不守兗州而守中都中都無壁壘何以自固彥章對曰大事已去非人力可為莊宗惻然賜藥以封其創彥章武人不知書常為俚語謂人曰豹死留皮人死留名其於忠義蓋天性也莊宗愛其驍勇欲全活之使人慰諭彥章彥章謝曰臣與陛下血戰十餘年今兵敗力窮不死何待且臣受梁恩非死不能報豈有朝事梁而暮事晉生何面目見天下之人乎莊宗又遣明宗往諭之彥章病創臥不能起仰顧明宗呼其小字曰汝非邈佶烈乎我豈苟活者遂見殺年六十一晉高祖時追贈彥章太師與彥章同時有裴約者潞州之牙將也莊宗以李嗣昭為昭義軍節度使約以裨將守澤州嗣昭卒其子繼韜以澤潞叛降于梁約召其州人泣而諭曰吾事故使二十餘年見其分財饗士欲報梁仇不幸早世今郎君父喪未葬違背君親吾能死于此不能從以歸梁也衆皆感泣梁遣董璋率兵圍之約與州人拒守求救於莊宗是時莊宗方與梁人戰河上而已建大號聞繼韜叛降梁頗有憂色及聞約獨不叛喜曰吾於繼韜何薄於約何厚而約能分逆順邪顧符存審曰吾不惜澤州與梁一州易得約難得也爾識機便為我取約來存審以五千騎馳至遼州而梁兵已破澤州約見殺至周世宗時又有劉仁贍者焉仁贍字守惠彭城人也父金事楊行密為濠滁二州刺史以驍勇知名仁贍為將輕財重士法令嚴肅少略通兵書事南唐為左監門衛將軍黃袁二州刺史所至稱治李景使掌親軍以為武昌軍節度使周師征淮先遣李穀攻自壽春景遣將劉彥貞拒周兵以仁贍為清淮軍節度使鎮壽州李穀退守正陽浮橋彥貞見周兵之却意其怯急追之仁贍以為不可彥貞不聽仁贍獨按兵城守彥貞果敗於正陽世宗攻壽州圍之數重以方舟載炮自淝河中流擊其城又束巨竹數十萬竿上施版屋號為竹龍載甲士以攻之又決其水寨入于淝河攻之百端自正月至于四月不能下而歲大暑霖雨彌旬周兵營寨水深數尺淮淝暴漲炮舟竹龍皆飄南岸為景兵所焚周兵多死世宗東趨濠梁以李重進為廬壽都招討使景亦遣其元帥齊王景達等列寨紫金山下為夾道以屬城中而重進與張永德兩軍相疑不協仁贍屢請出戰景達不許由是憤惋成疾明年正月世宗復至淮上盡破紫金山寨壞其夾道景兵大敗諸將往往見擒而景之守將廣陵馮延魯光州張紹舒州周祚泰州方訥泗州范再遇等或走或降皆不能守雖景君臣亦皆震懾奉表稱臣願割土地輸貢賦以效誠款而仁贍獨堅守不可下世宗使景所遣使者孫晟等至城下示之仁贍子崇諫幸其父病謀與諸將出降仁贍立命斬之監軍使周廷構哭于中門救之不得於是士卒皆感泣願以死守三月仁贍病甚已不知人其副使孫羽詐為仁贍書以城降世宗命舁仁贍至帳前嘆嗟久之賜以玉帶御馬復使入城養疾是日卒制曰劉仁贍盡忠所事抗節無虧前代名臣幾人可比豫之南伐得爾為多乃拜仁贍檢校太尉兼中書令天平軍節度使仁贍不能受命而卒年五十八世宗遣使弔祭喪事官給追封彭城郡王以其子崇讚為懷州刺史賜莊宅各一區李景聞仁贍卒亦贈太師壽州故治壽春世宗以其難剋遂徙城下蔡而復其軍曰忠正軍曰吾以旌仁贍之節也嗚呼天下惡梁久矣然士之不幸而生其時者不為之臣可也其食人之祿者必死人之事如彥章者可謂得其死哉仁贍既殺其子以自明矣豈有垂死而變節者乎今周世宗實録載仁贍降書蓋其副使孫羽等所為也當世宗時王環為蜀守秦州攻之久不下其力屈而降世宗頗嗟其忠然止於為大將軍視世宗待二人之薄厚而考其制書乃知仁贍非降者也自古忠臣義士之難得也五代之亂三人者或出於軍卒或出於偽國之臣可勝嘆哉可勝嘆哉
