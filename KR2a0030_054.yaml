body:
  text: 新五代史卷五十四雜傳第四十二傳曰禮義廉恥國之四維四維不張國乃滅亡善乎管生之能言也禮義治人之大法廉恥立人之大節蓋不廉則無所不取不恥則無所不為人而如此則禍亂敗亡亦無所不至況為大臣而無所不取不為則天下其有不亂國家其有不亡者乎豫讀馮道長樂老見其自述以為榮其可謂無廉恥者矣則天下國家可從而知也豫於五代得全節之士三死事之臣十有五而怪士之被服儒者以學古自名而享人之祿任人之國者多矣然使忠義之節獨出於武夫戰卒豈於儒者果無其人哉豈非高節之士惡時之亂薄其世而不肯出歟抑君天下者不足顧而莫能致之歟孔子以謂十室之邑必有忠信豈虛言也哉豫嘗得五代時小說一篇載王凝妻李氏事以一婦人猶能如此則知世固嘗有其人而不得見也凝家青齊之間為虢州司戶參軍以疾卒于官凝家素貧一子尚幼李氏攜其子負其遺骸以歸東過開封止旅舍旅舍主人見其婦人獨攜一子而疑之不許其宿李氏顧天已暮不肯去主人牽其臂而出之李氏仰天長慟曰我為婦人不能守節而此手為人執邪不可以一手並樜吾身即引斧自斷其臂路人見者環聚而嗟之或為彈指或為之泣下開封尹聞之白其事于朝官為賜藥封瘡厚恤李氏而笞其主人者嗚呼士不自愛其身而忍恥以偷生者聞李氏之風宜少知愧哉馮道馮道字可道瀛州景城人也事劉守光為參軍守光敗去事宦者張承業承業監河東軍以為巡官以其文學薦之晉王為河東節度掌書記莊宗即位拜戶部侍郎充翰林學士道為人能自刻苦為儉約當晉與梁夾河而軍道居軍中為一茅庵不設牀席臥一束芻而已所得俸祿與僕廝同器飲食意恬如也諸將有掠得人之美女者以遺道道不能却置之別室訪其主而還之其解學士居父喪于景城遇歲飢悉出所有以賙鄉里而退耕于野躬自負薪有荒其田不耕者與力不能耕者道夜往潛為之耕其人後來愧謝道殊不以為德服除復召為翰林學士行至汴州遇趙在禮亂明宗自魏擁兵還犯京師孔循勸道少留以待道曰吾奉詔赴闕豈可自留乃疾趨至京師莊宗遇弒明宗即位雅知道所為問安重誨曰先帝時馮道何在重誨曰為學士也明宗曰吾素知之此真吾宰相也拜道端明殿學士遷兵部侍郎歲餘拜中書侍郎同中書門下平章事天成長興之間歲屢豐熟中國無事道嘗戒明宗曰臣為河東掌書記時奉使中山過井陘之險懼馬蹶失不敢怠於銜轡及至平地謂無足慮遽跌而傷凡蹈危者慮深而獲全居安者患生於所忽此人情之常也明宗問曰天下雖豐百姓濟否道曰穀貴餓農穀賤傷農因誦文士聶夷中田家詩其言近而易曉明宗顧左右録其詩常以自誦水運軍將於臨河縣得一玉杯有文曰傳國寶萬歲杯明宗甚愛之以示道道曰此前世有形之寶爾王者固有無形之寶也明宗問之道曰仁義者帝王之寶也故曰大寶曰位何以守位曰仁明宗武君不曉其言道已去召侍臣講說其義嘉納之道相明宗十餘年明宗崩相愍帝潞王反於鳳翔愍帝出奔衛州道率百官迎潞王入是為廢帝遂相之廢帝即位愍帝猶在衛州後三日愍帝始遇弒崩已而廢帝出道為同州節度使踰年拜司空晉滅唐道又事晉晉高祖拜道守司空同中書門下平章事加司徒兼侍中封魯國公高祖崩道相出帝加太尉封燕國公罷為匡國軍節度使徙鎮威勝契丹滅晉道又事契丹朝耶律德光於京師德光責道事晉無狀道不能對又問曰何以來朝對曰無城無兵安敢不來德光誚之曰爾是何等老子對曰無才無德癡頑老子德光喜以道為太傅德光北歸從至常山漢高祖立乃歸漢以太師奉朝請周滅漢道又事周周太祖拜道太師兼中書令道少能矯行以取稱於世及為大臣尤務持重以鎮物事四姓十君益以舊德自處然當世之士無賢愚皆仰道為元老而喜為之稱譽耶律德光嘗問道曰天下百姓如何救得道為俳語以對曰此時佛出救不得惟皇帝救得人皆以謂契丹不夷滅中國之人者賴道一言之善也周兵反犯京師隱帝已崩太祖謂漢大臣必行推戴及見道道殊無意太祖素拜道因不得已拜之道受之如平時太祖意少沮知漢未可代遂陽立湘陰公贇為漢嗣遣道迎贇于徐州贇未至太祖將兵北至澶州擁兵而反遂代漢議者謂道能沮太祖之謀而緩之終不以晉漢之亡責道也然道視喪君亡國亦未嘗以屑意當是時天下大亂戎夷交侵生民之命急於倒懸道方自號長樂老著書數百言陳己更事四姓及契丹所得階勳官爵以為榮自謂孝於家忠於國為子為弟為人臣為師長為夫為父有子有孫時開一卷時飲一杯食味別聲被色老安於當代老而自樂何樂如之蓋其自述如此道前事九君未嘗諫諍世宗初即位劉旻攻上黨世宗曰劉旻少我謂我新立而國有大喪必不能出兵以戰且善用兵者出其不意吾當自將擊之道乃切諫以為不可世宗曰吾見唐太宗平定天下敵無大小皆親征道曰陛下未可比唐太宗世宗曰劉旻烏合之衆若遇我師如山壓卵道曰陛下作得山定否世宗怒起去卒自將擊旻果敗旻于高平世宗取淮南定三關威武之振自高平始其擊旻也鄙道不以從行以為太祖山陵使葬畢而道卒年七十三諡曰文懿追封瀛王道既卒時人皆共稱歎以謂與孔子同壽其喜為之稱譽蓋如此道有子吉李琪兄珽李琪字台秀河西燉煌人也其兄珽唐末舉進士及第為監察御史丁內艱貧無以葬乞食而後葬珽飢臥廬中聞者哀憐之服除還拜御史荊南成汭辟掌書記吳兵圍杜洪梁太祖遣汭與馬殷等救洪汭以大舟載兵數萬珽為汭謀曰今一舟容甲士千人糗糧倍之緩急不可動若為敵人縻之則武陵武安必為公之後患不若以徑兵屯巴陵壁不與戰吳兵糧盡則圍解矣汭不聽果敗溺死趙匡凝鎮襄陽又辟掌書記太祖破匡凝得珽喜曰此真書記也太祖即位除考功員外郎知制誥珽度太祖不欲先用故吏固辭不拜出知曹州曹州素劇難理前刺史十餘輩皆坐廢珽至以治聞遷兵部郎中崇政院直學士許州馮行襲病行襲有牙兵二千皆故蔡卒太祖懼為變行襲為人嚴酷從事魏峻切諫行襲怒誣以贓下獄欲誅之乃遣珽代行襲為留後珽至許州止傳舍慰其將吏行襲病甚欲使人代受詔珽曰東首加朝服禮也乃即臥內見行襲道太祖語行襲感泣解印以授珽珽乃理峻冤立出之還報太祖太祖喜曰珽果辦吾事會歲飢盜劫汴宋間曹州尤甚太祖復遣珽治之珽至索賊得大校張彥珂珽甥李郊等及牙兵百餘人悉誅之召拜左諫議大夫太祖幸河北至內黃顧珽曰何謂內黃珽曰河南有外黃下黃故此名內黃太祖曰外黃下黃何在珽曰秦有外黃都尉今在雍丘下黃為北齊所廢今在陳留太祖平生不愛儒者聞珽語大喜友圭立除右散騎常侍侍講袁象先討賊珽為亂兵所殺琪少舉進士博學宏辭纍遷殿中侍御史與其兄珽皆以文章知名唐亡事梁太祖為翰林學士梁兵征伐四方所下詔書皆琪所為下筆輒得太祖意末帝時為御史中丞尚書左氶拜同中書門下平章事與蕭頃同為宰相頃性畏慎周密琪倜儻負氣不拘小節二人多所異同琪內結趙巖張漢傑等為助以故頃言多沮頃嘗掎托其過琪所私吏當得試官琪改試為守為頃所發末帝大怒欲竄逐之而巖等救解乃得罷為太子少保唐莊宗滅梁得琪欲以為相而梁之舊臣多嫉忌之乃以為太常卿遷吏部尚書同光三年秋天下大水京師乏食尤甚莊宗以朱書御札詔百僚上封事琪上書數千言其說漫然無足取而莊宗獨稱重之遂以為國計使方欲以為相而莊宗崩明宗入洛陽羣臣勸進有司具儀用柩前即位故事霍彥威孔循等請改國號絶土德明宗武君不曉其說問何謂改號對曰莊宗受唐錫姓為宗屬繼昭宗以立而號國曰唐今唐天命已絶宜改號以自新明宗疑之下其事羣臣羣臣依違不決琪議曰殿下宗室之賢立功三世今興兵向闕以赴難為名而欲更易統號使先帝便為路人則煢然梓宮何所依往明宗以為然乃發喪成服而後即位以琪為御史中丞自唐末喪亂朝廷之禮壞天子未嘗視朝而入閣之制亦廢常參之官日至正衙者傳聞不坐即退獨大臣奏事日一見便殿而侍從內諸司日再朝而已明宗初即位乃詔羣臣五日一隨宰相入見內殿謂之起居琪以謂非唐故事請罷五日起居而復朔望入閣明宗曰五日起居吾思所以數見羣臣也不可罷而朔望入閣可復然唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見羣臣曰入閣宣政前殿也謂之衙衙有仗紫宸便殿也謂之閣其不御前殿而御紫宸也及自正衙喚仗由閣門而入百官俟朝于衙者因隨以入見故謂之入閣然衙朝也其禮尊閣宴見也其事殺自乾符已後因亂禮闕天子不能日見羣臣而見朔望故正衙常日廢仗而朔望入閣有仗其後習見遂以入閣為重至出御前殿猶謂之入閣其後亦廢至是而復然有司不能講正其事凡羣臣五日一入見中興殿便殿也此入閣之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閣琪皆不能正也琪又建言入閣有待制次對官論事而內殿起居一見而退欲有言者無由自陳非所以數見羣臣之意也明宗乃詔起居日有言事者許出行自陳又詔百官以次轉對是時樞密使安重誨專權用事重誨前騶過御史臺門殿直馬延誤衝之重誨即臺門斬延而後奏琪為中丞畏重誨不敢彈糾又懼諫官論列乃託宰相任圜先白重誨而後糾然猶依違不敢正言其事豆盧革等罷相任圜議欲以琪為相而孔循鄭王玉沮之乃止遷尚書右僕射琪以狀申中書言開元禮僕射上事日中書門下率百官送上中書下太常禮院言無送上之文而琪已落新授復舉上儀皆不可明宗討王都已破定州自汴還洛琪當率百官至上東門而請至偃師奉迎其奏章言敗契丹之凶黨破真定之逆城坐誤以定州為真定罰俸一月霍彥威卒詔琪撰神道碑文彥威故梁將而琪故梁相也彥威在梁事不曰僞為馮道所駁琪為人重然諾喜稱人善少以文章知名亦以此自負既貴乃刻牙版為金字曰前鄉貢進士李琪常置之坐側為人少持重不知進退故數為當時所沮以太子少傅致仕卒年六十鄭王玉鄭王玉唐宰相綮之諸孫也其父徽為河南尹張全義判官王玉少依全義居河南舉進士數不中全義以王玉屬有司乃得及第昭宗時為監察御史梁太祖即位拜左補闕梁諸大臣以全義故數薦之纍拜中書舍人翰林學士奉旨末帝時拜中書侍郎同中書門下平章事唐莊宗自鄆州入汴末帝聞唐兵且至惶恐不知所為與李振敬翔等相持慟哭因召王玉問計安出王玉曰臣有一策不知陛下能行否末帝問其策如何王玉曰願得陛下傳國寶馳入唐軍以緩其行而待救兵之至帝曰事急矣寶固不足惜顧卿之行能了事否王玉俯首徐思曰但恐不易了於是左右皆大笑莊宗入汴王玉率百官迎謁道左貶萊州司戶參軍量移曹州司馬張全義為言於郭崇韜復召為太子賓客明宗即位欲用任圜為相而安重誨以圜新進不欲獨相之以問樞密使孔循循嘗事梁與王玉善因言王玉故梁相性謹慎而長者乃拜王玉平章事明宗幸汴州六軍家屬自洛遷汴而明宗又欲幸鄴都軍士愁怨大臣頗以為言明宗不省上下洶洶轉相動搖獨王玉稱贊以為當行趙鳳極言於安重誨重誨驚懼入見明宗切諫乃詔罷其行而王玉又稱贊之以為宜罷王玉在相位既碌碌無所為又病聾孔循罷樞密使王玉不自安亟以疾求去職明宗數留之王玉章四上乃拜左僕射致仕賜鄭州莊一區卒贈司空李愚李愚字子晦渤海無棣人也愚為人謹重寡言好學為古文滄州節度使盧彥威以愚為安陵主簿丁母憂解去後遊關中劉季述幽昭宗於東內愚以書說韓建使圖興復其言甚壯建不能用乃去之洛陽舉進士宏詞為河南府參軍白馬之禍愚復去之山東與李延光相善延光以經術事梁末帝為侍講數稱薦愚愚由此得召久之拜左拾遺崇政院直學士衡王友諒末帝兄也梁大臣李振等皆拜之獨愚長揖末帝以責愚曰衡王朕拜之卿獨揖可乎愚曰陛下以家人禮見之則拜宜也臣於王無所私豈宜妄有所屈坐言事忤旨罷為鄧州觀察判官唐莊宗滅梁愚朝京師唐諸公卿素聞愚學古重之拜主客郎中翰林學士魏王繼岌伐蜀辟愚都統判官蜀道阻險議者以謂宜緩師待變而進招討使郭崇韜以決於愚愚曰王衍荒怠亂國之政其人厭之乘其倉卒擊其無備其利在速不可緩也崇韜以為然而所至迎降遂以滅蜀初軍行至寶雞招討判官陳乂稱疾請留愚厲聲曰陳乂見利則進知難則止今大軍涉險人心易搖正可斬之以徇由是軍中無敢言留者明宗即位纍遷兵部侍郎承旨明宗祀天南郊愚為宰相馮道趙鳳草加恩制道鄙其辭罷為太常卿任圜罷相乃拜愚中書侍郎同平章事愚為相不治第宅借延賓館以居愚有疾明宗遣宦官視之見其敗氈敝席四壁蕭然明宗嗟嘆命以供帳物賜之潞王反犯京師愍帝夜出奔明日愚與馮道至端門聞帝已出而朱弘昭馮贇皆已死愚欲至中書候太后進止道曰潞王已處處張榜招安今即至矣何可俟太后旨也乃相與出迎廢帝入立罷道出鎮同州以劉昫為相昫性褊急而愚素剛介動輒違戾昫與馮道姻家愚數以此誚昫兩人遂相喧詬乃俱罷愚守左僕射是時兵革方興天下多事而愚為相欲依古以創理乃請頒唐六典示百司使各舉其職州縣貢士作鄉飲酒禮時以其迂闊不用愍帝即位有意於治數召學士問以時事而以愚為迂未嘗有所問廢帝亦謂愚等無所事常目宰相曰此粥飯僧爾以謂飽食終日而無所用心也清泰二年以疾卒盧導盧導字熙化范陽人也唐末舉進士為監察御史唐亡事梁纍遷左司郎中侍御史知雜事以病免唐明宗時召拜右諫議大夫遷中書舍人潞王從珂自鳳翔以兵犯京師愍帝出奔于衛州宰相馮道李愚集百官于天宮寺將出迎潞王于郊京師大恐都人藏竄百官久而不集惟導與舍人張昭先至馮道請導草箋勸進導曰潞王入朝郊迎可也若勸進之事豈可輕議哉道曰勸進其可已乎導曰今天子蒙塵于外遽以大位勸人若潞王守節不回以忠義見責其將何辭以對且上與潞王皆太后子也不如率百官詣宮門取太后進止語未終有報曰潞王至矣京城巡檢使安從進催百官班迎百官紛然而去潞王止于正陽門外道又促導草箋導對如初李愚曰吾輩罪人盧舍人言是也導終不草箋導後事晉為吏部侍郎天福六年卒年七十六司空頲司空頲貝州清陽人也唐僖宗時舉進士不中後去為羅紹威掌書記紹威卒入梁為太府少卿楊師厚鎮天雄頲解官往依之師厚卒賀德倫代之張彥之亂命判官王正言草奏詆斥梁君臣正言素不能文辭又為兵刃所迫流汗浹背不能下筆彥怒推正言下榻詬曰鈍漢辱我顧書吏問誰可草奏者吏即言頲羅王時書記乃馳騎召之頲為亂兵劫其衣以敝服蔽形而至見彥長揖神氣自若揮筆成文而言甚淺鄙彥以其易曉甚喜即給以衣服僕馬遂以為德倫判官德倫以魏博降晉晉王兼領天雄仍以頲為判官梁晉相距河上常以頲權軍府事頲為郭崇韜所惡崇韜數言其受賂都虞候張裕多過失頲屢以法繩之頲有姪在梁遣家奴召之裕擒其家奴以謂通書于梁莊宗族殺之
