body:
  text: 新五代史卷十三梁家人傳第一嗚呼梁之惡極矣自其起盜賊至於亡唐其遺毒流于天下天下豪傑四面並起孰不欲戡刃於胸然卒不能少挫其鋒以得志梁之無敵於天下可謂虎狼之強矣及其敗也因於一二女子之娛至於洞胸流腸刲若羊豕禍生父子之間乃知女色之能敗人矣自古女禍大者亡天下其次亡家其次亡身身苟免矣猶及其子孫雖遲速不同未有無禍者也然原其本末未始不起於忽微易坤之初六曰履霜堅冰至家人之初九曰間有家悔亡其言至矣可不戒哉梁之家事詩所謂不可道者至於唐晉以後親疏嫡庶亂矣作家人傳文惠皇后王氏梁太祖母曰文惠皇后王氏單州單父人也其生三子長曰廣王全昱次曰朗王存其次太祖后少寡其三子傭食蕭縣人劉崇家太祖壯而無賴縣中皆厭苦之崇患太祖慵墮不作業數加笞責獨崇母憐之時時自為櫛沐戒家人曰朱三非常人也宜善遇之黃巢起太祖與存俱亡為盜從黃巢攻廣州存戰死居數歲太祖背巢降唐反以破巢遂鎮宣武乃遣人以車馬之蕭縣迎后於崇家使者至門后惶恐走避謂劉氏曰朱三落魄無行作賊死矣何以至此邪使者具道太祖所以然后乃驚喜泣下與崇母俱載以歸封晉國太夫人太祖置酒太夫人前舉觴為壽歡甚太祖啓曰朱五經平生讀書不登一第有子為節度使無忝於先人也后惻然良久曰汝能至此可謂英特然行義未必得如先人也太祖莫知其故后曰朱二與汝俱從黃巢獨死蠻嶺其孤皆在午溝汝今富貴獨不念之乎太祖泣涕謝罪乃悉召存諸子以歸太祖剛暴多殺戮后每誡之多賴以全活大順二年秋后疾卜者曰宜還故鄉乃歸卒於午溝太祖即位立四廟追尊皇考為穆皇帝后曰文惠皇后元貞皇后張氏太祖元貞皇后張氏單州碭山縣渠亭里富家子也太祖少以婦聘之生末帝太祖貴封魏國夫人后賢明精悍動有禮法雖太祖剛暴亦嘗畏之太祖每以外事訪之后言多中太祖時時暴怒殺戮后嘗救護人賴以獲全太祖嘗出兵行至中途后意以為不然馳一介召之如期而至郴王友裕攻徐州破朱瑾於石佛山瑾走友裕不追太祖大怒奪其兵友裕惶恐與數騎亡山中久之自匿於廣王后陰使人教友裕脫身自歸友裕晨馳入見太祖拜伏庭中泣涕請死太祖怒甚使左右捽出將斬之后聞之不及履走庭中持友裕泣曰汝束身歸罪豈不欲明非反乎太祖意解乃免太祖已破朱瑾納其妻以歸后迎太祖於封丘太祖告之后遽見瑾妻瑾妻再拜后亦拜悽然泣下曰兗鄆與司空同姓之國昆仲之間以小故興干戈而使吾姒至此若不幸汴州失守妾亦如此矣言已又泣太祖為之感動乃送瑾妻為尼后嘗給其衣食司空太祖時檢校官也天祐元年后以疾卒太祖即位追冊為賢妃初葬開封縣潤色鄉末帝立追諡曰元貞皇太后祔于宣陵后已死太祖始為荒淫卒以及禍云昭儀陳氏昭儀陳氏宋州人也少以色進太祖已貴嬪妾數百而昭儀專寵太祖嘗疾昭儀與尼數十人晝夜為佛法未嘗少懈太祖以為愛己尤寵之開平三年度為尼居宋州佛寺昭容李氏昭容李氏亦以色進尤謹願未嘗去左右太祖病晝寢方寐棟折獨李氏侍側遽牽太祖衣太祖驚走棟折寢上太祖德之拜昭容皆不知其所終德妃張氏末帝德妃張氏其父歸霸事太祖為梁功臣帝為王時以婦聘之帝即位將冊妃為后妃請待帝郊天而帝卒不得郊貞明元年妃病甚帝遽冊為德妃其夕薨年二十四次妃郭氏次妃郭氏父歸厚事梁為登州刺史妃少以色進梁亡唐莊宗入汴梁故妃妾皆號泣迎拜賀王友雍妃石氏有色莊宗召之石氏慢罵莊宗殺之次以召妃妃懼而聽命已而度為尼賜名誓正居于洛陽初莊宗之入汴也末帝登建國樓謂控鶴指揮使皇甫麟曰吾晉世讎也不可俟彼刀鋸卿可盡我命無使我落讎人之手麟與帝相持慟哭是夕進刃於帝麟亦自剄莊宗入汴命河南張全義葬其尸藏其首於太社晉天福三年詔太社先藏罪人首級許親屬收葬乃出末帝首遣右衛將軍安崇阮與妃同葬之妃卒洛陽太祖二兄曰全昱曰存八子長曰友裕次曰友圭友璋友貞友雍友徽友孜其一養子曰友文開平元年五月乙酉封友文為博王友圭郢王友璋福王友貞均王友雍賀王友徽建王友裕前即位卒追封郴王而康王友孜末帝即位封友璋初為壽州團練使押左右番殿直監豐德庫友圭時為鄆州留後末帝時為忠武軍節度使徙鎮武寧及友雍友徽皆不知其所終廣王全昱廣王全昱太祖即位封太祖與仲兄存俱亡為盜全昱獨與其母猶寄食劉崇家太祖已貴乃與其母俱歸宣武領山南西道節度使以太師致仕太祖將受禪有司備禮前殿全昱視之顧太祖曰朱三爾作得否太祖宴居宮中與王飲博全昱酒酣取骰子擊盆而迸之呼太祖曰朱三爾碭山一百姓遭逢天子用汝為四鎮節度使於汝何負而滅他唐家三百年社稷吾將見汝赤其族矣安用博為太祖不悅罷會全昱亦不樂在京師常居碭山故里三子皆封王友諒衡王友能惠王友誨邵王乾化元年升宋州為宣武軍以友諒為節度使友諒進瑞麥一莖三穗太祖怒曰今年宋州大水何用此為乃罷友諒居京師太祖臥病全昱來視疾與太祖相持慟哭太祖為釋友諒使與東歸貞明二年全昱以疾薨徙衡王友諒嗣封廣王友能為宋滑二州留後陳州刺史所至為不法姦人多依倚之而陳俗好淫祠左道其學佛者自立一法號曰上乘晝夜伏聚男女雜亂妖人母乙董乙聚衆稱天子建置官屬友能初縱之乙等攻劫州縣末帝發兵擊滅之自康王友孜謀反伏誅末帝始疏斥宗室宗室皆反仄貞明四年友能以陳州兵反犯京師至陳留兵敗還走陳州後數月降末帝赦之降為房陵侯友誨為陝州節度使欲以州兵為亂末帝召還京師與友諒友能皆被幽囚梁亡莊宗入汴皆見殺朗王存子友寧友倫朗王存初與太祖俱從黃巢攻廣州存戰死存子友寧友倫友寧字安仁幼聰敏喜慍不形於色太祖以為軍校善用弓劍遷衙內制勝都指揮使龔州刺史太祖圍鳳翔遣友寧東備宣武王師範襲梁圍齊州友寧引兵擊之奪馬千匹斬首數千級太祖奉昭宗還京師拜友寧建武軍節度使賜號迎鑾毅勇功臣太祖復遣攻師範圍博昌屠之清河為之不流戰於石樓兵敗友寧墮馬見殺友倫幼亦明敏通論語小學曉音律存已死太祖以友倫為元從馬軍指揮使表右威武將軍燕人攻魏內黃友倫以前鋒夜渡河奪馬千匹李罕之以潞州降梁晉人攻潞友倫以兵入潞州取罕之以歸纍遷檢校司空領藤州刺史太祖圍鳳翔晉人襲梁友倫以兵三萬至礬山晉人乃却友倫西會太祖於鳳翔昭宗還長安拜友倫寧遠軍節度使太祖東歸留友倫宿衛伺察昭宗所為友倫擊鞠墜馬死太祖大怒以兵七萬至河中昭宗涕泣不知所為將奔太原不果宰相崔胤遣人止太祖太祖以為友倫胤等殺之奏請誅胤等昭宗未從乃遣友諒至京師以兵圍開化坊殺胤及京兆尹鄭元規皇城使王建勳飛龍使陳班閣門使王建襲客省使王建乂前左僕射張濬太祖即位已封宗室中書上議故皇兄存皇姪建武軍節度使友寧寧遠軍節度使友倫皆當封於是追封存朗王友寧安王友倫密王郴王友裕郴王友裕字端夫幼善騎射從太祖征伐能以寬厚得士卒心太祖與晉圍黃鄴於西華鄴卒荷矟登城罵敵晉王使胡騎連射不能中太祖顧友裕一發中之軍中皆大歡呼晉王喜遺友裕良弓百矢太祖鎮宣武以為衙內都指揮使景福元年太祖攻鄆友裕以先鋒次斗門鄆兵夜擊之友裕敗走太祖從後來不知友裕之敗也前軍遇敵多死太祖至村落間始與友裕相得是時朱宣在濮州太祖乃遣友裕先以二百騎前太祖後至與友裕相失太祖卒與敵遇敗而走敵兵追之甚急前至大溝幾不免賴溝中有積薪馬乃得過梁將李璠等死者十餘人冬友裕取濮州遂圍時溥於徐州朱瑾以兵二萬救溥友裕敗瑾于石佛山瑾走都虞候朱友恭讒之太祖以為瑾可追而友裕不追太祖大怒奪其兵屬龐師古以友裕屬吏使者誤致書於友裕友裕惶恐不知所為賴張皇后教之得免權知許州許州近蔡苦於大寇居民殘破友裕招撫流散增戶三萬餘遷諸軍都指揮使與平兗鄆還領許州崔洪奔淮南友裕引兵定蔡州市不易肆太祖兼鎮護國軍以友裕為留後遷忠武軍節度使太祖攻鳳翔未下去攻邠州友裕破靈臺良原下隴州楊崇本以邠州降後崇本復叛太祖遣友裕攻之屯于永壽友裕以疾卒博王友文博王友文字德明本姓康名勤幼美風姿好學善談論頗能為詩太祖養以為子太祖領四鎮以友文為度支鹽鐵制置使太祖用兵四方友文征賦聚斂以供軍實太祖即位以故所領宣武宣義天平護國四鎮征賦置建昌宮總之以友文為使封博王太祖幸西都友文留守東京庶人友圭者太祖初鎮宣武略地宋亳間與逆旅婦人野合而生也長而辨黠多智博王友文多材藝太祖愛之而年又長太祖即位嫡嗣未立心嘗獨屬友文太祖自張皇后崩無繼室諸子在鎮皆邀其婦入侍友文妻王氏有色尤寵之太祖病久王氏與友圭妻張氏常專房侍疾太祖病少間謂王氏曰吾知終不起汝之東都召友文來吾與之決蓋心欲以後事屬之乃謂敬翔曰友圭可與一郡趣使之任乃以友圭為萊州刺史太祖素剛暴既病而喜怒難測是時左降者必有後命友圭大懼其妻張氏曰大家以傳國寶與王氏使如東都召友文君今受禍矣夫婦相對而泣左右勸友圭曰事急計生何不早自為圖友圭乃易衣服微行入左龍虎軍見統軍韓勍計事勍夜以牙兵五百隨友圭雜控鶴衛士而入夜三鼓斬關入萬春門至寢中侍疾者皆走太祖惶駭起呼曰我疑此賊久矣恨不早殺之逆賊忍殺父乎友圭親吏馮廷諤以劍犯太祖太祖旋柱而走劍擊柱者三太祖憊仆于牀廷諤以劍中之洞其腹腸胃皆流友圭以裀裖裹之寢中祕喪四日乃出府庫大賚羣臣及諸軍遣受旨丁昭浦矯詔馳至東都殺友文又下詔曰朕艱難創業踰三十年託于人上忽焉六載中外叶力期于小康豈意友文陰畜異圖將行大逆昨二日夜甲士突入大內賴友圭忠孝領兵勦戮保全朕躬然而疾恙震驚彌所危殆友圭克平凶逆厥功靡倫宜委權主軍國然後發喪乾化二年六月既望友圭於柩前即皇帝位拜韓勍忠武軍節度使以末帝為汴州留後河中朱友謙為中書令友謙不受命而懷州龍驤軍三千劫其將劉重霸據懷州自言討賊三年正月友圭祀天於洛陽南郊改元曰鳳歷太祖外孫袁象先與駙馬都尉趙巖等謀與末帝討賊二月象先以禁兵入宮友圭與妻張氏趨北垣樓下將踰城以走不果使馮廷諤進刃其妻及己廷諤亦自殺末帝即位復友文官爵廢友圭為庶人康王友孜康王友孜目重瞳子嘗竊自負以為當為天子貞明元年末帝德妃薨將葬友孜使刺客夜入寢中末帝方寐夢人害己既寤聞榻上寶劍鎗然有聲躍起抽劍曰將有變邪乃索寢中得刺客手殺之遂誅友孜明日謂趙巖張漢傑曰幾與卿輩不相見由此遂疏弱宗室而信任趙張以至於敗亡嗚呼春秋之法是非與奪之際難矣哉或問梁太祖以臣弒君友圭以子弒父一也與弒即位踰年改元春秋之法皆以君書而友圭不得列于本紀何也且父子之惡均而奪其子是與其父也豈春秋之旨哉豫應之曰梁事著矣其父之惡不待與奪其子而後彰然末帝之志不可以不伸也春秋之法君弒而賊不討者國之臣子任其責豫於友圭之事所以伸討賊者之志也
