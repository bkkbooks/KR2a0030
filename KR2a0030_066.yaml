body:
  text: 新五代史卷六十六楚世家第六馬殷子希聲希範希廣馬殷字霸圖許州鄢陵人也唐中和三年蔡州秦宗權遣孫儒劉建峯將兵萬人屬其弟宗衡略地淮南殷初為儒裨將宗衡等攻楊行密於楊州未克梁兵力急攻宗權宗權數召儒等儒不欲還宗衡屢趨之儒怒殺宗衡自將其兵取高郵遂逐行密行密據宣州儒以兵圍之久不克遣殷與建峯掠食旁縣儒戰敗死殷等無所歸乃推建峯為帥殷為先鋒轉攻豫章略虔吉有衆數萬乾寧元年入湖南次醴陵潭州刺史鄧處訥發邵州兵戍龍回關建峯等至關降其戍將蔣勛建峯取勛鎧甲被先鋒兵張其旗幟直趨潭州至東門東門守者以為關兵戍還開門內之遂殺處訥建峯自稱留後僖宗授建峯湖南節度使殷為馬步軍都指揮使蔣勛求為邵州刺史建峯不與勛率兵攻湘鄉建峯遣殷擊勛於邵州建峯庸人不能帥其下常與部曲飲酒歡呼軍卒陳贍妻有色建峯私之贍怒以鐵檛擊殺建峯軍中推行軍司馬張佶為帥佶將入府乘馬輒踶囓傷佶髀佶臥病語諸將曰吾非汝主也馬公英勇可共立之諸將乃共殺贍磔其尸遣姚彥章迎殷於邵州殷至佶乘肩輿入府殷拜謁於廷中佶召殷上乃率將吏下北面再拜以位與之時乾寧三年也唐拜殷潭州刺史殷遣其將秦彥暉李瓊等攻連邵郴衡道永六州皆下之桂管劉士政懼遣其將陳可璠王建武等率兵守全義嶺殷遣使聘于士政使者至境上可璠等不納殷怒遣瓊等以兵七千攻之擒可璠等及其兵二千餘人悉坑之遂圍桂管虜士政盡取其屬州殷表瓊桂管觀察使四年拜殷武安軍節度使初孫儒敗於宣州殷弟賨為楊行密所執行密收儒餘兵為黑雲都以賨為指揮使賨從行密攻戰數有功為人質重未嘗自矜行密愛之問賨誰家子賨曰馬殷弟也行密大驚曰汝兄貴矣吾今歸汝可乎賨不對他日又問之賨謝曰臣孫儒敗卒也幸公待以不死非殺身不足報湖南鄰境朝夕聞殷動靜足矣不願去也行密歎曰昔吾愛子之貌今吾得子之心矣然勉為吾合二國之歡通商賈易有無以相資亦所以報我也乃厚禮遣賨歸殷大喜表賨節度副使行密遣將劉存等攻杜洪圍鄂州殷遣秦彥暉許德勳以舟兵救之已而杜洪敗死存等遂攻殷殷遣彥暉拒於上流偏將黃璠以舟三百伏瀏陽口存等屢戰不勝乃致書於殷以求和殷欲許之彥暉曰淮人多詐將怠我師不可信急擊之存等退走黃璠以瀏陽舟截江合擊大敗之劉存及陳知新戰死彥暉取嶽州梁太祖即位殷遣使修貢太祖拜殷侍中兼中書令封楚王荊南高季昌以兵斷漢口邀殷貢使殷遣許德勳攻其沙頭季昌求和乃止楊行密袁州刺史呂師周來奔師周勇健豪俠頗通緯候兵書自言五世將家懼不能免常與酒徒聚飲醉則起舞悲歌慷慨泣下行密聞之疑其有異志使人察其動靜師周益懼謂其裨將綦毋章曰吾與楚人為敵境吾常望其營上雲氣甚佳未易敗也吾聞馬公仁者待士有禮吾欲逃死於楚可乎章曰公自圖之章舌可斷語不泄也師周以兵獵境上乃奔於楚綦毋章縱其家屬隨之殷聞師周至大喜曰吾方南圖嶺表而得此人足矣以為馬步軍都指揮使率兵攻嶺南取昭賀梧蒙龔富等州殷表師周昭州刺史朗州雷彥恭召吳人攻平江許德勳擊敗之殷遣秦彥暉攻朗州彥恭奔於吳執其弟彥雄等七人送于梁於是澧州向瓌辰州宋鄴漵州昌師益等率溪洞諸蠻皆附于殷殷請升朗州為永順軍表張佶節度使殷乃請依唐太宗故事開天册府置官屬太祖拜殷天册上將軍殷以其弟賨為左相存為右相廖光圖等十八人為學士末帝時加殷武昌靜江寧遠等軍節度使洪鄂四面行營都統唐莊宗滅梁殷遣其子希範修貢京師上梁所授都統印莊宗問洞庭廣狹希範對曰車駕南巡才堪飲馬爾莊宗嘉之莊宗平蜀殷大懼表求致仕莊宗下璽書慰勞之明宗即位遣使修貢並賀明年正月荊南高季昌執其貢使史光憲殷遣袁詮王環等攻之至其城下季昌求和乃止殷初兵力尚寡與楊行密成汭劉龑等為敵國殷患之問策於其將高郁郁曰成汭地狹兵寡不足為吾患而劉龑志在五管而已楊行密孫儒之仇雖以萬金交之不能得其歡心然尊王仗順霸者之業也今宜內奉朝廷以求封爵而外誇鄰敵然後退修兵農畜力而有待爾於是殷始修貢京師然歲貢不過所産茶茗而已乃自京師至襄唐郢復等州置邸務以賣茶其利十倍郁又諷殷鑄鉛鐵錢以十當銅錢一又令民自造茶以通商旅而收其算歲入萬計由是地大力完數邀封爵天成二年請建行臺明宗封殷楚國王有司言無封國王禮請如三公用竹册乃遣尚書右丞李序持節以竹册封之殷以潭州為長沙府建國承制自置官屬以其弟賨為靜江軍節度使子希振武順軍節度使次子希聲判內外諸軍事姚彥章為左相許德勳為右相李鐸為司徒崔穎為司空拓拔常為僕射馬珙為尚書文武皆進位諡其曾祖筠曰文肅祖正曰莊穆父元豐曰景莊立三廟于長沙長興元年殷卒年七十九詔曰馬殷官爵俱高無以為贈諡曰武穆而已子希聲立希聲字若訥殷次子也殷建國以希聲判內外諸軍事荊南高季昌聞殷將高郁素教殷以計策而楚以強患之嘗使諜者行間於殷殷不聽希聲用事諜者語希聲曰季昌聞楚用高郁大喜以為亡馬氏者必郁也希聲素愚以為然遽奪郁兵職郁怒曰吾事君王久矣亟營西山將老焉犬子漸大能咋人矣希聲聞之矯殷令殺郁殷老不復省事莫知郁死是日大霧四塞殷怪之語左右曰吾嘗從孫儒儒每殺不辜天必大霧豈馬步獄有冤死乎明日吏以狀白殷拊膺大哭曰吾荒耄如此而殺吾勳舊顧左右曰吾亦不久於此矣明年殷薨希聲立授武安靜江等軍節度使希聲嘗聞梁太祖好食雞慕之乃日烹五十雞以供膳葬殷上潢希聲不哭泣頓食雞肉數器而起其禮部侍郎潘起譏之曰昔阮籍居喪而食蒸豚世豈乏賢邪長興三年希聲卒追封衡陽王弟希範立希範字寶規殷第四子也殷子十餘人嫡子希振長而賢其次希聲與希範同日生而希聲母袁夫人有美色希聲以母寵得立而希振棄官為道士居于家希聲卒而希範以次立襲殷官爵封楚王清泰二年賜以弓矢冠劍天福四年加希範天册上將軍開府承制如殷故事希範好學善詩文士廖光圖徐仲雅李臯拓拔常等十八人皆故殷時學士希範性奢侈光圖等皆薄徒飲博歡呼獨常沉厚長者上書切諫光圖等惡之襄州安從進安州李金全叛晉高祖詔希範出兵希範遣張少敵以舟兵趨漢陽漕米五萬斛以饋軍金全等敗少敵乃旋溪州刺史彭士愁率錦奬諸蠻攻澧州希範遣劉勍劉全明等以步卒五千擊之士愁大敗勍等攻溪州士愁走奬州遣其子師皓率諸蠻酋降于勍溪州西接牂柯兩林南通桂林象郡希範乃立銅柱以為表命學士李臯銘之於是南寧州酋長莫彥殊率其本部十八州都雲酋長尹懷昌率其昆明等十二部牂柯張萬濬率其夷播等七州皆附於希範希範作會春園嘉宴堂其費巨萬始加賦於國中拓拔常切諫以為不可希範又作九龍殿以八龍繞柱自言身一龍也是時契丹滅晉中國大亂希範牙將丁思覲廷諫希範曰先王起卒伍以攻戰而得此州倚朝廷以制鄰敵傳國三世有地數千里養兵十萬人今天子囚辱中國無主真霸者立功之時誠能悉國之兵出荊襄以趨京師倡義於天下此桓文之業也奈何耗國用而窮土木為兒女之樂乎希範謝之思覲瞋目視希範曰孺子終不可教也乃扼喉而死開運四年希範卒年四十九諡曰文昭希廣立希廣字德丕希範同母弟也希範平生惡拓拔常諫諍常入謁希範呼閽者指常曰吾不欲見此人勿復內也乃謝絶之及臥病始思常言以為忠召之託以希廣希範卒常數勸希廣以位奉其兄希萼希廣不從希萼為朗州節度使希範之卒希萼自朗州來奔喪希廣將劉彥䣄謀曰武陵之來其意不善宜出兵迎之以備非常使其解甲釋兵而後入張少敵周廷誨曰王能與之則已不然宜早除之希廣泣曰吾兄也焉忍殺之分國而治可也乃以兵迎希萼於砆石止之於碧湘宮厚賂以遣之希萼憤然而去乃遣使詣京師求封爵請置邸稱藩漢隱帝不許降璽書慰勞講解之希萼怒送款於李景舉兵攻長沙希廣遣劉彥䣄許可瓊等禦之彥䣄敗希萼於僕射洲希萼去誘溪洞諸蠻寇益陽希廣遣崔珙璉以步卒七千屯湘鄉玉潭以遏諸蠻劉彥䣄以舟兵趨武陵攻希萼彥䣄敗於湄洲希廣大懼遣使請兵於京師漢隱帝不能出師希萼舟兵沿江而上自號順天將軍攻嶽州刺史王贇堅城不戰希萼呼贇曰吾昔約君同行今何異心乎贇曰君王兄弟不相容而責將吏異心乎願君王入長沙不傷同氣臣不敢不盡節希萼引兵去下湘鄉止長沙屯水西劉彥䣄許可瓊屯水東彭師皓登城望水西軍入白希廣曰武陵兵驕雜以蠻蛋其勢易破請令可瓊等陳山前臣以步兵三千自巴溪渡江趨嶽麓候夜擊之希廣以為可而可瓊已陰送款於希萼遂沮其議明日師皓詣可瓊計事瞋目叱之曰視汝反文在面豈欲投賊乎拂衣而出急白希廣請殺之希廣不聽希萼攻長樂門牙將吳宏楊滌戰于門中希萼少衄已而許可瓊奔于希萼宏滌聞之皆潰希廣率妻子匿于慈堂明日擒之希萼見之惻然曰此鈍夫也豈能為惡左右惑之爾顧其下曰吾欲活之如何其下皆不對遂縊死之乾祐三年希萼自立明年漢隱帝崩京師大亂希萼遂臣於李景景册封希萼楚王希萼悉以軍政事任其弟希崇希崇與楚舊將徐威陸孟俊魯綰等謀作亂希萼置酒端陽門希崇辭以疾威等縱惡馬十餘匹以壯士執檛隨之突入其府劫庫兵縛希萼迎希崇以立希崇遣彭師皓廖偃囚希萼於衡山師皓奉希萼為衡山王臣於李景希崇懼亦請命於景景遣邊鎬入楚盡遷馬氏之族于金陵時周廣順元年也封希萼楚王居洪州希崇領舒州節度使居揚州顯德三年世宗征淮下揚州下詔撫安馬氏子孫已而揚州復入于景希崇率其兄弟十七人歸京師拜右羽林統軍希能左屯衛大將軍希貫右千牛衛大將軍希隱希濬希知希朗皆為節度行軍司馬劉言劉言吉州廬陵人也王進逵武陵人也言初事刺史彭玕從玕奔楚言事希範為辰州刺史進逵少為靜江軍卒事希萼為指揮使希萼攻希廣以進逵為先鋒陷長沙長沙遭亂殘毀希萼使進逵以靜江兵營緝之兵皆愁怨進逵因擁之夜以長柯巨斧斫關奔歸武陵希萼方醉不能省明日遣將唐翥追之及于武陵翥戰大敗而還進逵乃逐出留後馬光惠迎言於辰州以為帥進逵自為副已而希萼將徐威等作亂縛希萼而立希崇湖南大亂李景遣邊鎬入楚遷馬氏于金陵因並召言言不從遣進逵與行軍司馬何景真等攻鎬於長沙鎬敗走周廣順三年言奉表京師以邀封爵又言長沙殘破不可居請移治所於武陵周太祖皆從之乃升朗州為武平軍在武安軍上以言為節度使因以武安授進逵進逵自以言己所迎立不為之下言患之二人始有隙欲相圖進逵謀曰言將可用者不過何景真朱全琇爾召而殺之言可取也是時劉晟取楚梧桂宜蒙等州進逵因白言召景真等會兵攻晟言信之遣景真全琇往至皆見殺乃舉兵襲武陵執言殺之奉表京師周太祖即以進逵為武平軍節度使世宗征淮南授進逵南面行營都統進逵攻鄂州過嶽州嶽州刺史潘叔嗣進逵故時周列待進逵甚謹進逵右右就叔嗣求賂叔嗣不與左右讒其短進逵面罵之叔嗣慚恨語其下曰進逵戰勝而還吾無遺類矣進逵入鄂州方攻下長山叔嗣以兵襲武陵進逵聞之輕舟而歸與叔嗣戰武陵城外進逵敗見殺周行逢子保權周行逢武陵人也與王進逵俱為靜江軍卒事希萼為軍校進逵攻邊鎬行逢別破益陽殺李景兵二千餘人擒其將李建期進逵為武安軍節度使拜行逢集州刺史為進逵行軍司馬進逵與劉言有隙行逢為畫謀策襲殺言進逵據武陵行逢據潭州顯德元年拜行逢武清軍節度使權知潭州軍府事潘叔嗣殺進逵或勸其入武陵叔嗣曰吾殺進逵救死而已武陵非吾利也乃還嶽州遣其客將李簡率武陵人迎行逢於潭州行逢入武陵或請以潭州與叔嗣行逢曰叔嗣殺主帥罪當死以其迎我未忍殺爾若與武安是吾使之殺王公也召以為行軍司馬叔嗣怒稱疾不至行逢怒曰是又欲殺我矣乃陽以武安與之召使至府受命至則殺之行逢故武陵農家子少貧賤無行多慷慨大言及居武陵能儉約自勉勵而性勇敢果於殺戮麾下將吏素恃功驕慢者一以法繩之大將十餘人謀為亂行逢召宴諸將酒半以壯士擒下斬之一境皆畏服民過無大小皆死夫人嚴氏諫曰人情有善惡安得一概殺之乎行逢怒曰此外事婦人何知嚴氏不悅紿曰家田佃戶以公貴頗不力農多恃勢以侵民請往視之至則營居以老歲時衣青裙押佃戶送租入城行逢往就見之勞曰吾貴矣夫人何自苦邪嚴氏曰公思作戶長時乎民租後時常苦鞭撲今貴矣宜先期以率衆安得遂忘壠畝間乎行逢強邀之以羣妾擁升肩輿嚴氏卒無留意因曰公用法太嚴而失人心所以不欲留者一旦禍起田野間易為逃死爾行逢為少損建隆三年行逢病召其將吏以其子保權屬之曰吾起隴畝為團兵同時十人皆以誅死惟衡州刺史張文表獨存然常怏怏不得行軍司馬吾死文表必叛當以楊師璠討之如其不能則嬰城勿戰自歸於朝廷行逢卒子保權立文表聞之怒曰行逢與我起微賤而立功名今日安能北面事小兒乎遂舉兵叛攻下潭州保權乞師於朝廷亦命楊師璠討文表告以先人之言感激涕泣師璠亦泣顧其軍曰汝見郎君乎年未成人而賢若此軍士奮然皆思自效師璠至平津亭文表出戰大敗之初保權之乞師也太祖皇帝遣慕容延釗討文表未至而文表為師璠所執延釗兵入朗州保權舉族朝于京師其後事具國史殷自唐乾寧三年入湖南至周廣順元年凡五十七年餘具年譜注
