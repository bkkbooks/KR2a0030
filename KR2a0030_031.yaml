body:
  text: 新五代史卷三十一周臣傳第十九王朴王朴字文伯東平人也少舉進士為校書郎依漢樞密使楊邠邠與王章史弘肇等有隙朴見漢興日淺隱帝年少孱弱任用小人而邠為大臣與將相交惡知其必亂乃去邠東歸後李業等教隱帝誅權臣邠與章弘肇皆見殺三家之客多及而朴以故獨免周世宗鎮澶州朴為節度掌書記世宗為開封尹拜朴右拾遺為推官世宗即位遷比部郎中獻平邊策曰唐失道而失吳蜀晉失道而失幽並觀所以失之之由知所以平之之術當失之時君暗政亂兵驕民困近者姦於內遠者叛於外小不制而至于僭大不制而至于濫天下離心人不用命吳蜀乘其亂而竊其號幽並乘其間而據其地平之之術在乎反唐晉之失而已必先進賢退不肖以清其時用能去不能以審其材恩信號令以結其心賞功罰罪以盡其力恭儉節用以豐其財徭役以時以阜其民俟其倉廩實器用備人可用而舉之彼方之民知我政化大行上下同心力強財足人安將和有必取之勢則知彼情狀者願為之間諜知彼山川者願為之先導彼民與此民之心同是與天意同與天意同則無不成之功攻取之道從易者始當今惟吳易圖東至海南至江可撓之地二千里從少備處先撓之備東則撓西備西則撓東彼必奔走以救其弊奔走之間可以知彼之虛實衆之強弱攻虛擊弱則所向無前矣勿大舉但以輕兵撓之彼人怯弱知我師入其地必大發以來應數大發則民困而國竭一不大發則我獲其利彼竭我利則江北諸州乃國家之所有也既得江北則用彼之民揚我之兵江之南亦不難而平之也如此則用力少而收功多得吳則桂廣皆為內臣岷蜀可飛書而召之如不至則四面並進席卷而蜀平矣吳蜀平幽可望風而至唯并必死之寇不可以恩信誘必須以強兵攻力已竭氣已喪不足以為邊患可為後圖方今兵力精練器用具備羣下知法諸將用命一稔之後可以平邊臣書生也不足以講大事至于不達大體不合機變惟陛下寬之遷左諫議大夫知開封府事歲中遷左散騎常侍充端明殿學士是時世宗新即位鋭意征伐已撓羣議親敗劉旻於高平歸而益治兵慨然有平一天下之志數顧大臣問治道選文學之士徐台符等二十人使作為君難為臣不易論及平邊策朴在選中而當時文士皆不欲上急於用武以謂平定僭亂在修文德以為先惟翰林學士陶穀竇儀御史中丞楊昭儉與朴皆言用兵之策朴謂江淮為可先取世宗雅已知朴及見其議論偉然益以為奇引與計議天下事無不合遂決意用之顯德三年征淮以朴為東京副留守還拜戶部侍郎樞密副使遷樞密使四年再征淮以朴留守京師世宗之時外事征伐而內修法度朴為人明敏多材智非獨當世之務至於陰陽律曆之法莫不通焉顯德二年詔朴校定大曆乃削去近世符天流俗不經之學設通經統三法以歲軌離交朔望周變率策之數步日月五星為欽天曆六年又詔朴考正雅樂朴以謂十二律管互吹難得其真乃依京房為律準以九尺之絃十三依管長短寸分設柱用七聲為均樂成而和朴性剛果又見信於世宗凡其所為當時無敢難者然人亦莫能加也世宗征淮朴留京師廣新城通道路壯偉宏闊今京師之制多其所規為其所作樂至今用之不可變其陳用兵之略非特一時之策至言諸國興滅次第云淮南可最先取並必死之寇最後亡其後宋興平定四方惟並獨後服皆如朴言六年春世宗遣朴行視汴口作斗門還過故相李穀第疾作仆于坐上舁歸而卒年五十四世宗臨其喪以玉鉞叩地大慟者數四贈侍中鄭仁誨鄭仁誨字日新太原晉陽人也初事唐將陳紹光紹光為人驍勇而好使酒嘗因醉怒仁誨拔劍欲殺之左右皆奔走仁誨植立不動無懼色紹光擲劍于地撫仁誨曰汝有器量必富貴非吾所及也仁誨後棄紹光去還鄉里事母以孝聞漢高祖為河東節度使周太祖居帳下時時往過仁誨與語甚歡每事有疑即從仁誨質問仁誨所對不阿周太祖益奇之漢興周太祖為樞密使乃召仁誨用之纍官至內客省使太祖破李守貞於河中軍中機畫仁誨多所參決太祖入立以仁誨為大內都點檢恩州團練使樞密副使纍遷宣徽北院使出為鎮寧軍節度使顯德元年拜樞密使世宗攻河東仁誨留守東都明年冬以疾卒世宗將臨其喪有司言歲不利臨喪世宗不聽乃先以桃茢而臨之仁誨自其微時常為太祖謀畫及居大位未嘗有所聞而太祖世宗皆親重之然亦能謙謹好禮不自矜伐為士大夫所稱贈中書令追封韓國公諡曰忠正扈載扈載字仲熙北燕人也少好學善屬文廣順初舉進士高第拜校書郎直史館再遷監察御史其為文章以辭多自喜常次歷代有國廢興治亂之迹為運源賦甚詳又因遊相國寺見庭竹可愛作碧鮮賦題其壁世宗聞之遣小黃門就壁録之覽而稱善因拜水部員外郎知制誥遷翰林學士賜緋而載已病不能朝謝居百餘日乃力疾入直學士院世宗憐之賜告還第遣太醫視疾初載以文知名一時樞密使王朴尤重其才薦於宰相李穀久而不用朴以問穀曰扈載不為舍人何也穀曰非不知其才然載命薄恐不能勝朴曰公為宰相以進賢退不肖為職何言命邪已而召拜知制誥及為學士居歲中病卒年三十六議者以穀能知人而朴能薦士是時天子英武樂延天下奇才而尤禮文士載與張昭竇儼陶穀徐台符等俱被進用穀居數人中文辭最劣尤無行昭儼數與論議其文粲然而穀徒能先意所在以進諛取合人主事無大小必稱美頌贊至於廣京城為木偶耕人紫芝白兔之類皆為頌以獻其辭大抵類俳優而載以不幸早卒論議雖不及昭儼而不為穀之諛也嗚呼作器者無良材而有良匠治國者無能臣而有能君蓋材待匠而成臣待君而用故曰治國譬之於奕知其用而置得其處者勝不知其用而置非其處者敗敗者臨注目終日而勞心使善奕者視焉為之易置其處則勝矣勝者所用敗者之也興國所用亡國之臣也王朴之材誠可謂能矣不遇世宗何所施哉世宗之時外事征伐攻取戰勝內修制度議刑法定律曆講求禮樂之遺文所用者五代之士也豈皆愚怯於晉漢而材智於周哉惟知所用爾夫亂國之君常置愚不肖於上而強其不能以暴其短惡置賢智於下而泯沒其材能使君子小人皆失其所而身蹈危亡治國之君能置賢智於近而置愚不肖於遠使君子小人各適其分而身享安榮治亂相去雖遠甚而其所以致之者不多也反其所置而已嗚呼自古治君少而亂君多況於五代士之遇不遇者可勝歎哉
