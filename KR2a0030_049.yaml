body:
  text: 新五代史卷四十九雜傳第三十七翟光鄴翟光鄴字化基濮州鄄城人也其父景珂倜儻有膽氣梁晉相距于河上景珂率聚邑人守永定驛晉人攻之踰年不能下景珂卒戰死光鄴時年十歲為晉兵所掠明宗愛其穎悟常以自隨光鄴事唐官至耀州團練使晉高祖時歷棣沂二州刺史西京副留守出帝已破楊光遠以光鄴為青州防禦使光鄴招輯兵民甚有恩意契丹滅晉遣光鄴知曹州許王從益入𣳓以為樞密使漢高祖入京師改右領軍衛大將軍左金吾大將軍充街使周太祖入立拜宣徽使樞密副使出知永興軍卒于官光鄴為人沈默多謀事繼母以孝聞雖貴不營財産常假官舍以居蕭然僅蔽風雨雍睦親族粗衣糲食與均有無光鄴處之晏然日與賓客飲酒聚書為樂其所臨政務以寬靜休息為意病亟戒其左右氣絶以尸歸洛無久留以煩軍府既卒州人上書乞留葬立祠不許馮暉馮暉魏州人也為效節軍卒以功遷隊長唐莊宗入魏與梁相距于河上暉以隊長亡入梁軍王彥章以暉驍勇隸之麾下梁亡莊宗赦暉不問從明宗討楊立魏王繼岌平蜀纍遷夔興二州刺史董璋反東川暉從晉高祖討璋軍至劍門劍門兵守不得入暉從他道出其左擊蜀守兵殆盡會晉高祖班師拜暉澶州刺史天福中范延光反魏州遣暉襲滑州不克遂入于魏為延光守已而出降拜義成軍節度使徙鎮靈武靈武自唐明宗已後市馬糴粟招來部族給賜軍士歲用度支錢六千萬自關以西轉輸供給民不堪役而流亡甚衆青岡土橋之間氐羌剽掠道路商旅行必以兵暉始至則推以恩信部族懷惠止息侵奪然後廣屯田以省轉餉治倉庫亭館千餘區多出俸錢民不加賦管內大治晉高祖下詔書褒美黨項拓拔彥超最為大族諸族嚮背常以彥超為去就暉之至也彥超來謁遂留之為起第於城中賜豫豐厚務足其意彥超既留而諸部族爭以羊馬為市易期年有馬五千匹晉見暉馬多而得夷心反以為患徙鎮靜難又徙保義歲中召為侍衛步軍都指揮使領河陽節度使暉於是始覺晉有患己意是時出帝昏亂馮玉李彥韜等用事暉曲意事之因得復鎮靈武時王令溫鎮靈武失夷落心大為邊患暉即請曰今朝廷多事必不能以兵援臣願得自募兵以為衛乃募得兵千餘人行至梅戍蕃夷稍稍來謁暉顧首領一人指其佩劍曰此板橋王氏劍邪吾聞王氏劍天下利器也俯而取諸腰間若將玩之因擊殺首領者其從騎十餘人皆殺之裨將藥元福曰今去靈武尚五六百里奈何暉笑曰此夷落之豪部族之所恃也吾能殺之其餘豈敢動哉已而諸族皆以兵扼道路暉以言譬諭之獨所殺首領一族求戰即與之戰而敗走諸族遂不敢動暉至靈武撫綏邊部凡十餘年恩信大著官至中書令封陳留王廣順三年卒追封衛王子繼業皇甫暉皇甫暉魏州人也為魏軍卒戍瓦橋關歲滿當代歸而留屯貝州是時唐莊宗已失政天下離心暉為人驍勇無賴夜博軍中不勝乃與其徒謀為亂劫其都將楊仁晟曰唐能破梁而得天下者以先得魏而盡有河北兵也魏軍甲不去體馬不解鞍者十餘年今天下已定而天子不念魏軍久戍之勞去家咫尺不得相見今將士思歸不可遏公當與我俱行不幸天子怒吾軍則坐據一州足以起事仁晟曰公等何計之過也今英主在上天下一家精甲鋭兵不下數十萬公等各有家屬何故出此不祥之言軍士知不可強遂斬之推一小校為主不從又斬之乃攜二首以詣裨將趙在禮在禮從之乃夜焚貝州以入于魏在禮以暉為馬步軍都指揮使暉擁甲士數百騎大掠城中至一民家問其姓曰姓國暉曰吾當破國遂盡殺之又至一家問其姓曰姓萬暉曰吾殺萬家足矣又盡殺之及明宗入魏遂與在禮合謀莊宗之禍自暉始明宗即位暉自軍卒擢拜陳州刺史終唐世常為刺史晉天福中以衛將軍居京師在禮已秉旄節罷鎮來朝暉往候之曰與公俱起甘陵卒成大事然由我發也公今富貴能恤我乎不然禍起坐中在禮懼遽出器幣數千與之而飲以酒暉飲自若不謝而去久之為密州刺史契丹犯闕暉率其州人奔于江南李景以為歙州刺史奉化軍節度使鎮江州周師征淮景以暉為北面行營應援使屯清流關為周師所敗并其都監姚鳳皆被擒世宗召見暉金瘡被體哀之賜以金帶鞍馬後數日卒拜鳳左屯衛上將軍唐景思唐景思秦州人也幼善角抵以屠狗為生後去為軍卒纍遷指揮使唐魏王繼岌伐蜀景思為蜀守固鎮繼岌兵至景思以城降拜興州刺史晉高祖時為貝州行軍司馬出帝時契丹攻陷貝州景思為趙延壽所得以為壕寨使契丹滅晉拜景思亳州防禦使漢高祖時為鄧州行軍司馬後為沿淮巡檢漢法酷而史弘肇用事喜以告訐殺人景思有奴嘗有所求不如意即馳見弘肇言景思與李景交通而私畜兵甲弘肇遣吏將三十騎往收景思奴謂吏曰景思勇者也得則殺之不然將失之也吏至景思迎前以兩手抱吏呼冤請詣獄自理吏引奴與景思驗景思曰我家在此請索之有錢十千為受外賂有甲一屬為私畜兵吏索之惟一衣笥軍籍糧簿而已吏閔而寬之景思請械送京師以自明景思有僕王知權在京師聞景思被告乃見弘肇願先下獄明景思不反弘肇憐之送知權獄中日勞以酒食景思既械就道潁亳之人隨至京師共明之弘肇乃鞫其奴具伏即奏斬奴而釋景思後從世宗戰高平世宗以所得漢降兵數千為效順指揮以景思為指揮使復戍淮上周師伐淮南以功領饒州刺史遷濠州刺史兵攻濠州以戰傷重卒贈武清軍節度使王進王進幽州良鄉人也為人勇悍走及奔馬少聚徒為盜鄉里患之符彥超遣人以賂招置麾下彥超鎮安遠軍軍中有變遣進馳奏京師明宗怪其來速嘉其足力以隸寧衛指揮漢高祖為侍衛親軍指揮使以進為軍校高祖鎮河東因以之從每有急遣進馳至京師往返不過五六日由是愈親愛之纍遷奉國軍都指揮使從周太祖起魏遷虎捷右廂都指揮使歷汝鄭二州防禦使彰德軍節度使顯德元年秋以疾卒贈太師一本作初嗚呼豫述舊史至於王進之事未嘗不廢書而歎曰甚哉五代之君皆武人崛起其所與俱勇夫悍卒各裂土地封侯王何異豺狼之牧斯人也雖其附託遭遇出於一時之幸然猶必皆橫身陳敵非有百夫之勇則必一日之勞至如進者徒以疾足善走而秉旄節何其甚歟豈非名器之用隨世而輕重者歟世治則君子居之而重世亂則小人易得而輕歟抑因緣僥幸未始不有而尤多於亂世既其極也遂至於是歟豈其又有甚於是者歟當此之時為國長者不過十餘年短者三四年至一二年天下之人視其上易君代國如更戍長無異蓋其輕如此況其下者乎如進等者豈足道哉易否泰消長君子小人常相上下視在上者如進等則其在下者可知矣豫書進事所以哀斯人之亂而見當時賢人君子之在下者可勝道哉可勝道哉常思常思字克恭太原人也初從唐莊宗為卒後為長劍指揮使歷唐晉為六軍都虞候漢高祖為河東節度使以思為牢城指揮使高祖入立領武勝軍節度使徙鎮昭義思起軍卒未嘗有戰功徒以幸會漢興遂秉旄節在潞州五年以聚斂為事而性鄙儉初思微時周太祖方少孤無依食于思家以思為叔後思與周太祖俱遭漢以取富貴周太祖已即位每呼思為常叔拜其妻如家人禮廣順三年徙鎮歸德居三年來朝又徙平盧思因啓曰臣居宋宋民負臣絲息十萬兩願以券上進太祖頷之即焚其券詔宋州悉蠲除之思居青州踰年得疾歸于洛陽卒贈中書令孫方諫孫方諫鄭州清苑人也初定州西北有狼山堡定人常保以避契丹有尼深意居其中以佛法誘民民多歸之後尼死堡人言其尸不朽因奉而事之尼姓孫氏方諫自以為尼族人即繼行其法堡人推以為主晉出帝時義武軍節度使惡方諫聚徒山中恐為邊患因表以為遊奕使方諫因有所求不得乃北通契丹契丹後滅晉以方諫為義武軍節度使已而徙方諫於雲中方諫不受命率其徒復入狼山漢高祖起契丹縱火燒定州虜其人民北去方諫聞之自狼山入據之以歸漢高祖嘉之即拜方諫義武軍節度使周太祖時徙鎮鎮國以其弟行友為定州留後世宗攻太原方諫朝于行在從還京至洛得疾徙鎮匡國卒于洛陽年六十二贈太師
