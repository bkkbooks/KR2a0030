body:
  text: 新五代史卷四唐本紀第四莊宗光聖神閔孝皇帝其先本號朱邪蓋出於西突厥至其後世別自號曰沙陀而以朱邪為姓唐德宗時有朱邪盡忠者居於北庭之金滿州貞元中吐蕃贊普攻陷北庭徙盡忠於甘州而役屬之其後贊普為回鶻所敗盡忠與其子執宜東走贊普怒追之及于石門關盡忠戰死執宜獨走歸唐居之鹽州以隸河西節度使范希朝希朝徙鎮太原執宜從之居之定襄神武川之新城其部落萬騎皆驍勇善騎射號沙陀軍執宜死其子曰赤心懿宗咸通十年神策大將軍康承訓統十八將討龐勛於徐州以朱邪赤心為太原行營招討沙陀三部落軍使以從破勛功拜單于大都護振武軍節度使賜姓名曰李國昌以之屬籍沙陀素強而國昌恃功益橫恣懿宗患之十三年徙國昌雲州刺史大同軍防禦使國昌稱疾拒命國昌子克用尤善騎射能仰中雙鳧為雲州守捉使國昌已拒命克用乃殺大同軍防禦使段文楚據雲州自稱留後唐以太僕卿盧簡方為振武節度使會幽並兵討之簡方行至嵐州軍潰由是沙陀侵掠代北為邊患矣明年僖宗即位以謂前太原節度使李業遇沙陀有恩而業已死乃以其子鈞為靈武節度使宣慰沙陀六州三部落使以招緝之拜克用大同軍防禦使六州三部落皆不見其名處據唐書除使有此語爾居久之國昌出擊黨項吐渾赫連鐸襲破振武克用聞之自雲州往迎國昌而雲州人亦閉關拒之國昌父子無所歸因掠蔚朔間得兵三千國昌入保蔚州克用還據新城僖宗乃拜鐸大同軍使以李鈞為代北招討使以討沙陀乾符五年沙陀破遮虜軍又破岢嵐軍而唐兵數敗沙陀由此益熾北據蔚朔南侵欣代嵐石至于太谷焉廣明元年招討使李琢會幽州李可舉雲州赫連鐸擊沙陀克用與可舉相拒雄武軍其叔父友金以蔚朔州降于琢克用聞之遽還可舉追至藥兒嶺大敗之琢軍夾擊又敗之于蔚州沙陀大潰克用父子亡入達靼克用少驍勇軍中號曰李餢兒其一目眇及其貴也又號獨眼龍其威名蓋於代北其在達靼久之鬱鬱不得志又常懼其圖己因時時從其羣豪射獵或挂針于木或立馬鞭百步射之輒中羣豪皆服以為神黃巢已陷京師中和元年代北起軍使陳景思發沙陀先所降者與吐渾安慶等萬人赴京師行至絳州沙陀軍亂大掠而還景思念沙陀非克用不可將乃以詔書召克用於達靼承制以為代州刺史鴈門以北行營節度使率蕃漢萬人出石嶺關過太原求發軍錢節度使鄭從讜與之錢千緡米千石克用怒縱兵大掠而還二年十一月景思克用復以步騎萬七千赴京師三年正月出于河中進屯乾坑巢黨驚曰餢兒軍至矣二月敗巢將黃鄴於石隄谷三月又敗趙璋尚讓於良田坡橫尸三十里是時諸鎮兵皆會長安大戰渭橋賊敗走入城克用乘勝追之自光泰門先入戰望春宮升陽殿巢敗南走出藍田關京師平克用功第一天子拜克用檢校司空同中書門下平章事河東節度使以國昌為鴈門以北行營節度使十月國昌卒十一月遣其弟克修攻昭義孟方立取其澤潞二州方立走山東以邢洺磁三州自別為昭義軍黃巢南走至蔡州降秦宗權遂攻陳州四年克用以兵五萬救陳州出天井關假道河陽諸葛爽不許乃自河中渡河四月敗尚讓於太康又敗黃鄴于西華巢且走且戰至中牟臨河未渡而克用追及之賊衆驚潰比至封丘又敗之巢脫身走克用追之一日夜馳二百里至于冤朐不及而還昭義軍在唐時跨山東西管五州至是澤潞入于晉邢洺磁孟氏據之故當時有兩昭義過汴州休軍封禪寺朱全忠饗克用於上源驛夜酒罷克用醉臥伏兵發火起侍者郭景銖滅燭匿克用牀下以水醒面而告以難會天大雨滅火克用得從者薛鐵山賀回鶻等隨電光縋尉氏門出還軍中七月至于太原訟其事于京師請加兵於汴遣弟克修將兵萬人屯于河中以待僖宗和解之用破巢功封克用隴西郡王光啓元年河中王重榮與宦者田令孜有隙徙重榮兗州以定州王處存為河中節度使詔克用以兵護處存之鎮重榮使人紿克用曰天子詔重榮俟克用至與處存共誅之因偽為詔書示克用曰此朱全忠之謀也克用信之八上表請討全忠僖宗不許克用大怒克用不僭號故不稱王重榮既不肯徙僖宗遣邠州朱玫鳳翔李昌符討之克用反以兵助重榮敗玫于沙苑遂犯京師縱火大掠天子出居于興元克用退屯河中朱玫亦反以兵追天子不及得襄王熅迫之稱帝屯于鳳翔僖宗念獨克用可以破玫而不能使也當破黃巢長安時天下兵馬都監楊復恭與克用善乃遣諫議大夫劉崇望以詔書召克用且道復恭意使進兵討玫等克用陽諾而不行明年孟方立死弟遷立大順元年克用擊破孟遷取邢洺磁三州乃遣安金俊攻赫連鐸於雲州幽州李匡威救鐸戰於蔚州金俊大敗於是匡威鐸及朱全忠皆請因其敗伐之昭宗以克用破黃巢功高不可伐下其事臺省四品官議議者多言不可宰相張濬獨以謂沙陀前逼僖宗幸興元罪當誅可伐軍容使楊復恭克用所善也亦極諫以為不可昭宗然之詔諭全忠等全忠陰賂濬使持其議益堅昭宗不得已以濬為太原四面行營兵馬都統韓建為副使是時潞州將馮霸叛降于梁梁遣葛從周入潞州唐以京兆尹孫揆為昭義軍節度使克用遣李存孝執揆于長子又遣康君立取潞州十一月濬及克用戰于陰地濬軍三戰三敗濬建遁歸克用兵大掠晉絳至于河中赤地千里克用上表自訴其辭慢侮天子為之引咎優詔答之二年二月復拜克用河東節度使隴西郡王加檢校太師兼中書令四月攻赫連鐸于雲州圍之百餘日鐸走吐渾八月大搜于太原出晉絳掠懷孟至于邢州遂攻王鎔于鎮州克用柵常山西以十餘騎渡滹沱覘敵遇大雨平地水深數尺鎮人襲之克用匿林中禱其馬曰吾世有太原者馬不嘶馬偶不嘶以免前軍李存孝取臨城進攻元氏李匡威救鎔克用還軍邢州景福元年王鎔攻邢州李存信李嗣勳等敗鎔于堯山二月會王處存攻鎔戰于新市為鎔所敗八月李匡威攻雲州以牽克用之兵克用潛入于雲州返出擊匡威匡威敗走十月李存孝以邢州叛二年存孝求援於王鎔克用出兵井陘擊鎔且以書招鎔而急攻其平山鎔懼遂與克用通和獻帛五十萬匹出兵助攻邢州乾寧元年三月執存孝殺之冬攻幽州李匡儔棄城走追至景城見殺以劉仁恭為留後二年河中王重盈卒其諸子珂珙爭立克用請立珂鳳翔李茂貞邠寧王行瑜華州韓建請立珙昭宗初兩難之乃以宰相崔胤為河中節度使既而許克用立珂茂貞等怒三鎮兵犯京師聞克用亦起兵乃皆罷去六月克用攻絳州斬刺史王瑤瑤珙弟助珙以爭者七月至于河中同州王行約奔于京師陽言曰沙陀十萬至矣謀奉天子幸邠州茂貞假子閻圭亦謀劫幸鳳翔京師大亂昭宗出居于石門克用軍留月餘不進昭宗遣延王戒丕丹王允兄事克用且告急八月克用進軍渭橋以為邠寧四面行營都統昭宗還京師十一月克用擊破邠州王行瑜走至慶州見殺克用還軍雲陽請擊茂貞昭宗慰勞克用使與茂貞解仇以紓難拜克用忠正平難功臣封晉王是時晉軍渭北遇雨六十日或勸克用入朝克用未決都押衙蓋寓曰天子還自石門寢未安席若晉兵渡渭人情豈復能安勤王而已何必朝哉克用笑曰蓋寓猶不信我況天下乎乃收軍而還三年正月昭宗復以張濬為相克用曰此朱全忠之謀也乃上表曰若陛下朝以濬為相則臣將暮至闕廷京師大恐濬命遽止朱全忠之攻兗鄆也克用遣李存信假道魏州以救朱宣等存信屯于莘縣軍士侵掠魏境羅弘信伏兵攻之存信敗走洺州克用自將擊魏戰于洹水亡其子落落六月破魏成安洹水臨漳等十餘邑十月又敗魏人于白龍潭進攻觀音門全忠救至乃解四年劉仁恭叛晉克用以兵五萬擊仁恭戰于安塞克用大敗光化元年朱全忠遣葛從周攻下邢洺磁三州克用遣周德威出青山口遇從周于張公橋德威大敗冬潞州守將薛志勤卒李罕之據潞州叛附于朱全忠二年全忠遣氏叔琮攻破承天軍又破遼州至于榆次周德威敗之于洞渦秋李嗣昭復取澤潞三年嗣昭敗汴軍于沙河復取洺州朱全忠自將圍之嗣昭走至青山口遇汴伏兵嗣昭大敗秋嗣昭取懷州是歲汴人攻鎮定鎮定皆絶晉以附于朱全忠天復元年全忠封梁王梁王攻下晉絳河中執王珂以歸晉失三與國乃下意為書幣聘梁以求和梁王以為晉弱可取乃曰晉雖請盟而書辭慢因大舉擊晉四月氏叔琮入天井張文敬入新口葛從周入土門王處直入飛狐侯言入陰地叔琮取澤潞其別將白奉國破承天軍遼州守將張鄂汾州守將李瑭皆迎梁軍降晉人大懼會天大雨霖梁兵多疾皆解去五月晉復取汾州誅李瑭六月周德威李嗣昭取慈隰二年進攻晉絳大敗于蒲縣梁軍乘勝破汾慈隰三州遂圍太原克用大懼謀出奔雲州又欲奔胸奴未決梁軍大疫解去周德威復取汾慈隰三州四年梁遷唐都於洛陽改元曰天祐克用以謂劫天子以遷都者梁也天祐非唐號不可稱乃仍稱天復五年會契丹阿保機於雲中約為兄弟六年梁攻燕滄州燕王劉仁恭來乞師克用恨仁恭反覆欲不許其子存勗諫曰此吾復振之時也今天下之勢歸梁者十七八強如趙魏中山莫不聽命是自河以北無為梁患者其所憚者惟我與仁恭耳若燕晉合勢非梁之福也夫為天下者不顧小怨且彼常困我而我急其難可因以德而懷之是謂一舉而兩得此不可失之機也克用以為然乃為燕出兵攻破潞州梁圍乃解去以李嗣昭為潞州留後七年梁兵十萬攻潞州圍以夾城遣周德威救潞州軍于亂柳冬克用疾是歲梁滅唐克用復稱天祐四年五年正月辛卯克用卒年五十三子存勗立葬克用於鴈門嗚呼世久而失其傳者多矣豈獨史官之繆哉李氏之先蓋出於西突厥本號朱邪至其後世別自號曰沙陀而以朱邪為姓拔野古為始祖其自序云沙陀者北庭之磧也當唐太宗時破西突厥諸部分同羅僕骨之人於此磧置沙陀府而以其始祖拔野古為都督其傳子孫數世皆為沙陀都督故其後世因自號沙陀然豫考于傳記其説皆非也夷狄無姓氏朱邪部族之號耳拔野古與朱邪同時人非其始祖而唐太宗時未嘗有沙陀府也唐太宗破西突厥分其諸部置十三州以同羅為龜林都督府僕骨為金微都督府拔野古為幽陵都督府未嘗有沙陀府也當是時西突厥有鐵勒延陀阿史那之類為最大其別部有同羅僕骨拔野古等以十數蓋其小者也又有處月處密諸部又其小者也朱邪者處月別部之號耳太宗二十二年已降拔野古其明年阿史那賀魯叛至高宗永徽二年處月朱邪孤注從賀魯戰于牢山為契苾何力所敗遂沒不見後百五六十年憲宗時有朱邪盡忠及子執宜見於中國而自號沙陀以朱邪為姓矣蓋沙陀者大磧也在金莎山之陽蒲類海之東自處月以來居此磧號沙陀突厥而夷狄無文字傳記朱邪又微不足録故其後世自失其傳至盡忠孫始賜姓李氏李氏後大而夷狄之人遂以沙陀為貴種云
