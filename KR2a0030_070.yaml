body:
  text: 新五代史卷七十東漢世家第十劉旻子承鈞承鈞子繼恩繼元劉旻漢高祖母弟也初名崇為人美鬚髯目重瞳子少無賴嗜酒好博嘗黥為卒高祖事晉為河東節度使以旻為都指揮使高祖即帝位以為太原尹北京留守同中書門下平章事隱帝時累加中書令隱帝少政在大臣周太祖為樞密使新討三叛立大功而與旻素有隙旻頗不自安謂判官鄭珙曰主上幼弱政在權臣而吾與郭公不叶時事如何珙曰漢政將亂矣晉陽兵雄天下而地形險固十州征賦足以自給公為宗室不以此時為計後必為人所制旻曰子言乃吾意也乃罷上供征賦收豪傑籍丁民以益兵三年周太祖起魏隱帝遇弒旻乃謀舉兵周太祖之自魏入也反狀已白而漢大臣不即推尊之故未敢即立乃白漢太后立旻子贇為漢嗣遣宰相馮道迎贇于徐州當是時人皆知太祖之非實意也旻獨喜曰吾兒為帝矣何患乃罷兵遣人至京師周太祖少賤黥其頸上為飛雀世謂之郭雀兒太祖見旻使者具道所以立贇之意因自指其頸以示使者曰自古豈有雕青天子幸公無以我為疑旻喜益信以為然太原少尹李驤曰郭公舉兵犯順其勢不能為漢臣必不為劉氏立後因勸旻以兵下太行控孟津以俟變庶幾贇得立贇立而罷兵可也旻大罵曰驤腐儒欲離間我父子命左右牽出斬之驤臨刑歎曰吾為愚人畫計死誠宜矣然吾妻病不可獨存願與之俱死旻聞之即幷戮其妻于市以其事白漢以明無佗已而周太祖果代漢降封贇湘陰公旻遣牙將李奉書周太祖求贇歸太原而贇已死旻慟哭為李驤立祠歲時祠之乃以周廣順元年正月戊寅即皇帝位于太原以子承鈞為太原尹判官鄭珙趙華為宰相都押衙陳光裕為宣徽使遣通事舍人李間行使于契丹契丹永康王兀欲與旻約為父子之國旻乃遣宰相鄭珙致書兀欲稱姪皇帝以叔父事之而已兀欲遣燕王述軋政事令高勳以冊尊旻為大漢神武皇帝幷冊旻妻為皇后兀欲性豪儁漢使者至輒以酒肉困之珙素有疾兀欲彊之飲一夕而以醉卒然兀欲聞旻自立頗幸中國多故乃遣其貴臣述軋高勳以自愛黃騮九龍十二稻玉帶報聘已而兀欲為述軋所弒述律代立旻遣樞密直學士王得中聘于述律求兵以攻周述律遣蕭禹厥率兵五萬助旻旻出陰地攻晉州為王峻所敗是歲大寒旻軍凍餒亡失過半明年又攻府州為折德扆所敗德扆因取岢嵐軍周太祖崩旻聞之喜遣使乞兵于契丹契丹遣楊衮將鐵馬萬騎及奚諸部兵五六萬人號稱十萬以助旻旻以張元徽為先鋒自將騎兵三萬攻潞州潞州李筠遣穆令鈞以步騎三千拒元徽于太平驛元徽擊敗之遂圍潞州是時世宗新即位以謂旻幸周有大喪而天子新立必不能出兵宜自將以擊其不意自宰相馮道等多言不可世宗意甚銳顯德元年三月親征甲午戰于高平李重進白重贊將左樊愛能何徽將右向訓史彥超居中軍張永德以禁兵衞蹕旻亦列為三陣張元徽居東偏楊衮居西偏旻居其中衮望周師謂旻曰勍敵也未可輕動旻奮髯曰時不可失無妄言也衮怒而去旻號令東偏先進王得中叩馬諫曰南風甚急非北軍之利也宜少待之旻怒曰老措大毋妄沮吾軍即麾元徽元徽擊周右軍兵始交愛能徽退走其騎軍亂步卒數千棄甲叛降元徽呼萬歲聲振川谷世宗大駭躬督戰士士皆奮命爭先而風勢愈盛旻自麾赤幟收軍軍不可遏旻遂敗日暮旻收餘兵萬人阻澗而止是時周之後軍劉詞將之在後未至而世宗銳於速戰戰已勝詞軍繼至因乘勝追擊之旻又大敗輜重器甲乘輿服御物皆為周師所獲旻獨乘契丹黃騮自鵰窠嶺間道馳去夜失道山谷間得村民為鄉導誤趨平陽得佗道以歸而張元徽戰歿于陣楊衮怒旻按兵西偏不戰故獨全軍而返旻歸為黃騮治廄飾以金銀食以三品料號自在將軍世宗休軍潞州大宴將士斬敗將樊愛能何徽等七十餘人軍威大振進攻太原遣符彥卿史彥超北控忻口以斷契丹援路太原城方四十里周師去城三百步圍之匝自四月至於六月攻之不克而彥卿等為契丹所敗彥超戰歿世宗遽班師初周師圍城也旻遣王得中送楊衮以歸因乞援兵於契丹契丹發數萬騎助旻遣得中先還至代州代州將桑珪殺防禦使鄭處謙以城降周幷送得中于周世宗召問得中虜助兵多少得中言送衮歸無所求也世宗信之已而契丹敗符彥卿於忻口得中遂見殺旻自敗於高平已而被圍以憂得疾明年十一月卒年六十子承鈞立承鈞旻次子也少頗好學工書旻卒承鈞遣人奉表契丹自稱男述律答之以詔呼承鈞為兒許其嗣位初旻常謂張元徽等曰吾以高祖之業贇之冤義不為郭公屈爾期與公等勉力以復家國之讎至於稱帝一方豈獲已也顧我是何天子爾亦是何節度使故其僭號仍稱乾祐不改元不立宗廟四時之祭用家人禮承鈞既立始赦境內改乾祐十年曰天會元年立七廟於顯聖宮契丹遣高勳助承鈞承鈞遣李存瓌與勳攻上黨無所得而還明年世宗北伐契丹下三關契丹使來告急承鈞將發兵而世宗班師乃已宋興昭義節度使李筠叛命遣其將劉繼冲判官孫孚奉表稱臣執其監軍周光遜李廷玉送于太原乞兵為援承鈞欲謀於契丹繼冲道筠意請無用契丹兵承鈞即率其國兵自將出團柏谷羣臣餞之汾水僕射趙華曰李筠舉事輕易陛下不圖成敗空國興師臣實憂之承鈞至太平驛封筠隴西郡王筠見承鈞儀衞不備非如王者悔臣之筠因自陳受周氏恩不忍背德而承鈞與周世仇也聞筠言亦不悅遣宣徽使盧贊監其軍筠心益不平與贊多不叶承鈞遣宰相衞融和解之已而筠敗死衞融被執至京師太祖皇帝問融承鈞所以助筠反狀融言不遜太祖命以鐵檛擊其首流血被面融呼曰臣得死所矣太祖顧左右曰此忠臣也釋之命以良藥傅其瘡遣融致書于承鈞求周光遜等約亦歸融太原承鈞不報融遂留京師承鈞謂趙華曰不聽公言幾至於敗然失衞融盧贊吾以為恨爾承鈞由此益重儒者以抱腹山人郭無為參議國政無為棣州人方顙鳥喙好學多聞善談辯嘗衣褐為道士居武當山周太祖討李守貞于河中無為詣軍門上謁詢以當世之務太祖奇之或謂太祖曰公為漢大臣握重兵居外而延縱橫之士非所以防微慮遠之道也由是太祖不納無為去隱抱腹山承鈞內樞密使段常識之薦其材承鈞以諫議大夫召之遂以為相五年宿衞殿直行首王隱劉紹趙鸞等謀作亂事覺被誅其詞連段常乃罷常樞密為汾州刺史縊殺之自旻世凡舉事必稟契丹而承鈞之立多略契丹遣使者責承鈞改元援李筠殺段常不以告承鈞惶恐謝罪使者至契丹輒見留承鈞奉之愈謹而契丹待承鈞益薄承鈞自李筠敗而失契丹之援無復南侵之意地狹產薄以歲輸契丹故國用日削乃拜五臺山僧繼顒為鴻臚卿繼顒故燕王劉守光之子守光之死以孽子得不殺削髮為浮圖後居五臺山為人多智善商財利自旻世頗以賴之繼顒能講華嚴經四方供施多積畜以佐國用五臺當契丹界上繼顒常得其馬以獻號添都馬歲率數百匹又於柏谷置銀冶募民鑿山取鑛烹銀以輸劉氏仰以足用即其冶建寶興軍繼顒後累官至太師中書令以老病卒追封定王太祖皇帝嘗因界上諜者謂承鈞曰君家與周氏為世讎宜其不屈今我與爾無所間何為困此一方之人也若有志於中國宜下太行以決勝負承鈞遣諜者復命曰河東土地兵甲不足以當中國之十一然承鈞家世非叛者區區守此蓋懼漢氏之不血食也太祖哀其言笑謂諜者曰為我語承鈞開爾一路以為生故終其世不加兵承鈞立十三年病卒其養子繼恩立繼恩本姓薛氏父釗為卒旻以女妻之生繼恩漢高祖以釗壻也除其軍籍置之門下釗無材能高祖衣食之而無所用妻以旻女常居中釗罕得見釗常怏怏因醉拔佩刀刺之傷而不死釗即自裁旻女後適何氏生子繼元而何氏及旻女皆卒旻以其子承鈞無子乃以二子命承鈞養為子承鈞立以繼恩為太原尹承鈞嘗謂郭無為曰繼恩純孝然非濟世之才恐不能了我家事無為不對承鈞病臥勤政閤召無為執手以後事付之承鈞卒繼恩告哀於契丹而後立繼恩服縗裳視事寢處皆居勤政閤而承鈞故執事百司宿衞者皆在太原府廨九月繼恩置酒會諸大臣宗子飲罷臥閤中供奉官侯霸榮率十餘人挺刃入閤閉戶而殺之郭無為遣人以梯登屋入殺霸榮幷其黨初承鈞之語郭無為也繼恩怨無為不助己及立欲逐之而未果故霸榮之亂人皆以謂無為之謀霸榮死口滅而無知者無為迎繼元而立之繼元為人忍旻子十餘人皆無可稱者當繼元時有鎬鍇錡錫銑於繼元為諸父皆為繼元所殺獨銑以佯愚獲免承鈞妻郭氏繼元兄弟自少母之繼元妻段氏嘗以小過為郭氏所責既而以它疾而卒繼元疑其殺之及立遣嬖者范超圖殺郭氏郭氏方縗服哭承鈞于柩前超執而縊殺之於是劉氏之子孫無遺類矣繼元立改元曰廣運王師北征繼元閉城拒守太祖皇帝以詔書招繼元出降許以平盧軍節度使郭無為安國軍節度使無為捧詔色動而幷人及繼元左右皆欲堅守以拒命無為仰天慟哭拔佩刀欲自裁為左右所持繼元自下執其手延之上坐無為曰奈何以孤城拒百萬之王師蓋欲搖動幷人而幷人守意益堅宦者衞德貴察無為有異志以告繼元繼元遣人縊殺之初太祖皇帝命引汾水浸其城水自城門入而有積草自城中飄出塞之是時王師頓兵甘草地中會歲暑雨軍士多疾乃班師王師已去繼元決城下水注之臺駘澤水已落而城多摧圮契丹使者韓知璠時在太原歎曰王師之引水浸城也知其一而不知其二若先浸而後涸則幷人無類矣太平興國四年王師復北征繼元窮窘而幷人猶欲堅守其樞密副使馬峯老疾居于家舁入見繼元流涕以興亡諭之繼元乃降太宗皇帝御城北高臺受降以繼元為右衞上將軍封彭城公其後事具國史旻年世興滅諸書皆同自周廣順元年建號至皇朝太平興國四年滅凡二十八年餘具年譜注
