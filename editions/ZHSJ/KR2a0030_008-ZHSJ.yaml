body:
  text: 新五代史卷八晉本紀第八高祖聖文章武明德孝皇帝其父臬捩鷄本出於西夷自朱邪歸唐從朱邪入居陰山其後晉王李克用起於雲朔之間臬捩鷄以善騎射常從晉王征伐有功官至洺州刺史臬捩鷄生敬瑭其姓石氏不知得其姓之始也敬瑭為人沈厚寡言明宗愛之妻以女是為永寧公主由是常隸明宗帳下號左射軍莊宗已得魏梁將劉鄩急攻清平莊宗馳救之兵未及陣為鄩所掩敬瑭以十餘騎橫槊馳擊取之以旋莊宗拊其背而壯之手啗以酥啗酥夷狄所重由是名動軍中十五年莊宗戰于胡柳前鋒周德威戰死敬瑭以左射軍從明宗復擊敗梁兵明宗戰胡盧套楊村為梁兵所敗敬瑭常脫明宗於危趙在禮之亂明宗討之至魏而兵變明宗初欲自歸于天子明己所以不反者敬瑭獻計曰豈有軍變於外上將獨無事者乎且猶豫者兵家大忌不如速行願得騎兵三百先攻汴州夷門天下之要害也得之可以成事明宗然之與之驍騎三百渡黎陽為前鋒明宗遂入汴莊宗自洛後至不得入而兵皆潰去莊宗西還明宗以敬瑭為前鋒趣汜水且收其散卒莊宗遇弒明宗入立拜敬瑭保義軍節度使賜號竭忠建策興復功臣兼六軍諸衞副使在陝為政以廉聞是時諸侯多不奉法鄧州陶亳州李鄴皆以贓汙論死明宗下詔書褒廉吏普州安崇阮洺州張萬進耀州孫岳等以諷天下而以敬瑭為首天成二年十月從幸汴州為御營使拜宣武軍節度使侍衞親軍馬步軍都指揮使六軍副使如故改賜耀忠匡定保節功臣三年四月徙鎮天雄拜同中書門下平章事興唐尹五月拜駙馬都尉董璋反東川為行營都招討使不克而還復兼六軍諸衞副使徙鎮河陽三城未行而契丹吐渾突厥皆入寇是時秦王從榮統六軍敬瑭疑其必及禍不欲為其副乃自請行及制出不落副使輒復辭行明宗數責大臣問誰可行者范延光趙延壽等卒以敬瑭為請乃拜河東節度使大同彰國振武威塞等軍蕃漢馬步軍總管落六軍副使乃行明年明宗崩愍帝即位加中書令三月徙鎮成德清泰元年五月復鎮太原來朝京師潞王從珂反於鳳翔愍帝出奔遇敬瑭于道敬瑭殺帝從者百餘人幽帝于衞州而去廢帝即位疑敬瑭必反天福元年五月徙鎮天平敬瑭果不受命謂其屬曰先帝授吾太原使老焉今無故而遷是疑吾反也且太原地險而粟多吾當內檄諸鎮外求援於契丹可乎桑維翰劉知遠等共以為然乃上表論廢帝不當立請立許王從益為明宗嗣廢帝下詔削奪敬瑭官爵命張敬達等討之敬瑭求援於契丹九月契丹耶律德光入自鴈門與唐兵戰敬達大敗敬瑭夜出北門見耶律德光約為父子十一月丁酉皇帝即位國號晉以幽涿薊檀順瀛莫蔚朔雲應新媯儒武寰州入于契丹己亥大赦改元掌書記桑維翰為翰林學士尚書禮部侍郎知樞密使事於廢帝本紀書契丹立晉據所見也於此書皇帝即位以自立為文原其心也晉高祖之反無契丹之助亦必自立蓋其志在於為帝故使自任其惡也閏月丙寅翰林學士承旨尚書戶部侍郎趙瑩為門下侍郎桑維翰為中書侍郎同中書門下平章事兼樞密使甲戌趙德鈞及其子延壽叛于唐來降契丹宀元攵之以歸己卯次河陽節度使萇從簡叛于唐來降辛巳至自太原盧文紀姚顗罷甲申大赦殺張延朗劉延朗赦房暠是日廢帝由在十二月乙酉如河陽追降王從珂為庶人丁亥司空馮道兼門下侍郎同中書門下平章事己丑曹州指揮使石重立殺其刺史鄭玩辛卯御札求直言癸巳鎮州牙內都虞候祕瓊逐其節度副使李彥琦同州裨將門鐸殺其將楊漢賓庚子天平軍節度使王建立殺其副使李彥贇旱王從珂從晉人本語二年春正月癸亥安遠軍節度使盧文進叛降于吳丁卯天雄軍節度使范延光殺齊州防禦使祕瓊戊寅兵部侍郎李崧為中書侍郎同中書門下平章事樞密使封唐宗室子為公及隋酅公為二王後以周介公備三恪唐宗室子史失其名書之以見二王後三恪猶存不必著其人也二月丁酉契丹使皇太子解里來三月庚辰如汴州夏四月丁亥赦囚蠲民租賦趙瑩使于契丹辛卯宣武軍節度使楊光遠進助國錢契丹使宮苑使李可興來五月壬戌御札求直言丁丑追尊祖考為皇帝妣為皇后高祖璟謚曰孝安廟號靖祖祖妣秦氏謚曰孝安元曾祖郴謚曰孝簡廟號肅祖祖妣安氏謚曰孝簡恭祖昱謚曰孝平廟號睿祖祖妣來氏謚曰孝平獻考紹雍謚曰孝元廟號獻祖妣何氏謚曰孝元懿六月癸未契丹使夷離畢來天雄軍節度使范延光反丁酉傳箭于義成軍節度使符彥饒丁未楊光遠為魏府四面行營都部署東都巡檢張從賓反留守判官李遐死之奉國都指揮使侯益護聖都指揮使杜重威討之從賓寇河陽殺皇子重信寇河南殺皇子重乂秋七月從賓陷汜水關殺巡檢使宋廷浩壬子右衞大將軍尹暉叛奔于吳不克伏誅右監門衞大將軍婁繼英叛降于張從賓義成軍亂殺戍將侍衞馬步軍都指揮使白奉進甲寅戍將奉國指揮使馬萬執符彥饒歸于京師命殺之于赤岡乙卯楊光遠為魏府行營都招討使辛酉杜重威克汜水關壬申楊光遠克博州丙子安州屯防指揮使王暉殺其節度使周瓌右衞大將軍李金全討之彥饒雖有縱軍之罪被誣以反而見殺故不書誅曰命殺嫌萬擅殺張從賓投河死故不書伏誅金全未至而暉走見殺故不書暉反不書克安州不書伏誅八月丙申靜難軍節度使安叔千進添都馬乙巳赦非死罪囚及張從賓符彥饒王暉餘黨九月楊光遠進粟冬十月辛巳禁造甲兵三年春二月戊戌諸鎮皆進物以助國殘民以獻其上君臣同欲賄賂公行至此而不勝其多矣故總言諸鎮此後不復書矣三月壬戌回鶻可汗王仁美使翟全福來丁丑禁私造銅器秋七月辛酉以皇業錢作受命寶作寶不必書皇業錢者私錢也天子畜私錢故書八月戊寅馮道及左僕射劉昫為契丹冊禮使壬午澶州刺史馮暉降丙戌許御署官選己丑蠲水旱民稅辛丑歸伶官于契丹高祖以父事契丹其有所求不曰與而曰歸者若輸之也九月己酉赦范延光己未歸靜鞭官劉守威金吾勘契官王殷司天鷄叫學生殷暉于契丹于闐使馬繼榮來回鶻使李萬金來己巳赦魏州蠲民稅是月宣徽南院使劉處讓為樞密使初延光請降高祖不許延光遂堅壁攻之久不克卒悔而赦之故不書降冬十月戊寅契丹使中書令韓頰來奉冊曰英武明義皇帝庚辰升汴州為東京以洛陽為西京雍州為晉昌軍戊子右金吾衞大將軍馬從斌使于契丹己未契丹使梅里來戊戌大赦庚子封李聖天為大寶于闐國王十一月辛亥升廣晉府為鄴都壬戌除鑄錢令十二月丙子封子重貴為鄭王四年春正月盜發唐愍皇帝墓辛亥澶州防禦使張從恩為樞密副使旌表深州民李自倫門閭帝附于明宗徽陵域中無陵名故曰墓晉高祖即位追謚為愍皇帝五代諸帝謚號不可為法皆不足道惟愍帝宜書者嫌嘗降為鄂王也而國亡禮闕舊史實錄皆無奏謚上冊月日故雖當書而不得因事而見於此爾三月乙巳回鶻使其都督拽里敦來丙辰頒調元歷靈州戍將王彥忠以懷遠城反己未彥忠降供奉官齊延祚殺之夏四月辛巳封回鶻可汗王仁美為奉化可汗甲申廢樞密使秋七月丙辰復禁鑄錢閏月壬申桑維翰罷八月己亥朔河決博平西戎寇涇州彰義軍節度使張彥澤敗之執其首領野離羅蝦獨九月丁丑契丹使粘木孤來癸未封李從益為郇國公以奉唐後丙戌高麗王建使其廣評侍郎邢順來冬十一月乙亥立唐高祖太宗莊宗明宗愍帝廟于西京戊子契丹使遙折來吐蕃罷延族來附五年春正月丁卯朔德音除民公私債己丑回鶻使石海金來夏四月甲子契丹興化王來五月丙戌安遠軍節度使李金全叛附于唐六月癸卯李遣其將李承裕入于安州金全奔于唐安遠軍節度使馬全節及承裕戰敗之丁巳克安州承裕奔于雲夢全節執而殺之秋八月丁酉閱稼于西郊己未西京留守楊光遠殺太子太師范延光九月丁卯翰林學士承旨戶部侍郎和凝為中書侍郎同中書門下平章事辛巳閱稼于沙臺冬十月丁未契丹使舍利來十一月丙子冬至始用二舞六年春正月戊寅封唐叔虞為興安王臺駘為昌寧公二月戊申停買宴錢三月除民二年至四年以前稅見時斂重而民不堪夏四月己未契丹使述括來五月吐渾首領白承福來秋七月壬午突厥使薛同海來八月壬辰如鄴都開封尹鄭王重貴留守東京宣徽南院使張從恩東京內外兵馬都監壬寅大赦甲寅光祿卿張澄使于契丹九月乙亥前安國軍節度使楊彥詢使于契丹丁丑吐渾使白可久來河決中都入于沓河冬十月河決滑濮鄆澶州山南東道節度使安從進反十一月丁丑西京留守高行周為南面軍前都部署以討之十二月丙戌朔鄭王重貴為廣晉尹徙封齊王先鋒都指揮使郭金海及安從進戰于唐州敗之成德軍節度使安重榮反天平節度使杜重威為鎮州行營招討使丙申契丹遣使者來戊戌杜重威及安重榮戰于宗城敗之七年春正月丁巳克鎮州安重榮伏誅赦廣晉庚午契丹使達剌來三月歸德軍節度使安彥威塞決河于滑州閏月天興蝗食麥夏五月乙巳尊皇太妃劉氏為太后高祖所生母也六月丙辰吐渾使念醜漢來乙丑皇帝崩于保昌殿年五十一
