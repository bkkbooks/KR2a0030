body:
  text: 新五代史卷六唐本紀第六明宗聖德和武欽孝皇帝世本夷狄無姓氏父霓為鴈門部將生子邈佶烈以騎射事太祖為人質厚寡言執事恭謹太祖養以為子賜名嗣源梁攻兗鄆朱宣朱瑾來乞師太祖遣李存信將兵三萬救之存信留莘縣不進使嗣源別以兵三千先擊梁兵梁兵解去存信留莘縣久之為羅弘信所襲存信敗走嗣源獨殿而還太祖以嗣源所將騎五百號橫衝都光化三年李嗣昭攻梁邢洺出青山遇葛從周兵嗣昭大敗走梁兵追之嗣源從間道後至謂嗣昭曰為公一戰乃解鞍礪鏃憑高為陣左右指畫梁追兵望之莫測嗣源急呼曰吾取葛公士卒可無動乃馳騎犯之出入奮擊嗣昭繼進梁兵解去嗣源身中四矢太祖解衣賜藥以勞之由是李橫衝名重四方梁晉相拒于柏鄉梁龍驤軍以赤白馬為兩陣旗幟鎧仗皆如馬色晉兵望之皆懼莊宗舉鍾以飲嗣源曰卿望梁家赤白馬懼乎雖吾亦怯也嗣源笑曰有其表爾翌日歸吾廄也莊宗大喜曰卿當以氣吞之因引鍾飲釂奮檛馳騎犯其白馬挾二裨將而還梁兵敗以功拜代州刺史莊宗攻劉守光嗣源及李嗣昭將兵三萬別出飛狐定山後取武媯儒三州莊宗已平魏州因徇下磁相拜相州刺史昭德軍節度使久之徙鎮安國契丹攻幽州莊宗遣嗣源與閻寶等擊走之同光元年徙鎮橫海是時梁唐相拒于河上李繼韜以潞州叛降梁莊宗有憂色召嗣源帳中謂曰繼韜以上黨降梁而梁方急攻澤州吾出不意襲鄆州以斷梁右臂可乎嗣源對曰夾河之兵久矣苟非出奇則大計不決臣請獨當之乃以步騎五千涉濟至鄆州鄆人無備遂襲破之即拜天平軍節度使蕃漢馬步軍副都總管梁軍攻破德勝南柵莊宗退保楊劉王彥章急攻鄆州莊宗悉軍救之嗣源為前鋒擊梁軍追至中都擒彥章及梁監軍張漢傑彥章雖敗而段凝悉將梁兵屯河上莊宗未知所嚮諸將多言乘勝以取青齊嗣源曰彥章之敗凝猶未知使其聞之遲疑定計亦須三日縱使料吾所向亟發救兵必渡黎陽數萬之衆舟楫非一日具也此去汴州不數百里前無險阻方陣而行信宿可至汴州已破段凝豈足顧哉而郭崇韜亦勸莊宗入汴莊宗以為然遣嗣源以千騎先至汴州攻封丘門王瓚開門降莊宗後至見嗣源大喜手攬其衣以頭觸之曰天下與爾共之拜中書令二年莊宗祀天南郊賜以鐵券五月破楊立于潞州六月徙鎮宣武兼蕃漢內外馬步軍總管冬契丹侵漁陽嗣源敗之于涿州三年徙鎮成德莊宗幸鄴請朝行在不許貞簡太后疾請入省又不許太后崩請赴山陵許之而契丹侵邊乃止十二月遂朝于洛陽天成元年郭崇韜朱友謙皆以讒死嗣源以名位高亦見疑忌趙在禮反於魏大臣皆請遣嗣源討賊莊宗不許羣臣屢請莊宗不得已遣之實同光四年而書天成元年者大赦改元文見下可知莊宗本紀自書同光四年各從其所稱既曰改元不嫌二號也三月壬子嗣源至魏屯御河南在禮登樓謝罪甲寅軍變嗣源入于魏與在禮合夕出止魏縣丁巳以其兵南遣石敬瑭將三百騎為先鋒嗣源行過鉅鹿掠小坊馬二千匹以益軍壬申入汴州四月丁亥莊宗崩己丑入洛陽甲午監國朝羣臣于興聖宮乙未中門使安重誨為樞密使殺元行欽及租庸使孔謙壬寅左驍衞大將軍孔循為樞密使丙午始奠于西宮皇帝即位于柩前易斬縗以衮冕壬子魏王繼岌薨甲寅大赦改元渤海國王大諲譔使大陳林來是月張居翰罷曰始奠見其緩也自己丑入洛至此二十日矣柩前即位嗣君之禮也反逆之臣自立而用嗣君之禮書從其實而不變文者蓋先已書反正其罪矣此書其實者見其猶有自愧之心而欲逃大惡之名也既用嗣君之禮矣遽釋縗而服冕故書以見其情詐諸王薨不書此書者見明宗舉兵實反會從謙弒逆遂託赴難為名及即位時莊宗元子猶在則其辭屈矣五月丙辰朔太子賓客鄭王玉工部尚書任圜為中書侍郎同中書門下平章事戊辰趙在禮為義成軍節度使在禮始亂宜誅而明宗因之以反命以方鎮報其功也故書六月丁酉汴州控鶴軍亂指揮使張諫殺其權知州事高逖己亥諫伏誅秋七月庚申安重誨殺殿直馬延于御史臺門契丹使梅老述骨來渤海使大昭佐來己卯貶豆盧革為辰州刺史韋說州刺史甲申流革于陵州說于合州御史臺所以糾百官之不法殺人于臺門惡其甚八月乙酉朔陝州硤石縣民高存妻一產三男子丁酉以象笏三十二賜百官之無笏者閱稼于冷泉宮己亥契丹犯邊丁未平盧軍節度使霍彥威殺其登州刺史王公儼甲寅醫官張志忠為太原少尹是時朝廷衰弱之甚故書九月己未幸至德宮及袁建豐第冬十月丁亥雲南山後兩林百蠻都鬼主右武衞大將軍李卑晚使大鬼主傅能何華來辛丑契丹使沒骨餒來告阿保機哀廢朝三日旱辛亥雨二年春正月癸丑朔更名亶癸亥端明殿學士兵部侍郎馮道太常卿崔協為中書侍郎同中書門下平章事二月壬午朔新羅使張芬來西川節度使孟知祥殺其兵馬都監李嚴丙申赦京師囚郭從謙為景州刺史既而殺之戊戌山南東道節度使劉訓為南面招討使以伐荊南從謙弒君不討而命以官故書與在禮同罪宜誅而書殺者明宗亦同罪不得行誅故以兩相殺書之是時荊南自絕於中國而附吳不足以有罪不書討而書伐見非內臣不責其叛三月壬子朔幸會節園羣臣買宴盧臺亂殺其將烏震新羅使林彥來遊幸若不過度則小事也皆不書惟莊宗及晉出帝之世則書者著其過度耳明宗於五代為勤儉之君遊幸無過度此書以著買宴見君臣之失矣夏四月庚寅盧臺軍將龍晊等伏誅六月丙戌任圜罷庚子幸白司馬坡祭突厥神夷狄之事也秋七月甲子隨州刺史西方鄴取夔忠萬州癸酉殺豆盧革韋說八月乙酉牂牁使宋朝化及昆明使者來九月庚午党項使如連山來壬申契丹使梅老來冬十月乙酉如汴州宣武軍節度使朱守殷反馬步軍都指揮使馬彥超死之己丑守殷自殺乙未殺太子少保致仕任圜辛丑德音釋繫囚是月傳箭于霍彥威不書克汴州者天子自以兵討未嘗攻戰直入其城也佗自殺不書為書克州此不書克州故書自殺實安重誨矯詔殺之不書重誨殺者明宗知而不責又下詔書誣圜以罪故以明宗自殺書之夷狄之事也十一月乙亥契丹使梅老來十二月己丑回鶻西界吐蕃遣使者來甲辰畋于東郊丙午追尊祖考為皇帝妣為皇后高祖聿謚曰孝恭廟號惠祖祖妣劉氏謚曰孝恭昭曾祖敖謚曰孝質廟號毅祖祖妣張氏謚曰孝質順祖琰謚曰孝靖廟號烈祖祖妣何氏謚曰孝靖穆考謚曰孝成廟號德祖妣劉氏謚曰孝成懿立廟于應州三年春正月丁巳契丹陷平州二月辛巳吐渾都督李紹虜來乙未孔循罷戊戌回鶻使李阿山來三月丁未朔御札求直言己未鄭王玉罷癸亥成德軍節度使王建立為尚書右僕射同中書門下平章事西方鄴克歸州戊辰宣徽南院使范延光為樞密使夏四月戊寅延光罷乙酉達靼遣使者來義武軍節度使王都反壬寅歸德軍節度使王晏球為北面行營招討使五月契丹禿餒入于定州辛酉右衞上將軍趙敬怡為樞密使封回鶻可汗王仁裕為順化可汗秋七月己未殺齊州防禦使曹廷隱八月盧龍軍節度使趙德鈞執契丹首領愓隱赫邈慶州防禦使竇廷琬反冬十月靜難軍節度使李敬周討之丁巳突厥使張慕晉來十一月壬午吐渾使念九來甲午王建立罷十二月李敬周克慶州竇廷琬伏誅辛亥幸康義誠第四年春正月壬辰回鶻使掣撥都督來二月癸卯王晏球克定州辛酉晏球獻馘俘趙敬怡薨丁卯崔協薨庚午至自汴州王都自焚故不書伏誅三月丙戌殺姪從璨夏四月契丹寇雲州癸丑契丹使撩括梅里來求禿餒殺之甲寅端明殿學士尚書兵部侍郎趙鳳為門下侍郎兼工部尚書同中書門下平章事五月己巳朝羣臣賀朔乙酉追謚少帝曰昭宣光烈孝皇帝契丹寇雲州不曰視朝而曰賀朔著非禮視朝常事自不書爾五月賀朔出於道家之說自唐以來用之書之見亂世舉非禮之不急者此禮其後屢行皆不復書者與入閤同秋七月壬申殺右金吾衞上將軍毛璋八月乙巳黑水使骨至來丁未吐渾首領念公山來乙卯党項折遇明來己未高麗王建使張彬來九月癸巳殺供奉官烏昭遇冬十二月辛丑殺西平縣令李商長興元年春正月丁卯閱馬于苑辛卯宣徽南院使朱弘昭為大內留守二月戊戌黑水兀兒遣使者來乙巳天雄軍節度使石敬瑭為御營使癸丑朝獻于太微宮甲寅享于太廟乙卯有事于南郊大赦改元三月庚寅立淑妃曹氏為皇后夏四月戊戌安重誨使河中衙內指揮使楊彥溫逐其節度使從珂壬寅西京留守索自通侍衞步軍指揮使藥彥稠討之辛亥自通執彥溫殺之戊午羣臣上尊號曰聖明神武文德恭孝皇帝辛酉吐蕃首領于撥葛來彥溫雖有罪有命獲而勿殺自通擅殺之故不書誅而書殺五月丁丑回鶻使孽栗祖來庚辰回鶻使安黑連來秋七月壬午訪莊宗子孫瘞所莊宗子孫而不知瘞所見明宗舉兵不順禍害所罹者可哀也於此始求之見事緩而無恩也八月乙未忠武軍節度使張延朗為三司使壬寅殺捧聖都軍使李行德十將張儉滅其族吐渾來附封子從榮為秦王戊申海州將王傳極殺其刺史陳宣叛于吳來降乙卯吐渾康合畢來丙辰封子從厚為宋王三司使始於此而今遂因之九月壬戌吐蕃使王滿儒來東川節度使董璋反甲申成德軍節度使范延光為樞密使丁亥石敬瑭為東川行營都招討使冬十月丁酉始藏冰甲辰驍衞上將軍致仕張筠進助軍粟乙巳董璋陷閬州殺節度使李仁矩指揮使姚洪死之孟知祥反十一月庚申朔秦王從榮受冊謁于太廟丙戌契丹東丹王突欲來奔冊禮廢於亂世至此始一行之故書夷狄不可以禮義責故不曰叛于契丹十二月丁未二王後祕書丞酅國公楊仁矩卒廢朝一日丁巳回鶻順化可汗王仁裕使翟末斯來安重誨討董璋沙州曹義金遣使者來不命將名直以樞密使往二年春正月戊辰党項使折七移來庚辰達靼使列六薛孃居來二月丁酉幸安元信第戊戌突厥使杜阿熟吐渾使康萬琳來辛丑安重誨罷三月趙鳳罷丁亥太常卿李愚為中書侍郎同中書門下平章事夏四月甲辰宣徽北院使趙延壽為樞密使甲寅董璋陷遂州武信軍節度使夏魯奇死之乙卯以旱赦流罪以下囚閏五月丁酉殺太子太師致仕安重誨及其妻張氏子崇贊崇緒秋八月己未契丹使邪姑兒來九月丁亥放五坊鷹隼冬十一月戊申吐蕃遣使者來辛丑旌表棣州民邢釗門閭干戈之世王道息而禮義亡民猶有自知孝悌而時君旌表猶有勸民之意故兩善而書之十二月甲寅朔除鐵禁初稅農具錢己未西涼府遣使者來己巳回鶻使安求思來辛未渤海使文成角來党項寇方渠至今因之故書三年春正月庚子契丹使拽骨來己酉渤海回鶻皆遣使者來二月己卯靜難軍節度使藥彥稠及党項戰于牛兒谷敗之三月甲申契丹遣使者來夏四月庚申新羅遣使者來五月己丑二王後詹事司直楊延紹襲封酅國公丙午孟知祥攻董璋陷綿州六月甲寅封王建為高麗國王大義軍使孟知祥殺董璋陷東川達靼首領頡哥以其族來附秋八月己卯吐蕃遣使者來冬十月庚申幸石敬瑭第四年春正月庚寅端明殿學士兵部侍郎劉昫為中書侍郎同中門下平章事二月戊午孟知祥使朱滉來十國外而不書此書者知祥本唐臣而反至此改過自歸絕之則嫌不許其自新錄之則尚冀其遷善然其來也臣禮不備故如夷狄書之三月甲辰追冊晉國夫人夏氏為皇后夏五月戊寅封子從珂為潞王從益許王姪從溫兗王從璋洋王從敏涇王丙戌契丹使述骨卿來從珂非子而書子與梁博王友文同秋七月乙未回鶻都督李末來獻白鶻命放之八月戊申大赦九月戊戌趙延壽罷山南東道節度使朱弘昭為樞密使冬十月庚申范延光罷三司使馮贇為樞密使壬申幸士和亭得疾書得疾為從榮事詳之十一月壬辰秦王從榮以兵入興聖宮不克伏誅乙未侍衞親軍都指揮使康義誠殺三司使孫岳戊戌皇帝崩于雍和殿君病不侍疾以兵求立罪當誅故書伏誅其意以謂帝崩矣懼不得立而舉兵自助非反故不書反年六十七清泰元年葬河南洛陽縣號徽陵雖得其死而為賊所葬故亦不書葬嗚呼自古治世少而亂世多三代之王有天下者皆數百年其可道者數君而已況於後世邪況於五代邪予聞長老為予言明宗雖出夷狄而為人純質寬仁愛人於五代之君有足稱也嘗夜焚香仰天而祝曰臣本蕃人豈足治天下世亂久矣願天早生聖人自初即位減罷宮人伶官廢內藏庫四方所上物悉歸之有司廣壽殿火灾有司理之請加丹雘喟然歎曰天以火戒我豈宜增以侈邪歲嘗旱已而雪暴坐庭中詔武德司宮中無掃雪曰此天所以賜我也數問宰相馮道等民間疾苦聞道等言穀帛賤民無疾疫則欣然曰吾何以堪之當與公等作好事以報上天吏有犯贓輒寘之死曰此民之蠹也以詔書褒廉吏孫岳等以風示天下其愛人恤物蓋亦有意於治矣其即位時春秋已高不邇聲色不樂遊畋在位七年於五代之君最為長世兵革粗息年屢豐登生民實賴以休息然夷狄性果仁而不明屢以非辜誅殺臣下至於從榮父子之間不能慮患為防而變起倉卒卒陷之以大惡帝亦由此飲恨而終當是時大理少卿康澄上疏言時事其言曰為國者有不足懼者五深可畏者六三辰失行不足懼天象變見不足懼小人訛言不足懼山崩川竭不足懼水旱蟲蝗不足懼也賢士藏匿深可畏四民遷業深可畏上下相徇深可畏廉恥道消深可畏毀譽亂真深可畏直言不聞深可畏也識者皆多澄言切中時病若從榮之變任圜安重誨等之死可謂上下相徇而毀譽亂真之敝矣然澄之言豈止一時之病凡為國者可不戒哉
