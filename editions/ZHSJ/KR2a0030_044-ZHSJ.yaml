body:
  text: 新五代史卷四十四雜傳第三十二劉知俊劉知俊字希賢徐州沛人也少事時溥溥與梁相攻知俊與其麾下二千人降梁太祖以為左開道指揮使知俊姿貌雄傑能被甲上馬輪劍入敵勇出諸將當是時劉開道名重軍中歷海懷鄭三州刺史從破青州以功表匡國軍節度使邠州楊崇本以兵六萬攻雍州屯于美原是時太祖方與諸將攻滄州知俊不俟命與康懷英等擊敗崇本斬馘二萬獲馬三千匹執其偏裨百人李思安為夾城攻潞州久不下太祖罷思安拜知俊行營招討使未至潞夾城已破徙西路行營招討使敗邠岐兵於幕谷是時延州高萬興叛楊崇本降梁太祖遣知俊會萬興攻下丹延鄜坊四州加檢校太尉兼侍中封大彭郡王知俊功益高太祖性多猜忌屢殺諸將王重師無罪見殺知俊益懼不自安太祖已下鄜坊遣知俊復攻邠州知俊以軍食不給未行太祖幸河中使宣徽使王殷召知俊其弟知浣為親軍指揮使間遣人告知俊以不宜來知俊遂叛臣於李茂貞以兵攻雍華執劉捍送于鳳翔太祖使人謂知俊曰朕待卿至矣何相負邪知俊報曰王重師不負陛下而族滅臣非背德但畏死爾太祖復使語曰朕固知卿以此吾誅重師乃劉捍誤我致卿至此吾豈不恨之邪今捍已死未能塞責知俊不報以兵斷潼關太祖遣劉鄩牛存節攻知俊知俊遂奔于茂貞茂貞地狹無以處之使之西攻靈武韓遜告急太祖遣康懷英寇彥卿等攻邠寧以牽之知俊大敗懷英於昇平殺梁將許從實茂貞大喜以知俊為涇州節度使使攻興元取興鳳圍西縣已而茂貞左右忌知俊功以事間之茂貞奪其軍知俊乃奔于蜀王建以為武信軍節度使使返攻茂貞取秦鳳階成四州建雖待知俊甚厚然亦陰忌其材嘗謂左右曰吾老矣吾且死知俊非爾輩所能制不如早圖之而蜀人亦共嫉之知俊為人色黑而其生歲在丑建之諸子皆以宗承為名乃於里巷構為謠言曰黑牛出圈繩斷建益惡之遂見殺丁會丁會字道隱壽州壽春人也少工挽喪之歌尤能悽愴其聲以自喜後去為盜與梁太祖俱從黃巢梁太祖鎮宣武以為宣武都押衙光啟四年東都張全義襲破河陽逐李罕之罕之召晉兵圍河陽全義告急是時梁軍在魏乃遣會及葛從周等將萬人救之會等行至河陰謀曰罕之料吾不敢渡九鼎以吾兵少而來遠且不虞吾之速至也出其不意掩其不備者兵家之勝策也乃渡九鼎直趨河陽戰于沇水罕之大敗河陽圍解大順元年梁軍擊魏會及葛從周破黎陽臨河遂敗羅弘信于內黃梁軍攻時溥於徐州遣會別攻宿州刺史張筠閉城距守會堰汴水浸其東城壞筠降兗州朱瑾以兵萬餘擊單父會及瑾戰于金鄉大敗之光化二年李罕之叛晉以潞州降梁會自河陽攻晉澤州下之乃以會為昭義軍留後會畏梁太祖雄猜常稱疾者累年天復元年太祖復起會為昭義軍節度使昭宗遇弒會與三軍縞素發哀梁軍攻燕滄州燕王守光乞師于晉晉人為攻潞州會乃降晉晉王以會歸于太原賜以甲第位在諸將上莊宗立以會為都招討使天祐七年以疾卒于太原唐興追贈太師賀德倫賀德倫河西人也少為滑州牙將梁太祖兼領宣義德倫從太祖征伐以功累遷平盧軍節度使貞明元年魏州楊師厚卒末帝以魏兵素驕難制乃分相澶衞三州建昭德軍以張筠為節度使魏博貝三州仍為天雄軍以德倫為節度使遣劉鄩以兵六萬渡河聲言攻鎮定王彥章以騎兵五百入魏州屯金波亭以虞變分魏牙兵之半入昭德租庸使遣孔目吏閱魏兵籍檢校府庫德倫促牙兵上道牙兵親戚相訣別哭聲盈塗効節軍將張彥謀於其衆曰朝廷以我軍府彊盛設法殘破之況我六州舊為藩府未嘗遠出河門一旦離親戚去鄉里生不如死乃相與夜攻金波亭彥章走出遲明魏兵攻牙城殺五百餘人執德倫致之樓上縱兵大掠末帝遣供奉官扈異馳至魏諭彥許以刺史彥謂異曰為我報皇帝三軍不負朝廷朝廷負三軍割隸無名所以亂耳但以六州還魏而詔劉鄩反兵皇帝可以高枕異還言彥狂蹶不足畏宜促鄩兵擊之末帝使人諭彥以制置已定不可復易使者三反彥怒曰傭保兒敢如是邪乃召羅紹威故吏司空頲曰為我作奏若復依違則渡河虜之耳末帝優詔答之言王鎔死鎮人請降遣鄩以兵定鎮州非有佗也若魏不便之即召鄩還戒彥勿為朝廷生事彥乃以楊師厚鎮魏州嘗帶招討使逼德倫論列之末帝不許諭以詔書彥裂詔書抵于地曰愚主聽人穿鼻難與共事矣乃迫德倫降晉德倫惶恐曰惟將軍命乃遣牙將曹廷隱奉書莊宗莊宗入魏德倫以彥逼己遣人陰訴於莊宗莊宗斬彥於臨清而後入徙德倫為大同軍節度使行至太原監軍張承業留之王檀攻太原德倫麾下多奔檀承業懼德倫為變殺之閻寶閻寶字瓊美鄆州人也少為朱瑾牙將瑾走淮南寶降於梁梁太祖時為諸軍都虞候常從諸將征伐未嘗獨立戰功至末帝時以寶為保義軍節度使貞明元年賀德倫以魏博降晉晉軍攻下洺磁相衞移兵圍邢州末帝遣捉生都指揮使張溫將五百騎救寶溫至內黃遇晉軍乃降晉晉遣溫將所降梁軍至城下招寶寶遂降晉晉王拜寶檢校太尉同中書門下平章事領天平軍節度使東南面招討使位在諸將上梁晉戰胡柳晉軍敗莊宗欲引兵退保臨濮寶曰夫決勝料勢決戰料情情勢既得斷在不疑今梁兵窘蹙其勢可破勝而驕怠其情可知此不可失之時也莊宗謝曰微公幾敗吾事乃整軍復戰遂敗梁兵十八年晉軍討張文禮於鎮州以寶為招討使明年三月寶戰敗退保趙州慚憤發疽卒追贈太師晉天福中追封太原王康延孝康延孝代北人也為太原軍卒有罪亡命于梁末帝遣段凝軍于河上以延孝為左右先鋒指揮使延孝見梁末帝任用羣小知其必亡乃以百騎奔于唐見莊宗于朝城莊宗解御衣金帶以賜之拜延孝博州刺史捧日軍使兼南面招討指揮使莊宗屏人問延孝梁事延孝具言末帝懦弱趙巖婿也張漢傑婦家皆用事段凝姦邪以入金多為大將自其父時故將皆出其下王彥章驍將也遣漢傑監其軍而制之小人進任而忠臣勇士皆見疎斥此其必亡之勢也莊宗又問梁計如何曰臣在梁時竊聞其議期以仲冬大舉遣董璋以陝虢澤潞之衆出石會以攻太原霍彥威以關西汝洛之兵掠邢洺以趨鎮定王彥章以京師禁衞擊鄆州段凝以河上之軍當陛下莊宗初聞延孝言梁必亡喜及聞其大舉也懼曰其將何以禦之延孝曰梁兵雖衆分則無餘臣請待其既分以鐵騎五千自鄆趨汴出其不意擣其空虛不旬日天下定矣莊宗甚壯其言後董璋等雖不出兵而梁兵悉屬段凝于河上京師無備莊宗卒用延孝策自鄆入汴凡八日而滅梁以功拜鄭州防禦使賜姓名曰李紹琛二年遷保義軍節度使三年征蜀以延孝為先鋒排陣斬斫使破鳳州取固鎮降興州與王衍戰三泉衍敗走斷吉柏江浮橋延孝造舟以渡進取綿州衍復斷綿江浮橋延孝謂招撫使李嚴曰吾遠軍千里入人之國利在速戰乘衍破膽之時但得百騎過鹿頭關彼將迎降不暇若修繕橋梁必留數日使衍得閉關為備則勝負未可知也因與嚴乘馬浮江軍士隨之濟者千餘人遂入鹿頭關下漢州居三日後軍始至衍弟宗弼果以蜀降延孝屯漢州以俟魏王繼岌蜀平延孝功為多左廂馬步軍都指揮使董璋位在延孝下然特見重於郭崇韜崇韜有軍事獨召璋與計議而不問延孝延孝大怒責璋曰吾有平蜀之功公等僕相從反俛首郭公之門吾為都將獨不能以軍法斬公邪璋訴于崇韜崇韜解璋軍職表為東川節度使延孝愈怒曰吾冒白刃犯險阻以定兩川璋有何功而得旄節因見崇韜言其不可崇韜曰紹琛反邪敢違吾節度延孝懼而退明年崇韜死延孝謂璋曰公復俛首何門邪璋求哀以免繼岌班師命延孝以萬二千人為殿行至武連聞朱友謙無罪見殺友謙有子令德在遂州莊宗遣使者詔繼岌即誅之繼岌不遣延孝而遣董璋延孝已自疑及璋過延孝軍又不謁延孝大怒謂其下曰南平梁西取蜀其謀盡出於郭公而汗馬之勞攻城破敵者我也今郭公已死我豈得存而友謙與我俱背梁以歸唐者友謙之禍次及我矣延孝部下皆友謙舊將知友謙被族皆號哭訴于軍門曰朱公無罪二百口被誅舊將往往從死我等死必矣延孝遂擁其衆自劍州返入蜀自稱西川節度三川制置等使馳檄蜀人數日之間衆至五萬繼岌遣任圜以七千騎追之及于漢州會孟知祥夾攻之延孝戰敗被擒載以檻車圜置酒軍中引檻車至坐上知祥酌大巵從車中飲之而謂曰公自梁朝脫身歸命遂擁節旄今平蜀之功何患富貴而入此檻車邪延孝曰郭崇韜佐命之臣功在第一兵不血刃而取兩川一旦無罪闔門受戮顧如延孝何保首領以此不敢歸朝耳任圜東還延孝檻車至鳳翔莊宗遣宦者殺之
