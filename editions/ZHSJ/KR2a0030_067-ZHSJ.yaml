body:
  text: 新五代史卷六十七吳越世家第七錢鏐子元瓘元瓘子佐佐弟俶錢鏐字具美杭州臨安人也臨安里中有大木鏐幼時與羣兒戲木下鏐坐大石指麾羣兒為隊伍號令頗有法羣兒皆憚之及壯無賴不喜事生業以販鹽為盜縣錄事鍾起有子數人與鏐飲博起嘗禁其諸子諸子多竊從之遊豫章人有善術者望牛斗間有王氣牛斗錢塘分也因遊錢塘占之在臨安乃之臨安以相法隱市中陰求其人起與術者善術者私謂起曰占君縣有貴人求之市中不可得視君之相貴矣然不足當之起乃為置酒悉召賢豪為會陰令術者徧視之皆不足當術者過起家鏐適從外來見起反走術者望見之大驚曰此真貴人也起笑曰此吾旁舍錢生爾術者召鏐至熟視之顧起曰君之貴者因此人也乃慰鏐曰子骨法非常願自愛因與起訣曰吾求其人者非有所欲也直欲質吾術爾明日乃去起始縱其子等與鏐遊時時貸其窮乏鏐善射與槊稍通圖緯諸書唐乾符二年浙西裨將王郢作亂石鑑鎮將董昌募鄉兵討賊表鏐偏將擊郢破之是時黃巢衆已數千攻掠浙東至臨安鏐曰今鎮兵少而賊兵多難以力禦宜出奇兵邀之乃與勁卒二十人伏山谷中巢先鋒度險皆單騎鏐伏弩射殺其將巢兵亂鏐引勁卒蹂之斬首數百級鏐曰此可一用爾大衆至何可敵邪乃引兵趨八百里八百里地名也告道旁媼曰後有問者告曰臨安兵屯八百里矣巢衆至聞媼語不知其地名曰嚮十餘卒不可敵況八百里乎遂急引兵過都統高駢聞巢不敢犯臨安壯之召董昌與鏐俱至廣陵久之駢無討賊意昌等不見用辭還駢表昌杭州刺史是時天下已亂昌乃團諸縣兵為八都以鏐為都指揮使成及為靖江都將中和二年越州觀察使劉漢宏與昌有隙漢宏遣其弟漢宥都虞候辛約屯兵西陵鏐率八都兵渡江竊取軍號斫其營營中驚擾因焚之漢宥等皆走漢宏復遣將黃珪何肅屯諸暨蕭山鏐皆攻破之與漢宏遇戰大敗之殺何肅辛約漢宏易服持膾刀以遯追者及之漢宏曰我宰夫也舉刀示之乃免四年僖宗遣中使焦居璠為杭越通和使詔昌及漢宏罷兵皆不奉詔漢宏遣其將朱褒韓公玫施堅實等以舟兵屯望海鏐出平水成及夜率奇兵破褒等於曹娥埭進屯豐山施堅實等降遂攻破越州漢宏走台州台州刺史執漢宏送於鏐斬于會稽族其家鏐乃奏昌代漢宏而自居杭州光啟三年拜鏐左衞大將軍杭州刺史昌越州觀察使是歲畢師鐸囚高駢淮南大亂六合鎮將徐約攻取蘇州潤州牙將劉浩逐其帥周寶寶奔常州浩推度支催勘官薛朗為帥鏐遣都將成及杜稜等攻常州取周寶以歸鏐具軍禮郊迎館寶於樟亭寶病卒稜等進攻潤州逐劉浩執薛朗剖其心以祭寶然後遣其弟銶攻徐約約敗走入海追殺之昭宗拜鏐杭州防禦使是時楊行密孫儒爭淮南與鏐戰蘇常間久之儒為行密所殺行密據淮南取潤州鏐亦取蘇常唐升越州威勝軍以董昌為節度使封隴西郡王杭州武勝軍拜鏐都團練使以成及為副使及字弘濟與鏐同事攻討謀多出於及而鏐以女妻及子仁琇鏐乃以杜稜阮結顧全武等為將校沈崧皮光業林鼎羅隱為賓客景福二年拜鏐鎮海軍節度使潤州刺史乾寧元年加同中書門下平章事二年越州董昌反昌素愚不能決事臨民訟以骰子擲之而勝者為直妖人應智王溫巫韓媼等以妖言惑昌獻鳥獸為符瑞牙將倪德儒謂昌曰曩時謠言有羅平鳥主越人禍福民間多圖其形禱祠之視王書名與圖類因出圖以示昌昌大悅乃自稱皇帝國號羅平改元順天分其兵為兩軍中軍衣黃外軍衣白銘其衣曰歸義副使黃竭切戒昌以為不可昌大怒使人斬竭持其首至罵曰此賊負我好聖明時三公不肯作乃自求死邪投之圊中昌乃以書告鏐鏐以昌反狀聞昭宗下詔削昌官爵封鏐彭城郡王浙江東道招討使鏐曰董氏於吾有恩不可遽伐以兵三萬屯迎恩門遣其客沈滂諭昌使改過昌以錢二百萬犒軍執應智等送軍中自請待罪鏐乃還兵昌復拒命遣其將陳郁崔溫等屯香嚴石侯乞兵於楊行密行密遣安仁義救昌鏐遣顧全武攻昌斬崔溫昌所用諸將徐珣湯臼袁邠皆庸人不知兵遇全武輒敗昌兄子真驍勇善戰全武等攻之逾年不能克真與其裨將刺羽有隙羽譖之昌殺真兵乃敗全武執昌歸杭州行至西小江昌顧左右曰吾與錢公俱起鄉里吾嘗為大將今何面復見之乎左右相對泣下因瞋目大呼投水死昭宗以宰相王溥鎮越州溥請授鏐乃改威勝軍為鎮東軍拜鏐鎮海鎮東軍節度使加檢校太尉中書令賜鐵券恕九死鏐如越州受命還治錢塘號越州為東府光化元年移鎮海軍於杭州加鏐檢校太師改鏐鄉里曰廣義鄉勳貴里鏐素所居營曰衣錦營婺州刺史王壇叛附于淮南楊行密遣其將康儒應壇因攻睦州鏐遣其弟銶敗儒於軒渚壇奔宣州昭宗詔鏐圖形凌煙閣升衣錦營為衣錦城石鑑山曰衣錦山大官山曰功臣山鏐游衣錦城宴故老山林皆覆以錦號其幼所嘗戲大木曰衣錦將軍天復二年封鏐越王鏐巡衣錦城武勇右都指揮使徐綰與左都指揮使許再思叛焚掠城郭攻內城鏐子傳瑛及其將馬綽陳為等閉門拒之鏐歸至北郭門不得入成及代鏐與綰戰斬首百餘級綰屯龍興寺鏐微服踰城而入遣馬綽王榮杜建徽等分屯諸門使顧全武備東府全武曰東府不足慮可慮者淮南爾綰急必召淮兵至患不細矣楊公大丈夫今以難告必能閔我鏐以為然全武曰獨行事必不濟請擇諸公子可行者鏐曰吾嘗欲以元婚楊氏乃使隨全武如廣陵綰果召田頵於宣州全武等至廣陵行密以女妻元亟召頵還頵取鏐錢百萬質鏐子元瓘而歸天祐元年封鏐吳王鏐建功臣堂立碑紀功列賓佐將校名氏於碑陰者五百人四年升衣錦城為安國衣錦軍梁太祖即位封鏐吳越王兼淮南節度使客有勸鏐拒梁命者鏐笑曰吾豈失為孫仲謀邪遂受之太祖嘗問吳越進奏吏曰錢鏐平生有所好乎吏曰好玉帶名馬太祖笑曰真英雄也乃以玉帶一匣打毬御馬十匹賜之江西危全諷等為楊渥所敗信州危仔倡奔於鏐鏐惡其姓改曰元開平二年加鏐守中書令改臨安縣為安國縣廣義鄉為衣錦鄉三年加守太保楊渥將周本陳章圍蘇州鏐遣其弟鋸鏢救之淮兵為水柵環城以銅鈴繫網沈水中斷潛行者水軍卒司馬福多智而善水行乃先以巨竹觸網淮人聞鈴聲遂舉網福乃過入城中其出也亦然乃取其軍號內外夾攻號令相應淮人以為神遂大敗之本等走擒其將閭丘直何明等四年鏐游衣錦軍作還鄉歌曰三節還鄉兮掛錦衣父老遠來相追隨牛斗無孛人無欺吳越一王駟馬歸乾化元年加鏐守尚書令兼淮南宣潤等道四面行營都統立生祠於衣錦軍鏐弟鏢居湖州擅殺戍將潘長懼罪奔于淮南二年梁郢王友珪立冊尊鏐尚父末帝貞明三年加鏐天下兵馬都元帥開府置官屬四年楊隆演取虔州鏐始由海路入貢京師龍德元年賜鏐詔書不名唐莊宗入洛鏐遣使貢獻求玉冊莊宗下其議於有司羣臣皆以謂非天子不得用玉冊郭崇韜尤為不可既而許之乃賜鏐玉冊金印鏐因以鎮海等軍節度授其子元瓘自稱吳越國王更名所居曰宮殿府曰朝官屬皆稱臣起玉冊金券詔書三樓於衣錦軍遣使冊新羅渤海王海中諸國皆封拜其君長明宗即位安重誨用事鏐致書重誨書辭嫚重誨大怒是時供奉官烏昭遇韓玫使吳越既還玫誣昭遇稱臣舞蹈重誨乃奏削鏐王爵元帥尚父以太帥致仕元瓘等遣人以絹表間道自陳安重誨死明宗乃復鏐官爵長興三年鏐卒年八十一謚曰武肅子元瓘立元瓘字明寶少為質於田頵頵叛於吳楊行密會越兵攻之頵每戰敗歸即欲殺元瓘頵母嘗蔽護之後頵將出語左右曰今日不勝必斬錢郎是日頵戰死元瓘得歸鏐臥病召諸大將告之曰吾子皆愚懦不足任後事吾死公等自擇之諸將泣下皆曰元瓘從王征伐最有功諸子莫及請立之鏐乃出筦鑰數篋召元瓘與之曰諸將許爾矣鏐卒元瓘立襲封吳越國王玉冊金印皆如鏐故事王延政自立於建州閩中大亂元瓘遣其將仰詮薛萬忠等攻之逾年大敗而歸元瓘亦善撫將士好儒學善為詩使其國相沈崧置擇能院選吳中文士錄用之然性尤奢僭好治宮室天福六年杭州大火燒其宮室迨盡元瓘避之火輒隨發元瓘大懼因病狂是歲卒年五十五謚曰文穆子佐立佐字祐立時年十三諸將皆少佐佐初優容之諸將稍不法佐乃黜其大將章德安於明州李文慶於睦州殺內都監杜昭達統軍使闞璠由是國中皆畏恐王延羲延政兄弟相攻卓儼明朱文進李仁達等自相篡殺連兵不解者數年仁達附于李景已而又叛景兵攻之仁達求救於佐佐召諸將計事諸將皆不欲行佐奮然曰吾為元帥而不能舉兵邪諸將吾家素畜養獨不肯以身先我乎有異吾議者斬乃遣其統軍使張筠趙承泰等率兵三萬水陸赴之遣將誓軍號令齊整筠等大敗景兵俘馘萬計獲其將楊業蔡遇等遂取福州而還由是諸將皆服佐立七年襲封吳越國王玉冊金印皆如元瓘開運四年佐卒年二十謚曰忠獻弟俶立椒字文德佐卒弟倧以次立初元瓘質於宣州以胡進思戴惲等自隨元瓘立用進思等為大將佐既年少進思以舊將自待甚見尊禮及倧立頗卑侮之進思不能平倧大閱兵於碧波亭方第賞進思前諫以賞太厚倧怒擲筆水中曰以物與軍士吾豈私之何見咎也進思大懼歲除畫工獻鍾馗擊鬼圖倧以詩題圖上進思見之大悟知倧將殺己是夕擁衞兵廢倧囚於義和院迎俶立之遷倧于東府俶歷漢周襲封吳越國王賜玉冊金印世宗征淮南詔俶攻常宣二州以牽李景俶治國中兵以待景聞周師將大舉乃遣使安撫境上皆戒嚴蘇州候吏陳滿不知景使以謂朝廷已克諸州遣使安撫矣亟言於俶請舉兵以應俶相國吳程遽調兵以出相國元德昭以為王師必未渡淮與程爭於俶前不可奪程等攻常州果為景將柴克宏所敗程裨將邵可遷力戰可遷子死馬前猶戰不顧程等僅以身免周師渡淮俶乃盡括國中丁民益兵使邵可遷等以戰船四百艘水軍萬七千人至于通州以會期吳越自唐末有國而楊行密李據有江淮吳越貢賦朝廷遣使皆由登萊泛海歲常飄溺其使顯德四年詔遣左諫議大夫尹日就吏部郎中崔頌等使于俶世宗諭之曰朕此行決平江北卿等還當陸來也五年王師征淮正月克靜海軍而日就等果陸還世宗已平淮南遣使賜俶兵甲旗幟橐駝羊馬錢氏兼有兩浙幾百年其人比諸國號為怯弱而俗喜淫侈偷生工巧自鏐世常重斂其民以事奢僭下至鷄魚卵鷇必家至而日取每笞一人以責其負則諸案史各持其簿列于廷凡一簿所負唱其多少量為笞數以次唱而笞之少者猶積數十多者至笞百餘人尤不勝其苦又多掠得嶺海商賈寶貨當五代時常貢奉中國不絕及世宗平淮南宋興荊楚諸國相次歸命俶勢益孤始傾其國以事獻太祖皇帝時俶嘗來朝厚禮遣還國俶喜益以器服珍奇為獻不可勝數太祖曰此吾帑中物爾何用獻為太平興國三年詔俶來朝俶舉族歸于京師國除其後事具國史嗚呼天人之際為難言也非徒自古術者好奇而幸中至於英豪草竊亦多自託於妖祥豈其欺惑愚衆有以用之歟蓋其興也非有功德漸積之勤而黥髠盜販倔起於王侯而人亦樂為之傳歟考錢氏之始終非有德澤施其一方百年之際虐用其人甚矣其動於氣象者豈非其孽歟是時四海分裂不勝其暴又豈皆然歟是皆無所得而推歟術者之言不中者多而中者少而人特喜道其中者歟鏐世興滅諸書皆同蓋自唐乾寧二年為鎮海鎮東軍節度使兼有兩浙至皇朝太平興國三年國除凡八十四年
