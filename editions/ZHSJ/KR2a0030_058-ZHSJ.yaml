body:
  text: 新五代史卷五十八嗚呼五代禮樂文章吾無取焉其後世有欲知之者不可以遺也作司天職方考司天考第一司天掌日月星辰之象周天一歲四時二十四氣七十二候行十日十二辰以為曆而謹察其變者以為占占者非常之兆也以驗吉凶以求天意以覺人事其術藏於有司曆者有常之數也以推寒暑以先天道以勉人事其法信於天下術有時而用法不可一日而差差之毫釐則亂天人之序乖百事之時蓋有國之所重也然自堯命羲和見於書中星閏餘略存其大法而三代中間千有餘歲遺文曠廢六經無所述而孔子之徒亦未嘗道也至於後世其學一出於陰陽之家其事則重其學則末夫天人之際遠哉微矣而使一藝之士布算積分上求數千萬歲之前必得甲子朔旦夜半冬至而日月五星皆會于子謂之上元以為曆始蓋自漢而後其說始詳見於世其源流所自止於如此是果堯舜三代之法歟皆不可得而考矣然自是以來曆家之術雖世多不同而未始不本於此五代之初因唐之故用崇玄曆至晉高祖時司天監馬重績始更造新曆不復推古上元甲子冬至七曜之會而起唐天寶十四載乙未為上元用正月雨水為氣首初唐建中時術者曹士蒍始變古法以顯慶五年為上元雨水為歲首號符天曆然世謂之小曆祇行於民間而重績乃用以為法遂施于朝廷賜號調元曆然行之五年輒差不可用而復用崇玄曆周廣順中國子博士王處訥私撰明玄曆于家民間又有萬分曆而蜀有永昌曆正象曆南唐有齊政曆五代之際曆家可考見者止於此而調元曆法既非古明玄又止藏其家萬分止行於民間其法皆不足紀而永昌正象齊政曆皆止用於其國今亦亡不復見世宗即位外伐僭叛內修法度端明殿學士王朴通於曆數乃詔朴撰定歲餘朴奏曰臣聞聖人之作也在乎知天人之變者也人情之動則可以言知之天道之動則當以數知之數之為用也聖人以之觀天道焉歲月日時由斯而成陰陽寒暑由斯而節四方之政由斯而行夫為國家者履端立極必體其元布政考績必因其歲禮動樂舉必正其朔三農百工必順其時五刑九伐必順其氣庶務有為必從其日月是以聖人受命必治曆數故五紀有常度庶徵有常應正朔行之於天下也自唐之季凡歷數朝亂日失天垂將百載天之曆數汨陳而已陛下順考古道寅畏上天咨詢庶官振舉墜典臣雖非能者敢不奉詔乃包萬象以為法齊七政以立元測圭箭以候氣審朓朒以定朔明九道以步月校遲疾以推星考黃道之斜正辨天勢之昇降而交蝕詳焉夫立天之道曰陰與陽陰陽各有數合則化成矣陽之策三十六陰之策二十四奇偶相命兩陽三陰同得七十二同則陰陽之數合七十二者化成之數也化成則謂之五行之數五之得朞數過之者謂之氣盈不及者謂之朔虛至於應變分用無所不通故以七十二為經法經者常用之法也百者數之節也隨法進退不失舊位故謂之通法以通法進經法得七千二百謂之統法自元入經先用此法統曆之諸法也以通法進統法得七十二萬氣朔之下收分必盡謂之全率以通法進全率得七千二百萬謂之大率而元紀生焉元者歲月日時皆甲子日月五星合在子當盈縮先後之中所謂七政齊矣古者植圭於陽城以其近洛也蓋尚慊其中乃在洛之東偏開元十二年遣使天下候影南距林邑北距橫野中得浚儀之岳臺應南北弦居地之中大周建國定都於汴樹圭置箭測岳臺晷漏以為中數晷漏正則日之所至氣之所應得之矣日月皆有盈縮日盈月縮則後中而朔月盈日縮則先中而朔自古朓朒之法率皆平行之數入曆既有前次而又衰稍不倫皇極舊術則迂迴而難用降及諸曆則疎遠而多失今以月離朓朒隨曆校定日躔朓朒臨用加減所得者入離定日也一日之中分為九限每限損益衰稍有倫朓朒之法可謂審矣赤道者天之紘帶也其勢圜而平紀宿度之常數焉黃道者日軌也其半在赤道內半在赤道外去極二十四度當與赤道近則其勢斜當與赤道遠則其勢直當斜則日行宜遲當直則日行宜速故二分前後加其度二至前後減其度九道者月軌也其半在黃道內半在黃道外去極遠六度出黃道謂之正交入黃道謂之中交若正交在秋分之宿中交在春分之宿則比黃道益斜若正交在春分之宿中交在秋分之宿則比黃道反直若正交中交在二至之宿則其勢差斜故校去二至二分遠近以考斜正乃得加減之數自古雖有九道之說蓋亦知而未詳徒有祖述之文而無推步之用今以黃道一周分為八節一節之中分為九道盡七十二道而使日月無所隱其斜正之勢焉九道之法可謂明矣星之行也近日而疾遠日而遲去日極遠勢盡而留自古諸曆分段失實隆降無準今日行分尚多次日便留自留而退惟用平行仍以入段行度為入曆之數皆非本理遂至乖戾今校逐日行分積以為變段然後自疾而漸遲勢盡而留自留而行亦積微而後多別立諸段變曆以推變差俾諸段變差際會相合星之遲疾可得而知之矣自古相傳皆謂去交十五度以下則日月有蝕殊不知日月之相掩與闇虛之所射其理有異今以日月徑度之大小校去交之遠近以黃道之斜正天勢之昇降度仰視旁視之分數則交虧得其實矣臣考前世無食神首尾之文近自司天卜祝小術不能舉其大體遂為等接之法蓋從假用以求徑捷於是乎交有逆行之數後學者不能詳知因言曆有九曜以為注曆之常式今並削而去之謹以步日步月步星步發斂為四篇合為曆經一卷曆十一卷草三卷顯德三年七政細行曆一卷以為欽天曆昔在帝堯欽若昊天陛下考曆象日月星辰唐堯之道也天道玄遠非微臣之所盡知世宗嘉之詔司天監用之以明年正月朔旦為始顯德欽天曆演紀上元甲子距今顯德三年丙辰積七千二百六十九萬八千四百五十二算外欽天統法七千二百欽天經法七十二欽天通法一百欽天步日躔術歲率二百六十二萬九千七百六十四十軌率二百六十二萬九千八百四十四八十朔率二十一萬二千六百二十二十八歲策三百六十五一千七百六十四十軌策三百六十五一千八百四十四八十歲中一百八十四千四百八十二二十軌中一百八十二四千五百二十二四十朔策二十九三千八百二十二十八氣策一十五一千五百七十三三十五象策七二千七百五十五七周紀六十歲差八十四四十辰則六百八刻二十四分赤道宿次斗二十六度牛八度女十二度虛一十度少危十七度室十六度壁九度北方七宿九十八度少奎十六度婁十二度胃十四度昴十一度畢十七度觜一度參一十度西方七宿八十一度井三十三度鬼三度柳十五度星七度張十八度翼十八度軫十七度南方七宿一百一十一度角十二度亢九度氐十五度房五度心五度尾十八度箕十一度東方七宿七十五度中節置歲率以演紀上元距所求積年乘之為氣積統法而一為日盈周紀去之命甲子算外即天正中氣日辰及分秒也以氣策累加之秒盈通法從分分盈統法從日日盈周紀去之即各得次氣日辰及分秒也朔弦望置氣積以朔率去之不盡為閏餘用減氣積為朔積統法而一為日盈周紀去之命甲子算外即天正常朔日辰及分秒也以象策累加之即各得弦望及次朔也日躔入曆置歲率以閏餘減之統法而一為日歲中以下為盈以上減去歲中為縮即天正常朔加時所入也累加象策滿歲中去之盈縮互命即四象所入也日躔朓朒置加時入曆分秒以其日損益率乘之統法而一損益其日朓朒數為日躔朓朒定數赤道日度置氣積以軌率去之餘統法而一為度命赤道虛八算外即天正中氣加時日躔赤道宿度及分秒也加歲中以次命之即夏至之宿也黃道宿次置二至日躔赤道宿度距前後每五度為限初率八每限減一盡九限末率空乃一度少彊亦限率空其半當四立之宿自後亦五度為限初率空每限增一盡九限末率八殷二分之宿自二分至二至亦如之各以限率乘所入限度為分經法而一為度二至前後各九限以減二分前後各九限以加赤道宿為黃道宿及分就其分為少太半之數黃道日度置天正中氣加時日躔赤道宿度各與所入限率相乘皆以統法通之所入限率乘其分以從之經法而一為分盈統法為度用減赤道所躔即天正中氣加時日躔黃道宿度及分也加歲中以黃道宿次命之即夏至加時日度及分也午中日躔置二至分減去半法為午後分不足反減為午前分以乘初日躔分經法而一午前以加午後以減加時黃道日度為午中日度及分也各以次日躔分加之滿統法從度依宿次命之即次日午中日躔也午中日躔入曆置天正中氣午前分便為午中入盈曆日分其在午後者以午後分減歲中為午中入縮曆日分累加一日滿歲中即去之盈縮互命為每日午中入曆也岳臺中晷置午中入曆分以其日損益率乘之如統法而一為分分十為寸用損益其下中晷數為定數也晨昏分各置入曆分以其日損益率乘之如統法而一用損益其下晨分即所求晨定分也用損加益減其下昏分即所求昏定分也日出入辰刻置晨昏分以一百八十加晨減昏為日出入分各以辰則除為辰數餘滿經法為刻命辰數子正算外則日出入辰刻也晝夜刻置日入分以日出分減之為晝分用減統法為夜分各滿經法為晝夜刻五夜辰刻置昏分以辰則除為辰數經法除為刻數命辰數子正算外即甲夜辰刻也倍晨分五約之為更用分又五約之為籌用分用累加甲夜滿辰則為辰滿經法為刻即各得五夜辰刻也昏曉中星置昏分減去半統用乘軌率統法除之為距中分盈統法為度加午中日躔為昏中星減之為曉中星赤道內外數置入曆分以其日損益率乘之如統法而一用損益其下內外數如不足損則反損之內外互命即得所求赤道內外定數也九服距軌數置距岳臺南北里數以三百六十通之為步一千七百五十六除之用北加南減二千五百一十三為其地戴中數以赤道內外定數內減外加之即九服距軌數也九服中晷置距軌數二十五乘之一百三十七除為天用分置之以二十二乘六約之用減四千為晷法又以天用分自相乘如晷法而一為地用分相從為晷分分十為寸即得其地中晷也九服刻漏經法通軌中而半之用自相乘如其地戴中數而一以乘二百六十三經法除之為漏法通軌中於上置赤道內外數於下以下減上餘用乘之盈漏法為漏分赤道內以減赤道外以加一千六百二十為其地晨分減統法為昏分置晨昏分各如岳臺術入之即得其地日出入辰刻五夜辰刻昏曉中星也欽天步月離術離率一十九萬八千三百九十三九交率一十九萬五千九百二十七九十七五十六離策二十七三千九百九十三九交策二十七一千五百二十七九十七五十六望策一十四五千五百一十一十四交中一十三四千三百六十三九十八七十八離朔一七千二十七一十九交朔二二千二百九十二三十四十四中準一千七百三十六中限四千七百八十平離九百六十三程節八百月離入曆置朔積以離率去之餘滿統法為日即天正常朔加時入曆也累加象策盈離策去之即弦望及次朔入曆也月離朓朒置入曆分以日躔朓朒定數朓減朒加之程節除之為限數餘乘所入限損益率程節而一用損益其限朓朒為定數朔弦望定日各以日躔月離朓朒定數朓減朒加朔弦望常分為定日定朔加時日入後則進一日有交見初則不進弦望加時日未出則退一日日雖出有交見初亦如之元日有交則消息定之定朔與後朔干同者大不同者小無中氣者為閏朔望加時日度各置日躔入曆以日躔月離朓朒定數朓減朒加之為定朔加時入曆以曆分乘其日損益率統法而一損益其下盈縮數為定數置定朔曆分通法約之以定數盈加縮減之各命以冬夏至之宿算外即所求也月離入交置朔積以交率去之餘滿統法為日即天正常朔入交泛日也以望策累加之盈交策去之即望及次朔所入也各以日躔朓朒定數朓減朒加之為入交常日置月離朓朒定數經法乘之平離而一朓減朒加常分即入交定日也黃道正交月度統法通朔交定日以二百五十四乘之十九而一復以統法除為入交度用減其朔加時日度即朔前月離正交黃道宿度也九道宿次月離出入黃道六度變從八節斜正不同故月有九道黃道八節各有九限若正交起八節後第一限之宿為月行其節第一道起第二限之宿為月行其節第二道即以所起限為正交後第一限初率八每限減一盡九限末率空又九限初率空每限增一末率八殷半交之宿自後亦九限初率八每限減一末率空又九限初率空每限增一末率八復與黃道相會謂之中交自中交至正交亦如之各置所入限度以限率乘之為泛差其正交中交前後各九限以距二至之宿限數乘之半交前後各九限以距二分之宿限數乘之皆如經法而一為黃道差在冬至之宿後正交前後各九限為減中交前後各九限為加在夏至之宿後正交前後各九限為加中交前後各九限為減凡月正交後出黃道外中交後入黃道內其半交前後各九限在春分之宿後出黃道外秋分之宿後入黃道內皆以差為加在春分之宿後入黃道內秋分之宿後出黃道外皆以差為減四約泛差以黃道差減之為赤道差正交中交前後各九限皆以差為加半交前後各九限皆以差為減以黃赤二差加減黃道為九道宿次就其分為少太半之數八節各九道七十二道周焉九道正交月度置月離正交黃道宿度各以所入限率乘之亦乘其分經法約之為泛差用求黃赤二差以加減之即月離正交九道宿度也九道朔月度置月離正交九道宿度以入交度加之命以九道宿次即其朔加時月離九道宿度也九道望月度置朔望加時日相距之度以軌中加之為加時象積用加其朔九道月度命以其道宿次即所求也自望推朔亦如之月離午中入曆置朔望月離入曆加半統減去定分各以日躔月離朓朒定數朓減朒加之即所求也晨昏月度置其日晨昏分以定分減之為前不足返減為後用乘其日離程統法而一滿經法為度為晨昏前後度前加後減加時月為晨昏月度晨昏象積置加時象積以前象前後度前減後加又以後象前後度前加後減之即所求也每日晨昏月度累計距後象離度以減晨昏象積為加不足反減之為減以距後象日數除之用加減每日離度為定度累加晨昏月度命以九道宿次即所求月去黃道度置入交定日交中以下月行陽道以上去之月行陰道皆以經法通之用減九百八十餘以乘之五百五十六而一為分滿經法為度行陽道在黃道外行陰道在黃道內即所求月去黃道內外度也日月食限置定交行陰陽道日半交中以下為交後以上用減交中為交前皆以統法通之為距交分朔視距交分陽道四千二百一十九陰道一萬三百八十三以下日入食限望視距交分陰陽道皆六千九百九十五以下月入蝕限日月食甚加時定分置朔定分半統以上以半統減之半統以下用減半統為距午分十一乘之經法而一半統以下以減半統以上以加朔定分為日食加時定分望以其日晨分與一千六百二十相減餘以二百四十五乘之三百一十三而一用減二百四十五餘以損益望定分為月食加時定分日食常準置中準與其日赤道內外數相乘二千五百一十三除為黃道出入食差以距午分減半晝分以乘之半晝分而一赤道內以減赤道外以加中準為日食常準日食定準置日躔入曆以經法通之三千二百八十七以下用減三千二百八十七為二至後以上減去三千二百八十七為二分前六千五百七十四以上用減九千八百六十一為二分後以上減去九千八百六十一為二至前各三約之二至前後用減二分前後用加二千七百七十二為黃道斜正食差以距午分乘之半晝分而一以加常準為定準日食分以定準加中限為陰道定準減中限為陽道定限不足減者反減之為限外分視陰道距交分定準以上定限以下為陰道食即置定限以距交分減之為距食分定準以下雖曰陰道亦為陽道食即加陽道定限為距食分其有限外分者即減去限外分為距食分不足減者不食其陽道距交分定限以下為入定食限即用減陽道定限為距食分各置距食分皆以四百七十八除為日食之大分餘為小分命大分以十為限命小分以半及彊弱月食分視距交分中準以下皆既以上用減食限為距食分置之以五百二十六除為月食之大分餘為小分命大分以十為限命小分以半及彊弱日食泛用分置距食分一千九百一十二以上用減四千七百八十餘自相乘六萬三千二百七十二除之以減六百四十七為泛用分九百五十六以下用減一千九百一十二餘以通法乘之七百三十五而一以減五百一十七為泛用分九百五十六以上以距食分自相乘二千三百六十二除之用減三百八十七為泛用分月食泛用分置距食分二千一百四以上用減五千二百六十餘自相乘六萬九千一百六十九除之以減七百一十一為泛用分一千五十二以上用減二千一百四十餘七除之以減五百六十七為泛用分一千五十二以下以距食分減之餘自相乘二千六百五十四而一用減四百一十七為泛用分日月初末加時定分各置泛用分以平離乘之其日離程而一為定用分以減朔望定分為虧初加之為復末加時常分如食甚術推之得虧初復末定分置初甚末定分各以辰則除之為辰經法除之為刻即初甚末之辰刻也虧食所起日食起虧自西月食起虧自東其食分少者月行陽道則日食偏南月食偏北陰道則日食偏北月食偏南此常數也立春後立夏前食分多則日食偏南月食偏北立秋後立冬前食分多則日食偏北月食偏南此黃道斜正也陽道交前陰道交後食分多則日食偏南月食偏北陽道交後陰道交前食分多則日食偏北月食偏南此九道斜正也黃道比常數所偏差少九道比黃道所偏又四分之一皆據午而言之若午前午後一理偏南一理偏北及消息所食分數多少以定初甚末之方即各得所求也帶食出入分視其日出入分在虧初定分已上復末定分已下即帶食出入食甚在出入分已下者以出入分減復末定分為帶食差食甚在出入分已上者以虧初定分減出入分為帶食差各置帶食差以距食分乘之定用分而一日以四百七十八月以五百二十六除為帶食之大分餘為小分食入更籌各置初甚末定分晨分已下以昏分加之昏分已上昏分減之皆更用分而一為更數餘籌用分而一為籌數欽天步五星術歲星周率二百八十七萬一千九百七十六六變率二十四萬二千二百一十五六十六曆率二百六十二萬九千七百六十一七十八周策三百九十八六千三百七十六六曆中一百八十二四千四百八十八十九變段變日變度變曆晨見一十七三三十七二二十四順疾九十一十六六十三一十一一十三順遲二十五二九一二十九前留二十六三十二退遲一十四一一十二空二十八退疾二十七四三十八一三十七退疾二十七四三十八一三十七退遲一十四一一十二空二十八後留二十六三十二順遲二十五二九一二十九順疾九十一十六六十三一十一一十三夕伏一十七三三十七二二十四熒惑周率五百六十一萬五千四百二十二一十一變率二百九十八萬五千六百六十一七十一曆率二百六十二萬九千七百六十空周策七百七十九六千六百二十二一十一曆中一百八十二四千四百八十空變段變日變度變曆晨見七十三五十三六十八五十五十八順疾七十三五十一一四十八三次疾七十一四十六六十九四十四一十七次遲七十一四十五三十三四十二五十八順遲六十二一十九二十九一十八二十前留八六十九退遲一十一五十八空四十四退疾二十一七四十六二四十退疾二十一七四十六二四十退遲一十一五十八空四十四後留八六十九順遲六十二一十九二十九一十八二十次遲七十一四十五三十三四十二五十八次疾七十一四十六六十九四十四一十七順疾七十三五十一一四十八三夕伏七十三五十三六十八五十五十八鎮星周率二百七十二萬二千一百七十六九十變率九萬二千四百一十六五十曆率二百六十二萬九千七百五十九八十周策三百七十八五百七十六九十曆中一百八十二四千四百七十九九十變段變日變度變曆晨見一十九二七一一十四順疾六十五六三十八三五十一順遲一十九空六十三空三十五前留三十七三退遲一十六空四十三空一十四退疾三十三二三十五空六十退疾三十三二三十五空六十退遲一十六空四十三空一十四後留三十七三順遲一十九空六十三空三十五順疾六十五六三十八三五十一夕伏一十九二七一一十四太白周率四百二十萬四千一百四十三九十六變率四百二十萬四千一百四十三九十六曆率二百六十二萬九千七百五十五十六周策五百八十三六千五百四十三九十六曆中一百八十二四千四百七十五二十八變段變日變度變曆夕見四十二五十三四十五十一一十七順疾九十六一百二十一五十七一百一十六三十九次疾七十三八十三十七七十七二次遲三十三三十四一三十二四十順遲二十四一十一六十一一十一二十四前留六六十九退遲四一二十二空三十一退疾六三六十五一二十二夕伏七四四十一三十七晨見七四四十一三十七退疾六三六十五一二十二退遲四一二十二空三十一後留六六十九順遲二十四一十一六十一一十一二十四次遲三十三三十四一三十二四十次疾七十三八十三十七七十七二順疾九十六一百二十一五十七一百一十六三十九晨伏四十二五十三四十五十一一十七辰星周率八十三萬四千三百三十五五十二變率八十三萬四千三百三十五五十二曆率二百六十二萬九千七百六十四十四周策一百一十五六千三百三十五五十二曆中一百八十二四千四百八十二十二變段變日變度變曆夕見一十七三十四一二十九五十四順疾一十一一十八二十四一十六四順遲一十六一十一四十三一十一十前留二六十八夕伏一十一六二晨見一十一六二後留二六十八順遲一十六一十一四十三一十一十順疾一十一一十八二十四一十六四晨伏一十七三十四一二十九五十四中日中星置氣積以其星周率除之為周數不盡為天正中氣積前合用減歲率為前年天正中氣後合如不足減則加歲率以減之為次前年天正中氣後合各以統法約之為日為度即所求平合中日中星也置中日以逐段變日累加之即逐段中日也置中星以逐段變度順加退減之即得逐段中星金水夕伏晨見皆退變也入曆置變率以周數乘之以曆率去之餘滿統法為度曆中以下為先以上減去曆中為後即所求平合入曆以逐段變曆累加之得逐段入曆也先後定數置入曆分以其度損益率乘之經法而一用損益其下先後數即所求也常日定星置中日中星各以先後定數先加後減之留用前段先後數太白順伏見及前順疾次疾後次遲次疾疾辰星順伏見及前疾後遲並先減後加之即各為其段常日定星置定星以其年天正中氣日躔黃道宿次加而命之得逐段末日加時宿度也盈縮定數置常日如歲中以下為在盈以上減去歲中餘為在縮即常日入盈縮曆也置曆分以其日損益率乘之經法而一用損益其下盈縮數即得所求也定日置常日以盈縮定數盈減縮加之為定日以其年天正中氣加而命之即逐段末日加時日辰也入中節置定日以氣策除之命起冬至即所入氣日數也平行分置定日以前段定日減之為日率定星與前段定星相減為度率通度率以經法乘之通日率而一為平行分初末行分近伏段與伏段平行分合而半之為其段近伏行分以平行分減之餘減平行分為其段遠伏行分近留段近留行分空倍平行分為其段遠留行分其不近伏留段皆以順行二段平行分合而半之為前段末日後段初日行分各與其段平行分相減平行分多則加平行分平行分少則減平行分即前段初日後段末日行分其不近伏留段退行則以遲段近疾行分為疾段近遲行分所得與平行分相減平行分多則加之少則減之皆為遠遲行分也初行夜半宿次置經法以前段末日加時分減之餘乘前段末日行分經法而一用順加退減前段末日加時宿度為其段初行昏後夜半宿度也每日行分初末行分相減為差率累計其段初行昏後夜半距後段初行昏後夜半日數除之為日差半日差以減多加少為其段初末定行分置初定行分用日差末多則累加末少則累減為每日行分以每日行分順加退減初行昏後夜半宿度為每日昏後夜半星所至宿度也先定日昏後夜半宿次自初日累計距所求日數以乘其段日差末多用加末少用減初日行分為其日行分合初日而半之以所累計日乘之用順加退減其段初行昏後夜半宿次即所求也欽天步發斂術候策五五百二十四四十五卦策六六百二十九三十四外策三三百一十四六十七維策一十二一千二百五十八六十八氣盈一千五百七十三三十五朔虛三千三百九十九七十二氣候圖冬至十一月中蚯蚓結麋角解水泉動小寒十二月節鴈北鄉鵲始巢雉始雊大寒十二月中雞始乳鷙鳥厲疾水澤腹堅立春正月節東風解凍蟄蟲始振魚上冰雨水正月中獺祭魚鴻鴈來草木萌動驚蟄二月節桃始華倉庚鳴鷹化為鳩春分二月中玄鳥至雷乃發聲始電清明三月節桐始華田鼠化為鴽虹始見穀雨三月中萍始生鳴鳩拂其羽戴勝降于桑立夏四月節螻蟈鳴蚯蚓出王瓜生小滿四月中苦菜秀靡草死小暑至芒種五月節螗螂生鵙始鳴反舌無聲夏至五月中鹿角解蜩始鳴半夏生小暑六月節溫風至蟋蟀居壁鷹乃學習大暑六月中腐草為螢土潤溽暑大雨時行立秋七月節涼風至白露降寒蟬鳴處暑七月中鷹祭鳥天地始肅禾乃登白露八月節鴻鴈來玄鳥歸羣鳥養羞秋分八月中雷乃收聲蟄蟲坏戶水始涸寒露九月節鴻鴈來賓雀入水為蛤菊有黃華霜降九月中豺祭獸草木黃落蟄蟲咸俯立冬十月節水始冰地始凍雉入水為蜃小雪十月中虹藏不見天氣上騰地氣下降閉塞成冬大雪十一月節鶡鳥不鳴虎始交荔挺出爻象圖冬至坎初六公中孚辟復侯屯內小寒坎九二侯屯外大夫謙卿睽大寒坎六三公升臨侯小過內立春坎六四侯小過外大夫蒙卿益雨水坎九五公漸辟泰侯需內驚蟄坎上六侯需外大夫隨卿晉春分震初九公解辟大壯侯豫內清明震六二侯豫外大夫訟卿蠱穀雨震六三公革辟夬侯旅內立夏震九四侯旅外大夫師卿比小滿震六五公小畜辟乾侯大有內芒種震上六侯大有外大夫家人卿井夏至離初九公咸辟姤侯鼎內小暑離六二侯鼎外大夫豐卿渙大暑離九三公履辟遯侯恆內立秋離九四侯恆外大夫節卿同人處暑離六五公損辟否侯巽內白露離上九侯巽外大夫萃卿大畜秋分兌初九公賁辟觀侯歸妹內寒露兌九二侯歸妹外大夫妄卿明夷霜降兌六三公困辟剝侯艮內立冬兌九四侯艮外大夫既濟卿噬嗑小雪兌九五公大過辟坤侯未濟內大雪兌上六侯未濟外大夫蹇卿頤七十二候各置中節即初候也以候策累加之即次候也六十四卦置中氣即公卦也以卦策累加之即次卦也置候卦以外策加之即外卦也五行用事置四立之節而命之即春木夏火秋金冬水用事之初也置四季之節各以維策加之即土用事也沒日中節分五千六百二十六秒六十五已上者用減統法為有沒分通氣策以乘之氣盈而一滿統法為日用加其氣而命之即所求沒日也滅日常朔分朔虛已下者為滅分以朔率乘之朔虛而一盈統法為日用加其朔而命之即所求滅日也右朴所撰欽天曆經四篇舊史亡其步發斂一篇而在者三篇簡略不完不足為法朴曆世既罕傳予嘗問於著作佐郎劉羲叟羲叟為予求得其本經然後朴之曆大備羲叟好學知書史尤通於星曆嘗謂予曰前世造曆者其法不同而多差至唐一行始以天地之中數作大衍曆最為精密後世善治曆者皆用其法惟寫分擬數而已至朴亦能自為一家朴之曆法總日躔差為盈縮二曆分月離為遲疾二百四十八限以考衰殺之漸以審朓朒而朔望正矣校赤道九限更其率數以步黃道使日躔有常度分黃道八節辨其內外以揆九道使月行如循環而二曜協矣觀天勢之升降察軌道之斜正以制食差而交會密矣測岳臺之中晷以辨二至之日夜而軌漏實矣推星行之逆順伏留使舒亟有漸而五緯齊矣然不能宏深簡易而徑急是取至其所長雖聖人出不能廢也羲叟之言蓋如此覽者得以考焉
