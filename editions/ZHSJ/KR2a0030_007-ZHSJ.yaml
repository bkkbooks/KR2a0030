body:
  text: 新五代史卷七唐本紀第七愍皇帝明宗第五子從厚也為人形質豐厚寡言好禮明宗以其貌類己特愛之天成二年以檢校司徒拜河南尹判六軍諸衞事加檢校太保同中書門下平章事從厚妃孔循女也安重誨怒循以女妻從厚三年罷循樞密使出從厚為宣武軍節度使明年徙鎮河東長興元年封從厚宋王徙鎮成德二年徙鎮天雄累加兼中書令四年十一月秦王從榮伏誅明宗病甚遣宦者孟漢瓊召王于鄴而明宗崩祕其喪六日十二月癸卯朔發喪于西宮皇帝即位于柩前羣臣見於東階復于喪位丙午成服于西宮庚戌登光政門樓存問軍民辛亥殺司衣王氏癸丑始聽政乙卯殺司儀康氏丁巳馮道為大行皇帝山陵使戶部尚書韓彥惲為副中書舍人王延為判官禮部尚書王權為禮儀使兵部尚書李鏻為鹵簿使御史中丞龍敏為儀仗使左僕射權判河南府盧質為橋道頓遞使丁卯禫二代五君於此始見嗣君即位服喪之事先君得其終嗣君得其始而免禍亂於臣民於篡亂之世稀見之事也故特詳言之應順元年春正月壬申朔視朝于廣壽殿乙亥契丹使都督沒辣于來戊寅大赦改元用樂回鶻可汗王仁美遣使者來沙州瓜州遣使者來乙未朱弘昭馮贇獻錢助作山陵著非禮也閏月丙午冊皇太后甲寅冊太妃王氏北京留守石敬瑭獻銀絹助作山陵不書姓氏不曰冊某人為太后者母尊不可斥其事自見於傳也二月庚寅視作山陵鳳翔節度使潞王從珂反辛卯西京留守王思同為西面行營都部署靜難軍節度使藥彥稠為副三月丙辰思同兵潰嚴衞指揮使尹暉羽林指揮使楊思權以其軍叛降于從珂辛酉殺侍衞親軍都指揮使朱弘實癸亥河陽三城節度使康義誠為鳳翔行營都招討使王思同為副西京副留守劉遂雍叛降于從珂思同奔歸于京師不克死之丁卯京城巡檢使安從進叛殺馮贇朱弘昭自殺從進傳其二首于從珂戊辰如衞州不書帝崩者當於廢帝紀書弒鄂王也廢帝鎮州平山人也本姓王氏其世微賤母魏氏少寡明宗為騎將過平山掠得之魏氏有子阿三已十餘歲明宗養以為子名曰從珂及長狀貌雄偉謹信寡言而驍勇善戰明宗甚愛之自晉兵戰梁于河上從珂常立戰功莊宗呼其小字曰阿三不徒與我同年其敢戰亦類我同光二年為衞州刺史突騎指揮使戍于石門明宗討趙在禮自魏反兵而南從珂率戍兵自曲陽盂縣馳出常山以追明宗明宗之南也兵少得從珂兵在後而軍聲大振明宗入立拜從珂河中節度使封潞王是時明宗春秋已高王於諸子次最長樞密使安重誨患之乃矯詔河中裨將楊彥溫使圖之王閱馬于黃龍莊彥溫即閉門拒之王止于虞鄉以聞明宗召王還京師居之清化里第重誨數請行軍法明宗不聽後重誨見殺乃起王為左衞大將軍西京留守長興三年為鳳翔節度使王子重吉自明宗時典禁兵為控鶴指揮使愍帝即位朱弘昭馮贇用事乃罷重吉兵職出為亳州團練使又徙王為北京留守不降制書而宣授又以李從璋為代初安重誨得罪罷河中以從璋為代而重誨見殺故王益自疑遂據城反愍帝遣王思同會諸鎮兵討之思同戰敗走諸鎮兵皆潰清泰元年三月丁巳王以兵東庚申次長安西京副留守劉遂雍叛于唐來降甲子次華州執藥彥稠丙寅次靈寶河中安彥威陝州康思立叛于唐來降己巳次陝康義誠叛于唐來降殺宣徽使孟漢瓊愍帝出居于衞州夏四月壬申入京師馮道率百官迎王于蔣橋王辭不見入哭于西宮遂見羣臣道拜王答拜入居于至德宮癸酉以太后令降天子為鄂王命王監國乙亥皇帝即位丙子率河南民財以賞軍丁丑借民房課五月以賞軍戊寅弒鄂王慈州刺史宋令詢死之乙酉大赦改元戊子殺康義誠及藥彥稠義與弒濟陰王同義誠叛于愍帝罪宜曰誅而廢帝同惡相殺故書曰殺五月丙午端明殿學士左諫議大夫韓昭胤為樞密使莊宅使劉延朗為樞密副使庚戌馮道罷天雄軍節度使范延光為樞密使甲寅賜勸進選人宗子官六月庚辰幸范延光及索自通第秋七月辛亥太常卿盧文紀為中書侍郎同中書門下平章事丁巳立沛國夫人劉氏為皇后八月辛未尚書左丞姚顗為中書侍郎同中書門下平章事許御署官選御署官疑是廢帝初舉兵時所置之官以其非吏部正授故須有旨方得選此於事無勸戒不必書以舊史不詳故存所不知慎傳疑也九月契丹寇邊冬十月戊寅李愚劉昫罷十二月乙亥雄武軍節度使張延朗為中書侍郎同中書門下平章事契丹寇雲州庚寅幸龍門旱二年春二月甲戌范延光罷己丑追尊魯國太夫人魏氏為皇太后非嫡母故詳其爵氏三月辛丑忠武軍節度使趙延壽為樞密使夏五月辛卯宣徽南院使劉延皓為樞密使契丹寇邊六月癸未羣臣獻添都馬都者軍伍之名秋七月丁酉回鶻可汗王仁美使其都督陳福海來劉延皓罷九月己酉刑部尚書房暠為樞密使乙卯渤海遣使者來三年春正月乙未百濟遣使者來丁未封子重美為雍王三月丙午翰林學士禮部侍郎馬胤孫為中書侍郎同中書門下平章事河東節度使石敬瑭反夏五月乙卯建雄軍節度使張敬達為太原四面都招討使義武軍節度使楊光遠為副戊申先鋒指揮使安審信叛降于石敬瑭己酉振武戍將安重榮叛降于石敬瑭壬子天雄軍屯駐捧聖都虞候張令昭逐其節度使劉延皓六月癸亥以令昭為右千牛衞將軍權知天雄軍事甲戌宣武軍節度使范延光為天雄軍四面招討使佗命官不書以此書以者明令昭猶可以秋七月戊申克魏州壬子張令昭伏誅癸丑彰聖指揮使張萬迪叛降于石敬瑭八月戊午契丹使梅里來九月甲辰張敬達及契丹戰于太原敗績契丹圍敬達于晉安戊申如河陽冬十月壬戌括馬籍民為兵十一月戊子盧龍軍節度使趙德鈞為行營都統丁酉契丹立晉閏月甲子楊光遠殺張敬達以其軍叛降于契丹甲戌契丹及晉人至于潞州丁丑至自河陽辛巳皇帝崩敬達不書死之而書殺者敬達大將宜以義責光遠而誅之雖不果而見殺猶為得死乃諷光遠殺己以叛故書之如其志年五十一帝自焚死晉高祖命葬其燼骨於徽陵域中嗚呼君臣之際可謂難哉蓋明者慮於未萌而前知暗者告以將及而不懼故先事而言則雖忠而不信事至而悔其可及乎重誨區區獨見潞王之禍而謀之不臧至於殞身赤族其隙自茲及愍帝之亡也穴於徽陵其土一壠路人見者皆為之悲使明宗為有知其有媿於重誨矣哀哉
