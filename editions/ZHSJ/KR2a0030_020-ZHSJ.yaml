body:
  text: 新五代史卷二十周世宗家人傳第八柴守禮周太祖聖穆皇后柴氏無子養后兄守禮之子以為子是為世宗守禮字克讓以后族拜銀青光祿大夫檢校吏部尚書兼御史大夫世宗即位加金紫光祿大夫檢校司空光祿卿致仕居于洛陽終世宗之世未嘗至京師而左右亦莫敢言第以元舅禮之而守禮亦頗恣橫嘗殺人于市有司以聞世宗不問是時王溥王晏王彥超韓令坤等同時將相皆有父在洛陽與守禮朝夕往來惟意所為洛陽人多畏避之號十阿父守禮卒年七十二官至太傅嗚呼父子之恩至矣孟子言舜為天子而瞽叟殺人則棄天下竊負之而逃以謂天下可無舜不可無至公舜可棄天下不可刑其父此為世立言之說也然事固有不得如其意者多矣蓋天子有宗廟社稷之重百官之衞朝廷之嚴其不幸有不得竊而逃則如之何而可予讀周史見守禮殺人世宗寢而不問蓋進任天下重矣而子於其父亦至矣故寧受屈法之過以申父子之道其所以合於義者蓋知權也君子之於事擇其輕重而處之耳失刑輕不孝重也刑者所以禁人為非孝者所以教人為善其意一也孰為重刑一人未必能使天下無殺人而殺其父滅天性而絕人道孰為重權其所謂輕重者則天下雖不能棄而父亦不可刑也然則為舜與世宗者宜如何無使瞽叟守禮至於殺人則可謂孝矣然而有不得如其意則擇其輕重而處之焉世宗之知權明矣夫皇后劉氏世宗三皇后貞惠皇后劉氏不知其世家蓋微時所娶也世宗為左監門衞將軍得封彭城縣君世宗從太祖于魏后留京師太祖舉兵漢誅其族太祖即位追封彭城郡夫人世宗顯德四年夏四月始詔彭城郡夫人劉氏追冊為皇后有司謚曰貞惠陵曰惠陵皇后符氏宣懿皇后符氏其祖秦王存審父魏王彥卿后世王家出於將相之貴為人明果有大志初適李守貞子崇訓守貞事漢為河中節度使已挾異志有術者善聽人聲以知吉凶守貞出其家人使聽之術者聞后聲驚曰此天下之母也守貞益自負曰吾婦猶為天下母吾取天下復何疑哉於是決反而漢遣周太祖討之逾年攻破其城崇訓知不免手自殺其家人次以及后后走匿以帷幔自蔽崇訓惶遽求后不得遂自殺漢兵入其家后儼然坐堂上顧軍士曰郭公與吾父有舊汝輩無犯我軍士見之不敢迫太祖聞之以謂一女子能使亂兵不敢犯奇之為加慰勉以歸彥卿后感太祖不殺拜太祖為父其母以后夫家滅亡而獨脫死兵刃之間以為天幸欲使削髮為尼后不肯曰死生有命天也何必妄毀形髮為太祖於后有恩而世宗性特英銳聞后如此益奇之及劉夫人卒遂納以為繼室世宗即位冊為皇后世宗卞急多暴怒而後嘗追悔每怒左右后必從容伺顏色漸為解說世宗意亦隨解由是益重之世宗征淮后以帝不宜親行切諫止之世宗不聽師久無功遭大暑雨后以憂成疾而崩議者以方用兵請殺喪禮於是百官朝臨于西宮三日而釋服帝亦七日而釋葬於新鄭陵曰懿陵後立皇后符氏后妹也國初遷西宮號周太后世宗七子世宗子七人長曰宜哥次二皆未名次曰恭皇帝次曰熙讓次曰熙謹次曰熙誨皆不知其母為誰氏宜哥與其二皆為漢誅太祖即位詔賜皇孫名誼贈左驍衞大將軍誠左武衞大將軍諴左屯衞大將軍顯德三年羣臣請封宗室世宗以謂為國日淺恩信未及於人而須功德大成慶流于世而後議之可也明年夏四月癸未先封太祖諸子又詔曰父子之道聖賢不忘再思夭閼之端愈動悲傷之抱故皇子左驍衞大將軍誼左武衞大將軍誠左屯衞大將軍諴等載惟往事有足傷懷宜增一字之封仍贈三台之秩誼可贈太尉追封越王誠太傅吳王諴太保韓王而皇子在者皆不封六年北復三關遇疾還京師六月癸未皇子宗訓特進左衞上將軍封梁王而宗讓亦拜左驍衞上將軍封燕國公後十日而世宗崩梁王即位是為恭皇帝其年八月宗讓更名熙讓封曹王熙謹熙誨皆前未封爵遂拜熙謹右武衞大將軍封紀王熙誨左領軍衞大將軍蘄王皇朝乾德二年十月熙謹卒熙讓熙誨不知其所終嗚呼至公天下之所共也其是非曲直之際雖父愛其子亦或有所不得私焉當周太祖舉兵于魏漢遣劉銖誅其家族於京師酷毒備至後太祖入立遣人責銖銖辭不屈太祖雖深恨之然以銖辭直終不及其家也及追封妻子之被殺者其言深自隱痛之而已不敢有非漢之辭焉蓋知其曲在己也故略存其辭以見周之有媿於其心者矣
