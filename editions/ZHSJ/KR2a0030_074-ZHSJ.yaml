body:
  text: 新五代史卷七十四四夷附錄第三奚本匈奴之別種當唐之末居陰涼川在營府之西幽州之西南皆數百里有人馬二萬騎分為五部一曰阿薈部二曰啜米部三曰粵質部四曰奴皆部五日黑訖支部後徙居琵琶川在幽州東北數百里地多黑羊馬前蹄堅善走其登山逐獸下上如飛契丹阿保機彊盛室韋奚霫皆服屬之奚人常為契丹守界上而苦其苛虐奚王去諸怨叛以別部西徙媯州依北山射獵常採北山麝香仁參賂劉守光以自託其族至數千帳始分為東西奚去諸之族頗知耕種歲借邊民荒地種穄秋熟則來穫窖之山下人莫知其處爨以平底瓦鼎煮穄為粥以寒水解之而飲去諸卒子掃剌立莊宗破劉守光賜掃剌姓李更其名紹威紹威卒子拽剌立同光以後紹威父子數遣使朝貢初紹威娶契丹女舍利逐不魯之姊為妻後逐不魯叛亡入西奚紹威納之晉高祖入立割幽州鴈門以北入于契丹是時紹威與逐不魯皆已死耶律德光已立晉北歸拽剌迎謁馬前德光曰非爾罪也負我者掃剌與逐不魯爾乃發其墓粉其骨而颺之後德光滅晉拽剌常以兵從其後不復見於中國自去諸徙媯州自別為西奚而東奚在琵琶川者亦為契丹所幷不復能自見云吐渾本號吐谷渾或曰乞伏乾歸之苗裔自後魏以來名見中國居於青海之上當唐至德中為吐蕃所攻部族分散其內附者唐處之河西其大姓有慕容拓拔赫連等族懿宗時首領赫連鐸為陰山府都督與討龐勛以功拜大同軍節度使為晉王所破其部族益微散處蔚州界中莊宗時有首領白承福者依中山北石門為柵莊宗為置寧朔奉化兩府以承福為都督賜其姓名為李紹魯終唐時常遣使朝貢中國晉高祖立割鴈門以北入于契丹於是吐渾為契丹役屬而苦其苛暴是時安重榮鎮成德有異志陰遣人招吐渾入塞承福等乃自五臺入處中國契丹耶律德光大怒遣使者責誚高祖高祖恐懼遣供奉官張澄率兵搜索幷鎮忻代等州山谷中吐渾驅出之然晉亦苦契丹思得吐渾為緩急之用陰遣劉知遠鎮太原慰撫之終高祖時承福數遣使者朝貢後出帝與契丹絕盟召承福入朝拜大同軍節度使待之甚厚契丹與晉相距于河承福以其兵從出帝禦虜是歲大熱吐渾多疾死乃遣承福歸太原居之嵐石之間劉知遠稍侵辱之承福謀復亡出塞知遠以兵圍其族殺承福及其大姓赫連海龍白可久白鐵匱等其羊馬貲財鉅萬計皆籍沒之其餘衆以其別部王義宗主之吐渾遂微不復見初唐以承福之族為熟吐渾長興中又有生吐渾杜每兒來朝貢每兒不知其國地部族至漢乾祐二年又有吐渾何戛剌來朝貢不知為生熟吐渾蓋皆微不足考錄達靼靺鞨之遺種本在奚契丹之東北後為契丹所攻而部族分散或屬契丹或屬渤海別部散居陰山者自號達靼當唐末以名見中國有每相溫于越相溫咸通中從朱邪赤心討龐勛其後李國昌克用父子為赫連鐸等所敗嘗亡入達靼後從克用入關破黃巢由是居雲代之間其俗善騎射畜多駝馬其君長部族名字不可究見惟其嘗通於中國者可見云同光中都督折文逋數自河西來貢駝馬明宗討王都於定州都誘契丹入寇明宗詔達靼入契丹界以張軍勢遣宿州刺史薛敬忠以所獲契丹團牌二百五十及弓箭數百賜雲州生界達靼蓋唐常役屬之長興三年首領頡哥率其族四百餘人來附訖于顯德常來不絕党項西羌之遺種其國在禹貢析支之地東至松州西接葉護南界春桑北鄰吐渾有地三千餘里無城邑而有室屋以毛罽覆之其人喜盜竊而多壽往往百五六十歲其大姓有細封氏費聽氏折氏野利氏拓拔氏為最彊唐德宗時党項諸部相率內附居慶州者號東山部落居夏州者號平夏部落部有大姓而無君長不相統一散處邠寧鄜延靈武河西東至麟府之間自同光以後大姓之彊者各自來朝貢明宗時詔沿邊置場市馬諸夷皆入市中國而回鶻党項馬最多明宗招懷遠人馬來無駑壯皆售而所讎常過直往來館給道路倍費其每至京師明宗為御殿見之勞以酒食既醉連袂歌呼道其土風以為樂去又厚以賜賚歲耗百萬計唐大臣皆患之數以為言乃詔吏就邊場售馬給直止其來朝而党項利其所得來不可止其在靈慶之間者數犯邊為盜自河西回鶻朝貢中國道其部落輒邀劫之執其使者賣之佗族以易牛馬明宗遣靈武康福邠州藥彥稠等出兵討之福等擊破阿埋韋悉褒勒彊賴埋廝骨尾及其大首領連香李八薩王都統悉那埋摩侍御乞埋嵬悉逋等族殺數千人獲其牛羊鉅萬計及其所劫外國寶玉等悉以賜軍士由是党項之患稍息至周太祖時府州党項尼也六泥香王子拓拔山等皆來朝貢廣順三年慶州刺史郭彥欽貪其羊馬侵擾諸部獨野鷄族彊不可近乃誣其族犯邊太祖遣使招慰之野鷄族苦彥欽不肯聽命太祖遣邠州折從阮寧州刺史張建武等討之建武勇於立功不能通夷情馳軍擊野鷄族殺數百人而喜玉折思殺牛三族聞建武擊破野鷄族各以牛酒犒軍軍士利其物反劫掠之三族共誘建武軍至包山度險三族共擊之軍投崖谷死傷甚衆太祖怒罪建武等選良吏為慶州刺史以招撫之其佗諸族散處沿邊界上者甚衆然其無國地君長故莫得而紀次云突厥國地君世部族名號物俗見於唐著矣至唐之末為諸夷所侵部族微散五代之際嘗來朝貢同光三年渾解樓來天成二年首領張慕晉來長興二年首領杜阿熟來天福六年遣使者薛同海等來凡四至其後不復來然突厥於時最微又來不數故其君長史皆失不能紀吐蕃國地君世部族名號物俗見於唐著矣當唐之盛時河西隴右三十三州涼州最大土沃物繁而人富樂其地宜馬唐置八監牧馬三十萬匹以安西都護府羈縻西域三十六國唐之軍鎮監務三百餘城常以中國兵更戍而涼州置使節度之安祿山之亂肅宗起靈武悉召河西兵赴難而吐蕃乘虛攻陷河西隴右華人百萬皆陷于虜文宗時嘗遣使者至西域見甘涼瓜沙等州城邑如故而陷虜之人見唐使者夾道迎呼涕泣曰皇帝猶念陷蕃人民否其人皆天寶時陷虜者子孫其語言稍變而衣服猶不改至五代時吐蕃已微弱回鶻党項諸羌夷分侵其地而不有其人民值中國衰亂不能撫有惟甘涼瓜沙四州常自通于中國甘州為回鶻牙而涼瓜沙三州將吏猶稱唐官數來請命自梁太祖時嘗以靈武節度使兼領河西節度而觀察甘肅威等州然雖有其名而涼州自立守將唐長興四年涼州留後孫超遣大將拓拔承謙及僧道士耆老楊通信等至京師求旌節明宗問孫超等世家承謙曰吐蕃陷涼州張掖人張義朝募兵擊走吐蕃唐因以義朝為節度使發鄆州兵二千五百人戍之唐亡天下亂涼州以東為突厥党項所隔鄆兵遂留不得返今涼州漢人皆其戍人子孫也明宗乃拜孫超節度使清泰元年留後李文謙來請命後數年涼州人逐出文謙靈武馮暉遣牙將吳繼勳代文謙為留後是時天福七年明年晉高祖遣涇州押牙陳延暉賫詔書安撫涼州涼州人共劫留延暉立以為刺史至漢隱帝時涼州留後折逋嘉施來請命漢即以為節度使嘉施土豪也周廣順二年嘉施遣人市馬京師因來請命帥是時樞密使王峻用事峻故人申師厚者少起盜賊為兗州牙將與峻相友善後峻貴師厚敝衣蓬首日候峻出拜馬前訴以饑寒峻未有以發而嘉施等來請帥峻即建言涼州深入夷狄中國未嘗命吏請募率府率供奉官能往者月餘無應募者乃奏起師厚為左衞將軍已而拜河西節度使師厚至涼州奏薦押衙副使崔虎心陽妃谷首領沈念般等及中國留人子孫王廷翰溫崇樂劉少英為將吏又自安國鎮至涼州立三州以控扼諸羌用其酋豪為刺史然涼州夷夏雜處師厚小人不能撫有至世宗時師厚留其子而逃歸涼州遂絕於中國獨瓜沙二州終五代常來沙州梁開平中有節度使張奉自號金山白衣天子至唐莊宗時回鶻來朝沙州留後曹義金亦遣使附回鶻以來莊宗拜義金為歸義軍節度使瓜沙等州觀察處置等使晉天福五年義金卒子元德立至七年沙州曹元忠瓜州曹元深皆遣使來周世宗時又以元忠為歸義軍節度使元恭為瓜州團練使其所貢砂羚羊角波斯錦安西白金星礬胡桐律大鵬砂毦褐玉團皆因其來者以名見而其卒立世次史皆失其紀而吐蕃不見於梁世唐天成三年回鶻王仁喻來朝吐蕃亦遣使附以來自此數至中國明宗嘗御端明殿見其使者問其牙帳所居曰西去涇州二千里明宗賜以虎皮人一張皆披以拜委身宛轉落其氈帽亂髮如蓬明宗及左右皆大笑至漢隱帝時猶來朝後遂不復至史亦失其君世云回鶻為唐患尤甚其國地君世物俗見於唐著矣唐嘗以女妻之故其世以中國為舅其國本在娑陵水上後為黠戛斯所侵徙天德振武之間又為石雄張仲武所破其餘衆西徙役屬吐蕃是時吐蕃已陷河西隴右乃以回鶻散處之當五代之際有居甘州西州者嘗見中國而甘州回鶻數至猶呼中國為舅中國答以詔書亦呼為甥梁乾化元年遣都督周易言等來而史不見其君長名號梁拜易言等官爵遣左監門衞上將軍楊沼押領還蕃至唐莊宗時王仁美遣使者來貢玉馬自稱權知可汗莊宗遣司農卿鄭續持節冊仁美為英義可汗是歲仁美卒其弟狄銀立遣都督安千想等來同光四年狄銀卒阿咄欲立天成二年權知國事王仁裕遣李阿山等來朝明宗遣使者冊仁裕為順化可汗晉高祖時又冊為奉化可汗阿咄欲不知其為狄銀親疏亦不知其立卒而仁裕訖五代常來朝貢史亦失其紀其地出玉犛綠野馬獨峯駝白貂鼠羚羊角砂膃肭臍金剛鑽紅鹽罽騊駼之革其地宜白麥青麥黃麻葱韭胡荽以橐駝耕而種其可汗常樓居妻號天公主其國相號媚祿都督見可汗則去帽被髮而入以為禮婦人總髮為髻高五六寸以紅絹囊之既嫁則加氈帽又有別族號龍家其俗與回紇小異長興四年回鶻來獻白鶻一聯明宗命解緤放之自明宗時常以馬市中國其所賫寶玉皆屬縣官而民犯禁為市者輒罪之周太祖時除其禁民得與回鶻私市玉價由此倍賤顯德中來獻玉世宗曰玉雖寶而無益却之于闐國地君世物俗見於唐五代亂世中國多故不能撫來四夷其嘗自通於中國者僅以名見其君世終始皆不可知而于闐尤遠去京師萬里外其國西南近葱嶺與婆羅門為鄰國而相去猶三千餘里南接吐蕃西北至疏勒二千餘里晉天福三年于闐國王李聖天遣使者馬繼榮來貢紅鹽鬱金氂牛尾玉等晉遣供奉官張匡鄴假鴻臚卿彰武軍節度判官高居誨為判官冊聖天為大寶于闐國王是歲冬十二月匡鄴等自靈州行二歲至于闐至七年冬乃還而居誨頗記其往復所見山川諸國而不能道聖天世次也居誨記曰自靈州過黃河行三十里始涉沙入党項界曰細腰沙神點沙至三公沙宿月支都督帳自此沙行四百餘里至黑堡沙沙尤廣遂登沙嶺沙嶺党項牙也其酋曰捻崖天子渡白亭河至涼州自涼州西行五百里至甘州甘州回鶻牙也其南山百餘里漢小月支之故地也有別族號鹿角山沙陀云朱耶氏之遺族也自甘州西始涉磧磧無水載水以行甘州人教晉使者作馬蹄木澀木澀四竅馬蹄亦鑿四竅而綴之駝蹄則包以氂皮乃可行西北五百里至肅州渡金河西百里出天門關又西百里出玉門關經吐蕃界吐蕃男子冠中國帽婦人辮髮戴瑟瑟珠云珠之好者一珠易一良馬西至瓜州沙州二州多中國人聞晉使者來其刺史曹元深等郊迎問使者天子起居瓜州南十里鳴沙山云冬夏殷殷有聲如雷云禹貢流沙也又東南十里三危山云三苗之所竄也其西渡都鄉河曰陽關沙州西曰仲雲其牙帳居胡盧磧云仲雲者小月支之遺種也其人勇而好戰瓜沙之人皆憚之胡盧磧漢明帝時征匈奴屯田於吾盧蓋其地也地無水而嘗寒多雪每天暖雪銷乃得水匡鄴等西行入仲雲界至大屯城仲雲遣宰相四人都督三十七人候晉使者匡鄴等以詔書慰諭之皆東向拜自仲雲界西始涉磧無水掘地得濕沙人置之胸以止渴又西渡陷河伐檉置水中乃渡不然則陷又西至紺州紺州于闐所置也在沙州西南云去京師九千五百里矣又行二日至安軍州遂至于闐聖天衣冠如中國其殿皆東向曰金冊殿有樓曰七鳳樓以蒲桃為酒又有紫酒青酒不知其所釀而味尤美其食粳沃以蜜粟沃以酪其衣布帛有園圃花木俗喜鬼神而好佛聖天居處嘗以紫衣僧五十人列侍其年號同慶二十九年其國東南曰銀州盧州湄州其南千三百里曰玉州云漢張騫所窮河源出于闐而山多玉者此山也其河源所出至于闐分為三東曰白玉河西曰綠玉河又西曰烏玉河三河皆有玉而色異每歲秋水涸國王撈玉于河然後國人得撈玉自靈州渡黃河至于闐往往見吐蕃族帳而于闐常與吐蕃相攻劫匡鄴等至于闐聖天頗責誚之以邀誓約匡鄴等還聖天又遣都督劉再昇獻玉千斤及玉印降魔杵等漢乾祐元年又遣使者王知鐸來高麗本扶餘人之別種也其國地君世見於唐比佗夷狄有姓氏而其官號略可曉其義當唐之末其王姓高氏同光元年遣使廣評侍郎韓申一副使春部少卿朴巖來而其國王姓名史失不紀至長興三年權知國事王建遣使者來明宗乃拜建玄菟州都督充大義軍使封高麗國王建高麗大族也開運二年建卒子武立乾祐四年武卒子昭立王氏三世終五代常來朝貢其立也必請命中國中國常優答之其地產銅銀周世宗時遣尚書水部員外郎韓彥卿以帛數千匹市銅於高麗以鑄錢六年昭遣使者貢黃銅五萬斤高麗俗知文字喜讀書昭進別孝經一卷越王新義八卷皇靈孝經一卷孝經雌圖一卷別孔子所生及弟子事迹越王新義以越王為問目若今正義皇靈述延年辟穀雌圖載日食星變皆不經之說渤海本號靺鞨高麗之別種也唐高宗滅高麗徙其人散處中國置安東都護府於平壤以統治之武后時契丹攻北邊高麗別種大乞乞仲象與靺鞨酋長乞四比羽走遼東分王高麗故地武后遣將擊殺乞四比羽而乞乞仲象亦病死仲象子祚榮立因幷有比羽之衆其衆四十萬人據挹婁臣于唐至中宗時置忽汗州以祚榮為都督封渤海郡王其後世遂號渤海其貴族姓大氏開平元年國王大諲譔遣使者來訖顯德常來朝貢其國土物產與高麗同諲譔世次立卒史失其紀新羅弁韓之遺種也其國地君世物俗見於唐其大族曰金氏朴氏自唐高祖時封金真為樂浪郡王其後世常為君長同光元年新羅國王金朴英遣使者來朝貢長興四年權知國事金溥遣使來朴英溥世次卒立史皆失其紀自晉已後不復至黑水靺鞨本號勿吉當後魏時見中國其國東至海南界高麗西接突厥北鄰室韋蓋肅慎氏之地也其衆分為數十部而黑水靺鞨最處其北尤勁悍無文字之記其兵角弓楛矢同光二年黑水兀兒遣使者來其後常來朝貢自登州泛海出青州明年黑水胡獨鹿亦遣使來兀兒胡獨鹿若其兩部酋長各以使來而其部族世次立卒史皆失其紀至長興三年胡獨鹿卒子桃李花立嘗請命中國後遂不復見云南詔蠻見於唐其國在漢故永昌郡之東姚州之西僖宗幸蜀募能使南詔者得宗室子李龜年及徐虎虎姪藹乃以龜年為使虎為副藹為判官使南詔南詔所居曰苴城龜年等不至苴至善闡得其要約與唐為甥舅僖宗許以安化公主妻之南詔大喜遣人隨龜年求公主已而黃巢敗收復長安僖宗東還乃止同光三年魏王繼岌及郭崇韜等破蜀得王衍時所俘南詔蠻數十人又得徐藹自言嘗使南詔乃矯詔還其所俘遣藹等持金帛招撫南詔諭以威德南詔不納至明宗時巂州山後兩林百蠻都鬼主右武衞大將軍李卑晚遣大鬼主傅能何華來朝貢明宗拜卑晚寧遠將軍又以大渡河南山前邛州六姓都鬼主懷安郡王勿定摽莎為定遠將軍明年遣左金吾衞將軍烏昭遠為入蠻國信使昭遠不能達而還嚑蠻在辰州西千五百里以耕植為生而無城郭聚落有所攻擊則相屯聚刻木為契其首領姓謝氏其名見於唐至天成二年嘗一至其使者曰清州八郡刺史宋朝化冠帶如中國貢草豆蔻二萬箇朱砂五百兩蠟二百斤昆明在黔州西南三千里外地產羊馬其人椎髻跣足披氈其首領披虎皮天成二年嘗一至其首領號昆明大鬼主羅殿王普露靜王九部落各遣使者來使者號若土附嚑以來占城在西南海上其地方千里東至海西至雲南南鄰真臘北抵驩州其人俗與大食同其乘象馬其食稻米水兕山羊鳥獸之奇犀孔雀自前世未嘗通中國顯德五年其國王因德漫遣使者莆訶散來貢猛火油八十四瓶薔薇水十五瓶其表以貝多葉書之以香木為函猛火油以灑物得水則出火薔薇水云得自西域以灑衣雖敝而香不滅五代四夷見中國者遠不過于闐占城史之所紀其西北頗詳而東南尤略蓋其遠而罕至且不為中國利害云
