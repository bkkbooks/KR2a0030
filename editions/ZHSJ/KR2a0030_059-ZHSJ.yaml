body:
  text: 新五代史卷五十九司天考第二昔孔子作春秋而天人備予述本紀書人而不書天予何敢異於聖人哉其文雖異其意一也自堯舜三代以來莫不稱天以舉事孔子刪詩書不去也蓋聖人不絕天於人亦不以天參人絕天於人則天道廢以天參人則人事惑故常存而不究也春秋雖書日食星變之類孔子未嘗道其所以然者故其弟子之徒莫得有所述於後世也然則天果與於人乎果不與乎曰天吾不知質諸聖人之言可也易曰天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙此聖人極論天人之際最詳而明者也其於天地鬼神以不可知為言其可知者人而已夫日中則昃盛衰必復天吾不知吾見其虧益於物者矣草木之成者變而衰落之物之下者進而流行之地吾不知吾見其變流於物者矣人之貪滿者多禍其守約者多福鬼神吾不知吾見人之禍福者矣天地鬼神不可知其心則因其著於物者以測之故據其迹之可見者以為言曰虧益曰變流曰害福若人則可知者故直言其情曰好惡其知與不知異辭也參而會之與人無以異也其果與於人乎不與於人乎則所不知也以其不可知故常尊而遠之以其與人無所異也則修吾人事而已人事者天意也書曰天視自我民視天聽自我民聽未有人心悅於下而天意怒於上者未有人理逆於下而天道順於上者然則王者君天下子生民布德行政以順人心是之謂奉天至於三辰五星常動而不息不能無盈縮差忒之變而占之有中有不中不可以為常者有司之事也本紀所述人君行事詳矣其興亡治亂可以見至於三辰五星逆順變見有司之所占者故以其官誌之以備司天之所考嗚呼聖人既沒而異端起自秦漢以來學者感於災異矣天文五行之說不勝其繁也予之所述不得不異乎春秋也考者可以知焉開平二年夏四月辛丑熒惑犯上將甲寅地震四年十二月庚午月有食之乾化元年春正月丙戌朔日有食之五月客星犯帝坐二年正月丙申熒惑犯房第二星戊申月犯心大星四月甲寅月掩心大星壬申彗出於張甲戌彗出靈臺同光元年十月辛未朔日有食之二年六月甲申衆星交流丙戌衆星交流八月戊子熒惑犯星十一月丁巳地震三年三月丙申熒惑犯上相戊申月有食之四月癸亥朔日有食之甲子熒感犯左執法六月甲子太白晝見丙寅歲犯右執法己巳太白晝見庚寅衆星流自二更盡三更而止辛卯衆小星流于西南九月甲辰月有食之丁未天狗墮有聲如雷野雉皆雊丙辰太白歲相犯十一月甲寅地震天成元年三月惡星入天庫流星犯天棓四月庚戌金犯積尸六月乙未衆小星交流七月己未月犯太白庚申太白晝見乙丑月入南斗魁八月乙酉朔日有食之癸卯太白犯心大星乙巳月犯五諸侯辛亥熒惑犯上將九月丁巳月犯心大星己巳月犯昴庚午熒惑犯右執法己卯熒惑犯左執法十月戊子熒惑犯上相己丑至于庚子日月赤而無光丙午月掩左執法十一月丁丑月暈匝火木戊寅月犯金木土十二月戊戌熒惑犯氐乙巳月掩庶子二年正月甲戌熒惑歲相犯二月辛卯熒惑犯鍵閉三月戊午月掩鬼庚申衆小星流于西北己已熒惑犯上相乙亥月入羽林四月丁亥月犯右執法癸卯月入羽林六月辛丑熒惑犯房八月己卯朔日有食之庚子月犯五諸侯九月壬子歲犯房庚申月入羽林壬申月犯上將十月壬午月犯五諸侯癸未地震十一月乙卯月入羽林辛未地震壬申地震十二月癸未地震三年春正月壬申金火合于奎二月丁丑朔日有食之四月丁酉月犯五諸侯五月丁巳月掩房距星六月乙酉月掩心庶子癸巳月入羽林自正月至于是月宗人宗正搖不止七月乙卯月入南斗魁閏八月癸卯朔熒感犯上將戊申月犯南斗乙卯熒惑犯右執法庚戌太白犯右執法九月庚辰土木合于箕辛巳金火合于軫十月庚午彗出西南十一月戊子月掩軒轅大星乙未太白犯鎮月掩房十二月壬寅朔熒惑犯房金木相犯于斗乙卯月有食之四年正月癸巳月入南斗魁二月辛酉月及火土合于斗三月壬辰歲犯牛六月癸丑月有食之既七月丁丑月入南斗九月丙子熒惑入哭星十二庚戌月有食之既長興元年六月癸巳朔日有食之乙卯太白犯天鐏八月己亥月犯南斗乙卯月犯積尸九月辛酉朔衆小星交流而殞十一月壬戌熒感犯氐十二月丙辰熒惑犯天江二年正月乙亥太白犯羽林庚辰月犯心距星二月丁未月犯房四月甲寅熒惑犯羽林五月癸亥太白晝見閏五月乙巳歲晝見六月壬午地震八月丁巳辰犯端門九月丙戌衆星交流丁亥衆星交流而殞戊子太白晝見丁未雷十一月甲申朔日有食之丙戌太白犯鍵三年四月庚辰熒惑犯積尸九月庚寅太白犯哭星十月壬申太白晝見十一月己亥太白犯壁壘四年五月癸卯太白晝見六月庚午衆星交流七月乙亥朔衆星交流九月辛巳太白犯右執法乙未雷應順元年二月丁酉衆星流于西北四月戊寅白虹貫日是月改元清泰元年五月己未太白晝見六月甲戌太白犯右執法九月辛丑衆星交流壬寅雨雹于京師冬十一月丁未彗出虛危掃天壘及哭星天福元年三月壬子熒惑犯積尸二年正月乙卯日有食之七月丙寅月有食之十二月己卯朔日有白虹二三年三月壬子日有白虹二五月壬子月犯上將四年四月辛巳太白犯東井北轅甲午太白犯五諸侯五月丁未太白犯輿鬼中星七月庚子朔日有食之九月癸未月掩畢五年十一月丁丑月有食之六年八月辛卯太白犯軒轅九月己卯熒惑犯上將壬子彗出于西掃天市垣八年四月戊申朔日有食之八月丙子熒惑犯右掖十月庚戌彗出東方丙辰熒惑犯進賢十一月庚子月犯房開運元年二月辛亥日有白虹二壬戌太白犯昴己巳熒惑犯天鑰三月戊子月有食之四月丁巳太白犯五諸侯七月庚辰月犯熒惑壬午月入南斗甲申太白犯東井八月甲辰熒惑入南斗九月庚午朔日有食之丙子月入南斗乙酉月食昴丙戌月有食之庚寅月犯五諸侯十月癸卯月入南斗十一月辛巳月犯昴十二月癸丑太白犯辰二年七月乙未朔月犯角壬寅月犯心前大星庚戌歲犯井鉞八月甲子朔日有食之甲戌歲犯東井九月己酉月犯昴甲寅太白犯南斗魁十一月甲午朔太白犯哭星癸丑月掩角距星戊午月犯心後星三年二月壬戌朔日有食之天福十二年四月丙子太白晝見十月己丑太白犯亢距星十一月壬子雨木冰辛酉雨木冰壬戌月犯昴癸酉雨木冰乙亥月掩心大星己卯月犯南斗十二月乙未月有食之乾祐元年四月甲午月犯南斗六月戊寅朔日有食之乙未月入南斗七月甲寅月掩心庶子星八月乙酉鎮犯太微西垣戊戌歲犯右執法九月丁卯月掩鬼十月丁丑歲犯左執法二年四月壬午太白晝見六月癸酉朔日有食之壬午月犯心丙戌月犯天關八月乙亥月犯房次將九月壬寅太白犯右執法庚戌太白犯鎮辛酉鎮犯右執法丁卯太白犯歲鎮自元年八月己丑入太微垣犯上將執法內屏謁者勾已往來至是歲十一月辛亥而出甲寅月犯昴三年二月甲戌月犯昴六月乙卯鎮犯左掖七月甲申熒惑犯司怪八月癸卯太白犯房庚戌太白犯心大星十月辛酉月犯心大星太白犯木十一月甲子朔日有食之四百四十三日廣順元年二月丁巳歲犯咸池己未熒惑犯五諸侯三月甲子歲守心己卯熒惑犯鬼壬午熒惑犯天尸四月甲午歲犯鈎鈐二年二月庚寅太白經天四月丙戌朔日有食之七月乙丑熒惑犯井鉞八月乙未熒惑犯天鐏九月辛酉熒惑犯鬼庚辰太白掩右執法十月壬辰太白犯進賢三年四月乙丑熒惑犯靈臺五月辛巳熒惑犯上將丙申熒惑犯右執法七月乙酉月犯房十二月戊申雨木冰顯德元年正月庚寅有大星墜有聲如雷牛馬皆逸京城以為曉鼓皆伐鼓以應之三年正月壬戌有星孛于參十二月庚午白虹貫日癸酉月有食之五代亂世文字不完而史官所記亦有詳略其日月五星之變大者如此至於氣祲之象出沒銷散不常尤難占據而五代之際日有冠珥環暈纓紐負抱戴履背氣十日之中常七八其繁不可以勝書而背氣尤多天福八年正月丙戌黃霧四塞九年正月乙未大霧中二白虹相偶四月庚戌大霧中有蒼白二虹廣順元年十一月甲子白虹竟天此其尤異者也至於吳火出楊林江水中閩天雨豆之類皆非中國耳目所及者不可得而悉書矣
