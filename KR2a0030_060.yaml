body:
  text: 新五代史卷六十職方考第三嗚呼自三代以上莫不分土而治也後世鑒古矯失始郡縣天下而自秦漢以來為國孰與三代長短及其亡也未始不分至或無地以自存焉蓋得其要則雖萬國而治失其所守則雖一天下不能以容豈非一本於道德哉唐之盛時雖名天下為十道而其勢未分既其衰也置軍節度號為方鎮鎮之大者連州十餘小者猶兼三四故其兵驕則逐帥帥彊則叛上土地為其世有干戈起而相侵天下之勢自茲而分然唐自中世多故矣其興衰救難常倚鎮兵扶持而侵凌亂亡亦終以此豈其利害之理然歟自僖昭以來日益割裂梁初天下別為十一國南有吳浙荊湖閩漢西有岐蜀北有燕晉而朱氏所有七十八州以為梁莊宗初起並代取幽滄有州三十五其後又取梁魏博等十有六州合五十一州以滅梁岐王稱臣又得其州七同光破蜀已而復失惟得秦鳳階成四州而營平二州陷于契丹其增置之州一合一百二十三州以為唐石氏入立獻十有六州于契丹而得蜀金州又增置之州一合百九州以為晉劉氏之初秦鳳階成復入于蜀隱帝時增置之州一合一百六州以為漢郭氏代漢十州入于劉旻世宗取秦鳳階成瀛莫及淮南十四州又增置之州五而廢者三合一百一十八州以為周宋興因之此中國之大略也其餘外屬者彊弱相並不常其得失至於周末閩已先亡而在者七國自江以南二十一州為南唐自劍以南及山南西道四十六州為蜀自湖南北十州為楚自浙東西十三州為吳越自嶺南北四十七州為南漢自太原以北十州為東漢而荊歸峽三州為南平合中國所有二百六十八州而軍不在焉唐之封疆遠矣前史備載而羈縻寄治虛名之州在其間五代亂世文字不完而時有廢省又或陷于夷狄不可考究其詳其可見者具之如譜州梁唐晉漢周汴都有宣武都都都洛都都都都都雍有永平都有晉昌有永興有兗有泰寧有有有有罷沂有有有有有密有有有有有青有平盧有有罷有平盧有淄有有有有有齊有有有有有棣有有有有有登有有有有有萊有有有有有徐有武寧有有有有宿有有有有有鄆有天平有有有有曹有有有威信有罷有彰信濮有有有有有濟空白欄空白欄空白欄空白欄空白欄有太祖置宋有宣武有歸德有有有亳有有有有有單有輝州有改曰單州有有有潁有有有有有陳有有有鎮安有軍廢有復蔡有有有有有許有匡國有忠武有有有汝有有有有有鄭有有有有有滑有宣義有義成有有有初曰忠義後襄有復為山南東有有有有道均有有有有有房有有有有有金有蜀武雄有蜀有懷德尋罷有有鄧有宣化有威勝有有有武勝隨有有有有有郢有有有有有唐有有有有有復有有有有有安有宣威有安遠有罷軍有復有罷申有有有有有蒲有護國有有有有孟有河陽三城有有有有懷有有有有有晉有初曰定昌有建雄有有有後曰建寧絳有有有有有陝有鎮國有保義有有有虢有有有有有華有感化有鎮國有有有罷軍商有有有有有同有忠武有匡國有有有耀岐義勝有崇州有復曰耀州靜勝改順義有有有解空白欄空白欄空白欄有隱帝置有邠岐靜難有有有有有寧岐有有有有有慶岐有有有有有衍岐有有有有廢威空白欄空白欄有高祖置有有改曰環州鄜岐保大有有有有有坊岐有有有有有丹岐有有有有有延岐忠義有有彰武有有有夏有定難有有有有銀有有有有有綏有有有有有宥有有有有有靈有朔方有有有有鹽有有有有有岐岐鳳翔有有有有隴岐有有有有涇岐彰義有有有有原岐有有有有渭岐有有有有武岐有有有有廢秦岐雄武蜀天雄有有蜀有成岐蜀有有蜀有階岐蜀有有蜀有鳳岐蜀有有蜀有乾岐李茂貞置有有有有魏有天雄唐有鄴都有鄴都有有鄴都有罷都博有唐有有有有貝有唐有有永清有有衛有唐有有有有澶有唐有有鎮寧有有相有昭德唐有有彰德有有邢有保義唐有安國有有有洺有唐有有有有磁有改曰惠州唐有復曰磁州有有有鎮有武順唐有成德有順德有成德有冀有唐有有有有深有唐有有有有趙有唐有有有有易有唐有有有有祁有唐有有有有定有義武唐有有有有滄唐橫海有有有有景唐有有有有廢德唐有有有有濱空白欄空白欄空白欄空白欄有世宗置瀛唐有契丹契丹有莫唐有契丹契丹有雄空白欄空白欄空白欄空白欄有世宗置霸空白欄空白欄空白欄空白欄有世宗置幽唐盧龍有契丹契丹契丹涿唐有契丹契丹契丹檀唐有契丹契丹契丹薊唐有契丹契丹契丹順唐有契丹契丹契丹營唐有契丹契丹契丹契丹平唐有契丹契丹契丹契丹蔚唐有契丹契丹契丹朔唐振武有契丹契丹契丹雲唐大同有契丹契丹契丹應唐有彰國契丹契丹契丹新唐有威塞契丹契丹契丹媯唐有契丹契丹契丹儒唐有契丹契丹契丹武唐有契丹契丹契丹寰空白欄有明宗置契丹契丹契丹欣唐有有有東漢代唐鴈門有有有東漢嵐唐有有有東漢石唐有有有東漢憲唐有有有東漢麟唐有有有東漢府唐有有永安有罷軍有永安並唐河東有北都有有東漢汾唐有有有東漢慈唐有有有有隰唐有有有有澤唐有有有有潞唐昭義有安義昭義有有有沁唐有有有東漢遼唐有有有東漢揚吳淮南吳南唐南唐有楚吳吳南唐南唐有泗吳吳南唐南唐有滁吳吳南唐南唐有和吳吳南唐南唐有光吳吳南唐南唐有黃吳吳南唐南唐有舒吳吳南唐南唐有蘄吳吳南唐南唐有廬吳吳南唐南唐有保信壽吳忠正吳南唐清淮南唐有忠正海吳吳南唐南唐有泰吳吳南唐南唐有濠吳吳南唐南唐有通空白欄空白欄空白欄空白欄有世宗置潤吳吳南唐南唐南唐常吳吳南唐南唐南唐宣吳寧國吳南唐南唐南唐歙吳吳南唐南唐南唐鄂吳武昌吳