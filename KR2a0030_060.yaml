軍節度昭義所統澤潞邢洺磁五州唐末孟方立為昭義軍節度使徙其軍額于邢州而澤潞二州入于晉方立但有邢洺磁三州故當唐末有兩昭義軍梁晉之爭或入于梁或入于晉梁以邢洺磁三州為保義軍莊宗滅梁改曰安國鎮州故曰成德軍梁初以成音犯廟諱改曰武順唐復曰成德晉又改曰順德漢復曰成德應州故屬大同軍節度唐明宗即位以其應州人也乃置彰國軍新州唐同光元年置威塞軍府州晉置永安軍漢罷之周復並州後唐建北都其軍仍曰河東潞州唐故曰昭義梁末帝時屬梁改曰匡義歲餘唐滅梁改曰安義晉復曰昭義廬州周世宗克淮南置保信軍壽州唐故曰忠正南唐改曰清淮周世宗平淮南復曰忠正五代之際外屬之州揚州曰淮南宣州曰寧國鄂州曰武昌洪州曰鎮南福州曰武威杭州曰鎮海越州曰鎮東江陵府曰荊南益州梓州曰劍南東西州遂州曰武信興元府曰山南西道洋州曰武定黔州曰黔南潭州曰武安桂州曰靜江容州曰寧遠雍州曰建武廣州曰清海皆唐故號更五代無所易而今因之者也其餘僭僞改置之名不可悉考而不足道其因著于今者略注于譜濟州周廣順二年置割鄆州之巨野鄆城兗州之任城單州之金鄉為屬縣而治巨野單州唐末以宋州之碭山梁太祖鄉里也為置輝州已而徙治單父後唐滅梁改輝州為單州其屬縣置徙傳記不同今領單父碭山成武魚臺四縣耀州李茂貞置治華原縣梁初改曰崇州唐同光元年復為耀州解州漢乾祐元年九月置割河中之聞喜安邑解縣為屬而治解威州晉天福四年置割靈州之方渠寧州之木波馬嶺三鎮為屬而治方渠周廣順二年改曰環州顯德四年廢為通遠軍五代置軍六皆寄治於縣隸於州故不別出監者物務之名爾故不載於地理皇朝軍監始自置屬縣與州府並列矣乾州李茂貞置治奉天縣磁州梁改曰惠州唐復曰磁州景州唐故治弓高周顯德三年廢為定遠軍割其屬安陵縣屬德州廢弓高縣入東光縣為定遠軍治所濱州周顯德三年置以其濱海為名初五代之際置榷鹽務於海傍後為贍國軍周因置州割棣州之渤海蒲臺為屬縣而治渤海雄州周顯德六年克瓦橋關置治歸義割易州之容城為屬尋廢霸州周顯德六年克益津關置治永清割莫州之文安瀛州之大城為屬通州本海陵之東境南唐置靜海制置院周世宗克淮南升為靜海軍後置通州分其地置靜海海門二縣為屬而治靜海筠州南唐李景置割洪州之高安上高萬載清江四縣為屬而治高安劍州南唐李景置割建州之延平劍浦富沙三縣為屬而治延平全州楚王馬希範置以潭州之湘川縣為清湘縣又割灌陽縣為屬而治清湘秀州吳越王錢元瓘置割杭州之嘉興縣為屬而治之雄州南漢劉龑割韶州之保昌置治保昌英州南漢劉龑割廣州之湞陽置治湞陽開封府故統六縣梁開平元年割滑州之酸棗長垣鄭州之中牟陽武宋州之襄邑曹州之考城更曰戴邑許州之扶溝陵陳州之太康隸焉唐分酸棗中牟襄邑陵太康五縣還其故晉升汴州為東京復割五縣隸焉雍丘晉改曰嵵漢復其故長垣唐改曰匡城黎陽故屬滑州晉割隸衛州葉襄城故屬許州唐割隸汝州楚丘故屬單州梁割隸宋州密州膠西故曰輔唐梁改曰安丘唐復其故晉改曰膠西渭南故屬京兆周改隸華州同官故屬京兆府梁割隸同州唐割隸耀州美原故屬同州李茂貞置鼎州而治之梁改為裕州屬順義軍節度後不見其廢時唐同光三年割隸耀州平涼故屬涇州唐末渭州陷吐蕃權於平涼置渭州而縣廢後唐清泰三年以故平涼之安國耀武兩鎮置平涼縣屬涇州臨涇故屬涇州唐末原州陷吐蕃權於臨涇置原州而涇州兼治其民後唐清泰三年割隸原州鄜州咸寧周廢稷山故屬河中唐割隸絳州慈州仵城呂香周廢大名府大名故曰貴鄉後唐改曰廣晉漢改曰大名滄州長蘆乾符周廢入清池無棣周置保順軍安陵故屬景州周割隸德州澶州頓丘晉置德清軍博州武水周廢入聊城博野故屬深州周割隸定州武康故屬湖州梁割隸杭州福州閩清梁乾化元年王審知於梅溪場置蘇州吳江梁開平三年錢鏐置明州望海梁開平三年錢鏐置處州長松故曰松陽梁改曰長松潭州龍喜漢乾祐三年馬希範置天長六合故屬揚州南唐以天長為軍六合為雄州周復故漢陽故屬鄂州周置漢陽軍義川故屬沔州周割隸安州襄州樂鄉周廢入宜城鄧州臨湍漢改曰臨瀨菊潭向城周廢復州竟陵晉改曰景陵監利故屬復州梁割隸江陵唐州慈丘周廢商州乾元漢改曰乾祐割隸京兆洛南故屬華州周割隸商州隨州唐城梁改曰漢東後唐復舊晉又改漢東漢復舊雄勝軍本鳳州固鎮周置軍秦州天水隴城唐末廢後唐復置成州栗亭後唐置自唐有方鎮而史官不録於地理之書以謂方鎮兵戎之事非職方所掌故也然而後世因習以軍目地而沒其州名又今置軍者徒以虛名升建為州府之重此不可以不書也州縣凡唐故而廢於五代若五代所置而見於今者及縣之割隸今因之者皆宜列以備職方之考其餘嘗置而復廢嘗改割而復舊者皆不足書山川物俗職方之掌也五代短世無所遷變故亦不復録而録其方鎮軍名以與前史互見之云若今永興本節度軍名而今命守臣遂曰知永興軍府事而不言雍州京兆是也
