body:
  text: 新五代史卷五十六雜傳第四十四和凝和凝字成績鄆州須昌人也其九世祖逢堯為唐監察御史其後世遂不復宦學凝父矩性嗜酒不拘小節然獨好禮文士每傾貲以交之以故凝得與之游而凝幼聰敏形神秀發舉進士梁義成軍節度使賀瓌辟為從事瓌與唐莊宗戰于胡柳瓌戰敗脫身走獨凝隨之反顧見凝麾之使去凝曰丈夫當為知己死吾恨未得死所爾豈可去也已而一騎追瓌幾及凝叱之不止即引弓射殺之瓌由此得免瓌歸戒其諸子曰和生志義之士也後必富貴爾其謹事之因妻之以女天成中拜殿中侍御史累遷主客員外郎知制誥翰林學士知貢舉是時進士多浮薄喜為諠譁以動主司主司每放牓則圍之以棘閉省門絕人出入以為常凝徹棘開門而士皆肅然無譁所取皆一時之秀稱為得人晉初拜端明殿學士兼判度支為翰林學士承旨高祖數召之問以時事凝所對皆稱旨天福五年拜中書侍郎同中書門下平章事高祖將幸鄴而襄州安從進反迹已見凝曰陛下幸鄴從進必因此時反則將奈何高祖曰卿將何以待之凝曰先人者所以奪人也請為宣敕十餘通授之鄭王有急則命將擊之高祖以為然是時鄭王為開封尹留不從幸乃授以宣敕高祖至鄴從進果反鄭王即以宣敕命騎將李建崇焦繼勳等討之從進謂高祖方幸鄴不意晉兵之速也行至花山遇建崇等兵以為神遂敗走出帝即位加右僕射歲餘罷平章事遷左僕射漢高祖時拜太子太傅封魯國公顯德二年卒年五十八贈侍中凝好飾車服為文章以多為富有集百餘卷嘗自鏤板以行于世識者多非之然性樂善好稱道後進之士唐故事知貢舉者所放進士以己及第時名次為重凝舉進士及第時第五後知舉選范質為第五後質位至宰相封魯國公官至太子太傅皆與凝同當時以為榮焉趙瑩趙瑩字玄輝華州華陰人也為人純厚美風儀事梁將康延孝為從事晉高祖為保義軍節度使以瑩掌書記自是徙鎮常以瑩從高祖將起兵太原以問諸將吏將吏或贊成之瑩獨懼形于色勸高祖毋反高祖雖不用其言心甚愛之高祖即位拜翰林學士承旨戶部侍郎同中書門下平章事累拜中書令出為晉昌軍節度使開封尹是時出帝童昏馮玉李彥韜等用事與桑維翰爭權乃共譖去之以瑩柔而易制故復引以為相契丹滅晉瑩從出帝北徙虜中瑩事兀欲為太子太保周太祖時與契丹通好遣尚書左丞田敏使于契丹遇瑩于幽州瑩見敏悲不自勝瑩子易則易從當其徙而北也與易從俱而易則留事漢官至刑部郎中後瑩病將卒告于契丹願以尸還中國契丹許之及卒遣易從護其喪南歸太祖憐之贈瑩太傅葬于華陰馮玉馮玉字璟臣定州人也少舉進士不中馮贇為河東節度使辟為推官入拜監察御史累遷禮部郎中為鹽鐵判官晉出帝納玉姊為后玉以后戚知制誥拜中書舍人玉不知書而與殷鵬同為舍人制誥常遣鵬代作頃之玉出為潁州團練使拜端明殿學士戶部侍郎遷樞密使中書侍郎同中書門下平章事是時出帝童昏馮皇后用事軍國大務一決於玉玉嘗有疾在告自刺史已上宰相不敢除授以俟玉決玉除中書舍人盧價為工部侍郎桑維翰以價資望淺為不可由是與維翰有隙維翰由此罷相玉為相四方賄積貲鉅萬契丹滅晉張彥澤先以兵入京師兵士爭先入玉家其貲一夕而盡明日見彥澤猶諂笑自言願得持晉玉璽獻契丹以冀恩奬彥澤不納出帝之北玉從入契丹契丹以為太子太保周廣順三年其子傑自契丹逃歸玉懼以憂卒盧質盧質字子徵河南人也父望唐司勳郎中質幼聰惠善屬文事唐為祕書郎丁母憂解職後去遊太原晉王以為河東節度掌書記質與張承業等定議立莊宗為嗣莊宗將即位以質為大禮使拜行臺禮部尚書莊宗即位欲以質為相質性疎逸不欲任責因固辭不受拜太原尹北京留守遷戶部尚書翰林學士從平梁權判租庸遷兵部尚書後為學士承旨仍賜論思匡佐功臣天成元年拜匡國軍節度使三年拜兵部尚書判太常卿事歷鎮河陽橫海初梁已篡唐封哀帝為濟陰王既而酖殺之瘞于曹州同光三年莊宗將議改葬而曹太后崩乃止因其故壠稍廣其封以時薦饗而已質乃建議立廟追謚謚曰昭宣光烈孝皇帝廟號景宗天成四年八月戊申明宗御文明殿遣質奉冊立廟于曹州而議者以謂輝王不幸為賊臣所立而昭宗何皇后皆為梁所弒遂以亡國而昭宣光烈非所宜稱且立廟稱宗而不入太廟皆非是共以此非質大臣亦知其不可乃奏去廟號秦王從榮坐謀反誅質以右僕射權知河南府事廢帝反鳳翔愍帝發兵誅之竭帑藏以厚賞而兵至鳳翔皆叛降廢帝悉將而東事成許以重賞而軍士皆過望廢帝入立有司獻籍數甚少廢帝暴怒自諸鎮至刺史皆進錢帛助國用猶不足三司使王玫請率民財以佐用乃使質與玫等共議配率而貧富不均怨訟並起囚繫滿獄六七日間所得不滿十萬廢帝患之乃命質等借民屋課五月由是民大咨怨晉高祖入立質以疾分司西京拜太子太保卒年七十六贈太子太師謚曰文忠呂琦呂琦字輝山幽州安次人也父兗為橫海軍節度判官節度使劉守文與其弟守光以兵相攻守文敗死其吏民立其子延祚而事之以兗為謀主已而延祚又為守光所敗兗見殺守光怒兗幷族其家琦年十五見執將就刑兗故客趙玉紿其監者曰此吾弟也監者信之縱琦去玉與琦得俱走琦足弱不能行玉負之而行逾數百里變姓名乞食于道以免琦為人美風儀重節概少喪其家游學汾晉之間唐莊宗鎮太原以為代州軍事推官後為橫海趙德鈞節度推官入為殿中侍御史明宗時為駕部員外郎兼侍御史知雜事河陽主藏吏盜所監物下軍巡獄獄吏尹訓納賂反其獄其冤家訴于朝下御史臺按驗得訓贓狀奏攝訓赴臺訓為安重誨所庇不與琦請不已訓懼自殺獄乃辨蒙活者甚衆歲餘遷禮部郎中史館脩撰長興中廢帝失守河中罷居清化坊與琦同巷琦數往過之後廢帝入立待琦甚厚拜知制誥給事中樞密院直學士端明殿學士是時晉高祖鎮河東有二志廢帝患之琦與李崧俱備顧問多所裨畫琦言太原之患必引契丹為助不如先事制之自明宗時王都反定州契丹遣禿餒萴剌等助都而為趙德鈞王晏球所敗禿餒見殺萴剌等皆送京師其後契丹數遣使者求萴剌等其辭甚卑恭明宗輒斬其使者不報而東丹王又亡入中國契丹由此數欲求和琦因言方今之勢不如與契丹通和如漢故事歲給金帛妻之以女使彊藩大鎮顧外無所引援可弭其亂心崧以琦語語三司使張延朗延朗欣然曰苟能紓國患歲費縣官十數萬緡責吾取足可也因共建其事廢帝大喜佗日以琦等語問樞密直學士薛文遇文遇大以為非因誦戎昱社稷依明主安危託婦人之詩以誚琦等廢帝大怒急召崧琦等問和戎計如何琦等察帝色怒亟曰臣等為國計非與契丹求利於中國也帝即發怒曰卿等佐朕欲致太平而若是邪朕一女尚幼欲棄之夷狄金帛所以養士而扞國也又輸以資虜可乎崧等惶恐拜謝拜無數琦足力乏不能拜而先止帝曰呂琦彊項肯以人主視我邪琦曰臣素病羸拜多而乏容臣少息頃之喘定奏曰陛下以臣等言非罪之可也雖拜何益帝意稍解曰勿拜賜酒一巵而遣之其議遂寢因遷琦御史中丞居數月復為端明殿學士其後晉高祖起太原果引契丹為助遂以亡唐琦事晉為祕書監累遷兵部侍郎天福八年卒趙玉仕至職方員外郎琦事之如父玉疾親嘗藥扶侍及卒為其家主辦喪葬玉子文度幼孤琦教以學如己子後舉進士及第云琦有子餘慶端薛融薛融汾州平遙人也少以儒學知名唐明宗時為右補闕直弘文館晉高祖鎮太原融為觀察判官高祖徙鄆欲據太原拒命延見賓佐問以可否而坐中或贊成之或恐懼不敢言融獨從容對曰融本儒生爾軍旅之事未嘗學也進退存亡之理豈易言哉高祖不之責也高祖入立拜吏部郎中兼侍御史知雜事累拜左諫議大夫遷中書舍人融曰文辭非臣所長也遂辭不拜時詔修洛陽大內融上疏切諫高祖褒納其言即詔罷其役遷御史中丞改尚書右丞分司西京卒年六十何澤何澤廣州人也父鼎唐末為容管經略使澤少好學長於歌詩舉進士為洛陽令唐莊宗好畋獵數踐民田澤乃潛身伏草間伺莊宗當馬諫曰陛下未能一天下以休兵而暴斂疲民以給軍食今田將熟奈何恣畋游以害多稼使民何以出租賦吏以何督民耕陛下不聽臣言願賜臣死於馬前使後世知陛下之過莊宗大笑為之止獵拜倉部郎中明宗時數上書言事明宗幸汴州又欲幸鄴而人情不便大臣屢言不聽澤伏閤切諫明宗嘉之拜吏部郎中史館脩撰澤外雖直言而內實邪佞嘗於內殿起居班退獨留以笏叩顙北望而呼曰明主明主聞者皆哂之五代之際民苦於兵往往因親疾以割股或既喪而割乳廬墓以規免州縣賦役戶部歲給蠲符不可勝數而課州縣出紙號為蠲紙澤上書言其敝明宗下詔悉廢戶部蠲紙澤與宰相趙鳳有舊數私于鳳求為給諫鳳薄其為人以為太常少卿敕未出而澤先知之即稱新官上章自訴章下中書鳳等言澤未拜命而稱新官輕侮朝廷請坐以法乃以太僕少卿致仕居于河陽澤時年已七十尚希仕進即遣婢宜子詣匭上章言事請立秦王為皇太子秦王素驕多不軌遂成其禍由澤而始晉高祖入立召為太常少卿以疾卒于家王權王權字秀山太原人也唐左僕射起之曾孫父蕘官至右司郎中權舉進士為右補闕唐亡事梁為職方員外郎知制誥翰林學士累遷御史中丞唐莊宗滅梁貶權隨州司馬起為右庶子累遷戶部尚書晉高祖時為兵部尚書是時高祖以父事契丹權當奉使歎曰我雖不才安能稽顙於穹廬乎因辭不行坐是停任踰年以太子少傅致仕卒年七十八贈左僕射史圭史圭常山石邑人也為人明敏好學為寧晉樂壽縣令有善政縣人立碑以頌之郭崇韜鎮成德辟為從事明宗時為尚書郎安重誨為樞密使薦圭直學士故事直學士職雖清而承領文書參掌庶務與判官無異重誨素不知書倚圭以備顧問始白許圭升殿侍立樞密直學士升殿自圭始改尚書右丞判吏部銓事重誨敗死圭出為貝州刺史罷歸常山閉絕人事出入閭里乘輜軿車晉高祖立召拜刑部侍郎鹽鐵副使遷吏部侍郎分知銓事有能名以疾罷卒于常山龍敏龍敏字欲訥幽州永清人也少仕州攝參軍劉守光亂敏避之滄州遂客於梁久不調敏素善馮道道為唐莊宗從事乃潛往依之監軍張承業謂道曰聞子有客可與俱來道以敏見承業承業辟敏監軍巡官使掌奏記莊宗即位召拜司門員外郎敏父咸式年七十餘而其王父年九十餘皆在鄴敏乃求為興唐尹事祖父以孝聞丁母憂去職趙在禮反逼敏起視事明宗即位在禮鎮滄州敏乃復得居喪服除累拜兵部侍郎馮贇留守北京辟敏副留守贇入為樞密使敏拜吏部侍郎是時晉高祖起太原乞兵契丹唐廢帝在懷州趙德鈞父子有異志張敬達屯于晉安勢甚危急廢帝問計從臣敏曰晉所恃者契丹也東丹王失國之君今在京師若以兵送東丹自幽州而入西樓契丹且有內顧之憂何暇助晉晉失契丹大事去矣又謂李懿曰敏燕人也能知德鈞德鈞為將守城嬰塹篤勵健兒而已使其當大敵奮不顧身非其能也況有異志乎今聞駕前之馬猶有五千願得壯者千匹健兵千人與勇將郎萬金自平遙沿山冒虜中而趨官砦且戰且行得其半達則事濟矣懿為言之廢帝廢帝莫能用然人皆壯其大言歷晉為太常卿使于吳越是時使吳越者見吳越王皆下拜敏獨揖之還遷工部侍郎乾祐元年瘍發於首卒贈右僕射
