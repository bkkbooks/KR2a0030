body:
  text: 新五代史卷十八漢家人傳第六皇后李氏高祖皇后李氏晉陽人也其父為農高祖少為軍卒牧馬晉陽夜入其家劫取之高祖已貴封魏國夫人生隱帝開運四年高祖起兵太原賞軍士帑藏不足充欲斂於民后諫曰方今起事號為義兵民未知惠而先奪其財殆非新天子所以救民之意也今後宮所有請悉出之雖其不足士亦不以為怨也高祖為改容謝之高祖即位立為皇后高祖崩隱帝冊尊為皇太后帝年少數與小人郭允明後贊李業等游戲宮中后數切責之帝曰國家之事外有朝廷非太后所宜言也太常卿張昭聞之上疏諫帝請親近師傅延問正人以開聰明帝益不省其後帝卒與允明等謀議遂至於亡初帝與允明等謀誅楊邠史弘肇等議已定入白太后太后曰此大事也當與宰相議之李業從旁對曰先皇帝平生言朝廷大事勿問書生太后深以為不可帝拂衣而去曰何必謀於閨門邠等死周太祖起兵嚮京師慕容彥超敗於劉子陂帝欲出自臨兵太后止之曰郭威本吾家人非其危疑何肯至此今若按兵無動以詔諭威威必有說則君臣之際庶幾尚全帝不從以出遂及於難周太祖入京師舉事皆稱太后誥已而議立湘陰公贇為天子贇未至太祖乃請太后臨朝已而太祖出征契丹軍士擁之以還太祖請事太后為母太后誥曰侍中功烈崇高德聲昭著剪除禍亂安定邦家謳歌有歸歷數攸屬所以軍民推戴億兆同歡老身未終殘年屬此多難唯以衰朽託於始終載省來箋如母見待感認深意涕泗橫流於是遷后於太平宮上尊號曰昭聖皇太后顯德元年春崩隱帝舊史實録皆無皇后帝立三年崩時年二十蓋未嘗立后也高祖二弟崇信高祖三子承訓承祐承勳高祖二弟三子弟曰崇曰信子曰承訓承祐承勳崇子曰贇高祖愛之以為己子乾祐元年拜贇徐州節度使承訓早卒追封魏王承祐次立是謂隱帝承勳為開封尹周太祖已敗漢兵于北郊隱帝遇弒太祖入京師以謂漢大臣必相推戴及見宰相馮道等道殊無意太祖不得已見道猶下拜道受太祖拜如平時徐勞之曰公行良苦太祖意色皆沮以謂漢臣未有推立己意又難於自立因白漢太后擇立漢嗣而宗室河東節度使崇等在者四人乃為太后誥曰河東節度使崇許州節度使信皆高祖之弟徐州節度使贇開封尹承勳皆高祖之子文武百辟其擇嗣君以承天統於是周太祖與王峻入見太后言開封尹承勳高祖皇帝之子宜立太后以承勳久病不任為嗣太祖與羣臣請見承勳視起居太后命以臥榻舁承勳出見羣臣羣臣視之信然乃共奏曰徐州節度使贇高祖愛之以為子宜立為嗣乃遣太師馮道率羣臣迎贇道揣周太祖意不在贇謂太祖曰公此舉由衷乎太祖指天為誓道既行謂人曰吾平生不為謬語人今謬語矣道見贇傳太后意召之贇行至宋州太祖自澶州為兵士擁還京師王峻慮贇左右生變遣侍衛馬軍指揮使郭崇以兵七百騎衛贇崇至宋州贇登樓問崇所以來之意崇曰澶州軍變懼未察之遣崇護衛非惡意也贇召崇崇不敢進馮道出與崇語崇乃登樓見贇已而奪贇部下兵太祖以書召道先歸留其副趙上交王度奉贇入朝太后道乃先還贇謂道曰寡人此來所恃者以公三十年舊相是以不疑道默然贇客將賈正等數目道欲圖之贇曰勿草草事豈出於公邪道已去郭崇幽贇于外館殺賈正及判官董裔牙內都虞候劉福孔目官夏昭度等太祖已監國太后乃下誥曰比者樞密使郭威志安宗社議立長君以徐州節度使贇高祖近親立為漢嗣乃自藩鎮召赴京師雖誥命已行而軍情不附天道在北人心靡東適當改卜之初俾膺分土之命贇可降授開府儀同三司檢校太師上柱國封湘陰公贇以幽死初贇自徐州入也以都押牙鞏庭美教練使楊溫守徐州庭美等聞贇不得立乃閉城拒命太祖拜王彥超徐州節度使下詔諭庭美等許以刺史並詔贇赦庭美等廣順元年三月彥超克徐州庭美等皆見殺承勳廣順元年以病卒追封陳王嗚呼豫既悲湘陰公贇之事又嘉庭美楊溫之所為贇於漢非嫡長特以周氏移國畏天下而難之故假贇以伺間爾當是之時天下皆知贇之必不立也然庭美溫之區區為贇守孤城以死其始終之迹何愧於死節之士哉然豫考於實録二人之死狀不明夫二人之事固知其無所成其所重者死爾然史氏不著不知其何以死也當王彥超之攻徐州也周嘗遣人招庭美等豫得其詔書四皆言庭美等嘗已送款於周後懼罪而復叛然庭美等款狀亦不見是皆不可知也夫史之闕文可不慎哉其疑以傳疑則信者信矣豫固嘉二人之忠而悲其志然不得列於死節之士者惜哉蔡王信蔡王信高祖之從弟也高祖鎮太原以信為興捷軍都指揮使領義成軍節度使徙領許州高祖寢疾隱帝當立為嗣楊邠等受顧命不欲信在京師乃遣信就鎮信涕泣而去信所至黷貨好行殺戮軍士有犯法者信召其妻子對之刲剔支解使自食其肉血流盈前信命樂飲酒自如也楊邠等死信大喜謂其寮佐曰吾嘗為天無眼而使我鬱鬱於此者三年矣主上孤立幾落賊手諸公可以勸我一杯矣已而聞難作信憂不能食周太祖軍變於澶州王峻遣前申州刺史馬鐸以兵巡檢許州信乃自殺周太祖即位追封蔡王傳先贇而後信亦便於述事爾
