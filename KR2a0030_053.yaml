body:
  text: 新五代史卷五十三雜傳第四十一王景崇王景崇邢州人也為人明敏巧辨善事人唐明宗鎮邢州以為牙將其後嘗從明宗隸麾下明宗即位拜通事舍人歷引進閣門使馳詔方鎮監軍征伐必用景崇後事晉纍拜左金吾衛大將軍常怏怏人主不能用其材晉亡蕭翰據京師景崇厚賂其將高牟翰以求用已而翰北歸許王從益居京師用景崇為宣徽使監左藏庫漢高祖起太原景崇取庫金奔迎高祖高祖至京師拜景崇右衛大將軍未之奇也高祖攻鄴景崇不得從乃求留守起居表詣行在見高祖願留軍中效用為高祖畫攻戰之策甚有辨高祖乃奇其材一本作宮是時漢方新造鳳翔侯益永興趙贊皆嘗受命契丹高祖立益等內顧自疑乃陰召蜀人為助高祖患之及已破鄴益等懼皆請入朝會回鶻入貢言為党項所隔不得通願得漢兵為援高祖遣景崇以兵迎回鶻景崇將行高祖已疾召入臥內戒之曰益等已來善矣若猶遲疑則以便宜圖之景崇行至陝趙贊已東入朝而蜀兵方寇南山景崇擊破蜀兵追至大散關而還高祖乃詔景崇兼鳳翔巡檢使景崇至鳳翔侯益未有行意而高祖崩或勸景崇可速誅益景崇念獨受命先帝而少主莫知猶豫未決益從事程渥與景崇同鄉里有舊往說景崇曰吾與子為故人吾位不過賓佐而子已貴矣奈何欲以陰狡害人而取之乎侯公父子爪牙數百子毋妄發禍行及矣非吾誰為子言之於是景崇頗不欲殺益益乃亡去景崇大悔失不殺之益至京師隱帝新立史弘肇楊邠等用事益乃厚賂邠等陰以事中景崇已而益拜開封尹景崇心不自安諷鳳翔將吏求己領府事朝廷患之拜景崇邠州留後以趙暉為鳳翔節度使景崇乃叛盡殺侯益家屬與趙思綰共推李守貞為秦王隱帝即以趙暉討之景崇西招蜀人為助蜀兵至寶雞為暉將藥元福李彥從所敗暉攻鳳翔塹而圍之數以精兵挑戰景崇不出暉乃令千人潛之城南一舍僞為蜀兵旗幟循南山而下聲言蜀救兵至矣須臾塵起景崇以為然乃令數千人潰圍而出以為應暉設伏以待之景崇兵大敗由是不敢復出明年守貞思綰相次皆敗景崇客周璨謂景崇曰公能守此者以有河中京兆也今皆敗矣何所恃乎不如降也景崇曰誠纍君等然事急矣吾欲為萬有一得之計可乎吾聞趙暉精兵皆在城北今使公孫輦等燒城東門僞降吾以牙兵擊其城北兵脫使不成而死猶勝於束手也璨等皆然之遲明輦燒東門將降而府中火起景崇自焚矣輦乃降暉趙思綰趙思綰魏州人也為河中節度使趙贊牙將漢高祖即位徙贊鎮永興贊入朝京師留思綰兵數百人於永興高祖遣王景崇至永興與齊藏珍以兵迎回鶻陰以西事屬之景崇至永興贊雖入朝而其所召蜀兵已據子午谷景崇用思綰兵擊走之遂與思綰俱西然以非己兵懼思綰等有二心意欲黥其面以自隨而難言之乃稍微風其旨思綰厲聲請先黥以率衆齊藏珍惡之竊勸景崇殺思綰景崇不聽與俱西高祖遣使者召思綰等是時侯益來朝思綰以兵從益東歸思綰謂其下常彥卿曰趙公已入人手吾屬至並死矣奈何彥卿曰事至而變勿預言也益行至永興永興副使安友規出迎益飲于郊亭思綰前曰兵館城東然將士家屬皆居城中願縱兵入城挈其家屬益信之以為然思綰與部下入城有州校坐於城門思綰歐之奪其佩刀斬之並斬門者十餘人遂閉門劫庫兵以叛高祖遣郭從義王峻討之經年莫能下而王景崇亦叛與思綰俱送款於李守貞守貞以思綰為晉昌軍節度使隱帝遣郭威西督諸將兵先圍守貞於河中居數月思綰城中食盡殺人而食每犒宴殺人數百庖宰一如羊豕思綰取其膽以酒吞之語其下曰食膽至千則勇無敵矣思綰計窮募人為地道將走蜀其判官陳讓能謂思綰曰公比於國無嫌但懼死而為此爾今國家用兵三方勞敝不已誠能翻然效順率先自歸以功補過庶幾有生若坐守窮城待死而已思綰然之乃遣教練使劉圭詣從義乞降而遣其將劉筠奉表朝廷拜思綰鎮國軍留後趣使就鎮思綰遲留不行蜀陰遣人招思綰思綰將奔蜀而從義亦疑之乃遣人白郭威威命從義圖之從義因入城召思綰趣之上道至則擒之思綰問曰何以用刑告者曰立釘也思綰厲聲曰為吾告郭公吾死未足塞責然釘磔之醜壯夫所恥幸少假之從義許之父子俱斬於市慕容彥超慕容彥超吐谷渾部人漢高祖同産弟也嘗冒姓閻氏彥超黑色胡髯號閻崑崙少事唐明宗為軍校纍遷刺史唐晉之間歷磁單濮棣四州坐濮州造麴受賕法當死漢高祖自太原上章論救得減死流于房州契丹滅晉漢高祖起太原彥超自流所逃歸漢拜鎮寧軍節度使杜重威反於魏高祖以天平軍節度使高行周為都部署以討之以彥超為副彥超與行周謀議多不協行周用兵持重兵至城下久之不進彥超欲速進戰而行周不許行周有女嫁重威子彥超揚言行周以女故惜賊城而不攻行周大怒高祖聞二人不相得懼有他變由是遽親征彥超數以事凌辱行周行周不能忍見宰相涕泣以屎塞口以自訴高祖知曲在彥超遣人慰勞行周召彥超責之又遣詣行周謝過行周意稍解是時漢兵頓魏城下已久重威守益堅諸將皆知未可圖方伺其隙而彥超獨言可速攻高祖以為然因自督士卒急攻死傷者萬餘人由是不敢復言攻後重威出降高祖以行周為天雄軍節度使行周辭不敢受高祖遣蘇逢吉諭之曰吾當為爾徙彥超行周乃受而彥超徙鎮泰寧隱帝已殺史弘肇等又遣人之魏殺周太祖及王峻等懼事不果召諸將入衛京師使者至兗彥超方食釋匕箸而就道周兵犯京師開封尹侯益謂隱帝曰北兵之來其家屬皆在京師宜閉門以挫其鋭遣其妻子登陴以招北兵可使解甲彥超誚益曰益老矣此懦夫之計也隱帝乃遣彥超副益將兵于北郊周兵至益夜叛降于周彥超力戰于七里隱帝出勞軍太后使人告彥超善衛帝彥超大言報曰北兵何能為當於陳上喝坐使歸營又謂隱帝曰官家宮中無事明日可出觀臣戰明日隱帝復出勞軍彥超戰敗奔兗州隱帝遇弒于北郊周太祖入立彥超不自安數有所獻太祖報以玉帶又賜詔書安慰之呼彥超為弟而不名又遣翰林學士魯崇諒往慰諭之彥超心益疑懼已而劉旻自立于太原出兵攻晉絳太祖遣王峻用兵西方彥超乘間亦謀反遣押衙鄭麟至京師求入朝太祖知其詐手詔許之彥超復稱管內多盜而止又為高行周所與書以進其辭皆指斥周過失若欲共反者太祖驗其印文僞以書示行周彥超又遣人南結李為出兵攻沭陽為周兵所敗而劉旻攻晉絳不克解去太祖乃遣侍衛步軍指揮使曹英客省使向訓討之彥超閉城自守初彥超之反也判官崔周度諫曰魯詩書之國也自伯禽以來未有能霸者然以禮義守之而長世者多矣今公英武一代之豪傑也若量力相時而動可以保富貴終身李河中安襄陽鎮陽杜令公近歲之龜鑑也彥超大怒未有以害之已而見圍因大括城中民資以犒軍前陝州司馬閻弘魯懼其鞭撲乃悉家資以獻彥超以為未盡又欲並罪周度乃令周度監括弘魯家周度謂弘魯曰公命之死生繫財之多少願無隱也弘魯遣家僮與周度斸掘搜索無所得彥超又遣鄭麟持刃迫之弘魯惶恐拜其妻妾妻妾皆言無所隱周度入白彥超彥超不信下弘魯及周度于獄弘魯乳母於泥中得金纏臂獻彥超欲贖出弘魯彥超大怒遣軍校笞弘魯夫婦肉爛而死遂斬周度于市是歲鎮星犯角亢占曰角亢鄭分兗州當焉彥超即率軍府將吏步出西門三十里致祭迎於開元寺塑像以事之日常一至又使民家立黃幡以禳之彥超為人多智詐而好聚斂在鎮嘗置庫質錢有奸民為僞銀以質者主吏久之乃覺彥超陰教主吏夜穴庫垣盡徙其金帛于他所而以盜告彥超即榜于市使民自占所質以償之民皆爭以所質物自言已而得質僞銀者置之深室使教十餘人日夜為之皆鐵為質而包以銀號鐵胎銀其被圍也勉其城守者曰吾有銀數千鋌當悉以賜汝軍士私相謂曰此鐵胎爾復何用哉皆不為之用明年五月太祖親征城破彥超夫妻皆投井死其子繼勳率其徒五百人出奔被擒遂滅其族兗州平太祖詔贈閻弘魯左驍衛大將軍崔周度祕書監
