body:
  text: 新五代史卷十五唐明宗家人傳第三皇后曹氏皇后夏氏明宗三后一妃和武憲皇后曹氏生晉國公主昭懿皇后夏氏生秦王從榮愍帝宣憲皇后魏氏潞王從珂母也淑妃王氏許王從益之慈母也曹氏夏氏皆不見其世家夏氏無封爵明宗未即位前卒明宗天成元年封楚國夫人曹氏為淑妃追封夏氏晉國夫人長興元年立淑妃為皇后而夏氏所生二子皆已王乃追冊為皇后諡曰昭懿皇后魏氏魏氏鎮州平山人也初適平山民王氏生子十歲矣明宗為騎將掠平山得其子母以歸居數年魏氏卒葬太原其子是為潞王從珂明宗時從珂已王乃追封魏氏為魯國夫人廢帝即位追尊魏氏為皇太后議建陵寢而太原石敬瑭反乃於京師河南府東立寢宮清泰三年六月丙寅遣工部尚書崔儉奉上皇太后寶冊諡曰宣憲淑妃王氏淑妃王氏邠州餅家子也有美色號花見羞少賣梁故將劉為侍兒卒王氏無所歸是時明宗夏夫人已卒方求別室有言王氏於安重誨者重誨以告明宗而納之王氏素得金甚多悉以遺明宗左右及諸子婦人人皆為王氏稱譽明宗益愛之而夫人曹氏為人簡質常避事由是王氏專寵明宗即位議立皇后而曹氏當立曹氏謂王氏曰我素多病而性不耐煩妹當代我王氏曰后帝匹也至尊之位誰敢干之乃立曹氏為皇后王氏為淑妃妃事皇后亦甚謹每帝晨起盥櫛服御皆妃執事左右及罷朝帝與皇后食妃侍食徹乃退未嘗少懈皇后心亦益愛之然宮中之事皆主於妃明宗病妃與宦者孟漢瓊出納左右遂專用事殺安重誨秦王從榮皆與焉劉諸子皆以妃故封拜官爵愍帝即位冊尊皇后為皇太后妃為皇太妃初明宗後宮有生子者命妃母之是為許王從益從益乳母司衣王氏見明宗已老而秦王握兵心欲自託為後計乃曰兒思秦王是時從益已四歲又數教從益自言求見秦王明宗遣乳嫗將兒往來秦府遂與從榮私通從榮因使王氏伺察宮中動靜從榮已死司衣王氏以謂秦王實以兵入宮衛天子而以反見誅出怨言愍帝聞之大怒賜司衣王氏死而事連太妃由是心不悅欲遷之至德宮以太后素善妃懼傷其意而止然待之甚薄廢帝入立嘗置酒妃院妃舉酒曰願辭皇帝為比丘尼帝驚問其故曰小兒處偶得命若大兒不容則死之日何面見先帝因泣下廢帝亦為之悽然待之頗厚石敬瑭兵犯京師廢帝聚族將自焚妃謂太后曰事急矣宜少回避以俟姑夫太后曰我家至此何忍獨生妹自勉之太后乃與帝俱燔死而妃與許王從益及其妹匿於鞠院以免晉高祖立妃自請為尼不可乃遷于至德宮晉遷都汴以妃子母俱東置於宮中高祖皇后事妃如母天福四年九月癸未詔以郇國三千戶封唐許王從益為郇國公以奉唐祀服色旌旗一依舊制太常議立莊宗明宗愍帝三室以至德宮為廟詔立高祖太宗為五廟使從益歲時主祠出帝即位妃母子俱還洛陽契丹犯京師趙延壽所尚明宗公主已死耶律德光乃為延壽娶從益妹是為永安公主公主不知其母為誰素亦養於妃妃至京師主婚禮德光見明宗畫像焚香再拜顧妃曰明宗與我約為弟兄爾吾嫂也已而靳之曰今日乃吾婦也乃拜從益為彰信軍節度使從益辭不之官與妃俱還洛陽德光北歸留蕭翰守汴州漢高祖起太原翰欲北去乃使人召從益委以中國從益子母逃於徽陵域中以避使者使者迫之以東遂以從益權知南朝軍國事從益御崇元殿翰率契丹諸將拜殿上晉羣臣拜殿下羣臣入謁太妃妃曰吾家子母孤弱為翰所迫此豈福邪禍行至矣乃以王松趙上交為左右丞相李式翟光鄴為樞密使燕將劉祚為侍衛親軍都指揮使翰留契丹兵千人屬祚而去漢高祖擁兵而南從益遣人召高行周武行德等為拒行周等皆不至乃與王松謀以燕兵閉城自守妃曰吾家亡國之餘安敢與人爭天下乃遣人上書迎漢高祖高祖聞其嘗召行周而不至遣郭從義先入京師殺妃母子妃臨死呼曰吾家母子何罪何不留吾兒使每歲寒食持一盂飯灑明宗墳上聞者悲之從益死時年十七皇后孔氏愍帝哀皇后孔氏父循橫海軍節度使后有賢行生四子愍帝即位立為皇后未及冊命而難作愍帝出奔后病子幼皆不能從廢帝入立后及四子皆見殺晉高祖立追諡曰哀明宗子從璟明宗四子曰從璟從榮從厚從益從璟初名從審為人驍勇善戰而謙退謹敕從莊宗戰數有功為金槍指揮使明宗軍變于魏莊宗謂從璟曰爾父於國有大功忠孝之心朕自明信今為亂軍所逼爾宜自往宣朕意毋使自疑從璟馳至衛州為元行欽所執將殺之從璟呼曰我父為亂軍所逼公等不亮其心我亦不能至魏願歸衛天子行欽釋之莊宗憐其言賜名繼璟以為己子從莊宗如汴州將士多亡於道獨從璟不去左右或勸其逃禍從璟不聽莊宗聞明宗已渡黎陽復欲遣從璟通問行欽以為不可遂殺之明宗即位贈太保嗚呼無父烏生無君烏以為生而世之言曰為忠孝者不兩全夫豈然哉君父人倫之大本忠孝臣子之大節豈其不相為用而又相害者乎抑私與義而已耳蓋以其私則兩害以其義則兩得其父以兵攻其君為其子者從父乎從君乎曰身從其居志從其義可也身居君所則從君居父所則從父其從於君者必辭其君曰子不可以射父願無與兵焉則又號泣而呼其父曰盍捨兵而歸我君乎君敗則死之父敗則終喪而事君其從於父者必告之曰君不可以射也盍捨兵而歸吾君乎君敗則死之父敗則待罪於君赦己則終喪而事之古之知孝者莫如舜知義者莫如孔孟其於君臣父子之際詳矣使其不幸而遭焉其亦如是而已矣從璟之於莊宗知所從而得其死矣哀哉秦王從榮秦王從榮天成元年以檢校司徒兼御史大夫拜天雄軍節度使同中書門下平章事三年徙鎮河東長興元年拜河南尹兼判六軍諸衛事從璟死從榮於諸皇子次最長又握兵柄然其為人輕雋而鷹視頗喜儒學為歌詩多招文學之士賦詩飲酒故後生浮薄之徒日進諛佞以驕其心自將相大臣皆患之明宗頗知其非而不能裁制從榮嘗侍側明宗問曰爾軍政之餘習何事業對曰有暇讀書與諸儒講論經義爾明宗曰經有君臣父子之道然須碩儒端士乃可親之吾見先帝好作歌詩甚無謂也汝將家子文章非素習必不能工傳於人口徒取笑也吾老矣於經義雖不能曉然尚喜屢聞之其餘不足學也是歲秋封從榮秦王故事諸王受封不朝廟而有司希旨欲重其禮乃建議曰古者因禘嘗而發爵祿所以示不敢專今受大封而不告廟非敬順之道也於是從榮朝服乘輅車具鹵簿至朝堂受冊出載冊以車朝于太廟京師之人皆以為榮三年加兼中書令有司又言故事親王班宰相下今秦王位高而班下不稱於是與宰相分班而居右四年加尚書令食邑萬戶太僕少卿何澤上書請立從榮為皇太子是時明宗已病得澤書不悅顧左右曰羣臣欲立太子吾當養老於河東乃召大臣議立太子事大臣皆莫敢可否從榮入白曰臣聞姦人言欲立臣為太子臣實不願也明宗曰此羣臣之欲爾從榮出見范延光趙延壽等曰諸公議欲立吾為太子是欲奪吾兵柄而幽之東宮耳延光等患之乃加從榮天下兵馬大元帥有司又言元帥或統諸道或專一面自前世無天下大元帥之名其禮無所考按請自節度使以下凡領兵職者皆具櫜鞬以軍禮庭參其兼同中書門下平章事者初見亦如之其後許如客禮凡元帥府文符行天下皆用帖又升班在宰相上從榮大宴元帥府諸將皆有頒給控鶴奉聖嚴衛指揮使人馬一匹絹十匹其諸軍指揮使人絹十匹都頭已下七匹至三匹又請嚴衛捧聖千人為牙兵每入朝以數百騎先後張弓挾矢馳走道上見者皆震懾從榮又命其寮屬及四方游士試作征淮檄陳己所以平一天下之意言事者請為諸王擇師傅以加訓導宰相難其事因請從榮自擇從榮乃請翰林學士崔梲刑部侍郎任贊為元帥判官明宗曰學士代豫言不可也從榮出而恚曰任以元帥而不得請屬寮非吾所諭也將相大臣見從榮權位益隆而輕脫如此皆知其禍而莫敢言者惟延光延壽陰有避禍意數見明宗涕泣求解樞密二人皆引去而從榮之難作十一月戊子雪明宗幸宮西士和亭得傷寒疾己丑從榮與樞密使朱弘昭馮贇入問起居於廣壽殿帝不能知人王淑妃告曰從榮在此又曰弘昭等在此皆不應從榮等去乃遷於雍和殿宮中皆慟哭至夜半後帝蹶然自興於榻而侍疾者皆去顧殿上守漏宮女曰夜漏幾何對曰四更矣帝即唾肉如肺者數片溺涎液斗餘守漏者曰大家省事乎曰吾不知也有頃六宮皆至曰大家還魂矣因進粥一器至旦疾少愈而從榮稱疾不朝初從榮常忌宋王從厚賢於己而懼不為嗣其平居驕矜自得及聞人道宋王之善則愀然有不足之色其入問疾也見帝已不知人既去而聞宮中哭聲以謂帝已崩矣乃謀以兵入宮使其押衙馬處鈞告弘昭等欲以牙兵入宿衛問何所可以居者弘昭等對曰宮中皆王所可居王自擇之因私謂處鈞曰聖上萬福王宜竭力忠孝不可草草處鈞具以告從榮從榮還遣處鈞語弘昭等曰爾輩不念家族乎弘昭贇及宣徽使孟漢瓊等入告王淑妃以謀之曰此事須得侍衛兵為助乃召侍衛指揮使康義誠謀於竹林之下義誠有子在秦王府不敢決其謀謂弘昭曰僕為將校惟公所使爾弘昭大懼明日從榮遣馬處鈞告馮贇曰吾今日入居興聖宮又告義誠義誠許諾贇即馳入內見義誠及弘昭漢瓊等坐中興殿閣議事贇責義誠曰主上所以畜養吾徒者為今日爾今安危之機間不容髮奈何以子故懷顧望使秦王得至此門主上安所歸乎吾輩復有種乎漢瓊曰賤命不足惜吾自率兵拒之即入見曰從榮反兵已攻端門宮中相顧號泣明宗問弘昭等曰實有之乎對曰有之明宗以手指天泣下良久曰義誠自處置毋令震動京師潞王子重吉在側明宗曰吾與爾父起微賤至取天下數救我危窘從榮得何氣力而作此惡事爾亟以兵守諸門重吉即以控鶴兵守宮門是日從榮自河南府擁兵千人以出從榮寮屬甚衆而正直之士多見惡其尤所惡者劉贊王居敏而所昵者劉陟高輦從榮兵出與陟輦並轡耳語行至天津橋南指日景謂輦曰明日而今誅王居敏矣因陳兵橋北下據胡牀而坐使人召康義誠而端門已閉叩左掖門亦閉而於門隙中見捧聖指揮使朱弘實率騎兵從北來即馳告從榮從榮驚懼索鐵厭心自調弓矢皇城使安從益率騎兵三百衝之從榮兵射之從益稍却弘實騎兵五百自左掖門出方渡河而後軍來者甚衆從榮乃走歸河南府其判官任贊已下皆走出定鼎門牙兵劫嘉善坊而潰從榮夫妻匿牀下從益殺之明宗聞從榮已死悲咽幾墮于榻絶而蘇者再馮道率百寮入見明宗曰吾家事若此慚見羣臣君臣相顧泣下沾襟從榮二子尚幼皆從死後六日而明宗崩明宗姪從璨明宗兄弟皆不見于世家而有姪四人曰從璨從璋從溫從敏從璨初為右衛大將軍安重誨用事自諸王將相皆下之從璨為人剛猛不能少屈而性倜儻輕財好施重誨忌之明宗幸汴州以從璨為大內皇城使嘗於會節園飲酒酣戲登御榻重誨奏其事貶房州司戶參軍賜死重誨見誅詔復其官贈太保從璋從璋字子良少善騎射莊宗時將兵戍常山聞明宗兵變于魏乃亦起兵據邢州明宗即位以為捧聖左廂都指揮使改皇城使領饒州刺史拜彰國軍節度使徙鎮義成明宗幸汴州從璋欲率民為貢獻其從事諫以為不可從璋怒引弓欲射之坐罷為右驍衛上將軍居久之出鎮保義徙河中長興四年夏封洋王晉高祖立徙鎮威勝降封隴西郡公從璋為人貪鄙自鎮保義始折節自修在南陽頗有遺愛天福二年卒年五十一從溫從溫字德基初為北京副留守歷安國忠武義武成德武寧五節度使封兗王晉高祖立復為忠武軍節度使從溫為人貪鄙多作天子器服以自僭宗族賓客諫之不聽其妻關氏大呼于牙門曰從溫欲反而造天子服器從溫大恐乃悉毀之明宗諸子八人至晉出帝時六已亡歿惟從溫從敏在太后常曰吾惟有一兄豈可繩之以法從溫由此益驕嘗誣親吏薛仁嗣為盜悉籍沒其家資數千萬仁嗣等詣闕自訴事下有司從溫具伏出帝懼傷太后意釋之而不問開運二年徙河陽三城卒于官是時從璋子重俊為虢州刺史坐贓亦以太后故罪其判官高獻而已重俊復為商州刺史坐與其妹姦及殺其僕孫漢榮掠其妻賜死從敏從敏字叔達為人沉厚寡言善騎射初從莊宗為馬步軍都指揮使兼行軍司馬明宗入立遷皇城使保義軍節度使與討王都歷鎮橫海義武成德歸德保義昭義河陽封涇王漢高祖時為西京留守封秦國公周廣順元年卒贈中書令諡曰恭惠
