body:
  text: 新五代史卷七十三四夷附錄第二兀欲東丹王突欲子也突欲奔于唐兀欲留不從號永康王契丹好飲人血突欲左右姬妾多刺其臂吮之其小過輒挑目刲灼不勝其毒然喜賓客好飲酒工畫頗知書其自契丹歸中國載書數千卷樞密使趙延壽每假其異書醫經皆中國所無者明宗時自滑州朝京師遙領武信軍節度使食其俸賜甲第一區宮女數人契丹兵助晉于太原唐廢帝遣宦者秦繼旻皇城使李彥紳殺突欲于其第晉高祖追封突欲為燕王德光滅晉兀欲從至京師德光殺繼旻彥紳籍其家貲悉以賜兀欲德光死欒城兀欲與趙延壽及諸大將等俱入鎮州延壽自稱權知軍國事遣人求鎮州管鑰于兀欲兀欲不與延壽左右曰契丹大人聚而謀者詾詾必有變宜備之今中國之兵猶有萬人可以擊虜不然事必不成延壽猶豫不決兀欲妻延壽以為妹五月朔旦兀欲召延壽及張礪李崧馮道等置酒酒數行兀欲謂延壽曰妹自上國來當一見之延壽欣然與兀欲俱入食頃兀欲出坐笑謂礪等曰燕王謀反鎖之矣諸君可無慮也又曰先帝在汴州與我算子一莖許我知南朝軍國事昨聞寢疾無遺命燕王安得自擅邪礪等罷去兀欲召延壽廷立而詰之延壽不能對乃遣人監之而籍其家貲兀欲宣德光遺制曰永康王大聖皇帝之嫡孫人皇王之長子可於中京即皇帝位中京契丹謂鎮州也遣使者告哀於諸鎮蕭翰聞德光死棄汴州而北至鎮州兀欲已去翰以騎圍張礪宅執礪而責曰汝教先帝勿用胡人為節度使何也礪對不屈翰鎖之是夕礪卒兀欲為人儁偉亦工畫能飲酒好禮士德光嘗賜以絹數千匹兀欲散之一日而盡兀欲已立先遣人報其祖母述律述律怒曰我兒平晉取天下有大功業其子在我側者當立而人皇王背我歸中國其子豈得立邪乃率兵逆兀欲將廢之兀欲留其將麻荅守鎮州晉諸將相隨德光在鎮州者皆留之而去以翰林學士徐台符李澣從行與其祖母述律相距于石橋述律所將兵多亡歸兀欲兀欲乃幽述律於祖州祖州阿保機墓所也述律為人多智而忍阿保機死悉召從行大將等妻謂曰我今為寡婦矣汝等豈宜有夫乃殺其大將百餘人曰可往從先帝左右有過者多送木葉山殺於阿保機墓隧中曰為我見先帝于地下大將趙思溫本中國人也以材勇為阿保機所寵述律後以事怒之使送木葉山思溫辭不肯行述律曰爾先帝親信安得不往見之思溫對曰親莫如后后何不行述律曰我本欲從先帝于地下以子幼國中多故未能也然可斷吾一臂以送之左右切諫之乃斷其一腕而釋思溫不殺初德光之擊晉也述律常非之曰吾國用一漢人為主可乎德光曰不可也述律曰然則汝得中國不能有後必有禍悔無及矣德光死載其尸歸述律不哭而撫其尸曰待我國中人畜如故然後葬汝已而兀欲囚之後死于木葉山兀欲更名阮號天授皇帝改元曰天祿是歲八月葬德光於木葉山遣人至鎮州召馮道和凝等會葬使者至鎮州鎮州軍亂大將白再榮等逐出麻荅據定州已而悉其衆以北麻荅者德光之從弟也德光滅晉以為邢州節度使元欲立命守鎮州麻荅尤酷虐多略中國人剝面抉目拔髮斷腕而殺之出入常以鉗鑿挑割之具自隨寢處前後掛人肝脛手足言笑自若鎮定之人不勝其毒麻荅已去馮道等乃南歸漢乾祐元年兀欲率萬騎攻邢州陷內丘契丹入寇常以馬嘶為候其來也馬不嘶鳴而矛戟夜有光又月食虜衆皆懼以為凶雖破內丘而人馬傷死者太半兀欲立五年會諸部酋長復謀入寇諸部大人皆不欲兀欲彊之燕王述軋與太寧王嘔里僧等率兵殺兀欲於大神淀德光子齊王述律聞亂走南山契丹擊殺述軋嘔里僧而迎述律以立述律立改元應曆號天順皇帝後更名璟述律有疾不能近婦人左右給事多以宦者然畋獵好飲酒不恤國事每酣飲自夜至旦晝則常睡國人謂之睡王初兀欲常遣使聘漢使者至中國而周太祖入立太祖復遣將軍朱憲報聘憲還而兀欲死述律立遂不復南寇顯德六年夏世宗北伐以保大軍節度使田景咸為淤口關部署右神武統軍李洪信為合流口部署前鳳翔節度使王晏為益津關部署侍衞親軍馬步都虞候韓通為陸路都部署世宗自乾寧軍御龍舟艛船戰艦首尾數十里至益津關降其守將而河路漸狹舟不能進乃捨舟陸行瓦橋淤口關瀛莫州守將皆迎降方下令進攻幽州世宗遇疾乃置雄州於瓦橋關霸州於益津關而還周師下三關瀛莫兵不血刃述律聞之謂其國人曰此本漢地今以還漢又何惜耶述律後為庖者因其醉而殺之嗚呼自古夷狄服叛雖不繫中國之盛衰而中國之制夷狄則必因其彊弱予讀周日曆見世宗取瀛莫定三關兵不血刃而史官譏其以王者之師馳千里而襲人輕萬乘之重於萑葦之間以僥倖一勝夫兵法決機因勢有不可失之時世宗南平淮甸北伐契丹乘其勝威擊其昏殆世徒見周師之出何速而不知述律有可取之機也是時述律以謂周之所取皆漢故地不足顧也然則十四州之故地皆可指麾而取矣不幸世宗遇疾功志不就然瀛莫三關遂得復為中國之人而十四州之俗至今陷於夷狄彼其為志豈不可惜而其功不亦壯哉夫兵之變化屈伸豈區區守常談者所可識也初蕭翰聞德光死北歸有同州郃陽縣令胡嶠為翰掌書記隨入契丹而翰妻爭妬告翰謀反翰見殺嶠無所依居虜中七年當周廣順三年亡歸中國略能道其所見云自幽州西北入居庸關明日又西北入石門關關路崖狹一夫可以當百此中國控扼契丹之險也又三日至可汗州南望五臺山其一峯最高者東臺也又三日至新武州西北行五十里有雞鳴山云唐太宗北伐聞雞鳴于此因之名山明日入永定關此唐故關也又四日至歸化州又三日登天嶺嶺東西連亙有路北下四顧冥然黃雲白草不可窮極契丹謂嶠曰此辭鄉嶺也可一南望而為永訣同行者皆慟哭往往絕而復蘇又行三四日至黑榆林時七月寒如深冬又明日入斜谷谷長五十里高崖峻谷仰不見日而寒尤甚已出谷得平地氣稍溫又行二日渡湟水又明日渡黑水又二日至湯城淀地氣最溫契丹若大寒則就溫于此其水泉清冷草軟如茸可藉以寢而多異花記其二種一曰旱金大如掌金色爍人一曰青囊如中國金燈而色類藍可愛又二日至儀坤州渡麝香河自幽州至此無里候其所向不知為南北又二日至赤崖翰與兀欲相及遂及述律戰于沙河述律兵敗而北兀欲追至獨樹渡遂囚述律于撲馬山又行三日遂至上京所謂西樓也西樓有邑屋市肆交易無錢而用布有綾錦諸工作宦者翰林伎術教坊角觝秀才僧尼道士等皆中國人而幷汾幽薊之人尤多自上京東去四十里至真珠寨始食菜明日東行地勢漸高西望平地松林鬱然數十里遂入平川多草木始食西瓜云契丹破回紇得此種以牛糞覆棚而種大如中國冬瓜而味甘又東行至褭潭始有柳而水草豐美有息雞草尤美而本大馬食不過十本而飽自褭潭入大山行十餘日而出過一大林長二三里皆蕪荑枝葉有芒刺如箭羽其地皆無草兀欲時卓帳于此會諸部人葬德光自此西南行日六十里行七日至大山門兩高山相去一里而長松豐草珍禽野卉有屋室碑石曰陵所也兀欲入祭諸部大人惟執祭器者得入入而門闔明日開門曰拋盞禮畢問其禮皆祕不肯言嶠所目見囚述律葬德光等事與中國所記差異已而翰得罪被鎖嶠與部曲東之福州福州翰所治也嶠等東行過一山名十三山云此西南去幽州二千里又東行數日過衞州有居人三十餘家蓋契丹所虜中國衞州人築城而居之嶠至福州而契丹多憐嶠教其逃歸嶠因得其諸國種類遠近云距契丹國東至于海有鐵甸其族野居皮帳而人剛勇其地少草木水鹹濁色如血澄之久而後可飲又東女真善射多牛鹿野狗其人無定居行以牛負物遇雨則張革為屋常作鹿鳴呼鹿而射之食其生肉能釀糜為酒醉則縛之而睡醒而後解不然則殺人又東南渤海又東遼國皆與契丹略同其南海曲有魚鹽之利又南奚與契丹略同而人好殺戮又南至于榆關矣西南至儒州皆故漢地西則突厥回紇西北至嫗厥律其人長大髦頭酋長全其髮盛以紫囊地苦寒水出大魚契丹仰食又多黑白黃貂鼠皮北方諸國皆仰足其人最勇隣國不敢侵又其西轄戛又其北單于突厥皆與嫗厥律略同又北黑車子善作車帳其人知孝義地貧無所產云契丹之先常役回紇後背之走黑車子始學作車帳又北牛蹄突厥人身牛足其地尤寒水曰瓠河夏秋冰厚二尺春冬冰徹底常燒器銷冰乃得飲東北至韈劫子其人髦首披布為衣不鞍而騎大弓長箭尤善射遇人輒殺而生食其肉契丹等國皆畏之契丹五騎遇一韈劫子則皆散走其國三面皆室韋一曰室韋二曰黃頭室韋三曰獸室韋其地多銅鐵金銀其人工巧銅鐵諸器皆精好善織毛錦地尤寒馬溺至地成冰堆又北狗國人身狗首長毛不衣手搏猛獸語為犬嘷其妻皆人能漢語生男為狗女為人自相婚嫁穴居食生而妻女人食云嘗有中國人至其國其妻憐之使逃歸與其筯十餘隻教其每走十餘里遺一筯狗夫追之見其家物必銜而歸則不能追矣其說如此又曰契丹嘗選百里馬二十匹遣十人齎乾北行窮其所見其人自黑車子歷牛蹄國以北行一年經四十三城居人多以木皮為屋其語言無譯者不知其國地山川部族名號其地氣遇平地則溫和山林則寒冽至三十三城得一人能鐵甸語其言頗可解云地名頡利烏于邪堰云自此以北龍蛇猛獸魑魅羣行不可往矣其人乃還此北荒之極也契丹謂嶠曰夷狄之人豈能勝中國然晉所以敗者主暗而臣不忠因具道諸國事曰子歸悉以語漢人使漢人努力事其主無為夷狄所虜吾國非人境也嶠歸錄以為陷虜記云契丹年號諸家所記舛謬非一莫可考正惟嘗見於中國者可據也據耶律德光立晉高祖冊文云惟天顯九年歲次丙申是歲乃晉天福元年推而上之得唐天成三年戊子為天顯元年按契丹附錄德光與唐明宗同年而立立三年改元天顯與此正合矣又據開運四年德光滅晉入汴肆赦稱會同十年推而上之得天福三年為會同元年是天顯盡十年而十一年改為會同矣惟此二者其據甚明餘皆不足考也附錄所載夷狄年號多略不書蓋無所用故不必備也
