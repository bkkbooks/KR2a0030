body:
  text: 新五代史卷六十四後蜀世家第四孟知祥子昶孟知祥字保胤邢州龍岡人也其叔父遷當唐之末據邢洺磁三州為晉所虜晉王以遷守澤潞梁兵攻晉遷以澤潞降梁知祥父道獨留事晉而不顯及知祥壯晉王以其弟克讓女妻之以為左教練使莊宗為晉王以知祥為中門使前此為中門使者多以罪誅知祥懼求他職莊宗命知祥薦可代己者知祥因薦郭崇韜自代崇韜德之知祥遷馬步軍都虞候莊宗建號以太原為北京以知祥為太原尹北京留守魏王繼岌伐蜀郭崇韜為招討使崇韜臨訣白曰即臣等平蜀陛下擇帥以守西川無如孟知祥者已而唐兵破蜀莊宗遂以知祥為成都尹劍南西川節度副大使知祥馳至京師莊宗戒有司盛供帳多出內府珍奇諸物以宴勞之酒酣語及平昔以為笑樂歎曰繼岌前日乳臭兒爾乃能為吾平定兩川吾徒老矣孺子可喜然益令人悲爾吾憶先帝棄世時疆土侵削僅保一隅豈知今日奄有天下九州四海珍奇異産充牣吾府因指以示知祥曰吾聞蜀土之富無異於此以卿親賢故以相付同光四年正月戊辰知祥至成都而崇韜已死魏王繼岌引軍東歸先鋒康延孝反攻破漢州知祥遣大將李仁罕會任圜董璋等兵擊破延孝知祥得其將李肇侯弘實及其兵數千以歸而莊宗崩魏王繼岌死明宗入立知祥乃訓練兵甲陰有王蜀之志益置義勝定遠驍鋭義寧飛棹等軍七萬餘人命李仁罕趙廷隱張業等分將之初魏王之班師也知祥率成都富人及王氏故臣家得錢六百萬緡以犒軍其餘者猶二百萬任圜自蜀入為相兼判三司素知蜀所餘錢是冬知祥拜侍中乃以太僕卿趙季良仭官告賜之因以為三川制置使督蜀犒軍餘錢送京師且制置兩川征賦知祥怒不奉詔然知祥與季良有舊遂留之樞密使安重誨頗疑知祥有異志思有以制之初知祥鎮蜀莊宗以宦者焦彥賓為監軍明宗入立悉誅宦者罷諸道監軍彥賓已罷重誨復以客省使李嚴為監軍嚴前使蜀既歸而獻策伐蜀蜀人皆惡之而知祥亦怒曰焦彥賓以例罷而諸道皆廢監軍獨吾軍置之是嚴欲以蜀再為功也掌書記毋昭裔及諸將吏皆請止嚴而無內知祥曰吾將有以待其來嚴至境上遣人持書候知祥知祥盛兵見之冀嚴懼而不來嚴聞之自若天成二年正月嚴至成都知祥置酒召嚴是時焦彥賓雖罷猶在蜀嚴於懷中出詔示知祥以誅彥賓知祥不聽因責嚴曰今諸方鎮已罷監軍公何得來此目客將王彥銖執嚴下斬之明宗不能詰初知祥鎮蜀遣人迎其家屬于太原行至鳳翔鳳翔節度使李從曮聞知祥殺李嚴以為知祥反矣遂留之明宗既不能詰而欲以恩信懷之乃遣客省使李仁矩慰諭知祥並送瓊華公主及其子昶等歸之知祥因請趙季良為節度副使事無大小皆與參決三年唐徙季良為果州團練使以何瓚為節度副使知祥得制書匿之表留季良不許乃遣其將雷廷魯至京師論請明宗不得已而從之是時瓚行至綿谷懼不敢進知祥乃奏瓚為行軍司馬是歲唐師伐荊南詔知祥以兵下峽知祥遣毛重威率兵三千戍夔州已而荊南高季興死其子從誨請命知祥請罷戍兵不許知祥諷重威以兵鼓譟潰而歸唐以詔書劾重威知祥奏請無劾由是唐大臣益以知祥為必反四年明宗將有事于南郊遣李仁矩責知祥助禮錢一百萬緡知祥覺唐謀欲困己辭不肯出久之請獻五十萬而已初魏王繼岌東歸留精兵五千戍蜀自安重誨疑知祥有異志聽言事者用己所親信分守兩川管內諸州每除守將則以精兵為其牙隊多者二三千少者不下五百人以備緩急是歲以夏魯奇為武信軍節度使分東川之閬州為保寧軍以李仁矩為節度使又以武虔裕為綿州刺史仁矩與東川董璋有隙而虔裕重誨表兄由是璋與知祥皆懼以謂唐將致討自璋鎮東川未嘗與知祥通問於是璋始遣人求婚以自結而知祥心恨璋欲不許以問趙季良季良以為宜合從以拒唐知祥乃許於是連表請罷還唐所遣節度使刺史等明宗優詔慰諭之長興元年二月明宗有事于南郊加拜知祥中書令初知祥與璋俱有異志而重誨信言事者以璋盡忠於國獨知祥可疑重誨猶欲倚璋以圖知祥是歲九月董璋先反攻破閬州擒李仁矩殺之是月應聖節知祥開宴東北望再拜俯伏嗚咽泣下沾襟士卒皆為之歔欷明日遂舉兵反是秋明宗改封瓊華公主為福慶長公主有司言前世公主受封皆未出降無遣使就藩冊命之儀詔有司草具新儀乃遣祕書監劉嶽為冊使嶽行至鳳翔聞知祥反乃旋明宗下詔削奪知祥官爵命天雄軍節度使石敬瑭為都招討使夏魯奇為副知祥遣李仁罕張業趙廷隱將兵三萬人會璋攻遂州別遣侯弘實將四千人助璋守東川又遣張武下峽取渝州唐師攻劍門殺璋守兵三千人遂入劍門璋來告急知祥大駭遣廷隱分兵萬人以東已而聞唐軍止劍州不進喜曰使唐軍急趨東川則遂州解圍吾勢沮而兩川搖矣今其不進吾知易與爾十二月敬瑭及廷隱戰于劍門唐師大敗張武已取渝州武病卒其副將袁彥超代將其軍又取黔州二年正月李仁罕克遂州夏魯奇死之知祥以仁罕為武信軍留後遣人馳魯奇首示敬瑭軍敬瑭乃班師利州李彥珂聞唐軍敗東歸乃棄城走知祥以趙廷隱為昭武軍留後李仁罕進攻夔州刺史安崇阮棄城走以趙季良為留後是時唐軍涉險以餉道為艱自潼關以西民苦轉饋每費一石不能致一斗道路嗟怨而敬瑭軍亦旋所在守將又皆棄城走明宗憂之以責安重誨重誨懼遽自請行而重誨亦以被讒得罪死明宗謂致知祥等反由重誨失策及重誨死乃遣西川進奏官蘇願進奉軍將杜紹本西歸招諭知祥具言知祥家屬在京師者皆無恙知祥聞重誨誅死而唐厚待其家屬乃邀璋欲同謝罪璋曰孟公家屬皆存而我子孫獨見殺我何謝為知祥三遣使往見璋璋不聽乃遣觀察判官李昊說璋璋益疑知祥賣己因發怒以語侵昊昊乃勸知祥攻之而璋先襲破知祥漢州知祥遣趙廷隱率兵三萬自將擊之陳雞距橋知祥得璋降卒衣以錦袍使持書招降璋璋曰事已及此不可悔也璋軍士皆譟曰徒曝我於日中何不速戰璋即麾軍以戰兵始交璋偏將張守進來降知祥乘之璋遂大敗走過金鴈橋麾其子光嗣使降以保家族光嗣哭曰自古豈有殺父以求生者乎寧俱就死因與璋俱走知祥遣趙廷隱追之不及璋走至梓州見殺光嗣自縊死知祥遂並有東川然自璋死知祥卒不遣使謝唐唐樞密使范延光曰知祥雖已破璋必借朝廷之勢以為兩川之重自非屈意招之彼亦不能自歸也明宗曰知祥吾故人也本因間諜致此危疑撫吾故人何屈意之有先是克寧妻孟氏知祥妹也莊宗已殺克寧孟氏歸于知祥其子瓌留事唐為供奉官明宗即遣瓌歸省其母因賜知祥詔書招慰之知祥兼據兩川以趙季良為武泰軍留後李仁罕武信軍留後趙廷隱保寧軍留後張業寧江軍留後李肇昭武軍留後季良等因請知祥稱王以墨制行事議未決而瓌至蜀知祥見瓌倨慢九月瓌自蜀還得知祥表請除趙季良等為五鎮節度其餘刺史已下得自除授又請封蜀王且言福慶公主已卒明宗為之發哀遣閣門使劉政恩為宣諭使政恩復命知祥始遣其將朱滉來朝四年二月癸亥制以知祥檢校太尉兼中書令行成都尹劍南東西兩川節度管內觀察處置統押近界諸蠻兼西山八國雲南安撫制置等使遣工部尚書盧文紀冊封知祥為蜀王而趙季良等五人皆拜節度使唐兵先在蜀者數萬人知祥皆厚給其衣食因請送其家屬明宗詔諭不許十一月明宗崩明年閏正月知祥乃即皇帝位國號蜀以趙季良為司空同中書門下平章事中門使王處回為樞密使李昊為翰林學士三月唐潞王舉兵於鳳翔愍帝遣王思同等討之思同兵潰山南西道節度使張虔釗武定軍節度使孫漢韶皆以其地附于蜀四月知祥改元曰明德六月虔釗等至成都知祥宴勞之虔釗奉觴起為壽知祥手緩不能舉觴遂病以其子昶為皇太子監國知祥卒諡為文武聖德英烈明孝皇帝廟號高祖陵曰和陵昶知祥第三子也知祥為兩川節度使昶為行軍司馬知祥僭號以昶為東川節度使同中書門下平章事知祥病昶監國知祥已卒而祕未發王處回夜過趙季良相對泣涕不已季良正色曰今疆侯握兵專伺時變當速立嗣君以絶非望泣無益也處回遂與季良立昶而後發喪昶立不改元仍稱明德至五年始改元曰廣政明德三年三月熒惑犯積尸昶以謂積尸蜀分也懼欲禳之以問司天少監胡韞韞曰按十二次起井五度至柳八度為鶉首之次鶉首秦分也蜀雖屬秦乃極南之表爾前世火入鬼其應在秦晉咸和九年三月火犯積尸四月雍州刺史郭權見殺義熙四年火犯鬼明年雍州刺史朱齡石見殺而蜀皆無事乃止昶好打毬走馬又為方士房中之術多採良家子以充後宮樞密副使韓保貞切諫昶大悟即日出之賜保貞金數斤有上書者言臺省官當擇清流昶歎曰何不言擇其人而任之左右請以其言詰上書者昶曰吾見唐太宗初即位獄吏孫伏伽上書言事皆見嘉納奈何勸我拒諫耶然昶年少不親政事而將相大臣皆知祥故人知祥寬厚多優縱之及其事昶益驕蹇多踰法度務廣第宅奪人良田發其墳墓而李仁罕張業尤甚昶即位數月執仁罕殺之並族其家是時李肇自鎮來朝杖而入見稱疾不拜及聞仁罕死遽釋杖而拜廣政九年趙季良卒張業益用事業仁罕甥也仁罕被誅時業方掌禁兵昶懼其反乃用以為相業兼判度支置獄于家務以酷法厚斂蜀人蜀人大怨十一年昶與匡聖指揮使安思謙謀執而殺之王處回趙廷隱相次致仕由是故將舊臣殆盡昶始親政事於朝堂置匭以通下情是時契丹滅晉漢高祖起於太原中國多故雄武軍節度使何建以秦成階三州附于蜀昶因遣孫漢韶攻下鳳州於是悉有王衍故地漢將趙思綰據永興王景崇據鳳翔反皆送款于昶昶遣張虔釗出大散關何建出隴右李廷圭出子午谷以應思綰昶相毋昭裔切諫以為不可然昶志欲窺關中甚鋭乃遣安思謙益兵以東已而漢誅思綰景崇虔釗等皆罷歸而思謙恥於無功多殺士卒以威衆昶與翰林使王藻謀殺思謙而邊吏有急奏藻不以時聞輒啓其封昶怒之其殺思謙也藻方侍側因並擒藻斬之十二年置吏部三銓禮部貢舉十三年昶加號睿文英武仁聖明孝皇帝封子玄哲秦王判六軍事次子玄王玉褒王弟仁毅夔王仁贄雅王仁裕嘉王十八年周世宗伐蜀攻自秦州昶以韓繼勳為雄武軍節度聞周師來伐歎曰繼勳豈足以當周兵邪客省使趙季札請行乃以季札為秦州監軍使季札行至德陽聞周兵至遽馳還奏事昶問之季札惶懼不能道一言昶怒殺之乃遣高彥儔李廷圭出堂倉以拒周師彥儔大敗走青泥於是秦成階鳳復入于周昶懼分遣使者聘於南唐東漢以張形勢二十年世宗以所得蜀俘歸之昶亦歸所獲周將胡立于京師因寓書于世宗世宗怒昶無臣禮不答二十一年周兵伐南唐取淮南十四州諸國皆懼荊南高保融以書招昶使歸周昶以前嘗致書世宗不答乃止昶幼子玄寶生七歲而卒太常言無服之殤無贈典昶問李昊昊曰昔唐德宗皇子評生四歲而卒贈揚州大都督封肅王此故事也昶乃贈玄寶青州大都督追封遂王二十五年立秦王玄哲為皇太子昶幸晉漢之際中國多故而據險一方君臣務為奢侈以自娛至於溺器皆以七寶裝之宋興已下荊潭昶益懼遣大程官孫遇以蠟丸書間行東漢約出兵以撓中國遇為邊吏所得太祖皇帝遂詔伐蜀遣王全斌崔彥進等出鳳州劉光乂曹彬等出歸州詔八作司度右掖門南臨汴水為昶治第一區凡五百餘間供帳什物皆具以待昶昶遣王昭遠趙彥韜等拒命昭遠成都人也年十三事東郭禪師智諲為童子知祥嘗飯僧於府昭遠執巾履從智諲以入知祥見之愛其惠黠時昶方就學即命昭遠給事左右而見親狎昶立以為捲簾使樞密使王處回致仕昶以樞密使權重難制乃以昭遠為通奏使知樞密使事然事無大小一以委之府庫金帛恣其所取不問昶母李太后常為昶言昭遠不可用昶不聽昭遠好讀兵書以方略自許兵始發成都昶遣李昊等餞之昭遠手執鐵如意指揮軍事自比諸葛亮酒酣謂昊曰吾之是行何止克敵當領此二三萬雕面惡少兒取中原如反掌爾昶又遣子玄哲率精兵數萬守劍門玄哲輦其愛姬攜樂器伶人數十以從蜀人見者皆竊笑全斌至三泉遇昭遠擊敗之昭遠焚吉柏江浮橋退守劍門軍頭向韜得蜀降卒言來蘇小路出劍門南清彊店與大路合全斌遣偏將史延德分兵出來蘇北擊劍門與全斌夾攻之昭遠彥韜敗走皆見擒玄哲聞昭遠等敗亦逃歸劉光乂攻夔州守將高彥儔戰敗閉牙城拒守判官羅濟勸其走彥儔曰吾昔不能守秦川今又奔北雖人主不殺我我何面目見蜀人乎又勸其降彥儔不許乃自焚死而蜀兵所在奔潰將帥多被擒獲昶問計於左右老將石頵以謂東兵遠來勢不能久宜聚兵堅守以敝之昶歎曰吾與先君以溫衣美食養士四十年一旦臨敵不能為吾東向放一箭雖欲堅壁誰與吾守者邪乃命李昊草表以降時乾德三年正月也自興師至昶降凡六十六日初昊事王衍為翰林學士衍之亡也昊為草降表至是又草焉蜀人夜表其門曰世修降表李家當時傳以為笑昶至京師拜檢校太師兼中書令封秦國公七日而卒追封楚王其母李氏為人明辨甚見優禮詔書呼為國母嘗召見勞之曰母善自愛無戚戚思蜀他日當送母歸李氏曰妾家本太原儻得歸老故鄉不勝大願是時劉鈞尚在太祖大喜曰俟平劉鈞當如母願昶之卒也李氏不哭以酒酹地祝曰汝不能死社稷苟生以取羞吾所以忍死者以汝在也吾今何用生為因不食而卒其餘事具國史知祥興滅年數甚明諸書皆同蓋自同光三年乙酉入蜀至皇朝乾德三年乙丑國滅凡四十一年惟舊五代史云同光三年丙戌至乾德三年乙丑四十年者繆也
