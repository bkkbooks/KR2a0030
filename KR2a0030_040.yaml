body:
  text: 新五代史卷四十雜傳第二十八李茂貞李茂貞深州博野人也本姓宋名文通為博野軍卒戍鳳翔黃巢犯京師鄭畋以博野軍擊賊茂貞以功自隊長遷軍校光啓元年朱玫反僖宗出居興元玫遣王行瑜攻大散關茂貞與保鑾都將李鋋等敗行瑜於大唐峯明年玫遂敗死茂貞以功自扈蹕都頭拜武定軍節度使賜以姓名扈蹕東歸至鳳翔鳳翔節度使李昌符與天威都頭楊守立爭道以兵相攻昌符不勝走隴州僖宗遣茂貞擊殺昌符以功拜鳳翔隴右節度使大順元年封隴西郡王二年樞密使楊復恭得罪奔於興元興元節度使楊守亮復恭之養子也納之茂貞乃上書言復恭父子罪皆當誅因自請為山南招討使昭宗以宦者故難之未許茂貞擅發兵攻破興元復恭父子見殺茂貞表其子繼密權知興元軍府事昭宗乃徙茂貞山南西道節度使以宰相徐彥若鎮鳳翔茂貞不奉詔上表自論曰但慮軍情忽變戎馬難羈徒令甸服生靈因茲受幣未審乘輿播越自此何之昭宗以茂貞表辭不遜不能忍以問宰相杜讓能讓能以謂茂貞地大兵強而唐力未可以致討鳳翔又近京師易以自危而難於後悔他日雖欲誅朝錯以謝諸侯恐不能也昭宗怒曰吾不能孱孱坐受凌弱乃責讓能治兵而以覃王嗣周為京西招討使令下京師市人皆知不可相與聚承天門遮宰相請無舉兵爭投瓦石擊宰相宰相下輿而走亡其堂印人情大恐昭宗意益堅覃王率扈駕軍五十四都戰于盩厔唐軍敗潰茂貞遂犯京師屯于三橋昭宗御安福門殺兩樞密以謝茂貞使罷兵茂貞素與讓能有隙因曰謀舉兵者非兩樞密乃讓能也陳兵臨皋驛請殺讓能讓能曰臣故先言之矣惟殺臣可以紓國難昭宗泣下沾襟貶讓能雷州司戶參軍賜死茂貞乃罷兵古本作生明年河中節度使王重盈卒其諸子珂珙爭立晉王李克用請立珂茂貞與韓建王行瑜請立珙昭宗不許茂貞等怒率三鎮兵犯京師謀廢昭宗立吉王保未果而晉王亦舉兵茂貞懼乃殺宰相韋昭度李磎留其養子繼鵬以兵二千宿衛而去晉兵至河中繼鵬與行瑜弟行實等爭劫昭宗出奔京師大亂昭宗出居于石門茂貞以兵至鄠縣斬繼鵬自贖晉兵已破王行瑜還軍渭北請擊茂貞昭宗以謂晉遠而茂貞近因欲庇之以為德而冀緩急之可恃也且茂貞已殺其子自贖矣乃詔罷歸晉軍克用歎曰唐不誅茂貞憂未已也昭宗自石門還益募安聖捧宸等軍萬餘人以諸王將之茂貞謂唐將討己亦治兵請覲京師大恐居人亡入山谷茂貞遂犯京師昭宗遣覃王拒之覃王至三橋軍潰昭宗出居于華州遣宰相孫偓以兵討茂貞韓建為茂貞請乃已久之加拜茂貞尚書令封岐王其後昭宗為宦者所廢既反正宰相崔胤欲借梁兵誅諸宦者陰與梁太祖謀之中尉韓全誨等亦倚茂貞之強以為外援茂貞遣其子繼筠以兵數千宿衛京師宦者恃岐兵益驕不可制天復元年胤召梁太祖以西梁軍至同州全誨等懼與繼筠劫昭宗幸鳳翔梁軍圍之逾年茂貞每戰輒敗閉壁不敢出城中薪食俱盡自冬涉春雨雪不止民凍餓死者日以千數米斗直錢七千至燒人屎尸而食父自食其子人有爭其肉者曰此吾子也汝安得而食之人肉斤直錢百狗肉斤直錢五百父甘食其子而人肉賤於狗天子於宮中設小磨遣宮人自屑豆麥以供御自後宮諸王十六宅凍餒而死者日三四城中人相與邀遮茂貞求路以為生茂貞窮急謀以天子與梁以為解昭宗謂茂貞曰朕與六宮皆一日食粥一日食不托安能不與梁和乎三年正月茂貞與梁約和斬韓全誨等二十餘人傳首梁軍梁圍解天子雖得出然梁遂劫東遷而唐亡茂貞非惟亡唐亦自困矣及梁太祖即位諸侯之強者皆相次稱帝獨茂貞不能但稱岐王開府置官屬以妻為皇后鳴梢羽扇視朝出入擬天子而已茂貞居岐以寬仁愛物民頗安之嘗以地狹賦薄下令榷油因禁城門無內松薪以其可為炬也有優者誚之曰臣請並禁月明茂貞笑而不怒初茂貞破楊守亮取興元而邠寧鄜坊皆附之有地二十州其被梁圍也興元入于蜀開平已後邠寧鄜坊入于梁秦鳳階成又入于蜀當梁末年所有七州而已二十州者岐隴涇原渭武秦成階鳳邠寧慶衍鄜坊丹延梁洋也莊宗已破梁茂貞稱岐王上箋以季父行自處及聞入洛乃上表稱臣遣其子從曮來朝莊宗以其耆老甚尊禮之改封秦王詔書不名同光二年以疾卒年六十九諡曰忠敬從曮為人柔而善書畫茂貞承制拜從曮彰義軍節度使茂貞卒拜鳳翔節度使魏王繼岌征蜀為供軍轉運應接使蜀平繼岌遣從曮部送王衍行至鳳翔監軍使柴重厚拒而不納從曮遂東至華州聞莊宗之難乃西歸明宗入立聞重厚嘗拒從曮遣人誅之從曮上書言重厚守鳳翔軍民無所擾願貸其過雖不許士人以此多之歷鎮宣武天平從曮有田千頃竹千畝在鳳翔懼侵民利未嘗省理鳳翔人愛之廢帝起鳳翔將行鳳翔人叩馬乞從曮廢帝入立復以從曮為鳳翔節度使卒年四十九韓建韓建字佐時許州長社人也少為蔡州軍校隸忠武軍將鹿晏弘從楊復光攻黃巢於長安巢已破復光亦死晏弘與建等無所屬乃以麾下兵西迎僖宗於蜀所過攻劫行至興元逐牛叢據山南已而不能守晏弘東走許州建乃奔于蜀拜金吾衛將軍僖宗還長安建為潼關防禦使華州刺史華州數經大兵戶口流散建少賤習農事乃披荊棘督民耕植出入閭里問其疾苦建初不知書乃使人題其所服器皿牀榻為其名目以視之久乃漸通文字見玉篇喜曰吾以類求之何所不得也因以通音韻聲偶暇則課學書史是時天下已亂諸鎮皆武夫獨建撫緝兵民又好學荊南成汭時冒姓郭亦善緝荊楚當時號為北韓南郭大順元年以兵屬張濬伐晉濬敗建自含山遁歸河中王重盈死諸子珂珙爭立晉人助珂建與王行瑜李茂貞助珙昭宗不許建等大怒以三鎮兵犯京師昭宗見建等責之行瑜茂貞惶恐戰汗不能語獨建前自陳述乃殺宰相韋昭度李磎等謀廢昭宗會晉舉兵且至建等懼乃還晉兵問罪三鎮兵傅華州建登城呼曰弊邑未常失禮於大國何為見攻晉人曰君以兵犯天子殺大臣是以討也已而與晉和乾寧三年李茂貞復犯京師昭宗將奔太原次渭北建遣子允請幸華州昭宗又欲如鄜州建追及昭宗於富平泣曰藩臣倔強非止茂貞若捨近畿而巡極塞乘輿渡河不可復矣昭宗亦泣遂幸華州是時天子孤弱獨有殿後軍及定州三都將李筠等兵千餘人為衛以諸王將之建已得昭宗幸其鎮遂欲制之因請罷諸王將兵散去殿後諸軍纍表不報昭宗登齊雲樓西北顧望京師作菩薩蠻辭三章以思歸其卒章曰野煙生碧樹陌上行人去安得有英雄迎歸大內中酒酣與從臣悲歌泣下建與諸王皆屬和之建心尤不悅因遣人告諸王謀殺建劫天子幸他鎮昭宗召建將辨之建稱疾不出乃遣諸王自詣建不見請送諸王十六宅昭宗難之建乃率精兵數千圍行宮請誅李筠昭宗大懼遽詔斬筠悉散殿後及三都衛兵幽諸王於十六宅昭宗益悔幸華遣延王戒丕使于晉以謀興復戒丕還建與中尉劉季述誣諸王謀反以兵圍十六宅諸王皆登屋叫呼遂見殺昭宗無如之何為建立德政碑以慰安之建已殺諸王乃營南莊起樓閣欲邀昭宗遊幸因以廢之而立德王裕其父叔豐謂建曰汝陳許間一田夫爾遭時之亂蒙天子厚恩至此欲以兩州百里之地行大事覆族之禍吾不忍見不如先死因泣下歔欷李茂貞梁太祖皆欲發兵迎天子建稍恐懼乃止光化元年昭宗還長安自為建畫像封建潁川郡王賜以鐵券建辭王爵乃封建許國公梁太祖以兵嚮長安遣張存敬攻同州建判官司馬鄴以城降太祖使鄴召建建乃出降太祖責建背己建曰判官李巨川之謀也太祖怒即殺巨川以建從行昭宗東遷建從至洛昭宗舉酒屬太祖與建曰遷都之後國步小康社稷安危繫卿兩人次何皇后舉觴建躡太祖足太祖乃陽醉去建出謂太祖曰天子與宮人眼語幕下有兵仗聲恐公不免也太祖以故尤德之表建平盧軍節度使太祖即位拜司徒同中書門下平章事太祖性剛暴臣下莫敢諫諍惟建時有言太祖亦優容之太祖郊于洛建為大禮使罷相出鎮許州太祖崩許州軍亂見殺年五十八李仁福李仁福不知其世家當唐僖宗時有拓拔思敬者為夏州偏將後以與破黃巢功賜姓李氏拜夏州節度使思敬卒乾寧二年以其弟思諫為節度使自唐末天下大亂史官實録多闕諸鎮因時倔起自非有大善惡暴著于世者不能紀其始終是時興元鳳翔邠寧鄜坊河中同華諸鎮之兵四面並起而交爭獨靈夏未嘗為唐患而亦無大功朱玫之亂思敬與鄜州李思孝皆以兵屯渭橋其後黃巢陷京師王重榮李克用等會諸鎮兵討賊思敬與破巢復京師然皆未嘗有所可稱故思敬之世次功過不顯而無傳梁開平二年思諫卒軍中立其子彝昌為留後即拜彝昌節度使明年其將高宗益作亂殺彝昌是時仁福為蕃部指揮使戍兵于外軍中乃迎仁福立之不知其於思諫為親疏也是歲四月拜仁福檢校司空定難軍節度使終梁之世奉正朔而已是時岐王李茂貞晉王李克用數會兵攻仁福梁輒出兵救之仁福纍官至檢校太師兼中書令封朔方王長興四年三月卒其子彝超自立為留後自仁福時邊將多言仁福通於契丹恐為邊患明宗因其卒乃以彝超為延州刺史彰武軍節度使而徙彰武安從進代之恐彝超不受代遣邠州藥彥稠以兵五萬送從進之鎮彝超果不受代從進與彥稠以兵圍之百餘日不克夏州城壁素堅故老傳言赫連勃勃蒸土築之從進等穴地道至城下堅如鐵石鑿不能入彝超外招黨項抄掠從進等糧道自陝以西民運斗粟束芻其費數千人不堪命道路愁苦明宗遂釋不攻以彝超為定難軍節度使清泰二年卒其弟彝興纍官檢校太師兼侍中周顯德中封西平王其後事具國史韓遜韓遜不知其世家初為靈武軍校當唐末之亂據有靈鹽唐即以為節度使而史失不録不見其事梁開平三年封朔方節度使韓遜為潁川王始見於史是時邠寧楊崇本鄜延李周彝鳳翔李茂貞皆與梁爭戰獨遜與夏州李思諫臣屬于梁未嘗以兵爭李茂貞嘗遣劉知俊攻遜不能克遜亦善撫其部人皆愛之為遜立生祠貞明中遜卒軍中立其子洙為留後梁即以為節度使至莊宗時又以洙兼河西節度天成四年洙卒即以洙子澄為朔方軍留後其將李賓作亂澄乃上章請帥於朝明宗以康福為朔方河西節度使以代澄由是命吏而相代矣韓氏自遜有靈武傳世皆無所稱述澄後不知其所終楊崇本楊崇本幼事李茂貞養以為子冒姓李名曰繼徽茂貞表崇本靜難軍節度使梁太祖攻岐未下乃移兵攻邠州崇本迎降太祖使復其姓賜名崇本遷其家於河中以為質崇本妻有美色太祖用兵往來河中嘗幸之崇本妻頗愧恥間遣人誚崇本曰大丈夫不能庇其伉儷我已為朱公婦矣無面視君有刀繩而已崇本涕泣憤怒其後梁兵解岐圍崇本妻得歸崇本乃復背梁歸茂貞茂貞西連蜀兵會崇本攻雍華關西大震太祖以兵西至河中遣郴王友裕擊之友裕至永壽而卒梁兵乃旋崇本屯美原太祖復遣劉知俊康懷英等擊之崇本大敗自此不復東乾化四年為其子彥魯所弒崇本養子李保衡殺彥魯以降梁高萬興高萬興河西人也唐末河西屬李茂貞茂貞將胡敬璋為延州刺史萬興與其弟萬金俱事敬璋為騎將敬璋死其將劉萬子代為刺史梁開平二年葬於州南萬子在會其將許從實殺萬子自為延州刺史是時萬興兄弟皆將兵戍境上聞萬子死以其部下數千人降梁梁太祖兵屯河中遣同州劉知俊以兵應萬興攻丹州執其刺史崔公實進攻延州執許從實鄜州李彥容坊州李彥昱皆棄城走梁太祖乃以萬興為延州刺史忠義軍節度使以牛存節為保大軍節度使已而劉知俊叛乃徙存節守同州以萬金為保大軍節度使萬興纍遷檢校太師兼中書令渤海郡王貞明四年萬金卒乃以萬興為鄜延節度使進封延安郡王徙封北平王梁亡莊宗入洛萬興嘗一來朝同光三年卒于鎮萬興兄弟皆驍勇而未嘗立戰功然以戍兵降梁梁取鄜坊丹延自萬興始故其兄弟世守其土萬興子允韜代立長興元年徙鎮安國又徙義成清泰中卒萬金子允權開運中為膚施令罷居于家是時周密為彰信軍節度使契丹滅晉延州軍亂逐密密守東城而西城之兵以允權為留後聞漢高祖起太原遂歸漢即拜節度使廣順三年卒溫韜溫韜京兆華原人也少為盜後事李茂貞為華原鎮將冒姓李名彥韜茂貞以華原縣為耀州以韜為刺史梁太祖圍茂貞於鳳翔韜以耀州降梁已而復叛歸茂貞茂貞又以美原縣為鼎州建義勝軍以韜為節度使末帝時韜復叛茂貞降梁梁改耀州為崇州鼎州為裕州義勝為靜勝軍即以韜為節度使復其姓溫更其名曰昭圖韜在鎮七年唐諸陵在其境內者悉發掘之取其所藏金寶而昭陵最固韜從埏道下見宮室制度閎麗不異人間中為正寢東西廂列石牀牀上石函中為鐵匣悉藏前世圖書鍾王筆迹紙墨如新韜悉取之遂傳人間惟乾陵風雨不可發其後朱友謙叛梁取同州晉王以兵援友謙而趨華原韜懼求徙他鎮遂徙忠武莊宗滅梁韜自許來朝因伶人景進納賂劉皇后皇后為言之莊宗待韜甚厚賜姓名曰李紹沖郭崇韜曰此劫陵賊爾罪不可赦莊宗曰已宥之矣不可失信遽遣還鎮明宗入洛與段凝俱收下獄已而赦之勒歸田里明年流于德州賜死嗚呼厚葬之弊自秦漢已來率多聰明英偉之主雖有高談善説之士極陳其禍福有不能開其惑者矣豈非富貴之欲溺其所自私者篤而未然之禍難述於無形不足以動其心歟然而聞溫韜之事者可以少戒也五代之君往往不得其死何暇顧其後哉獨周太祖能鑒韜之禍其將終也為書以遺世宗使以瓦棺紙衣而斂將葬開棺示人既葬刻石以告後世毋作下宮毋置守陵妾其意丁寧切至然實録不書其葬之薄厚也又使葬其平生所服衮冕通天冠絳紗袍各二其一于京師其一于澶州又葬其劍甲各二其一于河中其一于大名者莫能原其旨也
