body:
  text: 新五代史卷五十二雜傳第四十杜重威杜重威朔州人也其妻石氏晉高祖之女弟高祖即帝位封石氏為公主拜重威舒州刺史以典禁兵從侯益攻破張從賓於汜水以功拜潞州節度使范延光反於鄴重威從高祖攻降延光徙領忠武加同平章事又徙領天平遷侍衛親軍都指揮使安重榮反重威逆戰于宗城重榮為偃月陳重威擊之不動重威欲少却以伺之偏將王重胤曰兩兵方交退者先敗乃分兵為三重威先以左右隊擊其兩翼戰酣重胤以精兵擊其中軍重榮將趙彥之來奔重榮遂大敗走還鎮州閉壁不敢出重威攻破之以功拜重威成德軍節度使重威出於武卒無行而不知將略破鎮州悉取府庫之積及重榮之資皆沒之家高祖知而不問及出帝與契丹絶好契丹連歲入寇重威閉城自守屬州城邑多所屠戮胡騎驅其人民千萬過其城下重威登城望之未嘗出救開運元年加重威北面行營招討使明年引兵攻泰州破滿城遂城契丹已去至古北還兵擊之重威等南走至陽城為虜所困賴符彥卿張彥澤等因大風奮擊契丹大潰諸將欲追之重威為俚語曰逢賊得命更望復子乎乃收馬馳歸重威居鎮州重斂其民戶口雕敝又懼契丹之至乃連表乞還京師未報亟上道朝廷莫能止即拜重威為鄴都留守而鎮州所留私粟十餘萬斛殿中監王欽祚和市軍儲乃録以聞給絹數萬匹以償之重威大怒曰吾非反者安得籍沒邪三年秋契丹高牟翰詐以瀛州降復以重威為北面行營招討使是秋天下大水霖雨六十餘日飢殍盈路居民拆木以供爨銼藁席以秣馬牛重威兵行泥潦中調發供饋遠近愁苦重威至瀛州牟翰已棄城去重威退屯武強契丹寇鎮定重威西趨中渡橋與虜夾滹沱河而軍偏將宋彥筠王清渡水力戰而重威按軍不動彥筠遂敗清戰死轉運使李穀教重威以三腳木為橋募敢死士過河擊賊諸將皆以為然獨重威不許契丹遣騎兵夜並西山擊欒城斷重威軍後是時重威已有異志而糧道隔絶乃陰遣人詣契丹請降契丹大悅許以中國與重威為帝重威信以為然乃伏甲士召諸將告以降虜諸將愕然以上將先降乃皆聽命重威出降表使諸將書名乃令軍士陳于柵外軍士猶喜躍以為決戰重威告以糧盡出降軍士解甲大哭聲震原野契丹賜重威赭袍使衣以示諸軍拜重威太傅契丹犯京師重威以晉兵屯陳橋士卒凍餓不勝其苦重威出入道中市人隨而詬之重威俯首不敢仰顧契丹據京師率城中錢帛以賞軍將相皆不免重威當率萬緡乃訴於契丹曰臣以晉軍十萬先降乃獨不免率乎契丹笑而免之遣還鄴都明年契丹北歸重威與其妻石氏詣虜帳中為別漢高祖定京師拜重威太尉歸德軍節度使重威懼不受命遣高行周攻之不克高祖乃自將攻之遣給事中陳同以詔書召之重威不聽命而漢兵數敗圍之百餘日初契丹留燕兵千五百人在京師高祖自太原入告者言其將反高祖悉誅於繁臺其亡者奔于鄴燕將張璉先以兵二千在鄴聞燕兵見殺乃勸重威固守高祖已殺燕兵悔之數遣人招璉等璉登城呼曰繁臺之誅燕兵何罪既無生理請以死守重威食盡屑麴而食民多逾城出降皆無人色重威乃遣判官王敏及其妻相次請降高祖許之重威素服出見高祖高祖赦重威拜檢校太師守太傅兼中書令悉誅璉及重威將吏而録其私帑以重威歸京師高祖病甚顧大臣曰善防重威高祖崩祕不發喪大臣乃共誅之及其子弘璋弘璨弘璲尸於市市人蹴而詬之吏不能禁支裂蹈踐斯須而盡李守貞李守貞河陽人也晉高祖鎮河陽以為客將其後嘗從高祖高祖即位拜客省使監馬全節軍破李金全於安州以功拜宣徽使出帝即位楊光遠反召契丹入寇守貞領義成軍節度使為侍衛親軍都虞候從出帝幸澶州麻答以奇兵入鄆州渡馬家口柵於河東守貞馳往破之契丹兵多溺死獲馬數百匹裨將七十餘人徙領泰寧軍節度使以兵二萬討之光遠降其故吏宋顏悉取光遠寶貨名姬善馬獻之守貞守貞德之陰置顏麾下是時凡出師破賊必有德音赦其餘類而光遠黨與十餘人皆亡命捕之甚急樞密使桑維翰緩其制書久而不下言事者告顏匿守貞所詔取顏殺之守貞大怒乃與維翰有隙賊平行賞守貞悉以黦茶染木給之軍中大怒以帛裹之為人首梟於木間曰守貞首也守貞以功拜同平章事賜以光遠舊第守貞取旁官民舍大治之為京師之甲出帝臨幸燕錫恩禮出於諸將契丹入寇出帝再幸澶州杜重威為北面招討使守貞為都監晉兵素驕而守貞重威為將皆無節制行營所至居民豢圉一空至於草木皆盡其始發軍也有賜賚曰挂甲錢及班師又加賞勞曰卸甲錢出入之費常不下三十萬由此晉之公私重困守貞與重威等攻下泰州破滿城殺二千餘人還為侍衛親軍都指揮使領天平軍節度使又領歸德是時出帝遣人以書招趙延壽使歸國延壽詐言思歸願得晉兵為應而契丹高牟翰亦詐以瀛州降出帝以為然命杜重威等將兵應之初晉大臣皆言重威不忠有怨望之心不可用乃用守貞是時重威鎮魏州守貞嘗將兵往來過魏重威待之甚厚多以戈甲金帛奉之出帝嘗謂守貞曰卿常以家財散士卒可謂忠於國者乎守貞謝曰皆重威與臣者因請與重威俱北於是卒以重威為招討使守貞為都監屯于武強契丹寇鎮定守貞等軍於中渡遂與重威降于契丹契丹以守貞為司徒契丹犯京師拜守貞天平軍節度使漢高祖入京師守貞來朝拜太保河中節度使高祖崩杜重威死守貞懼不自安以謂漢室新造隱帝初立天下易以圖而門下僧總倫以方術陰干守貞為言有非常之相守貞乃決計反而趙思綰先以京兆反遣人以赭黃衣遺守貞守貞大喜以為天人皆應乃發兵西據潼關招誘草寇所在竊發漢遣白文珂常思等出軍擊之已而王景崇又以鳳翔反景崇與思綰遣人推守貞為秦王守貞拜景崇等官爵又遣人間以蠟丸書遺吳蜀契丹使出兵以牽漢文珂等攻景崇思綰等久無功隱帝乃遣樞密使郭威率禁兵將文珂等督攻之諸將皆請先擊思綰景崇威計未知所向行至華州節度使扈彥珂謂威曰三叛連衡以守貞為主守貞先敗則思綰景崇可傳聲而破矣若捨近圖遠使守貞出兵于後思綰景崇拒戰于前則漢兵屈矣威以為然遂先擊守貞是時馮道罷相居河陽威初出兵過道家問策道曰君知博乎威少無賴好蒲博以為道譏之艴然而怒道曰凡博者錢多則多勝錢少則多敗非其不善博所以敗者勢也今合諸將之兵以攻一城較其多少勝敗可知威大悟謀以遲久困之乃與諸將分為三柵柵其城三面而闕其南發五縣丁夫築長城以連三柵守貞出其兵壞長城威輒補其所壞守貞輒出爭之守貞兵常失十三四如此逾年守貞城中兵無幾而食又盡殺人而食威曰可矣乃為期日督兵四面攻而破之初守貞召總倫問以濟否總倫曰王當自有天下然分野方災俟殺人垂盡則王事濟矣守貞以為然嘗會將吏大飲守貞指畫虎圖曰吾有天命者中其掌引弓一發中之將吏皆拜賀守貞益以自負城破守貞與妻子自焚漢軍入城於煙燼中斬其首傳送京師梟於南市其餘黨皆磔之張彥澤張彥澤其先突厥部人也後徙居陰山又徙太原彥澤為人驍悍殘忍目睛黃而夜有光顧視如猛獸以善射為騎將數從莊宗明宗戰伐與晉高祖連姻高祖時已為護聖右廂都指揮使曹州刺史與討范延光拜鎮國軍節度使歲中徙鎮彰義為政暴虐常怒其子數笞辱之子逃至齊州州捕送京師高祖以歸彥澤彥澤上章請殺之其掌書記張式不肯為作章屢諫止之彥澤怒引弓射式式走而免式素為彥澤所厚多任以事左右小人皆素嫉之因共讒式且迫之曰不速去當及禍式乃出奔彥澤遣指揮使李興以二十騎追之戒曰式不肯來當取其頭以來式至衍州刺史以兵援之邠州節度使李周留式馳騎以聞詔流式商州彥澤遣司馬鄭元昭詣闕論請期必得式且曰彥澤若不得張式患在不測高祖不得已與之彥澤得式剖心決口斷手足而斬之高祖遣王周代彥澤以為右武衛大將軍周奏彥澤所為不法者二十六條並述涇人殘敝之狀式父鐸詣闕訴冤諫議大夫鄭受益曹國珍尚書刑部郎中李濤張麟員外郎麻濤王禧伏閣上疏論彥澤殺式之冤皆不省濤見高祖切諫高祖曰彥澤功臣吾嘗許其不死濤厲聲曰彥澤罪若可容延光鐵券何在高祖怒起去濤隨之諫不已高祖不得已召式父鐸弟守貞子希範等皆拜以官為蠲涇州民稅免其雜役一年下詔罪己然彥澤止削階降爵而已於是國珍等復與御史中丞王易簡率三院御史詣閣門連疏論之不報出帝時彥澤為左龍武軍大將軍遷右武衛上將軍又遷右神武統軍自契丹與晉戰河北彥澤在兵間數立戰功拜彰國軍節度使與契丹戰陽城為契丹所圍而軍中無水鑿井輒壞又天大風契丹順風揚塵奮擊甚鋭軍中大懼彥澤以問諸將諸將皆曰今虜乘上風而吾居其下宜待風回乃可戰彥澤以為然諸將皆去偏將藥元福獨留謂彥澤曰今軍中飢渴已甚若待風回吾屬為虜矣且逆風而戰敵人謂我必不能所謂出其不意彥澤即拔拒馬力戰契丹奔北二十餘里追至衛村又大敗之契丹遁去開運三年秋杜重威為都招討使李守貞兵馬都監彥澤馬軍都排陳使彥澤往來鎮定之間敗契丹于泰州斬首二千級重威守貞攻瀛州不克退及武強聞契丹空國入寇惶惑不知所之而彥澤適至言虜可破之狀乃與重威等西趨鎮州彥澤為先鋒至中渡橋已為虜所據彥澤猶力戰爭橋燒其半虜小敗却乃夾河而寨十二月丙寅重威守貞叛降契丹彥澤亦降耶律德光犯闕遣彥澤與傅住兒以二千騎先入京師彥澤倍道疾驅至河銜枚夜渡壬申夜五鼓自封丘門斬關而入有頃宮中火發出帝以劍擁後宮十餘人將赴火為小吏薛超所持彥澤自寬仁門傳德光與皇太后書入乃滅火大內都點檢康福全宿衛寬仁門登樓覘賊彥澤呼而下之諸門皆啓彥澤頓兵明德樓前遣傅住兒入傳戎王宣語帝脫黃袍素服再拜受命使人召彥澤彥澤謝曰臣無面目見陛下復使召之彥澤笑而不答明日遷帝於開封府帝與太后皇后肩輿宮嬪宦者十餘人皆步從彥澤遣控鶴指揮使李筠以兵監守內外不通帝與太后所上德光表章皆先示彥澤乃敢遣帝取內庫帛數段主者曰此非帝有也不與又使求酒於李嵩嵩曰臣家有酒非敢惜慮陛下憂躁飲之有不測之虞所以不敢進帝姑烏氏公主私賂守門者得入與帝訣歸第自經死德光渡河帝欲郊迎彥澤不聽遣白德光德光報曰天無二日豈有兩天子相見於道路邪乃止初彥澤至京師李濤謂人曰吾禍至矣與其逃於溝竇而不免不若往見之濤見彥澤為俚語以自投死彥澤笑而厚待之彥澤自以有功於契丹晝夜酣飲自娛出入騎從常數百人猶題其旗幟曰赤心為主迫遷出帝遂輦內庫輸之私第因縱軍士大掠京師軍士邏獲罪人彥澤醉不能問瞋目視之出三手指軍士即驅出斷其腰領皇子延煦母楚國夫人丁氏有色彥澤使人求於皇太后太后遲疑未與即劫取之彥澤與閣門使高勳有隙乘醉入其家殺數人而去耶律德光至京師聞彥澤劫掠怒鎖之高勳亦自訴於德光德光以其狀示百官及都人問彥澤當誅否百官皆請不赦而都人爭投狀疏其惡乃命高勳監殺之彥澤前所殺士大夫子孫皆縗絰杖哭隨而詬詈以杖朴之彥澤俯首無一言行至北市斷腕出鎖然後用刑勳剖其心祭死者市人爭破其腦取其髓臠其肉而食之嗚呼晉之事醜矣而惡亦極也其禍亂覆亡之不暇蓋必然之理爾使重威等雖不叛以降虜亦未必不亡然開虜之隙自一景延廣而卒成晉禍者此三人也視重威彥澤之死而晉人所以甘心者可以知其憤疾怨怒於斯人者非一日也至於爭已戮之尸臠其肉剔其髓而食之扯裂蹈踐斯須而盡何其甚哉此自古未有也然當是時舉晉之兵皆在北面國之存亡繫此三人之勝敗則其任可謂重矣蓋天下惡之如彼晉方任之如此而終以不悟豈非所謂臨亂之君各賢其臣者歟
