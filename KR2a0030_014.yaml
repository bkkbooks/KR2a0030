body:
  text: 新五代史卷十四唐太祖家人傳第二正室劉氏次妃曹氏太祖正室劉氏代北人也其次妃曹氏太原人也太祖封晉王劉氏封秦國夫人自太祖起兵代北劉氏常從征伐為人明敏多智略頗習兵機常教其侍妾騎射以佐太祖太祖東追黃巢還軍過梁館于封禪寺梁王邀太祖入城置酒上源驛夜半以兵攻之太祖左右有先脫歸者以難告夫人夫人神色不動立斬告者陰召大將謀保軍以還遲明太祖還與夫人相嚮慟哭因欲舉兵擊梁夫人曰公本為國討賊今梁事未暴而遽反兵相攻天下聞之莫分曲直不若斂軍還鎮自訴于朝太祖從之其後太祖擊劉仁恭敗歸梁遣氏叔琮康懷英等連歲攻晉圍太原晉兵屢敗太祖憂窘不知所為大將李存信等勸太祖亡入北邊收兵以圖再舉太祖然之入以語夫人夫人問誰為此謀者曰存信也夫人罵曰存信代北牧羊兒耳安足與計成敗邪且公嘗笑王行瑜棄邠州走卒為人擒今乃自為此乎昔公亡在達靼幾不能自脫賴天下多故乃得南歸今屢敗之兵散亡無幾一失其守誰肯從公北邊其可至乎太祖大悟而止已而亡兵稍稍復集夫人無子性賢不妬忌常為太祖言曹氏相當生貴子宜善待之而曹氏亦自謙退因相得甚歡曹氏封晉國夫人後生子是謂莊宗太祖奇之曹氏由是專寵太祖性暴怒多殺人左右無敢言者惟曹氏從容諫譬往往見聽及莊宗立事曹氏尤謹其救趙破燕取魏博與梁戰河上十餘歲歲嘗馳省其母至三四人皆稱其孝莊宗即位冊尊曹氏為皇太后而以嫡母劉氏為皇太妃太妃往謝太后太后有慚色太妃曰願吾兒享國無窮使吾獲沒于地以從先君幸矣復何言哉莊宗滅梁入汴使人迎太后歸洛居長壽宮而太妃獨留晉陽同光三年五月太妃薨七月太后薨謚曰貞簡葬于坤陵而太妃無謚葬魏縣太妃與太后甚相愛其送太后于洛也涕泣而別歸而相思慕遂至不起太后聞之欲馳至晉陽視疾及其卒也又欲自往葬之莊宗泣諫羣臣交章請留乃止而太后自太妃卒悲哀不飲食逾月亦崩皇后劉氏莊宗神閔敬皇后劉氏魏州成安人也莊宗正室曰衞國夫人韓氏其次燕國夫人伊氏其次后也初封魏國夫人后父劉叟黃鬚善醫卜自號劉山人后生五六歲晉王攻魏掠成安裨將袁建豐得后納之晉宮貞簡太后教以吹笙歌舞既筓甚有色莊宗見而悅之莊宗已為晉王太后幸其宮置酒為壽自起歌舞太后歡甚命劉氏吹笙佐酒酒罷去留劉氏以賜莊宗先時莊宗攻梁軍於夾城得符道昭妻侯氏寵專諸宮宮中謂之夾寨夫人莊宗出兵四方常以侯氏從軍其後劉氏生子繼岌莊宗以為類己愛之由是劉氏寵益專自下魏博戰河上十餘年獨以劉氏從劉氏多智善迎意承旨其佗嬪御莫得進見其父聞劉氏已貴詣魏宮上謁莊宗召袁建豐問之建豐曰臣始得劉氏於成安北塢時有黃鬚丈人護之及出劉叟示建豐建豐曰是也然劉氏方與諸夫人爭寵以門望相高因大怒曰妾去鄉時略可記憶妾父不幸死於亂兵妾時環尸慟哭而去此田舍翁安得至此因命笞劉叟于宮門莊宗已即皇帝位欲立劉氏為皇后而韓夫人正室也伊夫人位次在劉氏上以故難其事而未發宰相豆盧革樞密使郭崇韜希旨上章言劉氏當立莊宗大悅同光二年癸未皇帝御文明殿遣使冊劉氏為皇后皇后受冊乘翟車鹵簿鼓吹見於太廟韓夫人等皆不平之乃封韓氏為淑妃伊氏為德妃莊宗自滅梁志意騎怠宦官伶人亂政后特用事於中自以出於賤微踰次得立以為佛力又好聚斂分遣人為商賈至於市肆之間薪芻果茹皆稱中宮所賣四方貢獻必分為二一以上天子一以入中宮宮中貨賄山積惟寫佛書饋賂僧尼而莊宗由此亦佞佛有胡僧自于闐來莊宗率皇后及諸子迎拜之僧遊五臺山遣中使供頓所至傾動城邑又有僧誠惠自言能降龍嘗過鎮州王鎔不為之禮誠惠怒曰吾有毒龍五百當遣一龍揭片石常山之人皆魚鱉也會明年滹沱河大水壞鎮州關城人皆以為神莊宗及后率諸子諸妃拜之誠惠端坐不起由是士無貴賤皆拜之獨郭崇韜不拜也是時皇太后及皇后交通藩鎮太后稱誥令皇后稱教命兩宮使者旁午於道許州節度使溫韜以后佞佛因請以私第為佛寺為后薦福莊宗數幸郭崇韜元行欽等私第常與后俱其後幸張全義第酒酣命后拜全義為養父全義日遣姬妾出入中宮問遺不絕莊宗有愛姬甚有色而生子后心患之莊宗燕居宮中元行欽侍側莊宗問曰爾新喪婦其復娶乎吾助爾聘后指愛姬請曰帝憐行欽何不賜之莊宗不得已陽諾之后趣行欽拜謝行欽再拜起顧愛姬肩輿已出宮矣莊宗不樂稱疾不食者累日同光三年秋大水兩河之民流徙道路京師賦調不充六軍之士往往殍踣乃預借明年夏秋租稅百姓愁苦號泣于路莊宗方與后荒于畋遊十二月己卯臘畋于白沙后率皇子後宮畢從歷伊闕宿龕澗癸未乃還是時大雪軍士寒凍金鎗衞兵萬騎所至責民供給壞什器徹廬舍而焚之縣吏畏懼亡竄山谷明年三月客星犯天庫有星流于天棓占星者言御前當有急兵宜散積聚以禳之宰相請出庫物以給軍莊宗許之后不肯曰吾夫婦得天下雖因武功蓋亦有天命命既在天人如我何宰相論于延英后於屏間耳屬之因取塟奩及皇幼子滿喜置帝前曰諸侯所貢給賜已盡宮中所有惟此耳請鬻以給軍宰相惶恐而退及趙在禮作亂出兵討魏始出物以賚軍軍士負而詬曰吾妻子已餓死得此何為莊宗東幸汴州從駕兵二萬五千及至萬勝不得進而還軍士離散所亡太半至罌子谷道路隘狹莊宗見從官執兵仗者皆以好言勞之曰適報魏王平蜀得蜀金銀五十萬當悉給爾等對曰陛下與之太晚得者亦不感恩莊宗泣下因顧內庫使張容哥索袍帶以賜之容哥對曰盡矣軍士叱容哥曰致吾君至此皆由爾輩因抽刀逐之左右救之而免容哥曰皇后惜物不以給軍而歸罪於我事若不測吾身萬段矣乃投水而死郭從謙反莊宗中流矢傷甚臥絳霄殿廊下渴欲得飲后令宦官進𧹞酪不自省視莊宗崩后與李存渥等焚嘉慶殿擁百騎出師子門后於馬上以囊盛金器寶帶欲於太原造寺為尼在道與存渥姦及至太原乃削髮為尼明宗入立遣人賜后死晉天福五年追謚曰神閔敬皇后自唐末喪亂后妃之制不備至莊宗時後宮之數尤多有昭容昭儀昭媛出使御正侍真懿才咸一瑤芳懿德宣一等其餘名號不可勝紀莊宗遇弒後宮散走朱守殷入宮選得三十餘人虢國夫人夏氏以嘗幸於莊宗守殷不敢留明宗立悉放莊宗時宮人還其家獨夏氏無所歸乃以河陽節度使夏魯奇同姓也因以歸之後嫁契丹突欲李贊華贊華性酷毒喜殺人婢妾微過常加刲灼夏氏懼求離婚乃削髮為尼以卒而韓淑妃伊德妃皆居太原晉高祖反時為契丹所虜唐自朱邪得姓而為李氏得國而為晉得天下而為唐其始出於夷狄而終以亂亡故其世次不可詳見其可見者曰太祖四弟八子五孫三世而絕太祖四弟曰克讓克脩克恭克寧皆不知其父母名號克讓克讓少善騎射為振武軍校從討王仙芝以功拜金吾衞將軍留京師李氏自憲宗時以部族歸唐唐處之河西嘗遣一子宿衞京師賜第於親仁坊其後太祖起兵雲中殺唐守將段文楚唐發兵討太祖遣王處存以兵圍親仁坊捕宿衞子克讓克讓與其僕何相溫石的歷等十餘騎彎弧躍馬突圍而出處存以千餘人追至渭橋克讓等射殺百餘人追兵乃止克讓奔于鴈門明年太祖復歸唐克讓還宿衞京師黃巢犯長安克讓守潼關為賊所敗奔于南山匿佛寺為寺僧所殺克脩克脩字崇遠從討龐勛以功拜朔州刺史太祖鎮鴈門以為奉誠軍使從入關討黃巢為先鋒遷左營軍使潞州孟方立遷于邢州晉取潞州表克脩昭義軍節度使數出山東擊方立又與李罕之攻寇懷孟之間其後太祖自將擊方立還軍過潞克脩性儉嗇供饋甚薄太祖大怒詬而擊笞之克脩慚憤發疾卒二子嗣弼嗣肱嗣弼為涿州刺史天祐十九年契丹攻破涿州嗣弼歿于虜嗣肱少有膽略從周德威數立戰功為馬步軍都虞候李存審敗梁軍于胡壁嗣肱獲梁將一人梁太祖圍蓨縣嗣肱從存審救蓨梁軍解去嗣肱功為多超拜蔚州刺史鴈門以北都知兵馬使累遷澤代二州刺史新州王郁叛晉亡入契丹山後諸州皆叛嗣肱取媯儒武三州拜新州刺史山北都團練使同光元年春卒于官克恭克恭初為決勝軍使克脩卒以克恭代為昭義軍節度使克脩為人簡儉潞人素安其政且哀其見笞以死克恭橫暴不法又不習軍事由是潞人皆怨克恭選後院勁兵五百人獻于太祖行至銅鞮其將馮霸以其徒叛太祖遣李元審討之戰于沁水元審大敗被傷奔入潞州牙將安居受亦叛殺克恭及元審使人召霸霸不受命居受懼而出奔行至長子為野人所殺傳首于霸霸乃入潞州自稱留後以附于梁克寧克寧為人仁孝居諸兄弟中最賢事太祖小心不懈太祖與赫連鐸李可舉戰雲蔚間後奔達靼入破黃巢克寧未嘗不從行太祖鎮太原以為內外制置蕃漢都知兵馬使檢校太保振武軍節度使軍中之事無大小皆決克寧太祖病召莊宗侍側屬張承業與克寧曰以亞子屬公等太祖崩莊宗告於克寧曰兒年孤稚未通庶政雖有先王之命恐不足以當大事叔父勳德俱高先王嘗任以政矣敢以軍府煩季父以待兒之有立克寧曰吾兄之命以兒屬我誰敢易之因下而北面再拜稱賀莊宗乃即晉王位初太祖起於雲朔之間所得驍勇之士多養以為子而與英豪戰爭卒就霸業諸養子之功為多故尤寵愛之衣服禮秩如嫡諸養子麾下皆有精兵恃功自恣自先王時常見優假及新王立年少或託疾不朝或見而不拜養子存顥存實告克寧曰兄亡弟及古之道也以叔拜姪理豈安乎人生富貴當自取之克寧曰吾家三世父慈子孝先王土宇苟有所歸吾復何求也克寧妻孟氏素剛悍存顥等各遣其妻入說孟氏孟氏數以迫克寧克寧仁而無斷惑於羣言遂至於禍都虞候李存質得罪於克寧克寧殺之而與張承業李存璋有隙又求兼領大同軍節度使於是幸臣史敬鎔見太后告克寧與存顥謀執王及太后以降梁莊宗召承業存璋告之曰季父所為如此奈何然骨肉不可自相魚肉吾當避賢路以紓禍於吾家承業等請誅克寧乃伏兵於府置酒大會克寧既至執而殺之太祖子存美存霸存禮存渥存乂存確存紀太祖子八人莊宗長子也次曰存美存霸存禮存渥存乂存確存紀同光三年十二月辛亥詔封存美等七人為王蓋存霸存渥存紀與莊宗同母也存美存乂存確存禮不知其母名氏號位存美封邕王存霸永王存禮薛王存渥申王存乂睦王存確通王存紀雅王存乂歷建雄保大二軍節度使娶郭崇韜女是時魏州妖人楊千郎用事自言有墨子術能役使鬼神化丹砂水銀莊宗頗神之拜千郎檢校尚書郎賜紫其妻出入宮禁承恩寵而士或因之以求官爵存乂及存渥等往往朋淫于其家及崇韜被族莊宗遣宦官陰察外議以為如何而宦官因欲盡誅崇韜親黨以絕後患乃誣言存乂過千郎酒酣攘臂號泣為婦翁稱冤言甚怨望莊宗大怒以兵圍其第而誅之幷誅千郎存霸歷昭義天平河中三軍節度使存渥義成天平二軍節度使皆居京師食其俸祿而已趙在禮作亂乃遣存霸於河中李嗣源兵反嚮京師莊宗再幸汜水徙存霸北京留守存渥河中節度使宣麻未訖郭從謙反攻興教門存渥從莊宗拒賊莊宗中流矢崩存渥與劉皇后同奔于太原行至風谷為部下所殺存霸聞京師亂亦自河中奔太原比至麾下皆散走惟使下康從弁不去存霸乃剪髮衣僧衣謁符彥超曰願為山僧冀公庇護彥超欲留之為軍眾所殺存紀存確聞郭從謙反奔于南山匿民家明宗詔河南府及諸道諸王出奔所至送赴闕如不幸物故者收瘞以聞存紀等所匿民家以告安重誨重誨謂霍彥威曰二王逃難主上尋求恐其失所今上既監國典喪此禮如何彥威曰上性仁慈不可聞奏宜密為之所以安人情乃即民家殺之存美素病風居太原與存禮皆不知其所終莊宗五子繼岌繼潼繼嵩繼蟾繼嶢莊宗五子長曰繼岌其次繼潼繼嵩繼蟾繼嶢繼岌母曰劉皇后其四皆不著其母名號莊宗即位繼岌為北都留守判六軍諸衛事遷檢校太尉同中書門下平章事豆盧革為相建言唐故事皇子皆為宮使因以鄴宮為興聖宮以繼岌為使同光三年封魏王是歲伐蜀以繼岌為西南行營都統郭崇韜為都招討使工部尚書任圜翰林學士李愚皆參軍事九月戊申將兵六萬自鳳翔入大散關軍無十日之糧而所至州鎮皆迎降遂食其粟至興州蜀將程奉璉以五百騎降因以其兵修閣道以過唐軍王衍將兵萬人屯利州分其半逆戰于三泉為先鋒康延孝所敗衍懼斷吉柏江浮橋奔歸成都唐軍自文州間道以入十月己酉繼岌至綿州衍上牋請降丙辰入成都王衍乘竹輿至昇仙橋素衣牽羊草索繫首肉袒銜璧輿櫬羣臣衰絰徒跣以降繼岌下而取璧崇韜解縛焚櫬自出師至降衍凡七十五日兵不血刃自古用兵之易未有如此然繼岌雖為都統而軍政號令一出崇韜初莊宗遣宦者供奉官李從襲監中軍高品李廷安呂知柔為典謁從襲等素惡崇韜又見崇韜專任軍事益不平之及破蜀蜀之貴臣大將自王宗弼已下皆爭以蜀寶貨妓樂奉崇韜父子而魏王所得匹馬束帛唾壺塵柄而已崇韜日決軍事將吏賓客趨走盈庭而都統府惟大將晨謁牙門闃然由是從襲等不勝其憤已而宗弼率蜀人見繼岌請留崇韜鎮蜀從襲等因言崇韜有異志勸繼岌為備繼岌謂崇韜曰陛下倚侍中如衡華尊之廟堂之上期以一天下而制四方必不棄元老於蠻夷之地此事非予敢知也莊宗聞崇韜欲留蜀亦不悅遣宦者向延嗣趣繼岌班師延嗣至成都崇韜不出迎及見禮益慢延嗣怒從襲等因告延嗣崇韜有異志恐危魏王延嗣還具言之劉皇后涕泣請保全繼岌莊宗遣宦官馬彥珪往視崇韜去就是時兩川新定孟知祥未至所在盜賊聚山林崇韜方遣任圜等分出招集恐後生變故師未即還而彥珪將行見劉皇后曰臣見延嗣言蜀中事勢已不可禍機之作間不容髮安能三千里往覆稟命乎劉皇后以彥珪語告莊宗莊宗曰傳言未審豈可便令果決皇后以不得請因自為教與繼岌使殺崇韜明年正月崇韜留任圜守蜀以待知祥之至崇韜期班師有日彥珪至蜀出皇后教示繼岌繼岌曰今大軍將發未有釁端豈可作此負心事從襲等泣曰今有密敕王苟不行使崇韜知之則吾屬無類矣繼岌曰上無詔書但皇后手教安能殺招討使從襲等力爭繼岌不得已而從之詰旦從襲以都統命召崇韜繼岌登樓以避之崇韜入昇階繼岌從者李環撾碎其首繼岌遂班師二月軍至泥溪先鋒康延孝叛據漢州繼岌遣任圜討平之四月辛卯至興平聞明宗反兵入京師繼岌欲退保鳳翔至武功李從襲勸繼岌馳趣京師以救內難行至渭河西都留守張籛斷浮橋繼岌不得度乃循河而東至渭南左右皆潰從襲謂繼岌曰大事已去福不可再王宜自圖繼岌徘徊泣下謂李環曰吾道盡途窮子當殺我環遲疑久之謂繼岌乳母曰吾不忍見王王若無路求生當踣面以俟繼岌面榻而臥環縊殺之任圜從後至葬繼岌華州之西南繼岌少病閹無子明宗已即位圜率征蜀之師二萬至京師明宗撫慰久之問圜繼岌何在圜具言繼岌死狀同光三年詔以皇子繼嵩繼潼繼蟾繼嶢皆為光祿大夫檢校司徒蓋其皆幼故不封當莊宗遇弒時太祖子孫在者十有一人明宗入立其四人見殺其餘皆不知所終太祖之後遂絕梁唐家人傳皆先兄弟而後諸子兄弟之子各從其父此理之常也至莊宗七弟所書事迹不以長幼為次者各因其死之先後而書之便於述事爾無定法也
