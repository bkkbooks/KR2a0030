body:
  text: 新五代史卷三十五唐六臣傳第二十三甚哉白馬之禍悲夫可為流涕者矣然士之生死豈其一身之事哉初唐天祐三年梁王欲以嬖吏張廷範為太常卿唐宰相裴樞以謂太常卿唐常以清流為之廷範乃梁客將不可梁王由此大怒曰吾常語裴樞純厚不陷浮薄今亦為此邪是歲四月彗出西北掃文昌軒轅天市宰相柳璨希梁王旨歸其譴於大臣於是左僕射裴樞獨孤損右僕射崔遠守太保致仕趙崇兵部侍郎王贊工部尚書王溥吏部尚書陸扆皆以無罪貶同日賜死于白馬驛凡搢紳之士與唐而不與梁者皆誣以朋黨坐貶死者數百人而朝廷為之空明年三月唐哀帝遜位于梁遣中書侍郎同中書門下平章事張文蔚為冊禮使禮部尚書蘇循為副中書侍郎同中書門下平章事楊涉為押傳國寶使翰林學士中書舍人張策為副御史大夫薛貽矩為押金寶使尚書左丞趙光逢為副四月甲子文蔚等自上源驛奉冊寶乘輅車導以金吾仗衞太常鹵簿朝梁于金祥殿王衮冕南面臣文蔚臣循奉冊升殿進讀已臣涉臣策奉傳國璽臣貽矩臣光逢奉金寶以次升進讀已降率文武百官北面舞蹈再拜賀夫一太常卿與社稷孰為重使樞等不死尚惜一卿其肯以國與人乎雖樞等之力未必能存唐然必不亡唐而獨存也嗚呼唐之亡也賢人君子既與之共盡其餘在者皆庸懦不肖傾險獪猾趨利賣國之徒也不然安能蒙恥忍辱於梁庭如此哉作唐六臣傳張文蔚張文蔚字右華河間人也初以文行知名舉進士及第唐昭宗時為翰林學士承旨是時天子微弱制度已隳文蔚居翰林制詔四方獨守大體昭宗遷洛拜中書侍郎同中書門下平章事柳璨殺裴樞等七人蔓引朝士輒加誅殺縉紳相視以目皆不自保文蔚力講解之朝士多賴以全活梁太祖立仍以文蔚為相梁初制度皆文蔚所裁定文蔚居家亦孝悌開平二年太祖北巡留文蔚西都以暴疾卒贈右僕射楊涉楊涉祖收唐懿宗時宰相父嚴官至兵部侍郎涉舉進士昭宗時為吏部尚書哀帝即位拜中書侍郎同中書門下平章事涉唐名家世守禮法而性特謹厚不幸遭唐之亂拜相之日與家人相對泣下顧謂其子凝式曰吾不能脫此網羅禍將至矣必累爾等唐亡事梁為門下侍郎同中書門下平章事在位三年俛首無所施為罷為左僕射知貢舉後數年卒子凝式有文詞善筆札歷事梁唐晉漢周常以心疾致仕居于洛陽官至太子太保張策張策字少逸河西燉煌人也父同為唐容管經略使策少聰悟好學通章句父同居洛陽敦化里浚井得古鼎銘曰魏黃初元年春二月匠吉千同以為奇策時年十三居同側啟曰漢建安二十五年曹公薨改元延康是歲十月文帝受禪又改黃初是黃初元年無二月也銘何謬邪同大驚異之策少好浮圖之說乃落髮為僧居長安慈恩寺黃巢犯長安策乃返初服奉父母以避亂居田里十餘年召拜廣文館博士邠州王行瑜辟觀察支使晉王李克用攻行瑜策與婢肩輿其母東歸行積雪中行者憐之梁太祖兼四鎮辟鄭滑支使以母喪解職服除入唐為膳部員外郎華州韓建辟判官建徙許州以為掌書記建遣策聘于太祖太祖見而喜曰張夫子至矣遂留以為掌書記薦之于朝累拜中書舍人翰林學士太祖即位遷工部侍郎奉旨開平二年拜刑部侍郎同中書門下平章事遷中書侍郎以風恙罷為刑部尚書致仕卒于洛陽趙光逢趙光逢字延吉父隱唐左僕射光逢在唐以文行知名時人稱其方直溫潤謂之玉界尺昭宗時為翰林學士承旨御史中丞以世亂棄官居洛陽杜門絕人事者五六年柳璨為相與光逢有舊恩起光逢為吏部侍郎太常卿唐亡事梁為中書侍郎同中書門下平章事累遷左僕射以太子太保致仕末帝即位起為司空同中書門下平章事復以司徒致仕唐天成中即其家拜太保封齊國公卒贈太傅薛貽矩薛貽矩字熙用河東聞喜人也仕唐為兵部侍郎翰林學士承旨昭宗自岐還長安大誅宦者貽矩時為中尉韓全誨等作畫像贊坐左遷貽矩乃自結於梁太祖太祖言之於朝拜吏部尚書遷御史大夫天祐三年太祖自長蘆還軍哀帝遣貽矩來勞貽矩以臣禮見太祖揖之升階貽矩曰殿下功德及人三靈改卜皇帝方行舜禹之事臣安敢違乃稱臣拜舞太祖側身以避之貽矩還遂趣哀帝遜位太祖即位拜貽矩中書侍郎同中書門下平章事累拜司空貽矩為梁相五年卒贈侍中蘇循杜曉附蘇循不知何許人也為人巧佞阿諛無廉恥惟利是趨事唐為禮部尚書是時太祖已弒昭宗立哀帝唐之舊臣皆憤惋切齒或俛首畏禍或去不仕而循特附會梁以希進用梁兵攻楊行密大敗于卑河太祖躁忿急於禪代欲邀唐九錫羣臣莫敢當其議獨循倡言梁王功德天命所歸宜即受禪明年梁太祖即位循為冊禮副使循有子楷乾寧中舉進士及第昭宗遣學士陸扆覆落之楷常慚恨及昭宗遇弒唐政出於梁楷為起居郎與柳璨張廷範等相結因謂廷範曰夫謚者所以易名而貴信也前有司謚先帝曰昭名實不稱公為太常卿予史官也不可以不言乃上疏駁議而廷範本梁客將嘗求太常卿不得者廷範亦以此怨唐因下楷疏廷範廷範議曰臣聞執事堅固之謂恭亂而不損之謂靈武而不遂之謂莊在國逢難之謂閔因事有功之謂襄請改謚昭宗皇帝曰恭靈莊閔皇帝廟號襄宗梁太祖已即位置酒玄德殿顧羣臣自陳德薄不足以當天命皆諸公推戴之力唐之舊臣楊涉張文蔚等皆慚懼俯伏不能對獨循與張禕薛貽矩盛稱梁王功德所以順天應人者循父子皆自以附會梁得所託旦夕引首希見進用敬翔尤惡之謂太祖曰梁室新造宜得端士以厚風俗循父子皆無行不可立於新朝於是父子皆勒歸田里乃依朱友謙於河中其後友謙叛梁降晉晉王將即位求唐故臣在者以備百官之闕友謙遣循至魏州是時梁未滅晉諸將相多不欲晉王即帝位晉王之意雖銳將相大臣未有贊成其議者循始至魏州望州廨聽事即拜謂之拜殿及入謁蹈舞呼萬歲而稱臣晉王大悅明日又獻畫日筆三十管晉王益喜因以循為節度副使已而病卒莊宗即位贈左僕射楷同光中為尚書員外郎明宗即位大臣欲理其駁謚之罪以憂死當唐之亡也又有杜曉者字明遠祖審權父讓能皆為唐相昭宗時王行瑜李茂貞兵犯京師昭宗殺讓能於臨以自解曉以父死無罪居喪哀毀服除布衣幅巾自廢十餘年崔胤判鹽鐵辟巡官除畿縣尉直昭文館皆不起崔遠判戶部又辟巡官或謂曉曰嵇康死子紹自廢不出仕山濤以物理責之乃仕吾子忍令杜氏歲時鋪席祭其先人同匹庶乎曉乃為之起累遷膳部郎中翰林學士梁太祖即位遷工部侍郎奉旨開平二年拜中書侍郎同中書門下平章事友珪立遷禮部尚書集賢殿大學士袁象先等討賊兵大掠曉為亂兵所殺贈右僕射嗚呼始為朋黨之論者誰歟甚乎作俑者也真可謂不仁之人哉予嘗至繁城讀魏受禪碑見漢之羣臣稱魏功德而大書深刻自列其姓名以夸耀于世又讀梁實錄見文蔚等所為如此未嘗不為之流涕也夫以國予人而自夸耀及遂相之此非小人孰能為也漢唐之末舉其朝皆小人也而其君子者何在哉當漢之亡也先以朋黨禁錮天下賢人君子而立其朝者皆小人也然後漢從而亡及唐之亡也又先以朋黨盡殺朝廷之士而其餘存者皆庸懦不肖傾險之人也然後唐從而亡夫欲空人之國而去其君子者必進朋黨之說欲孤人主之勢而蔽其耳目者必進朋黨之說欲奪國而與人者必進朋黨之說夫為君子者故嘗寡過小人欲加之罪則有可誣者有不可誣者不能遍及也至欲舉天下之善求其類而盡去之惟指以為朋黨耳故其親戚故舊謂之朋黨可也交游執友謂之朋黨可也宦學相同謂之朋黨可也門生故吏謂之朋黨可也是數者皆其類也皆善人也故曰欲空人之國而去其君子者惟以朋黨罪之則無免者矣夫善善之相樂以其類同此自然之理也故聞善者必相稱譽稱譽則謂之朋黨得善者必相薦引薦引則謂之朋黨使人聞善不敢稱譽人主之耳不聞有善于下矣見善不敢薦則人主之目不得見善人矣善人日遠而小人日進則為人主者倀倀然誰與之圖治安之計哉故曰欲孤人主之勢而蔽其耳目者必用朋黨之說也一君子存羣小人雖衆必有所忌而有所不敢為惟空國而無君子然後小人得肆志於無所不為則漢魏唐梁之際是也故曰可奪國而予人者由其國無君子空國而無君子由以朋黨而去之也嗚呼朋黨之說人主可不察哉傳曰一言可以喪邦者其是之謂與可不鑒哉可不戒哉
