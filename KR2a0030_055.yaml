body:
  text: 新五代史卷五十五雜傳第四十三劉昫劉昫涿州歸義人也昫為人美風儀與其兄暄弟皆以好學知名燕薊之間後為定州王處直觀察推官處直為子都所囚昫兄暄亦為怨家所殺昫乃避之滄州唐莊宗即位拜昫太常博士以為翰林學士明宗時纍遷兵部侍郎居職明宗素重昫而愛其風韻遷端明殿學士長興三年拜中書侍郎兼刑部尚書同中書門下平章事昫詣中興殿門謝是日大祠不坐昫入謝端明殿昫自端明殿學士拜相當時以此為榮廢帝入立遷吏部尚書門下侍郎監修國史初廢帝入問三司使王玫帑廩之數幾何玫言其數百萬及責以賞軍而無十一廢帝大怒罷玫命昫兼判三司昫性察而嫉三司蠹敝尤甚乃句計文簿核其虛實殘租積負悉蠲除之往時吏幸積年之負蓋而不發因以把持州縣求賄賂及昫一切蠲除民間歡然以為德而三司吏皆沮怨先是馮道與昫為姻家而同為相道罷李愚代之愚素惡道為人凡事有稽失者必指以誚昫曰此公親家翁所為也昫性少容恕而愚特剛介遂相詆詬相府史吏惡此兩人剛直因共揚言其事聞廢帝並罷之以昫為右僕射是時三司諸吏提印聚立月華門外聞宣麻罷昫相皆歡呼相賀曰自此我曹快活矣昫在相位不習典故初明宗崩太常卿崔居儉以故事當為禮儀使居儉辭以祖諱蠡馮道改居儉祕書監居儉怏怏失職中書舍人李詳為居儉誥詞有聞名心懼之語昫輒易曰有恥且格居儉訴曰名諱有令式豫何罪也當時聞者皆傳以為笑及為僕射入朝遇雨移班廊下御史臺吏引僕射立中丞御史下昫詰吏以故事自宰相至臺省皆不能知是時馮道罷相為司空自隋唐以來三公無職事不特置及道為司空問有司班次亦皆不能知由是不入朝堂俟臺官兩省入而後入宰相出則隨而出至昫為僕射自以由宰相罷與道同乃隨道出入有司不能彈正而議者多竊笑之晉高祖時張從賓反殺皇子重乂於洛陽及以昫為東都留守判鹽鐵開運中拜司空同中書門下平章事復判三司契丹犯京師昫以目疾罷為太保是歲卒年六十盧文紀盧文紀字子持其祖簡求為唐太原節度使父嗣業官至右補闕文紀舉進士事梁為刑部侍郎集賢殿學士唐明宗時為御史中丞初上事百官臺參吏白諸道進奏官賀文紀問當如何吏對曰朝廷在長安時進奏官見大夫中丞如胥史自唐衰天子微弱諸侯彊盛貢奉不至朝廷姑息方鎮假借邸吏大夫中丞上事進奏官至客次通名勞以茶酒而不相見相傳以為故事文紀曰吾雖德薄敢隳舊制因遣吏諭之進奏官奮臂喧然欲去不得已入見文紀據牀端笏臺吏通名贊拜既出恚怒不自勝訴於樞密使安重誨重誨曰吾不知故事可上訴于朝即相率詣閣門求見以狀訴明宗問宰相趙鳳進奏吏比外何官鳳曰州縣發遞知後之流也明宗怒曰乃吏卒爾安得慢吾法官皆杖而遣之文紀又請悉復中外官校考法將相天子自書之詔雖施行而官卒不考歲餘遷工部尚書文紀素與宰相崔協有隙協除工部郎中于鄴文紀以鄴與其父名同音大怒鄴赴省參上文紀不見之因請連假已而鄴奉使未行文紀即出視事鄴因醉忿自經死文紀坐貶石州司馬久之為祕書監太常卿奉使于蜀過鳳翔時廢帝為鳳翔節度使文紀為人形貌魁偉語音琅然廢帝奇之後廢帝入立欲擇宰相問於左右左右皆言文紀及姚顗有人望廢帝因悉書清望官姓名內琉璃瓶中夜焚香呪天以筯挾之首得文紀欣然相之乃拜中書侍郎同中書門下平章事是時天下多事廢帝數以責文紀文紀因請罷五日起居復唐故事開延英冀得從容奏議天下事廢帝以謂五日起居明宗所以見羣臣也不可罷而便殿論事可以從容何必延英因詔宰相有事不以時詣閣門請對晉高祖起太原廢帝北征過拜徽陵休仗舍顧文紀曰吾自鳳翔識卿不以常人為待自卿為相詢于輿議皆云可致太平今日使吾至此卿宜如何文紀皇恐謝罪廢帝至河陽文紀勸帝扼橋自守不聽晉高祖入立罷為吏部尚書纍遷太子太師致仕周太祖入立即拜司空于家卒年七十六贈司徒馬胤孫馬胤孫字慶先棣州商河人也為人懦暗少好學學韓愈為文章舉進士為唐潞王從珂河中觀察支使從珂為楊彥溫所逐罷居于京師里第胤孫從而不去從珂為京兆尹徙鎮鳳翔胤孫常從之以為觀察判官潞王將舉兵反與將吏韓昭胤等謀議已定召胤孫告之曰受命移鎮路出京師何向為便胤孫曰君命召不俟駕今大王為國宗屬而先帝新棄天下臨喪赴鎮臣子之忠也左右皆笑其愚然從珂心獨重之廢帝入立以為戶部郎中翰林學士久之拜中書侍郎同中書門下平章事胤孫不通世務故事多壅塞是時馮道罷匡國軍節度使拜司空司空自唐已來無特拜者有司不知故事朝廷議者紛然或曰司空三公宰相職也當參與大政而宰相盧文紀獨以謂司空之職祭祀掃除而已胤孫皆不能決時劉昫亦罷相為僕射右散騎常侍孔昭序建言常侍班當在僕射前胤孫責御史臺檢例臺言故事無所見據今南北班位常侍在前胤孫即判臺狀施行劉昫大怒崔居儉揚言于朝曰孔昭序解語是朝廷無解語人也且僕射師長百寮中丞大夫就班修敬而常侍在南宮六卿之下況僕射乎昭序癡兒豈識事體朝士聞居儉言流議稍息胤孫臨事多不能決當時號為三不開謂其不開口以論議不開印以行事不開門以延士大夫也晉兵起太原廢帝幸河陽是時勢已危迫胤孫自洛來朝行在人皆冀其有所建言胤孫獻綾三百匹而已晉高祖入立罷歸田里胤孫既學韓愈為文故多斥浮屠氏之說及罷歸乃反學佛撰法喜集佛國記行于世時人誚之曰佞清泰不徹乃來佞佛清泰廢帝年號也人有戲胤孫曰公素慕韓愈為人而常誦傅奕之論今反佞佛是佛佞公邪公佞佛邪胤孫答曰豈知非佛佞我也時人傳以為笑後以太子賓客分司居于洛陽周廣順中卒胤孫卒後其家婢有為胤孫語者初崔協為明宗相在位無所發明既死而有降語其家胤孫又然時人嘲之曰生不能言死而後語云姚顗姚顗字百真京兆長安人也少蠢不修容止時人莫之知中條山處士司空圖一見以為奇以其女妻之舉進士事梁為翰林學士中書舍人唐莊宗滅梁貶復州司馬已而以為左散騎常侍兼吏部侍郎尚書左丞廢帝欲擇宰相選當時清望官知名於世者得盧文紀及顗乃拜顗中書侍郎同中書門下平章事顗為人仁恕不知錢陌銖兩之數御家無法在相位齪齪無所為唐制吏部分為三銓尚書一人曰尚書銓侍郎二人曰中銓東銓每歲集以孟冬三旬而選盡季春之月天成中馮道為相建言天下未一選人歲才數百而吏部三銓分注雖曰故事其實徒繁而無益始詔三銓合為一而尚書侍郎共行選事至顗與盧文紀為相復奏分銓為三而循資長定舊格歲久多舛因增損之選人多不便之往往邀遮宰相喧訴不遜顗等無如之何廢帝為下詔書禁止晉高祖立罷顗為戶部尚書卒年七十五卒之日家無餘資尸不能斂官為賵贈乃能斂聞者哀憐之劉嶽劉嶽字昭輔洛陽人也唐民部尚書政會之八代孫崇龜崇望其諸父也嶽名家子好學敏於文辭善談論舉進士事梁為左拾遺侍御史末帝時為翰林學士纍官至兵部侍郎梁亡貶均州司馬復用為太子詹事唐明宗時為吏部侍郎故事吏部文武官告身皆輸朱膠紙軸錢然後給其品高者則賜之貧者不能輸錢往往但得敕牒而無告身五代之亂因以為常官卑者無復給告身中書但録其制辭編為敕甲嶽建言以謂制辭或任其材能或褒其功行或申以訓誡而受官者既不給告身皆不知受命之所以然非王言所以告詔也請一切賜之由是百官皆賜告身自嶽始也宰相馮道世本田家狀貌質野朝士多笑其陋道旦入朝兵部侍郎任贊與嶽在其後道行數反顧贊問嶽道反顧何為嶽曰遺下兔園冊爾兔園冊者鄉校俚儒教田夫牧子之所誦也故嶽舉以誚道道聞之大怒徙嶽祕書監其後李愚為相遷嶽太常卿初鄭餘慶嘗採唐士庶吉凶書疏之式雜以當時家人之禮為書儀兩卷明宗見其有起復冥昏之制歎曰儒者所以隆孝悌而敦風俗且無金革之事起復可乎婚吉禮也用於死者可乎乃詔嶽選文學通知古今之士共刪定之嶽與太常博士段顒田敏等增損其書而其事出鄙俚皆當時家人女子傳習所見往往轉失其本然猶時有禮之遺制其後亡失愈不可究其本末其婚禮親迎有女坐壻鞍合髻之說尤為不經公卿之家頗遵用之至其久也又益訛謬可笑其類甚多嶽卒于官年五十六贈吏部尚書子溫叟嗚呼甚矣人之好為禮也在上者不以禮示之使人不見其本而傳其習俗之失者尚拳拳而行之五代干戈之亂不暇於禮久矣明宗武君出於夷狄而不通文字乃能有意使民知禮而嶽等皆當時儒者卒無所發明但因其書增損而已然其後世士庶吉凶皆取嶽書以為法而十又轉失其三四也可勝歎哉馬縞馬縞不知其世家少舉明經又舉宏詞事梁為太常少卿以知禮見稱于世唐莊宗時纍遷中書舍人刑部侍郎權判太常卿明宗入立繼唐太祖莊宗而不立親廟縞言漢諸侯王入繼統者必別立親廟光武皇帝立四廟于南陽請如漢故事立廟以申孝享明宗下其議禮部尚書蕭頃等請如縞議宰相鄭王玉等議引漢桓靈為比以謂靈帝尊其祖解瀆亭侯淑為孝元皇父萇為孝仁皇請下有司定諡四代祖考為皇置園陵如漢故事事下太常博士王丕議漢桓帝尊祖為孝穆皇帝父為孝崇皇帝縞以謂孝穆孝崇有皇而無帝惟吳孫皓尊其父和為文皇帝不可以為法右僕射李琪等議與縞同明宗詔曰五帝不相襲禮三王不相沿樂惟皇與帝異世殊稱爰自嬴秦已兼厥號朕居九五之位為億兆之尊奈何總二名於眇躬惜一字於先世乃命宰臣集百官於中書各陳所見李琪等請尊祖禰為皇帝曾高為皇宰相鄭王玉合羣議奏曰禮非天降而本人情可止可行有損有益今議者引古以漢為據漢之所制夫復何依開元時尊皋陶為德明皇帝涼武昭王為興聖皇帝皆立廟京師此唐家故事也臣請四代祖考皆加帝如詔旨而立廟京師詔可其加帝而立廟應州劉嶽修書儀其所增損皆決於縞縞又言縗麻喪紀所以別親疏辨嫌疑禮叔嫂無服推而遠之也唐太宗時有司議為兄之妻服小功五月今有司給假為大功九月非是廢帝下其議太常博士段顒議嫂服給假以大功者令文也令與禮異者非一而喪服之不同者五禮姨舅皆服小功令皆大功妻父母壻外甥皆服緦令皆小功禮令之不可同如此右贊善大夫趙咸又議曰喪與其易也寧戚儀禮五服或以名加或因尊制推恩引義各有所當據禮為兄之子妻服大功今為兄之子母服小功是輕重失其倫也以名則兄子之妻疏因尊則嫂非卑嫂服大功其來已久令國之典不可滅也司封郎中曹琛請下其議並以禮令之違者定議詔尚書省集百官議左僕射劉昫等議曰令於喪服無正文而嫂服給大功假乃假寧附令而敕無年月請凡喪服皆以開元禮為定下太常具五服制度附于令令有五服自縞始也縞明宗時嘗坐覆獄不當貶綏州司馬復為太子賓客遷戶部兵部侍郎盧文紀作相以其迂儒鄙之改國子祭酒卒年八十贈兵部尚書崔居儉崔居儉清河人也祖蠡父蕘皆為唐名臣居儉美文辭風骨清秀少舉進士梁貞明中為中書舍人翰林學士御史中丞唐莊宗時為刑部侍郎太常卿崔氏自後魏隋唐與盧鄭皆為甲族吉凶之事各著家禮至其後世子孫專以門望自高為世所嫉明宗崩居儉以故事為禮儀使居儉以祖諱蠡辭不受宰相馮道即徙居儉為祕書監居儉歷兵吏部侍郎尚書左丞戶部尚書晉天福四年卒年七十贈右僕射居儉拙於為生居顯官衣常乏死之日貧不能葬聞者哀之崔梲崔梲字子文深州安平人也父涿唐末為刑部郎中梲少好學頗涉經史工於文辭遭世亂寓居于滑臺不遊里巷者十餘年人罕識其面梁貞明三年舉進士甲科開封尹王瓚辟掌奏記梲性至孝其父涿病不肯服藥曰死生有命何用藥為梲屢進醫藥不納每賓客問疾者梲輒迎拜門外泣涕而告之涿終不服藥而卒梲居喪哀毀服除唐明宗以為監察御史不拜踰年再命乃拜纍遷都官郎中翰林學士晉高祖時以戶部侍郎為學士承旨權知天福二年貢舉初梲為學士嘗草制為宰相桑維翰所改梲以唐故事學士草制有所改者當罷職乃引經據爭之維翰頗不樂而梲少專於文學不能涖事維翰乃命梲知貢舉梲果不能舉職時有進士孔英者素有醜行為當時所惡梲既受命往見維翰維翰素貴嚴尊而語簡謂梲曰孔英來矣梲不諭其意以謂維翰以孔英為言乃考英及第物議大以為非即罷學士拜尚書左丞遷太常卿五年高祖詔太常復文武二舞詳定正冬朝會禮及樂章自唐末之亂禮樂制度亡失已久梲與御史中丞竇貞固刑部侍郎呂琦禮部侍郎張允等草定之其年冬至高祖會朝崇元殿廷設宮縣二舞在北登歌在上文舞郎八佾六十有四人冠進賢黃紗袍白中單白練襠白布大口袴革帶履左執籥右秉翟執纛引者二人武舞郎八佾六十有四人服平巾幘緋絲布大袖繡襠甲金飾白練錦騰蛇起梁帶豹文大口袴烏靴左執干右執戚執旌引者二人加鼓吹十二按負以熊豹以象百獸率舞按設羽葆鼓一大鼓一金錞一歌簫笳各二人王公上壽天子舉爵奏玄同三舉登歌奏文同舉食文舞舞昭德武舞舞成功之曲禮畢高祖大悅賜梲金帛羣臣左右覩者皆嗟歎之然禮樂廢久而制作簡繆又繼以龜茲部霓裳法曲參亂雅音其樂工舞郎多教坊伶人百工商賈州縣避役之人又無老師良工教習明年正旦復奏于廷而登歌發聲悲離煩慝如薤露虞殯之音舞者行列進退皆不應節聞者皆悲憤其年高祖崩梲以風痺改太子賓客分司西京以卒開運二年太常少卿陶穀奏廢二舞明年契丹滅晉耶律德光入京師太常請備法駕奉迎樂工教習鹵簿鼓吹都人聞者為之流涕焉李懌李懌京兆人也少好學頗工文辭唐末舉進士為祕書省校書郎集賢校理唐亡事梁為監察御史纍遷中書舍人翰林學士梁亡責授懷州司馬遇赦量移稍遷衛尉少卿天成中復為中書舍人翰林學士纍遷尚書右丞承旨時右散騎常侍張文寶知貢舉所放進士中書有覆落者乃請下學士院作詩賦為貢舉格學士竇夢徵張礪等所作不工乃命懌為之懌笑曰年少舉進士登科蓋偶然爾後生可畏來者未可量假令豫復就禮部試未必不落第安能與英俊為准格聞者多其知體後遷刑部尚書分司洛陽卒年七十餘
