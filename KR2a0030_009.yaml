body:
  text: 新五代史卷九晉本紀第九出帝父敬儒高祖兄也為唐莊宗騎將早卒高祖以其子重貴為子高祖六子五皆早死而重睿幼故重貴得立重貴少而謹厚善騎射高祖使博士王震教以禮記久之不能通大義謂震曰此非我家事也高祖為契丹所立謀以一子留守太原契丹使盡出諸子自擇之指重貴曰此眼大者可也遂拜金紫光祿大夫行太原尹北京留守知河東節度事天福二年九月召拜左金吾衛上將軍三年冬為開封尹封鄭王加太尉同中書門下平章事六年高祖幸鄴留守東京已而為廣晉尹徙封齊王七年六月乙丑高祖崩皇帝即位于柩前庚午使右驍衛將軍石德超以御馬二撲祭于相州之西山如京使李仁廓使于契丹契丹使梅李來丙子馮道為大行皇帝山陵使門下侍郎竇貞固為副太常卿崔梲為禮儀使戶部侍郎呂琦為鹵簿使御史中丞王易簡為儀仗使己卯四方館使朱崇節右金吾衛大將軍梁言使于契丹夷狄之禮也舊史實録無橋道頓遞使疑不置或闕書漢高祖亦然秋七月壬辰皇祖母劉氏崩輟視朝三日丁酉使石德超撲馬于相州之西山庚子大赦甲辰契丹使通事來高祖所生母也高祖時尊為皇太后矣其崩也喪葬不用后禮見恩禮之薄不書曰皇太后者於帝為祖母也曰崩正其名也前已備見故文省八月戊午高行周克襄州庚申天平軍節度使景延廣義成軍節度使李守貞彰德軍節度使郭謹進錢粟助作山陵甲子契丹使郎五來庚午葬皇祖母於魏縣癸酉契丹使其客省使張九思來安從進自焚死故不書伏誅九月辛丑李守貞為大行皇帝山陵都部署冬十月己未契丹使舍利來庚午回鶻遣使者來十一月契丹使大卿來庚寅葬聖文章武孝皇帝于顯陵己亥牛羊使董殷使于契丹庚子祔高祖神主于太廟辛丑蠲高祖靈車所過民租之半陵在河南壽安縣五代之亂至此七君而不得其死者五明宗雖善終而愍帝不克葬至廢帝時始克葬故皆不書至此始見子得葬其父故並祔廟詳書之十二月庚午北京留守劉知遠進百頭穹廬契丹于越使令骨支來辛未又使野里巳來丙子于闐使都督劉再升來沙州曹元深瓜州曹元忠皆遣使附再升以來旱蝗穹廬夷狄之用也八年春正月契丹于越使烏多奧來二月壬子景延廣為御營使己未如東京赦廣晉府囚庚申次澶州赦囚乙丑至自鄴都庚午寒食望祭顯陵于南莊焚御衣紙錢焚衣野祭之類皆閭巷人之事用之天子見禮樂壞甚三月己卯朔趙瑩罷晉昌軍節度使桑維翰為侍中辛丑引進使太府卿孟承誨使于契丹蝗夏四月庚午董殷使于契丹供奉官張福率威順軍捕蝗于陳州五月泰寧軍節度使安審信捕蝗于中都丁亥追封皇伯敬儒為宋王癸卯馮道罷甲辰以旱蝗大赦六月庚戌祭蝗于皋門癸亥供奉官七人帥奉國軍捕蝗于京畿辛未括借民粟殺藏粟者秋七月甲午册皇太后丁酉射于南莊契丹使梅里等來甲辰供奉官李漢超帥奉國軍捕蝗于京畿八月丁未朔募民捕蝗易以粟辛亥檢民青苗九月戊寅尊秦國夫人安氏為皇太妃丙申幸大年莊及景延廣第冬十月戊申立馮氏為皇后一壬子畋于近郊幸沙臺丙寅契丹使通事劉胤來庚午括借民粟馮氏於帝為叔母十一月己卯董殷使于契丹甲申幸八角閲馬牧乙未契丹使梅里來戊戌齊州刺史楊承祚奔于青州辛丑高麗使其廣評侍郎金仁逢來十二月癸丑給事中邊光範登州刺史郭彥威使于契丹甲寅高麗使太相來平盧軍節度使楊光遠反淄州刺史翟進宗死之開運元年春正月甲戌朔契丹寇滄州己卯陷貝州庚辰歸德軍節度使高行周為北面行營都部署契丹入鴈門寇代州辛巳殿直王班使于契丹至于鄴都不得進而復大飢壬午前靜難軍節度使李周留守東京景延廣為御營使乙酉北征丙戌契丹寇黎陽辛卯講武于澶州契丹屯于元城趙延壽寇南樂甲午劉知遠為幽州道行營招討使括馬丙申契丹寇黎陽辛丑劉知遠及契丹偉王戰于秀容敗之博州刺史周儒叛降于契丹晉自高祖以父事契丹甚謹而歲時遣使舊史實録皆不書至出帝立使者旁午不絶不可勝數故其官卑者皆略而不書班以不得進故書二月戊申前軍都虞候李守貞及契丹戰于馬家渡敗之癸丑北面行營都虞候馬全節及契丹戰于北平敗之三月癸酉及契丹戰于戚城契丹去己丑冀州刺史白從暉及契丹戰于衡水敗之癸巳籍民為武定軍戰而兩各傷失收兵徐去晉不能追故以自去為文夏四月契丹陷德州沿河巡檢使梁進敗之取德州甲寅至自澶州赦京師己未馬全節及契丹戰于定豐敗之辛酉率借民財五月戊寅李守貞討楊光遠丁亥鄴都留守張從恩為貝州行營都部署辛卯李守貞為青州行營都部署六月克淄州丙午復置樞密使丁未侍中桑維翰為中書令充樞密使丙辰河決滑州環梁山入于汶濟秋七月辛未朔大赦改元己丑太子太傅劉昫守司空兼門下侍郎同中書門下平章事八月辛丑朔劉知遠為北面行營都統順德軍節度使杜威為都招討使戊辰旌表陳州項城民史仁詡門閭九月丙子契丹寇遂城樂壽代州刺史白文珂及契丹戰于七里烽敗之冬十月庚戌武寧軍節度使趙在禮為北面行營副都統鄴都留守馬全節為副招討使十二月己亥朔射兔于皋門丁巳楊承勳囚其父光遠以降殺之出帝已許其不死既而命李守貞自殺之故不書伏誅閏月乙酉德音赦青州契丹寇恆州二年春正月契丹陷泰州壬子馬全節及契丹戰于榆林兩軍皆潰戊午幸南莊張從恩留守東都辛酉高行周為御營使乙丑北征契丹去二月己巳幸黎陽橫海軍節度使田武為東北面行營都部署以備契丹丙子大閲于戚城丙戌閲馬於鐵丘丙申端明殿學士尚書戶部侍郎馮玉為戶部尚書樞密使曰以備契丹嫌契丹去而命將三月戊戌契丹陷祁州刺史沈斌死之丁未畋于戚城庚戌馬全節克泰州辛亥易州戍將孫方諫及契丹諧里戰于狼山敗之甲寅杜威克滿城乙卯克遂城庚申杜威及契丹戰于陽城敗之追奔至于衛村又敗之夏四月戊寅勞旋于戚城己卯勞旋于王莽河甲申至自澶州赦左右軍囚庚寅大賞軍功五月丙申朔大赦丙午幸南莊六月丁卯射于繁臺幸杜威第旱秋八月甲子朔廢二舞丙寅和凝罷馮玉為中書侍郎同中書門下平章事辛未閲馬于茂澤陂丁丑括馬九月己亥閲馬于萬龍岡幸李守貞第冬十月丁丑高麗使其廣評侍郎韓玄圭禮賓卿金廉等來戊寅射兔于硯臺戊子高麗使其兵部侍郎劉崇圭內軍卿朴藝言來十一月戊戌封王武為高麗國王己巳射兔于皋門幸沙臺十二月丁丑臘畋于郊丁亥桑維翰罷開封尹趙瑩為中書令李嵩守侍中樞密使三年春二月丙子回鶻使突厥陸來壬午射鴨于板橋幸南莊夏六月孫方諫以狼山叛附于契丹丙寅契丹寇邊己丑李守貞為行營都部署義成軍節度使皇甫遇為副河決漁池大飢羣盜起秋七月大雨水河決楊劉朝城武德八月辛酉河溢歷亭九月河決澶滑懷州辛丑行營馬軍排陳使張彥澤及契丹戰于新興敗之癸卯劉知遠及契丹戰于朔州敗之大雨霖河決臨黃冬十月河決衛州丙寅河決原武辛未杜威為北面行營都招討使李守貞為兵馬都監十一月永清軍節度使梁漢璋及契丹戰于瀛州敗績契丹寇鎮定十二月己未杜威軍于中渡壬戌奉國都指揮使王清及契丹戰于滹沱敗績死之杜威李守貞張彥澤以其軍叛降于契丹庚午射兔于沙臺壬申張彥澤犯京師殺開封尹桑維翰契丹滅晉戰將歿於陳守將歿於城而不書死者以其志未可知也或欲走而不得或欲降而未暇遽以被殺爾若不走不降而死節明者自書死如清是已出帝雖存而晉則亡已故書滅嗚呼余書封子重貴為鄭王又書追封皇伯敬儒為宋王者豈無意哉禮兄弟之子猶子也重貴書子可矣敬儒出帝父也書曰皇伯者何哉出帝立不以正而絶其所生也蓋出帝於高祖得為子而不得為後者高祖自有子也方高祖疾病抱其子重睿置於馮道懷中而託之出帝豈得立邪晉之大臣既違禮廢命而立之以謂出帝為高祖子則得立為敬儒子則不得立於是深諱其所生而絶之以欺天下為真高祖子也禮曰為人後者為其父母報使高祖無子出帝得為後而立以正則不待絶其所生以為欺也故余書曰追封皇伯敬儒為宋王者以見其立不以正而滅絶天性臣其父而爵之以欺天下也
