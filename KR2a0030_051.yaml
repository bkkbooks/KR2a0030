body:
  text: 新五代史卷五十一雜傳第三十九朱守殷朱守殷少事唐莊宗為奴名曰會兒莊宗讀書會兒常侍左右莊宗即位以其廝養為長直軍以守殷為軍使故未嘗經戰陳之用然好言人陰私長短以自結莊宗以為忠遷蕃漢馬步軍都虞候使守德勝王彥章攻德勝守殷無備遂破南城莊宗曰駑才果誤豫事明宗請以守殷行軍法莊宗不聽同光二年領鎮武軍節度使是時莊宗初入洛守殷巡檢校京師恃恩驕恣凌侮勳舊與伶人景進相為表𩹉魏王繼岌已殺郭崇韜進誣朱友謙與崇韜謀反莊宗遣守殷圍其第而殺之是時明宗自鎮州來朝居于私第莊宗方惑羣小疑忌大臣遣守殷伺察明宗動靜守殷陰使人告明宗曰位高人臣者身危功蓋天下者不賞公可謂位高而功著矣宜自圖歸藩無與禍會也明宗曰吾洛陽一匹夫爾何能為也既而明宗卒反于魏莊宗東討守殷將騎軍陳宣仁門外以俟駕郭從謙作亂犯興教門以入莊宗亟召守殷等軍守殷按軍不動莊宗獨與諸王宦官百餘人射賊守殷等終不至方移兵憩北邙山下聞莊宗已崩即馳入宮中選載嬪御寶貨以歸縱軍士劫掠遣人趣明宗入洛明宗即位拜守殷同中書門下平章事河南尹判六軍諸衛事明年遷宣武軍節度使九月明宗詔幸汴州議者喧然或以為征吳或以為東諸侯有屈強者將制置之守殷尤不自安乃殺指揮使馬彥超閉城反明宗行至京水聞守殷反遣范延光馳兵傅其城汴人開門納延光守殷自殺其族乃引頸命左右斬之明宗至汴州命鞭其尸梟首于市七日傳徇洛陽守殷之將反也召都指揮使馬彥超與計事彥超不從守殷殺之明宗憐彥超之死以其子承祚為洺州長史董璋董璋不知其世家何人也少與高季興孔循俱為汴州富人李讓家僮梁太祖鎮宣武養讓為子是為朱友讓其僮奴以友讓故皆得事梁太祖璋以軍功為指揮使晉李繼韜以潞州叛降梁末帝遣璋攻下澤州即以璋為刺史梁亡璋事唐為邠寧節度使與郭崇韜相善崇韜伐蜀以璋為行營右廂馬步軍都虞候軍事大小皆與參決蜀平以為劍南東川節度使孟知祥鎮西川其後二人有異志安重誨居中用事議者多言知祥必不為唐用而能制知祥者璋也往往稱璋忠義重誨以為然頗優寵之以故璋益橫天成四年明宗祀天南郊詔兩川貢助南郊物五十萬使李仁矩賫安重誨書往諭璋璋訴不肯出秖出十萬而已又因事欲殺仁矩仁矩涕泣而免歸言璋必反其後使者至東川璋益倨慢使者還多言璋欲反狀重誨患之乃稍擇將吏為兩川刺史以精兵為其牙衛分布其諸州又分閬州置保寧軍以仁矩為節度使遣姚洪將兵千人從仁矩戍閬州璋及知祥覺唐疑己且削其地遂連謀以反璋因為其子娶知祥女以相結又遣其將李彥釗扼劍門關為七寨於關北增置關號永定凡唐戍兵東歸者皆遮留之獲其逃者覆以鐵籠火炙之或刲肉釘面割心而啖長興元年九月知祥攻陷遂州璋攻陷閬州執李仁矩姚洪皆殺之初璋等反唐獨誅璋家屬知祥妻子皆在成都其疏屬留京師者皆不誅石敬瑭討璋等兵久無功而關以西饋運不給遠近勞敝明宗患之安重誨自往督軍敬瑭不納重誨遂得罪死敬瑭亦還明宗乃遣西川進奏官蘇願東川軍將劉澄西歸諭璋等使改過知祥遣人告璋欲與俱謝過自歸璋曰唐不殺孟公家族於西川恩厚矣我子孫何在何謝之有璋由此疑知祥賣己三年四月以兵萬人攻知祥戰于彌牟璋大敗還走梓州初唐陵州刺史王暉代還過璋璋邀留之至是暉執璋殺之傳其首於知祥范延光范延光字子瓌相州臨漳人也唐明宗為節度使置延光麾下而未之奇也明宗破鄆州梁兵方扼楊劉其先鋒將康延孝陰送款於明宗明宗求可以通延孝款於莊宗者延光輒自請行乃懷延孝蠟丸書西見莊宗致之且曰今延孝雖有降意而梁兵扼楊劉者甚盛未可圖也不如築壘馬家口以通汶陽莊宗以為然壘成梁遣王彥章急攻新壘明宗使延光間行求兵夜至河上為梁兵所得送京師下延光獄搒掠數百脅以白刃延光終不肯言晉事繫之數月稍為獄吏所護莊宗入汴獄吏去其桎梏拜而出之莊宗見延光喜拜檢校工部尚書明宗時為宣徽南院使明宗行幸汴州至滎陽朱守殷反延光曰守殷反迹始見若緩之使得為計則城堅而難近故乘人之未備者莫若急攻臣請騎兵五百馳至城下以神速駭之乃以騎兵五百自暮疾馳至半夜行二百里戰于城下遲明明宗亦馳至汴兵望見天子乘輿乃開門而延光先入猶巷戰殺傷甚衆守殷死汴州平明年遷樞密使出為成德軍節度使安重誨死復召延光與趙延壽並為樞密使明宗問延光馬數幾何對曰騎軍三萬五千明宗撫髀歎曰吾兵間四十年自太祖在太原時馬數不過七千莊宗取河北與梁家戰河上馬才萬匹今有馬三萬五千而不能一天下吾老矣馬多奈何延光因曰臣嘗計一馬之費可養步卒五人三萬五千匹馬十五萬兵之食也明宗曰肥戰馬而瘠吾人此吾所愧也夏州李仁福卒其子彝超自立而邀旄節明宗遣安從進代之彝超不受代以兵攻之久不克隰州刺史劉遂凝馳驛入見獻策言綏銀二州之人皆有內嚮之意請除二刺史以招降之延光曰王師問罪本在彝超夏州已破綏銀豈足顧哉若不破夏州雖得綏銀不能守也遂凝又請自馳入説彝超使出降延光曰一遂凝萬一失之不足惜所惜者朝廷大體也是時王淑妃用事遂凝兄弟與淑妃有舊方倚以蒙恩寵所言無不聽而大臣以妃故多不敢爭獨延光從容沮止之明宗有疾不能視朝京師之人訩訩異議藏竄山谷或寄匿於軍營有司不能禁或勸延光以嚴法制之延光曰制動當以靜宜少待之已而明宗疾少間京師乃定是時秦王握兵驕甚宋王弱而且在外議者多屬意於潞王延光懼禍之及也乃求罷去延壽陰察延光有避禍意亦遽求罷明宗再三留之二人辭益懇至繼之以泣明宗不得已乃皆罷之延光復鎮成德而用朱弘昭馮贇為樞密使已而秦王舉兵見誅明宗崩潞王反殺愍帝唐室大亂弘昭贇皆及禍以死末帝復詔延光為樞密使拜宣武軍節度使天雄軍亂逐節度使劉延皓遣延光討平之即以為天雄軍節度使延光常夢大蛇自臍入其腹半入而掣去之以問門下術士張生張生贊曰蛇龍類也入腹內王者之兆也張生自延光微時言其必貴延光素神之常置門下言多輒中遂以其言為然由是頗畜異志當晉高祖起太原末帝遣延光以兵二萬屯遼州與趙延壽掎角既而延壽先降延光獨不降高祖即位延光賀表又頗後諸侯至又其女為末帝子重美妃以此遂懷反側高祖封延光臨清王以慰其心有平山人祕瓊者為成德軍節度使董溫其衙內指揮使後溫其為契丹所虜瓊乃悉殺溫其家族瘞之一穴而取其家資巨萬計晉高祖入立以瓊為齊州防禦使橐其資裝道出于魏延光陰遣人以書招之瓊不納延光怒選兵伏境上伺瓊過殺之于夏津悉取其資以戍邏者誤殺聞由是高祖疑其必為亂乃幸汴州天福二年六月延光遂反遣其牙將孫鋭澶州刺史馮暉以兵二萬距黎陽掠滑衛高祖以楊光遠為招討使引兵自滑州渡胡梁攻之鋭輕脫無謀兵行以娼女十餘自隨張蓋操扇酣歌飲食自若軍士苦大熱皆不為用光遠得諜者詢得其謀誘鋭等渡河半濟而擊之兵多溺死鋭暉退走入魏閉壁不出初延光反意未決而得暴疾不能興鋭乃陰召暉入城迫延光反延光惶惑遂從之高祖聞延光用鋭等以反笑曰吾雖不武然嘗從明宗取天下攻堅破強多矣如延光已非我敵況鋭等兒戲邪行取孺子爾乃決意討之延光初無必反意鋭等敗延光遣牙將王知新賫表自歸高祖不見以知新屬武德司延光又附楊光遠表請降不報延光遂堅守晉以箭書二百射城中悉赦魏人募能斬延光者然魏城堅難下攻之逾年不克師老糧匱宗正丞石昂上書極諫請赦延光願以單車入説而降之高祖亦悔悟三年九月使謁者入魏赦延光延光乃降册封東平郡王天平軍節度使賜鐵券居數月來朝因慚請老以太子太師致仕初高祖赦降延光語使者謂之曰許卿不死矣若降而殺之何以享國延光謀於副使李式式曰主上敦信明義許之不死則不死矣乃降及致仕居京師歲時宴見高祖待之與羣臣無間然心不欲使在京師歲餘使宣徽使劉處讓載酒夜過延光謂曰上遣處讓來時適有契丹使至北朝皇帝問晉魏博反臣何在恐晉不能制當鎖以來免為中國後患延光聞之泣下莫知所為處讓曰當且之洛陽以避契丹使者延光曰楊光遠留守河南吾之仇也吾有田宅在河陽可以往乎處讓曰可也乃挈其帑歸河陽其行輜重盈路光遠利其資果圖之因奏曰延光反覆姦臣若不圖之非北走胡則南走吳越請拘之洛陽高祖猶豫未決光遠兼鎮河陽其子承勳知州事乃遣承勳以兵脅之使自裁延光曰天子賜我鐵券許之不死何得及此乃以壯士驅之上馬行至浮橋推墮水溺死以延光自投水死聞因盡取其資高祖以適會其意不問為之輟朝贈太傅水運軍使曹千獲其流尸于繆家灘詔許歸葬相州已葬墓輒崩破其棺槨頭顱皆碎初祕瓊殺董溫其取其資延光又殺瓊而取之而終以資為光遠所殺而光遠亦不能免也當延光反時有李彥珣者為河陽行軍司馬張從賓反河陽彥珣附之從賓敗彥珣奔于魏延光以為步軍都監使之守城招討使楊光遠知彥珣邢州人也其母尚在乃遣人之邢州取其母至城下示彥珣以招之彥珣望見自射殺之及延光出降晉高祖拜彥珣房州刺史大臣言彥珣殺母當誅高祖以謂赦令已行不可失信後以坐贓誅嗚呼甚哉人性之慎於習也故聖人於仁義深矣其為教也勤而不怠緩而不迫欲民漸習而自趨之至於而安以成俗也然民之無知習見善則安於為善習見惡則安於為惡五代之亂其來遠矣自唐之衰干戈飢饉父不得育其子子不得養其親其始也骨肉不能相保蓋出于不幸因之禮義日以廢恩愛日以薄其習久而遂以大壞至於父子之間自相賊害五代之際其禍害不可勝道也夫人情莫不共知愛其親莫不共知惡於不孝然彥珣彎弓射其母高祖從而赦之非徒彥珣不自知為大惡而高祖亦安焉不以為怪也豈非積習之久而至於是歟語曰性相近習相遠至其極也使人心不若禽獸可不哀哉若彥珣之惡而恬然不以為怪則晉出帝之絶其父宜其舉世不知為非也婁繼英婁繼英不知何許人也歷梁唐為絳冀二州刺史北面水陸轉運使耀州團練使晉高祖時為左監門衛上將軍繼英子婦溫延沼女也自明宗時誅其父韜延沼兄弟廢居于許心常怨望及范延光反繼英有弟為魏州子城都虞候延光遣人以蠟書招繼英繼英乃遣延沼入魏見延光延光大喜與之信箭使陰圖許延沼與其弟延濬延衮募不逞之徒千人期以攻許而許州節度使萇從簡以延光之反疑有應者為備甚嚴延沼未及發延光蠟書事泄於京師繼英惶恐不自安乃出奔許高祖下詔招慰之使復位繼英懼不敢出溫氏兄弟謀殺繼英以自歸延沼以其女故不忍張從賓反於洛陽延沼兄弟乃與繼英俱投從賓於汜水繼英知溫氏之初欲殺己也反譖延沼兄弟於從賓從賓殺之從賓敗繼英為杜重威所殺安重榮安重榮小字鐵胡朔州人也祖從義利州刺史父全勝州刺史振武馬步軍都指揮使重榮有力善騎射為振武巡邊指揮使晉高祖起太原使張潁陰招重榮其母與兄皆以為不可重榮業已許潁母兄謀共殺潁以止之重榮曰未可吾當為母卜之乃立一箭百步而射之曰石公為天子則中一發輒中又立一箭而射之曰吾為節度使則中一發又中其母兄乃許重榮以巡邊千騎叛入太原高祖即位拜重榮成德軍節度使重榮雖武夫而曉吏事其下不能欺有夫婦訟其子不孝者重榮拔劍授其父使自殺之其父泣曰不忍也其母從傍詬奪其劍而逐之問之乃繼母也重榮叱其母出後射殺之重榮起於軍卒暴至富貴而見唐廢帝晉高祖皆自藩侯得國嘗謂人曰天子寧有種邪兵強馬壯者為之爾雖懷異志而未有以發也是時高祖與契丹約為父子契丹驕甚高祖奉之愈謹重榮憤然以謂詘中國以尊夷狄困已敝之民而充無厭之欲此晉萬世恥也數以此非誚高祖契丹使者往來過鎮州重榮箕踞慢不為之禮或執殺之是時吐渾白氏役屬契丹苦其暴虐重榮誘之入塞契丹數遣使責高祖並求使者高祖對使者鞠躬俯首受責愈謹多為好辭以自解而姑息重榮不能詰乃遣供奉官張澄以兵二千搜索並鎮欣代山谷中吐渾悉驅出塞吐渾去而復來重榮卒納之因招集亡命課民種稗食馬萬匹所為益驕因怒殺指揮使賈章誣之以反章女尚幼欲捨之女曰吾家三十口皆死於兵存者特吾與父爾今父死吾何忍獨生願就死遂殺之鎮人於是高賈女之烈而知重榮之必敗也重榮既僭侈以為金魚袋不足貴刻玉為魚佩之娶二妻高祖因之並加封爵天福六年夏契丹使者拽剌過鎮重榮侵辱之拽剌言不遜重榮怒執拽剌以輕騎掠幽州南境之民處之博野上表曰臣昨據熟吐渾白承福赫連功德等領本族三萬餘帳自應州來奔又據生吐渾渾契苾兩突厥三部南北將沙陀安慶九府等各領其族牛羊車帳甲馬七八路來奔具言契丹殘害掠取生口羊馬自今年二月已後號令諸蕃點閲強壯辦具軍裝期以上秋南向諸蕃部誠恐上天不祐敗滅家族願先自歸其諸部勝兵衆可十萬又據沿河黨項山前後逸越利諸族首領皆遣人送契丹所授告身敕牒旗幟來歸款皆號泣告勞願治兵甲以報怨又據朔州節度副使趙崇殺節度使劉山以城來歸竊以諸蕃不招呼而自至朔州不攻伐而自歸雖繫人情盡由天意又念陷蕃諸將等本自勳勞久居富貴沒身虜塞酷虐不勝企足朝廷思歸可諒苟聞傳檄必盡倒戈其表數千言又為書以遺朝廷大臣四方藩鎮皆以契丹可取為言高祖患之為之幸鄴報重榮曰前世與虜和親皆所以為天下計今吾以天下臣之爾以一鎮抗之大小不等無自辱焉重榮謂晉無如我何反意乃決重榮雖以契丹為言反陰遣人與幽州節度使劉晞相結契丹亦利晉多事幸重榮之亂期兩敝之欲因以窺中國故不加怒於重榮重榮將反也其母又以為不可重榮曰為母卜之指其堂下幡竿龍口仰射之曰吾有天下則中之一發而中其母乃許饒陽令劉巖獻水鳥五色重榮曰此鳳也畜之後潭又使人為大鐵鞭以獻誑其民曰鞭有神指人人輒死號鐵鞭郎君出則以為前驅鎮之城門抱關鐵胡人無故頭自落鐵胡重榮小字雖甚惡之然不悟也其冬安從進反襄陽重榮聞之乃亦舉兵是歲鎮州大旱蝗重榮聚飢民數萬驅以嚮鄴聲言入覲行至宗城破家堤高祖遣杜重威逆之兵已交其將趙彥之與重榮有隙臨陳卷旗以奔晉軍其鎧甲鞍轡皆裝以銀晉軍不知其來降爭殺而分之重榮聞彥之降晉大懼退入于輜重中其兵二萬皆潰去是冬大寒潰兵飢凍及見殺無孑遺重榮獨與十餘騎奔還以牛馬革為甲驅州人守城以待重威兵至城下重榮裨將自城西水碾門引官軍以入殺守城二萬餘人重榮以吐渾數百騎守牙城重威使人擒之斬首以獻高祖御樓受馘命漆其首送于契丹改成德軍為順德鎮州曰恆州常山曰恆山云安從進安從進振武索葛部人也祖父皆事唐為騎將從進初從莊宗於兵間為護駕馬軍都指揮使領貴州刺史明宗時為保義彰武軍節度使未嘗將兵征伐李彝超自立於夏州從進嘗一以兵往卒亦無功愍帝即位徙領順化為侍衛馬軍都指揮使潞王反鳳翔從進巡檢京城殺樞密使馮贇送款於從珂愍帝出奔從珂將至京師從進率百官班迎于郊清泰中徙鎮山南東道晉高祖即位加同中書門下平章事高祖取天下不順常以此慚藩鎮多務過為姑息而藩鎮之臣或不自安或心慕高祖所為謂舉可成事故在位七年而反者六起從進最後反然皆不免也自范延光反鄴從進已畜異志恃江為險招集亡命益置軍兵南方貢輸道出襄陽者多擅留之邀遮商旅皆黥以充軍與安重榮陰相結託期為表𩹉高祖患之謀徙從進使人謂曰東平王建立來朝願還鄉里已徙上黨朕虛青州以待卿卿誠樂行朕即降制從進報曰移青州在漢江南臣即赴任高祖亦優容之其子弘超為宮苑副使居京師從進請賜告歸遂不遣王令謙潘知麟者皆從進牙將也常從從進最久知其必敗切諫之從進遣子弘超與令謙遊南山酒酣令人推墮崖死天福六年安重榮執殺契丹使者反迹見高祖為之幸鄴鄭王重貴留守京師宰相和凝曰陛下且北從進必反何以制之高祖曰卿意奈何凝曰臣聞兵法先人者奪人願為空名宣敕十數通授鄭王有急則命將以往從進聞高祖北遂殺知麟以反鄭王以空名敕授李建崇郭金海等討之從進引兵攻鄧州不克進至湖陽遇建崇等大駭以為神速復為野火所燒遂大敗從進以數十騎奔還襄陽高祖遣高行周圍之踰年糧盡從進自焚死執其子弘受及其將佐四十三人送京師高祖御樓受俘徇于市而斬之降襄陽為防禦贈令謙忠州刺史知麟順州刺史楊光遠楊光遠字德明其父曰阿啜蓋沙陀部人也光遠初名阿檀為唐莊宗騎將從周德威戰契丹於新州折其一臂遂廢不用久之以為幽州馬步軍都指揮使戍瓦橋關光遠為人病禿折臂不通文字然有辨智長於吏事明宗時為媯瀛冀易四州刺史以治稱初唐兵破王都於中山得契丹大將萴剌等十餘人已而契丹與中國通和遣使者求萴剌等明宗與大臣議皆欲歸之獨光遠不可曰萴剌皆北狄善戰者彼失之如去手足且居此久熟知中國事歸之豈吾利也明宗曰蕃人重盟誓已與吾好豈相負也光遠曰臣恐後悔不及爾明宗嘉其説卒不遣萴剌等光遠自易州刺史拜振武軍節度使清泰二年徙鎮中山兼北面行營都虞候禦契丹於雲應之間晉高祖起太原末帝以光遠佐張敬達為太原四面招討副使為契丹所敗退守晉安寨契丹圍之數月人馬食盡殺馬而食馬盡乃殺敬達出降耶律德光見之靳曰爾輩大是惡漢兒光遠與諸將初不知其誚己猶為謙言以對德光曰不用鹽酪食一萬匹戰馬豈非惡漢兒邪光遠等大慚伏德光問曰懼否皆曰甚懼曰何懼曰懼皇帝將入蕃德光曰吾國無土地官爵以居汝汝等勉事晉晉高祖以光遠為宣武軍節度使侍衛馬步軍都指揮使光遠進見佯為悒悒之色常如有所恨者高祖疑其有所不足使人問之對曰臣於富貴無不足也惟不及張生鐵死得其所此常為愧爾由是高祖以為忠頗親信之范延光反以為魏府都招討使久之不能下高祖卒用他計降延光而光遠自以握重兵在外謂高祖畏己始為恣橫高祖每優容之為選其子承祚尚長安公主其次子承信等皆超拜官爵恩寵無比樞密使桑維翰惡之數以為言光遠自魏來朝屢指維翰擅權難制高祖不得已罷出維翰於相州亦徙光遠西京留守兼鎮河陽奪其兵職光遠始大怨望陰以寶貨奉契丹訴己為晉疏斥所養部曲千人撓法犯禁河洛之間甚於寇盜天福五年徙鎮平盧封東平王光遠請其子以行乃拜承祚單州刺史承勳萊州防禦使父子俱東車騎連屬數十里出帝即位拜太師封壽王是時晉馬少括天下馬以佐軍景延廣請取光遠前所借官馬三百匹光遠怒曰此馬先帝賜我安得復取是疑我反也遂謀為亂而承祚自單州逃歸出帝即以承祚為淄州刺史遣使者賜以玉帶御馬以慰安之光遠益驕乃反召契丹入寇陷貝州博州刺史周儒亦叛降契丹是時出帝與耶律德光相距澶魏之間鄆州觀察判官竇儀計事軍中謀曰今不以重兵大將守博州渡使儒得引契丹東過河與光遠合則河南危矣出帝乃遣李守貞皇甫遇以兵萬人沿河而下儒果引契丹自馬家渡濟河方築壘守貞等急擊之契丹大敗遂與光遠隔絶德光聞河上兵大敗與晉決戰戚城亦敗契丹已北出帝復遣守貞符彥卿東討光遠嬰城固守自夏至冬城中人相食幾盡光遠北望契丹稽首以呼德光曰皇帝誤光遠邪其子承勳等勸光遠出降光遠曰我在代北時嘗以紙錢祭天池投之輒沒人言我當作天子宜且待時毋輕議也承勳知不可乃殺節度判官丘濤親將杜延壽楊瞻白延祚等劫光遠幽之遣人奉表待罪承信承祚皆詣闕自歸而光遠亦上章請死出帝以其二子為侍衛將軍賜光遠詔書許以不死羣臣皆以為不可乃敕李守貞便宜處置守貞遣客省副使何延祚殺之于其家延祚至其第光遠方閲馬于延祚使一都將入謂之曰天使在門欲歸報天子未有以藉手光遠曰何謂也曰願得大王頭爾光遠曰我有何罪昔我以晉安寨降契丹使爾家世世為天子我亦望以富貴終身而反負心若此遂見殺以病卒聞承勳事晉為鄭州防禦使德光滅晉使人召承勳至京師責其劫父臠而食之乃以承信為平盧節度使漢高祖贈光遠尚書令封齊王命中書舍人張正撰光遠碑銘文賜承信使刻石于青州碑石既立天大雷電擊折之阿啜初非姓氏其後改名瑊而姓楊氏光遠初名檀清泰二年有司言明宗廟諱犯偏傍者皆易之乃賜名光遠云光遠既病禿而妻又跛其足也人為之語曰自古豈有禿瘡天子跛腳皇后邪相傳以為笑然而召夷狄為天下首禍卒滅晉氏瘡痍中國者三十餘年皆光遠為之也
