body:
  text: 新五代史卷二十三梁臣傳第十一楊師厚楊師厚潁州斤溝人也少事河陽李罕之罕之降晉選其麾下勁卒百人獻于晉王師厚在籍中師厚在晉無所知名後以罪奔于梁太祖以為宣武軍押衙曹州刺史梁攻王師範師厚戰臨朐擒其偏將八十餘人取棣州以功拜齊州刺史太祖攻趙匡凝於襄陽遣師厚為先鋒師厚取穀城西童山木為浮橋渡漢水擊匡凝敗之匡凝棄城走師厚進攻荊南又走匡凝弟匡明功為多拜山南東道節度使同中書門下平章事劉知俊叛攻陷長安劉牛存節等攻之久不克師厚以奇兵出旁南山入其西門降其守者遂克之晉周德威攻晉州以應知俊師厚敗之于蒙坑以功遷保義軍節度使徙鎮宣義是時梁兵攻趙久無功太祖病臥洛陽少間乃自將北擊趙師厚從太祖至洹水夜行迷失道明旦次魏縣聞敵將至梁兵潰亂不可止久之無敵乃定已而太祖疾作乃還明年少間而晉軍攻燕燕王劉守光求援於梁太祖為之擊趙以牽晉屯于龍花遣師厚攻棗彊三月不能下太祖怒自往督兵戰乃破屠之進圍蓨縣晉史建瑭以輕兵夜擊梁軍梁軍大擾太祖與師厚皆棄輜重南走太祖還東都師厚留屯魏州明年太祖遇弒友珪自立師厚乘間殺魏牙將潘晏臧延範等逐出節度使羅周翰友珪因以師厚為天雄軍節度使一作日自太祖與晉戰河北師厚常為招討使悉領梁之勁兵太祖崩師厚遂逐其帥而稍矜倨難制時魏恃牙兵其帥得以倔彊羅紹威時牙兵盡死魏勢孤始為梁所制師厚已得志乃復置銀槍効節軍友珪陰欲圖之召師厚入計事其吏田溫等勸師厚勿行師厚曰吾二十年不負朱家今若不行則見疑而生事然吾知上為人雖往無如我何也乃以勁兵二萬朝京師留其兵城外以十餘人自從入見友珪友珪益恐懼賜與鉅萬而還已而末帝謀討友珪問於趙巖巖曰此事成敗在招討楊公爾得其一言諭禁軍吾事立辦末帝乃遣馬慎交陰見師厚布腹心師厚猶豫未決謂其下曰方郢王弒逆時吾不能即討今君臣之分已定無故改圖人謂我何其下或曰友珪弒父與君乃天下之惡均王仗大義以誅賊其事易成彼若一朝破賊公將何以自處師厚大悟乃遣其將王舜賢至洛陽見袁象先計事使朱漢賓以兵屯滑州為應末帝卒與象先殺友珪末帝即位封師厚鄴王詔書不名事無巨細皆以諮之然心益忌而畏之已而師厚瘍發卒末帝為之受賀於宮中由是始分相魏為兩鎮魏軍亂以魏博降晉梁失河北自此始王景仁王景仁廬州合淝人也初名茂章少從楊行密起淮南景仁為將驍勇剛悍質略無威儀臨敵務以身先士卒行密壯之梁太祖遣子友寧攻王師範于青州師範乞兵於行密行密遣景仁以步騎七千救師範師範以兵背城為兩柵友寧夜擊其一柵柵中告急趣景仁出戰景仁按兵不動友寧已破一柵連戰不已遲明景仁度友寧兵已困乃出戰大敗之遂斬友寧以其首報行密是時梁太祖方攻鄆州聞子友寧死以兵二十萬倍道而至景仁閉壘示怯伺梁兵怠毀柵而出驅馳疾戰戰酣退坐召諸將飲酒已而復戰太祖登高望見之得青州降人問飲酒者為誰曰王茂章也太祖歎曰使吾得此人為將天下不足平也梁兵又敗景仁軍還梁兵急追之景仁度不可走遣裨將李虔裕以衆一旅設覆於山下以待之留軍不行解鞍而寢虔裕疾呼曰追兵至矣宜速走虔裕以死遏之景仁曰吾亦戰於此也虔裕三請景仁乃行而虔裕卒戰死梁兵以故不能及而景仁全軍以歸景仁事行密為潤州團練使行密死子渥自宣州入立以景仁代守宣州渥已立反求宣州故物景仁惜不與渥怒以兵攻之景仁奔于錢鏐鏐表景仁領宣州節度使梁太祖素識景仁乃遣人召之景仁間道歸梁仍以為寧國軍節度使加同中書門下平章事久之未有以用使參宰相班奉朝請而已開平四年以景仁為北面招討使將韓勍李思安等兵伐趙行至魏州司天監言太陰虧不利行師太祖亟召景仁等還已而復遣之景仁已去太祖思術者言馳使者止景仁於魏以待景仁已過邢洺使者及之景仁不奉詔進營於柏鄉乾化元年正月庚寅日有食之崇政使敬翔白太祖曰兵可憂矣太祖為之旰食是日景仁及晉人戰大敗於柏鄉景仁歸訴於太祖太祖曰吾亦知之蓋韓勍李思安輕汝為客不從節度爾乃罷景仁就第後數月悉復其官爵末帝立以景仁為淮南招討使攻廬壽軍過獨山山有楊行密祠景仁再拜號泣而去戰于霍山梁兵敗走景仁殿而力戰以故梁兵不甚敗景仁歸京師病疽卒贈太尉賀瓌賀瓌字光遠濮州人也事鄆州朱宣為都指揮使梁太祖攻朱瑾于兗州宣遣瓌與何懷寶柳存等以兵萬人救兗州瓌趨待賓館欲絕梁餉道梁太祖略地至中都得降卒言瓌等兵趨待賓館矣以六壬占之得斬關以為吉乃選精兵夜疾馳百里期先至待賓以逆瓌而夜黑兵失道旦至鉅野東遇瓌兵擊之瓌等大敗瓌走梁兵急追之瓌顧路窮登上大呼曰我賀瓌也可勿殺我太祖馳騎取之幷取懷寶等數十人降其卒三千餘人是日大風揚沙蔽天太祖曰天怒我殺人少邪即盡殺降卒三千人而縶瓌及懷寶等至兗城下以招瑾瑾不納因斬懷寶等十餘人而獨留瓌瓌感太祖不殺誓以身自効從太祖平青州以為曹州刺史太祖即位累遷相州刺史末帝時遷左龍虎統軍宣義軍節度使卦名貞明元年魏兵亂賀德倫降晉晉王入魏州劉敗于故元城走黎陽貝衞洺磁諸州皆入于晉晉軍取楊劉末帝乃以瓌為招討使與謝彥章等屯于行臺晉軍迫瓌十里而柵相持百餘日瓌與彥章有隙伏甲殺之莊宗喜曰將帥不和梁亡無日矣乃令軍中歸其老疾於鄴以輕兵襲濮州瓌自行臺躡之戰于胡柳陂晉人輜重在陣西瓌軍將薄之晉軍亂斬其將周德威盡取其輜重軍已勝陣無石山日暮晉兵仰攻之瓌軍下山擊晉軍瓌大敗晉遂取濮州城德勝夾河為柵瓌以舟兵攻南柵不能得還軍行臺以疾卒年六十二贈侍中有子光圖凡言有子某者皆仕皇朝有聞王檀王檀字衆美京兆人也少事梁太祖為小校尚讓攻梁戰尉氏門檀勇出諸將太祖奇之遷踏白副指揮使從朱珍募兵東方戰數有功梁與蔡兵戰板橋李重裔馬踣為蔡兵所擒檀馳取之幷獲其將一人從太祖破魏內黃遷衝山都虞候復從朱珍攻徐州檀獲其將一人梁兵攻王師範檀以一軍破其密州拜密州刺史太祖即位遷保義軍節度使潞州東北面招討使王景仁敗於柏鄉晉兵圍邢州太祖大懼欲自將救之檀止太祖請自拒敵力戰卒全邢州以功加同中書門下平章事進封瑯琊郡王友珪立徙鎮宣化貞明元年又徙匡國是時莊宗取魏博檀以謂晉兵悉在河北乃以奇兵西出陰地襲太原不克而還徙鎮天平檀嘗招納亡盜居帳下帳下兵亂入殺檀年五十八贈太師謚曰忠毅馬嗣勳馬嗣勳濠州鍾離人也少事州為客將為人材武有辯梁太祖攻濠州刺史張遂遣嗣勳持牌印降梁楊行密攻遂遂又使嗣勳乞兵於太祖梁兵未至濠州已沒嗣勳無所歸乃留事梁太祖以為宣武軍元從押衙太祖西攻鳳翔行至華州遣嗣勳入說韓建建即時出降天祐二年羅紹威將誅牙軍乞兵於梁梁女嫁魏適死太祖乃遣嗣勳以長直千人為綵輿入魏致兵器於輿中聲言助葬嗣勳館銅臺夜與魏新鄉鎮兵攻石柱門入迎紹威家屬衞之乃益取魏甲兵攻牙軍牙軍不知兵所從來莫能為備殺其八千餘人遲明皆盡嗣勳中重瘡卒太祖即位贈太保王虔裕王虔裕瑯琊臨沂人也為人健勇善騎射以弋獵為生少從諸葛爽起青棣間其後爽為汝州防禦使率兵北擊沙陀還入長安攻黃巢爽兵敗降巢巢以爽為河陽節度使中和三年孫儒陷河陽虔裕隨爽奔于梁是時太祖新就鎮黃巢秦宗權等兵方盛太祖數為所窘而梁未有佗將乃以虔裕將騎兵常為先鋒擊巢陳蔡間拔其數柵巢走梁兵躡之戰于萬勝戍賊敗而東虔裕功為多乃表虔裕義州刺史黃巢已去秦宗權攻許鄭與梁為敵境大小百餘戰虔裕常有功秦宗賢攻汴南境太祖遣虔裕拒賢於尉氏戰敗失一裨將太祖怒拘虔裕於軍中邢州孟遷降梁為晉人所圍太祖遣虔裕以精兵百人疾馳夜破晉圍入邢州遲明立梁旗幟於城上晉人以為救兵至乃退已而晉兵復來遷執虔裕降于晉見殺謝彥章謝彥章許州人也幼事葛從周從周憐其敏惠養以為子授之兵法從周以千錢置大盤中為行陣偏伍之狀示以出入進退之節彥章盡得之及壯事梁太祖為騎將是時賀瓌善用步卒而彥章與孟審澄侯溫裕皆善將騎兵審澄溫裕所將不過三千彥章多而益辦彥章事末帝累遷匡國軍節度使貞明四年晉攻河北賀瓌為北面招討使彥章為排陣使屯于行臺彥章為將好禮儒士雖居軍中嘗儒服或臨敵御衆肅然有將帥之威左右馳驟疾若風雨晉人望其行陣齊整相謂曰謝彥章必在此也其名重敵中如此瓌心忌之彥章與瓌行視郊外瓌指一地語彥章曰此地岡阜隆起其中坦然營柵之地也已而晉兵柵之瓌疑彥章陰以告晉益惡之彥章故與馬步都虞候朱珪有隙瓌欲速戰彥章請持重以老敵珪乃誣彥章以為將反瓌旦享士使珪伏甲殺之審澄溫裕皆見害
