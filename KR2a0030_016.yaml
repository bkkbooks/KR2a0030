body:
  text: 新五代史卷十六唐廢帝家人傳第四皇后劉氏廢帝皇后劉氏父茂威應州渾元人也后為人彊悍廢帝素憚之初封沛國夫人廢帝即位立為皇后其弟延皓少事廢帝為牙將廢帝即位拜宮苑使宣徽南院使清泰二年為樞密使天雄軍節度使延皓為人素謹厚及貴而改節以后故用事受賕掠人園宅在鄴下不恤軍士軍士皆怨捧聖都虞候張令昭以其屯駐兵逐延皓延皓走相州是時石敬瑭已反方用兵而令昭之亂作令昭乃閉城遣其副使邊仁嗣請己為節度使廢帝以令昭為右千牛衛將軍權知天雄軍府事已而遣范延光討之令昭敗走邢州追至沙河斬之屯駐諸軍亂者三千餘人皆死有司請以延皓行軍法廢帝以后故削其官爵而已廢帝二子曰重吉重美一女為尼號幼澄皆不知其所生廢帝鎮鳳翔重吉為控鶴指揮使與尼俱留京師控鶴親兵也愍帝即位不欲重吉掌親兵乃出重吉為亳州團練使居幼澄於禁中又徙廢帝北京廢帝自疑乃反愍帝遣人殺重吉于宋州幼澄亦死重美重美幼而明敏如成人廢帝即位自左衛上將軍領成德軍節度使兼河南尹判六軍諸衛事改領天雄軍節度使同中書門下平章事封雍王石敬瑭反廢帝欲北征重美謂宜持重固請毋行廢帝心憚敬瑭初不欲往聞重美言以為然而劉延皓與劉延朗等迫之不已廢帝遂如河陽留重美守京師京師震恐居民皆出城以藏竄門者禁止之重美曰國家多難不能與民為主而欲禁其避禍可乎因縱民出及晉兵將至劉皇后積薪于地將焚其宮室重美曰新天子至必不露坐但他日重勞民力取怨身後耳后以為然廢帝自焚后及重美與俱死嗚呼家人之道不可不正也夫禮者所以別嫌而明微也甚矣五代之際君君臣臣父父子子之道乖而宗廟朝廷人鬼皆失其序斯可謂亂世者歟自古未之有也唐一號而三姓周一號而二姓唐太祖莊宗為一家明宗愍帝為一家廢帝為一家周太祖為一家世宗為一家別其家而同其號者何哉唐從其號見其盜而有也周從其號與之也而別其家者昭穆親疏之不可亂也號可同家不可以不別所以別嫌而明微也梁博王友文之不別何哉著禍本也梁太祖之禍自友文始存之所以戒也
